<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Formáty data</title>
<style>
  body {
    font-family: system-ui, -apple-system, sans-serif;
    max-width: 40rem;
    margin: 0 auto;
    padding: 1.5rem;
    line-height: 1.6;
  }
  h1 { font-size: 1.5rem; }
  label { display: block; font-weight: 600; margin-bottom: 0.25rem; }
  input[type="date"] {
    font-size: 1.1rem;
    padding: 0.4rem;
  }
  .tlacitka {
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
    margin-top: 1.5rem;
  }
  button.kopie {
    font-size: 1.05rem;
    padding: 0.5rem 0.75rem;
    cursor: pointer;
    text-align: left;
    font-family: monospace;
  }
  .vp {
    position: absolute;
    width: 1px; height: 1px;
    padding: 0; margin: -1px;
    overflow: hidden;
    clip: rect(0 0 0 0);
    white-space: nowrap; border: 0;
  }
</style>
</head>
<body>
<h1>Formáty data</h1>

<p>
  <label for="datum">Zadejte datum</label>
  <input type="date" id="datum">
</p>

<div class="tlacitka" id="tlacitka"></div>

<div aria-live="assertive" class="vp" id="oznameni"></div>

<script>
const vstup = document.getElementById('datum');
const kontejner = document.getElementById('tlacitka');
const oznameni = document.getElementById('oznameni');

const mesice = ['ledna','února','března','dubna','května','června',
  'července','srpna','září','října','listopadu','prosince'];
const dny = ['neděle','pondělí','úterý','středa','čtvrtek','pátek','sobota'];

function dvojcifre(n){ return String(n).padStart(2,'0'); }

function naFormaty(d){
  const den = d.getDate();
  const m = d.getMonth();
  const rok = d.getFullYear();
  const dvt = d.getDay();
  return {
    'dlouhy':   `${den}. ${mesice[m]} ${rok}`,
    'sdnem':    `${dny[dvt]}, ${den}. ${mesice[m]} ${rok}`,
    'cislo':    `${den}.${m+1}.${rok}`,
    'cisloMez': `${den}. ${m+1}. ${rok}`,
    'cisloNul': `${dvojcifre(den)}.${dvojcifre(m+1)}.${rok}`,
    'iso':      `${rok}-${dvojcifre(m+1)}-${dvojcifre(den)}`
  };
}

function isoZData(d){
  return `${d.getFullYear()}-${dvojcifre(d.getMonth()+1)}-${dvojcifre(d.getDate())}`;
}

function aktualniDatum(){
  const v = vstup.value;
  if(!v) return null;
  const [r,m,den] = v.split('-').map(Number);
  return new Date(r, m-1, den);
}

function ohlasit(text){
  oznameni.textContent = '';
  setTimeout(() => { oznameni.textContent = text; }, 50);
}

function kopiruj(hodnota){
  navigator.clipboard.writeText(hodnota).then(() => {
    ohlasit(`Zkopírováno: ${hodnota}`);
  });
}

function vykresli(ohlas){
  const d = aktualniDatum();
  kontejner.innerHTML = '';
  if(!d){ return; }
  const f = naFormaty(d);
  for(const hodnota of Object.values(f)){
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'kopie';
    btn.textContent = hodnota;
    btn.setAttribute('aria-label', `Kopírovat ${hodnota}`);
    btn.addEventListener('click', () => kopiruj(hodnota));
    kontejner.appendChild(btn);
  }
  if(ohlas){ ohlasit(f['sdnem']); }
}

function nastavDatum(d){
  vstup.value = isoZData(d);
  vykresli(true);
}

function posun(dnu){
  const d = aktualniDatum() || new Date();
  d.setDate(d.getDate() + dnu);
  nastavDatum(d);
}

vstup.addEventListener('change', () => vykresli(true));
vstup.addEventListener('input', () => vykresli(true));

document.addEventListener('keydown', (e) => {
  if(e.ctrlKey || e.metaKey || e.altKey) return;
  const d = aktualniDatum();
  const f = d ? naFormaty(d) : null;
  let zachyceno = true;

  switch(e.key){
    case 't': case 'T': nastavDatum(new Date()); break;
    case 'r': posun(-1); break;
    case 'z': posun(1); break;
    case 'e': posun(-7); break;
    case 'u': posun(7); break;
    case 'c': if(f) kopiruj(f['dlouhy']); break;
    case 'C': if(f) kopiruj(f['sdnem']); break;
    case 'd': if(f) kopiruj(f['cislo']); break;
    case 'D': if(f) kopiruj(f['iso']); break;
    case 'w': if(f) kopiruj(f['cisloMez']); break;
    default: zachyceno = false;
  }
  if(zachyceno){ e.preventDefault(); }
});

nastavDatum(new Date());
</script>
</body>
</html>
