function renderStatusbar() {
  const stats = computeStats();
  const bar = el('footer', { class: 'statusbar', role: 'contentinfo' });
  const block = el('div', { class: 'stats-block' });
  block.appendChild(el('span', null, [el('strong', null, String(stats.cards)), ' karet']));
  block.appendChild(el('span', null, [el('strong', null, String(stats.chapters)), ' kapitol']));
  block.appendChild(el('span', null, [el('strong', null, String(stats.words)), ' slov']));
  block.appendChild(el('span', null, [el('strong', null, String(stats.images)), ' obrázků']));
  block.appendChild(el('span', null, ['Doba čtení: ', el('strong', null, stats.readingMin + ' min')]));
  bar.appendChild(block);
  bar.appendChild(el('div', { class: 'spacer' }));
  bar.appendChild(el('span', null, 'Uloženo: ' + new Date(State.doc.modifiedAt).toLocaleString('cs-CZ')));
  return bar;
}

function computeStats() {
  let cards = 0, words = 0, images = 0;
  State.doc.chapters.forEach(function (ch) {
    cards += ch.cards.length;
    ch.cards.forEach(function (c) {
      if (c.type === 'image') images++;
      if (c.type === 'gallery' || c.type === 'comparison' || c.type === 'slideshow') {
        images += (c.images || []).length;
      }
      const text = collectCardText(c);
      words += (text.match(/\S+/g) || []).length;
    });
  });
  // Plus titul
  if (State.doc.title) words += (State.doc.title.match(/\S+/g) || []).length;
  if (State.doc.subtitle) words += (State.doc.subtitle.match(/\S+/g) || []).length;
  return {
    cards: cards,
    chapters: State.doc.chapters.length,
    words: words,
    images: images,
    readingMin: Math.max(1, Math.round(words / 200))
  };
}

function collectCardText(c) {
  const parts = [];
  if (c.text) parts.push(c.text);
  if (c.title) parts.push(c.title);
  if (c.subtitle) parts.push(c.subtitle);
  if (c.caption) parts.push(c.caption);
  if (c.description) parts.push(c.description);
  if (c.left) parts.push(c.left);
  if (c.right) parts.push(c.right);
  if (c.label) parts.push(c.label);
  if (c.author) parts.push(c.author);
  if (c.code) parts.push(c.code);
  if (Array.isArray(c.items) && c.items.length) {
    if (typeof c.items[0] === 'string') parts.push(c.items.join(' '));
    else c.items.forEach(function (it) {
      if (it.title) parts.push(it.title); if (it.text) parts.push(it.text);
    });
  }
  if (c.headers) parts.push(c.headers.join(' '));
  if (c.rows) c.rows.forEach(function (r) { parts.push(r.join(' ')); });
  return parts.join(' ');
}

        tabindex: '0',

          if (cardEl) {

function makeInput(opts, value, onChange) {

function buildCardEditFields(body, card) {
  switch (card.type) {
    case 'heading': {
      body.appendChild(el('label', null, 'Úroveň nadpisu'));
      const sel = el('select');
      [1, 2, 3].forEach(function (lvl) {
        const opt = el('option', { value: String(lvl) }, 'Úroveň ' + lvl);
        if (card.level === lvl) opt.selected = true;
        sel.appendChild(opt);
      });
      sel.addEventListener('change', function (e) {
        card.level = parseInt(e.target.value, 10); saveAutosaveDebounced(); renderOutlineOnly();
      });
      body.appendChild(sel);
      body.appendChild(el('label', null, 'Text nadpisu'));
      const ti = el('input', { type: 'text' });
      ti.value = card.text || '';
      ti.addEventListener('input', function (e) { card.text = e.target.value; saveAutosaveDebounced(); renderOutlineOnly(); });
      body.appendChild(ti);
      break;
    }
    case 'text': {
      body.appendChild(el('label', null, 'Text (Markdown: **tučně**, *kurzíva*, [text](url), `kód`)'));
      const ta = el('textarea', { rows: '6' });
      ta.value = card.text || '';
      ta.addEventListener('input', function (e) { card.text = e.target.value; saveAutosaveDebounced(); });
      body.appendChild(ta);
      body.appendChild(el('p', { class: 'field-hint' }, 'Prázdný řádek znamená nový odstavec. Pomlčka na začátku řádku tvoří odrážku.'));
      break;
    }
    case 'bullet':
    case 'numbered': {
      body.appendChild(el('label', null, card.type === 'bullet' ? 'Položky odrážkového seznamu' : 'Položky číslovaného seznamu'));
      body.appendChild(buildItemListEditor(card));
      break;
    }
    case 'image': {
      body.appendChild(el('label', null, 'URL obrázku nebo nahrání'));
      const row = el('div', { class: 'list-item-row' });
      const urlIpt = el('input', { type: 'url', placeholder: 'https://...' });
      urlIpt.value = card.src || '';
      urlIpt.addEventListener('input', function (e) {
        card.src = e.target.value; saveAutosaveDebounced();
        const img = body.querySelector('.image-preview');
        if (img) img.src = e.target.value;
      });
      row.appendChild(urlIpt);
      row.appendChild(el('button', {
        class: 'btn',
        onclick: function () {
          pickImageFile(function (d) {
            card.src = d; saveAutosaveDebounced(); renderEditor();
          });
        }
      }, 'Nahrát'));
      body.appendChild(row);
      if (card.src) {
        body.appendChild(el('img', {
          class: 'image-preview', src: card.src, alt: '',
          style: { maxHeight: '160px', marginTop: '0.5rem', borderRadius: '4px' }
        }));
      }
      body.appendChild(el('label', null, 'Alternativní text (volitelné, pro screen reader)'));
      const altIpt = el('input', { type: 'text' });
      altIpt.value = card.alt || '';
      altIpt.addEventListener('input', function (e) { card.alt = e.target.value; saveAutosaveDebounced(); });
      body.appendChild(altIpt);
      body.appendChild(el('label', null, 'Titulek pod obrázkem (volitelné)'));
      const capIpt = el('input', { type: 'text' });
      capIpt.value = card.caption || '';
      capIpt.addEventListener('input', function (e) { card.caption = e.target.value; saveAutosaveDebounced(); });
      body.appendChild(capIpt);
      break;
    }
    case 'video': {
      body.appendChild(el('label', null, 'URL videa (YouTube, Vimeo, MP4)'));
      const v = el('input', { type: 'url', placeholder: 'https://www.youtube.com/watch?v=...' });
      v.value = card.url || '';
      v.addEventListener('input', function (e) { card.url = e.target.value; saveAutosaveDebounced(); });
      body.appendChild(v);
      body.appendChild(el('label', null, 'Titulek (volitelné)'));
      const c = el('input', { type: 'text' });
      c.value = card.caption || '';
      c.addEventListener('input', function (e) { card.caption = e.target.value; saveAutosaveDebounced(); });
      body.appendChild(c);
      break;
    }
    case 'audio': {
      body.appendChild(el('label', null, 'URL audio souboru'));
      const a = el('input', { type: 'url' });
      a.value = card.url || '';
      a.addEventListener('input', function (e) { card.url = e.target.value; saveAutosaveDebounced(); });
      body.appendChild(a);
      body.appendChild(el('label', null, 'Titulek (volitelné)'));
      const c = el('input', { type: 'text' });
      c.value = card.caption || '';
      c.addEventListener('input', function (e) { card.caption = e.target.value; saveAutosaveDebounced(); });
      body.appendChild(c);
      break;
    }
    case 'link': {
      body.appendChild(el('label', null, 'URL'));
      const u = el('input', { type: 'url', placeholder: 'https://...' });
      u.value = card.url || '';
      u.addEventListener('input', function (e) {
        card.url = e.target.value; saveAutosaveDebounced(); renderOutlineOnly();
        const dom = getDomainFromUrl(e.target.value);
        const hint = body.querySelector('.domain-hint');
        if (hint) hint.textContent = dom ? 'Doména: ' + dom : '';
      });
      body.appendChild(u);
      body.appendChild(el('label', null, 'Titulek odkazu'));
      const t = el('input', { type: 'text' });
      t.value = card.title || '';
      t.addEventListener('input', function (e) { card.title = e.target.value; saveAutosaveDebounced(); renderOutlineOnly(); });
      body.appendChild(t);
      body.appendChild(el('label', null, 'Krátký popisek (volitelné)'));
      const d = el('textarea', { rows: '2' });
      d.value = card.description || '';
      d.addEventListener('input', function (e) { card.description = e.target.value; saveAutosaveDebounced(); });
      body.appendChild(d);

function pickImageFile(cb) {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = 'image/*';
  input.addEventListener('change', function (e) {
    const file = e.target.files[0];
    if (!file) return;
    if (file.size > 10 * 1024 * 1024) {
      toast('Soubor je příliš velký (max 10 MB)', 'error');
      return;
    }
    const reader = new FileReader();
    reader.onload = function () {
      // Optimalizace: pokud je to JPEG/PNG větší než 1MB, zmenšit přes canvas
      if (file.size > 1024 * 1024 && /^image\/(jpeg|png|webp)$/.test(file.type)) {
        const img = new Image();
        img.onload = function () {
          const max = 1600;
          let w = img.width, h = img.height;
          if (w > max || h > max) {
            const r = max / Math.max(w, h);
            w = Math.round(w * r); h = Math.round(h * r);
          }
          const canvas = document.createElement('canvas');
          canvas.width = w; canvas.height = h;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0, w, h);
          cb(canvas.toDataURL(file.type === 'image/png' ? 'image/png' : 'image/jpeg', 0.85));
        };
        img.src = reader.result;
      } else {
        cb(reader.result);
      }
    };
    reader.readAsDataURL(file);
  });
  input.click();
}

let modalCloser = null;
function openModal(title, contentBuilder, opts) {
  closeModal();
  opts = opts || {};
  const host = document.getElementById('modal-host');
  const backdrop = el('div', { class: 'modal-backdrop' });
  backdrop.addEventListener('click', function (e) {
    if (e.target === backdrop) closeModal();
  });
  const modal = el('div', { class: 'modal' + (opts.large ? ' modal-large' : ''), role: 'dialog', 'aria-modal': 'true', 'aria-label': title });
  const head = el('div', { class: 'modal-head' });
  head.appendChild(el('h2', null, title));
  head.appendChild(el('button', {
    class: 'btn icon-only', 'aria-label': 'Zavřít dialog',
    onclick: closeModal
  }, '\u2716'));
  modal.appendChild(head);
  const body = el('div', { class: 'modal-body' });
  body.appendChild(contentBuilder(modal));
  modal.appendChild(body);
  if (opts.footer) {
    const foot = el('div', { class: 'modal-foot' });
    opts.footer.forEach(function (b) { foot.appendChild(b); });
    modal.appendChild(foot);
  }
  backdrop.appendChild(modal);
  host.appendChild(backdrop);

  const previousFocus = document.activeElement;
  setTimeout(function () {
    const focusable = modal.querySelector('input, textarea, select, button:not([aria-label="Zavřít dialog"])');
    if (focusable) focusable.focus();
  }, 50);

  const escHandler = function (e) {
    if (e.key === 'Escape') { closeModal(); }
  };
  document.addEventListener('keydown', escHandler);

  modalCloser = function () {
    document.removeEventListener('keydown', escHandler);
    if (host.contains(backdrop)) host.removeChild(backdrop);
    if (previousFocus && previousFocus.focus) previousFocus.focus();
    modalCloser = null;
  };
}

function closeModal() {
  if (modalCloser) modalCloser();
}

function openLoadDialog() {
  openModal('Otevřít JSON', function () {
    const wrap = el('div');
    wrap.appendChild(el('p', null, 'Vyberte soubor s uloženým příběhem (.json).'));
    const fileBtn = el('button', { class: 'btn primary' }, 'Vybrat soubor');
    fileBtn.addEventListener('click', function () {
      const ipt = document.createElement('input');
      ipt.type = 'file';
      ipt.accept = '.json,application/json';
      ipt.addEventListener('change', function (e) {
        const f = e.target.files[0];
        if (!f) return;
        const r = new FileReader();
        r.onload = function () {
          try {
            const doc = JSON.parse(r.result);
            if (!doc || !Array.isArray(doc.chapters)) throw new Error('Neplatný formát souboru');
            State.doc = doc;
            State.ui.focusedCardId = null;
            saveAutosave();
            renderEditor();
            closeModal();
            toast('Příběh načten', 'success');
          } catch (e) {
            toast('Chyba při načítání: ' + e.message, 'error');
          }
        };
        r.readAsText(f);
      });
      ipt.click();
    });
    wrap.appendChild(fileBtn);
    wrap.appendChild(el('p', { class: 'field-hint', style: { marginTop: '1rem' } },
      'Aplikace také automaticky uchovává poslední verzi v paměti prohlížeče.'));
    return wrap;
  });
}

function openSearchDialog() {
  openModal('Hledat v příběhu', function () {
    const wrap = el('div');
    const input = el('input', { type: 'search', placeholder: 'Zadejte hledaný text\u2026' });
    wrap.appendChild(input);
    const results = el('div', { style: { marginTop: '1rem', maxHeight: '50vh', overflowY: 'auto', border: '1px solid var(--app-border)', borderRadius: '4px' } });
    wrap.appendChild(results);
    function search(q) {
      results.textContent = '';
      if (!q || q.length < 2) {
        results.appendChild(el('p', { style: { padding: '1rem', color: 'var(--app-fg-mute)' } }, 'Zadejte alespoň 2 znaky.'));
        return;
      }
      const lq = q.toLowerCase();
      const matches = [];
      // Titul
      const titleText = ((State.doc.title || '') + ' ' + (State.doc.subtitle || '')).toLowerCase();
      if (titleText.indexOf(lq) >= 0) {
        matches.push({ type: 'Titul', cardId: '__title__', text: State.doc.title });
      }
      State.doc.chapters.forEach(function (ch) {
        if ((ch.title || '').toLowerCase().indexOf(lq) >= 0) {
          matches.push({ type: 'Kapitola', chapterId: ch.id, text: ch.title });
        }
        ch.cards.forEach(function (c) {
          const t = collectCardText(c).toLowerCase();
          if (t.indexOf(lq) >= 0) {
            matches.push({ type: CardTypes[c.type].label, cardId: c.id, text: CardTypes[c.type].summary(c) });
          }
        });
      });
      if (matches.length === 0) {
        results.appendChild(el('p', { style: { padding: '1rem', color: 'var(--app-fg-mute)' } }, 'Nic nenalezeno.'));
        return;
      }
      matches.forEach(function (m) {
        const item = el('div', {
          class: 'search-result',
          tabindex: '0',
          onclick: function () {
            closeModal();
            if (m.cardId) {
              State.ui.focusedCardId = m.cardId;
              const targetId = m.cardId === '__title__' ? 'title-card' : 'card-' + m.cardId;
              const elTarget = document.getElementById(targetId);
              if (elTarget) {
                elTarget.scrollIntoView({ block: 'center' });
                const f = elTarget.querySelector('input, textarea');
                if (f) f.focus();
              }
              renderOutlineOnly();
            } else if (m.chapterId) {
              const elTarget = document.getElementById('chapter-' + m.chapterId);
              if (elTarget) elTarget.scrollIntoView({ block: 'start' });
            }
          },
          onkeydown: function (e) { if (e.key === 'Enter') e.currentTarget.click(); }
        });
        item.appendChild(el('div', { class: 'search-result-type' }, m.type));
        const txtSpan = el('div', { class: 'search-result-text' });
        const text = m.text || '';
        const idx = text.toLowerCase().indexOf(lq);
        if (idx >= 0) {
          txtSpan.appendChild(document.createTextNode(text.slice(0, idx)));
          const mark = el('mark', null, text.slice(idx, idx + q.length));
          txtSpan.appendChild(mark);
          txtSpan.appendChild(document.createTextNode(text.slice(idx + q.length)));
        } else {
          txtSpan.textContent = text;
        }
        item.appendChild(txtSpan);
        results.appendChild(item);
      });
    }
    input.addEventListener('input', function (e) { search(e.target.value); });
    search('');
    return wrap;
  });
}

function runChecks() {
  const issues = [];
  if (!State.doc.title) {
    issues.push({ severity: 'warn', title: 'Chybí název příběhu', message: 'Doporučujeme vyplnit název v titulní kartě.' });
  }
  let lastLevel = 0;
  State.doc.chapters.forEach(function (ch) {
    ch.cards.forEach(function (card) {
      if (card.type === 'image' && !card.alt && !card.caption) {
        issues.push({ severity: 'warn', title: 'Obrázek bez popisu', message: 'Obrázek nemá alternativní text ani titulek (zhoršuje přístupnost).', cardId: card.id });
      }
      if (card.type === 'link' && !card.title && !card.description) {
        issues.push({ severity: 'warn', title: 'Odkaz bez popisu', message: 'Odkaz má jen URL, doplňte titulek nebo popisek.', cardId: card.id });
      }
      if (card.type === 'heading') {
        if (lastLevel > 0 && card.level > lastLevel + 1) {
          issues.push({ severity: 'warn', title: 'Přeskočená úroveň nadpisu', message: 'Z úrovně ' + lastLevel + ' jste skočil na ' + card.level + '. To zhoršuje navigaci se screen readerem.', cardId: card.id });
        }
        lastLevel = card.level;
      }
      if (card.type === 'video' && !card.url) {
        issues.push({ severity: 'error', title: 'Video bez URL', message: 'Karta videa nemá vyplněnou URL.', cardId: card.id });
      }
    });
  });
  return issues;
}

let activePlayer = null;
function openPlayer() {
  closePlayer();
  const host = document.getElementById('player-host');
  const player = el('div', { class: 'player-host', tabindex: '-1' });

  const modeSwitch = el('div', { class: 'player-mode-switch', role: 'tablist', 'aria-label': 'Přepínač rozvržení' });
  ['vertical', 'horizontal', 'slides'].forEach(function (m) {
    const labels = { vertical: 'Vertikální', horizontal: 'Horizontální', slides: 'Slidy' };
    const b = el('button', {
      class: State.doc.layout === m ? 'active' : '',
      role: 'tab',
      onclick: function () {
        State.doc.layout = m;
        saveAutosaveDebounced();
        openPlayer();
      }
    }, labels[m]);
    modeSwitch.appendChild(b);
  });

  const closeBtn = el('button', {
    class: 'player-close', 'aria-label': 'Zavřít přehrávač',
    onclick: closePlayer
  }, '\u2716 Zavřít');

  const story = renderStoryByLayout(State.doc);
  story.style.height = '100vh';
  if (State.doc.layout === 'vertical') story.style.overflowY = 'auto';

  player.appendChild(modeSwitch);
  player.appendChild(closeBtn);
  player.appendChild(story);
  host.appendChild(player);

  const escHandler = function (e) {
    if (e.key === 'Escape') closePlayer();
  };
  document.addEventListener('keydown', escHandler);

  activePlayer = function () {
    document.removeEventListener('keydown', escHandler);
    if (host.contains(player)) host.removeChild(player);
    activePlayer = null;
  };

  setTimeout(function () { story.focus && story.focus(); }, 50);
}
function closePlayer() {
  if (activePlayer) activePlayer();
}

function downloadJson() {
  State.doc.modifiedAt = new Date().toISOString();
  const json = JSON.stringify(State.doc, null, 2);
  const blob = new Blob([json], { type: 'application/json;charset=utf-8' });
  const a = document.createElement('a');
  const fname = (State.doc.title || 'pribeh').replace(/[^a-zA-Z0-9_\-\u00C0-\u017F]+/g, '-').toLowerCase() + '.json';
  a.href = URL.createObjectURL(blob);
  a.download = fname;
  a.click();
  setTimeout(function () { URL.revokeObjectURL(a.href); }, 1000);
  toast('JSON stažen jako ' + fname, 'success');
}

function collectStylesheet() {
  // Whitelist přístup – do exportu pouštíme jen pravidla, která něco vykreslují v příběhu
  const ALLOW_PREFIXES = [
    '*', ':root', 'html', 'body', 'button', 'input', 'textarea', 'select', 'img', ':focus-visible', '.sr-only',
    '.story', '.export-', 'kbd', '@keyframes', '@media', '@supports', '@font-face'
  ];
  let css = '';
  for (const sheet of document.styleSheets) {
    try {
      if (!sheet.cssRules) continue;
      for (const rule of sheet.cssRules) {
        const text = rule.cssText;
        // @keyframes, @media, @font-face vždy
        if (text.indexOf('@') === 0) {
          // @media – obal v něm musí ale neobsahovat editor-only selektory; jen zachytíme print a width queries
          if (text.indexOf('@media print') >= 0 || text.indexOf('@keyframes') >= 0 || text.indexOf('@font-face') >= 0) {
            css += text + '\n'; continue;
          }
          if (text.indexOf('@media') === 0) {
            // ponecháme, většinou story-related responzivita
            css += text + '\n'; continue;
          }
          continue;
        }
        const selectorPart = text.split('{')[0].trim();
        // Multi-selector: pravidlo zahrnujeme, pokud aspoň jeden ze selektorů začíná na povolený prefix nebo obsahuje .story
        const selectors = selectorPart.split(',').map(function (s) { return s.trim(); });
        const wanted = selectors.some(function (s) {
          if (/^\.story\b/.test(s) || /^\.story-/.test(s)) return true;
          if (/^\.export-/.test(s)) return true;
          if (/^body\b/.test(s) || /^html\b/.test(s)) return true;
          if (/^\*[,.\s{:]/.test(s) || s === '*' || /^\*::/.test(s)) return true;
          if (/^:focus-visible/.test(s)) return true;
          if (/^\.sr-only/.test(s)) return true;
          if (s === 'kbd') return true;
          if (/^:root\b/.test(s)) return true;
          if (/^img\b/.test(s)) return true;
          return false;
        });
        if (wanted) css += text + '\n';
      }
    } catch (e) { /* CORS */ }
  }
  return css;
}

/* ----------------------------------------------------------------------
   16) EXPORT DO MARKDOWN
   ---------------------------------------------------------------------- */
function exportMarkdown() {
  const lines = [];
  lines.push('# ' + (State.doc.title || ''));
  if (State.doc.subtitle) lines.push('\n> ' + State.doc.subtitle);
  lines.push('');
  State.doc.chapters.forEach(function (ch) {
    if (ch.title) lines.push('\n## ' + ch.title + '\n');
    ch.cards.forEach(function (card) {
      lines.push(cardToMarkdown(card));
      lines.push('');
    });
  });
  const md = lines.join('\n');
  const blob = new Blob([md], { type: 'text/markdown;charset=utf-8' });
  const a = document.createElement('a');
  const fname = (State.doc.title || 'pribeh').replace(/[^a-zA-Z0-9_\-\u00C0-\u017F]+/g, '-').toLowerCase() + '.md';
  a.href = URL.createObjectURL(blob);
  a.download = fname;
  a.click();
  setTimeout(function () { URL.revokeObjectURL(a.href); }, 1000);
  toast('Markdown exportován', 'success');
}

function cardToMarkdown(card) {
  switch (card.type) {
    case 'heading':
      return '#'.repeat((card.level || 1) + 1) + ' ' + (card.text || '');
    case 'text':
      return card.text || '';
    case 'bullet':
      return (card.items || []).map(function (i) { return '- ' + i; }).join('\n');
    case 'numbered':
      return (card.items || []).map(function (i, idx) { return (idx + 1) + '. ' + i; }).join('\n');
    case 'image':
      return '![' + (card.alt || '') + '](' + (card.src || '') + ')' + (card.caption ? '\n*' + card.caption + '*' : '');
    case 'video':
      return '🎬 [Video' + (card.caption ? ': ' + card.caption : '') + '](' + (card.url || '') + ')';
    case 'audio':
      return '🔊 [Audio' + (card.caption ? ': ' + card.caption : '') + '](' + (card.url || '') + ')';
    case 'link':
      return '🔗 [' + (card.title || card.url || '') + '](' + (card.url || '') + ')' + (card.description ? '\n' + card.description : '');
    case 'document':
      return '📄 [' + (card.title || 'Dokument') + '](' + (card.url || '') + ')' + (card.description ? '\n' + card.description : '');
    case 'quote':
      return '> ' + (card.text || '').replace(/\n/g, '\n> ') + (card.author ? '\n> — ' + card.author + (card.source ? ', ' + card.source : '') : '');
    case 'stat':
      return '**' + (card.number || '') + (card.unit || '') + '** — ' + (card.label || '');
    case 'code':
      return '```' + (card.language || '') + '\n' + (card.code || '') + '\n```' + (card.caption ? '\n*' + card.caption + '*' : '');
    case 'callout': {
      const labels = { tip: 'TIP', info: 'INFO', warn: 'POZOR', example: 'PŘÍKLAD' };
      return '> **' + (labels[card.kind] || 'TIP') + (card.title ? ': ' + card.title : '') + '**\n> ' + (card.text || '').replace(/\n/g, '\n> ');
    }
    case 'twocol':
      return '**Levý sloupec:**\n' + (card.left || '') + '\n\n**Pravý sloupec:**\n' + (card.right || '');
    case 'divider':
      return '\n---\n\n## ' + (card.number ? card.number + ' — ' : '') + (card.title || '') + (card.subtitle ? '\n\n*' + card.subtitle + '*' : '');
    case 'table': {
      const lines = [];
      lines.push('| ' + (card.headers || []).join(' | ') + ' |');
      lines.push('| ' + (card.headers || []).map(function () { return '---'; }).join(' | ') + ' |');
      (card.rows || []).forEach(function (r) {
        lines.push('| ' + r.join(' | ') + ' |');
      });
      return lines.join('\n');
    }
    case 'timeline':
      return (card.items || []).map(function (it) {
        return '- **' + (it.date || '') + '** — ' + (it.title || '') + (it.text ? '\n  ' + it.text : '');
      }).join('\n');
    case 'embed':
      return '> Vložený obsah' + (card.caption ? ': ' + card.caption : '');
    case 'gallery':
    case 'slideshow':
    case 'comparison':
      return (card.images || []).map(function (i) {
        return '![' + (i.alt || '') + '](' + (i.src || '') + ')';
      }).join('\n');
  }
  return '';
}

/* ----------------------------------------------------------------------
   17) GLOBÁLNÍ KLÁVESOVÉ ZKRATKY
   ---------------------------------------------------------------------- */
function setupKeyboard() {
  document.addEventListener('keydown', function (e) {
    // Pokud je focus v inputu/textarea, většinu zkratek nevyvolávejte
    const inField = /^(INPUT|TEXTAREA|SELECT)$/.test(document.activeElement.tagName);

    // F1 nebo ?
    if (e.key === 'F1' || (e.key === '?' && !inField)) {
      e.preventDefault();
      openHelpDialog();
      return;
    }
    if (e.key === 'F5') {
      e.preventDefault();
      openPlayer();
      return;
    }
    if (e.ctrlKey || e.metaKey) {
      if (e.key === 's' || e.key === 'S') {
        e.preventDefault();
        downloadJson();
      } else if (e.key === 'p' || e.key === 'P') {
        e.preventDefault();
        openPlayer();
      } else if (e.key === 'f' || e.key === 'F') {
        e.preventDefault();
        openSearchDialog();
      } else if (e.key === 'k' || e.key === 'K') {
        e.preventDefault();
        saveSnapshot(null);
      }
    }
  });
}

/* ----------------------------------------------------------------------
   18) INICIALIZACE
   ---------------------------------------------------------------------- */
function init() {
  const saved = loadAutosave();
  if (saved && saved.chapters && saved.chapters.length) {
    State.doc = saved;
  } else {
    State.doc = createBlankDoc();
  }
  document.title = (State.doc.title || 'MRAI') + ' \u2014 MRAI';
  renderApp();
  setupKeyboard();
  announce('Aplikace připravena');
}

document.addEventListener('DOMContentLoaded', init);

</script>
