function buildHeroSection(doc, mode) {
  const hero = el('section', { class: 'story-hero' + (doc.background ? ' has-bg' : ''), 'aria-labelledby': 'story-title' });
  if (doc.background) {
    const bg = el('div', { class: 'story-hero-bg' });
    bg.appendChild(el('img', { src: doc.background, alt: '' }));
    hero.appendChild(bg);
  }
  const inner = el('div', { class: 'story-hero-content' });
  if (doc.eyebrow) inner.appendChild(el('span', { class: 'story-hero-eyebrow' }, doc.eyebrow));
  inner.appendChild(el('h1', { id: 'story-title' }, doc.title || ''));
  if (doc.subtitle) inner.appendChild(el('p', { class: 'story-hero-subtitle' }, doc.subtitle));
  hero.appendChild(inner);
  return hero;
}

function renderStoryVertical(doc) {
  const root = el('article', {
    class: 'story story-vertical theme-' + doc.theme + ' palette-' + doc.palette + ' size-' + (doc.fontSize || 'normal') + ' density-' + (doc.density || 'normal'),
    lang: 'cs'
  });
  const progress = el('div', { class: 'story-progress', style: { width: '0%' } });
  root.appendChild(progress);
  root.appendChild(buildHeroSection(doc, 'vertical'));

  let globalIdx = 0;
  doc.chapters.forEach(function (ch, ci) {
    const chSection = el('section', {
      class: 'story-chapter',
      'aria-label': 'Kapitola: ' + (ch.title || '(bez názvu)')
    });
    if (ch.title) {
      const sec = el('section', { class: 'story-section reveal' });
      const inner = el('div', { class: 'story-section-inner' });
      const h = el('h2');
      h.textContent = ch.title;
      inner.appendChild(h);
      sec.appendChild(inner);
      chSection.appendChild(sec);
    }
    ch.cards.forEach(function (card) {
      globalIdx++;
      const cardLabel = 'Karta ' + globalIdx;
      const cardArticle = el('article', {
        class: 'story-card-article',
        'data-card-id': card.id
      });
      const cardMain = el('main', {
        class: 'story-section reveal',
        'aria-label': cardLabel
      });
      const inner = el('div', { class: 'story-section-inner' });
      inner.appendChild(renderCardForStory(card, 'vertical'));
      cardMain.appendChild(inner);
      cardArticle.appendChild(cardMain);
      chSection.appendChild(cardArticle);
    });
    root.appendChild(chSection);
  });

  // Reveal-on-scroll
  setTimeout(function () {
    const reveals = root.querySelectorAll('.reveal');
    if ('IntersectionObserver' in window) {
      const io = new IntersectionObserver(function (entries) {
        entries.forEach(function (e) {
          if (e.isIntersecting) e.target.classList.add('in');
        });
      }, { threshold: 0.15 });
      reveals.forEach(function (r) { io.observe(r); });
    } else {
      reveals.forEach(function (r) { r.classList.add('in'); });
    }
  }, 50);

  // Progress
  const updateProgress = function () {
    const max = root.scrollHeight - root.clientHeight;
    if (max <= 0) return;
    progress.style.width = (root.scrollTop / max * 100) + '%';
  };
  root.addEventListener('scroll', updateProgress);

  setTimeout(function () { activateSlideshows(root); }, 50);
  return root;
}

function renderStoryHorizontal(doc) {
  const root = el('article', {
    class: 'story story-horizontal theme-' + doc.theme + ' palette-' + doc.palette + ' size-' + (doc.fontSize || 'normal'),
    lang: 'cs', tabindex: '0'
  });
  const screens = [];
  // Hero
  const heroScr = el('section', { class: 'story-screen is-hero', 'aria-label': 'Titulní obrazovka' });
  const heroInner = el('div', { class: 'story-screen-inner' });
  if (doc.eyebrow) heroInner.appendChild(el('span', { class: 'story-hero-eyebrow' }, doc.eyebrow));
  heroInner.appendChild(el('h1', null, doc.title || ''));
  if (doc.subtitle) heroInner.appendChild(el('p', { class: 'story-hero-subtitle' }, doc.subtitle));
  heroScr.appendChild(heroInner);
  root.appendChild(heroScr);
  screens.push(heroScr);

  let globalIdx = 0;
  doc.chapters.forEach(function (ch) {
    if (ch.title) {
      const scr = el('section', { class: 'story-screen is-divider', 'aria-label': 'Kapitola: ' + ch.title });
      const inner = el('div', { class: 'story-screen-inner' });
      inner.appendChild(el('h2', { class: 'story-divider-title' }, ch.title));
      scr.appendChild(inner);
      root.appendChild(scr);
      screens.push(scr);
    }
    ch.cards.forEach(function (card) {
      globalIdx++;
      const isDivider = card.type === 'divider';
      const cardLabel = 'Karta ' + globalIdx;
      const cardArt = el('article', {
        class: 'story-screen story-card-article' + (isDivider ? ' is-divider' : ''),
        'data-card-id': card.id
      });
      const cardMain = el('main', { class: 'story-screen-inner', 'aria-label': cardLabel });
      cardMain.appendChild(renderCardForStory(card, 'horizontal'));
      cardArt.appendChild(cardMain);
      root.appendChild(cardArt);
      screens.push(cardArt);
    });
  });

  // Šipky a tečky
  const arrows = el('div', { class: 'story-arrows' });
  const aPrev = el('button', { class: 'story-arrow', 'aria-label': 'Předchozí obrazovka' }, '\u2190');
  const aNext = el('button', { class: 'story-arrow', 'aria-label': 'Další obrazovka' }, '\u2192');
  arrows.appendChild(aPrev); arrows.appendChild(aNext);
  root.appendChild(arrows);

  const dots = el('div', { class: 'story-dots' });
  screens.forEach(function (s, i) {
    dots.appendChild(el('button', {
      class: 'story-dot' + (i === 0 ? ' active' : ''),
      'aria-label': 'Skok na obrazovku ' + (i + 1),
      'data-idx': String(i)
    }));
  });
  root.appendChild(dots);

  let currentIdx = 0;
  const goTo = function (i) {
    if (i < 0 || i >= screens.length) return;
    currentIdx = i;
    screens[i].scrollIntoView({ behavior: 'smooth', inline: 'start' });
    dots.querySelectorAll('.story-dot').forEach(function (d, j) {
      d.classList.toggle('active', i === j);
    });
  };
  aPrev.addEventListener('click', function () { goTo(currentIdx - 1); });
  aNext.addEventListener('click', function () { goTo(currentIdx + 1); });
  dots.querySelectorAll('.story-dot').forEach(function (d) {
    d.addEventListener('click', function () {
      goTo(parseInt(d.getAttribute('data-idx'), 10));
    });
  });
  root.addEventListener('keydown', function (ev) {
    if (ev.key === 'ArrowRight' || ev.key === 'PageDown' || ev.key === ' ') { ev.preventDefault(); goTo(currentIdx + 1); }
    else if (ev.key === 'ArrowLeft' || ev.key === 'PageUp') { ev.preventDefault(); goTo(currentIdx - 1); }
    else if (ev.key === 'Home') { ev.preventDefault(); goTo(0); }
    else if (ev.key === 'End') { ev.preventDefault(); goTo(screens.length - 1); }
  });

  setTimeout(function () { activateSlideshows(root); root.focus(); }, 50);
  return root;
}

function renderStorySlides(doc) {
  const root = el('article', {
    class: 'story story-slides theme-' + doc.theme + ' palette-' + doc.palette + ' size-' + (doc.fontSize || 'normal'),
    lang: 'cs', tabindex: '0'
  });
  const slides = [];
  // Hero slide
  const hero = el('section', { class: 'story-slide is-hero active' });
  const heroIn = el('div', { class: 'story-slide-inner' });
  if (doc.eyebrow) heroIn.appendChild(el('span', { class: 'story-hero-eyebrow' }, doc.eyebrow));
  heroIn.appendChild(el('h1', null, doc.title || ''));
  if (doc.subtitle) heroIn.appendChild(el('p', { class: 'story-hero-subtitle' }, doc.subtitle));
  hero.appendChild(heroIn);
  root.appendChild(hero);
  slides.push({ el: hero, title: doc.title, type: 'hero' });

  let globalIdx = 0;
  doc.chapters.forEach(function (ch) {
    if (ch.title) {
      const sl = el('section', { class: 'story-slide is-divider', 'aria-label': 'Kapitola: ' + ch.title });
      const inner = el('div', { class: 'story-slide-inner' });
      inner.appendChild(el('h2', { class: 'story-divider-title' }, ch.title));
      sl.appendChild(inner);
      root.appendChild(sl);
      slides.push({ el: sl, title: ch.title, type: 'chapter' });
    }
    ch.cards.forEach(function (card) {
      globalIdx++;
      const cardLabel = 'Karta ' + globalIdx;
      const isDivider = card.type === 'divider';
      const sl = el('article', {
        class: 'story-slide story-card-article' + (isDivider ? ' is-divider' : ''),
        'data-card-id': card.id
      });
      const slMain = el('main', { class: 'story-slide-inner', 'aria-label': cardLabel });
      slMain.appendChild(renderCardForStory(card, 'slides'));
      sl.appendChild(slMain);
      root.appendChild(sl);
      const summary = (CardTypes[card.type].summary(card) || CardTypes[card.type].label).slice(0, 80);
      slides.push({ el: sl, title: summary, type: card.type });
    });
  });

  // Ovladače
  const ctrls = el('div', { class: 'slide-controls' });
  const cPrev = el('button', { 'aria-label': 'Předchozí slide' }, '\u2039');
  const counter = el('span', { class: 'slide-counter' }, '1 / ' + slides.length);
  const cNext = el('button', { 'aria-label': 'Další slide' }, '\u203A');
  const cOver = el('button', { 'aria-label': 'Přehled slidů' }, '\u25A6');
  ctrls.appendChild(cPrev); ctrls.appendChild(counter); ctrls.appendChild(cNext); ctrls.appendChild(cOver);
  root.appendChild(ctrls);

  // Meta v rohu
  const meta = el('div', { class: 'slide-meta' }, '');
  root.appendChild(meta);

  // Přehled slidů
  const overview = el('div', { class: 'slide-overview' });
  overview.appendChild(el('h2', null, 'Přehled slidů'));
  const grid = el('div', { class: 'slide-overview-grid' });
  slides.forEach(function (s, i) {
    const tb = el('button', { class: 'slide-thumb', 'data-idx': String(i) });
    tb.appendChild(el('div', { class: 'slide-thumb-num' }, 'Slide ' + (i + 1)));
    tb.appendChild(el('div', { class: 'slide-thumb-title' }, s.title || '(bez názvu)'));
    tb.appendChild(el('div', { class: 'slide-thumb-preview' }, s.type));
    grid.appendChild(tb);
  });
  overview.appendChild(grid);
  root.appendChild(overview);

  // Černá / bílá obrazovka
  const blank = el('div', { class: 'blank-overlay' });
  root.appendChild(blank);

  let current = 0;
  const goTo = function (i) {
    if (i < 0 || i >= slides.length) return;
    slides[current].el.classList.remove('active');
    current = i;
    slides[current].el.classList.add('active');
    counter.textContent = (i + 1) + ' / ' + slides.length;
    meta.textContent = slides[i].title || '';
    // Nastavit barvu meta podle typu slidu
    if (slides[i].type === 'hero' || slides[i].type === 'chapter' || slides[i].el.classList.contains('is-divider')) {
      meta.classList.add('slide-meta-dark');
    } else {
      meta.classList.remove('slide-meta-dark');
    }
  };
  cPrev.addEventListener('click', function () { goTo(current - 1); });
  cNext.addEventListener('click', function () { goTo(current + 1); });
  cOver.addEventListener('click', function () { overview.classList.toggle('open'); });
  grid.querySelectorAll('.slide-thumb').forEach(function (tb) {
    tb.addEventListener('click', function () {
      goTo(parseInt(tb.getAttribute('data-idx'), 10));
      overview.classList.remove('open');
    });
  });

  root.addEventListener('keydown', function (ev) {
    if (overview.classList.contains('open')) {
      if (ev.key === 'Escape') { overview.classList.remove('open'); }
      return;
    }
    if (ev.key === 'ArrowRight' || ev.key === 'PageDown' || ev.key === ' ' || ev.key === 'Enter') {
      ev.preventDefault(); goTo(current + 1);
    } else if (ev.key === 'ArrowLeft' || ev.key === 'PageUp') {
      ev.preventDefault(); goTo(current - 1);
    } else if (ev.key === 'Home') { ev.preventDefault(); goTo(0); }
    else if (ev.key === 'End') { ev.preventDefault(); goTo(slides.length - 1); }
    else if (ev.key === 'b' || ev.key === 'B') {
      blank.classList.toggle('black');
      if (blank.classList.contains('white')) blank.classList.remove('white');
    } else if (ev.key === 'w' || ev.key === 'W') {
      blank.classList.toggle('white');
      if (blank.classList.contains('black')) blank.classList.remove('black');
    } else if (ev.key === 'o' || ev.key === 'O') {
      overview.classList.toggle('open');
    } else if (/^[0-9]$/.test(ev.key)) {
      const n = parseInt(ev.key, 10);
      if (n === 0) goTo(slides.length - 1);
      else goTo(n - 1);
    }
  });

  setTimeout(function () {
    activateSlideshows(root);
    meta.textContent = slides[0].title || '';
    if (slides[0].type === 'hero') meta.classList.add('slide-meta-dark');
    root.focus();
  }, 50);
  return root;
}

function buildExportDropdown() {
  const wrap = el('div', { class: 'dropdown-host' });
  const btn = el('button', {
    class: 'btn', 'aria-haspopup': 'true', 'aria-expanded': 'false',
    title: 'Možnosti exportu'
  }, 'Export \u25BE');
  const menu = el('div', {
    class: 'dropdown-menu',
    role: 'menu',
    style: { display: 'none' }
  });

  const closeMenu = function () {
    menu.style.display = 'none';
    btn.setAttribute('aria-expanded', 'false');
    document.removeEventListener('click', outsideHandler);
  };
  const outsideHandler = function (e) {
    if (!wrap.contains(e.target)) closeMenu();
  };
  const openMenu = function () {
    menu.style.display = 'block';
    btn.setAttribute('aria-expanded', 'true');
    setTimeout(function () { document.addEventListener('click', outsideHandler); }, 0);
    // Focus na první položku
    const first = menu.querySelector('button');
    if (first) first.focus();
  };

  const addItem = function (label, hint, onClick) {
    const item = el('button', {
      role: 'menuitem',
      onclick: function () { closeMenu(); onClick(); }
    });
    item.appendChild(document.createTextNode(label));
    if (hint) item.appendChild(el('span', { class: 'menu-hint' }, hint));
    menu.appendChild(item);
  };

  addItem('Export do HTML promítání', 'Samostatný soubor s plnohodnotným přehrávačem', function () { exportHtmlPlayable(); });
  addItem('Export do HTML statický', 'Sémantické HTML bez JavaScriptu, vhodné pro tisk a archiv', function () { exportHtmlStatic(); });
  menu.appendChild(el('hr'));
  addItem('Export do Markdown', 'Textová verze v .md', function () { exportMarkdown(); });
  addItem('Export do DOCX', 'Microsoft Word dokument', function () { exportDocx(); });

  btn.addEventListener('click', function (e) {
    e.stopPropagation();
    if (menu.style.display === 'none') openMenu();
    else closeMenu();
  });
  // Esc zavře menu
  menu.addEventListener('keydown', function (e) {
    if (e.key === 'Escape') { closeMenu(); btn.focus(); }
  });

  wrap.appendChild(btn);
  wrap.appendChild(menu);
  return wrap;
}

function renderStatusbar() {
  const stats = computeStats();
  const bar = el('footer', { class: 'statusbar', role: 'contentinfo' });
  const block = el('div', { class: 'stats-block' });
  block.appendChild(el('span', null, [el('strong', null, String(stats.cards)), ' karet']));
  block.appendChild(el('span', null, [el('strong', null, String(stats.chapters)), ' kapitol']));
  block.appendChild(el('span', null, [el('strong', null, String(stats.words)), ' slov']));
  block.appendChild(el('span', null, [el('strong', null, String(stats.images)), ' obrázků']));
  block.appendChild(el('span', null, ['Doba čtení: ', el('strong', null, stats.readingMin + ' min')]));
  bar.appendChild(block);
  bar.appendChild(el('div', { class: 'spacer' }));
  bar.appendChild(el('span', null, 'Uloženo: ' + new Date(State.doc.modifiedAt).toLocaleString('cs-CZ')));
  return bar;
}

function computeStats() {
  let cards = 0, words = 0, images = 0;
  State.doc.chapters.forEach(function (ch) {
    cards += ch.cards.length;
    ch.cards.forEach(function (c) {
      if (c.type === 'image') images++;
      if (c.type === 'gallery' || c.type === 'comparison' || c.type === 'slideshow') {
        images += (c.images || []).length;
      }
      const text = collectCardText(c);
      words += (text.match(/\S+/g) || []).length;
    });
  });
  // Plus titul
  if (State.doc.title) words += (State.doc.title.match(/\S+/g) || []).length;
  if (State.doc.subtitle) words += (State.doc.subtitle.match(/\S+/g) || []).length;
  return {
    cards: cards,
    chapters: State.doc.chapters.length,
    words: words,
    images: images,
    readingMin: Math.max(1, Math.round(words / 200))
  };
}

function collectCardText(c) {
  const parts = [];
  if (c.text) parts.push(c.text);
  if (c.title) parts.push(c.title);
  if (c.subtitle) parts.push(c.subtitle);
  if (c.caption) parts.push(c.caption);
  if (c.description) parts.push(c.description);
  if (c.left) parts.push(c.left);
  if (c.right) parts.push(c.right);
  if (c.label) parts.push(c.label);
  if (c.author) parts.push(c.author);
  if (c.code) parts.push(c.code);
  if (Array.isArray(c.items) && c.items.length) {
    if (typeof c.items[0] === 'string') parts.push(c.items.join(' '));
    else c.items.forEach(function (it) {
      if (it.title) parts.push(it.title); if (it.text) parts.push(it.text);
    });
  }
  if (c.headers) parts.push(c.headers.join(' '));
  if (c.rows) c.rows.forEach(function (r) { parts.push(r.join(' ')); });
  return parts.join(' ');
}

            cardEl.scrollIntoView({ block: 'center', behavior: 'smooth' });

      cardsList.appendChild(item);
    });
    chBlock.appendChild(cardsList);
    list.appendChild(chBlock);
  });

  aside.appendChild(list);
  return aside;
}

/* EDITOR – KARTY                                                          */

function renderEditorArea() {
  const main = el('main', { class: 'editor', id: 'editor-area', role: 'main' });
  const inner = el('div', { class: 'editor-inner' });

  inner.appendChild(renderTitleCardEditor());

  let globalCardIdx = 0;
  State.doc.chapters.forEach(function (ch) {
    const block = renderChapterBlock(ch, globalCardIdx);
    globalCardIdx += ch.cards.length;
    inner.appendChild(block);
  });

  inner.appendChild(el('button', {
    class: 'btn add-chapter-btn',
    onclick: function () { addChapter(); }
  }, '+ Přidat kapitolu'));

  main.appendChild(inner);
  return main;
}

function renderTitleCardEditor() {
  const card = el('section', {
    class: 'card' + (State.ui.focusedCardId === '__title__' ? ' focused' : ''),
    id: 'title-card', 'aria-label': 'Titulní karta'
  });
  const head = el('div', { class: 'card-head' });
  head.appendChild(el('span', { class: 'card-type-label' }, 'Titulní karta'));
  card.appendChild(head);

  const body = el('div', { class: 'card-body' });

  body.appendChild(el('label', { for: 'doc-eyebrow' }, 'Štítek nad titulem (volitelné)'));
  body.appendChild(el('input', {
    type: 'text', id: 'doc-eyebrow', value: State.doc.eyebrow || '',
    placeholder: 'Např. Kapitola I nebo Zpráva 2026',
    oninput: function (e) { State.doc.eyebrow = e.target.value; saveAutosaveDebounced(); }
  }));

  body.appendChild(el('label', { for: 'doc-title' }, 'Název příběhu'));
  body.appendChild(el('input', {
    type: 'text', id: 'doc-title', value: State.doc.title || '',
    oninput: function (e) {
      State.doc.title = e.target.value;
      saveAutosaveDebounced();
      renderOutlineOnly();
      document.title = (e.target.value || 'MRAI') + ' \u2014 MRAI';
    }
  }));

  body.appendChild(el('label', { for: 'doc-subtitle' }, 'Podtitul (volitelné)'));
  const subTa = el('textarea', {
    id: 'doc-subtitle', rows: '2',
    oninput: function (e) { State.doc.subtitle = e.target.value; saveAutosaveDebounced(); }
  });
  subTa.value = State.doc.subtitle || '';
  body.appendChild(subTa);

  body.appendChild(el('label', null, 'Obrázek na pozadí (URL nebo nahrání)'));
  const bgRow = el('div', { class: 'list-item-row' });
  const bgInput = el('input', {
    type: 'url', placeholder: 'https://...', value: State.doc.background || '',
    oninput: function (e) { State.doc.background = e.target.value || null; saveAutosaveDebounced(); }
  });
  bgRow.appendChild(bgInput);
  bgRow.appendChild(el('button', {
    class: 'btn',
    onclick: function () {
      pickImageFile(function (dataUrl) {
        State.doc.background = dataUrl;
        saveAutosaveDebounced();
        renderEditor();
      });
    }
  }, 'Nahrát'));
  if (State.doc.background) {
    bgRow.appendChild(el('button', {
      class: 'btn danger',
      onclick: function () { State.doc.background = null; saveAutosaveDebounced(); renderEditor(); }
    }, 'Odebrat'));
  }
  body.appendChild(bgRow);

  if (State.doc.background) {
    body.appendChild(el('img', {
      src: State.doc.background, alt: '',
      style: { maxHeight: '120px', marginTop: '0.5rem', borderRadius: '4px' }
    }));
  }

  card.appendChild(body);

  return card;
}

function renderChapterBlock(ch, baseCardIdx) {
  baseCardIdx = baseCardIdx || 0;
  const block = el('section', { class: 'chapter-block', id: 'chapter-' + ch.id, 'aria-label': 'Kapitola ' + (ch.title || '(bez názvu)') });
  const header = el('div', { class: 'chapter-header' });
  const titleInput = el('input', {
    type: 'text', class: 'chapter-header-input',
    placeholder: 'Název kapitoly (prázdné = v náhledu se nezobrazí)',
    value: ch.title || '',
    'aria-label': 'Název kapitoly',
    oninput: function (e) { ch.title = e.target.value; saveAutosaveDebounced(); renderOutlineOnly(); }
  });
  header.appendChild(titleInput);
  const acts = el('div', { class: 'chapter-actions' });
  acts.appendChild(el('button', {
    class: 'btn', 'aria-label': 'Posunout kapitolu nahoru',
    onclick: function () { moveChapter(ch.id, 'up'); }
  }, '\u2191'));
  acts.appendChild(el('button', {
    class: 'btn', 'aria-label': 'Posunout kapitolu dolů',
    onclick: function () { moveChapter(ch.id, 'down'); }
  }, '\u2193'));
  acts.appendChild(el('button', {
    class: 'btn danger', 'aria-label': 'Smazat kapitolu',
    onclick: function () {
      if (confirm('Opravdu smazat kapitolu i s kartami?')) deleteChapter(ch.id);
    }
  }, '\u2716'));
  header.appendChild(acts);
  block.appendChild(header);

  ch.cards.forEach(function (card, idx) {
    block.appendChild(renderAddCardRow(ch.id, idx === 0 ? null : ch.cards[idx - 1].id));
    block.appendChild(renderCardEditor(ch, card, baseCardIdx + idx + 1));
  });

  block.appendChild(renderAddCardRow(ch.id, ch.cards.length ? ch.cards[ch.cards.length - 1].id : null));

  return block;
}

function renderAddCardRow(chapterId, afterCardId) {
  const row = el('div', { class: 'add-card-row' });
  const btn = el('button', {
    class: 'add-card-btn', 'aria-label': 'Přidat kartu na tuto pozici',
    onclick: function () { showCardTypePicker(chapterId, afterCardId); }
  }, '+ přidat kartu');
  row.appendChild(btn);
  return row;
}

function showCardTypePicker(chapterId, afterCardId) {
  openModal('Vyberte typ karty', function () {
    const body = el('div');
    CardCategories.forEach(function (cat) {
      body.appendChild(el('h3', {
        style: { fontSize: '0.85rem', textTransform: 'uppercase', letterSpacing: '0.06em', margin: '1rem 0 0.5rem', color: 'var(--app-fg-mute)' }
      }, cat.name));
      const grid = el('div', {
        style: { display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(160px, 1fr))', gap: '0.5rem' }
      });
      cat.types.forEach(function (t) {
        grid.appendChild(el('button', {
          class: 'btn',
          style: { textAlign: 'left', padding: '0.6rem 0.75rem' },
          onclick: function () {
            addCard(chapterId, t, afterCardId);
            closeModal();
          }
        }, CardTypes[t].label));
      });
      body.appendChild(grid);
    });
    return body;
  });
}

function renderCardEditor(ch, card, cardIndex) {
  const wrap = el('article', {
    class: 'card card-article' + (State.ui.focusedCardId === card.id ? ' focused' : ''),
    id: 'card-' + card.id,
    'aria-labelledby': 'card-label-' + card.id
  });
  wrap.addEventListener('focusin', function () { State.ui.focusedCardId = card.id; });

  const head = el('div', { class: 'card-head' });
  const labelText = 'Karta ' + cardIndex + ' \u2013 ' + CardTypes[card.type].label;
  head.appendChild(el('span', { class: 'card-type-label', id: 'card-label-' + card.id }, labelText));
  const acts = el('div', { class: 'card-actions' });
  acts.appendChild(el('button', {
    class: 'btn', 'aria-label': 'Náhled karty', title: 'Náhled',
    onclick: function () { previewCard(card); }
  }, '\u25B6 Náhled'));
  acts.appendChild(el('button', {
    class: 'btn', 'aria-label': 'Posunout kartu nahoru', title: 'Nahoru',
    onclick: function () { moveCard(card.id, 'up'); }
  }, '\u2191'));
  acts.appendChild(el('button', {
    class: 'btn', 'aria-label': 'Posunout kartu dolů', title: 'Dolů',
    onclick: function () { moveCard(card.id, 'down'); }
  }, '\u2193'));
  acts.appendChild(el('button', {
    class: 'btn', 'aria-label': 'Změnit typ karty', title: 'Změnit typ',
    onclick: function () { showCardTypeChanger(card); }
  }, 'Typ'));
  acts.appendChild(el('button', {
    class: 'btn danger', 'aria-label': 'Smazat kartu', title: 'Smazat',
    onclick: function () {
      if (confirm('Smazat kartu?')) deleteCard(card.id);
    }
  }, '\u2716'));
  head.appendChild(acts);
  wrap.appendChild(head);

  // Vnořený <main> s aria-label podle požadavku
  const mainRegion = el('main', { class: 'card-main-region', 'aria-label': labelText });
  const body = el('div', { class: 'card-body' });
  buildCardEditFields(body, card);
  mainRegion.appendChild(body);
  wrap.appendChild(mainRegion);
  return wrap;
}

function showCardTypeChanger(card) {
  openModal('Změnit typ karty', function () {
    const body = el('div');
    CardCategories.forEach(function (cat) {
      body.appendChild(el('h3', {
        style: { fontSize: '0.85rem', textTransform: 'uppercase', letterSpacing: '0.06em', margin: '1rem 0 0.5rem', color: 'var(--app-fg-mute)' }
      }, cat.name));
      const grid = el('div', {
        style: { display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(160px, 1fr))', gap: '0.5rem' }
      });
      cat.types.forEach(function (t) {
        grid.appendChild(el('button', {
          class: 'btn' + (t === card.type ? ' primary' : ''),
          style: { textAlign: 'left' },
          onclick: function () {
            if (t !== card.type) {
              if (confirm('Změna typu karty může smazat některá pole. Pokračovat?')) {
                changeCardType(card.id, t);
                closeModal();
              }
            } else {
              closeModal();
            }
          }
        }, CardTypes[t].label));
      });
      body.appendChild(grid);
    });
    return body;
  });
}

function makeInput(opts, value, onChange) {
  const ipt = el(opts.tag || 'input', opts);
  ipt.value = value || '';
  ipt.addEventListener('input', function (e) { onChange(e.target.value); saveAutosaveDebounced(); });
  return ipt;
}

function buildCardEditFields(body, card) {
  switch (card.type) {
    case 'heading': {
      body.appendChild(el('label', null, 'Úroveň nadpisu'));
      const sel = el('select');
      [1, 2, 3].forEach(function (lvl) {
        const opt = el('option', { value: String(lvl) }, 'Úroveň ' + lvl);
        if (card.level === lvl) opt.selected = true;
        sel.appendChild(opt);
      });
      sel.addEventListener('change', function (e) {
        card.level = parseInt(e.target.value, 10); saveAutosaveDebounced(); renderOutlineOnly();
      });
      body.appendChild(sel);
      body.appendChild(el('label', null, 'Text nadpisu'));
      const ti = el('input', { type: 'text' });
      ti.value = card.text || '';
      ti.addEventListener('input', function (e) { card.text = e.target.value; saveAutosaveDebounced(); renderOutlineOnly(); });
      body.appendChild(ti);
      break;
    }
    case 'text': {
      body.appendChild(el('label', null, 'Text (Markdown: **tučně**, *kurzíva*, [text](url), `kód`)'));
      const ta = el('textarea', { rows: '6' });
      ta.value = card.text || '';
      ta.addEventListener('input', function (e) { card.text = e.target.value; saveAutosaveDebounced(); });
      body.appendChild(ta);
      body.appendChild(el('p', { class: 'field-hint' }, 'Prázdný řádek znamená nový odstavec. Pomlčka na začátku řádku tvoří odrážku.'));
      break;
    }
    case 'bullet':
    case 'numbered': {
      body.appendChild(el('label', null, card.type === 'bullet' ? 'Položky odrážkového seznamu' : 'Položky číslovaného seznamu'));
      const ta = el('textarea', { rows: '6', placeholder: 'Jeden řádek = jedna položka' });
      ta.value = (card.items || []).join('\n');
      ta.addEventListener('input', function (e) {
        // Zachováme pole položek, vstupem je textarea s řádky
        card.items = e.target.value.split(/\r?\n/);
        // Trim: pokud poslední je prázdný, ponecháme (uživatel ještě píše)
        saveAutosaveDebounced();
        renderOutlineOnly();
      });
      body.appendChild(ta);
      body.appendChild(el('p', { class: 'field-hint' }, 'Každý řádek je jedna položka. Markdown a CriticMarkup uvnitř položky fungují.'));
      break;
    }
    case 'image': {
      body.appendChild(el('label', null, 'URL obrázku nebo nahrání'));
      const row = el('div', { class: 'list-item-row' });
      const urlIpt = el('input', { type: 'url', placeholder: 'https://...' });
      urlIpt.value = card.src || '';
      urlIpt.addEventListener('input', function (e) {
        card.src = e.target.value; saveAutosaveDebounced();
        const img = body.querySelector('.image-preview');
        if (img) img.src = e.target.value;
      });
      row.appendChild(urlIpt);
      row.appendChild(el('button', {
        class: 'btn',
        onclick: function () {
          pickImageFile(function (d) {
            card.src = d; saveAutosaveDebounced(); renderEditor();
          });
        }
      }, 'Nahrát'));
      body.appendChild(row);
      if (card.src) {
        body.appendChild(el('img', {
          class: 'image-preview', src: card.src, alt: '',
          style: { maxHeight: '160px', marginTop: '0.5rem', borderRadius: '4px' }
        }));
      }
      body.appendChild(el('label', null, 'Alternativní text (volitelné, pro screen reader)'));
      const altIpt = el('input', { type: 'text' });
      altIpt.value = card.alt || '';
      altIpt.addEventListener('input', function (e) { card.alt = e.target.value; saveAutosaveDebounced(); });
      body.appendChild(altIpt);
      body.appendChild(el('label', null, 'Titulek pod obrázkem (volitelné)'));
      const capIpt = el('input', { type: 'text' });
      capIpt.value = card.caption || '';
      capIpt.addEventListener('input', function (e) { card.caption = e.target.value; saveAutosaveDebounced(); });
      body.appendChild(capIpt);
      break;
    }
    case 'video': {
      body.appendChild(el('label', null, 'URL videa (YouTube, Vimeo, MP4)'));
      const v = el('input', { type: 'url', placeholder: 'https://www.youtube.com/watch?v=...' });
      v.value = card.url || '';
      v.addEventListener('input', function (e) { card.url = e.target.value; saveAutosaveDebounced(); });
      body.appendChild(v);
      body.appendChild(el('label', null, 'Titulek (volitelné)'));
      const c = el('input', { type: 'text' });
      c.value = card.caption || '';
      c.addEventListener('input', function (e) { card.caption = e.target.value; saveAutosaveDebounced(); });
      body.appendChild(c);
      break;
    }
    case 'audio': {
      body.appendChild(el('label', null, 'URL audio souboru'));
      const a = el('input', { type: 'url' });
      a.value = card.url || '';
      a.addEventListener('input', function (e) { card.url = e.target.value; saveAutosaveDebounced(); });
      body.appendChild(a);
      body.appendChild(el('label', null, 'Titulek (volitelné)'));
      const c = el('input', { type: 'text' });
      c.value = card.caption || '';
      c.addEventListener('input', function (e) { card.caption = e.target.value; saveAutosaveDebounced(); });
      body.appendChild(c);
      break;
    }
    case 'link': {
      body.appendChild(el('label', null, 'URL'));
      const u = el('input', { type: 'url', placeholder: 'https://...' });
      u.value = card.url || '';
      u.addEventListener('input', function (e) {
        card.url = e.target.value; saveAutosaveDebounced(); renderOutlineOnly();
        const dom = getDomainFromUrl(e.target.value);
        const hint = body.querySelector('.domain-hint');
        if (hint) hint.textContent = dom ? 'Doména: ' + dom : '';
      });
      body.appendChild(u);
      body.appendChild(el('label', null, 'Titulek odkazu'));
      const t = el('input', { type: 'text' });
      t.value = card.title || '';
      t.addEventListener('input', function (e) { card.title = e.target.value; saveAutosaveDebounced(); renderOutlineOnly(); });
      body.appendChild(t);
      body.appendChild(el('label', null, 'Krátký popisek (volitelné)'));
      const d = el('textarea', { rows: '2' });
      d.value = card.description || '';
      d.addEventListener('input', function (e) { card.description = e.target.value; saveAutosaveDebounced(); });
      body.appendChild(d);
      const hint = el('p', { class: 'field-hint domain-hint' });
      const dom = getDomainFromUrl(card.url);
      if (dom) hint.textContent = 'Doména: ' + dom + ' (favicon se načte automaticky)';
      body.appendChild(hint);
      break;
    }
    case 'document': {
      body.appendChild(el('label', null, 'URL souboru'));
      const u = el('input', { type: 'url' });
      u.value = card.url || '';
      u.addEventListener('input', function (e) { card.url = e.target.value; saveAutosaveDebounced(); });
      body.appendChild(u);
      body.appendChild(el('label', null, 'Název dokumentu'));
      const t = el('input', { type: 'text' });
      t.value = card.title || '';
      t.addEventListener('input', function (e) { card.title = e.target.value; saveAutosaveDebounced(); });
      body.appendChild(t);
      body.appendChild(el('label', null, 'Popis (volitelné)'));
      const d = el('textarea', { rows: '2' });
      d.value = card.description || '';
      d.addEventListener('input', function (e) { card.description = e.target.value; saveAutosaveDebounced(); });
      body.appendChild(d);
      break;
    }
    case 'quote': {
      body.appendChild(el('label', null, 'Text citace'));
      const t = el('textarea', { rows: '3' });
      t.value = card.text || '';
      t.addEventListener('input', function (e) { card.text = e.target.value; saveAutosaveDebounced(); });
      body.appendChild(t);
      body.appendChild(el('label', null, 'Autor (volitelné)'));
      const a = el('input', { type: 'text' });
      a.value = card.author || '';
      a.addEventListener('input', function (e) { card.author = e.target.value; saveAutosaveDebounced(); });
      body.appendChild(a);
      body.appendChild(el('label', null, 'Zdroj – kniha, článek (volitelné)'));
      const s = el('input', { type: 'text' });
      s.value = card.source || '';
      s.addEventListener('input', function (e) { card.source = e.target.value; saveAutosaveDebounced(); });
      body.appendChild(s);
      break;
    }
    case 'stat': {
      const row = el('div', { class: 'row cols-2' });
      const c1 = el('div'); const c2 = el('div');
      c1.appendChild(el('label', { style: { marginTop: 0 } }, 'Číslo'));
      const nIpt = el('input', { type: 'text', placeholder: '87' });
      nIpt.value = card.number || '';
      nIpt.addEventListener('input', function (e) { card.number = e.target.value; saveAutosaveDebounced(); });
      c1.appendChild(nIpt);
      c2.appendChild(el('label', { style: { marginTop: 0 } }, 'Jednotka (volitelné)'));
      const uIpt = el('input', { type: 'text', placeholder: '%' });
      uIpt.value = card.unit || '';
      uIpt.addEventListener('input', function (e) { card.unit = e.target.value; saveAutosaveDebounced(); });
      c2.appendChild(uIpt);
      row.appendChild(c1); row.appendChild(c2);
      body.appendChild(row);
      body.appendChild(el('label', null, 'Popisek'));
      const lIpt = el('input', { type: 'text', placeholder: 'Pokrytí územní samosprávy' });
      lIpt.value = card.label || '';
      lIpt.addEventListener('input', function (e) { card.label = e.target.value; saveAutosaveDebounced(); });
      body.appendChild(lIpt);
      break;
    }
    case 'code': {
      body.appendChild(el('label', null, 'Jazyk (volitelné)'));
      const lIpt = el('input', { type: 'text', placeholder: 'javascript' });
      lIpt.value = card.language || '';
      lIpt.addEventListener('input', function (e) { card.language = e.target.value; saveAutosaveDebounced(); });

      const cIpt = el('textarea', { rows: '8' });
      cIpt.value = card.code || '';
      cIpt.addEventListener('input', function (e) { card.code = e.target.value; saveAutosaveDebounced(); });
      body.appendChild(cIpt);
      body.appendChild(el('label', null, 'Popisek (volitelné)'));
      const capIpt = el('input', { type: 'text' });
      capIpt.value = card.caption || '';
      capIpt.addEventListener('input', function (e) { card.caption = e.target.value; saveAutosaveDebounced(); });
      body.appendChild(capIpt);
      break;
    }
    case 'callout': {
      body.appendChild(el('label', null, 'Druh'));
      const sel = el('select');
      [['tip', 'Tip'], ['info', 'Informace'], ['warn', 'Pozor'], ['example', 'Příklad']].forEach(function (k) {
        const opt = el('option', { value: k[0] }, k[1]);
        if (card.kind === k[0]) opt.selected = true;
        sel.appendChild(opt);
      });

      const t = el('input', { type: 'text' });

      t.addEventListener('input', function (e) { card.title = e.target.value; saveAutosaveDebounced(); });
      body.appendChild(t);
      body.appendChild(el('label', null, 'Text'));
      const ta = el('textarea', { rows: '4' });
      ta.value = card.text || '';
      ta.addEventListener('input', function (e) { card.text = e.target.value; saveAutosaveDebounced(); });
      body.appendChild(ta);
      break;

    case 'twocol': {
      body.appendChild(el('label', null, 'Levý sloupec (Markdown)'));
      const l = el('textarea', { rows: '5' });
      l.value = card.left || '';
      l.addEventListener('input', function (e) { card.left = e.target.value; saveAutosaveDebounced(); });
      body.appendChild(l);
      body.appendChild(el('label', null, 'Pravý sloupec (Markdown)'));
      const r = el('textarea', { rows: '5' });
      r.value = card.right || '';
      r.addEventListener('input', function (e) { card.right = e.target.value; saveAutosaveDebounced(); });
      body.appendChild(r);
      break;
    }
    case 'divider': {
      body.appendChild(el('label', null, 'Číslo nebo štítek (volitelné)'));
      const n = el('input', { type: 'text', placeholder: 'Část II' });
      n.value = card.number || '';
      n.addEventListener('input', function (e) { card.number = e.target.value; saveAutosaveDebounced(); });
      body.appendChild(n);
      body.appendChild(el('label', null, 'Hlavní titulek'));
      const t = el('input', { type: 'text' });
      t.value = card.title || '';
      t.addEventListener('input', function (e) { card.title = e.target.value; saveAutosaveDebounced(); });
      body.appendChild(t);
      body.appendChild(el('label', null, 'Podtitulek (volitelné)'));
      const s = el('textarea', { rows: '2' });
      s.value = card.subtitle || '';
      s.addEventListener('input', function (e) { card.subtitle = e.target.value; saveAutosaveDebounced(); });
      body.appendChild(s);
      break;
    }
    case 'table': {
      body.appendChild(el('label', null, 'Hlavičky sloupců'));
      const headRow = el('div', { class: 'list-items' });
      const rowsHost = el('div', { class: 'list-items' });

      function rebuildHeaders() {
        headRow.textContent = '';
        card.headers.forEach(function (h, i) {
          const row = el('div', { class: 'list-item-row' });
          const ipt = el('input', { type: 'text' });
          ipt.value = h;

            class: 'btn',
            'aria-label': 'Posunout sloupec ' + (i + 1) + ' vlevo',
            disabled: i === 0,
            onclick: function () {
              if (i > 0) {
                const tmpH = card.headers[i - 1]; card.headers[i - 1] = card.headers[i]; card.headers[i] = tmpH;
                card.rows.forEach(function (r) {
                  const tmpC = r[i - 1]; r[i - 1] = r[i]; r[i] = tmpC;

function pickImageFile(cb) {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = 'image/*';
  input.addEventListener('change', function (e) {
    const file = e.target.files[0];
    if (!file) return;
    if (file.size > 10 * 1024 * 1024) {
      toast('Soubor je příliš velký (max 10 MB)', 'error');
      return;
    }
    const reader = new FileReader();
    reader.onload = function () {
      // Optimalizace: pokud je to JPEG/PNG větší než 1MB, zmenšit přes canvas
      if (file.size > 1024 * 1024 && /^image\/(jpeg|png|webp)$/.test(file.type)) {
        const img = new Image();
        img.onload = function () {
          const max = 1600;
          let w = img.width, h = img.height;
          if (w > max || h > max) {
            const r = max / Math.max(w, h);
            w = Math.round(w * r); h = Math.round(h * r);
          }
          const canvas = document.createElement('canvas');
          canvas.width = w; canvas.height = h;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0, w, h);
          cb(canvas.toDataURL(file.type === 'image/png' ? 'image/png' : 'image/jpeg', 0.85));
        };
        img.src = reader.result;
      } else {
        cb(reader.result);
      }
    };
    reader.readAsDataURL(file);
  });
  input.click();
}

let modalCloser = null;
function openModal(title, contentBuilder, opts) {
  closeModal();
  opts = opts || {};
  const host = document.getElementById('modal-host');
  const backdrop = el('div', { class: 'modal-backdrop' });
  backdrop.addEventListener('click', function (e) {
    if (e.target === backdrop) closeModal();
  });
  const modal = el('div', { class: 'modal' + (opts.large ? ' modal-large' : ''), role: 'dialog', 'aria-modal': 'true', 'aria-label': title });
  const head = el('div', { class: 'modal-head' });
  head.appendChild(el('h2', null, title));
  head.appendChild(el('button', {
    class: 'btn icon-only', 'aria-label': 'Zavřít dialog',
    onclick: closeModal
  }, '\u2716'));
  modal.appendChild(head);
  const body = el('div', { class: 'modal-body' });
  body.appendChild(contentBuilder(modal));
  modal.appendChild(body);
  if (opts.footer) {
    const foot = el('div', { class: 'modal-foot' });
    opts.footer.forEach(function (b) { foot.appendChild(b); });
    modal.appendChild(foot);
  }
  backdrop.appendChild(modal);
  host.appendChild(backdrop);

  const previousFocus = document.activeElement;
  setTimeout(function () {
    const focusable = modal.querySelector('input, textarea, select, button:not([aria-label="Zavřít dialog"])');
    if (focusable) focusable.focus();
  }, 50);

  const escHandler = function (e) {
    if (e.key === 'Escape') { closeModal(); }
  };
  document.addEventListener('keydown', escHandler);

  modalCloser = function () {
    document.removeEventListener('keydown', escHandler);
    if (host.contains(backdrop)) host.removeChild(backdrop);
    if (previousFocus && previousFocus.focus) previousFocus.focus();
    modalCloser = null;
  };
}

function closeModal() {
  if (modalCloser) modalCloser();
}

function openLoadDialog() {
  openModal('Otevřít soubor', function () {
    const wrap = el('div');
    wrap.appendChild(el('p', null, 'Vyberte soubor s uloženým příběhem (.mrai nebo libovolný JSON).'));

    const fileLabel = el('label', { for: 'mrai-file-input' }, 'Soubor');
    fileLabel.style.display = 'block';
    fileLabel.style.marginBottom = '0.4rem';
    fileLabel.style.fontWeight = '600';
    fileLabel.style.fontSize = '0.85rem';
    wrap.appendChild(fileLabel);

    const fileInput = el('input', {
      type: 'file',
      id: 'mrai-file-input',
      'aria-describedby': 'mrai-file-status'
    });
    fileInput.style.display = 'block';
    fileInput.style.marginBottom = '1rem';
    fileInput.style.width = '100%';
    wrap.appendChild(fileInput);

    const status = el('p', {
      id: 'mrai-file-status',
      class: 'field-hint',
      role: 'status',
      'aria-live': 'polite'
    }, 'Žádný soubor nevybrán.');
    wrap.appendChild(status);

    const doLoad = function () {
      const f = fileInput.files && fileInput.files[0];
      if (!f) {
        status.textContent = 'Nejprve vyberte soubor.';
        toast('Nejprve vyberte soubor.', 'error');
        fileInput.focus();
        return;
      }
      status.textContent = 'Načítám soubor ' + f.name + '\u2026';
      const r = new FileReader();
      r.onload = function () {
        try {
          const doc = JSON.parse(r.result);
          if (!doc || !Array.isArray(doc.chapters)) throw new Error('Neplatný formát souboru');
          State.doc = doc;
          State.ui.focusedCardId = null;
          saveAutosave();
          renderEditor();
          closeModal();
          toast('Příběh načten', 'success');
        } catch (e) {
          status.textContent = 'Chyba: ' + e.message;
          toast('Chyba při načítání: ' + e.message, 'error');
        }
      };
      r.onerror = function () {
        status.textContent = 'Nelze přečíst soubor.';
        toast('Nelze přečíst soubor.', 'error');
      };
      r.readAsText(f);
    };

    fileInput.addEventListener('change', function () {
      if (fileInput.files && fileInput.files[0]) {
        status.textContent = 'Vybráno: ' + fileInput.files[0].name + '. Klikněte Načíst.';
      }
    });

    const actions = el('div', { style: { display: 'flex', gap: '0.5rem', marginTop: '1rem' } });
    const loadBtn = el('button', {
      class: 'btn primary',
      onclick: doLoad
    }, 'Načíst');
    const cancelBtn = el('button', {
      class: 'btn',
      onclick: function () { closeModal(); }
    }, 'Zrušit');
    actions.appendChild(loadBtn);
    actions.appendChild(cancelBtn);
    wrap.appendChild(actions);

    wrap.appendChild(el('p', { class: 'field-hint', style: { marginTop: '1rem' } },
      'Aplikace také automaticky uchovává poslední verzi v paměti prohlížeče.'));

    // Po vykreslení dej focus na file input
    setTimeout(function () { fileInput.focus(); }, 100);

    return wrap;
  });
}

function openSearchDialog() {
  openModal('Hledat v příběhu', function () {
    const wrap = el('div');
    const input = el('input', { type: 'search', placeholder: 'Zadejte hledaný text\u2026' });
    wrap.appendChild(input);
    const results = el('div', { style: { marginTop: '1rem', maxHeight: '50vh', overflowY: 'auto', border: '1px solid var(--app-border)', borderRadius: '4px' } });
    wrap.appendChild(results);
    function search(q) {
      results.textContent = '';
      if (!q || q.length < 2) {
        results.appendChild(el('p', { style: { padding: '1rem', color: 'var(--app-fg-mute)' } }, 'Zadejte alespoň 2 znaky.'));
        return;
      }
      const lq = q.toLowerCase();
      const matches = [];
      // Titul
      const titleText = ((State.doc.title || '') + ' ' + (State.doc.subtitle || '')).toLowerCase();
      if (titleText.indexOf(lq) >= 0) {
        matches.push({ type: 'Titul', cardId: '__title__', text: State.doc.title });
      }
      State.doc.chapters.forEach(function (ch) {
        if ((ch.title || '').toLowerCase().indexOf(lq) >= 0) {
          matches.push({ type: 'Kapitola', chapterId: ch.id, text: ch.title });
        }
        ch.cards.forEach(function (c) {
          const t = collectCardText(c).toLowerCase();
          if (t.indexOf(lq) >= 0) {
            matches.push({ type: CardTypes[c.type].label, cardId: c.id, text: CardTypes[c.type].summary(c) });
          }
        });
      });
      if (matches.length === 0) {
        results.appendChild(el('p', { style: { padding: '1rem', color: 'var(--app-fg-mute)' } }, 'Nic nenalezeno.'));
        return;
      }
      matches.forEach(function (m) {
        const item = el('div', {
          class: 'search-result',
          tabindex: '0',
          onclick: function () {
            closeModal();
            if (m.cardId) {
              State.ui.focusedCardId = m.cardId;
              const targetId = m.cardId === '__title__' ? 'title-card' : 'card-' + m.cardId;
              const elTarget = document.getElementById(targetId);
              if (elTarget) {
                elTarget.scrollIntoView({ block: 'center' });
                const f = elTarget.querySelector('input, textarea');
                if (f) f.focus();
              }
              renderOutlineOnly();
            } else if (m.chapterId) {
              const elTarget = document.getElementById('chapter-' + m.chapterId);
              if (elTarget) elTarget.scrollIntoView({ block: 'start' });
            }
          },
          onkeydown: function (e) { if (e.key === 'Enter') e.currentTarget.click(); }
        });
        item.appendChild(el('div', { class: 'search-result-type' }, m.type));
        const txtSpan = el('div', { class: 'search-result-text' });
        const text = m.text || '';
        const idx = text.toLowerCase().indexOf(lq);
        if (idx >= 0) {
          txtSpan.appendChild(document.createTextNode(text.slice(0, idx)));
          const mark = el('mark', null, text.slice(idx, idx + q.length));
          txtSpan.appendChild(mark);
          txtSpan.appendChild(document.createTextNode(text.slice(idx + q.length)));
        } else {
          txtSpan.textContent = text;
        }
        item.appendChild(txtSpan);
        results.appendChild(item);
      });
    }
    input.addEventListener('input', function (e) { search(e.target.value); });
    search('');
    return wrap;
  });
}

function runChecks() {
  const issues = [];
  if (!State.doc.title) {
    issues.push({ severity: 'warn', title: 'Chybí název příběhu', message: 'Doporučujeme vyplnit název v titulní kartě.' });
  }
  let lastLevel = 0;
  State.doc.chapters.forEach(function (ch) {
    ch.cards.forEach(function (card) {
      if (card.type === 'image' && !card.alt && !card.caption) {
        issues.push({ severity: 'warn', title: 'Obrázek bez popisu', message: 'Obrázek nemá alternativní text ani titulek (zhoršuje přístupnost).', cardId: card.id });
      }
      if (card.type === 'link' && !card.title && !card.description) {
        issues.push({ severity: 'warn', title: 'Odkaz bez popisu', message: 'Odkaz má jen URL, doplňte titulek nebo popisek.', cardId: card.id });
      }
      if (card.type === 'heading') {
        if (lastLevel > 0 && card.level > lastLevel + 1) {
          issues.push({ severity: 'warn', title: 'Přeskočená úroveň nadpisu', message: 'Z úrovně ' + lastLevel + ' jste skočil na ' + card.level + '. To zhoršuje navigaci se screen readerem.', cardId: card.id });
        }
        lastLevel = card.level;
      }
      if (card.type === 'video' && !card.url) {
        issues.push({ severity: 'error', title: 'Video bez URL', message: 'Karta videa nemá vyplněnou URL.', cardId: card.id });
      }
    });
  });
  return issues;
}

let activePlayer = null;
function openPlayer() {
  closePlayer();
  const appEl = document.getElementById('app');
  const host = document.getElementById('player-host');

  // Skryj editor, otevři přehrávač jako jediný obsah
  appEl.setAttribute('aria-hidden', 'true');
  appEl.style.display = 'none';

  const page = el('div', { class: 'player-page', role: 'application', 'aria-label': 'Přehrávač příběhu' });

  // Top toolbar – zavření + přepínač rozvržení + časovač spouštěč
  const toolbar = el('div', { class: 'player-toolbar' });
  toolbar.appendChild(el('h2', null, State.doc.title || 'Příběh'));

  const modeSwitch = el('div', { class: 'player-mode-switch', role: 'tablist', 'aria-label': 'Rozvržení', style: { position: 'static', boxShadow: 'none', border: 'none', background: 'transparent', padding: 0 } });
  ['vertical', 'horizontal', 'slides'].forEach(function (m) {
    const labels = { vertical: 'Vertikální', horizontal: 'Horizontální', slides: 'Slidy' };
    const b = el('button', {
      class: State.doc.layout === m ? 'active' : '',
      role: 'tab',
      'aria-selected': State.doc.layout === m ? 'true' : 'false',
      onclick: function () {
        State.doc.layout = m;
        saveAutosaveDebounced();
        openPlayer();
      }
    }, labels[m]);
    modeSwitch.appendChild(b);
  });
  toolbar.appendChild(modeSwitch);

  toolbar.appendChild(el('button', {
    'aria-label': 'Skrýt panel přehrávače',
    onclick: function () {
      const t = page.querySelector('.player-toolbar');
      const c = page.querySelector('.player-page-content');
      if (t.classList.contains('hidden')) {
        t.classList.remove('hidden');
        c.classList.remove('no-toolbar');
      } else {
        t.classList.add('hidden');
        c.classList.add('no-toolbar');
      }
    }
  }, 'Skrýt panel'));

  toolbar.appendChild(el('button', {
    class: 'primary', 'aria-label': 'Zavřít přehrávač a vrátit se do editoru',
    style: { background: '#2563eb', color: '#fff', borderColor: '#2563eb' },
    onclick: closePlayer
  }, '\u2716 Zavřít přehrávač'));

  page.appendChild(toolbar);

  // Hlavní obsah
  const content = el('div', { class: 'player-page-content' });
  const story = renderStoryByLayout(State.doc);
  if (State.doc.layout === 'vertical') {
    story.style.minHeight = 'calc(100vh - 3rem)';
  } else {
    story.style.height = 'calc(100vh - 3rem)';
  }
  content.appendChild(story);
  page.appendChild(content);

  // Časovač
  const timer = createPlayerTimer();
  page.appendChild(timer.el);

  host.appendChild(page);

  // Klávesové zkratky pro přehrávač
  const keyHandler = function (e) {
    if (e.key === 'Escape') {
      // Esc nezavře přehrávač automaticky, jen pokud není aktivní jiný element
      if (e.target === document.body || e.target.tagName === 'ARTICLE') {
        closePlayer();
      } else {
        closePlayer();
      }
    } else if (e.key === 't' || e.key === 'T') {
      if (!/^(INPUT|TEXTAREA|SELECT)$/.test(document.activeElement.tagName)) {
        e.preventDefault();
        timer.toggle();
      }
    } else if (e.key === 'r' || e.key === 'R') {
      if (!/^(INPUT|TEXTAREA|SELECT)$/.test(document.activeElement.tagName) && !e.ctrlKey && !e.metaKey) {
        e.preventDefault();
        timer.reset();
      }
    }
  };
  document.addEventListener('keydown', keyHandler);

  activePlayer = function () {
    document.removeEventListener('keydown', keyHandler);
    timer.stop();
    if (host.contains(page)) host.removeChild(page);
    appEl.removeAttribute('aria-hidden');
    appEl.style.display = '';
    activePlayer = null;
  };

  setTimeout(function () {
    if (story.focus) story.focus();
    announce('Přehrávač spuštěn. Klávesa T spustí časovač, Esc zavře přehrávač.');
  }, 50);
}

function closePlayer() {
  if (activePlayer) activePlayer();
}

/* Časovač pro přehrávač */
function createPlayerTimer() {
  const wrap = el('div', { class: 'player-timer', role: 'timer', 'aria-live': 'off' });
  const display = el('span', { class: 'player-timer-display' }, '00:00');
  const target = el('span', { class: 'player-timer-target' });
  const actions = el('span', { class: 'player-timer-actions' });
  const startBtn = el('button', { 'aria-label': 'Spustit nebo pozastavit časovač (T)' }, '\u25B6');
  const resetBtn = el('button', { 'aria-label': 'Resetovat časovač (R)' }, '\u21BA');
  const targetBtn = el('button', { 'aria-label': 'Nastavit cíl' }, '\u23F1');
  actions.appendChild(startBtn);
  actions.appendChild(resetBtn);
  actions.appendChild(targetBtn);

  wrap.appendChild(display);
  wrap.appendChild(target);
  wrap.appendChild(actions);

  let seconds = 0;
  let running = false;
  let interval = null;
  let targetSec = 0;

  const updateDisplay = function () {
    const m = Math.floor(seconds / 60);
    const s = seconds % 60;
    display.textContent = (m < 10 ? '0' : '') + m + ':' + (s < 10 ? '0' : '') + s;
    if (targetSec > 0) {
      const tm = Math.floor(targetSec / 60);
      const ts = targetSec % 60;
      target.textContent = '/ ' + (tm < 10 ? '0' : '') + tm + ':' + (ts < 10 ? '0' : '') + ts;
      if (seconds >= targetSec) {
        wrap.classList.add('over');
      } else {
        wrap.classList.remove('over');
      }
    } else {
      target.textContent = '';
    }
  };

  const start = function () {
    if (running) return;
    running = true;
    wrap.classList.add('running');
    startBtn.textContent = '\u23F8';
    startBtn.setAttribute('aria-label', 'Pozastavit časovač');
    interval = setInterval(function () {
      seconds++;
      updateDisplay();
    }, 1000);
  };
  const stop = function () {
    if (!running) return;
    running = false;
    wrap.classList.remove('running');
    startBtn.textContent = '\u25B6';
    startBtn.setAttribute('aria-label', 'Spustit časovač');
    if (interval) { clearInterval(interval); interval = null; }
  };
  const toggle = function () {
    if (running) {
      stop();
      announce('Časovač pozastaven na ' + display.textContent);
    } else {
      start();
      announce('Časovač spuštěn');
    }
  };
  const reset = function () {
    stop();
    seconds = 0;
    wrap.classList.remove('over');
    updateDisplay();
    announce('Časovač resetován');
  };
  const setTarget = function () {
    const cur = targetSec > 0 ? Math.floor(targetSec / 60) + ':' + (targetSec % 60).toString().padStart(2, '0') : '';
    const v = prompt('Cílový čas prezentace (formát mm:ss nebo počet minut):', cur);
    if (v === null) return;
    if (!v.trim()) { targetSec = 0; updateDisplay(); return; }
    const m = v.match(/^(\d+):(\d+)$/);
    if (m) {
      targetSec = parseInt(m[1], 10) * 60 + parseInt(m[2], 10);
    } else {
      const n = parseFloat(v);
      if (!isNaN(n)) targetSec = Math.round(n * 60);
    }
    updateDisplay();
    if (targetSec > 0) announce('Cíl nastaven na ' + Math.floor(targetSec / 60) + ' minut');
  };

  startBtn.addEventListener('click', toggle);
  resetBtn.addEventListener('click', reset);
  targetBtn.addEventListener('click', setTarget);

  updateDisplay();

function collectStylesheet() {
  // Whitelist přístup – do exportu pouštíme jen pravidla, která něco vykreslují v příběhu
  const ALLOW_PREFIXES = [
    '*', ':root', 'html', 'body', 'button', 'input', 'textarea', 'select', 'img', ':focus-visible', '.sr-only',
    '.story', '.export-', 'kbd', '@keyframes', '@media', '@supports', '@font-face'
  ];
  let css = '';
  for (const sheet of document.styleSheets) {
    try {
      if (!sheet.cssRules) continue;
      for (const rule of sheet.cssRules) {
        const text = rule.cssText;
        // @keyframes, @media, @font-face vždy
        if (text.indexOf('@') === 0) {
          // @media – obal v něm musí ale neobsahovat editor-only selektory; jen zachytíme print a width queries
          if (text.indexOf('@media print') >= 0 || text.indexOf('@keyframes') >= 0 || text.indexOf('@font-face') >= 0) {
            css += text + '\n'; continue;
          }
          if (text.indexOf('@media') === 0) {
            // ponecháme, většinou story-related responzivita
            css += text + '\n'; continue;
          }
          continue;
        }
        const selectorPart = text.split('{')[0].trim();
        // Multi-selector: pravidlo zahrnujeme, pokud aspoň jeden ze selektorů začíná na povolený prefix nebo obsahuje .story
        const selectors = selectorPart.split(',').map(function (s) { return s.trim(); });
        const wanted = selectors.some(function (s) {
          if (/^\.story\b/.test(s) || /^\.story-/.test(s)) return true;
          if (/^\.export-/.test(s)) return true;
          if (/^body\b/.test(s) || /^html\b/.test(s)) return true;
          if (/^\*[,.\s{:]/.test(s) || s === '*' || /^\*::/.test(s)) return true;
          if (/^:focus-visible/.test(s)) return true;
          if (/^\.sr-only/.test(s)) return true;
          if (s === 'kbd') return true;
          if (/^:root\b/.test(s)) return true;
          if (/^img\b/.test(s)) return true;
          return false;
        });
        if (wanted) css += text + '\n';
      }
    } catch (e) { /* CORS */ }
  }
  return css;
}

function escapeXml(s) {
  if (s === null || s === undefined) return '';
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&apos;');
}

/* Vytvoří inline runs z textu s podporou Markdown a CriticMarkup */
function buildDocxRuns(text) {
  if (!text) return '';
  // Tokenizace: rozparsuj inline elementy
  const tokens = parseInlineForDocx(text);
  return tokens.map(function (tok) {
    return tokenToDocxRun(tok);
  }).join('');
}

function parseInlineForDocx(text) {
  // Velmi jednoduchý parser: rozdělím text podle Markdown a CriticMarkup tagů
  const tokens = [];
  let remaining = text;
  // Postupně hledám další zajímavý token
  const patterns = [
    { re: /\{\+\+([\s\S]+?)\+\+\}/, kind: 'cm-ins' },
    { re: /\{--([\s\S]+?)--\}/, kind: 'cm-del' },
    { re: /\{~~([\s\S]+?)~>([\s\S]+?)~~\}/, kind: 'cm-sub' },
    { re: /\{>>([\s\S]+?)<<\}/, kind: 'cm-comment' },
    { re: /\{==([\s\S]+?)==\}/, kind: 'cm-hl' },
    { re: /\*\*([^*\n]+)\*\*/, kind: 'bold' },
    { re: /\*([^*\n]+)\*/, kind: 'italic' },
    { re: /`([^`\n]+)`/, kind: 'code' },
    { re: /\[([^\]]+)\]\(([^)\s]+)\)/, kind: 'link' }
  ];
  while (remaining.length > 0) {
    let earliest = -1;
    let chosen = null;
    let chosenMatch = null;
    for (const p of patterns) {
      const m = remaining.match(p.re);
      if (m && (earliest === -1 || m.index < earliest)) {
        earliest = m.index;
        chosen = p;
        chosenMatch = m;
      }
    }
    if (chosen === null) {
      tokens.push({ kind: 'text', text: remaining });
      break;
    }
    if (earliest > 0) {
      tokens.push({ kind: 'text', text: remaining.slice(0, earliest) });
    }
    if (chosen.kind === 'cm-sub') {
      tokens.push({ kind: 'cm-del', text: chosenMatch[1] });
      tokens.push({ kind: 'text', text: ' \u2192 ' });
      tokens.push({ kind: 'cm-ins', text: chosenMatch[2] });
    } else if (chosen.kind === 'link') {
      tokens.push({ kind: 'link', text: chosenMatch[1], url: chosenMatch[2] });
    } else {
      tokens.push({ kind: chosen.kind, text: chosenMatch[1] });
    }
    remaining = remaining.slice(earliest + chosenMatch[0].length);
  }
  return tokens;
}

function tokenToDocxRun(tok) {
  let rPr = '';
  if (tok.kind === 'bold') rPr = '<w:b/>';
  else if (tok.kind === 'italic') rPr = '<w:i/>';
  else if (tok.kind === 'code') rPr = '<w:rFonts w:ascii="Consolas" w:hAnsi="Consolas"/><w:shd w:val="clear" w:color="auto" w:fill="F0F0F0"/>';
  else if (tok.kind === 'link') rPr = '<w:color w:val="2563EB"/><w:u w:val="single"/>';
  else if (tok.kind === 'cm-ins') rPr = '<w:color w:val="0A6E0A"/><w:u w:val="single"/><w:shd w:val="clear" w:color="auto" w:fill="DDFFDD"/>';
  else if (tok.kind === 'cm-del') rPr = '<w:color w:val="6E0A0A"/><w:strike/><w:shd w:val="clear" w:color="auto" w:fill="FFDDDD"/>';
  else if (tok.kind === 'cm-hl') rPr = '<w:shd w:val="clear" w:color="auto" w:fill="FFF8B3"/>';
  else if (tok.kind === 'cm-comment') rPr = '<w:color w:val="1D4ED8"/><w:i/>';

  let displayText = tok.text || '';
  if (tok.kind === 'cm-comment') displayText = ' [💬 ' + displayText + '] ';
  if (tok.kind === 'link' && tok.url) displayText = displayText + ' (' + tok.url + ')';

  // Zachování mezer
  return '<w:r>' + (rPr ? '<w:rPr>' + rPr + '</w:rPr>' : '') +
    '<w:t xml:space="preserve">' + escapeXml(displayText) + '</w:t></w:r>';
}

function paragraphsFromMarkdown(text) {
  // Rozdělení podle prázdných řádků
  if (!text) return [];
  const blocks = text.split(/\n{2,}/);
  const paragraphs = [];
  blocks.forEach(function (block) {
    const lines = block.split(/\n/);
    if (lines.every(function (l) { return /^\s*[-*]\s+/.test(l); })) {
      lines.forEach(function (l) {
        paragraphs.push({ style: 'ListBullet', runs: l.replace(/^\s*[-*]\s+/, '') });
      });
    } else if (lines.every(function (l) { return /^\s*\d+\.\s+/.test(l); })) {
      lines.forEach(function (l) {
        paragraphs.push({ style: 'ListNumber', runs: l.replace(/^\s*\d+\.\s+/, '') });
      });
    } else {
      paragraphs.push({ style: 'Normal', runs: lines.join(' ') });
    }
  });
  return paragraphs;
}

function makeDocxParagraph(style, text) {
  const runsXml = buildDocxRuns(text);
  let pPr = '';
  if (style === 'Heading1') pPr = '<w:pPr><w:pStyle w:val="Heading1"/></w:pPr>';
  else if (style === 'Heading2') pPr = '<w:pPr><w:pStyle w:val="Heading2"/></w:pPr>';
  else if (style === 'Heading3') pPr = '<w:pPr><w:pStyle w:val="Heading3"/></w:pPr>';
  else if (style === 'Heading4') pPr = '<w:pPr><w:pStyle w:val="Heading4"/></w:pPr>';
  else if (style === 'Quote') pPr = '<w:pPr><w:pStyle w:val="Quote"/></w:pPr>';
  else if (style === 'ListBullet') pPr = '<w:pPr><w:pStyle w:val="ListBullet"/><w:numPr><w:ilvl w:val="0"/><w:numId w:val="1"/></w:numPr></w:pPr>';
  else if (style === 'ListNumber') pPr = '<w:pPr><w:pStyle w:val="ListNumber"/><w:numPr><w:ilvl w:val="0"/><w:numId w:val="2"/></w:numPr></w:pPr>';
  else if (style === 'Caption') pPr = '<w:pPr><w:pStyle w:val="Caption"/></w:pPr>';
  return '<w:p>' + pPr + runsXml + '</w:p>';
}

function buildDocxDocument(doc) {
  const body = [];

  // Titul + podtitul
  body.push(makeDocxParagraph('Heading1', doc.title || 'Bez názvu'));
  if (doc.subtitle) body.push(makeDocxParagraph('Quote', doc.subtitle));

  // Kapitoly
  doc.chapters.forEach(function (ch) {
    if (ch.title) body.push(makeDocxParagraph('Heading2', ch.title));
    ch.cards.forEach(function (card) {
      cardToDocxParagraphs(card).forEach(function (p) {
        body.push(makeDocxParagraph(p.style, p.runs));
      });
    });
  });

  return '<?xml version="1.0" encoding="UTF-8" standalone="yes"?>\n' +
    '<w:document xmlns:w="http://schemas.openxmlformats.org/wordprocessingml/2006/main">' +
    '<w:body>' + body.join('') +
    '<w:sectPr><w:pgSz w:w="11906" w:h="16838"/><w:pgMar w:top="1417" w:right="1417" w:bottom="1417" w:left="1417"/></w:sectPr>' +
    '</w:body></w:document>';
}

function cardToDocxParagraphs(card) {
  const out = [];
  switch (card.type) {
    case 'heading': {
      const lvl = (card.level || 1) + 1;
      out.push({ style: 'Heading' + Math.min(lvl, 4), runs: card.text || '' });
      break;
    }
    case 'text':
      paragraphsFromMarkdown(card.text || '').forEach(function (p) { out.push(p); });
      break;
    case 'bullet':
      (card.items || []).forEach(function (it) { out.push({ style: 'ListBullet', runs: it }); });
      break;
    case 'numbered':
      (card.items || []).forEach(function (it) { out.push({ style: 'ListNumber', runs: it }); });
      break;
    case 'image':
      out.push({ style: 'Caption', runs: '[Obrázek' + (card.alt ? ': ' + card.alt : '') + ']' });
      if (card.caption) out.push({ style: 'Caption', runs: card.caption });
      break;
    case 'video':
      out.push({ style: 'Caption', runs: '🎬 Video: [' + (card.caption || card.url || '') + '](' + (card.url || '') + ')' });
      break;
    case 'audio':
      out.push({ style: 'Caption', runs: '🔊 Audio: [' + (card.caption || card.url || '') + '](' + (card.url || '') + ')' });
      break;
    case 'link':
      out.push({ style: 'Normal', runs: '🔗 [' + (card.title || card.url || '') + '](' + (card.url || '') + ')' });
      if (card.description) out.push({ style: 'Caption', runs: card.description });
      break;
    case 'document':
      out.push({ style: 'Normal', runs: '📄 [' + (card.title || 'Dokument') + '](' + (card.url || '') + ')' });
      if (card.description) out.push({ style: 'Caption', runs: card.description });
      break;
    case 'quote':
      out.push({ style: 'Quote', runs: card.text || '' });
      if (card.author || card.source) {
        out.push({ style: 'Caption', runs: '\u2014 ' + (card.author || '') + (card.source ? ', ' + card.source : '') });
      }
      break;
    case 'stat':
      out.push({ style: 'Heading2', runs: (card.number || '') + (card.unit || '') });
      if (card.label) out.push({ style: 'Caption', runs: card.label });
      break;
    case 'code':
      out.push({ style: 'Caption', runs: 'Kód' + (card.language ? ' (' + card.language + ')' : '') + ':' });
      (card.code || '').split('\n').forEach(function (line) {
        out.push({ style: 'Normal', runs: '`' + line + '`' });
      });
      if (card.caption) out.push({ style: 'Caption', runs: card.caption });
      break;
    case 'callout': {
      const labels = { tip: 'TIP', info: 'INFO', warn: 'POZOR', example: 'PŘÍKLAD' };
      out.push({ style: 'Heading3', runs: '[' + (labels[card.kind] || 'TIP') + ']' + (card.title ? ' ' + card.title : '') });
      paragraphsFromMarkdown(card.text || '').forEach(function (p) { out.push(p); });
      break;
    }
    case 'twocol':
      out.push({ style: 'Heading3', runs: 'Levý sloupec:' });
      paragraphsFromMarkdown(card.left || '').forEach(function (p) { out.push(p); });
      out.push({ style: 'Heading3', runs: 'Pravý sloupec:' });
      paragraphsFromMarkdown(card.right || '').forEach(function (p) { out.push(p); });
      break;
    case 'divider':
      out.push({ style: 'Heading2', runs: (card.number ? card.number + ' \u2014 ' : '') + (card.title || '') });
      if (card.subtitle) out.push({ style: 'Caption', runs: card.subtitle });
      break;
    case 'table':
      out.push({ style: 'Heading4', runs: 'Tabulka:' });
      out.push({ style: 'Normal', runs: '**' + (card.headers || []).join(' \u2502 ') + '**' });
      (card.rows || []).forEach(function (r) {
        out.push({ style: 'Normal', runs: r.join(' \u2502 ') });
      });
      break;
    case 'timeline':
      (card.items || []).forEach(function (it) {
        out.push({ style: 'Heading4', runs: (it.date ? it.date + ' \u2014 ' : '') + (it.title || '') });
        if (it.text) out.push({ style: 'Normal', runs: it.text });
      });
      break;
    case 'embed':
      out.push({ style: 'Caption', runs: 'Vložený obsah: [' + (card.caption || card.url || '') + '](' + (card.url || '') + ')' });
      break;
    case 'gallery':
    case 'comparison':
    case 'slideshow':
      out.push({ style: 'Caption', runs: '[' + (card.images || []).length + ' obrázků]' });
      (card.images || []).forEach(function (im) {
        if (im.alt) out.push({ style: 'Caption', runs: '\u2022 ' + im.alt });
      });
      break;
  }
  return out;
}

function buildDocxNumbering() {
  return '<?xml version="1.0" encoding="UTF-8" standalone="yes"?>\n' +

    '<w:abstractNum w:abstractNumId="1"><w:lvl w:ilvl="0"><w:start w:val="1"/><w:numFmt w:val="decimal"/><w:lvlText w:val="%1."/><w:lvlJc w:val="left"/><w:pPr><w:ind w:left="720" w:hanging="360"/></w:pPr></w:lvl></w:abstractNum>' +
    '<w:num w:numId="1"><w:abstractNumId w:val="0"/></w:num>' +

}

function exportMarkdown() {
  const lines = [];
  lines.push('# ' + (State.doc.title || ''));
  if (State.doc.subtitle) lines.push('\n> ' + State.doc.subtitle);
  lines.push('');
  State.doc.chapters.forEach(function (ch) {
    if (ch.title) lines.push('\n## ' + ch.title + '\n');
    ch.cards.forEach(function (card) {
      lines.push(cardToMarkdown(card));
      lines.push('');
    });
  });
  const md = lines.join('\n');
  const blob = new Blob([md], { type: 'text/markdown;charset=utf-8' });
  const a = document.createElement('a');
  const fname = (State.doc.title || 'pribeh').replace(/[^a-zA-Z0-9_\-\u00C0-\u017F]+/g, '-').toLowerCase() + '.md';
  a.href = URL.createObjectURL(blob);
  a.download = fname;
  a.click();
  setTimeout(function () { URL.revokeObjectURL(a.href); }, 1000);
  toast('Markdown exportován', 'success');
}

function cardToMarkdown(card) {
  switch (card.type) {
    case 'heading':
      return '#'.repeat((card.level || 1) + 1) + ' ' + (card.text || '');
    case 'text':
      return card.text || '';
    case 'bullet':
      return (card.items || []).map(function (i) { return '- ' + i; }).join('\n');
    case 'numbered':
      return (card.items || []).map(function (i, idx) { return (idx + 1) + '. ' + i; }).join('\n');
    case 'image':
      return '![' + (card.alt || '') + '](' + (card.src || '') + ')' + (card.caption ? '\n*' + card.caption + '*' : '');
    case 'video':
      return '🎬 [Video' + (card.caption ? ': ' + card.caption : '') + '](' + (card.url || '') + ')';
    case 'audio':
      return '🔊 [Audio' + (card.caption ? ': ' + card.caption : '') + '](' + (card.url || '') + ')';
    case 'link':
      return '🔗 [' + (card.title || card.url || '') + '](' + (card.url || '') + ')' + (card.description ? '\n' + card.description : '');
    case 'document':
      return '📄 [' + (card.title || 'Dokument') + '](' + (card.url || '') + ')' + (card.description ? '\n' + card.description : '');
    case 'quote':
      return '> ' + (card.text || '').replace(/\n/g, '\n> ') + (card.author ? '\n> — ' + card.author + (card.source ? ', ' + card.source : '') : '');
    case 'stat':
      return '**' + (card.number || '') + (card.unit || '') + '** — ' + (card.label || '');
    case 'code':
      return '```' + (card.language || '') + '\n' + (card.code || '') + '\n```' + (card.caption ? '\n*' + card.caption + '*' : '');
    case 'callout': {
      const labels = { tip: 'TIP', info: 'INFO', warn: 'POZOR', example: 'PŘÍKLAD' };
      return '> **' + (labels[card.kind] || 'TIP') + (card.title ? ': ' + card.title : '') + '**\n> ' + (card.text || '').replace(/\n/g, '\n> ');
    }
    case 'twocol':
      return '**Levý sloupec:**\n' + (card.left || '') + '\n\n**Pravý sloupec:**\n' + (card.right || '');
    case 'divider':
      return '\n---\n\n## ' + (card.number ? card.number + ' — ' : '') + (card.title || '') + (card.subtitle ? '\n\n*' + card.subtitle + '*' : '');
    case 'table': {
      const lines = [];
      lines.push('| ' + (card.headers || []).join(' | ') + ' |');
      lines.push('| ' + (card.headers || []).map(function () { return '---'; }).join(' | ') + ' |');
      (card.rows || []).forEach(function (r) {
        lines.push('| ' + r.join(' | ') + ' |');
      });
      return lines.join('\n');
    }
    case 'timeline':
      return (card.items || []).map(function (it) {
        return '- **' + (it.date || '') + '** — ' + (it.title || '') + (it.text ? '\n  ' + it.text : '');
      }).join('\n');
    case 'embed':
      return (card.url ? '🔗 [Vložený obsah' + (card.caption ? ': ' + card.caption : '') + '](' + card.url + ')' : '> Vložený obsah' + (card.caption ? ': ' + card.caption : ''));
    case 'gallery':
    case 'slideshow':
    case 'comparison':
      return (card.images || []).map(function (i) {
        return '![' + (i.alt || '') + '](' + (i.src || '') + ')';
      }).join('\n');
  }
  return '';
}

/* ----------------------------------------------------------------------
   17) GLOBÁLNÍ KLÁVESOVÉ ZKRATKY
   ---------------------------------------------------------------------- */
function setupKeyboard() {
  document.addEventListener('keydown', function (e) {
    // Pokud je focus v inputu/textarea, většinu zkratek nevyvolávejte
    const inField = /^(INPUT|TEXTAREA|SELECT)$/.test(document.activeElement.tagName);

    // F1 nebo ?
    if (e.key === 'F1' || (e.key === '?' && !inField)) {
      e.preventDefault();
      openHelpDialog();
      return;
    }
    if (e.key === 'F5') {
      e.preventDefault();
      openPlayer();
      return;
    }
    if (e.ctrlKey || e.metaKey) {
      if (e.key === 's' || e.key === 'S') {
        e.preventDefault();
        downloadJson();
      } else if (e.key === 'p' || e.key === 'P') {
        e.preventDefault();
        openPlayer();
      } else if (e.key === 'f' || e.key === 'F') {
        e.preventDefault();
        openSearchDialog();
      } else if (e.key === 'k' || e.key === 'K') {
        e.preventDefault();
        saveSnapshot(null);
      }
    }
  });
}

/* ----------------------------------------------------------------------
   18) INICIALIZACE
   ---------------------------------------------------------------------- */
function init() {
  const saved = loadAutosave();
  if (saved && saved.chapters && saved.chapters.length) {
    State.doc = saved;
  } else {
    State.doc = createBlankDoc();
  }
  document.title = (State.doc.title || 'MRAI') + ' \u2014 MRAI';
  renderApp();
  setupKeyboard();
  announce('Aplikace připravena');
}

document.addEventListener('DOMContentLoaded', init);
