function toggleBoardMember(boardId, memberId) {
  const b = getBoard(boardId);
  if (!b) return;
  if (!b.members) b.members = [];
  const i = b.members.indexOf(memberId);
  if (i >= 0) b.members.splice(i, 1); else b.members.push(memberId);
  b.updatedAt = Date.now();
  saveState();
}
function boardMembers(board) {
  if (!board || !board.members) return [];
  return board.members.map(getMember).filter(Boolean);
}
function memberBoards(memberId) {
  return state.boards.filter(b => !b.archived && (b.members || []).includes(memberId));
}
function memberCards(memberId, opts={}) {
  return state.cards.filter(c => {
    if (!c.members || !c.members.includes(memberId)) return false;
    if (!opts.includeArchived && c.archived) return false;
    if (!opts.includeCompleted && c.completed) return false;
    return true;
  });
}

    if (totalSize > WARN_SIZE) {

      const ok = await confirm2(
        `Opravdu nahrát soubory o celkové velikosti ${mb} MB?\nBinární data se ukládají přímo do lokálního stavu prohlížeče (base64) a synchronizují se i do GitHubu. Pro velké soubory raději použij URL odkaz.`,

  //   A / L / D / C / R = akce přímo na aktuální kartě (i když jsme v modalu)
  // Zkratky fungují jen když focus není ve formulářovém poli (input, textarea apod.).
  const modalKeyHandler = (e) => {
    if (e.target.matches("input, textarea, select, [contenteditable]")) return;
    if (e.metaKey || e.ctrlKey || e.altKey) return;
    // , . = navigace
    if (e.key === "," || e.key === ".") {
      const siblings = siblingCardsForNav(real);
      const idx = siblings.findIndex(c => c.id === real.id);
      if (idx < 0) return;
      const dir = e.key === "." ? 1 : -1;

        e.preventDefault();
        m.close();
        setTimeout(() => openCardDetail(next.id), 30);
        announce(e.key === "." ? "Další karta." : "Předchozí karta.");

      return;

    // Rychlé akce A/L/D/C/R — stejné jako na focusované kartě v board view

    if (k === "a") { e.preventDefault(); openCardMembersDialog(real.id); return; }
    if (k === "l") { e.preventDefault(); openCardLabelsDialog(real.id); return; }
    if (k === "d") { e.preventDefault(); openSetDueDialog(real.id); return; }
    if (k === "c") { e.preventDefault(); openCardCommentDialog(real.id); return; }
    if (k === "r") { e.preventDefault(); openMoveCardDialog(real.id); return; }
  };
  m.overlay.addEventListener("keydown", modalKeyHandler);

  function close() { m.close(); }
  function refresh() {
    completeBtn.textContent = real.completed ? "✓ Hotovo (vrátit)" : "Označit hotovo";
  }
}

function pickMembers(card, board) {
  return new Promise(resolve => {
    const ul = el("ul", { class:"picker-list", role:"listbox" });
    const allMembers = (board.members && board.members.length)
      ? board.members.map(getMember).filter(Boolean)
      : state.members.slice();
    if (!allMembers.length) {
      const note = el("p", { class:"muted" }, "Žádní členové. Přidej v sekci „Členové“ nebo přidej členy nástěnce v jejím nastavení.");
      const m = openModal({ title: T("pickMembers"), body: note, size:"small",
        footer: [el("button", { class:"ghost", onclick: () => { m.close(); resolve(null); } }, T("close"))] });
      return;
    }
    allMembers.forEach(mb => {
      const isOn = (card.members || []).includes(mb.id);
      const btn = el("button", { class: "picker-row" + (isOn ? " on" : ""), role:"option", "aria-selected": isOn ? "true" : "false" },
        memberAvatar(mb, "sm"), mb.name, isOn ? " ✓" : "");
      btn.addEventListener("click", () => {

      footer: [el("button", { class:"primary", onclick: () => { m.close(); resolve(true); } }, T("close"))] });
  });
}

function pickCard() {

function saveCardAsTemplate(card) {
  if (!state.cardTemplates) state.cardTemplates = [];
  const tpl = deepClone(card);
  tpl.id = uid("tpl_");
  tpl.isTemplate = true;
  tpl.templateName = card.title;
  tpl.archived = false;
  delete tpl.activity;
  delete tpl.comments;
  state.cardTemplates.push(tpl);
  saveState();
}
function instantiateCardTemplate(tplId, listId) {
  const tpl = (state.cardTemplates || []).find(t => t.id === tplId);
  if (!tpl) return null;
  const c = newCard(listId, tpl.title, { skipNaturalDate: true });
  c.description = tpl.description;
  c.labels = (tpl.labels || []).slice();
  c.members = (tpl.members || []).slice();
  c.checklists = deepClone(tpl.checklists || []).map(cl => { cl.id = uid("cl_"); cl.items.forEach(i => i.id = uid("ci_")); return cl; });
  c.customFieldValues = deepClone(tpl.customFieldValues || {});
  saveState();
  return c;
}

//#region ============= TABLE VIEW =============
function renderTableView(container, board) {
  const cards = cardsInBoard(board.id).filter(c => !c.archived);
  const wrap = el("div", { class:"view-wrap table-view" });
  const table = el("table", { class:"data-table", "aria-label": board.name });
  const thead = el("thead");
  const headerRow = el("tr");
  const cols = [
    { key:"title", label:T("cardName") },
    { key:"list", label:"List" },
    { key:"labels", label:T("labels") },
    { key:"members", label:T("members") },
    { key:"dueDate", label:T("dueDate") },
    { key:"completed", label:T("completed") },
  ];
  let sortKey = state.ui.tableSort || "title";
  let sortDir = state.ui.tableDir || 1;
  cols.forEach(c => {
    const th = el("th", { scope:"col" });
    const b = el("button", { class:"th-sort", onclick: () => {
      if (sortKey === c.key) sortDir = -sortDir; else { sortKey = c.key; sortDir = 1; }
      state.ui.tableSort = sortKey; state.ui.tableDir = sortDir;
      saveState(); renderView();
    } }, c.label, sortKey === c.key ? (sortDir > 0 ? " ▲" : " ▼") : "");
    th.appendChild(b);
    headerRow.appendChild(th);
  });
  thead.appendChild(headerRow);
  table.appendChild(thead);
  const tbody = el("tbody");
  const sorted = cards.slice().sort((a, b) => {
    let av, bv;
    if (sortKey === "list") { av = (getList(a.listId) || {}).position || 0; bv = (getList(b.listId) || {}).position || 0; }
    else if (sortKey === "labels") { av = (a.labels || []).length; bv = (b.labels || []).length; }
    else if (sortKey === "members") { av = (a.members || []).length; bv = (b.members || []).length; }
    else if (sortKey === "completed") { av = a.completed ? 1 : 0; bv = b.completed ? 1 : 0; }
    else { av = a[sortKey] || ""; bv = b[sortKey] || ""; }
    return av < bv ? -sortDir : av > bv ? sortDir : 0;
  });
  sorted.forEach(c => {
    const tr = el("tr", { tabindex:"0" });
    tr.addEventListener("dblclick", () => openCardDetail(c.id));
    tr.addEventListener("keydown", e => { if (e.key === "Enter") openCardDetail(c.id); });
    const titleTd = el("td");
    titleTd.appendChild(el("button", { class:"link-btn", onclick: () => openCardDetail(c.id) }, c.title));
    tr.appendChild(titleTd);
    tr.appendChild(el("td", {}, (getList(c.listId) || {}).name || ""));
    const lblTd = el("td");
    (c.labels || []).forEach(lid => {
      const l = getLabel(c.boardId, lid);
      if (l) lblTd.appendChild(el("span", { class:"label-chip-named", style:{ background: colorVar(l.color), color:"#fff" } }, l.name));
    });
    tr.appendChild(lblTd);
    const memTd = el("td");
    (c.members || []).forEach(mid => {
      const m = getMember(mid);
      if (m) memTd.appendChild(memberAvatar(m, "sm"));
    });
    tr.appendChild(memTd);
    tr.appendChild(el("td", {}, c.dueDate ? formatDate(c.dueDate) : ""));
    tr.appendChild(el("td", {}, c.completed ? "✓" : ""));
    tbody.appendChild(tr);
  });
  table.appendChild(tbody);
  wrap.appendChild(table);
  if (!sorted.length) wrap.appendChild(el("p", { class:"muted" }, T("nothingHere")));
  container.appendChild(wrap);
}

//#region ============= CALENDAR VIEW =============
function renderCalendarView(container, board) {
  const wrap = el("div", { class:"view-wrap calendar-view" });
  const cur = state.ui.calCursor ? new Date(state.ui.calCursor) : new Date();
  cur.setDate(1);
  const monthNames = ["Leden","Únor","Březen","Duben","Květen","Červen","Červenec","Srpen","Září","Říjen","Listopad","Prosinec"];
  const mn = monthNames;
  const headBar = el("div", { class:"cal-head" });
  const prev = el("button", { class:"ghost", onclick: () => { cur.setMonth(cur.getMonth() - 1); state.ui.calCursor = cur.toISOString(); saveState(); renderView(); } }, "‹");
  const next = el("button", { class:"ghost", onclick: () => { cur.setMonth(cur.getMonth() + 1); state.ui.calCursor = cur.toISOString(); saveState(); renderView(); } }, "›");
  const todayBtn = el("button", { class:"ghost", onclick: () => { state.ui.calCursor = new Date().toISOString(); saveState(); renderView(); } }, T("today"));
  headBar.append(prev, el("h3", { style:{ margin:"0 8px" } }, mn[cur.getMonth()] + " " + cur.getFullYear()), next, todayBtn);
  wrap.appendChild(headBar);

  const grid = el("div", { class:"cal-grid", role:"grid" });
  const dow = ["Po","Út","St","Čt","Pá","So","Ne"];
  dow.forEach(d => grid.appendChild(el("div", { class:"cal-dow", role:"columnheader" }, d)));

  const start = startOfWeek(new Date(cur));
  const cards = (board ? cardsInBoard(board.id) : state.cards).filter(c => !c.deleted && !c.archived && c.dueDate);
  const byDay = {};
  // Klíč normalizujeme přes isoLocalDate — funguje stejně pro dueDate uložené jako "YYYY-MM-DD"
  // i pro stará data s časovou složkou (např. "YYYY-MM-DDTHH:MM:SSZ" z importu).
  cards.forEach(c => {
    const key = isoLocalDate(c.dueDate);
    (byDay[key] = byDay[key] || []).push(c);
  });

  for (let i = 0; i < 42; i++) {
    const day = addDays(start, i);
    const iso = isoLocalDate(day);
    const isOther = day.getMonth() !== cur.getMonth();
    const isTod = isToday(day);
    const cell = el("div", { class:"cal-cell" + (isOther ? " other" : "") + (isTod ? " today" : ""), role:"gridcell" });
    cell.appendChild(el("div", { class:"cal-date" }, day.getDate()));
    (byDay[iso] || []).forEach(c => {
      const b = el("button", { class:"cal-card" + (c.completed ? " done" : ""), onclick: () => openCardDetail(c.id) }, c.title);
      cell.appendChild(b);
    });
    grid.appendChild(cell);
  }
  wrap.appendChild(grid);
  container.appendChild(wrap);
}
//#endregion

//#region ============= TIMELINE VIEW =============
function renderTimelineView(container, board) {
  const wrap = el("div", { class:"view-wrap timeline-view" });
  const cards = cardsInBoard(board.id).filter(c => !c.archived && (c.startDate || c.dueDate));
  if (!cards.length) { wrap.appendChild(el("p", { class:"muted" }, "Karty bez termínů. Přidej startDate/dueDate.")); container.appendChild(wrap); return; }
  let minD = null, maxD = null;
  cards.forEach(c => {
    const s = c.startDate ? new Date(c.startDate) : new Date(c.dueDate);
    const e = c.dueDate ? new Date(c.dueDate) : new Date(c.startDate);
    if (!minD || s < minD) minD = s;
    if (!maxD || e > maxD) maxD = e;
  });
  const totalDays = Math.max(1, Math.round((maxD - minD) / 86400000) + 1);
  const tl = el("div", { class:"tl-wrap", role:"table", "aria-label":"Časová osa" });
  const head = el("div", { class:"tl-head", role:"row" });
  head.appendChild(el("div", { class:"tl-label", role:"rowheader" }, "Karta"));
  for (let i = 0; i < totalDays; i++) {
    const d = addDays(minD, i);
    head.appendChild(el("div", { class:"tl-day" + (isToday(d) ? " today" : ""), role:"columnheader" }, d.getDate() + "."));
  }
  tl.appendChild(head);
  cards.forEach(c => {
    const row = el("div", { class:"tl-row", role:"row" });
    row.appendChild(el("div", { class:"tl-label", role:"rowheader" }, el("button", { class:"link-btn", onclick: () => openCardDetail(c.id) }, c.title)));
    const s = c.startDate ? new Date(c.startDate) : new Date(c.dueDate);
    const e = c.dueDate ? new Date(c.dueDate) : new Date(c.startDate);
    const startIdx = Math.round((s - minD) / 86400000);
    const len = Math.max(1, Math.round((e - s) / 86400000) + 1);
    const bar = el("div", { class:"tl-bar" + (c.completed ? " done" : ""), style:{ marginLeft:(startIdx * 32) + "px", width:(len * 32 - 4) + "px" }, role:"cell", "aria-label": c.title + ", " + len + " dní" }, c.title);
    bar.addEventListener("click", () => openCardDetail(c.id));
    row.appendChild(bar);
    tl.appendChild(row);
  });
  wrap.appendChild(tl);
  container.appendChild(wrap);
}
//#endregion

//#region ============= SMART VIEWS =============
function renderSmartView(container, smart) {
  const wrap = el("div", { class:"view-wrap smart-view" });
  const titles = { today: T("today"), week: T("thisWeek"), overdue: T("overdue"), nodate: T("noDate"), completed: T("completed"), archive: T("archive"), trash: T("trash") };
  let cards = [];
  // Filtry jsou sjednocené s countSmart() — musí platit: pokud počítáme N karet v sidebaru,
  // vidíme jich přesně N v zobrazení. Používáme date-object porovnání (isToday, new Date < new Date),
  // ne string-srovnání, aby to fungovalo i pro termíny uložené včetně časové části.
  if (smart === "today") {
    cards = state.cards.filter(c => !c.deleted && !c.archived && !c.completed && c.dueDate && isToday(c.dueDate));
  }
  else if (smart === "week") {
    const start = startOfWeek();
    const end = addDays(start, 7);
    cards = state.cards.filter(c => !c.deleted && !c.archived && !c.completed && c.dueDate &&
      new Date(c.dueDate) >= start && new Date(c.dueDate) < end);
  }
  else if (smart === "overdue") cards = state.cards.filter(c => !c.deleted && !c.archived && !c.completed && c.dueDate && new Date(c.dueDate) < dateOnly(new Date()));
  else if (smart === "nodate") cards = state.cards.filter(c => !c.deleted && !c.archived && !c.completed && !c.dueDate && c.cardType !== "mirror");
  else if (smart === "completed") cards = state.cards.filter(c => !c.deleted && !c.archived && c.completed);
  else if (smart === "archive") cards = state.cards.filter(c => !c.deleted && c.archived);
  else if (smart === "trash") {
    // Smazané karty přes pole c.deleted (konzistentní s countSmart)
    const cs = state.cards.filter(c => c.deleted);
    const trashUl = el("ul", { class:"smart-list" });
    if (!cs.length) trashUl.appendChild(el("li", { class:"muted" }, T("nothingHere")));
    cs.forEach(c => {
      const li = el("li");
      li.appendChild(el("strong", {}, c.title));
      const restore = el("button", { class:"ghost", onclick: () => { restoreCard(c.id); renderView(); toast(T("restored"), "success"); } }, T("unarchive"));
      const perm = el("button", { class:"ghost danger", onclick: async () => {
        if (await confirm2("Smazat trvale? Tato akce je nevratná.", { danger:true })) { permanentDelete(c.id); renderView(); toast(T("deleted"), "warning"); sound.remove(); }
      } }, "Smazat trvale");
      li.append(" ", restore, " ", perm);
      trashUl.appendChild(li);
    });
    wrap.appendChild(trashUl);
    container.appendChild(wrap);
    return;
  }
  if (!cards.length) wrap.appendChild(el("p", { class:"muted" }, T("nothingHere")));
  else {
    // Seřadit: podle termínu (nejbližší první), pak podle názvu
    cards.sort((a, b) => {
      if (a.dueDate && b.dueDate) return new Date(a.dueDate) - new Date(b.dueDate);
      if (a.dueDate && !b.dueDate) return -1;
      if (!a.dueDate && b.dueDate) return 1;
      return (a.title || "").localeCompare(b.title || "", "cs");
    });
    const ul = el("ul", { class:"smart-list" });
    cards.forEach(c => {
      const li = el("li");
      const b = getBoard(c.boardId);
      const l = getList(c.listId);
      const btn = el("button", { class:"link-btn", onclick: () => openCardDetail(c.id) }, c.title);
      const metaParts = [];
      if (b) metaParts.push(b.name);
      if (l) metaParts.push(l.name);
      if (c.dueDate) metaParts.push(formatDate(c.dueDate));
      const meta = el("span", { class:"muted" }, " — " + metaParts.join(", "));
      li.append(btn, meta);
      ul.appendChild(li);
    });
    wrap.appendChild(ul);
  }
  container.appendChild(wrap);
}

function renderFilterView(container, filterId) {
  const f = state.savedFilters.find(x => x.id === filterId);
  const wrap = el("div", { class:"view-wrap" });
  if (!f) { wrap.appendChild(el("p", {}, "Filtr nenalezen.")); container.appendChild(wrap); return; }
  const cards = applyFilter(f);
  if (!cards.length) wrap.appendChild(el("p", { class:"muted" }, T("nothingHere")));
  const ul = el("ul", { class:"smart-list" });
  cards.forEach(c => {
    const b = getBoard(c.boardId);
    const l = getList(c.listId);
    const parts = [];
    if (b) parts.push(b.name);
    if (l) parts.push(l.name);
    const li = el("li");
    li.append(el("button", { class:"link-btn", onclick: () => openCardDetail(c.id) }, c.title), " ", el("span", { class:"muted" }, "— " + parts.join(", ")));
    ul.appendChild(li);
  });
  wrap.appendChild(ul);
  container.appendChild(wrap);
}
function applyFilter(f) {
  const q = (f.query || "").toLowerCase();
  return state.cards.filter(c => {
    if (c.archived && !f.includeArchived) return false;
    if (c.completed && !f.includeCompleted) return false;
    if (q && !(c.title.toLowerCase().includes(q) || (c.description || "").toLowerCase().includes(q))) return false;
    if (f.boardId && c.boardId !== f.boardId) return false;
    if (f.labelId && !(c.labels || []).includes(f.labelId)) return false;
    if (f.memberId && !(c.members || []).includes(f.memberId)) return false;
    return true;
  });
}

//#region ============= POMODORO =============
let _pomoTimer = null;
function startPomodoro(cardId) {
  if (state.pomodoro.active) stopPomodoro();
  state.pomodoro = { active:true, cardId, startedAt: Date.now(), type:"work", completed: state.pomodoro.completed || 0 };
  saveState();
  sound.pomoStart();
  toast(T("pomoStarted", state.settings.pomodoroWork), "success");
  scheduleNextPomo();
  updatePomoIndicator();
}
function stopPomodoro() {
  if (_pomoTimer) clearTimeout(_pomoTimer);
  state.pomodoro = { active:false, cardId:null, startedAt:null, type:"work", completed: state.pomodoro.completed || 0 };
  saveState();
  updatePomoIndicator();
}
function scheduleNextPomo() {
  if (_pomoTimer) clearTimeout(_pomoTimer);
  const dur = (state.pomodoro.type === "work" ? state.settings.pomodoroWork : state.settings.pomodoroBreak) * 60 * 1000;
  const elapsed = Date.now() - state.pomodoro.startedAt;
  const remaining = Math.max(0, dur - elapsed);
  _pomoTimer = setTimeout(() => {
    if (state.pomodoro.type === "work") {
      // log time on card
      if (state.pomodoro.cardId) {
        const c = getCard(state.pomodoro.cardId);
        if (c) {
          if (!c.time) c.time = { estimateSec:0, spentSec:0, runningSince:null };
          c.time.spentSec = (c.time.spentSec || 0) + state.settings.pomodoroWork * 60;
        }
      }
      state.pomodoro.completed = (state.pomodoro.completed || 0) + 1;
      state.pomodoro.type = "break";
      state.pomodoro.startedAt = Date.now();
      saveState();
      sound.pomoEnd();
      announce(T("pomoBreak"), true);
      toast(T("pomoBreak"), "info");
      scheduleNextPomo();
    } else {
      sound.pomoEnd();
      announce(T("pomoDone"), true);
      toast(T("pomoDone"), "success");
      stopPomodoro();
    }
    updatePomoIndicator();
  }, remaining);
}
function updatePomoIndicator() {
  const e = $("#pomoIndicator");
  if (!e) return;
  if (!state.pomodoro.active) { e.textContent = ""; return; }
  const c = state.pomodoro.cardId ? getCard(state.pomodoro.cardId) : null;
  e.textContent = "⏱ " + (state.pomodoro.type === "work" ? "Práce" : "Pauza") + (c ? " — " + c.title : "");
}

// Editor jedné automatizace. Pokud automationId je null, vytvoří novou.
function openAutomationEditor(automationId, onSave) {
  const isNew = !automationId;
  const au = isNew
    ? { id: uid("au_"), name: "", description: "", enabled: true,
        trigger: { type: "manual", params: { buttonLabel: "Provést" } },
        conditions: [], actions: [], activeBoardIds: null }
    : deepClone(state.automations.find(a => a.id === automationId));
  if (!au) return;

  const form = el("div", { class:"automation-editor" });

  // --- Název ---
  const nameInp = el("input", { type:"text", value: au.name || "", id:"auName", "aria-label":"Název automatizace" });
  const nameFs = el("fieldset", {},
    el("legend", {}, "Název"),
    el("label", { for:"auName", class:"sr-only" }, "Název"),
    nameInp,
  );
  form.appendChild(nameFs);

  // --- Popis ---
  const descInp = el("textarea", { rows:"2", id:"auDesc", "aria-label":"Popis automatizace" }, au.description || "");
  const descFs = el("fieldset", {},
    el("legend", {}, "Popis (volitelný)"),
    el("label", { for:"auDesc", class:"sr-only" }, "Popis"),
    descInp,
  );
  form.appendChild(descFs);

  // --- Trigger ---
  const trigFs = el("fieldset", {}, el("legend", {}, "Kdy se spustí (trigger)"));
  const trigSel = el("select", { id:"auTrig", "aria-label":"Typ triggeru" });
  AUTOMATION_TRIGGERS.forEach(t => trigSel.appendChild(el("option", { value: t.type }, t.label)));
  trigSel.value = au.trigger?.type || "manual";
  trigFs.appendChild(el("label", { for:"auTrig" }, "Typ: ", trigSel));
  const trigParamsDiv = el("div", { class:"automation-params" });
  trigFs.appendChild(trigParamsDiv);
  form.appendChild(trigFs);

  function refreshTriggerParams() {
    clear(trigParamsDiv);
    const def = AUTOMATION_TRIGGERS.find(t => t.type === trigSel.value);
    if (!def) return;
    if (!au.trigger || au.trigger.type !== trigSel.value) {
      au.trigger = { type: trigSel.value, params: {} };
      // Pro manual trigger rovnou připrav defaultní text tlačítka
      if (trigSel.value === "manual" && !au.trigger.params.buttonLabel) au.trigger.params.buttonLabel = "Provést";
    }
    def.params.forEach(p => {
      const row = renderParamRow(p, au.trigger.params, { boardContext: null });
      trigParamsDiv.appendChild(row);
    });
  }
  trigSel.addEventListener("change", refreshTriggerParams);
  refreshTriggerParams();

  // --- Podmínky ---
  const condFs = el("fieldset", {}, el("legend", {}, "Podmínky (všechny musí platit)"));
  const condList = el("div");
  condFs.appendChild(condList);
  const addCondBtn = el("button", { class:"ghost", onclick: () => {
    au.conditions = au.conditions || [];
    au.conditions.push({ field: "title", op: "contains", value: "" });
    refreshConditions();
  } }, "+ Přidat podmínku");
  condFs.appendChild(addCondBtn);
  form.appendChild(condFs);

  function refreshConditions() {
    clear(condList);
    (au.conditions || []).forEach((cond, idx) => {
      const row = el("div", { class:"automation-row", role:"group", "aria-label":"Podmínka " + (idx+1) });
      const fieldSel = el("select", { "aria-label":"Pole" });
      AUTOMATION_CONDITION_FIELDS.forEach(f => fieldSel.appendChild(el("option", { value: f.key }, f.label)));
      fieldSel.value = cond.field;
      const opSel = el("select", { "aria-label":"Operátor" });
      const valWrap = el("span");
      function refreshOp() {
        const fDef = AUTOMATION_CONDITION_FIELDS.find(f => f.key === fieldSel.value);
        clear(opSel);
        if (fDef) fDef.ops.forEach(op => opSel.appendChild(el("option", { value: op }, OPERATOR_LABELS[op] || op)));
        if (!fDef || !fDef.ops.includes(cond.op)) cond.op = fDef?.ops[0];
        opSel.value = cond.op;
        refreshVal();
      }
      function refreshVal() {
        clear(valWrap);
        const fDef = AUTOMATION_CONDITION_FIELDS.find(f => f.key === fieldSel.value);
        if (!fDef || fDef.valueType === "none") return;
        const valElm = renderValueInput(fDef.valueType, cond.value, (v) => { cond.value = v; });
        valWrap.appendChild(valElm);
      }
      fieldSel.addEventListener("change", () => { cond.field = fieldSel.value; refreshOp(); });
      opSel.addEventListener("change", () => { cond.op = opSel.value; });
      refreshOp();
      const rm = el("button", { class:"ghost small", "aria-label":"Odebrat podmínku", onclick: () => {
        au.conditions.splice(idx, 1); refreshConditions();
      } }, "×");
      row.append(fieldSel, " ", opSel, " ", valWrap, " ", rm);
      condList.appendChild(row);
    });
    if (!(au.conditions || []).length) {
      condList.appendChild(el("p", { class:"muted small" }, "(žádné podmínky — automatizace se spustí vždy při triggeru)"));
    }
  }
  refreshConditions();

  // --- Akce ---
  const actFs = el("fieldset", {}, el("legend", {}, "Akce (provedou se v pořadí)"));
  const actList = el("div");
  actFs.appendChild(actList);
  const addActBtn = el("button", { class:"ghost", onclick: () => {
    au.actions = au.actions || [];
    au.actions.push({ type: AUTOMATION_ACTIONS[0].type, params: {} });
    refreshActions();
  } }, "+ Přidat akci");
  actFs.appendChild(addActBtn);
  form.appendChild(actFs);

  function refreshActions() {
    clear(actList);
    (au.actions || []).forEach((act, idx) => {
      const row = el("div", { class:"automation-row", role:"group", "aria-label":"Akce " + (idx+1) });
      const typeSel = el("select", { "aria-label":"Typ akce" });
      AUTOMATION_ACTIONS.forEach(a => typeSel.appendChild(el("option", { value: a.type }, a.label)));
      typeSel.value = act.type;
      const paramsDiv = el("div", { class:"automation-params" });
      function refreshParams() {
        clear(paramsDiv);
        const def = AUTOMATION_ACTIONS.find(a => a.type === typeSel.value);
        if (!def) return;
        if (act.type !== typeSel.value) { act.type = typeSel.value; act.params = {}; }
        def.params.forEach(p => {
          const r = renderParamRow(p, act.params, { boardContext: null });
          paramsDiv.appendChild(r);
        });
      }
      typeSel.addEventListener("change", () => { act.type = typeSel.value; act.params = {}; refreshParams(); });
      refreshParams();
      const up = el("button", { class:"ghost small", "aria-label":"Posunout nahoru", onclick: () => {
        if (idx === 0) return;
        const t = au.actions[idx-1]; au.actions[idx-1] = au.actions[idx]; au.actions[idx] = t;
        refreshActions();
      } }, "↑");
      const dn = el("button", { class:"ghost small", "aria-label":"Posunout dolů", onclick: () => {
        if (idx === au.actions.length-1) return;
        const t = au.actions[idx+1]; au.actions[idx+1] = au.actions[idx]; au.actions[idx] = t;
        refreshActions();
      } }, "↓");
      const rm = el("button", { class:"ghost small", "aria-label":"Odebrat akci", onclick: () => {
        au.actions.splice(idx, 1); refreshActions();
      } }, "×");
      const headerRow = el("div", {}, typeSel, " ", up, dn, rm);
      row.append(headerRow, paramsDiv);
      actList.appendChild(row);
    });
    if (!(au.actions || []).length) {
      actList.appendChild(el("p", { class:"muted small" }, "(žádné akce — přidej alespoň jednu, jinak pravidlo nic neudělá)"));
    }
  }
  refreshActions();

  // --- Scope ---
  const scopeFs = el("fieldset", {}, el("legend", {}, "Kde je aktivní"));
  const allRb = el("input", { type:"radio", name:"auScope", id:"auScopeAll", checked: !au.activeBoardIds || au.activeBoardIds.length === 0 });
  const selRb = el("input", { type:"radio", name:"auScope", id:"auScopeSel", checked: !!(au.activeBoardIds && au.activeBoardIds.length) });
  const boardChecks = el("div", { id:"auBoardChecks", style:{ display: selRb.checked ? "" : "none", paddingLeft:"20px", marginTop:"6px" } });
  function refreshBoardChecks() {
    clear(boardChecks);
    const boards = state.boards.filter(b => !b.archived);
    if (!boards.length) boardChecks.appendChild(el("p", { class:"muted small" }, "Žádné nástěnky."));
    boards.forEach(b => {
      const cbId = "aubrd_" + b.id;
      const cb = el("input", { type:"checkbox", id: cbId, checked: (au.activeBoardIds || []).includes(b.id) });
      cb.addEventListener("change", () => {
        au.activeBoardIds = au.activeBoardIds || [];
        if (cb.checked) {
          if (!au.activeBoardIds.includes(b.id)) au.activeBoardIds.push(b.id);
        } else {
          au.activeBoardIds = au.activeBoardIds.filter(x => x !== b.id);
        }
      });
      boardChecks.appendChild(el("label", { for: cbId, style:{ display:"block" } }, cb, " ", b.name));
    });
  }
  refreshBoardChecks();
  allRb.addEventListener("change", () => { if (allRb.checked) { au.activeBoardIds = null; boardChecks.style.display = "none"; } });
  selRb.addEventListener("change", () => { if (selRb.checked) { au.activeBoardIds = au.activeBoardIds || []; boardChecks.style.display = ""; refreshBoardChecks(); } });
  scopeFs.appendChild(el("label", { for:"auScopeAll" }, allRb, " Aktivní na všech nástěnkách"));
  scopeFs.appendChild(el("label", { for:"auScopeSel", style:{ display:"block", marginTop:"4px" } }, selRb, " Jen na vybraných:"));
  scopeFs.appendChild(boardChecks);
  form.appendChild(scopeFs);

  // --- Enabled ---
  const enCb = el("input", { type:"checkbox", id:"auEnabled", checked: !!au.enabled });
  form.appendChild(el("fieldset", {},
    el("legend", {}, "Stav"),
    el("label", { for:"auEnabled" }, enCb, " Zapnuto"),
  ));

  // --- Nápověda pro placeholdery ---
  form.appendChild(el("fieldset", {},
    el("legend", {}, "Placeholdery pro texty"),
    el("p", { class:"small" },
      "V textových polích akcí (setTitle, setDescription, addComment, addToInbox, toast) lze použít: " +
      "{{card.title}}, {{card.description}}, {{card.dueDate}}, {{card.dueRel}} (např. „za 3 dny“), " +
      "{{card.labels}}, {{card.members}}, {{list.name}}, {{board.name}}, " +
      "{{date}}, {{time}}, {{today}}, {{yesterday}}, {{tomorrow}}."),
  ));

  openModal({
    title: isNew ? "Nová automatizace" : "Upravit automatizaci",
    body: form,
    size: "large",
    footer: [
      el("button", { class:"ghost", onclick: function() { this.closest(".modal-overlay").click(); } }, T("cancel")),
      el("button", { class:"primary", onclick: function() {
        au.name = nameInp.value.trim() || "(bez názvu)";
        au.description = descInp.value.trim();
        au.enabled = enCb.checked;
        state.automations = state.automations || [];
        if (isNew) {
          state.automations.push(au);
        } else {
          const idx = state.automations.findIndex(x => x.id === au.id);
          if (idx >= 0) state.automations[idx] = au;
          else state.automations.push(au);
        }
        saveState();
        this.closest(".modal-overlay").click();
        sound.add();
        toast(isNew ? "Automatizace vytvořena." : "Automatizace uložena.", "success");
        announce(isNew ? "Automatizace vytvořena." : "Automatizace uložena.");
        if (typeof onSave === "function") onSave();
        renderAll();
      } }, T("save")),
    ],
  });
  setTimeout(() => nameInp.focus(), 60);
}

// Vykreslí řádek pro jeden parametr (label + vhodný input). `params` je objekt, do kterého píšeme hodnoty.
function renderParamRow(paramDef, params, ctx) {
  const row = el("div", { class:"field-row" });
  const id = "auP_" + paramDef.key + "_" + uid("p_");
  row.appendChild(el("label", { for: id }, paramDef.label + (paramDef.required ? " *" : "")));
  if (params[paramDef.key] == null && paramDef.defaultValue != null) params[paramDef.key] = paramDef.defaultValue;
  const inputEl = renderValueInput(paramDef.type, params[paramDef.key], (v) => { params[paramDef.key] = v; }, paramDef.options);
  inputEl.id = id;
  row.appendChild(inputEl);
  return row;
}

// Vykreslí vhodný input podle typu hodnoty (text / number / date / select / label / member / list / cardType / textarea).
function renderValueInput(valueType, currentValue, setValue, options) {
  if (valueType === "textarea") {
    const ta = el("textarea", { rows:"3" }, currentValue != null ? String(currentValue) : "");
    ta.addEventListener("input", () => setValue(ta.value));
    return ta;
  }
  if (valueType === "number") {
    const inp = el("input", { type:"number", value: currentValue != null ? String(currentValue) : "" });
    inp.addEventListener("input", () => setValue(inp.value === "" ? null : Number(inp.value)));
    return inp;
  }
  if (valueType === "date") {
    const inp = el("input", { type:"date", value: currentValue || "" });
    inp.addEventListener("input", () => setValue(inp.value));
    return inp;
  }
  if (valueType === "select" && Array.isArray(options)) {
    const sel = el("select");
    options.forEach(o => sel.appendChild(el("option", { value: o.value }, o.label)));
    if (currentValue != null) sel.value = String(currentValue);
    sel.addEventListener("change", () => setValue(sel.value));
    // Propagate default initial value
    if (currentValue == null && options.length) setValue(options[0].value);
    return sel;
  }
  if (valueType === "label") {
    const sel = el("select");
    sel.appendChild(el("option", { value: "" }, "— vyberte štítek —"));
    // Unikátní názvy štítků napříč všemi nástěnkami (abstrahujeme přes jméno,
    // takže „Hotovo“ na nástěnce A a B je v automatizaci jeden štítek)
    const names = new Set();
    state.boards.filter(b => !b.archived).forEach(b => {
      (b.labels || []).forEach(l => { if (l.name) names.add(l.name); });
    });
    const sorted = Array.from(names).sort((a, b) => a.localeCompare(b, "cs"));
    sorted.forEach(n => sel.appendChild(el("option", { value: n }, n)));
    // Zpětná kompatibilita: pokud currentValue je staré ID, převedeme na jméno
    const resolved = resolveAutomationLabelName(currentValue);
    if (resolved) sel.value = resolved;
    sel.addEventListener("change", () => setValue(sel.value));
    return sel;
  }
  if (valueType === "member") {
    const sel = el("select");
    sel.appendChild(el("option", { value: "" }, "— vyberte člena —"));
    state.members.forEach(m => sel.appendChild(el("option", { value: m.id }, m.name)));
    if (currentValue) sel.value = currentValue;
    sel.addEventListener("change", () => setValue(sel.value));
    return sel;
  }
  if (valueType === "list") {
    const sel = el("select");
    sel.appendChild(el("option", { value: "" }, "— vyberte seznam —"));
    state.boards.filter(b => !b.archived).forEach(b => {
      const og = el("optgroup", { label: b.name });
      (state.lists.filter(l => l.boardId === b.id && !l.archived) || []).forEach(l => og.appendChild(el("option", { value: l.id }, l.name)));
      sel.appendChild(og);
    });
    if (currentValue) sel.value = currentValue;
    sel.addEventListener("change", () => setValue(sel.value));
    return sel;
  }
  if (valueType === "cardType") {
    const sel = el("select");
    [["normal","Běžná"],["habit","Návyk"],["note","Poznámka"]].forEach(([v,l]) => sel.appendChild(el("option", { value:v }, l)));
    if (currentValue) sel.value = currentValue;
    sel.addEventListener("change", () => setValue(sel.value));
    return sel;
  }
  // default: text
  const inp = el("input", { type:"text", value: currentValue != null ? String(currentValue) : "" });
  inp.addEventListener("input", () => setValue(inp.value));
  return inp;
}

//#region ============= EXPORT / IMPORT =============
function exportJson() {
  downloadBlob(JSON.stringify(state, null, 2), "kanban-export.json", "application/json");
}
function exportCsv() {
  const rows = [["board","list","title","labels","members","dueDate","completed","description"]];
  state.cards.filter(c => !c.archived).forEach(c => {
    const b = getBoard(c.boardId), l = getList(c.listId);
    const labels = (c.labels || []).map(lid => { const x = getLabel(c.boardId, lid); return x ? x.name : ""; }).filter(Boolean).join(";");
    const members = (c.members || []).map(mid => { const m = getMember(mid); return m ? m.name : ""; }).filter(Boolean).join(";");
    rows.push([b ? b.name : "", l ? l.name : "", c.title, labels, members, c.dueDate || "", c.completed ? "1" : "0", (c.description || "").replace(/[\r\n]+/g, " ")]);
  });
  const csv = rows.map(r => r.map(v => '"' + String(v).replace(/"/g, '""') + '"').join(",")).join("\n");
  downloadBlob("\uFEFF" + csv, "kanban-export.csv", "text/csv;charset=utf-8");
}
function exportMarkdown() {
  let out = "# mrello export\n\n";
  state.boards.filter(b => !b.archived).forEach(b => {
    out += "## " + b.name + "\n\n";
    listsInBoard(b.id).forEach(l => {
      out += "### " + l.name + "\n\n";
      cardsInList(l.id).filter(c => !c.archived).forEach(c => {
        out += "- " + (c.completed ? "[x]" : "[ ]") + " **" + c.title + "**" + (c.dueDate ? " (do " + c.dueDate + ")" : "") + "\n";
        if (c.description) out += "  " + c.description.replace(/\n/g, "\n  ") + "\n";
      });
      out += "\n";
    });
  });
  downloadBlob(out, "kanban-export.md", "text/markdown");
}
function exportIcs() {
  let out = "BEGIN:VCALENDAR\r\nVERSION:2.0\r\nPRODID:-//mrello//CS\r\n";
  state.cards.filter(c => !c.archived && c.dueDate).forEach(c => {
    const dt = c.dueDate.replace(/-/g, "");
    out += "BEGIN:VEVENT\r\nUID:" + c.id + "@kanban\r\nDTSTART;VALUE=DATE:" + dt + "\r\nDTEND;VALUE=DATE:" + dt + "\r\nSUMMARY:" + c.title.replace(/[\r\n,;]/g, " ") + "\r\n";
    if (c.description) out += "DESCRIPTION:" + c.description.replace(/[\r\n]+/g, " ").replace(/[,;]/g, " ") + "\r\n";
    out += "END:VEVENT\r\n";
  });
  out += "END:VCALENDAR\r\n";
  downloadBlob(out, "kanban-export.ics", "text/calendar");
}
//#endregion

//#region ============= AUTOMATIONS =============
// Popis ústředního konceptu:
//   Automatizace = pojmenované pravidlo. Má trigger (co ho spouští), conditions (filtr — všechny musí platit),
//   a sekvenci akcí, které se provedou. Automatizace jsou globální (v state.automations) a na úrovni nástěnky se
//   rozhoduje, zda je konkrétní automatizace aktivní (activeBoardIds).
//   Automatizace s trigger.type === "manual" se NESPOUŠTÍ automaticky — jen se zobrazí tlačítko v detailu karty,
//   kde ji uživatel spustí ručně.
//
// Veřejné rozhraní:
//   runAutomationsFor(eventType, context)    — volá se z míst, kde se věci dějí (po toggleCardComplete atd.)
//   runAutomationManually(automationId, cardId) — volá se z tlačítka v detailu karty
//   substituteTemplate(text, context)         — nahradí {{placeholdery}} v textu

const AUTOMATION_MAX_DEPTH = 5;
let _automationDepth = 0;

// ---------- Placeholdery ----------
function substituteTemplate(text, ctx) {
  if (!text) return "";
  const card = ctx.card || null;
  const list = card ? getList(card.listId) : null;
  const board = card ? getBoard(card.boardId) : null;
  const now = new Date();
  const map = {
    "card.title": card ? card.title : "",
    "card.description": card ? (card.description || "") : "",
    "card.dueDate": card && card.dueDate ? formatDate(card.dueDate) : "",
    "card.dueRel": card && card.dueDate ? (function() {
      const d = daysFromNow(card.dueDate);
      if (d == null) return "";
      if (d === 0) return "dnes";
      if (d === 1) return "zítra";
      if (d === -1) return "včera";
      if (d > 0) return "za " + d + " dní";
      return "před " + (-d) + " dny";
    })() : "",
    "card.labels": card ? (card.labels || []).map(id => { const l = getLabel(card.boardId, id); return l ? l.name : ""; }).filter(Boolean).join(", ") : "",
    "card.members": card ? (card.members || []).map(id => { const m = getMember(id); return m ? m.name : ""; }).filter(Boolean).join(", ") : "",
    "card.cardType": card ? (card.cardType || "normal") : "",
    "list.name": list ? list.name : "",
    "board.name": board ? board.name : "",
    "date": now.toLocaleDateString("cs-CZ"),
    "time": now.toLocaleTimeString("cs-CZ", { hour:"2-digit", minute:"2-digit" }),
    "today": isoLocalDate(now),
    "yesterday": isoLocalDate(addDays(now, -1)),
    "tomorrow": isoLocalDate(addDays(now, 1)),
    "now": now.toISOString(),
  };
  return String(text).replace(/\{\{\s*([a-zA-Z0-9_.]+)\s*\}\}/g, (m, key) => {
    return (key in map) ? map[key] : m;
  });
}

// ---------- Evaluátor podmínek ----------
// Každá podmínka je { field, op, value }.
// Štítky se v automatizacích ukládají jako NÁZEV, aby fungovaly napříč všemi nástěnkami.
// Pro zpětnou kompatibilitu (staré automatizace ukládaly label ID) podporujeme oba tvary:
// pokud hodnota vypadá jako label ID ("l_..."), převedeme ji na název. Jinak se bere jako název.
function resolveAutomationLabelName(ref) {
  if (!ref) return "";
  if (typeof ref === "string" && /^l_[a-z0-9]+/i.test(ref)) {
    for (const b of state.boards || []) {
      const l = (b.labels || []).find(x => x.id === ref);
      if (l) return l.name;
    }
  }
  return ref;
}
function evalCondition(cond, card) {
  if (!card) return false;
  const { field, op, value } = cond;
  // Speciální handling pro štítky: v automatizacích se ukládá NÁZEV štítku, ne ID
  // (štítek „Hotovo“ existuje na více nástěnkách jako různá ID, ale pro automatizace se
  // s ním pracuje jednotně přes jméno). Pro zpětnou kompatibilitu tolerujeme i stará ID.
  if (field === "labels" && (op === "includes" || op === "notIncludes")) {
    const targetName = resolveAutomationLabelName(value);
    const has = (card.labels || []).some(lid => {
      const l = getLabel(card.boardId, lid);
      return l && l.name === targetName;
    });
    return op === "includes" ? has : !has;
  }
  let actual;
  switch (field) {
    case "title":        actual = card.title || ""; break;
    case "description":  actual = card.description || ""; break;
    case "labels":       actual = card.labels || []; break;
    case "members":      actual = card.members || []; break;
    case "list":         actual = card.listId; break;
    case "completed":    actual = !!card.completed; break;
    case "archived":     actual = !!card.archived; break;
    case "cardType":     actual = card.cardType || "normal"; break;
    case "hasDue":       actual = !!card.dueDate; break;
    case "due":          actual = card.dueDate; break;
    case "dueWithinDays":{
      if (!card.dueDate) return false;
      const d = daysFromNow(card.dueDate);
      return d != null && d <= Number(value) && d >= 0;
    }
    case "checklistPercent": {
      const p = checklistProgress(card);
      actual = p.total ? Math.round(p.done * 100 / p.total) : 0;
      break;
    }
    case "commentCount":    actual = (card.comments || []).length; break;
    case "attachmentCount": actual = (card.attachments || []).length; break;
    default: return false;
  }
  switch (op) {
    case "equals":      return String(actual) === String(value);
    case "notEquals":   return String(actual) !== String(value);
    case "contains":    return String(actual).toLowerCase().includes(String(value).toLowerCase());
    case "notContains": return !String(actual).toLowerCase().includes(String(value).toLowerCase());
    case "includes":    return Array.isArray(actual) && actual.includes(value);
    case "notIncludes": return Array.isArray(actual) && !actual.includes(value);
    case "isTrue":      return actual === true;
    case "isFalse":     return actual === false;
    case "isEmpty":     return Array.isArray(actual) ? actual.length === 0 : !actual;
    case "notEmpty":    return Array.isArray(actual) ? actual.length > 0 : !!actual;
    case "lessThan":    return Number(actual) < Number(value);
    case "greaterThan": return Number(actual) > Number(value);
    case "lessOrEqual": return Number(actual) <= Number(value);
    case "greaterOrEqual": return Number(actual) >= Number(value);
  }
  return false;
}
function evalAllConditions(conditions, card) {
  return !conditions || !conditions.length || conditions.every(c => evalCondition(c, card));
}

// ---------- Matcher triggerů ----------
// Vrátí true, pokud trigger pravidla odpovídá eventu.
function triggerMatches(trigger, eventType, eventContext) {
  if (!trigger || trigger.type !== eventType) return false;
  const p = trigger.params || {};
  const c = eventContext || {};
  switch (eventType) {
    case "card.created":
      if (p.inList && p.inList !== c.card?.listId) return false;
      return true;
    case "card.moved":
      if (p.fromList && p.fromList !== c.fromListId) return false;
      if (p.toList && p.toList !== c.toListId) return false;
      return true;
    case "card.completed":
    case "card.uncompleted":
    case "card.archived":
    case "card.unarchived":
      return true;
    case "card.labelAdded":
    case "card.labelRemoved":
      if (p.labelId) {
        // p.labelId je název štítku. c.labelId je skutečné ID — dohledáme jeho název na boardu karty
        const targetName = resolveAutomationLabelName(p.labelId);
        const actualLabel = c.card ? getLabel(c.card.boardId, c.labelId) : null;
        if (!actualLabel || actualLabel.name !== targetName) return false;
      }
      return true;
    case "card.memberAdded":
    case "card.memberRemoved":
      if (p.memberId && p.memberId !== c.memberId) return false;
      return true;
    case "card.dueChanged":
      return true;
    case "card.checklistCompleted":
      return true;
    case "card.commentAdded":
      if (p.contains && !String(c.commentText || "").toLowerCase().includes(String(p.contains).toLowerCase())) return false;
      return true;
    case "schedule.daily":
    case "schedule.dueSoon":
    case "schedule.overdue":
    case "schedule.inactive":
      // schedule triggery se kontrolují samostatně v automationScheduleTick
      return false;
    case "manual":
      return false;  // manual se nespouští eventem
  }
  return false;
}

// ---------- Kontrola, zda je automatizace aktivní na dané nástěnce ----------
function isAutomationActiveOnBoard(au, boardId) {
  if (!au.enabled) return false;
  if (!au.activeBoardIds || au.activeBoardIds.length === 0) return true;  // null/prázdné = aktivní všude
  return au.activeBoardIds.includes(boardId);
}

// ---------- Hlavní dispatcher ----------
// eventType: "card.moved", "card.completed", ...
// context: { card, ...další parametry }
function runAutomationsFor(eventType, context) {
  if (!state.automations || !state.automations.length) return;
  if (_automationDepth >= AUTOMATION_MAX_DEPTH) {
    console.warn("Automation depth limit reached, skipping");
    return;
  }
  const card = context.card;
  const boardId = card ? card.boardId : null;
  _automationDepth++;
  try {
    for (const au of state.automations) {
      if (boardId && !isAutomationActiveOnBoard(au, boardId)) continue;
      if (!boardId && !au.enabled) continue;
      if (!triggerMatches(au.trigger, eventType, context)) continue;
      if (!evalAllConditions(au.conditions || [], card)) continue;
      runActions(au.actions || [], context);
    }
  } finally {
    _automationDepth--;
  }
}

// Ručně spuštěná automatizace z detailu karty
function runAutomationManually(automationId, cardId) {
  const au = (state.automations || []).find(a => a.id === automationId);
  if (!au) return;
  const card = getCard(cardId);
  if (!card) return;
  if (!evalAllConditions(au.conditions || [], card)) {
    toast("Automatizace „" + au.name + "“ — podmínky nesplněny.", "warning");
    return;
  }
  runActions(au.actions || [], { card });
  saveState();
  renderView();
  toast("Automatizace „" + au.name + "“ provedena.", "success");
  announce("Automatizace " + au.name + " provedena.");
  sound.click();
}

// ---------- Executor akcí ----------
function runActions(actions, context) {
  for (const act of actions) {
    try {
      execAction(act, context);
    } catch (e) {
      console.error("Automatizace: chyba v akci", act, e);
      toast("Chyba v akci " + act.type + ": " + e.message, "error");
    }
  }
}
function execAction(act, ctx) {
  const card = ctx.card;
  const p = act.params || {};
  switch (act.type) {
    case "setTitle": {
      if (!card) return;
      const newTitle = substituteTemplate(p.text || "", ctx);
      card.title = newTitle;
      card.updatedAt = Date.now();
      logActivity(card, "Automatizace přejmenovala kartu na „" + newTitle + "“");
      break;
    }
    case "setDescription": {
      if (!card) return;
      const text = substituteTemplate(p.text || "", ctx);
      if (p.mode === "append") card.description = (card.description || "") + (card.description ? "\n\n" : "") + text;
      else if (p.mode === "prepend") card.description = text + (card.description ? "\n\n" : "") + (card.description || "");
      else card.description = text;
      card.updatedAt = Date.now();
      logActivity(card, "Automatizace upravila popis");
      break;
    }
    case "addLabel": {
      if (!card || !p.labelId) return;
      // p.labelId je NÁZEV štítku (globální napříč nástěnkami). Najdi nebo vytvoř na boardu karty.
      const labelName = resolveAutomationLabelName(p.labelId);
      const board = getBoard(card.boardId);
      if (!board) return;
      let lbl = (board.labels || []).find(l => l.name === labelName);
      if (!lbl) {
        // Vytvoř na této nástěnce nový štítek s tímto jménem (výchozí barva)
        lbl = addLabel(card.boardId, labelName, labelColors[0]);
      }
      if (lbl && !card.labels.includes(lbl.id)) {
        card.labels.push(lbl.id);
        logActivity(card, "Automatizace přidala štítek „" + lbl.name + "“");
      }
      break;
    }
    case "removeLabel": {
      if (!card || !p.labelId) return;
      // Odebere všechny štítky s daným názvem (pokud jich je víc se stejným jménem na jedné nástěnce)
      const labelName = resolveAutomationLabelName(p.labelId);
      const board = getBoard(card.boardId);
      if (!board) return;
      const toRemove = (board.labels || []).filter(l => l.name === labelName).map(l => l.id);
      const before = card.labels.length;
      card.labels = card.labels.filter(x => !toRemove.includes(x));
      if (card.labels.length !== before) {
        logActivity(card, "Automatizace odebrala štítek „" + labelName + "“");
      }
      break;
    }
    case "removeAllLabels": {
      if (!card) return;
      card.labels = [];
      break;
    }
    case "addMember": {
      if (!card || !p.memberId) return;
      if (!card.members.includes(p.memberId)) card.members.push(p.memberId);
      break;
    }
    case "removeMember": {
      if (!card || !p.memberId) return;
      card.members = card.members.filter(x => x !== p.memberId);
      break;
    }
    case "setDue": {
      if (!card) return;
      if (p.mode === "remove") card.dueDate = null;
      else if (p.mode === "relative") {
        const days = Number(p.days || 0);
        card.dueDate = isoLocalDate(addDays(new Date(), days));
      } else if (p.mode === "absolute" && p.date) {
        card.dueDate = p.date;
      }
      card.updatedAt = Date.now();
      break;
    }
    case "setCompleted": {
      if (!card) return;
      const target = !!p.completed;
      if (card.completed !== target) {
        card.completed = target;
        card.completedAt = target ? Date.now() : null;
        card.updatedAt = Date.now();
        logActivity(card, target ? T("activityCompleted") : T("activityUncompleted"));
        if (target) runAutomationsFor("card.completed", { card });
        else runAutomationsFor("card.uncompleted", { card });
      }
      break;
    }
    case "archive": {
      if (!card) return;
      if (!card.archived) {
        card.archived = true;
        card.updatedAt = Date.now();
        logActivity(card, T("activityArchived"));
        runAutomationsFor("card.archived", { card });
      }
      break;
    }
    case "unarchive": {
      if (!card) return;
      if (card.archived) {
        card.archived = false;
        card.updatedAt = Date.now();
        logActivity(card, T("activityUnarchived"));
      }
      break;
    }
    case "move": {
      if (!card || !p.toList) return;
      const fromListId = card.listId;
      const newList = getList(p.toList);
      if (!newList) return;
      const oldName = getList(fromListId)?.name || "?";
      card.listId = p.toList;
      card.boardId = newList.boardId;
      card.updatedAt = Date.now();
      logActivity(card, T("activityMoved", oldName, newList.name));
      runAutomationsFor("card.moved", { card, fromListId, toListId: p.toList });
      break;
    }
    case "addComment": {
      if (!card) return;
      const text = substituteTemplate(p.text || "", ctx);
      card.comments = card.comments || [];
      card.comments.push({ id: uid("cm_"), text, createdAt: Date.now(), author: "Automatizace" });
      logActivity(card, T("activityCommented"));
      runAutomationsFor("card.commentAdded", { card, commentText: text });
      break;
    }
    case "addToInbox": {
      const text = substituteTemplate(p.text || "", ctx);
      state.inbox.push({ id: uid("ib_"), text, createdAt: Date.now(), cardId: card ? card.id : null });
      break;
    }
    case "toast": {
      const text = substituteTemplate(p.text || "", ctx);
      toast(text, p.kind || "info", 4000);
      break;
    }
    case "playSound": {
      const s = p.sound || "click";
      if (sound[s]) sound[s]();
      break;
    }
    case "archiveCompletedInList": {
      if (!card) return;
      const listId = p.listId || card.listId;
      const cs = cardsInList(listId).filter(c => c.completed && !c.archived);
      cs.forEach(c => { c.archived = true; c.updatedAt = Date.now(); });
      if (cs.length) toast("Archivováno " + cs.length + " hotových karet.", "success");
      break;
    }
    case "setEstimate": {
      if (!card) return;
      card.time = card.time || { estimateSec: 0, spentSec: 0, runningSince: null };
      card.time.estimateSec = Math.round(Number(p.hours || 0) * 3600);
      card.updatedAt = Date.now();
      break;
    }
    default:
      console.warn("Neznámý typ akce:", act.type);
  }
}

// ---------- Časové automatizace ----------
// Každých 30 minut kontrolujeme schedule triggery.
// Každý den v xx:xx: schedule.daily
// N dní před termínem: schedule.dueSoon
// N dní po termínu:   schedule.overdue
// N dní bez aktivity: schedule.inactive
function automationScheduleTick() {
  if (!state.automations || !state.automations.length) return;
  const now = new Date();
  const today = isoLocalDate(now);
  for (const au of state.automations) {
    if (!au.enabled) continue;
    const t = au.trigger;
    if (!t) continue;
    if (t.type === "schedule.daily") {
      // Spustit jednou denně, pokud čas už nastal a dnes ještě neběžel
      const lastRun = au._lastRun || "";
      const runHM = t.params?.atTime || "08:00";
      const [hh, mm] = runHM.split(":").map(Number);
      const triggerTime = new Date(now);
      triggerTime.setHours(hh || 0, mm || 0, 0, 0);
      if (now >= triggerTime && lastRun !== today) {
        au._lastRun = today;
        // Denní běh: akce bez konkrétní karty (např. toast / addToInbox)
        runActions(au.actions || [], { card: null });
        saveState();
      }
    } else if (t.type === "schedule.dueSoon") {
      const daysBefore = Number(t.params?.daysBefore || 1);
      state.cards.forEach(card => {
        if (card.archived || card.completed || !card.dueDate) return;
        const d = daysFromNow(card.dueDate);
        if (d === daysBefore) {
          const key = au.id + ":" + card.id + ":" + card.dueDate;
          au._ran = au._ran || {};
          if (au._ran[key]) return;
          au._ran[key] = today;
          if (!evalAllConditions(au.conditions || [], card)) return;
          if (!isAutomationActiveOnBoard(au, card.boardId)) return;
          runActions(au.actions || [], { card });
        }
      });
    } else if (t.type === "schedule.overdue") {
      const daysAfter = Number(t.params?.daysAfter || 1);
      state.cards.forEach(card => {
        if (card.archived || card.completed || !card.dueDate) return;
        const d = daysFromNow(card.dueDate);
        if (d === -daysAfter) {
          const key = au.id + ":" + card.id + ":" + card.dueDate;
          au._ran = au._ran || {};
          if (au._ran[key]) return;
          au._ran[key] = today;
          if (!evalAllConditions(au.conditions || [], card)) return;
          if (!isAutomationActiveOnBoard(au, card.boardId)) return;
          runActions(au.actions || [], { card });
        }
      });
    }
  }
  saveState();
}

function triggerLabel(trigger) {
  if (!trigger) return "(bez triggeru)";
  const def = AUTOMATION_TRIGGERS.find(t => t.type === trigger.type);
  return def ? def.label : trigger.type;
}
function actionLabel(action) {
  const def = AUTOMATION_ACTIONS.find(a => a.type === action.type);
  return def ? def.label : action.type;
}

//#region ============= APPLY THEME =============
function applyTheme() {
  const t = state.settings.theme;
  let resolved = t;
  if (t === "auto") {
    resolved = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
  }
  document.documentElement.setAttribute("data-theme", resolved);
  document.documentElement.setAttribute("data-fontsize", state.settings.fontSize || "normal");
  document.documentElement.toggleAttribute("data-high-contrast", !!state.settings.highContrast);
}
//#endregion

//#region ============= GITHUB URL LOADER =============
// Parse `?gh=owner/repo/branch/path` nebo `?gh=owner/repo/path` (default branch = main)
// Pokud je repo veřejné, stáhne přes raw.githubusercontent.com bez tokenu.
// Pokud selže (404/401), zkusí přes GitHub API s tokenem (pokud je nastaven).
function parseGhParam(param) {
  if (!param) return null;
  // povolené znaky: písmena, čísla, pomlčky, podtržítka, tečky, lomítka
  const parts = param.split("/").filter(Boolean);
  if (parts.length < 3) return null;
  const owner = parts[0];
  const repo = parts[1];
  // Heuristika: druhý segment může být větev (pokud je to jedno slovo a následuje cesta)
  // Pokud má třetí segment tečku / příponu a další segmenty neexistují, pak je cesta jedna část.
  // Zkusíme nejběžnější tvar: owner/repo/branch/file.json  → branch = parts[2], path = parts[3..]
  // Alternativně owner/repo/file.json → branch = "main", path = parts[2..]
  let branch, path;
  if (parts.length === 3) {
    branch = "main";
    path = parts[2];
  } else {
    branch = parts[2];
    path = parts.slice(3).join("/");
  }
  return { owner, repo, branch, path };
}

async function tryLoadFromGhUrl() {
  const qs = new URLSearchParams(location.search);
  const ghParam = qs.get("gh");
  if (!ghParam) return false;
  const info = parseGhParam(ghParam);
  if (!info) { toast("Neplatný parametr ?gh (formát: owner/repo/branch/path).", "error"); return false; }
  // Žádný potvrzovací dialog — URL parametr znamená "načti tohle teď a vždy".
  // Pokud uživatel chce uložit lokální změny, musí kliknout na sync PŘED otevřením URL.
  // Tímto je GitHub vždy single source of truth a konflikt mezi zařízeními nevzniká.
  try {
    toast("Načítám z GitHubu…", "info", 2000);
    announce("Načítám data z GitHubu.");
    let text = null;
    // Pokus 1: raw.githubusercontent.com (veřejný obsah, bez tokenu)
    const rawUrl = `https://raw.githubusercontent.com/${encodeURIComponent(info.owner)}/${encodeURIComponent(info.repo)}/${encodeURIComponent(info.branch)}/${info.path.split("/").map(encodeURIComponent).join("/")}`;
    try {
      const r = await fetch(rawUrl, { cache: "no-cache" });
      if (r.ok) text = await r.text();
    } catch {}
    // Pokus 2: GitHub API s tokenem (pokud veřejný raw selhal a máme token)
    if (!text) {
      try {
        const tok = state.github.token || (await getGhTokenAsync());
        if (!tok) throw new Error("Token není nastaven (repo asi privátní).");
        const apiUrl = `https://api.github.com/repos/${encodeURIComponent(info.owner)}/${encodeURIComponent(info.repo)}/contents/${info.path.split("/").map(encodeURIComponent).join("/")}?ref=${encodeURIComponent(info.branch)}`;
        const r = await fetch(apiUrl, { headers: { "Authorization": "token " + tok, "Accept": "application/vnd.github+json" }});
        if (!r.ok) throw new Error("GitHub API vrátil " + r.status);
        const j = await r.json();
        if (!j.content) throw new Error("Odpověď neobsahuje content.");
        text = atob(j.content.replace(/\s+/g, ""));
        // base64 → UTF-8
        try { text = decodeURIComponent(escape(text)); } catch {}
      } catch (e) {
        throw new Error("Stažení selhalo: " + e.message);
      }
    }
    const data = JSON.parse(text);
    state = mergeLoadedState(data);
    // URL má přednost: sync tlačítko bude vždy ukládat na stejné místo, odkud se načetlo.
    state.github.owner = info.owner;
    state.github.repo = info.repo;
    state.github.branch = info.branch;
    state.github.path = info.path;
    state.github.enabled = true;  // umožní sync bez cesty do Nastavení
    state.github.lastLoadAt = new Date().toISOString();
    // Systémová změna: stav právě přišel z GitHubu, není co označovat jako „dirty".
    state.github.dirtySince = null;
    _skipNextDirty = true;
    await saveState();
    updateSyncButtonLabel();
    toast("Načteno z GitHubu.", "success", 4000);
    announce("Data z GitHubu načtena.");
    sound.sync();
    return true;
  } catch (e) {
    toast("Chyba při načítání: " + e.message, "error", 6000);
    state.github.lastErrorAt = new Date().toISOString();
    state.github.lastErrorMessage = "Načítání: " + e.message;
    saveState();
    updateSyncButtonLabel();
    sound.err();
    return false;
  }
}
// Pomocná funkce: vyžádá si token (pokud je uložený zašifrovaný)
async function getGhTokenAsync() {
  if (state.github.token) return state.github.token;
  // TODO: zde by se dal dešifrovat encrypted token přes heslo uživatele;
  // momentálně v této verzi ho ale ukládáme jen rovnou do stavu (ne zašifrovaný),
  // takže stačí to co je výše.
  return null;
}

//#region ============= INIT =============
async function init() {
  // load state
  try {
    const data = await idbLoad();
    if (data) state = mergeLoadedState(data);
  } catch (e) {
    try {
      const ls = localStorage.getItem(STORAGE_KEY);
      if (ls) state = mergeLoadedState(JSON.parse(ls));
    } catch {}
  }
  if (!state.workspaces.length) state.workspaces.push({ id: uid("ws_"), name:"Můj prostor", createdAt: Date.now() });
  if (!state.ui.currentWorkspace) state.ui.currentWorkspace = state.workspaces[0].id;
  applyTheme();
  applyI18n();
  renderAll();

  // Pokud je v URL parametr ?gh=owner/repo/branch/path, nabídne načtení po vykreslení UI
  // (modální dialog s potvrzením, protože přepíše lokální data)
  tryLoadFromGhUrl().then(loaded => { if (loaded) renderAll(); });

  // resume Pomodoro?
  if (state.pomodoro && state.pomodoro.active) scheduleNextPomo();

  // header buttons
  $("#sidebarToggleBtn").addEventListener("click", toggleSidebar);
  $("#ghSyncBtn").addEventListener("click", async () => {
    // Když není GitHub nakonfigurovaný, otevři nastavení a upozorni
    if (!state.github.enabled || !state.github.owner || !state.github.repo || !state.github.path) {
      toast("Nejdřív nastav GitHub v Nastavení (vlastník, repozitář, cesta).", "warning", 5000);
      sound.err();
      openSettings();
      return;
    }
    const btn = $("#ghSyncBtn");
    btn.disabled = true;
    btn.textContent = "⟳ Synchronizuji…";
    btn.style.opacity = "0.6";
    announce("Synchronizuji s GitHubem.");
    try {
      await ghSave();
      state.github.lastSyncAt = new Date().toISOString();
      state.github.lastErrorAt = null;
      state.github.lastErrorMessage = null;
      state.github.dirtySince = null;
      _skipNextDirty = true;  // systémová změna, neoznačovat jako dirty
      saveState();
      announce("Synchronizováno.");
      sound.sync();
    } catch (e) {
      state.github.lastErrorAt = new Date().toISOString();
      state.github.lastErrorMessage = e.message || "neznámá chyba";
      saveState();
      announce("Chyba synchronizace: " + (e.message || "neznámá chyba"));
      toast("Chyba synchronizace: " + (e.message || "neznámá chyba"), "error", 6000);
      sound.err();
    } finally {
      btn.disabled = false;
      btn.style.opacity = "";
      updateSyncButtonLabel();
    }
  });
  // Hned při startu nastav popisek podle uložených časů (a pravidelně ho aktualizuj)
  updateSyncButtonLabel();
  setInterval(updateSyncButtonLabel, 30 * 1000);  // přepočet textu „před N min" každých 30 s
  $("#wsManage").addEventListener("click", openWorkspaceManager);
  $("#wsSelect").addEventListener("change", (e) => { state.ui.currentWorkspace = e.target.value; state.ui.currentView = { type:"welcome" }; saveState(); renderAll(); });
  $("#newBoardBtn").addEventListener("click", promptNewBoard);
  $("#quickCaptureBtn").addEventListener("click", openQuickCapture);
  $("#inboxBtn").addEventListener("click", () => { state.ui.currentView = { type:"inbox" }; renderAll(); });
  $("#plannerBtn").addEventListener("click", () => { state.ui.currentView = { type:"planner" }; renderAll(); });
  $("#stickyBtn").addEventListener("click", () => { state.ui.currentView = { type:"stickies" }; renderAll(); });
  $("#membersBtn").addEventListener("click", () => { state.ui.currentView = { type:"members" }; renderAll(); });
  $("#themeBtn").addEventListener("click", () => {
    const order = ["auto","light","dark"];
    state.settings.theme = order[(order.indexOf(state.settings.theme) + 1) % order.length];
    applyTheme(); saveState();
    toast("Téma: " + state.settings.theme, "info");
  });
  $("#helpBtn").addEventListener("click", openHelp);
  $("#settingsBtn").addEventListener("click", openSettings);

  const search = $("#globalSearch");
  search.addEventListener("input", debounce((e) => {
    const q = e.target.value;
    if (q && q.length >= 2) { state.ui.currentView = { type:"search", query: q }; renderView(); }
  }, 250));
  search.addEventListener("keydown", (e) => {
    if (e.key === "Enter") { state.ui.currentView = { type:"search", query: e.target.value }; renderView(); }
    if (e.key === "Escape") { e.target.value = ""; state.ui.currentView = { type:"welcome" }; renderAll(); }
  });

  // global shortcuts (aktivní jen mimo formulářové prvky)
  document.addEventListener("keydown", (e) => {
    if (e.target.matches("input, textarea, select, [contenteditable]")) return;
    if (e.metaKey || e.ctrlKey || e.altKey) return;
    switch (e.key) {
      case "/":  e.preventDefault(); search.focus(); search.select(); return;
      case "?":  e.preventDefault(); openHelp(); return;
      case "n": case "N":  e.preventDefault(); openQuickCapture(); return;
      case "m": case "M":  e.preventDefault(); createNewSticky(); return;
      case "g": case "G":  e.preventDefault(); pickBoardGoto(); return;
      case "b": case "B":  e.preventDefault(); cycleBoard(1); return;
      case "i": case "I":  e.preventDefault(); state.ui.currentView = { type:"inbox" }; renderAll(); return;
      case "p": case "P":  e.preventDefault(); state.ui.currentView = { type:"planner" }; renderAll(); return;
      case "t": case "T":
        e.preventDefault();
        state.settings.theme = state.settings.theme === "dark" ? "light" : (state.settings.theme === "light" ? "auto" : "dark");
        applyTheme(); saveState();
        announce("Téma: " + state.settings.theme);
        return;
      case "h": case "H":  e.preventDefault(); toggleSidebar(); return;
      case "Escape":
        if (state.ui.focusCardId) { state.ui.focusCardId = null; document.body.classList.remove("focus-mode"); renderAll(); }
        else if (state.ui.selectedCards && state.ui.selectedCards.length) { state.ui.selectedCards = []; renderView(); }
        return;
    }
  });

  setGhStatus(state.github.enabled ? "" : "", state.github.enabled ? "GitHub OK" : "");

  // Periodická kontrola: habit streak reset po zmeškaném dni
  setInterval(() => {
    const today = isoLocalDate(new Date());
    state.cards.forEach(c => {
      if (c.cardType === "habit" && c.habit && c.habit.lastCompleted && c.habit.lastCompleted !== today) {
        const last = new Date(c.habit.lastCompleted);
        const days = Math.round((dateOnly(new Date()) - last) / 86400000);
        if (days > 1) c.habit.streak = 0;
      }
    });
  }, 60 * 1000);

  // Automatizace: každé 2 minuty kontrola schedule triggerů (denně v HH:MM, N dní před termínem, …)
  setInterval(automationScheduleTick, 2 * 60 * 1000);
  // První kontrola po 5 sekundách (po načtení UI)
  setTimeout(automationScheduleTick, 5000);
}

function openWorkspaceManager() {
  const body = el("div");
  const ul = el("ul");
  function refresh() {
    clear(ul);
    state.workspaces.forEach(ws => {
      const li = el("li");
      const name = el("input", { type:"text", value: ws.name });
      name.addEventListener("change", () => { ws.name = name.value; saveState(); renderAll(); });
      const del = el("button", { class:"ghost danger", onclick: async () => {
        if (state.workspaces.length === 1) { toast("Musí zůstat alespoň jeden prostor.", "warning"); return; }
        if (await confirm2("Smazat prostor a všechny jeho nástěnky?", { danger:true })) {
          state.boards.filter(b => b.workspaceId === ws.id).forEach(b => deleteBoard(b.id));
          state.workspaces = state.workspaces.filter(x => x.id !== ws.id);
          if (state.ui.currentWorkspace === ws.id) state.ui.currentWorkspace = state.workspaces[0].id;
          saveState(); renderAll(); refresh();
        }
      } }, T("delete"));
      li.append(name, " ", del);
      ul.appendChild(li);
    });
  }
  refresh();
  const addRow = el("div", { class:"add-row" });
  const ni = el("input", { type:"text", placeholder:"Nový prostor" });
  const addBtn = el("button", { class:"ghost", onclick: () => {
    if (!ni.value.trim()) return;
    newWorkspace(ni.value.trim());
    ni.value = ""; refresh(); renderAll(); sound.add();
  } }, "+");
  addRow.append(ni, addBtn);
  body.append(ul, addRow);
  openModal({ title: T("manageWorkspaces"), body, size:"medium",
    footer: [el("button", { class:"primary", onclick: function() { this.closest(".modal-overlay").click(); } }, T("close"))]
  });
}

document.addEventListener("DOMContentLoaded", init);
//#endregion

</script>
