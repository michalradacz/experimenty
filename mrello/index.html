<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="color-scheme" content="light dark">
<title>mrello</title>
<link rel="manifest" href="data:application/json,%7B%22name%22%3A%22mrello%22%2C%22short_name%22%3A%22mrello%22%2C%22start_url%22%3A%22.%22%2C%22display%22%3A%22standalone%22%2C%22background_color%22%3A%22%23ffffff%22%7D">
<style>
:root {
  --bg: #ffffff;
  --bg-alt: #f4f5f7;
  --bg-card: #ffffff;
  --bg-list: #ebecf0;
  --bg-modal: #ffffff;
  --bg-input: #ffffff;
  --bg-hover: #e9ecef;
  --bg-active: #dfe1e6;
  --bg-badge: #e0e2e6;
  --fg: #172b4d;
  --fg-muted: #5e6c84;
  --fg-subtle: #7a869a;
  --border: #dfe1e6;
  --border-strong: #b3bac5;
  --accent: #0052cc;
  --accent-hover: #0747a6;
  --accent-fg: #ffffff;
  --danger: #de350b;
  --danger-bg: #ffebe6;
  --warning: #ff8b00;
  --warning-bg: #fff7e6;
  --success: #00875a;
  --success-bg: #e3fcef;
  --info: #0065ff;
  --info-bg: #deebff;
  --focus: #4c9aff;
  --shadow: 0 1px 2px rgba(9,30,66,.08), 0 0 1px rgba(9,30,66,.16);
  --shadow-lg: 0 8px 24px rgba(9,30,66,.18);
  --radius: 6px;
  --radius-sm: 3px;
  --gap: 8px;
  --header-h: 48px;
  --sidebar-w: 260px;
  --label-c1: #61bd4f; --label-c2: #f2d600; --label-c3: #ff9f1a;
  --label-c4: #eb5a46; --label-c5: #c377e0; --label-c6: #0079bf;
  --label-c7: #00c2e0; --label-c8: #51e898; --label-c9: #ff78cb;
  --label-c10: #344563;
  --member-c1: #0052cc; --member-c2: #00875a; --member-c3: #de350b;
  --member-c4: #ff8b00; --member-c5: #6554c0; --member-c6: #00b8d9;
  --member-c7: #ff5630; --member-c8: #36b37e; --member-c9: #5243aa;
  --member-c10: #008da6;
}
[data-theme="dark"] {
  --bg: #1d2125;
  --bg-alt: #161a1d;
  --bg-card: #22272b;
  --bg-list: #101204;
  --bg-list: #161a1d;
  --bg-modal: #282e33;
  --bg-input: #22272b;
  --bg-hover: #2c333a;
  --bg-active: #38414a;
  --bg-badge: #38414a;
  --fg: #b6c2cf;
  --fg-muted: #9fadbc;
  --fg-subtle: #8c9bab;
  --border: #38414a;
  --border-strong: #5e6f81;
  --accent: #579dff;
  --accent-hover: #85b8ff;
  --accent-fg: #1d2125;
  --danger: #f87168;
  --danger-bg: #42221f;
  --warning: #f5cd47;
  --warning-bg: #432913;
  --success: #7ee2b8;
  --success-bg: #164b35;
  --info: #579dff;
  --info-bg: #09326c;
  --focus: #85b8ff;
  --shadow: 0 1px 2px rgba(0,0,0,.4), 0 0 1px rgba(0,0,0,.4);
  --shadow-lg: 0 8px 24px rgba(0,0,0,.6);
}
[data-contrast="high"] {
  --border: #000;
  --border-strong: #000;
  --fg-muted: var(--fg);
  --fg-subtle: var(--fg);
}
[data-contrast="high"][data-theme="dark"] {
  --border: #fff;
  --border-strong: #fff;
}
[data-fontsize="small"] { font-size: 13px; }
[data-fontsize="normal"] { font-size: 15px; }
[data-fontsize="large"] { font-size: 18px; }

@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: .001ms !important;
    transition-duration: .001ms !important;
  }
}

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; height: 100%; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
  background: var(--bg);
  color: var(--fg);
  line-height: 1.45;
  overflow: hidden;
}
button, input, select, textarea {
  font: inherit;
  color: inherit;
}
button {
  cursor: pointer;
  background: transparent;
  border: 1px solid transparent;
  border-radius: var(--radius);
  padding: 6px 10px;
  color: var(--fg);
}
button:hover:not(:disabled) { background: var(--bg-hover); }
button:active:not(:disabled) { background: var(--bg-active); }
button:disabled { opacity: .5; cursor: not-allowed; }
button.primary {
  background: var(--accent);
  color: var(--accent-fg);
  border-color: var(--accent);
}
button.primary:hover:not(:disabled) { background: var(--accent-hover); border-color: var(--accent-hover); }
button.danger {
  background: var(--danger);
  color: #fff;
  border-color: var(--danger);
}
button.ghost { border: 1px solid var(--border); }
button.icon-btn {
  padding: 6px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-width: 32px;
  min-height: 32px;
}
input[type="text"], input[type="search"], input[type="email"], input[type="url"],
input[type="number"], input[type="date"], input[type="time"], input[type="datetime-local"],
input[type="password"], select, textarea {
  background: var(--bg-input);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 6px 8px;
  width: 100%;
  max-width: 100%;
}
input[type="checkbox"], input[type="radio"] {
  width: 16px;
  height: 16px;
  margin: 0 6px 0 0;
  vertical-align: middle;
}
textarea { resize: vertical; min-height: 80px; font-family: inherit; }
select { padding-right: 24px; }
:focus-visible {
  outline: 2px solid var(--focus);
  outline-offset: 2px;
}
a { color: var(--accent); }
a:hover { color: var(--accent-hover); }

.sr-only {
  position: absolute !important;
  width: 1px; height: 1px;
  padding: 0; margin: -1px;
  overflow: hidden;
  clip: rect(0,0,0,0);
  white-space: nowrap;
  border: 0;
}
.skip-link {
  position: absolute;
  left: -9999px;
  top: 0;
  background: var(--accent);
  color: var(--accent-fg);
  padding: 8px 12px;
  z-index: 9999;
  text-decoration: none;
}
.skip-link:focus { left: 8px; top: 8px; }

/* Header */
header.app-header {
  height: var(--header-h);
  background: var(--bg-alt);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 12px;
  gap: 8px;
  position: relative;
  z-index: 10;
}
header.app-header h1 {
  font-size: 16px;
  margin: 0;
  font-weight: 600;
  white-space: nowrap;
}
.header-divider {
  width: 1px;
  height: 24px;
  background: var(--border);
  margin: 0 4px;
}
.header-actions {
  margin-left: auto;
  display: flex;
  gap: 4px;
  align-items: center;
}
.header-search {
  width: 220px;
}
.header-title {
  font-weight: 600;
  font-size: 18px;
  margin-left: 4px;
}
.view-tabs {
  display: flex;
  gap: 2px;
}
.view-tabs button {
  padding: 4px 10px;
  border-radius: var(--radius);
  font-size: 13px;
}
.view-tabs button[aria-pressed="true"] {
  background: var(--bg-active);
  font-weight: 600;
}

/* Layout */
.app-brand {
  font-weight: 700;
  font-size: 16px;
  letter-spacing: .02em;
  padding: 0 4px;
}
.app-layout {
  display: grid;
  grid-template-columns: var(--sidebar-w) 1fr;
  height: calc(100vh - var(--header-h));
}
.app-layout.no-sidebar { grid-template-columns: 0 1fr; }
.app-layout.no-sidebar .sidebar { display: none; }
/* H1 názvu nástěnky v hlavní části */
.view-h1 {
  margin: 0 0 12px;
  font-size: 22px;
  font-weight: 700;
  color: var(--fg);
}
.sidebar {
  background: var(--bg-alt);
  border-right: 1px solid var(--border);
  overflow-y: auto;
  padding: 12px 8px;
}
.sidebar.hidden { display: none; }
.sidebar h2 {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: .04em;
  color: var(--fg-muted);
  margin: 16px 8px 4px;
  font-weight: 700;
}
.sidebar h2:first-of-type { margin-top: 0; }
.sidebar-list {
  list-style: none;
  padding: 0;
  margin: 0;
}
.sidebar-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 8px;
  border-radius: var(--radius);
  cursor: pointer;
  width: 100%;
  text-align: left;
  border: none;
  font-size: 14px;
  color: var(--fg);
}
.sidebar-item:hover { background: var(--bg-hover); }
.sidebar-item.active { background: var(--bg-active); font-weight: 600; }
.sidebar-item .badge {
  margin-left: auto;
  font-size: 11px;
  background: var(--bg-badge);
  padding: 1px 6px;
  border-radius: 10px;
  font-weight: 500;
}

main.app-main {
  overflow: auto;
  position: relative;
  background: var(--bg);
}

/* Board view */
.board-bar {
  padding: 8px 12px;
  display: flex;
  align-items: center;
  gap: 8px;
  border-bottom: 1px solid var(--border);
  background: var(--bg-alt);
  flex-wrap: wrap;
}
.board-bar h2 {
  margin: 0;
  font-size: 18px;
  font-weight: 600;
}
.lists-container {
  display: flex;
  gap: 12px;
  padding: 12px;
  overflow-x: auto;
  align-items: flex-start;
  min-height: calc(100vh - var(--header-h) - 90px);
}
.list {
  background: var(--bg-list);
  border-radius: var(--radius);
  width: 280px;
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  max-height: calc(100vh - var(--header-h) - 110px);
}
/* Skrytý sloupec — úzký proužek s názvem seznamu, klikni pro zobrazení */
.list.list-collapsed {
  width: 36px;
  min-width: 36px;
  background: var(--bg-list);
  border: 1px dashed var(--border);
  align-items: stretch;
  padding: 0;
}
.list.list-collapsed .list-expand-btn {
  flex: 1;
  width: 100%;
  min-height: 100%;
  background: transparent;
  border: none;
  padding: 10px 4px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  writing-mode: vertical-rl;
  text-orientation: mixed;
  color: var(--fg);
  text-align: left;
  white-space: nowrap;
}
.list.list-collapsed .list-expand-btn:hover,
.list.list-collapsed .list-expand-btn:focus {
  background: var(--bg-alt);
  outline: 2px solid var(--accent);
  outline-offset: -2px;
}
.list-header {
  padding: 10px 12px 6px;
  display: flex;
  align-items: center;
  gap: 4px;
}
.list-name {
  font-weight: 600;
  flex: 1;
  font-size: 14px;
  background: transparent;
  border: 1px solid transparent;
  padding: 2px 4px;
  border-radius: var(--radius-sm);
  width: 100%;
  margin: 0;
}
.list-name:focus, .list-name:hover { background: var(--bg); border-color: var(--border); }
.list-count {
  font-size: 11px;
  color: var(--fg-muted);
  padding: 2px 6px;
  background: var(--bg-badge);
  border-radius: 10px;
}
.list-count.over-wip {
  background: var(--danger);
  color: #fff;
}
.list-cards {
  padding: 4px 8px;
  overflow-y: auto;
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 6px;
  min-height: 20px;
}
.list-add {
  padding: 6px 8px 8px;
}
.list-add button {
  width: 100%;
  text-align: left;
  color: var(--fg-muted);
  padding: 6px 8px;
  font-size: 13px;
  border-radius: var(--radius);
}

.card {
  background: var(--bg-card);
  border-radius: var(--radius);
  padding: 8px 10px;
  box-shadow: var(--shadow);
  cursor: pointer;
  border: 2px solid transparent;
  font-size: 14px;
  position: relative;
}
.card:hover { background: var(--bg-hover); }
.card.dragging { opacity: .5; }
.card.kbd-grabbed { border-color: var(--accent); box-shadow: 0 0 0 3px var(--focus); }
.card.kbd-target { background: var(--bg-active); }
.card.selected { border-color: var(--accent); }
.card.dim { opacity: .35; }
.card.complete .card-title { text-decoration: line-through; color: var(--fg-muted); }
.card.overdue { border-left: 3px solid var(--danger); }
.card.due-soon { border-left: 3px solid var(--warning); }
.card-cover {
  margin: -8px -10px 8px;
  border-radius: var(--radius) var(--radius) 0 0;
  height: 40px;
}
.card-cover.full {
  margin: -8px -10px;
  height: auto;
  min-height: 60px;
  border-radius: var(--radius);
  display: flex;
  align-items: flex-end;
  padding: 8px 10px;
  color: #fff;
  text-shadow: 0 1px 2px rgba(0,0,0,.4);
}
.card-labels {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
  margin-bottom: 6px;
}
.label-chip {
  height: 8px;
  min-width: 32px;
  border-radius: 4px;
  display: inline-block;
}
.label-chip.named {
  height: auto;
  padding: 2px 8px;
  font-size: 11px;
  color: #fff;
  font-weight: 600;
  line-height: 1.4;
}
.card-title {
  word-wrap: break-word;
  white-space: pre-wrap;
}
.card-meta {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-top: 6px;
  font-size: 12px;
  color: var(--fg-muted);
  align-items: center;
}
.card-meta .meta-chip {
  display: inline-flex;
  align-items: center;
  gap: 3px;
  padding: 2px 5px;
  border-radius: var(--radius-sm);
  background: var(--bg-badge);
}
.card-meta .meta-chip.due {
  background: var(--warning-bg);
  color: var(--warning);
}
.card-meta .meta-chip.overdue {
  background: var(--danger-bg);
  color: var(--danger);
}
.card-meta .meta-chip.done {
  background: var(--success-bg);
  color: var(--success);
}
.card-members {
  display: inline-flex;
  gap: 2px;
  margin-left: auto;
}
.member-avatar {
  width: 24px;
  height: 24px;
  border-radius: 50%;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  color: #fff;
  font-size: 11px;
  font-weight: 600;
  border: 1px solid var(--bg-card);
}
.member-avatar.lg { width: 32px; height: 32px; font-size: 13px; }
.member-avatar.sm { width: 20px; height: 20px; font-size: 10px; }

/* Modal */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(9,30,66,.5);
  display: flex;
  align-items: flex-start;
  justify-content: center;
  padding: 40px 16px;
  z-index: 100;
  overflow-y: auto;
}
.modal {
  background: var(--bg-modal);
  border-radius: 8px;
  box-shadow: var(--shadow-lg);
  width: 100%;
  max-width: 760px;
  border: 1px solid var(--border);
}
.modal.small { max-width: 480px; }
.modal.large { max-width: 980px; }
.modal-header {
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 8px;
}
.modal-header h2 {
  margin: 0;
  font-size: 18px;
  flex: 1;
}
.modal-body { padding: 16px 20px; }
.modal-body.no-pad { padding: 0; }
.modal-footer {
  padding: 12px 20px;
  border-top: 1px solid var(--border);
  display: flex;
  gap: 8px;
  justify-content: flex-end;
}

/* Card detail */
.card-detail {
  display: grid;
  grid-template-columns: 1fr 200px;
  gap: 24px;
  padding: 16px 20px;
}
@media (max-width: 720px) {
  .card-detail { grid-template-columns: 1fr; }
}
.card-detail-section { margin-bottom: 20px; }
.card-detail-section h3 {
  font-size: 13px;
  text-transform: uppercase;
  letter-spacing: .04em;
  color: var(--fg-muted);
  margin: 0 0 8px;
  font-weight: 700;
}
.card-detail-title {
  font-size: 22px;
  font-weight: 600;
  width: 100%;
  background: transparent;
  border: 1px solid transparent;
  padding: 4px 6px;
  border-radius: var(--radius);
  margin-bottom: 8px;
}
.card-detail-title:focus, .card-detail-title:hover { background: var(--bg-input); border-color: var(--border); }
.card-sidebar-actions {
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.card-sidebar-actions button {
  text-align: left;
  border: 1px solid var(--border);
  padding: 8px 10px;
  font-size: 13px;
}
.checklist {
  margin-bottom: 16px;
}
.checklist-header {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-bottom: 6px;
}
.checklist-name {
  font-weight: 600;
  flex: 1;
  background: transparent;
  border: 1px solid transparent;
  padding: 2px 4px;
}
.checklist-name:focus { background: var(--bg-input); border-color: var(--border); }
.checklist-progress {
  font-size: 12px;
  color: var(--fg-muted);
}
.checklist-bar {
  height: 6px;
  background: var(--bg-badge);
  border-radius: 3px;
  overflow: hidden;
  margin-bottom: 6px;
}
.checklist-bar-fill {
  height: 100%;
  background: var(--success);
  transition: width .15s;
}
.checklist-items { list-style: none; padding: 0; margin: 0 0 6px; }
.checklist-item {
  display: flex;
  gap: 6px;
  padding: 4px 0;
  align-items: flex-start;
}
.checklist-item input[type="text"] {
  background: transparent;
  border: 1px solid transparent;
  padding: 2px 4px;
  flex: 1;
}
.checklist-item input[type="text"]:focus { background: var(--bg-input); border-color: var(--border); }
.checklist-item.done input[type="text"] { text-decoration: line-through; color: var(--fg-muted); }

.tag-row {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
  margin-bottom: 8px;
}

.activity-item {
  display: flex;
  gap: 8px;
  padding: 6px 0;
  font-size: 13px;
  border-bottom: 1px solid var(--border);
}
.activity-time {
  color: var(--fg-muted);
  font-size: 11px;
  white-space: nowrap;
}

.comment {
  padding: 8px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  margin-bottom: 6px;
  font-size: 13px;
}
.comment-header {
  display: flex;
  gap: 6px;
  font-size: 11px;
  color: var(--fg-muted);
  margin-bottom: 4px;
}

/* Table view */
.table-view {
  padding: 12px;
  overflow: auto;
}
table.cards-table {
  border-collapse: collapse;
  width: 100%;
  font-size: 13px;
}
table.cards-table th, table.cards-table td {
  border: 1px solid var(--border);
  padding: 6px 8px;
  text-align: left;
  vertical-align: top;
}
table.cards-table th {
  background: var(--bg-alt);
  font-weight: 600;
  position: sticky;
  top: 0;
  z-index: 2;
  cursor: pointer;
}
table.cards-table tr:hover td { background: var(--bg-hover); }
table.cards-table tr.row-overdue td { border-left: 3px solid var(--danger); }
table.cards-table tr.row-complete td { color: var(--fg-muted); text-decoration: line-through; }

/* Calendar view */
.calendar {
  padding: 12px;
}
.calendar-toolbar {
  display: flex;
  gap: 8px;
  align-items: center;
  margin-bottom: 12px;
}
.calendar-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
}
.calendar-head {
  background: var(--bg-alt);
  padding: 6px 8px;
  font-weight: 600;
  font-size: 12px;
  border-right: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
}
.calendar-cell {
  min-height: 100px;
  border-right: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
  padding: 4px;
  background: var(--bg);
  font-size: 12px;
}
.calendar-cell.other-month { background: var(--bg-alt); color: var(--fg-muted); }
.calendar-cell.today { background: var(--info-bg); }
.cal-day { font-weight: 600; }
.cal-event {
  display: block;
  background: var(--accent);
  color: var(--accent-fg);
  border-radius: var(--radius-sm);
  padding: 2px 4px;
  margin: 2px 0;
  font-size: 11px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  cursor: pointer;
  border: none;
  width: 100%;
  text-align: left;
}
.cal-event.overdue { background: var(--danger); }
.cal-event.done { background: var(--success); text-decoration: line-through; }

/* Timeline / Gantt */
.timeline {
  padding: 12px;
  overflow: auto;
}
.timeline-grid {
  position: relative;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  background: var(--bg);
}
.timeline-row {
  display: flex;
  border-bottom: 1px solid var(--border);
  position: relative;
  height: 32px;
  align-items: center;
}
.timeline-label {
  width: 200px;
  padding: 0 8px;
  border-right: 1px solid var(--border);
  font-size: 12px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  background: var(--bg-alt);
  height: 100%;
  display: flex;
  align-items: center;
  flex-shrink: 0;
}
.timeline-track {
  flex: 1;
  position: relative;
  height: 100%;
}
.timeline-bar {
  position: absolute;
  top: 6px;
  height: 20px;
  background: var(--accent);
  color: var(--accent-fg);
  border-radius: var(--radius-sm);
  padding: 0 6px;
  font-size: 11px;
  display: flex;
  align-items: center;
  cursor: pointer;
  border: none;
  overflow: hidden;
  white-space: nowrap;
}
.timeline-bar.overdue { background: var(--danger); }
.timeline-bar.done { background: var(--success); }
.timeline-axis {
  display: flex;
  border-bottom: 1px solid var(--border);
  background: var(--bg-alt);
}
.timeline-axis-cell {
  flex: 1;
  padding: 4px 6px;
  font-size: 11px;
  border-right: 1px solid var(--border);
  text-align: center;
  min-width: 30px;
}
.timeline-axis-spacer { width: 200px; flex-shrink: 0; border-right: 1px solid var(--border); }

/* Dashboard */
.dashboard {
  padding: 16px;
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 16px;
}
.dash-tile {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 12px;
}
.dash-tile h3 {
  margin: 0 0 8px;
  font-size: 14px;
  font-weight: 600;
}
.dash-bar {
  display: flex;
  align-items: center;
  gap: 6px;
  margin: 4px 0;
  font-size: 12px;
}
.dash-bar-label { width: 100px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.dash-bar-bar {
  flex: 1;
  height: 14px;
  background: var(--bg-badge);
  border-radius: 7px;
  position: relative;
  overflow: hidden;
}
.dash-bar-fill { height: 100%; background: var(--accent); }
.dash-bar-num { width: 32px; text-align: right; }
.dash-stat {
  font-size: 28px;
  font-weight: 700;
  color: var(--accent);
}

/* Eisenhower */
.eisenhower {
  display: grid;
  grid-template-columns: 1fr 1fr;
  grid-template-rows: 1fr 1fr;
  gap: 12px;
  padding: 12px;
  height: calc(100vh - var(--header-h) - 40px);
}
.eisenhower-cell {
  background: var(--bg-list);
  border-radius: var(--radius);
  padding: 8px;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
}
.eisenhower-cell h3 {
  margin: 0 0 8px;
  font-size: 13px;
  text-transform: uppercase;
}
.eisenhower-cell .card { margin-bottom: 6px; }

/* Inbox & Planner */
.inbox-view { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 12px; height: calc(100vh - var(--header-h) - 40px); }
@media (max-width: 800px) { .inbox-view { grid-template-columns: 1fr; height: auto; } }
.inbox-pane, .planner-pane {
  background: var(--bg-list);
  border-radius: var(--radius);
  padding: 12px;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
}
.inbox-pane h2, .planner-pane h2 { margin: 0 0 8px; font-size: 16px; }
.inbox-add { display: flex; gap: 6px; margin-bottom: 8px; }
.inbox-add input { flex: 1; }
.planner-day { margin-bottom: 12px; }
.planner-day h3 { margin: 0 0 6px; font-size: 13px; }
.planner-block {
  background: var(--bg-card);
  padding: 6px 8px;
  border-radius: var(--radius);
  margin-bottom: 4px;
  display: flex;
  align-items: center;
  gap: 6px;
  border-left: 3px solid var(--accent);
  font-size: 13px;
}

/* Sticky notes */
.sticky-board {
  position: relative;
  width: 100%;
  height: calc(100vh - var(--header-h) - 40px);
  overflow: auto;
  background: var(--bg-alt);
  background-image: radial-gradient(circle, var(--border) 1px, transparent 1px);
  background-size: 20px 20px;
}
.sticky {
  position: absolute;
  width: 200px;
  min-height: 120px;
  padding: 10px;
  background: #fff8b3;
  color: #1a1a1a;
  border-radius: 4px;
  box-shadow: var(--shadow-lg);
  font-family: 'Marker Felt', 'Comic Sans MS', cursive;
  font-size: 14px;
}
.sticky textarea {
  background: transparent;
  border: none;
  width: 100%;
  height: 100%;
  resize: none;
  font: inherit;
  color: inherit;
  outline: none;
}
.sticky-header { display: flex; justify-content: space-between; margin-bottom: 4px; }

/* Settings */
.settings-section { padding: 12px 16px; border-bottom: 1px solid var(--border); }
.settings-section h3 { margin: 0 0 10px; font-size: 14px; }
.settings-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 6px 0;
}
.settings-row label { flex: 1; }
.settings-row label.full { display: block; flex: none; width: 100%; }
.settings-row .hint { font-size: 12px; color: var(--fg-muted); margin-top: 2px; }

/* Pomodoro pill */
.pomo-pill {
  background: var(--accent);
  color: var(--accent-fg);
  border-radius: 20px;
  padding: 4px 10px;
  font-size: 13px;
  font-weight: 600;
  display: inline-flex;
  align-items: center;
  gap: 6px;
}
.pomo-pill.break { background: var(--success); }

/* Members */
.member-list { list-style: none; padding: 0; margin: 0; }
.member-list li {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px;
  border-bottom: 1px solid var(--border);
}
.member-edit-form { display: grid; grid-template-columns: 1fr 100px 80px auto; gap: 6px; align-items: center; }

/* Templates */
.template-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 8px;
}
.template-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 12px;
  cursor: pointer;
  text-align: left;
}
.template-card:hover { background: var(--bg-hover); }
.template-card h4 { margin: 0 0 4px; font-size: 14px; }
.template-card p { margin: 0; font-size: 12px; color: var(--fg-muted); }

/* Search results */
.search-results { max-height: 60vh; overflow-y: auto; }
.search-result {
  padding: 8px;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  display: block;
  width: 100%;
  text-align: left;
  background: transparent;
  border-left: none; border-right: none; border-top: none;
  font-size: 13px;
}
.search-result:hover { background: var(--bg-hover); }
.search-result-meta { color: var(--fg-muted); font-size: 11px; }

/* Sticker */
.sticker {
  position: absolute;
  font-size: 24px;
  pointer-events: none;
}

/* Github status */
.gh-status {
  font-size: 12px;
  padding: 2px 6px;
  border-radius: 10px;
  background: var(--bg-badge);
}
.gh-status.synced { background: var(--success-bg); color: var(--success); }
.gh-status.dirty { background: var(--warning-bg); color: var(--warning); }
.gh-status.error { background: var(--danger-bg); color: var(--danger); }

/* Toast */
#toasts {
  position: fixed;
  bottom: 16px;
  right: 16px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  z-index: 200;
}
.toast {
  background: var(--bg-modal);
  border: 1px solid var(--border);
  border-left: 4px solid var(--accent);
  border-radius: var(--radius);
  padding: 10px 14px;
  box-shadow: var(--shadow-lg);
  max-width: 360px;
  font-size: 13px;
}
.toast.error { border-left-color: var(--danger); }
.toast.success { border-left-color: var(--success); }
.toast.warning { border-left-color: var(--warning); }

/* Bulk action bar */
.bulk-bar {
  position: fixed;
  bottom: 16px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--bg-modal);
  border: 1px solid var(--border);
  border-radius: 24px;
  padding: 6px 14px;
  display: flex;
  gap: 6px;
  align-items: center;
  box-shadow: var(--shadow-lg);
  z-index: 50;
  font-size: 13px;
}

/* Picker */
.picker-list {
  list-style: none;
  padding: 0;
  margin: 0;
  max-height: 300px;
  overflow-y: auto;
}
.picker-list li button {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 8px;
  width: 100%;
  text-align: left;
  background: transparent;
  border: none;
}
.picker-list li button:hover { background: var(--bg-hover); }

/* Habit indicator */
.habit-streak {
  background: var(--warning-bg);
  color: var(--warning);
  border-radius: 10px;
  padding: 1px 6px;
  font-size: 11px;
  font-weight: 600;
}

/* Drag and drop helpers */
.drop-target { background: var(--bg-active); outline: 2px dashed var(--accent); outline-offset: -2px; }
.drop-placeholder {
  height: 36px;
  background: var(--bg-active);
  border-radius: var(--radius);
  border: 2px dashed var(--accent);
  margin: 2px 0;
}

/* Workspace selector */
.ws-switcher {
  display: flex;
  align-items: center;
  gap: 4px;
}

/* Color preview */
.color-swatch {
  display: inline-block;
  width: 16px;
  height: 16px;
  border-radius: 3px;
  border: 1px solid var(--border);
  vertical-align: middle;
}

/* Markdown rendering */
.md-rendered { font-size: 14px; }
.md-rendered h1, .md-rendered h2, .md-rendered h3 { margin: 12px 0 6px; }
.md-rendered h1 { font-size: 18px; }
.md-rendered h2 { font-size: 16px; }
.md-rendered h3 { font-size: 14px; }
.md-rendered p { margin: 6px 0; }
.md-rendered ul, .md-rendered ol { padding-left: 24px; margin: 6px 0; }
.md-rendered code {
  background: var(--bg-alt);
  padding: 1px 4px;
  border-radius: 3px;
  font-family: ui-monospace, "SF Mono", Menlo, monospace;
  font-size: .9em;
}
.md-rendered pre {
  background: var(--bg-alt);
  padding: 8px;
  border-radius: var(--radius);
  overflow-x: auto;
}
.md-rendered pre code { background: transparent; padding: 0; }
.md-rendered blockquote {
  border-left: 3px solid var(--border-strong);
  padding-left: 8px;
  color: var(--fg-muted);
  margin: 6px 0;
}
.md-rendered a { color: var(--accent); }
.md-rendered hr { border: 0; border-top: 1px solid var(--border); margin: 12px 0; }

/* Conditional formatting indicators inside cards */
.indicator-row {
  display: flex;
  gap: 4px;
  align-items: center;
  margin-top: 4px;
  font-size: 11px;
  color: var(--fg-muted);
  flex-wrap: wrap;
}
.dep-badge {
  background: var(--info-bg);
  color: var(--info);
  border-radius: 3px;
  padding: 1px 4px;
  font-weight: 600;
}
.subcards-badge {
  background: var(--bg-badge);
  border-radius: 3px;
  padding: 1px 4px;
}
.mirror-badge {
  background: var(--info-bg);
  color: var(--info);
  border-radius: 3px;
  padding: 1px 4px;
  font-weight: 600;
}

/* Focus mode */
.focus-mode {
  position: fixed;
  inset: 0;
  background: var(--bg);
  z-index: 150;
  display: flex;
  flex-direction: column;
  padding: 32px;
  overflow: auto;
}
.focus-mode .focus-content {
  max-width: 720px;
  margin: 0 auto;
  width: 100%;
}
.focus-mode h2 { font-size: 28px; margin: 0 0 16px; }

/* Form field row */
.field-row { margin-bottom: 12px; }
.field-row label { display: block; font-weight: 600; margin-bottom: 4px; font-size: 13px; }

.help-key {
  font-family: ui-monospace, monospace;
  background: var(--bg-alt);
  border: 1px solid var(--border);
  border-radius: 3px;
  padding: 1px 5px;
  font-size: 12px;
}

/* Sync tlačítko s viditelným textovým stavem */
#ghSyncBtn {
  min-width: 160px;
  padding: 4px 12px;
  font-size: 13px;
  text-align: left;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  width: auto;
  height: auto;
}
#ghSyncBtn.sync-error {
  background: var(--danger-bg, #fee);
  color: var(--danger, #c00);
  border-color: var(--danger, #c00);
}

/* Zaškrtávátko pro hromadný výběr v kartě */
.card-select-row {
  padding: 4px 8px 0;
  margin-bottom: -4px;
}
.card-select-cb {
  width: 18px;
  height: 18px;
  cursor: pointer;
}

/* Automation manager / editor */
.automation-manager fieldset,
.automation-editor fieldset {
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 10px 12px;
  margin: 8px 0;
}
.automation-manager fieldset > legend,
.automation-editor fieldset > legend {
  font-weight: 600;
  padding: 0 6px;
  color: var(--fg-muted);
}
.automation-list {
  list-style: none;
  padding: 0;
  margin: 0;
}
.automation-item {
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 8px 10px;
  margin-bottom: 8px;
  background: var(--bg-alt);
}
.automation-header {
  display: flex;
  gap: 4px;
  align-items: baseline;
  margin-bottom: 4px;
}
.automation-controls {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  margin-top: 6px;
  align-items: center;
}
.automation-row {
  border: 1px dashed var(--border);
  border-radius: var(--radius);
  padding: 8px;
  margin: 6px 0;
  background: var(--bg);
}
.automation-params {
  margin-top: 4px;
  padding-left: 8px;
  border-left: 2px solid var(--border);
}
.automation-params .field-row {
  margin: 4px 0;
}

  const LW = "(?<![\\p{L}\\p{N}])";

  const overlay = el("div", { class:"modal-overlay", role:"dialog", "aria-modal":"true", "aria-label": title || "" });
  const modal = el("div", { class:"modal " + size });
  const headerEl = el("div", { class:"modal-header" },
    el("h2", {}, title || ""),
    el("button", { class:"icon-btn", "aria-label": T("close"), onclick: () => close() }, "✕")
  );
  const bodyEl = el("div", { class:"modal-body" });
  if (body) {
    if (typeof body === "string") bodyEl.innerHTML = body;
    else if (body.nodeType) bodyEl.appendChild(body);
    else if (Array.isArray(body)) body.forEach(b => bodyEl.appendChild(b));
  }
  modal.appendChild(headerEl);
  modal.appendChild(bodyEl);
  if (footer) {
    const f = el("div", { class:"modal-footer" });
    (Array.isArray(footer) ? footer : [footer]).forEach(b => f.appendChild(b));
    modal.appendChild(f);
  }
  overlay.appendChild(modal);
  overlay.addEventListener("click", (e) => { if (e.target === overlay) close(); });
  document.addEventListener("keydown", keyHandler);
  function keyHandler(e) {
    if (e.key === "Escape" && escClose) { e.stopPropagation(); close(); }
  }
  function close() {
    document.removeEventListener("keydown", keyHandler);
    overlay.remove();
    if (onClose) onClose();
    if (lastFocus && document.contains(lastFocus)) lastFocus.focus();
  }
  const lastFocus = document.activeElement;
  $("#modals").appendChild(overlay);
  // focus first focusable
  setTimeout(() => {
    const f = modal.querySelector("input, textarea, select, button:not([aria-label='" + T("close") + "'])");
    if (f) f.focus();
    else modal.tabIndex = -1, modal.focus();
  }, 30);
  return { overlay, modal, body: bodyEl, close };
}
function confirm2(msg, { okLabel, danger=false }={}) {
  return new Promise(resolve => {
    let resolved = false;
    const ok = el("button", { class: danger ? "danger" : "primary", onclick: () => { resolved = true; m.close(); resolve(true); } }, okLabel || T("yes"));
    const cancel = el("button", { class:"ghost", onclick: () => { resolved = true; m.close(); resolve(false); } }, T("cancel"));
    const m = openModal({ title: T("confirmDelete"), body: el("p", {}, msg), footer: [cancel, ok], size:"small", onClose: () => { if (!resolved) resolve(false); } });
  });
}

function syncButtonLabel() {
  const g = state.github || {};
  const loadAt = g.lastLoadAt ? new Date(g.lastLoadAt).getTime() : 0;
  const syncAt = g.lastSyncAt ? new Date(g.lastSyncAt).getTime() : 0;
  const errAt = g.lastErrorAt ? new Date(g.lastErrorAt).getTime() : 0;
  const dirtyAt = g.dirtySince ? new Date(g.dirtySince).getTime() : 0;
  // Pokud poslední událost byla chyba, ukaž "Chyba synchronizace"
  const lastSuccess = Math.max(loadAt, syncAt);
  if (errAt > lastSuccess) {
    return "⟳ Chyba synchronizace " + formatRelTime(errAt);
  }
  let label;
  if (!loadAt && !syncAt) {
    label = "Synchronizace";
  } else if (syncAt >= loadAt) {
    label = "Synchronizováno " + formatRelTime(syncAt);
  } else {
    label = "Načteno, nesynchronizováno";
  }
  // Indikátor * když máme neuložené lokální změny od posledního sync/load
  if (dirtyAt > lastSuccess) label += " *";
  return "⟳ " + label;
}

//#region ============= IndexedDB =============
function idb() {
  return new Promise((res, rej) => {
    const req = indexedDB.open(DB_NAME, 1);
    req.onupgradeneeded = () => {
      req.result.createObjectStore(DB_STORE);
    };
    req.onsuccess = () => res(req.result);
    req.onerror = () => rej(req.error);
  });
}
async function idbSave(data) {
  const db = await idb();
  return new Promise((res, rej) => {
    const tx = db.transaction(DB_STORE, "readwrite");
    tx.objectStore(DB_STORE).put(data, "main");
    tx.oncomplete = () => res();
    tx.onerror = () => rej(tx.error);
  });
}
async function idbLoad() {
  try {
    const db = await idb();
    return await new Promise((res, rej) => {
      const tx = db.transaction(DB_STORE, "readonly");
      const r = tx.objectStore(DB_STORE).get("main");
      r.onsuccess = () => res(r.result || null);
      r.onerror = () => rej(r.error);
    });
  } catch (e) {
    // fallback
    const s = localStorage.getItem(STORAGE_KEY);
    return s ? JSON.parse(s) : null;
  }
}
//#endregion

//#region ============= ENCRYPTION (token storage) =============
async function deriveKey(passphrase, salt) {
  const enc = new TextEncoder();
  const baseKey = await crypto.subtle.importKey("raw", enc.encode(passphrase), "PBKDF2", false, ["deriveKey"]);
  return crypto.subtle.deriveKey(
    { name:"PBKDF2", salt, iterations:120000, hash:"SHA-256" },
    baseKey,
    { name:"AES-GCM", length:256 },
    false,
    ["encrypt","decrypt"]
  );
}
async function encryptString(plain, passphrase) {
  const enc = new TextEncoder();
  const salt = crypto.getRandomValues(new Uint8Array(16));
  const iv = crypto.getRandomValues(new Uint8Array(12));
  const key = await deriveKey(passphrase, salt);
  const ct = await crypto.subtle.encrypt({ name:"AES-GCM", iv }, key, enc.encode(plain));
  const out = new Uint8Array(salt.length + iv.length + ct.byteLength);
  out.set(salt, 0); out.set(iv, salt.length); out.set(new Uint8Array(ct), salt.length + iv.length);
  return btoa(String.fromCharCode(...out));
}
async function decryptString(b64, passphrase) {
  const data = Uint8Array.from(atob(b64), c => c.charCodeAt(0));
  const salt = data.slice(0,16);
  const iv = data.slice(16,28);
  const ct = data.slice(28);
  const key = await deriveKey(passphrase, salt);
  const pt = await crypto.subtle.decrypt({ name:"AES-GCM", iv }, key, ct);
  return new TextDecoder().decode(pt);
}
let _ghTokenCache = null;

  // Token je uložen v plain v state.github.token (uživatel si nepřál šifrování).
  // Datový soubor zůstává v lokálním IndexedDB v prohlížeči.
  return state.github.token || null;
}

//#region ============= GITHUB =============
const GH_API = "https://api.github.com";
async function ghHeaders() {
  const tok = await getGhToken();
  if (!tok) throw new Error("No token");
  return { "Authorization": "token " + tok, "Accept":"application/vnd.github+json" };
}
function b64encUtf8(str) {
  return btoa(unescape(encodeURIComponent(str)));
}
function b64decUtf8(b64) {
  return decodeURIComponent(escape(atob(b64.replace(/\n/g, ""))));
}
async function ghLoad() {
  if (!state.github.enabled) { toast("GitHub není nastaven.", "warning"); return; }
  setGhStatus("", "GitHub…");
  try {
    const headers = await ghHeaders();
    const url = `${GH_API}/repos/${state.github.owner}/${state.github.repo}/contents/${encodeURIComponent(state.github.path)}?ref=${encodeURIComponent(state.github.branch)}`;
    const r = await fetch(url, { headers });
    if (r.status === 404) { toast("Soubor v repu zatím neexistuje.", "warning"); setGhStatus("dirty", "GitHub: nový"); return; }
    if (!r.ok) throw new Error("HTTP " + r.status);
    const j = await r.json();
    const content = b64decUtf8(j.content);
    const data = JSON.parse(content);
    state = mergeLoadedState(data);
    state.github.sha = j.sha;
    state.github.lastSync = Date.now();
    saveState();
    renderAll();
    setGhStatus("synced", "GitHub OK");
    sound.sync();
    toast(T("syncOk"), "success");
  } catch (e) {
    console.error(e);
    setGhStatus("error", "GitHub chyba");
    toast(T("syncErr") + " " + e.message, "error"); sound.err();
  }
}
async function ghSave() {
  if (!state.github.enabled) { toast("GitHub není nastaven.", "warning"); return; }
  setGhStatus("", "GitHub…");
  try {
    const headers = await ghHeaders();
    headers["Content-Type"] = "application/json";
    const content = JSON.stringify(state, null, 2);
    // First, try Git Blob API for large files
    const blobR = await fetch(`${GH_API}/repos/${state.github.owner}/${state.github.repo}/git/blobs`, {
      method:"POST",
      headers,
      body: JSON.stringify({ content: b64encUtf8(content), encoding:"base64" })
    });
    if (!blobR.ok) throw new Error("blob HTTP " + blobR.status);
    const blob = await blobR.json();
    // Get current ref
    const refR = await fetch(`${GH_API}/repos/${state.github.owner}/${state.github.repo}/git/ref/heads/${state.github.branch}`, { headers });
    if (!refR.ok) throw new Error("ref HTTP " + refR.status);
    const ref = await refR.json();
    const baseSha = ref.object.sha;
    // Get base tree
    const commitR = await fetch(`${GH_API}/repos/${state.github.owner}/${state.github.repo}/git/commits/${baseSha}`, { headers });
    if (!commitR.ok) throw new Error("commit HTTP " + commitR.status);
    const baseCommit = await commitR.json();
    // Create tree
    const treeR = await fetch(`${GH_API}/repos/${state.github.owner}/${state.github.repo}/git/trees`, {
      method:"POST", headers,
      body: JSON.stringify({
        base_tree: baseCommit.tree.sha,
        tree: [{ path: state.github.path, mode:"100644", type:"blob", sha: blob.sha }]
      })
    });
    if (!treeR.ok) throw new Error("tree HTTP " + treeR.status);
    const tree = await treeR.json();
    // Create commit
    const newCommitR = await fetch(`${GH_API}/repos/${state.github.owner}/${state.github.repo}/git/commits`, {
      method:"POST", headers,
      body: JSON.stringify({
        message: "kanban: update " + new Date().toISOString(),
        tree: tree.sha,
        parents: [baseSha]
      })
    });
    if (!newCommitR.ok) throw new Error("commit-create HTTP " + newCommitR.status);
    const newCommit = await newCommitR.json();
    // Move ref
    const updR = await fetch(`${GH_API}/repos/${state.github.owner}/${state.github.repo}/git/refs/heads/${state.github.branch}`, {
      method:"PATCH", headers,
      body: JSON.stringify({ sha: newCommit.sha })
    });
    if (!updR.ok) throw new Error("ref-update HTTP " + updR.status);
    state.github.lastSync = Date.now();
    saveState();
    setGhStatus("synced", "GitHub OK");
    sound.sync();
    toast(T("syncOk"), "success");
  } catch (e) {
    console.error(e);
    setGhStatus("error", "GitHub chyba");
    toast(T("syncErr") + " " + e.message, "error"); sound.err();
  }
}
function mergeLoadedState(data) {
  // Replace state with loaded; preserve runtime ui if missing
  const newState = Object.assign(deepClone(initialState), data);
  if (!newState.ui) newState.ui = deepClone(initialState.ui);
  if (!newState.pomodoro) newState.pomodoro = deepClone(initialState.pomodoro);
  return newState;
}

//#region ============= MARKDOWN =============
function mdRender(src) {
  if (!src) return "";
  let s = String(src);
  // escape
  s = s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  // code blocks ```
  s = s.replace(/```([\s\S]*?)```/g, (_,c) => `<pre><code>${c}</code></pre>`);
  // inline code
  s = s.replace(/`([^`\n]+)`/g, (_,c) => `<code>${c}</code>`);
  // headers
  s = s.replace(/^###### (.*)$/gm, "<h6>$1</h6>");
  s = s.replace(/^##### (.*)$/gm, "<h5>$1</h5>");
  s = s.replace(/^#### (.*)$/gm, "<h4>$1</h4>");
  s = s.replace(/^### (.*)$/gm, "<h3>$1</h3>");
  s = s.replace(/^## (.*)$/gm, "<h2>$1</h2>");
  s = s.replace(/^# (.*)$/gm, "<h1>$1</h1>");
  // hr
  s = s.replace(/^---+$/gm, "<hr>");
  // blockquote
  s = s.replace(/^&gt; (.*)$/gm, "<blockquote>$1</blockquote>");
  // Seznamy MUSÍ být zpracovány PŘED kurzivou (italic), jinak by `* položka` bylo chybně
  // matchováno jako otevírací hvězdička italic. Podporujeme obě značky: `-` i `*`.
  // Nečíslovaný seznam
  s = s.replace(/(?:^[-*] .*(?:\n|$))+/gm, (m) => {
    const items = m.trim().split("\n").map(l => l.replace(/^[-*] /, "")).map(t => `<li>${t}</li>`).join("");
    return `<ul>${items}</ul>`;
  });
  // Číslovaný seznam
  s = s.replace(/(?:^\d+\. .*(?:\n|$))+/gm, (m) => {
    const items = m.trim().split("\n").map(l => l.replace(/^\d+\. /, "")).map(t => `<li>${t}</li>`).join("");
    return `<ol>${items}</ol>`;
  });
  // bold/italic — AŽ po seznamech, aby nepřebila ukazatele seznamu
  s = s.replace(/\*\*([^*\n]+)\*\*/g, "<strong>$1</strong>");
  s = s.replace(/\*([^*\n]+)\*/g, "<em>$1</em>");
  s = s.replace(/__([^_\n]+)__/g, "<strong>$1</strong>");
  s = s.replace(/_([^_\n]+)_/g, "<em>$1</em>");
  // links
  s = s.replace(/\[([^\]]+)\]\((https?:[^\s)]+)\)/g, '<a href="$2" target="_blank" rel="noopener noreferrer">$1</a>');
  // auto-link bare URLs
  s = s.replace(/(^|[^"=\(>])(https?:\/\/[^\s<]+)/g, '$1<a href="$2" target="_blank" rel="noopener noreferrer">$2</a>');
  // paragraphs (split by blank lines)
  s = s.split(/\n{2,}/).map(p => {
    if (/^\s*<(h\d|ul|ol|pre|blockquote|hr)/.test(p)) return p;
    return "<p>" + p.replace(/\n/g, "<br>") + "</p>";
  }).join("\n");
  return s;
}

// Když je text karty URL, zkusíme dohledat titulek stránky a přidat URL jako přílohu.
// fetch může selhat kvůli CORS — v tom případě zůstane karta s URL v názvu a příloha se stejně přidá.
function looksLikeUrl(s) {
  return /^https?:\/\/\S+$/i.test(String(s || "").trim());
}
async function fetchUrlTitle(url) {
  try {
    const r = await fetch(url, { mode: "cors", redirect: "follow", cache: "no-cache" });
    if (!r.ok) return null;
    const ct = r.headers.get("content-type") || "";
    if (!/text\/html|application\/xhtml/i.test(ct)) return null;
    const text = await r.text();
    // Preferuj og:title (často kvalitnější), pak <title>
    const og = text.match(/<meta[^>]*property=["']og:title["'][^>]*content=["']([^"']+)["']/i)
            || text.match(/<meta[^>]*content=["']([^"']+)["'][^>]*property=["']og:title["']/i);
    if (og && og[1]) return decodeHtmlEntities(og[1]).trim();
    const t = text.match(/<title[^>]*>([\s\S]*?)<\/title>/i);
    if (t && t[1]) return decodeHtmlEntities(t[1]).replace(/\s+/g, " ").trim();
    return null;
  } catch {
    return null;
  }
}
function decodeHtmlEntities(s) {
  if (!s) return "";
  // Minimální decoder pro nejčastější entity (běžné v <title>)
  return String(s)
    .replace(/&amp;/g, "&").replace(/&lt;/g, "<").replace(/&gt;/g, ">")
    .replace(/&quot;/g, '"').replace(/&#39;/g, "'").replace(/&nbsp;/g, " ")
    .replace(/&#x([0-9a-f]+);/gi, (_, h) => String.fromCodePoint(parseInt(h, 16)))
    .replace(/&#(\d+);/g, (_, d) => String.fromCodePoint(parseInt(d, 10)));
}
// Pokud card.title vypadá jako URL, přidá URL do attachments a zkusí nahradit title titulkem stránky.
// Po dokončení volá saveState a re-render. Je asynchronní — UI reaguje okamžitě s URL titulkem a pak se přepíše.
async function enhanceCardIfUrl(cardId) {
  const card = getCard(cardId);
  if (!card || !looksLikeUrl(card.title)) return false;
  const url = card.title.trim();
  // Přidej URL jako přílohu ihned (bez čekání na fetch)
  card.attachments = card.attachments || [];

    card.attachments.push({
      id: uid("at_"),
      url,
      name: url,
      createdAt: Date.now(),
    });
  }
  saveState();
  renderView();
  announce("URL přidáno jako příloha. Zjišťuji titulek…");
  // Asynchronně dohledej titulek
  try {
    const title = await fetchUrlTitle(url);
    if (title && title.length && getCard(cardId)) {
      const fresh = getCard(cardId);
      // Přepiš jen pokud uživatel mezitím nezměnil název ručně
      if (fresh.title === url) {
        fresh.title = title;
        // Přílohu přejmenuj na nový titulek (hezčí pro přehled)
        const att = (fresh.attachments || []).find(a => a.url === url && a.name === url);
        if (att) att.name = title;
        logActivity(fresh, "Titulek stránky doplněn: " + title);
        saveState();
        renderView();
        announce("Titulek doplněn: " + title);
        sound.click();
      }

      announce("Titulek stránky nelze automaticky zjistit (CORS nebo chyba).");
    }

  }

}

function moveCard(cardId, toListId, toIndex) {
  const card = getCard(cardId);
  if (!card) return;
  const fromList = getList(card.listId);
  const toList = getList(toListId);
  if (!toList) return;
  const fromListId = card.listId;
  const sameList = card.listId === toListId;
  // Pull card out
  const before = card.listId;
  card.listId = toListId;
  card.boardId = toList.boardId;
  // Reorder
  const others = state.cards.filter(c => c.listId === toListId && c.id !== cardId && !c.deleted && !c.archived).sort((a,b) => a.position - b.position);
  const insertAt = clamp(toIndex == null ? others.length : toIndex, 0, others.length);
  others.splice(insertAt, 0, card);
  others.forEach((c, i) => c.position = i);
  // also reflow source
  if (!sameList) {
    const srcOthers = state.cards.filter(c => c.listId === before && c.id !== cardId && !c.deleted && !c.archived).sort((a,b) => a.position - b.position);
    srcOthers.forEach((c,i) => c.position = i);
    if (fromList && toList) logActivity(card, T("activityMoved", fromList.name, toList.name));
  }
  card.updatedAt = Date.now();
  // WIP check
  const board = getBoard(card.boardId);
  const wip = board && board.wipLimits[toListId];
  if (wip && cardsInList(toListId).length > wip) {
    sound.warn(); announce(T("wipExceeded", wip)); toast(T("wipExceeded", wip), "warning");
  }
  saveState();
  if (!sameList) runAutomationsFor("card.moved", { card, fromListId, toListId });
}
function moveList(listId, toIndex) {
  const list = getList(listId);
  if (!list) return;
  const others = state.lists.filter(l => l.boardId === list.boardId && l.id !== listId && !l.archived).sort((a,b) => a.position - b.position);
  const at = clamp(toIndex, 0, others.length);
  others.splice(at, 0, list);
  others.forEach((l,i) => l.position = i);
  saveState();
}

function mirrorCard(sourceId, toListId) {
  const src = getCard(sourceId); if (!src) return null;
  const toList = getList(toListId); if (!toList) return null;
  const cards = cardsInList(toListId);
  const mirror = {
    id: uid("c_"),
    boardId: toList.boardId,
    listId: toListId,
    position: cards.length,
    mirroredFrom: src.id,
    activity: [{ id: uid("a_"), action: "Vytvořeno jako zrcadlení", timestamp: Date.now() }],
    archived: false, deleted: false,
    createdAt: Date.now(), updatedAt: Date.now(),
    // these are not used; we read from source
    title: "", description: "", labels:[], members:[], checklists:[], comments:[], attachments:[],
    customFieldValues:{}, timeTracking:{ entries:[], estimate:null }, time:{ estimateSec:0, spentSec:0, runningSince:null },
    dependencies:{ blocks:[], blockedBy:[], related:[] }, mirroredTo:[],
    cardType:"mirror", reminders:[], snoozedUntil:null,
  };
  state.cards.push(mirror);
  src.mirroredTo = src.mirroredTo || [];
  src.mirroredTo.push(mirror.id);

function resolveCard(c) {
  // For mirror card, return source for read; for normal card, return itself
  if (c && c.mirroredFrom) {
    const src = getCard(c.mirroredFrom);
    return src || c;
  }
  return c;
}
function getSubcards(parentId) {
  return state.cards.filter(c => c.parentCardId === parentId && !c.deleted);
}
function detectCycle(fromId, toId) {
  // would adding fromId blocks toId create a cycle? i.e. is toId already (transitively) blocking fromId?
  const seen = new Set();
  const stack = [toId];
  while (stack.length) {
    const cur = stack.pop();
    if (cur === fromId) return true;
    if (seen.has(cur)) continue;
    seen.add(cur);
    const c = getCard(cur);
    if (c && c.dependencies) stack.push(...c.dependencies.blocks);
  }
  return false;
}
function setDep(cardId, otherId, kind, add=true) {
  const c = getCard(cardId), o = getCard(otherId);
  if (!c || !o || c === o) return false;
  c.dependencies = c.dependencies || { blocks:[], blockedBy:[], related:[] };
  o.dependencies = o.dependencies || { blocks:[], blockedBy:[], related:[] };
  const inverse = { blocks:"blockedBy", blockedBy:"blocks", related:"related" }[kind];
  if (add) {
    if (kind === "blocks" && detectCycle(cardId, otherId)) {
      return false;
    }
    if (kind === "blockedBy" && detectCycle(otherId, cardId)) {
      return false;
    }
    if (!c.dependencies[kind].includes(otherId)) c.dependencies[kind].push(otherId);
    if (!o.dependencies[inverse].includes(cardId)) o.dependencies[inverse].push(cardId);
  } else {
    c.dependencies[kind] = c.dependencies[kind].filter(x => x !== otherId);
    o.dependencies[inverse] = o.dependencies[inverse].filter(x => x !== cardId);
  }
  saveState();
  return true;
}

function countSmart(key) {
  const all = state.cards.filter(c => !c.deleted);
  if (key === "today") return all.filter(c => c.dueDate && isToday(c.dueDate) && !c.completed && !c.archived).length;
  if (key === "week") {
    const start = startOfWeek(); const end = addDays(start, 7);
    return all.filter(c => c.dueDate && new Date(c.dueDate) >= start && new Date(c.dueDate) < end && !c.completed && !c.archived).length;
  }
  if (key === "overdue") return all.filter(c => c.dueDate && new Date(c.dueDate) < dateOnly(new Date()) && !c.completed && !c.archived).length;
  if (key === "nodate") return all.filter(c => !c.dueDate && !c.archived && !c.completed && c.cardType !== "mirror").length;
  if (key === "completed") return all.filter(c => c.completed && !c.archived).length;
  if (key === "archive") return all.filter(c => c.archived).length;
  if (key === "trash") return state.cards.filter(c => c.deleted).length;
  return 0;
}

function cycleBoard(dir) {
  const bs = state.boards.filter(b => !b.archived);
  if (!bs.length) return;
  const cur = state.ui.currentView.type === "board" ? state.ui.currentView.boardId : null;
  let idx = bs.findIndex(b => b.id === cur);
  if (idx < 0) idx = 0;
  else idx = (idx + dir + bs.length) % bs.length;
  state.ui.currentView = { type:"board", boardId: bs[idx].id, viewType: state.ui.currentView.viewType || "board" };
  saveState(); renderAll();
  announce("Nástěnka: " + bs[idx].name);
  sound.click();
}

// Otevře picker pro skok na libovolnou nástěnku.
function pickBoardGoto() {
  const bs = state.boards.filter(b => !b.archived);
  if (!bs.length) { toast("Žádné nástěnky.", "info"); return; }
  const sel = el("select", { "aria-label": T("pickBoard") });
  bs.forEach(b => sel.appendChild(el("option", { value:b.id }, b.name)));
  const cur = state.ui.currentView.type === "board" ? state.ui.currentView.boardId : null;
  if (cur) sel.value = cur;
  const m = openModal({
    title: T("pickBoardGoto"),
    body: el("div", { class:"field-row" }, el("label", {}, T("pickBoard")), sel),
    footer: [
      el("button", { class:"ghost", onclick: () => m.close() }, T("cancel")),
      el("button", { class:"primary", onclick: () => { state.ui.currentView = { type:"board", boardId: sel.value, viewType: state.ui.currentView.viewType || "board" }; saveState(); renderAll(); m.close(); sound.click(); } }, T("open")),
    ],
    size:"small",
  });
  setTimeout(() => sel.focus(), 50);
}

// Modal pro přesun karty do jiného seznamu (i na jiné nástěnce).
async function openMoveCardDialog(cardId) {
  const card = getCard(cardId);
  if (!card) return;
  const boardSel = el("select", { "aria-label": T("pickBoard") });
  state.boards.filter(b => !b.archived).forEach(b => boardSel.appendChild(el("option", { value:b.id }, b.name)));
  boardSel.value = card.boardId;
  const listSel = el("select", { "aria-label": T("pickList") });
  function refreshLists() {
    clear(listSel);
    listsInBoard(boardSel.value).forEach(l => listSel.appendChild(el("option", { value:l.id }, l.name)));
    if (listsInBoard(boardSel.value).some(l => l.id === card.listId)) listSel.value = card.listId;
  }
  boardSel.addEventListener("change", refreshLists);
  refreshLists();
  const m = openModal({
    title: T("moveCard") + " — „" + card.title + "“",
    body: el("div", {},
      el("div", { class:"field-row" }, el("label", {}, T("pickBoard")), boardSel),
      el("div", { class:"field-row" }, el("label", {}, T("pickList")), listSel)
    ),
    footer: [
      el("button", { class:"ghost", onclick: () => m.close() }, T("cancel")),
      el("button", { class:"primary", onclick: () => {
        const toList = listSel.value;
        if (!toList) return;
        moveCard(card.id, toList);
        saveState(); renderView(); m.close(); sound.drop();
        announce("Karta přesunuta do seznamu " + getList(toList)?.name);
      } }, T("save")),
    ],
    size:"small",
  });
  setTimeout(() => boardSel.focus(), 50);
}

// Vrátí kolekci karet v pořadí v jakém se zobrazují v aktuálním pohledu (pro navigaci , . v detailu).
function siblingCardsForNav(card) {
  const board = getBoard(card.boardId);
  if (!board) return [card];
  // Pokud jsme v board view, tak v pořadí seznamů a karet v nich
  const lists = listsInBoard(board.id);
  const out = [];
  lists.forEach(l => cardsInList(l.id).forEach(c => out.push(c)));
  return out;
}

function renderView() {
  const c = $("#viewContainer");
  clear(c);
  const v = state.ui.currentView;
  // H1 v hlavní části – název aktuálního pohledu (pro screen reader + vizuální hierarchii)
  const h1Text = viewHeadlineText(v);
  if (h1Text) c.appendChild(el("h1", { class:"view-h1", id:"mainH1" }, h1Text));
  if (v.type === "welcome") return renderWelcome(c);
  if (v.type === "board") {
    const b = getBoard(v.boardId);
    if (!b) { state.ui.currentView = { type:"welcome" }; return renderWelcome(c); }
    const t = v.viewType || "board";
    if (t === "board") return renderBoardView(c, b);
    if (t === "table") return renderTableView(c, b);
    if (t === "calendar") return renderCalendarView(c, b);
    if (t === "timeline") return renderTimelineView(c, b);
    if (t === "dashboard") return renderDashboardView(c, b);
    if (t === "eisenhower") return renderEisenhowerView(c, b);
  }
  if (v.type === "smart") return renderSmartView(c, v.smart);
  if (v.type === "inbox") return renderInboxView(c);
  if (v.type === "planner") return renderPlannerView(c);
  if (v.type === "stickies") return renderStickiesView(c);
  if (v.type === "members") return renderMembersView(c);
  if (v.type === "filter") return renderFilterView(c, v.filterId);
  if (v.type === "search") return renderSearchView(c, v.query);
}
// Vrátí text h1 pro aktuální pohled. Pokud pohled má vlastní h1 uvnitř, vracíme "".
function viewHeadlineText(v) {
  if (v.type === "welcome") return "";  // welcome má vlastní h2
  if (v.type === "board") {
    const b = getBoard(v.boardId);
    if (!b) return "";
    const t = v.viewType || "board";
    const suffix = { board:"", table:" – tabulka", calendar:" – kalendář", timeline:" – časová osa", dashboard:" – přehled", eisenhower:" – matice priorit" }[t] || "";
    return b.name + suffix;
  }
  if (v.type === "smart") return ({ today:"Dnes", week:"Tento týden", overdue:"Po termínu", nodate:"Bez termínu", completed:"Hotové", archive:"Archiv", trash:"Koš" }[v.smart]) || "";
  if (v.type === "inbox") return T("inbox");
  if (v.type === "planner") return T("planner");
  if (v.type === "stickies") return T("stickies");
  if (v.type === "members") return T("members");
  if (v.type === "filter") { const f = (state.savedFilters || []).find(x => x.id === v.filterId); return f ? f.name : "Filtr"; }
  if (v.type === "search") return 'Hledání: "' + (v.query || "") + '"';
  return "";
}

function updateDocumentTitle() {
  const v = state.ui.currentView;
  let name = "";
  if (v.type === "board") { const b = getBoard(v.boardId); if (b) name = b.name; }
  else if (v.type === "smart") name = { today:"Dnes", week:"Tento týden", overdue:"Po termínu", nodate:"Bez termínu", completed:"Hotové", archive:"Archiv", trash:"Koš" }[v.smart] || "";
  else if (v.type === "inbox") name = T("inbox");
  else if (v.type === "planner") name = T("planner");
  else if (v.type === "stickies") name = T("stickies");
  else if (v.type === "members") name = T("members");
  else if (v.type === "search") name = "Vyhledávání";
  else if (v.type === "filter") { const f = (state.savedFilters || []).find(x => x.id === v.filterId); if (f) name = f.name; }
  document.title = name ? (name + " – mrello") : "mrello";
}

//#region ============= BOARD VIEW =============
let _kbdGrabbed = null;  // { cardId, listId, fromIndex }
function renderBoardView(container, board) {
  // toolbar
  const tb = el("div", { class:"board-bar" });
  tb.appendChild(el("button", { class:"icon-btn", onclick: () => editBoardSettings(board), title:"Nastavení nástěnky" }, "⚙"));
  // filter chips: members (jen ti, kdo mají přiřazenu aspoň jednu kartu na této nástěnce — šetří místo v toolbaru)
  const assignedMemberIds = new Set();
  state.cards.forEach(c => {
    if (c.boardId === board.id && !c.deleted) (c.members || []).forEach(mid => assignedMemberIds.add(mid));
  });
  const boardMembers = state.members.filter(m => assignedMemberIds.has(m.id));
  if (boardMembers.length) {
    const filterMembers = state.ui.boardFilter && state.ui.boardFilter.members || [];
    boardMembers.forEach(m => {
      const active = filterMembers.includes(m.id);
      const b = el("button", {
        class:"icon-btn", style:{ opacity: active ? "1" : ".55", border: active ? "2px solid var(--accent)" : "1px solid var(--border)" },
        title: m.name + (active ? " (aktivní filtr)" : ""),
        onclick: () => toggleBoardFilter("members", m.id),
      });
      b.appendChild(memberAvatar(m, "sm"));
      tb.appendChild(b);
    });
  }
  // labels
  if (board.labels.length) {
    tb.appendChild(el("span", { style:{ width:"8px" } }));
    board.labels.forEach(l => {
      const filterLabels = state.ui.boardFilter && state.ui.boardFilter.labels || [];
      const active = filterLabels.includes(l.id);
      tb.appendChild(el("button", {
        class:"label-chip named",
        style:{ background: colorVar(l.color), border: active ? "2px solid var(--accent)" : "none", padding: active ? "0 6px" : "2px 8px" },
        onclick: () => toggleBoardFilter("labels", l.id),
        title: l.name + (active ? " (aktivní filtr)" : ""),
      }, l.name));
    });
  }
  // Přepínač pro skrytí hotových karet — vedle štítků
  tb.appendChild(el("span", { style:{ width:"8px" } }));
  const hideDone = !!(state.ui.boardFilter && state.ui.boardFilter.hideCompleted);
  tb.appendChild(el("button", {
    class: hideDone ? "primary" : "ghost",
    "aria-pressed": hideDone ? "true" : "false",
    title: hideDone ? "Hotové karty jsou skryté — kliknutím zobrazíš" : "Kliknutím skryješ hotové karty",
    onclick: () => {
      if (!state.ui.boardFilter) state.ui.boardFilter = { members:[], labels:[] };
      state.ui.boardFilter.hideCompleted = !state.ui.boardFilter.hideCompleted;
      saveState(); renderView();
      announce(state.ui.boardFilter.hideCompleted ? "Hotové karty skryté." : "Hotové karty zobrazené.");
    },
  }, hideDone ? "☑ Skryté hotové" : "☐ Zobrazit vše"));

  // Přepínač výběrového režimu — ukáže u každé karty zaškrtávátko pro hromadné vybírání myší.
  const selMode = !!state.ui.selectionMode;
  tb.appendChild(el("button", {
    class: selMode ? "primary" : "ghost",
    "aria-pressed": selMode ? "true" : "false",
    title: selMode ? "Výběrový režim je zapnutý — kliknutím ho vypneš" : "Zapnout výběrový režim (zaškrtávátka u karet)",
    onclick: () => {
      state.ui.selectionMode = !state.ui.selectionMode;
      // Při vypnutí režimu zrušíme i případný výběr (už ho nemá co udržovat)
      if (!state.ui.selectionMode) state.ui.selectedCards = [];
      saveState(); renderView();
      announce(state.ui.selectionMode ? "Výběrový režim zapnut. U karet jsou zaškrtávátka." : "Výběrový režim vypnut.");
    },
  }, selMode ? "☑ Výběr" : "☐ Výběr"));

  if ((state.ui.boardFilter && (state.ui.boardFilter.members||[]).length + (state.ui.boardFilter.labels||[]).length) > 0) {
    tb.appendChild(el("button", { class:"ghost", onclick: () => { if (state.ui.boardFilter) { state.ui.boardFilter.members = []; state.ui.boardFilter.labels = []; } renderView(); } }, "Zrušit filtry"));
  }
  // Pokud jsou na této nástěnce skryté sloupce, nabídni tlačítko pro hromadné zobrazení
  const listIdsOnBoard = listsInBoard(board.id).map(l => l.id);
  const hiddenHereCount = listIdsOnBoard.filter(id => state.ui.hiddenLists && state.ui.hiddenLists[id]).length;
  if (hiddenHereCount) {
    tb.appendChild(el("button", {
      class: "ghost",
      title: "Zobrazit všechny skryté sloupce na této nástěnce",
      onclick: () => {
        listIdsOnBoard.forEach(id => { if (state.ui.hiddenLists) state.ui.hiddenLists[id] = false; });
        saveState();
        renderView();
        announce(`Zobrazeno ${hiddenHereCount} sloupců.`);
      },
    }, `Zobrazit ${hiddenHereCount} skrytých`));
  }
  container.appendChild(tb);
  // lists
  const lc = el("div", { class:"lists-container", role:"list", "aria-label":"Seznamy nástěnky" });
  listsInBoard(board.id).forEach((lst, idx) => lc.appendChild(renderListColumn(board, lst, idx)));
  // add list
  const addListBtn = el("button", { class:"list-add primary", style:{ minWidth:"260px", height:"40px" }, onclick: () => promptNewList(board) }, T("addList"));
  lc.appendChild(addListBtn);
  container.appendChild(lc);
  // bulk bar
  if (state.ui.selectedCards && state.ui.selectedCards.length) renderBulkBar();
}
function toggleBoardFilter(kind, id) {
  if (!state.ui.boardFilter) state.ui.boardFilter = { members:[], labels:[] };
  const arr = state.ui.boardFilter[kind] = state.ui.boardFilter[kind] || [];
  const i = arr.indexOf(id);
  if (i >= 0) arr.splice(i, 1); else arr.push(id);
  renderView();
}
function passesBoardFilter(card) {
  const f = state.ui.boardFilter;
  if (!f) return true;
  if (f.hideCompleted && card.completed) return false;
  if (f.members && f.members.length && !f.members.some(id => (card.members||[]).includes(id))) return false;
  if (f.labels && f.labels.length && !f.labels.some(id => (card.labels||[]).includes(id))) return false;
  return true;
}
function renderListColumn(board, list, idx) {
  // Skrytý sloupec se renderuje jako úzký vertikální proužek s názvem seznamu.
  // Kliknutím / Enterem se opět rozbalí. Stav se ukládá v state.ui.hiddenLists (per-list).
  const isHidden = !!(state.ui.hiddenLists && state.ui.hiddenLists[list.id]);
  if (isHidden) {
    const cnt = cardsInList(list.id).length;
    const col = el("section", {
      class: "list list-collapsed",
      role: "listitem",
      "aria-label": `Skrytý seznam „${list.name}“, ${cnt} karet. Kliknutím nebo Enterem zobrazíš.`,
      dataset: { listId: list.id },
    });
    const btn = el("button", {
      class: "list-expand-btn",
      "aria-label": `Zobrazit seznam „${list.name}“`,
      title: `Zobrazit seznam „${list.name}“ (${cnt} karet)`,
      onclick: () => {
        state.ui.hiddenLists[list.id] = false;
        saveState();
        renderView();
        announce(`Seznam „${list.name}“ zobrazen.`);
        sound.click();
      },
    }, list.name + " (" + cnt + ")");
    col.appendChild(btn);
    return col;
  }
  const col = el("section", { class:"list", role:"listitem", "aria-labelledby": "lname_" + list.id, dataset:{ listId: list.id } });
  const wip = board.wipLimits[list.id] || 0;
  const cards = cardsInList(list.id);
  const cnt = cards.length;
  const overWip = wip && cnt > wip;
  const head = el("div", { class:"list-header" });
  const nameHeading = el("h3", { class:"list-name", id:"lname_" + list.id }, list.name);
  head.appendChild(nameHeading);
  head.appendChild(el("span", { class:"list-count " + (overWip ? "over-wip" : ""), title: wip ? `WIP ${cnt}/${wip}` : `${cnt}` }, wip ? `${cnt}/${wip}` : String(cnt)));
  // Tlačítko pro skrytí sloupce
  const hideBtn = el("button", {
    class: "icon-btn",
    "aria-label": `Skrýt seznam „${list.name}“`,
    title: "Skrýt seznam (kliknutím na proužek ho zobrazíš)",
    onclick: () => {
      state.ui.hiddenLists = state.ui.hiddenLists || {};
      state.ui.hiddenLists[list.id] = true;
      saveState();
      renderView();
      announce(`Seznam „${list.name}“ skryt.`);
      sound.click();
    },
  }, "−");
  head.appendChild(hideBtn);
  // list menu — zde se schovává přejmenování (otevře se při kliknutí na · · ·)
  const menuBtn = el("button", { class:"icon-btn", "aria-label":"Menu seznamu „" + list.name + "“ (přejmenovat, WIP limit, archivovat hotové, smazat)", onclick: (e) => openListMenu(board, list, e) }, "···");
  head.appendChild(menuBtn);
  col.appendChild(head);
  const cardsEl = el("div", { class:"list-cards", dataset:{ listDrop:"1", listId: list.id } });
  // drop handlers on cards container
  cardsEl.addEventListener("dragover", (e) => { e.preventDefault(); cardsEl.classList.add("drop-target"); });
  cardsEl.addEventListener("dragleave", () => cardsEl.classList.remove("drop-target"));
  cardsEl.addEventListener("drop", (e) => {
    e.preventDefault(); cardsEl.classList.remove("drop-target");
    const cardId = e.dataTransfer.getData("text/card");
    if (!cardId) return;
    const targets = $$(".card", cardsEl);
    let insertAt = targets.length;
    for (let i = 0; i < targets.length; i++) {
      const r = targets[i].getBoundingClientRect();
      if (e.clientY < r.top + r.height/2) { insertAt = i; break; }
    }
    moveCard(cardId, list.id, insertAt);
    sound.drop();
    renderView();
    announce(`Karta přesunuta do seznamu ${list.name}.`);
  });
  cards.filter(passesBoardFilter).forEach((card, i) => cardsEl.appendChild(renderCard(card, list, i)));
  col.appendChild(cardsEl);
  // add card
  const addArea = el("div", { class:"list-add" });
  const addBtn = el("button", { onclick: () => addCardInline(list, addArea, cardsEl) }, T("addCard"));
  addArea.appendChild(addBtn);
  col.appendChild(addArea);
  return col;
}
function addCardInline(list, addArea, cardsEl) {

  const ok = el("button", { class:"primary", onclick: doAdd }, T("addCard"));
  const cancel = el("button", { class:"ghost", onclick: cleanup }, T("cancel"));

  const hint = el("div", { class:"muted small" }, "Tip: do názvu lze napsat „dnes“, „zítra“, „pondělí“, „2d“, „1t“, „23.4.“ — termín se nastaví automaticky.");
  function doAdd() {
    const t = inp.value.trim();
    if (!t) { inp.focus(); return; }
    const card = newCard(list.id, t);
    sound.add();
    cardsEl.appendChild(renderCard(card, list, cardsInList(list.id).length - 1));
    // Pokud parser zachytil datum, karta bude mít jiný title než zadaný text a dueDate nastavený
    if (card.dueDate && card.title !== t) {
      announce("Karta „" + card.title + "“ přidána s termínem " + formatDate(card.dueDate) + ".");
    } else {
      announce("Karta přidána.");
    }
    inp.value = "";
    // Focus zpět na input pro rychlé psaní další karty (setTimeout pro spolehlivost napříč prohlížeči)
    setTimeout(() => inp.focus(), 10);
    // Pokud vložený text byl URL, zkusíme dohledat titulek a přidat přílohu
    if (looksLikeUrl(t)) enhanceCardIfUrl(card.id);
  }
  function cleanup() {
    addArea.replaceChildren(el("button", { onclick: () => addCardInline(list, addArea, cardsEl) }, T("addCard")));
  }
  addArea.replaceChildren(inp, hint, el("div", { style:{ display:"flex", gap:"4px", marginTop:"4px" } }, ok, cancel));
  // Při prvním zobrazení inputu nastavit focus (některé prohlížeče vyžadují setTimeout po DOM mutaci)
  setTimeout(() => inp.focus(), 10);
  inp.addEventListener("keydown", e => {
    if (e.key === "Enter") { e.preventDefault(); doAdd(); }
    if (e.key === "Escape") cleanup();
  });
}

function renderCard(card, list, position) {

    onkeydown: (e) => onCardKey(e, card),

    ondragend: () => node.classList.remove("dragging"),

  if (state.ui.selectionMode) {
    const isSelected = (state.ui.selectedCards || []).includes(card.id);

      type: "checkbox",
      class: "card-select-cb",
      checked: isSelected,
      "aria-label": "Vybrat kartu „" + eff.title + "“",

  } else if (eff.time && (eff.time.spentSec || eff.time.runningSince)) {
    let sec = eff.time.spentSec || 0;
    if (eff.time.runningSince) sec += Math.round((Date.now() - eff.time.runningSince) / 1000);
    meta.appendChild(el("span", { class:"meta-chip", title:"Strávený čas" }, "⏱ " + formatHours(sec)));
  }

  if (prog.total) meta.appendChild(el("span", { class:"meta-chip", title:"Checklist" }, `☑ ${prog.done}/${prog.total} (${prog.pct} %)`));
  if (eff.comments && eff.comments.length) meta.appendChild(el("span", { class:"meta-chip", title:"Komentáře: " + eff.comments.length, "aria-label":"Komentáře: " + eff.comments.length }, `💬 ${eff.comments.length}`));
  if (eff.attachments && eff.attachments.length) meta.appendChild(el("span", { class:"meta-chip", title:"Přílohy: " + eff.attachments.length, "aria-label":"Přílohy: " + eff.attachments.length }, `📎 ${eff.attachments.length}`));

  }
  if (eff.dependencies) {
    const blCount = (eff.dependencies.blocks || []).length;
    const byCount = (eff.dependencies.blockedBy || []).length;
    const relCount = (eff.dependencies.related || []).length;
    // Spočítej kolik z blokujících karet je ještě otevřených (reálně blokuje)
    const openBlocking = (eff.dependencies.blockedBy || []).filter(id => {
      const o = getCard(id); return o && !o.completed && !o.archived && !o.deleted;
    }).length;
    if (blCount) ind.appendChild(el("span", { class:"dep-badge", title: `Tato karta blokuje ${blCount} dalších` }, "🚧 blokuje " + blCount));
    if (byCount) {
      const stillOpen = openBlocking > 0;
      ind.appendChild(el("span", {
        class:"dep-badge",
        style:{ background: stillOpen ? "var(--danger-bg)" : "var(--success-bg)", color: stillOpen ? "var(--danger)" : "var(--success)" },
        title: stillOpen ? `Blokována ${openBlocking} otevřenými kartami` : "Všechny blokující karty jsou hotové"
      }, stillOpen ? ("⛔ čeká na " + openBlocking) : ("✅ odblokována")));
    }
    if (relCount) ind.appendChild(el("span", { class:"dep-badge", title:"Souvisí s jinou kartou" }, "🔗 " + relCount));
  }
  if (isMirror) ind.appendChild(el("span", { class:"mirror-badge", title:"Zrcadlená kopie" }, "↪ zrcadlo"));
  if (ind.children.length) node.appendChild(ind);
  return node;
}
function cardAriaLabel(card, eff) {
  const parts = [eff.title];
  if (eff.completed) parts.push("hotovo");
  if (eff.dueDate) {
    const days = daysFromNow(eff.dueDate);
    if (days < 0) parts.push("po termínu o " + (-days) + " dní");
    else if (days === 0) parts.push("termín dnes");
    else parts.push("termín za " + days + " dní");
  }
  if (eff.members && eff.members.length) parts.push("členové: " + eff.members.map(id => { const m = getMember(id); return m ? m.name : ""; }).filter(Boolean).join(", "));
  if (eff.labels && eff.labels.length) parts.push("štítky: " + eff.labels.map(id => { const l = getLabel(eff.boardId, id); return l ? l.name : ""; }).filter(Boolean).join(", "));
  const prog = checklistProgress(eff);
  if (prog.total) parts.push("checklist " + prog.done + " z " + prog.total);
  if (eff.dependencies) {
    const openBlocking = (eff.dependencies.blockedBy || []).filter(id => {
      const o = getCard(id); return o && !o.completed && !o.archived && !o.deleted;
    }).length;
    if (openBlocking > 0) parts.push("blokována " + openBlocking + " otevřenými kartami");
    else if ((eff.dependencies.blockedBy || []).length > 0) parts.push("všechny blokující karty jsou hotové, připraveno");
    if ((eff.dependencies.blocks || []).length > 0) parts.push("blokuje " + eff.dependencies.blocks.length + " dalších karet");
  }
  if (eff.parentCardId) {
    const p = getCard(eff.parentCardId);
    if (p) parts.push("podkarta karty " + p.title);
  }
  const subs = getSubcards(eff.id);
  if (subs.length) {
    const done = subs.filter(s => s.completed).length;
    parts.push("má " + subs.length + " podkaret, " + done + " hotových");
  }
  return parts.join(", ");
}

  return `${m}m`;
}

  if (e.key === " " && !e.ctrlKey && !e.metaKey) { e.preventDefault(); toggleSelect(card.id); renderView(); return; }

  if (e.key === "Enter" && (e.ctrlKey || e.metaKey)) { e.preventDefault(); toggleCardComplete(card.id); renderView(); return; }
  // Modifier-free single keys (do not intercept when user holds Ctrl/Alt/Meta):

    if (e.key === "l" || e.key === "L") { e.preventDefault(); openCardLabelsDialog(card.id); return; }
    // 'd' — termín
    if (e.key === "d" || e.key === "D") { e.preventDefault(); openSetDueDialog(card.id); return; }
    // 'c' — komentář
    if (e.key === "c" || e.key === "C") { e.preventDefault(); openCardCommentDialog(card.id); return; }

  if (!_kbdGrabbed) {
    if (e.key === "ArrowDown" || e.key === "ArrowUp") {
      e.preventDefault();
      const cards = $$(".card", e.target.closest(".list-cards"));
      const i = cards.indexOf(e.target);
      const next = e.key === "ArrowDown" ? cards[i+1] : cards[i-1];
      if (next) next.focus();
    }
    if (e.key === "ArrowLeft" || e.key === "ArrowRight") {
      e.preventDefault();
      const lists = $$(".list");
      const cur = e.target.closest(".list");
      const idx = lists.indexOf(cur);
      const target = e.key === "ArrowRight" ? lists[idx+1] : lists[idx-1];
      if (target) {
        const tCards = $$(".card", target);
        if (tCards.length) tCards[0].focus();
      }
    }
  }
}
function kbdMoveCard(card, dir) {
  if (dir === "up" || dir === "down") {
    const siblings = cardsInList(card.listId);
    const i = siblings.findIndex(c => c.id === card.id);
    const j = dir === "up" ? i-1 : i+1;
    if (j < 0 || j >= siblings.length) return;
    moveCard(card.id, card.listId, j);
    sound.click();
    renderView();
    setTimeout(() => { const f = document.querySelector(`.card[data-card-id="${card.id}"]`); if (f) f.focus(); }, 30);
    announce("Posunuto " + (dir === "up" ? "nahoru" : "dolů") + ".");
  }
  if (dir === "left" || dir === "right") {
    const board = getBoard(card.boardId);
    const lists = listsInBoard(board.id);
    const i = lists.findIndex(l => l.id === card.listId);
    const j = dir === "left" ? i-1 : i+1;
    if (j < 0 || j >= lists.length) return;
    moveCard(card.id, lists[j].id);
    sound.drop();
    renderView();
    setTimeout(() => { const f = document.querySelector(`.card[data-card-id="${card.id}"]`); if (f) f.focus(); }, 30);
    announce("Přesunuto do seznamu „" + lists[j].name + "“.");
  }
}
function renderBulkBar() {
  const existing = $("#bulkBar");
  if (existing) existing.remove();
  const sel = state.ui.selectedCards;
  if (!sel || !sel.length) return;
  const bar = el("div", { class:"bulk-bar", id:"bulkBar" },
    el("span", {}, T("bulkSelected", sel.length)),
    el("button", { class:"ghost", onclick: () => bulkAction("complete") }, T("activityCompleted")),
    el("button", { class:"ghost", onclick: () => bulkAction("archive") }, T("bulkArchive")),
    el("button", { class:"ghost", onclick: () => bulkAction("move") }, T("bulkMove")),
    el("button", { class:"ghost", onclick: () => bulkAction("label") }, T("bulkLabel")),
    el("button", { class:"danger", onclick: () => bulkAction("delete") }, T("bulkDelete")),
    el("button", { class:"ghost", onclick: () => { state.ui.selectedCards = []; renderView(); } }, T("deselect")),
  );
  document.body.appendChild(bar);
}
async function bulkAction(action) {
  const sel = state.ui.selectedCards || [];
  if (!sel.length) return;
  if (action === "complete") sel.forEach(id => { const c = getCard(id); if (c && !c.completed) toggleCardComplete(id); });
  if (action === "archive") sel.forEach(archiveCard);
  if (action === "delete") {
    if (!await confirm2("Smazat " + sel.length + " karet?", { danger:true })) return;
    sel.forEach(deleteCard);
    sound.remove();
  }
  if (action === "move") {
    const tgt = await pickList();
    if (tgt) sel.forEach(id => moveCard(id, tgt));
  }
  if (action === "label") {
    const board = getBoard(getCard(sel[0])?.boardId);
    if (!board) return;
    const lid = await pickLabel(board);
    if (lid) sel.forEach(id => { const c = getCard(id); if (c && !c.labels.includes(lid)) toggleCardLabel(id, lid); });
  }
  state.ui.selectedCards = [];
  renderView();
}
function pickList() {
  return new Promise(resolve => {
    const sel = el("select", { id:"plList" });
    boardsInWorkspace().forEach(b => {
      const og = el("optgroup", { label: b.name });
      listsInBoard(b.id).forEach(l => og.appendChild(el("option", { value:l.id }, l.name)));
      sel.appendChild(og);
    });
    const m = openModal({
      title: T("pickList"),
      body: el("div", { class:"field-row" }, sel),
      footer: [
        el("button", { class:"ghost", onclick: () => { m.close(); resolve(null); } }, T("cancel")),
        el("button", { class:"primary", onclick: () => { const v = sel.value; m.close(); resolve(v); } }, T("save")),
      ],
      size:"small",
    });
  });
}
function pickLabel(board) {
  return new Promise(resolve => {
    const ul = el("ul", { class:"picker-list" });
    board.labels.forEach(l => {
      ul.appendChild(el("li", {}, el("button", { onclick: () => { m.close(); resolve(l.id); } },
        el("span", { class:"label-chip", style:{ background: colorVar(l.color) } }), l.name)));
    });
    const m = openModal({ title: T("pickLabels"), body: ul, size:"small", footer:[el("button", { class:"ghost", onclick: () => { m.close(); resolve(null); } }, T("cancel"))] });
  });
}
