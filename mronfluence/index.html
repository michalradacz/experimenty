<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MRonfluence</title>
<style>
:root{
  --ink:#1a1d24; --ink-soft:#4a4f5c; --ink-faint:#767c8a;
  --paper:#fbfaf7; --panel:#ffffff; --line:#e3e0d8; --line-soft:#efece5;
  --accent:#3a5a78; --accent-soft:#e8eef3; --accent-ink:#25415a;
  --amber:#8a6d1f; --amber-soft:#f6efd8;
  --green:#3f6b47; --green-soft:#e3efe4;
  --red:#9a3b3b; --red-soft:#f3e2e0;
  --draft:#8a6d1f; --pub:#3f6b47; --arch:#767c8a;
  --focus:#2563eb;
  --mono:"SFMono-Regular",Consolas,"Liberation Mono",Menlo,monospace;
  --sans:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans",Helvetica,Arial,sans-serif;
  --serif:"Iowan Old Style","Palatino Linotype",Palatino,"Book Antiqua",Georgia,serif;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  font-family:var(--sans); color:var(--ink); background:var(--paper);
  font-size:16px; line-height:1.55;
}
.skip{position:absolute;left:-9999px;top:0;background:var(--accent);color:#fff;padding:.5em 1em;z-index:100}
.skip:focus{left:.5em;top:.5em}
:focus-visible{outline:3px solid var(--focus);outline-offset:2px}
button,input,select,textarea{font:inherit;color:inherit}
button{cursor:pointer}
a{color:var(--accent-ink)}

/* ---- masthead ---- */
.masthead{background:var(--panel);border-bottom:2px solid var(--line);padding:.6em 1em}
.masthead-row{display:flex;gap:1em;align-items:center;flex-wrap:wrap;max-width:1500px;margin:0 auto}
.brand{font-family:var(--serif);font-size:1.35rem;font-weight:600;letter-spacing:.01em;margin:0;color:var(--accent-ink)}
.brand span{color:var(--amber)}
.masthead form{flex:1;min-width:200px;display:flex;gap:.4em}
.masthead input[type=search]{flex:1;padding:.45em .7em;border:1px solid var(--line);border-radius:6px;background:var(--paper)}
.masthead-actions{display:flex;gap:.4em;flex-wrap:wrap}
.btn{padding:.45em .8em;border:1px solid var(--line);border-radius:6px;background:var(--panel);font-size:.9rem}
.btn:hover{background:var(--accent-soft);border-color:var(--accent)}
.btn-primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn-primary:hover{background:var(--accent-ink)}
.btn-sm{padding:.25em .55em;font-size:.82rem}

/* ---- layout ---- */
.shell{display:grid;grid-template-columns:19em minmax(0,1fr) 17em;gap:1px;background:var(--line-soft);max-width:1500px;margin:0 auto;min-height:60vh}
.col{background:var(--paper);padding:1em}
.col-main{background:var(--panel)}
@media(max-width:1100px){.shell{grid-template-columns:16em minmax(0,1fr)}.col-context{grid-column:1/-1}}
@media(max-width:820px){.shell{grid-template-columns:1fr}.col-nav,.col-context{border-top:1px solid var(--line)}}
body.onecol .shell{grid-template-columns:1fr}
body.onecol .col-nav,body.onecol .col-context{border-top:1px solid var(--line)}

/* ---- nav tree ---- */
.nav-h{font-size:.78rem;text-transform:uppercase;letter-spacing:.08em;color:var(--ink-faint);margin:.2em 0 .6em}
.space-block{margin-bottom:.5em;border:1px solid var(--line);border-radius:8px;background:var(--panel);overflow:hidden}
.space-block>summary{padding:.5em .7em;font-weight:600;cursor:pointer;list-style:none;display:flex;align-items:center;gap:.5em}
.space-block>summary::-webkit-details-marker{display:none}
.space-block>summary::before{content:"▸";color:var(--ink-faint);font-size:.8em}
.space-block[open]>summary::before{content:"▾"}
.space-block>summary:hover{background:var(--accent-soft)}
.tree,.tree ul{list-style:none;margin:0;padding:0}
.tree{padding:.3em .3em .5em}
.tree ul{padding-left:1.1em;border-left:1px solid var(--line-soft);margin-left:.55em}
.tree li{margin:.05em 0}
.tree .row{display:flex;align-items:center;gap:.3em;border-radius:5px;padding:.15em .3em}
.tree .row:hover{background:var(--accent-soft)}
.tree .row.current{background:var(--accent-soft);font-weight:600}
.tree .disc{background:none;border:none;padding:0 .2em;color:var(--ink-faint);width:1.3em;text-align:center}
.tree .page-link{background:none;border:none;text-align:left;flex:1;padding:.1em 0;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tree .stat{font-size:.62rem;padding:.05em .35em;border-radius:99px;font-weight:700;text-transform:uppercase;letter-spacing:.03em}
.stat-draft{background:var(--amber-soft);color:var(--draft)}
.stat-pub{background:var(--green-soft);color:var(--pub)}
.stat-arch{background:var(--line-soft);color:var(--arch)}

/* ---- breadcrumb + page head ---- */
.crumbs{font-size:.85rem;color:var(--ink-soft);margin-bottom:.4em}
.crumbs button{background:none;border:none;color:var(--accent-ink);padding:0 .2em;text-decoration:underline}
.crumbs .sep{color:var(--ink-faint)}
.page-title{font-family:var(--serif);font-size:2rem;line-height:1.2;margin:.1em 0 .3em}
.page-meta{display:flex;gap:.8em;flex-wrap:wrap;font-size:.85rem;color:var(--ink-faint);border-bottom:1px solid var(--line);padding-bottom:.6em;margin-bottom:1em;align-items:center}
.labels{display:flex;gap:.35em;flex-wrap:wrap}
.label{background:var(--accent-soft);color:var(--accent-ink);border-radius:99px;padding:.1em .6em;font-size:.78rem}
.label button{background:none;border:none;color:var(--accent-ink);padding:0 0 0 .3em}

/* ---- rendered content ---- */
.content{font-size:1.02rem}
.content h1,.content h2,.content h3{font-family:var(--serif);line-height:1.25;margin:1.4em 0 .4em}
.content h1{font-size:1.7rem}.content h2{font-size:1.35rem}.content h3{font-size:1.12rem}
.content p{margin:.7em 0}
.content ul,.content ol{margin:.6em 0;padding-left:1.5em}
.content code{font-family:var(--mono);background:var(--line-soft);padding:.1em .35em;border-radius:4px;font-size:.9em}
.content pre{background:#20242c;color:#e6e6e6;padding:1em;border-radius:8px;overflow:auto;font-family:var(--mono);font-size:.86rem}
.content pre code{background:none;padding:0;color:inherit}
.content blockquote{border-left:3px solid var(--accent);margin:.8em 0;padding:.2em 1em;color:var(--ink-soft);background:var(--accent-soft)}
.content table{border-collapse:collapse;margin:.8em 0;width:100%}
.content th,.content td{border:1px solid var(--line);padding:.4em .6em;text-align:left}
.content th{background:var(--paper)}
.content hr{border:none;border-top:1px solid var(--line);margin:1.2em 0}
.content img{max-width:100%;height:auto;border-radius:6px}
.content a{color:var(--accent-ink)}
.macro-panel{border-radius:8px;padding:.8em 1em;margin:.9em 0;border:1px solid var(--line)}
.macro-info{background:var(--accent-soft);border-color:#c9d8e5}
.macro-note{background:var(--amber-soft);border-color:#e6d9a8}
.macro-warn{background:var(--red-soft);border-color:#e2bdba}
.macro-success{background:var(--green-soft);border-color:#bcd9c0}
.macro-panel .macro-h{font-weight:700;margin-bottom:.2em}
.content details.expand{border:1px solid var(--line);border-radius:8px;padding:.2em .8em;margin:.7em 0;background:var(--paper)}
.content details.expand>summary{cursor:pointer;font-weight:600;padding:.3em 0}
.diagram{background:var(--paper);border:1px dashed var(--line);border-radius:8px;padding:1em;margin:.9em 0;overflow:auto}
.diagram svg{max-width:100%}
.diagram-fallback{font-family:var(--mono);font-size:.82rem;white-space:pre-wrap;color:var(--ink-soft)}
.mathblock{text-align:center;margin:.8em 0;font-family:var(--serif)}

/* inline comment highlight */
.cmnt-mark{background:var(--amber-soft);border-bottom:2px solid var(--amber);cursor:pointer;border-radius:2px 2px 0 0}
.cmnt-mark.resolved{background:var(--line-soft);border-bottom-color:var(--arch)}

/* critic markup */
.crit-add{background:var(--green-soft);text-decoration:none}
.crit-del{background:var(--red-soft);text-decoration:line-through}
.crit-sub-old{background:var(--red-soft);text-decoration:line-through}
.crit-sub-new{background:var(--green-soft)}
.crit-comment{background:var(--amber-soft);font-style:italic;border-radius:3px;padding:0 .2em}
.crit-hl{background:#fff3b0}

/* ---- context col ---- */
.ctx-sec{margin-bottom:1.3em}
.ctx-h{font-size:.78rem;text-transform:uppercase;letter-spacing:.08em;color:var(--ink-faint);margin:0 0 .5em;border-bottom:1px solid var(--line);padding-bottom:.3em}
.toc,.toc ul{list-style:none;margin:0;padding:0}
.toc ul{padding-left:.9em}
.toc button{background:none;border:none;text-align:left;color:var(--accent-ink);padding:.15em 0;font-size:.88rem;width:100%}
.toc button:hover{text-decoration:underline}
.ctx-list{list-style:none;margin:0;padding:0;font-size:.88rem}
.ctx-list li{margin:.25em 0}
.ctx-list button{background:none;border:none;color:var(--accent-ink);text-align:left;padding:0}
.ctx-list button:hover{text-decoration:underline}
.ver-item{display:flex;justify-content:space-between;gap:.4em;font-size:.83rem;padding:.25em 0;border-bottom:1px solid var(--line-soft);align-items:baseline}
.ver-item .vmeta{color:var(--ink-faint)}

/* ---- comments ---- */
.comments{margin-top:2em;border-top:2px solid var(--line);padding-top:1em}
.comments h2{font-family:var(--serif);font-size:1.2rem;margin:.2em 0 .7em}
.comment{border:1px solid var(--line);border-radius:8px;padding:.6em .8em;margin:.6em 0;background:var(--paper)}
.comment.inline{border-left:3px solid var(--amber)}
.comment.resolved{opacity:.7;background:var(--line-soft)}
.comment-head{display:flex;gap:.6em;font-size:.8rem;color:var(--ink-faint);margin-bottom:.3em;align-items:center;flex-wrap:wrap}
.comment-quote{font-size:.83rem;color:var(--ink-soft);border-left:2px solid var(--amber);padding-left:.5em;margin:.2em 0;font-style:italic}
.comment-body{white-space:pre-wrap}
.comment-actions{display:flex;gap:.4em;margin-top:.4em}
.chip{font-size:.68rem;padding:.05em .5em;border-radius:99px;font-weight:700;text-transform:uppercase}
.chip-open{background:var(--amber-soft);color:var(--amber)}
.chip-res{background:var(--green-soft);color:var(--green)}

/* ---- editor ---- */
.editor-wrap{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--line-soft);border:1px solid var(--line);border-radius:8px;overflow:hidden;margin:1em 0}
@media(max-width:820px){.editor-wrap{grid-template-columns:1fr}}
.editor-pane{background:var(--panel);padding:.6em}
.editor-pane h3{margin:.1em 0 .5em;font-size:.85rem;text-transform:uppercase;letter-spacing:.06em;color:var(--ink-faint)}
.editor-toolbar{display:flex;gap:.25em;flex-wrap:wrap;margin-bottom:.4em}
.editor-toolbar button{padding:.2em .5em;font-size:.8rem;border:1px solid var(--line);border-radius:5px;background:var(--paper)}
textarea.editor{width:100%;min-height:55vh;font-family:var(--mono);font-size:.9rem;border:1px solid var(--line);border-radius:6px;padding:.6em;resize:vertical;background:var(--paper);line-height:1.5}
.preview-pane{overflow:auto;max-height:70vh}

/* ---- database ---- */
.db-toolbar{display:flex;gap:.5em;flex-wrap:wrap;align-items:center;margin:.6em 0}
.db-toolbar select,.db-toolbar input{padding:.35em .5em;border:1px solid var(--line);border-radius:6px;background:var(--panel)}
.viewtabs{display:flex;gap:.3em;margin:.5em 0}
.viewtabs button{padding:.3em .7em;border:1px solid var(--line);border-radius:6px;background:var(--panel);font-size:.85rem}
.viewtabs button[aria-pressed=true]{background:var(--accent);color:#fff;border-color:var(--accent)}
.db-table{border-collapse:collapse;width:100%;font-size:.9rem}
.db-table th,.db-table td{border:1px solid var(--line);padding:.4em .6em;text-align:left}
.db-table th{background:var(--paper);cursor:pointer}
.db-table th button{background:none;border:none;font:inherit;font-weight:700;cursor:pointer}
.db-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:.7em}
.db-card{border:1px solid var(--line);border-radius:8px;padding:.7em;background:var(--paper)}
.db-card h4{margin:.1em 0 .4em;font-size:.95rem}
.db-card dl{margin:0;font-size:.82rem}
.db-card dt{color:var(--ink-faint);font-size:.72rem;text-transform:uppercase;letter-spacing:.03em;margin-top:.3em}
.db-board{display:grid;grid-auto-flow:column;grid-auto-columns:minmax(200px,1fr);gap:.6em;overflow-x:auto}
.db-lane{border:1px solid var(--line);border-radius:8px;background:var(--paper);padding:.5em}
.db-lane h4{margin:.1em 0 .5em;font-size:.85rem}
.db-lane .db-card{margin-bottom:.5em;background:var(--panel)}
.dbval-status{font-size:.72rem;padding:.1em .5em;border-radius:99px;background:var(--accent-soft);color:var(--accent-ink)}

/* ---- whiteboard ---- */
.wb-toolbar{display:flex;gap:.4em;flex-wrap:wrap;margin:.5em 0}
.wb-canvas{position:relative;border:1px solid var(--line);border-radius:8px;background:
  linear-gradient(90deg,var(--line-soft) 1px,transparent 1px) 0 0/24px 24px,
  linear-gradient(var(--line-soft) 1px,transparent 1px) 0 0/24px 24px,var(--paper);
  min-height:340px;overflow:auto;padding:0}
.wb-note{position:absolute;min-width:110px;max-width:180px;padding:.5em;border-radius:6px;font-size:.85rem;box-shadow:0 1px 4px rgba(0,0,0,.15);border:1px solid rgba(0,0,0,.08)}
.wb-note textarea{width:100%;border:none;background:transparent;resize:none;font-size:.85rem;min-height:3em}
.wb-note .wb-del{position:static;float:right;background:none;border:none;font-size:.9em;color:var(--ink-soft)}
.wb-text-alt{margin-top:.7em;border:1px solid var(--line);border-radius:8px;padding:.7em;background:var(--paper)}
.wb-text-alt h4{margin:.1em 0 .4em;font-size:.85rem}
.wb-text-alt ul{margin:.2em 0;padding-left:1.3em;font-size:.9rem}

/* ---- dialog ---- */
dialog{border:1px solid var(--line);border-radius:12px;padding:0;max-width:560px;width:calc(100% - 2em);box-shadow:0 8px 40px rgba(0,0,0,.25)}
dialog::backdrop{background:rgba(20,22,28,.45)}
.dlg-head{padding:.8em 1em;border-bottom:1px solid var(--line);font-family:var(--serif);font-size:1.15rem;font-weight:600}
.dlg-body{padding:1em}
.dlg-body label{display:block;font-size:.85rem;font-weight:600;margin:.7em 0 .2em}
.dlg-body input,.dlg-body select,.dlg-body textarea{width:100%;padding:.45em .6em;border:1px solid var(--line);border-radius:6px;background:var(--paper)}
.dlg-foot{padding:.8em 1em;border-top:1px solid var(--line);display:flex;gap:.5em;justify-content:flex-end}
.field-row{display:flex;gap:.5em}
.field-row>*{flex:1}

/* ---- misc ---- */
.empty{color:var(--ink-faint);font-style:italic;padding:1.5em 0;text-align:center}
.log{margin-top:1.5em;border:1px solid var(--line);border-radius:8px;background:var(--paper)}
.log summary{padding:.5em .8em;font-size:.82rem;color:var(--ink-faint);cursor:pointer}
.log-body{padding:.5em .8em;font-family:var(--mono);font-size:.78rem;max-height:150px;overflow:auto;border-top:1px solid var(--line-soft);white-space:pre-wrap}
.sr-status{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0 0 0 0)}
.pagefoot{max-width:1500px;margin:0 auto;padding:1em;font-size:.8rem;color:var(--ink-faint);text-align:center}
.diff-line-add{background:var(--green-soft)}
.diff-line-del{background:var(--red-soft);text-decoration:line-through}
.diff-line-ctx{color:var(--ink-soft)}
.diff-wrap{font-family:var(--mono);font-size:.82rem;white-space:pre-wrap;border:1px solid var(--line);border-radius:8px;padding:.7em;background:var(--paper)}
.autorule{border:1px solid var(--line);border-radius:8px;padding:.6em .8em;margin:.5em 0;background:var(--paper);font-size:.9rem}
.autorule .ar-when{color:var(--accent-ink);font-weight:600}

/* ---- makra: status, date, progress, tabs, columns, include, excerpt ---- */
.status-badge{display:inline-block;font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.03em;padding:.12em .6em;border-radius:99px;vertical-align:middle}
.status-green{background:var(--green-soft);color:var(--green)}
.status-red{background:var(--red-soft);color:var(--red)}
.status-yellow{background:var(--amber-soft);color:var(--amber)}
.status-blue{background:var(--accent-soft);color:var(--accent-ink)}
.status-grey{background:var(--line-soft);color:var(--arch)}
.date-badge{display:inline-block;font-size:.82rem;background:var(--accent-soft);color:var(--accent-ink);padding:.05em .5em;border-radius:5px}
.progress-wrap{position:relative;background:var(--line-soft);border-radius:99px;height:1.5em;margin:.6em 0;overflow:hidden;border:1px solid var(--line)}
.progress-bar{position:absolute;left:0;top:0;bottom:0;background:var(--accent);border-radius:99px}
.progress-label{position:relative;z-index:1;display:block;text-align:center;font-size:.8rem;line-height:1.5em;font-weight:600;color:var(--ink)}
.tabs-wrap{border:1px solid var(--line);border-radius:8px;overflow:hidden;margin:.9em 0}
.tabs-nav{display:flex;gap:0;background:var(--paper);border-bottom:1px solid var(--line);flex-wrap:wrap}
.tab-btn{background:none;border:none;padding:.5em .9em;font-size:.9rem;border-bottom:3px solid transparent}
.tab-btn[aria-selected=true]{border-bottom-color:var(--accent);font-weight:600;background:var(--panel)}
.tab-btn:hover{background:var(--accent-soft)}
.tab-panel{padding:.8em}
.columns-wrap{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:1em;margin:.9em 0}
.column{min-width:0}
.include-box{border:1px solid var(--line);border-left:3px solid var(--accent);border-radius:6px;padding:.3em .8em;margin:.9em 0;background:var(--paper)}
.include-h{font-size:.78rem;color:var(--ink-faint);text-transform:uppercase;letter-spacing:.04em;margin:.3em 0}
.excerpt-box{border-left:3px solid var(--amber);padding-left:.8em;margin:.6em 0}
.decision-item{border-left:4px solid var(--green)}
.livesearch-input:focus{outline:2px solid var(--focus)}
.ls-results li{padding:.2em 0}
.anchor-target{display:block;height:0;scroll-margin-top:1em}
.attach-bar{display:flex;gap:.5em;flex-wrap:wrap;align-items:center;margin:.4em 0;font-size:.85rem}

/* ---- avatar / autor ---- */
.avatar{display:inline-flex;align-items:center;justify-content:center;width:1.5em;height:1.5em;border-radius:50%;color:#fff;font-size:.62rem;font-weight:700;letter-spacing:.02em;vertical-align:middle;flex:none}
.author-chip{display:inline-flex;align-items:center;gap:.35em;font-size:.82rem;color:var(--ink-soft)}
.masthead .avatar{width:2em;height:2em;font-size:.8rem}
#btnUser{display:flex;align-items:center;gap:.4em}

/* ---- slash / makro menu ---- */
.slash-menu{position:absolute;z-index:50;background:var(--panel);border:1px solid var(--line);border-radius:8px;box-shadow:0 6px 24px rgba(0,0,0,.18);max-height:280px;overflow:auto;width:300px;padding:.3em}
.slash-menu[hidden]{display:none}
.slash-group{font-size:.68rem;text-transform:uppercase;letter-spacing:.06em;color:var(--ink-faint);padding:.4em .5em .15em}
.slash-item{display:flex;gap:.5em;align-items:baseline;width:100%;text-align:left;background:none;border:none;padding:.4em .5em;border-radius:6px;font-size:.88rem}
.slash-item:hover,.slash-item.active{background:var(--accent-soft)}
.slash-item .si-key{font-family:var(--mono);font-size:.75rem;color:var(--ink-faint)}
.slash-item .si-desc{color:var(--ink-soft);font-size:.78rem;margin-left:auto}

/* ---- makro tlačítko dropdown ---- */
.macro-menu-wrap{position:relative;display:inline-block}
.macro-dropdown{position:absolute;z-index:40;top:100%;left:0;background:var(--panel);border:1px solid var(--line);border-radius:8px;box-shadow:0 6px 24px rgba(0,0,0,.18);width:300px;max-height:320px;overflow:auto;padding:.3em;margin-top:.2em}
.macro-dropdown[hidden]{display:none}

/* ---- verze příloh ---- */
.att-ver{font-size:.78rem;color:var(--ink-faint)}
.att-ver-list{list-style:none;margin:.2em 0 0;padding:0 0 0 1.5em}
.att-ver-list li{padding:.15em 0}

/* ---- byline (autorství pod titulkem) ---- */
.byline{display:flex;flex-wrap:wrap;gap:1.2em;align-items:center;margin:.2em 0 .5em;font-size:.85rem;color:var(--ink-soft)}
.byline-main,.byline-owner{display:inline-flex;align-items:center;gap:.35em}
.byline-date{color:var(--ink-faint)}
.readtime{color:var(--ink-faint)}
.user-link{background:none;border:none;padding:.05em .3em;border-radius:99px;cursor:pointer;display:inline-flex;align-items:center;gap:.3em;font:inherit;color:var(--accent-ink)}
.user-link:hover{background:var(--accent-soft)}
.brand{background:none;border:none;cursor:pointer}
.notif-count{display:inline-block;background:var(--red);color:#fff;border-radius:99px;font-size:.62rem;padding:.05em .4em;margin-left:.2em;font-weight:700}

/* ---- home / dashboard ---- */
.home-h{font-family:var(--serif);font-size:1.15rem;margin:1.4em 0 .5em;border-bottom:1px solid var(--line);padding-bottom:.3em}
.home-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:.9em}
.home-card{border:1px solid var(--line);border-radius:10px;padding:.8em 1em;background:var(--paper)}

/* ---- notifikace ---- */

<body>
<a class="skip" href="#main">Přeskočit na obsah</a>

      <input type="search" id="searchInput" placeholder="Hledat stránky, štítky, přílohy…" aria-label="Hledaný výraz">

      <button class="btn" id="btnLoadProject" accesskey="o" title="Načíst projekt ze souboru (Alt+O)">Načíst projekt</button>

<div class="shell">
  <nav class="col col-nav" aria-label="Prostory a stránky">

  </nav>

  <main class="col col-main" id="main" tabindex="-1">

  <aside class="col col-context" aria-label="Kontext stránky" id="contextCol"></aside>
</div>

<p class="sr-status" id="srStatus" aria-live="polite"></p>
<footer class="pagefoot">MRonfluence — jednouživatelský pracovní prostor. Vše běží lokálně ve vašem prohlížeči.</footer>

<script>
"use strict";
/* ================================================================
   MRonfluence — jednouživatelská, plně přístupná obdoba Confluence.
   Vše v jednom souboru. Data žijí v paměti běhu aplikace.
   ================================================================ */

/* ---------- Stav aplikace ---------- */
const state = {
  spaces: [],        // {id,key,name,pages:[],attachments:[],homepage,description}
  pages: {},         // id -> page objekt
  current: null,     // ID otevřené stránky
  editing: false,    // režim editace
  view: null,        // speciální pohled: "home","favorites","people","profile:Jméno","search"
  rules: [],         // automatizační pravidla
  user: { name:"Já", initials:"JÁ" },   // aktuální identita
  identities: [],    // dřívější jména, pro rychlé přepnutí (budí dojem víc uživatelů)
  views: [],         // recently viewed: [{pageId, ts, by}]
  activity: [],      // feed: [{ts, actor, action, pageId, detail}]
  notifications: [], // [{ts, text, pageId, forUser, read}]
  seq: 1
};
/* zapíše událost do feedu a vygeneruje upozornění sledujícím */
function logActivity(action, pageId, detail){
  const u=currentUser();
  state.activity.unshift({ts:now(), actor:u.name, actorInitials:u.initials, action, pageId, detail:detail||""});
  if(state.activity.length>300) state.activity.length=300;
  // upozorni sledující (kromě autora akce)
  const p=pageId?page(pageId):null;
  if(p && p.watchers){ p.watchers.forEach(w=>{ if(w!==u.name){ state.notifications.unshift({ts:now(), text:actionText(action,detail)+" — "+(p.title||"(bez názvu)"), pageId, forUser:w, read:false, actor:u.name}); } }); }
  if(state.notifications.length>200) state.notifications.length=200;
}
function actionText(action,detail){
  return {created:"Vytvořena stránka",edited:"Upravena stránka",published:"Publikována stránka",commented:"Nový komentář",attached:"Nahrána příloha",status:"Změněn stav"}[action]||action;
}
/* recently viewed */
function trackView(pageId){
  const u=currentUser();
  state.views=state.views.filter(v=>!(v.pageId===pageId && v.by===u.name));
  state.views.unshift({pageId, ts:now(), by:u.name});
  if(state.views.length>100) state.views.length=100;
}
function initials(name){
  const parts=String(name||"").trim().split(/\s+/).filter(Boolean);
  if(!parts.length) return "?";
  if(parts.length===1) return parts[0].slice(0,2).toUpperCase();
  return (parts[0][0]+parts[parts.length-1][0]).toUpperCase();
}
function currentUser(){ return state.user||{name:"Já",initials:"JÁ"}; }
function avatarColor(seed){
  let h=0; for(let i=0;i<String(seed).length;i++){ h=(h*31+String(seed).charCodeAt(i))%360; }
  return "hsl("+h+",42%,42%)";
}
function avatarHtml(name,inits){
  const ii=inits||initials(name);
  return '<span class="avatar" aria-hidden="true" style="background:'+avatarColor(name||ii)+'">'+esc(ii)+'</span>';
}
/* uživatel avatarem i jménem — klikací na profil */
function userChip(name,inits){
  if(!name) return '';
  return '<button class="author-chip user-link" data-profile="'+esc(name)+'" title="Zobrazit profil: '+esc(name)+'">'+avatarHtml(name,inits)+' <span>'+esc(name)+'</span></button>';
}
/* read-time odhad: 265 slov/min + 12s/obrázek */
function readTime(body){
  const words=String(body||"").replace(/[#>*`|{}\-]/g," ").split(/\s+/).filter(Boolean).length;
  const imgs=(String(body||"").match(/!\[|<img|\{attachment|\{gallery/g)||[]).length;
  const secs=Math.round(words/265*60)+imgs*12;
  const min=Math.max(1,Math.round(secs/60));
  return min+" min čtení";
}
function uid(p){ return (p||"id")+"-"+(state.seq++)+"-"+Math.random().toString(36).slice(2,6); }
function now(){ return new Date().toISOString(); }
function fmtDate(iso){
  try{ const d=new Date(iso);
    return d.toLocaleDateString("cs-CZ")+" "+d.toLocaleTimeString("cs-CZ",{hour:"2-digit",minute:"2-digit"});
  }catch(e){ return iso; }
}
function esc(s){ return String(s==null?"":s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }
function log(msg){
  const b=document.getElementById("logBody");
  b.textContent += "["+new Date().toLocaleTimeString("cs-CZ")+"] "+msg+"\n";
  b.scrollTop=b.scrollHeight;
}
function announce(msg){ document.getElementById("srStatus").textContent=msg; }
/* relativní čas: „před 3 h", „včera" */
function relTime(iso){
  try{
    const diff=(Date.now()-new Date(iso).getTime())/1000;
    if(diff<60) return "právě teď";
    if(diff<3600) return "před "+Math.floor(diff/60)+" min";
    if(diff<86400) return "před "+Math.floor(diff/3600)+" h";
    if(diff<172800) return "včera";
    if(diff<604800) return "před "+Math.floor(diff/86400)+" dny";
    return fmtDate(iso).split(" ")[0];
  }catch(e){ return fmtDate(iso); }
}

/* prázdná stránka daného typu */
function newPage(type, spaceId, parentId){
  const t = type||"page";
  const u = currentUser();
  const p = {
    id: uid("page"), type:t, spaceId, parentId:parentId||null,
    title:"", body:"", status:"draft",
    author: u.name, authorInitials: u.initials,     // tvůrce (creator) — neměnný
    creator: u.name, creatorInitials: u.initials,
    lastEditor: u.name, lastEditorInitials: u.initials, // poslední editor
    owner: u.name, ownerInitials: u.initials,       // vlastník (kontaktní osoba)
    labels:[], starred:false, savedForLater:false,
    watchers:[u.name],                               // autowatch
    created:now(), updated:now(),
    versions:[],            // {n,ts,title,body,note,author,authorInitials}
    comments:[],            // {id,ts,text,anchor,resolved,inline,author}
    attachments:[],         // (starší; přílohy teď na prostoru)
    children:[],            // ID podstránek
    db:null,                // pro typ "database"
    board:null              // pro typ "whiteboard"
  };
  if(t==="database"){
    p.db = { columns:[{id:uid("col"),name:"Název",kind:"text"},
                      {id:uid("col"),name:"Stav",kind:"status"}],
             rows:[], view:"table", sortBy:null, sortDir:1, filterCol:null, filterVal:"" };
  }
  if(t==="whiteboard"){ p.board = { notes:[] }; }
  return p;
}

/* najdi prostor / stránku */
function space(id){ return state.spaces.find(s=>s.id===id); }
function page(id){ return state.pages[id]; }
function pagePath(id){
  const chain=[]; let p=page(id);
  while(p){ chain.unshift(p); p=p.parentId?page(p.parentId):null; }
  return chain;
}
function typeLabel(t){ return {page:"Stránka",livedoc:"Živý dokument",database:"Databáze",whiteboard:"Tabule"}[t]||"Stránka"; }
function statusLabel(s){ return {draft:"koncept",published:"publikováno",archived:"archivováno"}[s]||s; }
function statusClass(s){ return {draft:"stat-draft",published:"stat-pub",archived:"stat-arch"}[s]||"stat-draft"; }

/* ================================================================
   RENDERER: Markdown + makra + CriticMarkup + inline komentáře
   ================================================================ */

/* --- inline: tučné, kurzíva, kód, odkazy, [[odkaz na stránku]] --- */
function inlineMd(s){
  let out = esc(s);
  // inline kód nejdřív, chráníme obsah
  const codes=[];
  out = out.replace(/`([^`]+)`/g, (m,c)=>{ codes.push(c); return "\u0000C"+(codes.length-1)+"\u0000"; });
  // inline makro {status:barva|text}
  out = out.replace(/\{status:([^}]+)\}/g,(m,a)=>{
    const parts=a.split("|"); const color=(parts[0]||"grey").trim().toLowerCase(); const txt=(parts[1]||parts[0]||"").trim();
    return '<span class="status-badge status-'+esc(statusColor(color))+'">'+esc(txt)+'</span>';
  });
  // inline makro {date:2026-01-01}
  out = out.replace(/\{date:([^}]+)\}/g,(m,d)=>'<span class="date-badge">📅 '+esc(d.trim())+'</span>');
  // interní odkaz [[Název stránky]]
  out = out.replace(/\[\[([^\]]+)\]\]/g, (m,name)=>{
    const target=Object.values(state.pages).find(p=>p.title.toLowerCase()===name.trim().toLowerCase());
    if(target) return '<a href="#" data-goto="'+target.id+'" class="pagelink">'+esc(name.trim())+'</a>';
    return '<a href="#" data-newlink="'+esc(name.trim())+'" title="Stránka zatím neexistuje">'+esc(name.trim())+'</a>';
  });
  // odkaz [text](url)
  out = out.replace(/\[([^\]]+)\]\(([^)]+)\)/g, (m,t,u)=>'<a href="'+esc(u)+'" rel="noopener">'+esc(t)+'</a>');
  out = out.replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>');
  out = out.replace(/(^|[^*])\*([^*]+)\*/g,'$1<em>$2</em>');
  out = out.replace(/~~([^~]+)~~/g,'<del>$1</del>');
  out = out.replace(/\u0000C(\d+)\u0000/g,(m,i)=>'<code>'+esc(codes[+i])+'</code>');
  return out;
}

/* --- CriticMarkup --- */
function criticMd(s){
  return s
    .replace(/\{\+\+([\s\S]+?)\+\+\}/g,'<ins class="crit-add">$1</ins>')
    .replace(/\{--([\s\S]+?)--\}/g,'<del class="crit-del">$1</del>')
    .replace(/\{~~([\s\S]+?)~>([\s\S]+?)~~\}/g,'<span class="crit-sub-old">$1</span><span class="crit-sub-new">$2</span>')
    .replace(/\{==([\s\S]+?)==\}/g,'<mark class="crit-hl">$1</mark>')
    .replace(/\{>>([\s\S]+?)<<\}/g,'<span class="crit-comment" role="note">$1</span>');
}

/* --- LaTeX (jednoduchý převod běžných konstrukcí) --- */
function renderMath(tex){
  let t=esc(tex.trim());
  t=t.replace(/\\frac\{([^{}]+)\}\{([^{}]+)\}/g,'<span style="display:inline-block;text-align:center;vertical-align:middle"><span style="display:block;border-bottom:1px solid">$1</span><span style="display:block">$2</span></span>');
  t=t.replace(/\\sqrt\{([^{}]+)\}/g,'&radic;<span style="border-top:1px solid">($1)</span>');
  t=t.replace(/\^\{([^{}]+)\}/g,'<sup>$1</sup>').replace(/\^(\w)/g,'<sup>$1</sup>');
  t=t.replace(/_\{([^{}]+)\}/g,'<sub>$1</sub>').replace(/_(\w)/g,'<sub>$1</sub>');
  const sym={"\\times":"×","\\cdot":"·","\\pm":"±","\\leq":"≤","\\geq":"≥","\\neq":"≠","\\infty":"∞","\\sum":"∑","\\int":"∫","\\alpha":"α","\\beta":"β","\\gamma":"γ","\\delta":"δ","\\pi":"π","\\theta":"θ","\\lambda":"λ","\\mu":"μ","\\sigma":"σ","\\rightarrow":"→","\\Rightarrow":"⇒","\\approx":"≈","\\in":"∈"};
  for(const k in sym){ t=t.split(k).join(sym[k]); }
  return t;
}

/* --- Mermaid: velmi lehký nativní renderer pro flowchart a sequence.
       Vždy doplní textovou alternativu pro čtečku. --- */
function renderMermaid(code){
  const first=(code.trim().split(/\n/)[0]||"").trim();
  const alt='<pre class="diagram-fallback" aria-label="Textový zápis diagramu">'+esc(code.trim())+'</pre>';
  try{
    if(/^(flowchart|graph)/i.test(first)) return mermaidFlow(code)+alt;
    if(/^sequenceDiagram/i.test(first)) return mermaidSeq(code)+alt;
  }catch(e){ log("Mermaid: "+e.message); }
  return '<p class="diagram-fallback">Diagram (zobrazen jako zdrojový kód):</p>'+alt;
}
function mermaidFlow(code){
  const lines=code.trim().split(/\n/).slice(1).map(l=>l.trim()).filter(Boolean);
  const nodes={}, edges=[];
  const nodeRe=/([A-Za-z0-9_]+)(\[[^\]]*\]|\([^)]*\)|\{[^}]*\})?/;
  function label(raw,txt){ if(txt){ const inner=txt.slice(1,-1); nodes[raw]=inner; } else if(!(raw in nodes)) nodes[raw]=raw; }
  lines.forEach(l=>{
    const m=l.match(/(.+?)\s*-->\s*(?:\|([^|]*)\|\s*)?(.+)/);
    if(m){
      const a=m[1].match(nodeRe), b=m[3].match(nodeRe);
      label(a[1],a[2]); label(b[1],b[2]);
      edges.push([a[1],b[1],m[2]||""]);
    } else { const a=l.match(nodeRe); if(a) label(a[1],a[2]); }
  });
  // rozvržení: prostě svisle po pořadí
  const order=Object.keys(nodes); const W=200,H=60,GAP=34; const svgW=260;
  const pos={}; order.forEach((n,i)=>pos[n]={x:svgW/2,y:30+i*(H+GAP)});
  let svg='<svg viewBox="0 0 '+svgW+' '+(order.length*(H+GAP)+20)+'" role="img" aria-label="Vývojový diagram">';
  svg+='<defs><marker id="arr" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 z" fill="#3a5a78"/></marker></defs>';
  edges.forEach(([a,b,lbl])=>{
    if(!pos[a]||!pos[b])return;
    const x1=pos[a].x,y1=pos[a].y+H/2,x2=pos[b].x,y2=pos[b].y-H/2;
    svg+='<line x1="'+x1+'" y1="'+y1+'" x2="'+x2+'" y2="'+y2+'" stroke="#3a5a78" stroke-width="1.5" marker-end="url(#arr)"/>';
    if(lbl) svg+='<text x="'+((x1+x2)/2+6)+'" y="'+((y1+y2)/2)+'" font-size="11" fill="#4a4f5c">'+esc(lbl)+'</text>';
  });
  order.forEach(n=>{ const p=pos[n];
    svg+='<rect x="'+(p.x-W/2)+'" y="'+(p.y-H/2)+'" width="'+W+'" height="'+H+'" rx="8" fill="#e8eef3" stroke="#3a5a78"/>';
    svg+='<text x="'+p.x+'" y="'+(p.y+4)+'" font-size="13" text-anchor="middle" fill="#25415a">'+esc(nodes[n])+'</text>';
  });
  svg+='</svg>';
  return svg;
}
function mermaidSeq(code){
  const lines=code.trim().split(/\n/).slice(1).map(l=>l.trim()).filter(Boolean);
  const actors=[]; const msgs=[];
  lines.forEach(l=>{
    const m=l.match(/(.+?)\s*(-->>|->>|-->|->)\s*(.+?)\s*:\s*(.+)/);
    if(m){ [m[1],m[3]].forEach(a=>{ if(!actors.includes(a))actors.push(a); }); msgs.push([m[1],m[3],m[4],m[2]]); }
  });
  const colW=140, topY=40, stepY=42;
  const w=Math.max(actors.length*colW,200), h=topY+msgs.length*stepY+30;
  const ax={}; actors.forEach((a,i)=>ax[a]=colW/2+i*colW);
  let svg='<svg viewBox="0 0 '+w+' '+h+'" role="img" aria-label="Sekvenční diagram">';
  svg+='<defs><marker id="arr2" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 z" fill="#3a5a78"/></marker></defs>';
  actors.forEach(a=>{
    svg+='<rect x="'+(ax[a]-55)+'" y="8" width="110" height="26" rx="6" fill="#e8eef3" stroke="#3a5a78"/>';
    svg+='<text x="'+ax[a]+'" y="25" font-size="12" text-anchor="middle" fill="#25415a">'+esc(a)+'</text>';
    svg+='<line x1="'+ax[a]+'" y1="34" x2="'+ax[a]+'" y2="'+(h-8)+'" stroke="#c9d2da" stroke-dasharray="3 3"/>';
  });
  msgs.forEach((m,i)=>{ const y=topY+18+i*stepY; const x1=ax[m[0]],x2=ax[m[1]];
    const dash=m[3].includes("--")?' stroke-dasharray="4 3"':'';
    svg+='<line x1="'+x1+'" y1="'+y+'" x2="'+x2+'" y2="'+y+'" stroke="#3a5a78" stroke-width="1.4"'+dash+' marker-end="url(#arr2)"/>';
    svg+='<text x="'+((x1+x2)/2)+'" y="'+(y-5)+'" font-size="11" text-anchor="middle" fill="#4a4f5c">'+esc(m[2])+'</text>';
  });
  svg+='</svg>';
  return svg;
}

/* --- PlantUML: zobrazíme jako přehledný textový zápis (bez serveru) --- */
function renderPlantuml(code){
  return '<p class="diagram-fallback">PlantUML diagram (zdrojový zápis):</p>'+
         '<pre class="diagram-fallback" aria-label="Zápis PlantUML diagramu">'+esc(code.trim())+'</pre>';
}

/* --- hlavní blokový renderer --- */
function renderContent(md, pg){
  const src = md.replace(/\r\n/g,"\n");
  const lines = src.split("\n");
  let html="", i=0;
  function flushCommentAnchors(text){
    // {{cmnt:ID|text}} -> obalí zvýrazněním navázaným na komentář
    return text.replace(/\{\{cmnt:([^|}]+)\|([^}]*)\}\}/g,(m,cid,txt)=>{
      const c=pg&&pg.comments.find(x=>x.id===cid);
      const cls="cmnt-mark"+(c&&c.resolved?" resolved":"");
      return '<span class="'+cls+'" data-cmnt="'+esc(cid)+'" tabindex="0" role="button" aria-label="Komentář k textu">'+txt+'</span>';
    });
  }
  function processInline(t){ return flushCommentAnchors(criticMd(inlineMd(t))); }

  while(i<lines.length){
    let line=lines[i];
    // fenced code / makra
    const fence=line.match(/^```(\w*)\s*$/);
    if(fence){
      const lang=fence[1]||""; let buf=[]; i++;
      while(i<lines.length && !/^```\s*$/.test(lines[i])){ buf.push(lines[i]); i++; }
      i++; const code=buf.join("\n");
      if(lang==="mermaid") html+='<div class="diagram">'+renderMermaid(code)+'</div>';
      else if(lang==="plantuml") html+='<div class="diagram">'+renderPlantuml(code)+'</div>';
      else if(lang==="math"||lang==="latex") html+='<div class="mathblock">'+renderMath(code)+'</div>';
      else html+='<pre><code>'+esc(code)+'</code></pre>';
      continue;
    }
    // makro panel :::info / :::note / :::warn / :::success / :::expand Titulek
    const mp=line.match(/^:::(info|note|warn|success|expand)(\s+(.*))?$/);
    if(mp){
      const kind=mp[1], titleTxt=mp[3]||""; let buf=[]; i++;
      while(i<lines.length && !/^:::\s*$/.test(lines[i])){ buf.push(lines[i]); i++; }
      i++;
      const inner=renderContent(buf.join("\n"),pg);
      if(kind==="expand"){
        html+='<details class="expand"><summary>'+esc(titleTxt||"Zobrazit více")+'</summary>'+inner+'</details>';
      } else {
        const map={info:["macro-info","Informace"],note:["macro-note","Poznámka"],warn:["macro-warn","Upozornění"],success:["macro-success","Hotovo"]};
        html+='<div class="macro-panel '+map[kind][0]+'">'+(titleTxt?'<div class="macro-h">'+esc(titleTxt)+'</div>':'')+inner+'</div>';
      }
      continue;
    }
    // víceřádkový blok {pageproperties} ... {/pageproperties}
    if(/^\{pageproperties(?::[^}]*)?\}\s*$/.test(line)){
      i++; while(i<lines.length && !/^\{\/pageproperties\}\s*$/.test(lines[i])){ i++; } i++;
      html+=buildPageProperties("",pg); continue;
    }
    // víceřádkový blok {excerpt} ... {/excerpt} — zobrazí obsah a označí jako úryvek
    if(/^\{excerpt\}\s*$/.test(line)){
      let buf=[]; i++; while(i<lines.length && !/^\{\/excerpt\}\s*$/.test(lines[i])){ buf.push(lines[i]); i++; } i++;
      html+='<div class="excerpt-box">'+renderContent(buf.join("\n"),pg)+'</div>'; continue;
    }
    // strukturní bloky :::tabs / :::columns / :::section (víceřádkové)
    const sb=line.match(/^:::(tabs|columns)\s*$/);
    if(sb){
      const kind=sb[1]; let buf=[]; i++;
      while(i<lines.length && !/^:::\s*$/.test(lines[i])){ buf.push(lines[i]); i++; }
      i++;
      html+= kind==="tabs" ? renderTabs(buf.join("\n"),pg) : renderColumns(buf.join("\n"),pg);
      continue;
    }
    // jednořádková makra {makro} nebo {makro:argumenty}
    const macro=line.match(/^\{([a-z]+)(?::([^}]*))?\}\s*$/);
    if(macro){
      const name=macro[1], arg=(macro[2]||"").trim();
      const out=renderBlockMacro(name,arg,pg,md);
      if(out!==null){ html+=out; i++; continue; }
      // neznámé makro necháme propadnout jako text
    }
    // nadpisy
    const h=line.match(/^(#{1,3})\s+(.*)$/);
    if(h){ const lv=h[1].length+1; const id="h-"+i; html+='<h'+lv+' id="'+id+'">'+processInline(h[2])+'</h'+lv+'>'; i++; continue; }
    // hr
    if(/^---\s*$/.test(line)){ html+='<hr>'; i++; continue; }
    // blockquote
    if(/^>\s?/.test(line)){ let buf=[]; while(i<lines.length&&/^>\s?/.test(lines[i])){ buf.push(lines[i].replace(/^>\s?/,"")); i++; } html+='<blockquote>'+renderContent(buf.join("\n"),pg)+'</blockquote>'; continue; }
    // tabulka
    if(/^\|.*\|\s*$/.test(line) && i+1<lines.length && /^\|[\s:\-|]+\|\s*$/.test(lines[i+1])){
      let rows=[]; while(i<lines.length&&/^\|.*\|\s*$/.test(lines[i])){ rows.push(lines[i]); i++; }
      html+=renderTable(rows,processInline); continue;
    }
    // seznamy
    if(/^\s*([-*]|\d+\.)\s+/.test(line)){
      let buf=[]; while(i<lines.length&&/^\s*([-*]|\d+\.)\s+/.test(lines[i])){ buf.push(lines[i]); i++; }
      html+=renderList(buf,processInline); continue;
    }
    // task list řešíme v renderList; prázdný řádek
    if(/^\s*$/.test(line)){ i++; continue; }
    // odstavec
    let buf=[line]; i++;
    while(i<lines.length && !/^\s*$/.test(lines[i]) && !/^(#{1,3}\s|>|\||```|:::|\{[a-z]+(?::[^}]*)?\}\s*$|---\s*$|\s*([-*]|\d+\.)\s)/.test(lines[i])){ buf.push(lines[i]); i++; }
    html+='<p>'+processInline(buf.join(" "))+'</p>';
  }
  return html;
}
function renderTable(rows,inl){
  const cells=r=>r.replace(/^\||\|\s*$/g,"").split("|").map(c=>c.trim());
  const head=cells(rows[0]); const body=rows.slice(2).map(cells);
  let h='<table><thead><tr>'+head.map(c=>'<th>'+inl(c)+'</th>').join("")+'</tr></thead><tbody>';
  body.forEach(r=>{ h+='<tr>'+r.map(c=>'<td>'+inl(c)+'</td>').join("")+'</tr>'; });
  return h+'</tbody></table>';
}
function renderList(buf,inl){
  const ordered=/^\s*\d+\./.test(buf[0]);
  const tag=ordered?"ol":"ul";
  let h="<"+tag+">";
  buf.forEach(l=>{
    let item=l.replace(/^\s*([-*]|\d+\.)\s+/,"");
    const task=item.match(/^\[([ xX])\]\s+(.*)/);
    if(task){ const done=task[1].toLowerCase()==="x";
      h+='<li><input type="checkbox" disabled '+(done?"checked":"")+'> '+inl(task[2])+'</li>';
    } else h+='<li>'+inl(item)+'</li>';
  });
  return h+"</"+tag+">";
}
function buildToc(md){
  const heads=[...md.matchAll(/^(#{1,3})\s+(.*)$/gm)];
  if(!heads.length) return '<div class="macro-panel macro-info"><em>Obsah zatím nemá nadpisy.</em></div>';
  let h='<nav class="macro-panel macro-info" aria-label="Obsah stránky"><div class="macro-h">Obsah</div><ul>';
  heads.forEach((m,idx)=>{ h+='<li style="margin-left:'+((m[1].length-1)*1)+'em">'+esc(m[2])+'</li>'; });
  return h+'</ul></nav>';
}
function buildChildrenList(pg,arg){
  if(!pg||!pg.children.length) return '<div class="macro-panel macro-info"><em>Žádné podstránky.</em></div>';
  const depth = arg && /^\d+$/.test(arg) ? parseInt(arg,10) : 1;
  function level(ids,d){
    let h='<ul>';
    ids.forEach(cid=>{ const c=page(cid); if(!c)return;
      h+='<li><a href="#" data-goto="'+cid+'">'+esc(c.title||"(bez názvu)")+'</a>';
      if(d>1 && c.children.length) h+=level(c.children,d-1);
      h+='</li>'; });
    return h+'</ul>';
  }
  return macroPanel("Podstránky",level(pg.children,depth));
}
function buildRecentList(){
  const recent=Object.values(state.pages).slice().sort((a,b)=>b.updated.localeCompare(a.updated)).slice(0,8);
  let h='<nav class="macro-panel macro-info" aria-label="Naposledy upravené"><div class="macro-h">Naposledy upravené</div><ul>';
  recent.forEach(p=>{ h+='<li><a href="#" data-goto="'+p.id+'">'+esc(p.title||"(bez názvu)")+'</a> <span style="color:var(--ink-faint);font-size:.82em">'+fmtDate(p.updated)+'</span></li>'; });
  return h+'</ul></nav>';
}

/* ================================================================
   BLOKOVÁ MAKRA — jeden dispatcher
   Vrací HTML, nebo null pokud makro neznáme.
   ================================================================ */
function statusColor(c){
  const map={zelena:"green",zelená:"green",green:"green",cervena:"red",červená:"red",red:"red",zluta:"yellow",žlutá:"yellow",yellow:"yellow",modra:"blue",modrá:"blue",blue:"blue",seda:"grey",šedá:"grey",grey:"grey",gray:"grey"};
  return map[c]||"grey";
}
function macroPanel(title,inner,cls){
  return '<nav class="macro-panel '+(cls||"macro-info")+'"'+(title?' aria-label="'+esc(title)+'"':'')+'>'+(title?'<div class="macro-h">'+esc(title)+'</div>':'')+inner+'</nav>';
}
function renderBlockMacro(name,arg,pg,md){
  switch(name){
    case "toc": return buildToc(md);
    case "children": return buildChildrenList(pg,arg);
    case "recent": return buildRecentList();
    case "pagetree": return buildPageTree(pg,arg);
    case "spacepages": return buildSpacePages(pg,arg);
    case "contentbylabel": return buildContentByLabel(arg);
    case "labellist": case "popularlabels": return buildLabelList();
    case "taskreport": return buildTaskReport(arg);
    case "decisionreport": return buildDecisionReport(arg);
    case "decision": return buildDecision(arg);
    case "pageproperties": return buildPageProperties(arg,pg);
    case "pagepropertiesreport": return buildPagePropertiesReport(arg);
    case "attachments": return buildAttachments(pg);
    case "attachment": return buildAttachment(arg,pg);
    case "viewfile": return buildViewFile(arg,pg);
    case "include": return buildInclude(arg);
    case "excerpt": return buildExcerpt(arg,pg);
    case "excerptinclude": return buildExcerptInclude(arg);
    case "progress": return buildProgress(arg);
    case "chart": return buildChart(arg,pg,md);
    case "livesearch": return buildLivesearch();
    case "anchor": return '<span id="anchor-'+esc(arg.replace(/[^\w-]/g,"-"))+'" class="anchor-target"></span>';
    case "gallery": return buildGallery(pg);
    case "favorites": return buildFavoritesMacro();
    case "activity": return buildActivityMacro(arg);
    case "contributors": return buildContributorsMacro(pg);
    case "useractivity": return buildUserActivityMacro(arg);
    case "blogposts": return buildBlogPosts(arg,pg);
    default: return null;
  }
}

/* ---- hierarchie: page tree, space pages ---- */
function buildPageTree(pg,arg){
  let roots;
  if(arg && arg.toLowerCase()!=="root"){
    const start=Object.values(state.pages).find(p=>p.title.toLowerCase()===arg.toLowerCase());
    roots = start? [start] : [];
  } else if(pg){
    const sp=space(pg.spaceId); roots=sp?sp.pages.map(page).filter(p=>p&&!p.parentId):[];
  } else roots=[];
  if(!roots.length) return macroPanel("Strom stránek","<em>Žádné stránky.</em>");
  function node(p){ let h='<li><a href="#" data-goto="'+p.id+'">'+esc(p.title||"(bez názvu)")+'</a>';
    const kids=p.children.map(page).filter(Boolean);
    if(kids.length) h+='<ul>'+kids.map(node).join("")+'</ul>';
    return h+'</li>'; }
  return macroPanel("Strom stránek",'<ul>'+roots.map(node).join("")+'</ul>');
}
function buildSpacePages(pg,arg){
  let sp = arg? state.spaces.find(s=>s.name.toLowerCase()===arg.toLowerCase()||s.key.toLowerCase()===arg.toLowerCase()) : (pg?space(pg.spaceId):null);
  if(!sp) return macroPanel("Stránky prostoru","<em>Prostor nenalezen.</em>");
  const pages=sp.pages.map(page).filter(Boolean).sort((a,b)=>(a.title||"").localeCompare(b.title||"","cs"));
  if(!pages.length) return macroPanel("Stránky prostoru — "+sp.name,"<em>Žádné stránky.</em>");
  return macroPanel("Stránky prostoru — "+sp.name,'<ul>'+pages.map(p=>'<li><a href="#" data-goto="'+p.id+'">'+esc(p.title||"(bez názvu)")+'</a> <span class="stat '+statusClass(p.status)+'">'+statusLabel(p.status)+'</span></li>').join("")+'</ul>');
}

/* ---- štítky: content by label, label list ---- */
function buildContentByLabel(arg){
  const wanted=arg.split(/[,\s]+/).map(s=>s.trim().toLowerCase()).filter(Boolean);
  if(!wanted.length) return macroPanel("Podle štítku","<em>Zadejte štítek: {contentbylabel:název}</em>");
  const hits=Object.values(state.pages).filter(p=>p.labels.some(l=>wanted.includes(l.toLowerCase())));
  if(!hits.length) return macroPanel("Podle štítku: "+wanted.join(", "),"<em>Žádná stránka s tímto štítkem.</em>");
  return macroPanel("Podle štítku: "+wanted.join(", "),'<ul>'+hits.map(p=>'<li><a href="#" data-goto="'+p.id+'">'+esc(p.title||"(bez názvu)")+'</a></li>').join("")+'</ul>');
}
function buildLabelList(){
  const counts={};
  Object.values(state.pages).forEach(p=>p.labels.forEach(l=>{ counts[l]=(counts[l]||0)+1; }));
  const keys=Object.keys(counts).sort((a,b)=>counts[b]-counts[a]||a.localeCompare(b,"cs"));
  if(!keys.length) return macroPanel("Štítky","<em>Zatím žádné štítky.</em>");
  return macroPanel("Štítky",'<div class="labels">'+keys.map(k=>'<button class="label" data-labelsearch="'+esc(k)+'">'+esc(k)+' ('+counts[k]+')</button>').join(" ")+'</div>');
}

/* ---- úkoly ---- */
function collectTasks(scopeArg){
  // projde všechny stránky, najde řádky - [ ] a - [x], vrátí {pageId,pageTitle,done,text}
  const tasks=[];
  let pages=Object.values(state.pages);
  if(scopeArg){ const sp=state.spaces.find(s=>s.name.toLowerCase()===scopeArg.toLowerCase()||s.key.toLowerCase()===scopeArg.toLowerCase());
    if(sp) pages=sp.pages.map(page).filter(Boolean); }
  pages.forEach(p=>{
    const lines=(p.body||"").split("\n");
    lines.forEach(l=>{ const m=l.match(/^\s*[-*]\s+\[([ xX])\]\s+(.*)/); if(m){ tasks.push({pageId:p.id,pageTitle:p.title,done:m[1].toLowerCase()==="x",text:m[2].trim()}); } });
  });
  return tasks;
}
function buildTaskReport(arg){
  const tasks=collectTasks(arg);
  if(!tasks.length) return macroPanel("Přehled úkolů","<em>Žádné úkoly. Vytvořte je zápisem <code>- [ ] text</code>.</em>");
  const open=tasks.filter(t=>!t.done), done=tasks.filter(t=>t.done);
  let h='<div style="margin-bottom:.4em;font-size:.85rem;color:var(--ink-soft)">Otevřené: '+open.length+' · Hotové: '+done.length+'</div>';
  h+='<table class="db-table"><thead><tr><th>Stav</th><th>Úkol</th><th>Stránka</th></tr></thead><tbody>';
  tasks.forEach(t=>{ h+='<tr><td>'+(t.done?'<span class="status-badge status-green">hotovo</span>':'<span class="status-badge status-yellow">otevřené</span>')+'</td><td>'+esc(t.text)+'</td><td><a href="#" data-goto="'+t.pageId+'">'+esc(t.pageTitle||"(bez názvu)")+'</a></td></tr>'; });
  return macroPanel("Přehled úkolů",h+'</tbody></table>');
}

/* ---- rozhodnutí ---- */
function buildDecision(arg){
  // {decision:Text rozhodnutí} — jednotlivé rozhodnutí, označí i pro report
  return '<div class="macro-panel macro-success decision-item"><div class="macro-h">✔ Rozhodnutí</div>'+inlineMd(arg||"")+'</div>';
}
function buildDecisionReport(arg){
  // sesbírá {decision:...} napříč stránkami
  const items=[];
  let pages=Object.values(state.pages);
  if(arg){ const sp=state.spaces.find(s=>s.name.toLowerCase()===arg.toLowerCase()||s.key.toLowerCase()===arg.toLowerCase()); if(sp) pages=sp.pages.map(page).filter(Boolean); }
  pages.forEach(p=>{ const ms=[...(p.body||"").matchAll(/\{decision:([^}]+)\}/g)]; ms.forEach(m=>items.push({pageId:p.id,pageTitle:p.title,text:m[1].trim()})); });
  if(!items.length) return macroPanel("Přehled rozhodnutí","<em>Žádná rozhodnutí. Zapisujte je makrem <code>{decision:text}</code>.</em>");
  let h='<table class="db-table"><thead><tr><th>Rozhodnutí</th><th>Stránka</th></tr></thead><tbody>';
  items.forEach(d=>{ h+='<tr><td>'+esc(d.text)+'</td><td><a href="#" data-goto="'+d.pageId+'">'+esc(d.pageTitle||"(bez názvu)")+'</a></td></tr>'; });
  return macroPanel("Přehled rozhodnutí",h+'</tbody></table>');
}

/* ---- page properties + report ---- */
function parsePageProps(body){
  // {pageproperties} blok: řádky "Klíč :: Hodnota" mezi {pageproperties:...} a {/pageproperties}
  const m=body.match(/\{pageproperties(?::([^}]*))?\}([\s\S]*?)\{\/pageproperties\}/);
  if(!m) return null;
  const props={}; m[2].split("\n").forEach(l=>{ const kv=l.split("::"); if(kv.length>=2){ props[kv[0].trim()]=kv.slice(1).join("::").trim(); } });
  return {id:(m[1]||"").trim(),props};
}
function buildPageProperties(arg,pg){
  if(!pg) return null;
  const pp=parsePageProps(pg.body||"");
  if(!pp||!Object.keys(pp.props).length) return macroPanel("Vlastnosti stránky","<em>Zapište vlastnosti mezi <code>{pageproperties}</code> … <code>{/pageproperties}</code> ve tvaru <code>Klíč :: Hodnota</code>.</em>","macro-note");
  let h='<table class="db-table"><tbody>';
  Object.entries(pp.props).forEach(([k,v])=>{ h+='<tr><th style="width:35%">'+esc(k)+'</th><td>'+inlineMd(v)+'</td></tr>'; });
  return macroPanel("Vlastnosti stránky",h+'</tbody></table>');
}
function buildPagePropertiesReport(arg){
  // arg = štítek; sesbírá pageproperties ze stránek s tím štítkem do jedné tabulky
  const label=(arg||"").trim().toLowerCase();
  const rows=[];
  Object.values(state.pages).forEach(p=>{
    if(label && !p.labels.some(l=>l.toLowerCase()===label)) return;
    const pp=parsePageProps(p.body||""); if(pp&&Object.keys(pp.props).length){ rows.push({page:p,props:pp.props}); }
  });
  if(!rows.length) return macroPanel("Souhrn vlastností stránek","<em>Žádné stránky s vlastnostmi"+(label?" a štítkem „"+esc(arg)+"“":"")+".</em>");
  const cols=[]; rows.forEach(r=>Object.keys(r.props).forEach(k=>{ if(!cols.includes(k))cols.push(k); }));
  let h='<div style="overflow:auto"><table class="db-table"><thead><tr><th>Stránka</th>'+cols.map(c=>'<th>'+esc(c)+'</th>').join("")+'</tr></thead><tbody>';
  rows.forEach(r=>{ h+='<tr><td><a href="#" data-goto="'+r.page.id+'">'+esc(r.page.title||"(bez názvu)")+'</a></td>'+cols.map(c=>'<td>'+inlineMd(r.props[c]||"")+'</td>').join("")+'</tr>'; });
  return macroPanel("Souhrn vlastností stránek"+(label?" — štítek „"+esc(arg)+"“":""),h+'</tbody></table></div>');
}

/* ---- přílohy / soubory (prostorové, verzované) ---- */
function fmtBytes(n){ if(!n)return "0 B"; const u=["B","kB","MB"]; let i=0,v=n; while(v>=1024&&i<u.length-1){v/=1024;i++;} return v.toFixed(v<10&&i>0?1:0)+" "+u[i]; }

/* rozřeší "název" v prostoru stránky, nebo "KLÍČ/název" / "Název prostoru/název" jinde */
function resolveAtt(arg,pg){
  arg=String(arg||"").trim();
  let spaceId = pg? pg.spaceId : (state.spaces[0]&&state.spaces[0].id);
  let name=arg;
  const slash=arg.indexOf("/");
  if(slash>0){
    const spRef=arg.slice(0,slash).trim(), rest=arg.slice(slash+1).trim();
    const sp=state.spaces.find(s=>s.key.toLowerCase()===spRef.toLowerCase()||s.name.toLowerCase()===spRef.toLowerCase());
    if(sp){ spaceId=sp.id; name=rest; }
  }
  return { att:findAtt(spaceId,name), spaceId, name };
}

function buildAttachments(pg){
  if(!pg) return null;
  const list=spaceAtts(pg.spaceId);
  if(!list.length) return macroPanel("Přílohy","<em>Prostor nemá přílohy. Nahrajte je tlačítkem „Příloha“ nad stránkou nebo makrem <code>{attachment}</code>.</em>");
  let h='<ul class="ctx-list">';
  list.forEach(a=>{ const c=attCurrent(a); h+='<li>📎 <a href="'+c.data+'" download="'+esc(a.name)+'">'+esc(a.name)+'</a> <span style="color:var(--ink-faint);font-size:.82em">'+esc(c.type||"")+' · '+fmtBytes(c.size)+' · v'+c.v+'</span></li>'; });
  return macroPanel("Přílohy prostoru",h+'</ul>');
}

/* {attachment} → nahraj v místě; {attachment:název} → zobraz konkrétní (i z jiného prostoru) */
function buildAttachment(arg,pg){
  if(!pg) return null;
  if(!arg){
    // prázdné makro = výzva k nahrání přímo na tomto místě
    return '<div class="macro-panel macro-note attach-placeholder"><div class="macro-h">Příloha</div>'+
      '<p style="margin:.2em 0">Zatím nenahráno. </p>'+
      '<button type="button" class="btn btn-primary" data-attachupload="'+pg.spaceId+'|inline">Nahrát a pojmenovat soubor</button>'+
      ' <button type="button" class="btn" data-attachfrom="'+pg.id+'">Vložit z jiné stránky</button></div>';
  }
  const r=resolveAtt(arg,pg);
  if(!r.att) return macroPanel("Příloha","<em>Příloha „"+esc(arg)+"“ nenalezena.</em>","macro-note");
  const c=attCurrent(r.att);
  const from = r.spaceId!==pg.spaceId ? ' <span style="font-size:.78em;color:var(--ink-faint)">(z prostoru '+esc(space(r.spaceId).name)+')</span>' : '';
  if((c.type||"").startsWith("image/"))
    return '<figure class="diagram"><img src="'+c.data+'" alt="'+esc(r.att.name)+'"><figcaption style="font-size:.82em;color:var(--ink-faint)">📎 '+esc(r.att.name)+' · v'+c.v+from+'</figcaption></figure>';
  return macroPanel("Příloha",'📎 <a href="'+c.data+'" download="'+esc(r.att.name)+'">'+esc(r.att.name)+'</a> <span style="color:var(--ink-faint);font-size:.82em">'+fmtBytes(c.size)+' · v'+c.v+from+'</span>');
}
function buildViewFile(arg,pg){ return buildAttachment(arg,pg); } /* alias pro zpětnou kompatibilitu */

function buildGallery(pg){
  if(!pg) return null;
  const imgs=spaceAtts(pg.spaceId).filter(a=>(attCurrent(a).type||"").startsWith("image/"));
  if(!imgs.length) return macroPanel("Galerie","<em>Prostor nemá obrázkové přílohy.</em>");

/* ---- chart z tabulky pod makrem: {chart:bar} nebo {chart:pie} + data v arg? 
       Jednodušší: {chart:bar|Popisek1=5,Popisek2=8} ---- */
function buildChart(arg,pg,md){
  const parts=(arg||"bar").split("|");
  const type=(parts[0]||"bar").trim();
  const dataStr=parts[1]||"";
  const pairs=dataStr.split(",").map(s=>{ const kv=s.split("="); return kv.length===2?{label:kv[0].trim(),val:parseFloat(kv[1])||0}:null; }).filter(Boolean);
  if(!pairs.length) return macroPanel("Graf","<em>Zápis: <code>{chart:bar|Leden=5,Únor=8}</code> nebo <code>{chart:pie|A=3,B=7}</code></em>","macro-note");
  const alt='<table class="db-table"><thead><tr><th>Položka</th><th>Hodnota</th></tr></thead><tbody>'+pairs.map(p=>'<tr><td>'+esc(p.label)+'</td><td>'+p.val+'</td></tr>').join("")+'</tbody></table>';
  let svg;
  if(type==="pie"){ svg=pieSvg(pairs); } else { svg=barSvg(pairs); }
  return '<div class="diagram">'+svg+'<details style="margin-top:.5em"><summary style="font-size:.85rem">Data grafu (tabulka)</summary>'+alt+'</details></div>';
}
function barSvg(pairs){
  const max=Math.max(...pairs.map(p=>p.val),1); const bw=46, gap=20, h=180, pad=30;
  const w=pairs.length*(bw+gap)+pad;
  let s='<svg viewBox="0 0 '+w+' '+(h+40)+'" role="img" aria-label="Sloupcový graf">';
  const colors=["#3a5a78","#8a6d1f","#3f6b47","#9a3b3b","#5a4a78"];
  pairs.forEach((p,i)=>{ const bh=(p.val/max)*h; const x=pad+i*(bw+gap); const y=h-bh+10;
    s+='<rect x="'+x+'" y="'+y+'" width="'+bw+'" height="'+bh+'" rx="3" fill="'+colors[i%colors.length]+'"/>';
    s+='<text x="'+(x+bw/2)+'" y="'+(y-4)+'" font-size="11" text-anchor="middle" fill="#4a4f5c">'+p.val+'</text>';
    s+='<text x="'+(x+bw/2)+'" y="'+(h+26)+'" font-size="11" text-anchor="middle" fill="#4a4f5c">'+esc(p.label)+'</text>';
  });
  return s+'</svg>';
}
function pieSvg(pairs){
  const total=pairs.reduce((a,p)=>a+p.val,0)||1; const cx=90,cy=90,r=80;
  const colors=["#3a5a78","#8a6d1f","#3f6b47","#9a3b3b","#5a4a78","#767c8a"];
  let ang=-Math.PI/2, s='<svg viewBox="0 0 320 190" role="img" aria-label="Koláčový graf">';
  pairs.forEach((p,i)=>{ const a2=ang+(p.val/total)*Math.PI*2;
    const x1=cx+r*Math.cos(ang),y1=cy+r*Math.sin(ang),x2=cx+r*Math.cos(a2),y2=cy+r*Math.sin(a2);
    const large=(a2-ang)>Math.PI?1:0;
    s+='<path d="M'+cx+','+cy+' L'+x1.toFixed(1)+','+y1.toFixed(1)+' A'+r+','+r+' 0 '+large+' 1 '+x2.toFixed(1)+','+y2.toFixed(1)+' Z" fill="'+colors[i%colors.length]+'"/>';
    ang=a2; });
  pairs.forEach((p,i)=>{ s+='<rect x="190" y="'+(20+i*22)+'" width="12" height="12" fill="'+colors[i%colors.length]+'"/><text x="208" y="'+(30+i*22)+'" font-size="12" fill="#4a4f5c">'+esc(p.label)+' ('+Math.round(p.val/total*100)+'%)</text>'; });
  return s+'</svg>';
}

function renderTabs(body,pg){

  const parts=body.split(/^==\s+/m).filter(x=>x.trim());

function navNode(p){

/* ---- kontextový sloupec ---- */
function renderContext(p){
  let h="";
  // obsah z nadpisů
  const heads=[...p.body.matchAll(/^(#{1,3})\s+(.*)$/gm)];
  h+='<div class="ctx-sec"><h2 class="ctx-h">Na této stránce</h2>';
  if(heads.length){ h+='<ul class="toc">';
    heads.forEach((m,idx)=>{ h+='<li style="margin-left:'+((m[1].length-1)*.8)+'em"><button data-scroll="h-'+headIndex(p.body,m)+'">'+esc(m[2])+'</button></li>'; });
    h+='</ul>';
  } else h+='<p class="empty" style="padding:.3em 0">Bez nadpisů</p>';
  h+='</div>';
  // zpětné odkazy
  const back=backlinks(p);
  h+='<div class="ctx-sec"><h2 class="ctx-h">Odkazuje sem</h2>';
  if(back.length){ h+='<ul class="ctx-list">'+back.map(b=>'<li><button data-goto="'+b.id+'">'+esc(b.title||"(bez názvu)")+'</button></li>').join("")+'</ul>'; }
  else h+='<p class="empty" style="padding:.3em 0">Žádné zpětné odkazy</p>';
  h+='</div>';
  // podstránky
  h+='<div class="ctx-sec"><h2 class="ctx-h">Podstránky</h2>';
  if(p.children.length){ h+='<ul class="ctx-list">'+p.children.map(c=>{const cp=page(c);return cp?'<li><button data-goto="'+c+'">'+esc(cp.title||"(bez názvu)")+'</button></li>':"";}).join("")+'</ul>'; }
  else h+='<p class="empty" style="padding:.3em 0">Žádné</p>';
  h+='</div>';
  // přílohy prostoru
  const atts=spaceAtts(p.spaceId);
  h+='<div class="ctx-sec"><h2 class="ctx-h">Přílohy prostoru</h2>';
  if(atts.length){ h+='<ul class="ctx-list">'+atts.map(a=>{ const c=attCurrent(a); return '<li>📎 <a href="'+c.data+'" download="'+esc(a.name)+'">'+esc(a.name)+'</a> <span class="att-ver">v'+c.v+'</span></li>'; }).join("")+'</ul>'; }
  else h+='<p class="empty" style="padding:.3em 0">Žádné</p>';
  h+='<button class="btn btn-sm" data-attachupload="'+p.spaceId+'" style="margin-top:.4em">Spravovat přílohy</button>';
  h+='</div>';
  // verze
  h+='<div class="ctx-sec"><h2 class="ctx-h">Historie verzí</h2>';
  if(p.versions.length){
    h+=p.versions.slice().reverse().map(v=>'<div class="ver-item"><button data-viewver="'+v.n+'" style="background:none;border:none;color:var(--accent-ink);padding:0">v'+v.n+'</button>'+(v.author?' '+avatarHtml(v.author,v.authorInitials):'')+'<span class="vmeta">'+(v.author?esc(v.author)+' · ':'')+relTime(v.ts)+'</span></div>'+(v.note?'<div style="font-size:.78rem;color:var(--ink-faint);padding:0 0 .3em 1.4em">„'+esc(v.note)+'“</div>':'')).join("");
    if(p.versions.length>=2) h+='<button class="btn btn-sm" data-diff="'+p.id+'" style="margin-top:.5em">Porovnat poslední dvě</button>';
  } else h+='<p class="empty" style="padding:.3em 0">Zatím žádné publikované verze</p>';
  h+='</div>';
  // přispěvatelé
  const contribs=pageContributors(p);
  h+='<div class="ctx-sec"><h2 class="ctx-h">Přispěvatelé</h2>';
  h+='<div class="contrib-row">'+contribs.map(c=>userChip(c.name,c.initials)).join("")+'</div>';
  h+='</div>';
  // sledující
  h+='<div class="ctx-sec"><h2 class="ctx-h">Sledující ('+((p.watchers||[]).length)+')</h2>';
  if((p.watchers||[]).length){ h+='<div class="contrib-row">'+p.watchers.map(w=>userChip(w)).join("")+'</div>'; }
  else h+='<p class="empty" style="padding:.3em 0">Nikdo</p>';
  h+='</div>';
  return h;
}
/* přispěvatelé = tvůrce + autoři verzí + autoři komentářů */
function pageContributors(p){
  const set=new Map();
  const add=(n,i)=>{ if(n&&!set.has(n)) set.set(n,i||initials(n)); };
  add(p.creator,p.creatorInitials);
  (p.versions||[]).forEach(v=>add(v.author,v.authorInitials));
  (p.comments||[]).forEach(c=>add(c.author,c.authorInitials));
  add(p.lastEditor,p.lastEditorInitials);
  return [...set.entries()].map(([name,inits])=>({name,initials:inits}));
}

function headIndex(body,match){
  const lines=body.replace(/\r\n/g,"\n").split("\n");
  for(let k=0;k<lines.length;k++){ if(lines[k]===match[0]) return k; }
  return 0;
}
function backlinks(p){
  const res=[];
  Object.values(state.pages).forEach(o=>{
    if(o.id===p.id)return;
    if((o.body||"").toLowerCase().includes("[["+p.title.toLowerCase()+"]]")) res.push(o);
  });
  return res;
}

function macroMenuHtml(idPrefix){
  const groups={};
  MACRO_CATALOG.forEach((m,i)=>{ (groups[m.group]=groups[m.group]||[]).push(Object.assign({idx:i},m)); });
  let h="";
  Object.keys(groups).forEach(g=>{
    h+='<div class="slash-group">'+esc(g)+'</div>';
    groups[g].forEach(m=>{ h+='<button type="button" class="slash-item" data-macroins="'+m.idx+'"><span>'+esc(m.label)+'</span><span class="si-desc">'+esc(m.desc)+'</span></button>'; });
  });
  return h;
}

/* ================================================================
   KOMENTÁŘE — k celé stránce i inline, s řešitelnými stavy
   ================================================================ */
function renderComments(p){
  let h='<section class="comments" aria-label="Komentáře"><h2>Komentáře a poznámky ('+p.comments.length+')</h2>';
  if(!p.comments.length){ h+='<p class="empty">Zatím žádné. Vyberte text a přidejte inline poznámku, nebo přidejte komentář k celé stránce.</p>'; }
  p.comments.forEach(c=>{
    h+='<div class="comment '+(c.inline?"inline":"")+' '+(c.resolved?"resolved":"")+'" id="c-'+c.id+'">';
    h+='<div class="comment-head">';
    if(c.author) h+='<span class="author-chip">'+avatarHtml(c.author,c.authorInitials)+' '+esc(c.author)+'</span>';
    h+='<span class="chip '+(c.resolved?"chip-res":"chip-open")+'">'+(c.resolved?"vyřešeno":"otevřené")+'</span>';
    h+='<span>'+(c.inline?"inline poznámka":"k celé stránce")+'</span>';
    h+='<span>'+fmtDate(c.ts)+'</span></div>';
    if(c.inline&&c.quote) h+='<div class="comment-quote">„'+esc(c.quote)+'“</div>';
    h+='<div class="comment-body">'+esc(c.text)+'</div>';
    h+='<div class="comment-actions">';
    h+='<button class="btn btn-sm" data-resolve="'+c.id+'">'+(c.resolved?"Znovu otevřít":"Označit vyřešené")+'</button>';
    h+='<button class="btn btn-sm" data-editcomment="'+c.id+'">Upravit</button>';
    h+='<button class="btn btn-sm" data-delcomment="'+c.id+'">Smazat</button>';
    h+='</div></div>';
  });
  h+='</section>';
  return h;
}

function renderDatabaseView(p){

  h+='<div class="content"><div class="db-toolbar">';
  h+='<button class="btn btn-sm" data-dbaddrow="'+p.id+'">+ Záznam</button>';
  h+='<button class="btn btn-sm" data-dbaddcol="'+p.id+'">+ Sloupec</button>';

  h+='<label class="sr-status" for="dbFilterCol">Filtr sloupec</label><select id="dbFilterCol"><option value="">— filtr sloupce —</option>';
  db.columns.forEach(c=>h+='<option value="'+c.id+'"'+(db.filterCol===c.id?" selected":"")+'>'+esc(c.name)+'</option>');
  h+='</select>';
  h+='<input id="dbFilterVal" placeholder="obsahuje…" value="'+esc(db.filterVal)+'" aria-label="Hodnota filtru">';
  h+='</div>';
  // view tabs
  h+='<div class="viewtabs" role="group" aria-label="Zobrazení databáze">';
  [["table","Tabulka"],["cards","Karty"],["board","Board"],["calendar","Kalendář"]].forEach(v=>{
    h+='<button data-dbview="'+v[0]+'" aria-pressed="'+(db.view===v[0])+'">'+v[1]+'</button>';
  });

  h+='<div id="dbBody">'+renderDbBody(p)+'</div>';
  h+='</div>';
  h+=renderComments(p);
  document.getElementById("mainView").innerHTML=h;
}
function dbFilteredRows(p){
  const db=p.db; let rows=db.rows.slice();
  if(db.filterCol&&db.filterVal){ rows=rows.filter(r=>String(r[db.filterCol]||"").toLowerCase().includes(db.filterVal.toLowerCase())); }
  if(db.sortBy){ rows.sort((a,b)=>String(a[db.sortBy]||"").localeCompare(String(b[db.sortBy]||""),"cs")*db.sortDir); }
  return rows;
}
function cellHtml(col,val){
  if(col.kind==="status"&&val) return '<span class="dbval-status">'+esc(val)+'</span>';
  if(col.kind==="link"){ const t=Object.values(state.pages).find(x=>x.id===val); return t?'<a href="#" data-goto="'+t.id+'">'+esc(t.title)+'</a>':esc(val||""); }
  return esc(val==null?"":val);
}
function renderDbBody(p){
  const db=p.db, rows=dbFilteredRows(p);
  if(!db.rows.length) return '<p class="empty">Databáze je prázdná. Přidejte záznam.</p>';
  if(db.view==="table"){
    let h='<table class="db-table"><thead><tr>';
    db.columns.forEach(c=>h+='<th><button data-dbsort="'+c.id+'">'+esc(c.name)+(db.sortBy===c.id?(db.sortDir>0?" ▲":" ▼"):"")+'</button></th>');
    h+='<th>Akce</th></tr></thead><tbody>';
    rows.forEach(r=>{ h+='<tr>'; db.columns.forEach(c=>h+='<td>'+cellHtml(c,r[c.id])+'</td>');
      h+='<td><button class="btn btn-sm" data-dbeditrow="'+r._id+'">Upravit</button> <button class="btn btn-sm" data-dbdelrow="'+r._id+'">×</button></td></tr>'; });
    return h+'</tbody></table>';
  }
  if(db.view==="cards"){
    let h='<div class="db-cards">';
    rows.forEach(r=>{ h+='<div class="db-card"><h4>'+esc(r[db.columns[0].id]||"(bez názvu)")+'</h4><dl>';
      db.columns.slice(1).forEach(c=>{ h+='<dt>'+esc(c.name)+'</dt><dd>'+cellHtml(c,r[c.id])+'</dd>'; });
      h+='</dl><button class="btn btn-sm" data-dbeditrow="'+r._id+'">Upravit</button></div>'; });
    return h+'</div>';
  }
  if(db.view==="board"){
    const statusCol=db.columns.find(c=>c.kind==="status")||db.columns[1]||db.columns[0];
    const lanes={}; rows.forEach(r=>{ const k=r[statusCol.id]||"(bez stavu)"; (lanes[k]=lanes[k]||[]).push(r); });
    let h='<div class="db-board">';
    Object.keys(lanes).forEach(k=>{ h+='<div class="db-lane"><h4>'+esc(k)+' ('+lanes[k].length+')</h4>';
      lanes[k].forEach(r=>{ h+='<div class="db-card"><h4>'+esc(r[db.columns[0].id]||"(bez názvu)")+'</h4><button class="btn btn-sm" data-dbeditrow="'+r._id+'">Upravit</button></div>'; });
      h+='</div>'; });
    return h+'</div>';
  }
  if(db.view==="calendar"){
    const dateCol=db.columns.find(c=>c.kind==="date");
    if(!dateCol) return '<div class="macro-panel macro-note">Pro kalendář přidejte sloupec typu datum.</div>';
    const byDate={}; rows.forEach(r=>{ const d=r[dateCol.id]; if(d)(byDate[d]=byDate[d]||[]).push(r); });
    let h='<ul class="ctx-list" style="font-size:.95rem">';
    Object.keys(byDate).sort().forEach(d=>{ h+='<li><strong>'+esc(d)+'</strong><ul>'+byDate[d].map(r=>'<li>'+esc(r[db.columns[0].id]||"(bez názvu)")+'</li>').join("")+'</ul></li>'; });
    return h+'</ul>';
  }
  return "";
}

function dialog(title, fieldsHtml, onOk){
  const dlg=document.createElement("dialog");
  dlg.innerHTML='<form method="dialog"><div class="dlg-head">'+esc(title)+'</div>'+
    '<div class="dlg-body">'+fieldsHtml+'</div>'+

function openPage(id){ state.current=id; state.editing=false; state.view=null; trackView(id); render();
  document.getElementById("main").focus();
  const p=page(id); announce("Otevřena stránka "+(p?p.title:"")); }
function saveVersion(p,note){ const u=currentUser(); p.versions.push({n:p.versions.length+1,ts:now(),title:p.title,body:p.body,note:note||"",author:u.name,authorInitials:u.initials}); }
function touch(p){ const u=currentUser(); p.updated=now(); p.lastEditor=u.name; p.lastEditorInitials=u.initials;
  if(p.watchers && !p.watchers.includes(u.name)) p.watchers.push(u.name); /* autowatch při editaci */ }

/* všichni „uživatelé“ figurující v projektu (z autorství + identit) */
function allUsers(){
  const set=new Map();
  const add=(n,i)=>{ if(n && !set.has(n)) set.set(n,i||initials(n)); };
  add(currentUser().name,currentUser().initials);
  state.identities.forEach(id=>add(id.name,id.initials));
  Object.values(state.pages).forEach(p=>{ add(p.creator,p.creatorInitials); add(p.lastEditor,p.lastEditorInitials); add(p.owner,p.ownerInitials);
    (p.comments||[]).forEach(c=>add(c.author,c.authorInitials));
    (p.versions||[]).forEach(v=>add(v.author,v.authorInitials)); });
  return [...set.entries()].map(([name,inits])=>({name,initials:inits})).sort((a,b)=>a.name.localeCompare(b.name,"cs"));
}
/* co uživatel vytvořil / editoval / komentoval */
function userWork(name){
  const created=[], edited=[], commented=[];
  Object.values(state.pages).forEach(p=>{
    if(p.creator===name) created.push(p);
    else if(p.lastEditor===name) edited.push(p);
    if((p.comments||[]).some(c=>c.author===name)) commented.push(p);
  });
  const sortU=(a,b)=>b.updated.localeCompare(a.updated);
  return {created:created.sort(sortU), edited:edited.sort(sortU), commented:commented.sort(sortU)};
}

function createPage(spaceId,parentId){
  if(!state.spaces.length){ createSpace(); return; }
  const spOpts=state.spaces.map(s=>'<option value="'+s.id+'"'+(s.id===spaceId?" selected":"")+'>'+esc(s.name)+'</option>').join("");

function deletePage(id){
  const p=page(id); if(!p)return;
  if(p.children.length){ dialog("Nelze smazat","<p>Stránka má podstránky. Nejdřív je přesuňte nebo smažte.</p>",null); return; }
  dialog("Smazat stránku","<p>Opravdu smazat „"+esc(p.title)+"“? Akci nelze vrátit.</p>",()=>{
    const sp=space(p.spaceId); sp.pages=sp.pages.filter(x=>x!==id);
    if(p.parentId){ const par=page(p.parentId); if(par)par.children=par.children.filter(x=>x!==id); }
    delete state.pages[id];
    state.current = sp.pages[0]||null;
    log("Smazána stránka „"+p.title+"“"); announce("Stránka smazána"); render();
  });
}

/* ================================================================
   PŘÍLOHY — patří PROSTORU (jeden soubor, víc míst), s verzemi.
   Model: sp.attachments = [{ id, name, versions:[{v,ts,type,size,data,author}] }]
   Aktuální verze = poslední ve versions.
   ================================================================ */
function ensureSpaceAtt(sp){ if(sp && !sp.attachments) sp.attachments=[]; return sp?sp.attachments:[]; }
function spaceAtts(spaceId){ const sp=space(spaceId); return sp?ensureSpaceAtt(sp):[]; }
function findAtt(spaceId,name){ return spaceAtts(spaceId).find(a=>a.name.toLowerCase()===String(name||"").toLowerCase()); }
function attCurrent(a){ return a && a.versions[a.versions.length-1]; }

function readFileAsData(f){
  return new Promise((res,rej)=>{
    const rd=new FileReader();
    rd.onload=()=>res(String(rd.result));
    rd.onerror=()=>rej(new Error("Soubor se nepodařilo načíst."));
    rd.readAsDataURL(f);
  });
}

/* nahrání souboru do prostoru; když název existuje → nová VERZE */
function uploadToSpace(spaceId, onDone){
  const inp=document.createElement("input"); inp.type="file";
  inp.style.position="absolute"; inp.style.left="-9999px"; document.body.appendChild(inp);
  inp.addEventListener("change",async()=>{
    const f=inp.files&&inp.files[0]; if(!f){ inp.remove(); return; }
    if(f.size>5*1024*1024){ dialog("Příloha je moc velká","<p>Limit je 5 MB, aby projekt zůstal přenosný přes schránku. Soubor „"+esc(f.name)+"“ má "+fmtBytes(f.size)+".</p>",null); inp.remove(); return; }
    let data; try{ data=await readFileAsData(f); }catch(e){ dialog("Chyba","<p>"+esc(e.message)+"</p>",null); inp.remove(); return; }
    // nabídni jméno (předvyplněné názvem souboru)
    dialog("Pojmenovat přílohu",
      '<label for="atName">Název přílohy</label><input id="atName" value="'+esc(f.name)+'">'+
      '<div style="font-size:.8rem;color:var(--ink-faint);margin-top:.3em">Stejný název jako existující příloha přidá novou verzi.</div>',
      d=>{
        const name=d.querySelector("#atName").value.trim()||f.name;
        const sp=space(spaceId); ensureSpaceAtt(sp);
        let a=findAtt(spaceId,name);
        const u=currentUser();
        if(a){ a.versions.push({v:a.versions.length+1,ts:now(),type:f.type,size:f.size,data,author:u.name});
          log("Nová verze přílohy „"+name+"“ (v"+a.versions.length+")"); announce("Přidána verze přílohy"); }
        else { a={id:uid("att"),name,versions:[{v:1,ts:now(),type:f.type,size:f.size,data,author:u.name}]}; sp.attachments.push(a);
          log("Nahrána příloha „"+name+"“"); announce("Příloha nahrána"); }
        logActivity("attached",null,name);
        inp.remove();
        if(onDone) onDone(a);
        render();
      });
  });
  inp.click();
}

/* tlačítko „Příloha“ nad stránkou → nahraje do prostoru stránky */
function addAttachment(p){ if(!p)return; uploadToSpace(p.spaceId); }

function openAttachmentVersions(spaceId,attId){

    '<li>v'+v.v+' — '+fmtDate(v.ts)+' · '+fmtBytes(v.size)+' · '+esc(v.author||"")+

function restoreAttVersion(spaceId,attId,vn){
  const a=spaceAtts(spaceId).find(x=>x.id===attId); if(!a)return;
  const old=a.versions.find(x=>x.v===vn); if(!old)return;
  a.versions.push({v:a.versions.length+1,ts:now(),type:old.type,size:old.size,data:old.data,author:currentUser().name});
  log("Obnovena verze v"+vn+" přílohy „"+a.name+"“ jako nová verze"); announce("Verze obnovena");
  const d=document.querySelector("dialog[open]"); if(d)d.close(); render();

/* výběr existující přílohy z libovolného prostoru → vloží makro (jedna příloha, víc míst) */
function pickAttachmentFrom(pg){
  const all=[];
  state.spaces.forEach(sp=>{ ensureSpaceAtt(sp).forEach(a=>all.push({sp,a})); });
  if(!all.length){ dialog("Žádné přílohy","<p>Zatím nemáte žádné nahrané přílohy. Nejdřív nějakou nahrajte.</p>",null); return; }
  const opts=all.map((x,i)=>'<option value="'+i+'">'+esc(x.sp.name)+' / '+esc(x.a.name)+' (v'+attCurrent(x.a).v+')</option>').join("");
  dialog("Vložit přílohu z jiné stránky/prostoru",
    '<p style="font-size:.85rem;color:var(--ink-soft)">Jeden soubor můžete zobrazit na více místech. Vybraná příloha se vloží jako makro.</p>'+
    '<label for="pickAtt">Příloha</label><select id="pickAtt">'+opts+'</select>',

      const ref = x.sp.id===pg.spaceId ? x.a.name : (x.sp.key+"/"+x.a.name);
      insertAttachmentMacro(ref);
    });

/* ================================================================
   AUTOMATIZACE (jednouživatelská pravidla)
   ================================================================ */
function runRules(trigger,p){
  state.rules.forEach(r=>{
    if(r.trigger!==trigger)return;
    if(r.action==="addlabel"&&p){ if(!p.labels.includes(r.value)){ p.labels.push(r.value); log("Automatizace: přidán štítek „"+r.value+"“"); } }
    if(r.action==="setstatus"&&p){ p.status=r.value; log("Automatizace: stav → "+statusLabel(r.value)); }
  });
}
function openAutomation(){
  let list=state.rules.length? state.rules.map((r,i)=>
    '<div class="autorule"><span class="ar-when">KDYŽ</span> '+ruleTriggerLabel(r.trigger)+', <span class="ar-when">PAK</span> '+ruleActionLabel(r)+
    ' <button class="btn btn-sm" data-delrule="'+i+'">×</button></div>').join("")
    : '<p class="empty">Zatím žádná pravidla.</p>';
  dialog("Automatizace",
    list+
    '<hr><label for="arTrig">Spouštěč</label><select id="arTrig"><option value="page-created">Vznikne stránka</option><option value="page-published">Publikuje se stránka</option></select>'+
    '<label for="arAct">Akce</label><select id="arAct"><option value="addlabel">Přidat štítek</option><option value="setstatus">Nastavit stav</option></select>'+
    '<label for="arVal">Hodnota</label><input id="arVal" placeholder="štítek nebo draft/published/archived">',
    dlg=>{
      const t=dlg.querySelector("#arTrig").value, a=dlg.querySelector("#arAct").value, v=dlg.querySelector("#arVal").value.trim();
      if(!v)return; state.rules.push({trigger:t,action:a,value:v});
      log("Nové pravidlo automatizace"); render();
    });
}
function ruleTriggerLabel(t){ return {"page-created":"vznikne stránka","page-published":"publikuje se stránka"}[t]||t; }
function ruleActionLabel(r){ return r.action==="addlabel"?'přidej štítek „'+esc(r.value)+'“':'nastav stav „'+esc(statusLabel(r.value))+'“'; }
