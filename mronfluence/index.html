let searchState={q:"",type:"",author:"",space:"",label:"",status:"",since:"",sort:"relevance"};
function doSearch(q){
  if(q!==undefined){ searchState.q=String(q).trim(); }
  state.view="search"; state.current=null; state.editing=false;
  renderSearch();
  document.getElementById("main").focus();
}
function renderSearch(){
  const q=searchState.q.toLowerCase();
  let res=Object.values(state.pages).map(p=>{
    let score=0; const t=(p.title||"").toLowerCase(), b=(p.body||"").toLowerCase();
    if(!q){ score=1; }
    else { if(t.includes(q))score+=10; if(b.includes(q))score+=3; if(p.labels.some(l=>l.toLowerCase().includes(q)))score+=5; }
    return {p,score};
  }).filter(r=>r.score>0);
  // filtry
  const f=searchState;
  if(f.type) res=res.filter(r=>r.p.type===f.type);
  if(f.author) res=res.filter(r=>r.p.creator===f.author||r.p.lastEditor===f.author||(r.p.comments||[]).some(c=>c.author===f.author));
  if(f.space) res=res.filter(r=>r.p.spaceId===f.space);
  if(f.label) res=res.filter(r=>r.p.labels.some(l=>l.toLowerCase()===f.label.toLowerCase()));
  if(f.status) res=res.filter(r=>r.p.status===f.status);
  if(f.since){ const cutoff=new Date(f.since).getTime(); res=res.filter(r=>new Date(r.p.updated).getTime()>=cutoff); }
  // řazení
  if(f.sort==="relevance") res.sort((a,b)=>b.score-a.score||b.p.updated.localeCompare(a.p.updated));
  else if(f.sort==="updated") res.sort((a,b)=>b.p.updated.localeCompare(a.p.updated));
  else if(f.sort==="created") res.sort((a,b)=>b.p.created.localeCompare(a.p.created));
  else if(f.sort==="title") res.sort((a,b)=>(a.p.title||"").localeCompare(b.p.title||"","cs"));
  else if(f.sort==="versions") res.sort((a,b)=>b.p.versions.length-a.p.versions.length);

  // panel filtrů
  const users=allUsers();
  let h='<h1 class="page-title">Hledání a filtry</h1>';
  h+='<div class="filter-panel"><h3>Filtry</h3><div class="filter-row">';
  h+='<label>Text<input id="fQ" value="'+esc(searchState.q)+'" placeholder="hledaný výraz"></label>';
  h+='<label>Typ<select id="fType"><option value="">vše</option>'+["page","livedoc","database","whiteboard"].map(t=>'<option value="'+t+'"'+(f.type===t?" selected":"")+'>'+typeLabel(t)+'</option>').join("")+'</select></label>';
  h+='<label>Autor / přispěvatel<select id="fAuthor"><option value="">kdokoli</option>'+users.map(u=>'<option value="'+esc(u.name)+'"'+(f.author===u.name?" selected":"")+'>'+esc(u.name)+'</option>').join("")+'</select></label>';
  h+='<label>Prostor<select id="fSpace"><option value="">všechny</option>'+state.spaces.map(s=>'<option value="'+s.id+'"'+(f.space===s.id?" selected":"")+'>'+esc(s.name)+'</option>').join("")+'</select></label>';
  h+='<label>Štítek<input id="fLabel" value="'+esc(f.label)+'" placeholder="štítek"></label>';
  h+='<label>Stav<select id="fStatus"><option value="">vše</option>'+["draft","published","archived"].map(s=>'<option value="'+s+'"'+(f.status===s?" selected":"")+'>'+statusLabel(s)+'</option>').join("")+'</select></label>';
  h+='<label>Upraveno od<input type="date" id="fSince" value="'+esc(f.since)+'"></label>';
  h+='<label>Řadit<select id="fSort">'+[["relevance","relevance"],["updated","nejnovější úprava"],["created","nejnovější vznik"],["title","název A→Z"],["versions","počet verzí"]].map(o=>'<option value="'+o[0]+'"'+(f.sort===o[0]?" selected":"")+'>'+o[1]+'</option>').join("")+'</select></label>';
  h+='</div><div style="margin-top:.5em"><button class="btn btn-primary btn-sm" id="applyFilters">Použít</button> <button class="btn btn-sm" id="clearFilters">Vymazat filtry</button></div></div>';

  h+='<p style="color:var(--ink-soft)">'+res.length+' výsledků</p>';
  if(!res.length) h+='<p class="empty">Nic neodpovídá. Zkuste uvolnit filtry.</p>';
  else{ h+='<div class="content"><ul class="home-list wide">';
    res.forEach(r=>{ const sp=space(r.p.spaceId); const snippet=q?makeSnippet(r.p.body,q):"";
      const icon={page:"📄",livedoc:"📝",database:"🗂️",whiteboard:"🖊️"}[r.p.type]||"📄";
      h+='<li style="flex-direction:column;align-items:flex-start"><div><span aria-hidden="true">'+icon+'</span> <button data-goto="'+r.p.id+'"><strong>'+esc(r.p.title||"(bez názvu)")+'</strong></button> '+
         '<span class="att-ver">'+esc(sp?sp.name:"")+' · '+statusLabel(r.p.status)+' · '+userChip(r.p.lastEditor,r.p.lastEditorInitials)+' '+relTime(r.p.updated)+'</span></div>'+
         (snippet?'<div style="font-size:.88em;color:var(--ink-soft)">'+snippet+'</div>':'')+'</li>';
    });
    h+='</ul></div>';
  }
  document.getElementById("mainView").innerHTML=h;
  document.getElementById("contextCol").innerHTML="";
  renderNav(); bindContentEvents();
  // navázat filtry
  const rd=id=>document.getElementById(id);
  const apply=()=>{ searchState.q=rd("fQ").value.trim(); searchState.type=rd("fType").value; searchState.author=rd("fAuthor").value; searchState.space=rd("fSpace").value; searchState.label=rd("fLabel").value.trim(); searchState.status=rd("fStatus").value; searchState.since=rd("fSince").value; searchState.sort=rd("fSort").value; renderSearch(); };
  const ap=rd("applyFilters"); if(ap) ap.onclick=apply;
  const cl=rd("clearFilters"); if(cl) cl.onclick=()=>{ searchState={q:searchState.q,type:"",author:"",space:"",label:"",status:"",since:"",sort:"relevance"}; renderSearch(); };
  ["fType","fAuthor","fSpace","fStatus","fSort"].forEach(id=>{ const el=rd(id); if(el) el.onchange=apply; });
  announce(res.length+" výsledků");
}
function makeSnippet(body,q){
  const b=(body||""); const idx=b.toLowerCase().indexOf(q);
  if(idx<0)return "";
  const start=Math.max(0,idx-30), end=Math.min(b.length,idx+q.length+40);
  return (start>0?"…":"")+esc(b.slice(start,idx))+"<mark>"+esc(b.slice(idx,idx+q.length))+"</mark>"+esc(b.slice(idx+q.length,end))+(end<b.length?"…":"");
}

function toMarkdown(p){
  let m="# "+(p.title||"(bez názvu)")+"\n\n";
  if(p.labels.length)m+="_Štítky: "+p.labels.join(", ")+"_\n\n";
  m+=(p.body||"");
  if(p.comments.length){ m+="\n\n---\n\n## Komentáře\n"; p.comments.forEach(c=>{ m+="\n- "+(c.resolved?"[vyřešeno] ":"")+c.text; }); }
  return m;
}
function openExport(){
  if(!state.current&&!Object.keys(state.pages).length){ dialog("Export","<p>Není co exportovat.</p>",null); return; }
  dialog("Export",
    '<label for="exWhat">Co exportovat</label><select id="exWhat">'+
      (state.current?'<option value="page">Tuto stránku</option>':'')+
      '<option value="space">Celý prostor</option><option value="all">Vše</option></select>'+
    '<label for="exFmt">Formát</label><select id="exFmt"><option value="md">Markdown</option><option value="html">HTML</option><option value="json">JSON (záloha)</option></select>',
    dlg=>{
      const what=dlg.querySelector("#exWhat").value, fmt=dlg.querySelector("#exFmt").value;
      let pages=[];
      if(what==="page"&&state.current)pages=[page(state.current)];
      else if(what==="space"&&state.current)pages=space(page(state.current).spaceId).pages.map(page);
      else pages=Object.values(state.pages);
      let content="",name="mronfluence",mime="text/plain";
      if(fmt==="md"){ content=pages.map(toMarkdown).join("\n\n---\n\n"); name+=".md"; mime="text/markdown"; }
      else if(fmt==="html"){ content='<!DOCTYPE html><html lang="cs"><head><meta charset="utf-8"><title>Export</title></head><body>'+
        pages.map(p=>'<article>'+renderContent(toMarkdown(p),p)+'</article><hr>').join("")+'</body></html>'; name+=".html"; mime="text/html"; }
      else { content=JSON.stringify({spaces:state.spaces,pages:state.pages,rules:state.rules,seq:state.seq},null,2); name+=".json"; mime="application/json"; }
      downloadFile(name,content,mime);
      log("Export: "+what+" jako "+fmt); announce("Export připraven ke stažení");
    });
}
function downloadFile(name,content,mime){
  const blob=new Blob([content],{type:mime}); const url=URL.createObjectURL(blob);
  const a=document.createElement("a"); a.href=url; a.download=name; document.body.appendChild(a); a.click();
  a.remove(); setTimeout(()=>URL.revokeObjectURL(url),1000);
}
function openImport(){
  dialog("Import",
    '<label for="imFmt">Zdroj</label><select id="imFmt"><option value="md">Markdown (nová stránka)</option><option value="json">JSON záloha (nahradí vše)</option></select>'+
    '<label for="imText">Vložte obsah</label><textarea id="imText" rows="10" style="font-family:var(--mono)"></textarea>'+
    (state.spaces.length?'<label for="imSpace">Prostor (pro Markdown)</label><select id="imSpace">'+state.spaces.map(s=>'<option value="'+s.id+'">'+esc(s.name)+'</option>').join("")+'</select>':''),
    dlg=>{
      const fmt=dlg.querySelector("#imFmt").value, txt=dlg.querySelector("#imText").value;
      if(!txt.trim())return;
      if(fmt==="json"){ try{ const d=JSON.parse(txt); state.spaces=d.spaces||[]; state.pages=d.pages||{}; state.rules=d.rules||[]; state.seq=d.seq||1; state.current=null; log("Import JSON zálohy hotov"); render(); }catch(e){ dialog("Chyba","<p>Neplatný JSON: "+esc(e.message)+"</p>",null); } return; }
      // markdown
      let sid=dlg.querySelector("#imSpace")?dlg.querySelector("#imSpace").value:null;
      if(!sid){ const sp={id:uid("space"),key:"IMP",name:"Import",pages:[]}; state.spaces.push(sp); sid=sp.id; }
      const titleM=txt.match(/^#\s+(.*)/m);
      const p=newPage("page",sid); p.title=titleM?titleM[1].trim():"Importovaná stránka";
      p.body=txt.replace(/^#\s+.*\n?/,"").trim();
      state.pages[p.id]=p; space(sid).pages.push(p.id);
      log("Import Markdownu → „"+p.title+"“"); openPage(p.id);
    });
}

function viewVersion(p,n){
  const v=p.versions.find(x=>x.n===n); if(!v)return;
  dialog("Verze v"+n+" — "+fmtDate(v.ts),
    '<div class="content" style="max-height:50vh;overflow:auto">'+renderContent(v.body,p)+'</div>'+
    '<button type="button" class="btn" id="restoreVer" style="margin-top:.6em">Obnovit tuto verzi</button>',
    null);
  setTimeout(()=>{ const rb=document.getElementById("restoreVer"); if(rb) rb.onclick=()=>{
    saveVersion(p,"před obnovením v"+n); p.body=v.body; p.title=v.title; touch(p);
    document.querySelector("dialog[open]").close();
    log("Obnovena verze v"+n); render();
  }; },0);
}
function showDiff(p){
  if(p.versions.length<2)return;
  const a=p.versions[p.versions.length-2].body.split("\n");
  const b=p.versions[p.versions.length-1].body.split("\n");
  const setB=new Set(b), setA=new Set(a);
  let h='<div class="diff-wrap">';
  const all=[]; let ia=0,ib=0;
  // jednoduchý řádkový diff
  b.forEach(line=>{ if(!setA.has(line)) all.push(['add',line]); else all.push(['ctx',line]); });
  a.forEach(line=>{ if(!setB.has(line)) all.push(['del',line]); });
  all.forEach(([t,l])=>{
    const cls=t==="add"?"diff-line-add":t==="del"?"diff-line-del":"diff-line-ctx";
    const pre=t==="add"?"+ ":t==="del"?"- ":"  ";
    h+='<div class="'+cls+'">'+esc(pre+l)+'</div>';
  });
  h+='</div>';
  dialog("Porovnání v"+(p.versions.length-1)+" → v"+p.versions.length, h, null);
}

function bindContentEvents(){ /* delegováno globálně níže */ }

document.addEventListener("click",e=>{
  const t=e.target.closest("[data-goto],[data-addchild],[data-addroot],[data-star],[data-publish],[data-status],[data-delete],[data-addlabel],[data-rmlabel],[data-addcomment],[data-resolve],[data-editcomment],[data-delcomment],[data-scroll],[data-viewver],[data-diff],[data-newlink],[data-cmnt],[data-dbaddrow],[data-dbaddcol],[data-dbview],[data-dbsort],[data-dbeditrow],[data-dbdelrow],[data-wbadd],[data-wbdel],[data-wbmove],[data-insert],[data-delrule],[data-attach],[data-delattach],[data-tab],[data-labelsearch],[data-useident],[data-delident],[data-attachupload],[data-attachfrom],[data-attachver],[data-delattachver],[data-saved],[data-watch],[data-owner],[data-pageinfo],[data-profile],[data-openspace]");
  if(!t)return;
  const p=state.current?page(state.current):null;
  if(t.dataset.goto){ e.preventDefault(); openPage(t.dataset.goto); return; }
  if(t.dataset.newlink){ e.preventDefault(); const name=t.dataset.newlink;
    dialog("Vytvořit stránku","<p>Stránka „"+esc(name)+"“ neexistuje. Vytvořit ji?</p>",()=>{
      const sid=p?p.spaceId:(state.spaces[0]&&state.spaces[0].id);
      if(!sid){createSpace();return;}
      const np=newPage("page",sid); np.title=name; state.pages[np.id]=np; space(sid).pages.push(np.id);
      openPage(np.id); state.editing=true; render();
    }); return; }
  if(t.dataset.addroot){ createPage(t.dataset.addroot,null); return; }
  if(t.dataset.addchild){ createPage(page(t.dataset.addchild).spaceId,t.dataset.addchild); return; }
  if(t.dataset.star){ const pg=page(t.dataset.star); pg.starred=!pg.starred; render(); return; }
  if(t.dataset.saved){ const pg=page(t.dataset.saved); pg.savedForLater=!pg.savedForLater; announce(pg.savedForLater?"Uloženo na později":"Odebráno z uložených"); render(); return; }
  if(t.dataset.watch){ const pg=page(t.dataset.watch); const u=currentUser();
    if(pg.watchers.includes(u.name)) pg.watchers=pg.watchers.filter(w=>w!==u.name);
    else pg.watchers.push(u.name);
    announce(pg.watchers.includes(u.name)?"Sledujete stránku":"Sledování zrušeno"); render(); return; }
  if(t.dataset.owner){ const pg=page(t.dataset.owner);
    const opts=allUsers().map(us=>'<option value="'+esc(us.name)+'"'+(us.name===pg.owner?" selected":"")+'>'+esc(us.name)+'</option>').join("");
    dialog("Vlastník stránky","<p style=\"font-size:.85rem;color:var(--ink-soft)\">Vlastník je kontaktní osoba pro obsah stránky.</p><label for=\"ownSel\">Vlastník</label><select id=\"ownSel\">"+opts+"</select>",d=>{ const nm=d.querySelector("#ownSel").value; pg.owner=nm; pg.ownerInitials=(allUsers().find(x=>x.name===nm)||{}).initials||initials(nm); render(); }); return; }
  if(t.dataset.pageinfo){ openPageInfo(page(t.dataset.pageinfo)); return; }
  if(t.dataset.profile){ e.preventDefault(); goView("profile:"+t.dataset.profile); return; }
  if(t.dataset.openspace){ const sp=space(t.dataset.openspace); if(sp&&sp.pages.length){ openPage(sp.pages[0]); } else { state.view=null; announce("Prostor je prázdný"); } return; }
  if(t.dataset.labelsearch){ e.preventDefault(); doSearch(t.dataset.labelsearch); return; }
  if(t.dataset.publish){ const pg=page(t.dataset.publish); saveVersion(pg,"publikováno"); pg.status="published"; touch(pg); runRules("page-published",pg); logActivity("published",pg.id); log("Publikováno „"+pg.title+"“"); announce("Publikováno"); render(); return; }
  if(t.dataset.status){ const pg=page(t.dataset.status);

  if(t.dataset.editcomment){ if(p){ const c=p.comments.find(x=>x.id===t.dataset.editcomment);

  if(t.dataset.delcomment){ if(p){ p.comments=p.comments.filter(x=>x.id!==t.dataset.delcomment);

  if(t.dataset.dbeditrow){ dbEditRow(p,t.dataset.dbeditrow); return; }

  if(t.dataset.wbmove){ const [id,dir]=t.dataset.wbmove.split("|"); const n=p.board.notes.find(x=>x.id===id);

  if(t.dataset.delrule){ state.rules.splice(+t.dataset.delrule,1); document.querySelector("dialog[open]").close(); openAutomation(); return; }

    if(parts[1]==="restore"){ restoreAttVersion(p?p.spaceId:state.spaces[0].id, parts[0], +parts[2]); }
    else { openAttachmentVersions(p?p.spaceId:state.spaces[0].id, parts[0]); }

  if(t.dataset.delattach){
    const sid=p?p.spaceId:(state.spaces[0]&&state.spaces[0].id);
    const list=spaceAtts(sid); const idx=list.findIndex(a=>a.id===t.dataset.delattach);
    if(idx>=0){ const nm=list[idx].name;
      dialog("Smazat přílohu","<p>Smazat „"+esc(nm)+"“ z prostoru? Makra, která ji vkládají, přestanou zobrazovat soubor.</p>",()=>{ list.splice(idx,1); log("Smazána příloha „"+nm+"“"); const d=document.querySelector("dialog[open]"); if(d)d.close(); render(); });
    }

  // rychlé přepnutí identity
  if(t.dataset.useident!==undefined){ const id=state.identities[+t.dataset.useident]; if(id){ const prev=currentUser(); if(prev.name!==id.name && !state.identities.some(x=>x.name===prev.name)) state.identities.push({name:prev.name,initials:prev.initials}); state.user={name:id.name,initials:id.initials}; state.identities.splice(+t.dataset.useident,1); log("Přepnuto na "+id.name); refreshUserButton(); const d=document.querySelector("dialog[open]"); if(d)d.close(); render(); } return; }

});

function insertAtCursor(text){
  const ta=document.getElementById("edBody"); if(!ta)return;
  const s=ta.selectionStart, e=ta.selectionEnd;
  const sel=ta.value.slice(s,e);
  let ins=text;
  if(text==="**"||text==="*"||text==="`"){ ins=text+(sel||"text")+text; }
  ta.value=ta.value.slice(0,s)+ins+ta.value.slice(e);
  ta.dispatchEvent(new Event("input")); ta.focus();
  ta.selectionStart=s+ins.length; ta.selectionEnd=s+ins.length;
}

/* ---- slash menu ---- */
let slashState={active:false,startPos:0,items:[],sel:0};
function setupSlashMenu(ta){
  ta.addEventListener("keyup",e=>{
    if(["ArrowDown","ArrowUp","Enter","Escape"].includes(e.key) && slashState.active) return;
    const pos=ta.selectionStart;
    const before=ta.value.slice(0,pos);
    // detekuj "/" na začátku slova (řádek nebo mezera před ním)
    const m=before.match(/(?:^|[\s\n])\/([a-záčďéěíňóřšťúůýž]*)$/i);
    if(m){ slashState.active=true; slashState.startPos=pos-m[1].length-1; showSlash(ta,m[1]); }
    else { hideSlash(); }
  });
  ta.addEventListener("keydown",e=>{
    if(!slashState.active)return;
    const menu=document.getElementById("slashMenu");
    if(e.key==="ArrowDown"){ e.preventDefault(); slashState.sel=Math.min(slashState.sel+1,slashState.items.length-1); paintSlash(); }
    else if(e.key==="ArrowUp"){ e.preventDefault(); slashState.sel=Math.max(slashState.sel-1,0); paintSlash(); }
    else if(e.key==="Enter"){ if(slashState.items.length){ e.preventDefault(); chooseSlash(slashState.items[slashState.sel]); } }
    else if(e.key==="Escape"){ hideSlash(); }
  });
  ta.addEventListener("blur",()=>setTimeout(hideSlash,150));
}
function showSlash(ta,query){
  const q=query.toLowerCase();
  const items=MACRO_CATALOG.filter(m=>!q||m.key.startsWith(q)||m.label.toLowerCase().includes(q)).slice(0,10);
  slashState.items=items; slashState.sel=0;
  const menu=document.getElementById("slashMenu"); if(!menu)return;
  if(!items.length){ hideSlash(); return; }
  menu.hidden=false;
  paintSlash();
}
function paintSlash(){
  const menu=document.getElementById("slashMenu"); if(!menu)return;
  menu.innerHTML=slashState.items.map((m,i)=>'<button type="button" class="slash-item'+(i===slashState.sel?" active":"")+'" data-slashpick="'+MACRO_CATALOG.indexOf(m)+'"><span class="si-key">/'+esc(m.key)+'</span><span>'+esc(m.label)+'</span><span class="si-desc">'+esc(m.desc)+'</span></button>').join("");
}
function hideSlash(){ slashState.active=false; const m=document.getElementById("slashMenu"); if(m)m.hidden=true; }
function chooseSlash(macro){
  const ta=document.getElementById("edBody"); if(!ta||!macro)return;
  const pos=ta.selectionStart;
  // nahraď "/query" makrem
  ta.value=ta.value.slice(0,slashState.startPos)+macro.insert+ta.value.slice(pos);
  const np=slashState.startPos+macro.insert.length;
  hideSlash();
  ta.dispatchEvent(new Event("input")); ta.focus();
  ta.selectionStart=ta.selectionEnd=np;
  // speciál: {attachment} bez názvu → hned nabídni nahrání
  if(macro.insert==="{attachment}"){ const pg=page(state.current); if(pg) uploadToSpace(pg.spaceId,(a)=>{ replaceLastAttachmentToken(a.name); }); }
}
function replaceLastAttachmentToken(name){
  const ta=document.getElementById("edBody"); if(!ta)return;
  // nahraď první prázdné {attachment} makrem s názvem
  ta.value=ta.value.replace(/\{attachment\}/,"{attachment:"+name+"}");
  ta.dispatchEvent(new Event("input"));
}

/* editor save tlačítka + edit tlačítko (delegace na id) */
document.addEventListener("click",e=>{
  if(e.target.id==="btnEdit"){ state.editing=true; render(); }
  if(e.target.id==="btnCancelEdit"){ state.editing=false; render(); }
  // tlačítko Makra ▾
  const macroBtn=e.target.closest("#btnMacroMenu");
  const dd=document.getElementById("macroDropdown");
  if(macroBtn){ const open=dd.hidden; dd.hidden=!open; macroBtn.setAttribute("aria-expanded",open); return; }
  else if(dd && !dd.hidden && !e.target.closest("#macroDropdown")){ dd.hidden=true; const b=document.getElementById("btnMacroMenu"); if(b)b.setAttribute("aria-expanded","false"); }
  // výběr makra z dropdownu nebo slash menu
  const mi=e.target.closest("[data-macroins],[data-slashpick]");
  if(mi){
    const idx = mi.dataset.macroins!==undefined ? +mi.dataset.macroins : +mi.dataset.slashpick;
    const macro=MACRO_CATALOG[idx];
    if(mi.dataset.slashpick!==undefined){ chooseSlash(macro); }
    else {
      if(dd) dd.hidden=true;
      if(macro.insert==="{attachment}"){ const pg=page(state.current); if(pg){ insertAtCursor("{attachment}"); uploadToSpace(pg.spaceId,(a)=>replaceLastAttachmentToken(a.name)); } }
      else insertAtCursor(macro.insert);
    }
    return;
  }
  if(e.target.closest("#btnEdComment")){ editorInlineComment(); return; }
  if(e.target.id==="btnSaveDraft"||e.target.id==="btnPublish"){
    const p=page(state.current);
    const nt=document.getElementById("edTitle").value.trim();
    const nb=document.getElementById("edBody").value;
    const publishing=e.target.id==="btnPublish";
    const finish=(verComment)=>{
      if(publishing||p.status==="published"){ saveVersion(p, verComment||(publishing?"publikováno":"uloženo")); }
      p.title=nt||p.title; p.body=nb; touch(p);
      if(publishing){ p.status="published"; runRules("page-published",p); logActivity("published",p.id,verComment); }
      else logActivity("edited",p.id,verComment);
      state.editing=false; log((publishing?"Publikováno":"Uložen koncept")+" „"+p.title+"“");
      announce(publishing?"Publikováno":"Uloženo"); render();
    };
    if(publishing){
      dialog("Co jste změnili?","<label for=\"verC\">Komentář k verzi (nepovinné)</label><input id=\"verC\" placeholder=\"např. Doplněny kontakty\">",d=>{ finish(d.querySelector("#verC").value.trim()); });
      // umožni publikovat i bez komentáře (prázdný Enter přes potvrzení dialogu)
    } else finish("");
  }
});

/* ================================================================
   CELÝ PROJEKT — serializace, soubor, schránka
   ================================================================ */
function serializeProject(){
  return JSON.stringify({
    app:"MRonfluence", version:1, saved:now(),
    spaces:state.spaces, pages:state.pages, rules:state.rules,
    user:state.user, identities:state.identities,
    views:state.views, activity:state.activity, notifications:state.notifications, seq:state.seq
  },null,2);
}
function loadProjectData(data){
  if(!data||typeof data!=="object") throw new Error("Neplatná data projektu.");
  if(!Array.isArray(data.spaces)||typeof data.pages!=="object") throw new Error("Chybí prostory nebo stránky.");
  state.spaces=data.spaces||[];
  state.pages=data.pages||{};
  state.rules=data.rules||[];
  state.user=data.user||{name:"Já",initials:"JÁ"};
  state.identities=data.identities||[];
  state.views=data.views||[];
  state.activity=data.activity||[];
  state.notifications=data.notifications||[];
  // migrace starších stránek (doplnění nových polí)
  Object.values(state.pages).forEach(p=>{
    if(!p.creator){ p.creator=p.author||"Já"; p.creatorInitials=p.authorInitials||initials(p.creator); }
    if(!p.lastEditor){ p.lastEditor=p.creator; p.lastEditorInitials=p.creatorInitials; }
    if(!p.owner){ p.owner=p.creator; p.ownerInitials=p.creatorInitials; }
    if(!p.watchers) p.watchers=[p.creator];
    if(p.savedForLater===undefined) p.savedForLater=false;
  });
  state.spaces.forEach(sp=>{ if(!sp.attachments) sp.attachments=[]; });
  state.seq=data.seq||1;
  state.current=null; state.editing=false;
  refreshUserButton(); render();
}
function parseAndLoad(text){
  const data=JSON.parse(text); // vyhodí SyntaxError, chytáme u volajícího
  loadProjectData(data);
}

/* --- uložit projekt do souboru (accesskey S) --- */
function saveProjectToFile(){
  const stamp=new Date().toISOString().slice(0,19).replace(/[:T]/g,"-");
  downloadFile("mronfluence-projekt-"+stamp+".json", serializeProject(), "application/json");
  log("Projekt uložen do souboru"); announce("Projekt uložen do souboru ke stažení");
}

/* --- načíst projekt ze souboru (accesskey O) --- */
function loadProjectFromFile(){
  const inp=document.createElement("input");
  inp.type="file"; inp.accept=".json,application/json";
  inp.style.position="absolute"; inp.style.left="-9999px";
  document.body.appendChild(inp);
  inp.addEventListener("change",()=>{
    const f=inp.files&&inp.files[0]; if(!f){ inp.remove(); return; }
    const rd=new FileReader();
    rd.onload=()=>{
      try{ parseAndLoad(String(rd.result)); log("Projekt načten ze souboru „"+f.name+"“"); announce("Projekt načten ze souboru"); }
      catch(err){ dialog("Načtení selhalo","<p>Soubor se nepodařilo načíst: "+esc(err.message)+"</p>",null); log("Chyba načtení souboru: "+err.message); }
      inp.remove();
    };
    rd.onerror=()=>{ dialog("Načtení selhalo","<p>Soubor se nepodařilo přečíst.</p>",null); inp.remove(); };
    rd.readAsText(f);
  });
  inp.click();
}

/* --- kopírovat celý projekt do schránky (Ctrl+Shift+S) --- */
async function copyProjectToClipboard(){
  const json=serializeProject();
  try{
    if(navigator.clipboard && navigator.clipboard.writeText){
      await navigator.clipboard.writeText(json);
      log("Projekt zkopírován do schránky"); announce("Celý projekt zkopírován do schránky");
      return;
    }
    throw new Error("Clipboard API není dostupné.");
  }catch(err){
    // fallback: dialog s předvyplněnou textarea k ručnímu zkopírování
    log("Schránka nedostupná, fallback: "+err.message);
    const dlg=dialog("Zkopírovat projekt ručně",
      '<p>Automatické zkopírování neprošlo. Označte text (Ctrl+A) a zkopírujte (Ctrl+C).</p>'+
      '<textarea id="copyArea" rows="10" style="font-family:var(--mono)" readonly>'+esc(json)+'</textarea>',
      null);
    setTimeout(()=>{ const ta=dlg.querySelector("#copyArea"); if(ta){ ta.focus(); ta.select(); } },0);
    announce("Projekt připraven ke zkopírování z textového pole");
  }
}

/* --- načíst projekt ze schránky (Ctrl+Shift+O) --- */
async function pasteProjectFromClipboard(){
  try{
    if(navigator.clipboard && navigator.clipboard.readText){
      const text=await navigator.clipboard.readText();
      if(!text||!text.trim()) throw new Error("Schránka je prázdná.");
      try{ parseAndLoad(text); log("Projekt načten ze schránky"); announce("Projekt načten ze schránky"); }
      catch(perr){ throw new Error("Obsah schránky není platný projekt: "+perr.message); }
      return;
    }
    throw new Error("Clipboard API pro čtení není dostupné.");
  }catch(err){
    // fallback: dialog s textarea, kam uživatel vloží JSON a potvrdí
    log("Čtení schránky nedostupné, fallback: "+err.message);
    clipboardPasteFallback(err.message);
  }
}
function clipboardPasteFallback(reason){
  const dlg=dialog("Vložit projekt ze schránky",
    '<p>Vložte JSON projektu (Ctrl+V) do pole a potvrďte. Nahradí celý stávající projekt.</p>'+
    (reason?'<p style="color:var(--ink-faint);font-size:.85rem">Důvod fallbacku: '+esc(reason)+'</p>':'')+
    '<textarea id="pasteArea" rows="10" style="font-family:var(--mono)" placeholder="Sem vložte JSON projektu…"></textarea>',
    d=>{
      const text=d.querySelector("#pasteArea").value;
      try{ parseAndLoad(text); log("Projekt načten ze schránky (fallback)"); announce("Projekt načten"); }
      catch(err){ dialog("Načtení selhalo","<p>Vložený text není platný projekt: "+esc(err.message)+"</p>",null); }
    });
  setTimeout(()=>{ const ta=dlg.querySelector("#pasteArea"); if(ta) ta.focus(); },0);
}

/* klávesové zkratky pro schránku: Ctrl+Shift+S kopírovat, Ctrl+Shift+O načíst */
document.addEventListener("keydown",e=>{
  if((e.ctrlKey||e.metaKey)&&e.shiftKey&&!e.altKey){
    const k=e.key.toLowerCase();
    if(k==="s"){ e.preventDefault(); copyProjectToClipboard(); }
    else if(k==="o"){ e.preventDefault(); pasteProjectFromClipboard(); }
  }
});
document.getElementById("btnToggleCols").onclick=e=>{ document.body.classList.toggle("onecol"); const on=document.body.classList.contains("onecol"); e.target.setAttribute("aria-pressed",on); e.target.textContent=on?"Tři sloupce":"Jeden sloupec"; };

/* ---- notifikace ---- */
function refreshNotifBadge(){
  const u=currentUser();
  const n=state.notifications.filter(x=>x.forUser===u.name && !x.read).length;
  const badge=document.getElementById("notifCount"); if(!badge)return;
  if(n>0){ badge.hidden=false; badge.textContent=n; } else badge.hidden=true;
}
function openNotifications(){
  const u=currentUser();
  const mine=state.notifications.filter(x=>x.forUser===u.name);
  let body = mine.length
    ? mine.slice(0,40).map(x=>'<div class="notif-item'+(x.read?"":" unread")+'">'+avatarHtml(x.actor)+' '+esc(x.text)+(x.pageId?' <button class="btn btn-sm" data-goto="'+x.pageId+'">Otevřít</button>':'')+'<span class="att-ver">'+relTime(x.ts)+'</span></div>').join("")
    : '<p class="empty">Žádná upozornění. Sledujte stránky tlačítkem „Sledovat“ a uvidíte tu změny od ostatních identit.</p>';
  dialog("Upozornění pro "+esc(u.name), body+(mine.length?'<div style="margin-top:.6em"><button type="button" class="btn" id="markRead">Označit vše jako přečtené</button></div>':''), null);
  setTimeout(()=>{ const b=document.getElementById("markRead"); if(b) b.onclick=()=>{ state.notifications.forEach(x=>{ if(x.forUser===u.name) x.read=true; }); refreshNotifBadge(); const d=document.querySelector("dialog[open]"); if(d)d.close(); }; },0);
}
