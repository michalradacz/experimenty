function exportICal() {
  const lines = ["BEGIN:VCALENDAR","VERSION:2.0","PRODID:-//Projektor//CS//CS"];
  const stamp = new Date().toISOString().replace(/[-:]/g, "").split(".")[0] + "Z";
  for (const t of project.tasks) {
    if (!t.start) continue;
    const start = (t.start || "").replace(/-/g, "");
    const finishDate = parseDate(t.finish || t.start);
    const endPlus = finishDate ? formatDate(addDays(finishDate, 1)).replace(/-/g, "") : start;
    lines.push("BEGIN:VEVENT");
    lines.push("UID:projektor-" + t.id + "@local");
    lines.push("DTSTAMP:" + stamp);
    lines.push("DTSTART;VALUE=DATE:" + start);
    lines.push("DTEND;VALUE=DATE:" + endPlus);
    lines.push("SUMMARY:" + (t.isMilestone ? "◆ " : "") + (t.name || "").replace(/[,;\\\n]/g, " "));
    if (t.notes) lines.push("DESCRIPTION:" + t.notes.replace(/[,;\\\n]/g, " "));
    lines.push("END:VEVENT");
  }
  lines.push("END:VCALENDAR");
  return lines.join("\r\n");
}

function exportMSPDI() {
  const esc = (s) => escapeHtml(String(s == null ? "" : s));
  const lines = [];
  lines.push("<?xml version=\"1.0\" encoding=\"UTF-8\"?>");
  lines.push("<Project xmlns=\"http://schemas.microsoft.com/project\">");
  lines.push("<Name>" + esc(project.name) + "</Name>");
  lines.push("<StartDate>" + (project.startDate || "") + "T08:00:00</StartDate>");
  lines.push("<Tasks>");
  project.tasks.forEach((t, i) => {
    lines.push("<Task>");
    lines.push("<UID>" + (i+1) + "</UID>");
    lines.push("<ID>" + (i+1) + "</ID>");
    lines.push("<Name>" + esc(t.name) + "</Name>");
    lines.push("<WBS>" + esc(t.wbs || "") + "</WBS>");
    lines.push("<OutlineLevel>" + ((t.outlineLevel || 0) + 1) + "</OutlineLevel>");
    lines.push("<OutlineNumber>" + esc(t.wbs || "") + "</OutlineNumber>");
    lines.push("<Summary>" + (isSummary(t) ? 1 : 0) + "</Summary>");
    lines.push("<Milestone>" + (t.isMilestone ? 1 : 0) + "</Milestone>");
    lines.push("<Active>1</Active>");
    lines.push("<Manual>" + (t.manual ? 1 : 0) + "</Manual>");
    lines.push("<Start>" + (t.start || "") + "T08:00:00</Start>");
    lines.push("<Finish>" + (t.finish || "") + "T17:00:00</Finish>");
    lines.push("<Duration>PT" + Math.round((t.duration || 0) * 8) + "H0M0S</Duration>");
    lines.push("<PercentComplete>" + (t.percentComplete || 0) + "</PercentComplete>");
    if (t.deadline) lines.push("<Deadline>" + t.deadline + "T17:00:00</Deadline>");
    lines.push("<Priority>" + (t.priority || 500) + "</Priority>");
    if (t.notes) lines.push("<Notes>" + esc(t.notes) + "</Notes>");
    const preds = getPredecessors(t.id);
    for (const l of preds) {
      const predIdx = getTaskIndex(l.predId) + 1;
      const typeMap = { FS: 1, SS: 3, FF: 0, SF: 2 };
      lines.push("<PredecessorLink>");
      lines.push("<PredecessorUID>" + predIdx + "</PredecessorUID>");
      lines.push("<Type>" + (typeMap[l.type] != null ? typeMap[l.type] : 1) + "</Type>");
      lines.push("<LinkLag>" + Math.round((l.lag || 0) * 4800) + "</LinkLag>");
      lines.push("<LagFormat>7</LagFormat>");
      lines.push("</PredecessorLink>");
    }
    lines.push("</Task>");
  });
  lines.push("</Tasks>");
  lines.push("</Project>");
  return lines.join("\n");
}

function importCSV(text) {
  const lines = text.split(/\r?\n/).filter(l => l.trim());
  if (!lines.length) return;
  const first = lines[0];
  let sep = ",";
  if (first.includes("\t")) sep = "\t";
  else if (first.split(";").length > first.split(",").length) sep = ";";

  const parseRow = (line) => {
    const out = [];
    let cur = "", inQ = false;
    for (let i = 0; i < line.length; i++) {
      const ch = line[i];
      if (inQ) {
        if (ch === "\"" && line[i+1] === "\"") { cur += "\""; i++; }
        else if (ch === "\"") { inQ = false; }
        else cur += ch;
      } else {
        if (ch === "\"") inQ = true;
        else if (ch === sep) { out.push(cur); cur = ""; }
        else cur += ch;
      }
    }
    out.push(cur);
    return out;
  };

  const headers = parseRow(lines[0]).map(h => h.trim().toLowerCase());
  const findCol = (names) => {
    for (const n of names) {
      const idx = headers.findIndex(h => h === n.toLowerCase());
      if (idx >= 0) return idx;
    }
    return -1;
  };
  const cName = findCol(["name", "název", "nazev", "task", "úkol"]);
  const cDur = findCol(["duration", "trvání", "trvani", "dur"]);
  const cStart = findCol(["start", "začátek", "zacatek"]);
  const cFinish = findCol(["finish", "konec", "end"]);
  const cPct = findCol(["percent", "%", "progress", "hotovo", "% hotovo"]);
  const cPred = findCol(["predecessors", "předchůdci", "predchudci", "preds"]);
  const cNotes = findCol(["notes", "poznámky", "poznamky"]);

  action(currentLang==="cs"?"Import CSV":"Import CSV", () => {
    project.tasks = [];
    project.links = [];
    const rowsToLink = [];
    for (let i = 1; i < lines.length; i++) {
      const cells = parseRow(lines[i]);
      if (!cells.length || !cells.join("").trim()) continue;
      const name = cName >= 0 ? cells[cName] : cells[0];
      if (!name || !name.trim()) continue;
      let duration = 1, durationUnit = "d";
      if (cDur >= 0 && cells[cDur]) {
        const pd = parseDurationString(cells[cDur]);
        duration = pd.duration; durationUnit = pd.unit;
      }
      const t = newTask({
        name: name.trim(),
        duration, durationUnit,
        start: cStart >= 0 ? (cells[cStart] || null) : null,
        finish: cFinish >= 0 ? (cells[cFinish] || null) : null,
        percentComplete: cPct >= 0 ? (parseInt(cells[cPct],10) || 0) : 0,
        notes: cNotes >= 0 ? (cells[cNotes] || "") : "",
      });
      t.id = "t_" + (project.nextId++);
      project.tasks.push(t);
      if (cPred >= 0 && cells[cPred]) rowsToLink.push({ id: t.id, str: cells[cPred] });
    }
    for (const { id, str } of rowsToLink) {
      const parsed = parsePredecessorsString(str, id);
      for (const p of parsed) addLink(p.predId, id, p.type, p.lag);
    }
  });
  toast(T("toast_loaded"), "ok");
  sfx("load");
}

async function ghFetch(url, options) {
  const cfg = getGitHubConfig();
  const headers = Object.assign({
    "Accept": "application/vnd.github+json",
    "X-GitHub-Api-Version": "2022-11-28",
  }, (options && options.headers) || {});
  if (cfg && cfg.token) headers["Authorization"] = "Bearer " + cfg.token;
  const resp = await fetch(url, Object.assign({}, options, { headers }));
  if (!resp.ok) {
    const txt = await resp.text();
    throw new Error("GitHub API " + resp.status + ": " + txt.slice(0, 200));
  }
  return resp.json();
}

function b64encode(str) { return btoa(unescape(encodeURIComponent(str))); }
function b64decode(b64) { return decodeURIComponent(escape(atob(b64))); }

async function ghSave(cfg) {
  if (!cfg.token || !cfg.owner || !cfg.repo) {
    toast(currentLang==="cs"?"Vyplňte token, owner, repo":"Fill token, owner, repo", "warn");
    return;
  }
  const filepath = (cfg.path ? cfg.path + "/" : "") + cfg.filename;
  ghLog("Saving " + filepath + "…");
  try {
    const clone = JSON.parse(JSON.stringify(project, (k, v) => k.startsWith("_") ? undefined : v));
    const content = JSON.stringify(clone, null, 2);

    if (content.length > 900000) {
      ghLog("Large file — using Git Blob API…");
      await ghSaveBlob(cfg, filepath, content);
    } else {
      const b64 = b64encode(content);
      let sha;
      try {
        const existing = await ghFetch(
          "https://api.github.com/repos/" + cfg.owner + "/" + cfg.repo + "/contents/" +
          encodeURIComponent(filepath) + "?ref=" + cfg.branch
        );
        sha = existing.sha;
      } catch(e) { /* does not exist */ }
      const body = {
        message: "Update " + cfg.filename + " via Projektor",
        content: b64, branch: cfg.branch,
      };
      if (sha) body.sha = sha;
      await ghFetch(
        "https://api.github.com/repos/" + cfg.owner + "/" + cfg.repo + "/contents/" + encodeURIComponent(filepath),
        { method: "PUT", headers: { "Content-Type": "application/json" }, body: JSON.stringify(body) }
      );
    }
    ghLog("✓ " + (currentLang==="cs"?"Uloženo":"Saved"));
    toast(currentLang==="cs"?"Uloženo do GitHubu":"Saved to GitHub", "ok");
    sfx("save");
  } catch(e) {
    ghLog("✗ " + e.message);
    toast(e.message, "err");
    sfx("error");
  }
}

async function ghSaveBlob(cfg, filepath, content) {
  const blob = await ghFetch(
    "https://api.github.com/repos/" + cfg.owner + "/" + cfg.repo + "/git/blobs",
    { method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ content: b64encode(content), encoding: "base64" }) });
  const refData = await ghFetch("https://api.github.com/repos/" + cfg.owner + "/" + cfg.repo + "/git/ref/heads/" + cfg.branch);
  const commitData = await ghFetch(refData.object.url);
  const tree = await ghFetch(
    "https://api.github.com/repos/" + cfg.owner + "/" + cfg.repo + "/git/trees",
    { method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        base_tree: commitData.tree.sha,
        tree: [{ path: filepath, mode: "100644", type: "blob", sha: blob.sha }]
      }) });
  const newCommit = await ghFetch(
    "https://api.github.com/repos/" + cfg.owner + "/" + cfg.repo + "/git/commits",
    { method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        message: "Update " + filepath + " via Projektor",
        tree: tree.sha, parents: [commitData.sha]
      }) });
  await ghFetch(
    "https://api.github.com/repos/" + cfg.owner + "/" + cfg.repo + "/git/refs/heads/" + cfg.branch,
    { method: "PATCH", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ sha: newCommit.sha }) });
}

async function ghLoad(cfg) {
  if (!cfg.token || !cfg.owner || !cfg.repo) {
    toast(currentLang==="cs"?"Vyplňte token, owner, repo":"Fill token, owner, repo", "warn");
    return;
  }
  const filepath = (cfg.path ? cfg.path + "/" : "") + cfg.filename;
  ghLog("Loading " + filepath + "…");
  try {
    const data = await ghFetch(
      "https://api.github.com/repos/" + cfg.owner + "/" + cfg.repo + "/contents/" +
      encodeURIComponent(filepath) + "?ref=" + cfg.branch
    );
    const content = b64decode(data.content.replace(/\s/g, ""));
    const parsed = JSON.parse(content);
    loadProjectData(parsed);
    ghLog("✓ " + (currentLang==="cs"?"Načteno":"Loaded"));
    toast(currentLang==="cs"?"Načteno z GitHubu":"Loaded from GitHub", "ok");
    sfx("load");
  } catch(e) {
    ghLog("✗ " + e.message);
    toast(e.message, "err");
    sfx("error");
  }
}

async function ghList(cfg) {
  if (!cfg.token || !cfg.owner || !cfg.repo) {
    toast(currentLang==="cs"?"Vyplňte token, owner, repo":"Fill token, owner, repo", "warn");
    return;
  }
  const dir = cfg.path || "";
  ghLog("Listing " + (dir || "/") + "…");
  try {
    const items = await ghFetch(
      "https://api.github.com/repos/" + cfg.owner + "/" + cfg.repo + "/contents/" +
      encodeURIComponent(dir) + "?ref=" + cfg.branch
    );
    const json = items.filter(it => it.type === "file" && it.name.endsWith(".json"));
    if (!json.length) { ghLog(currentLang==="cs"?"(žádné .json)":"(no .json)"); return; }
    const out = $("#ghOutput");
    out.appendChild(el("div", { style:"margin-top:4px; font-weight:600;" }, currentLang==="cs"?"Soubory:":"Files:"));
    for (const it of json) {
      out.appendChild(el("div", null,
        el("button", { class:"btn", type:"button", style:"font-size:0.8rem; padding:2px 6px; margin:2px;",
          onClick: () => { $("#ghFilename").value = it.name; ghLog("Selected: " + it.name); }
        }, it.name)));
    }
  } catch(e) {
    ghLog("✗ " + e.message);
  }
}

    "btnLinkTasks": currentLang==="cs"?"Spojit":"Link",
    "btnUnlinkTasks": currentLang==="cs"?"Rozpojit":"Unlink",
    "btnMilestone": currentLang==="cs"?"Milník":"Milestone",
    "btnRecurring": currentLang==="cs"?"Opakovaný":"Recurring",
    "btnUndo": currentLang==="cs"?"Zpět":"Undo",
    "btnRedo": currentLang==="cs"?"Znovu":"Redo",
    "btnFilter": currentLang==="cs"?"Filtr":"Filter",
    "btnSort": currentLang==="cs"?"Řazení":"Sort",
    "btnGroup": currentLang==="cs"?"Skupiny":"Groups",
    "btnSearch": currentLang==="cs"?"Hledat":"Search",
    "btnShowCritical": currentLang==="cs"?"Kritická cesta":"Critical path",
    "btnTaskPath": currentLang==="cs"?"Cesta úkolu":"Task path",
    "btnCalendars": currentLang==="cs"?"Kalendáře":"Calendars",
    "btnBaselines": currentLang==="cs"?"Baseliny":"Baselines",
    "btnStatusDate": currentLang==="cs"?"Dat. stavu":"Status date",
    "btnValidate": currentLang==="cs"?"Validace":"Validate",
    "btnReports": currentLang==="cs"?"Reporty":"Reports",
    "btnRisks": currentLang==="cs"?"Rizika":"Risks",
    "btnCustomFields": currentLang==="cs"?"Vlastní pole":"Custom fields",
    "btnSave": currentLang==="cs"?"Uložit":"Save",
    "btnLoad": currentLang==="cs"?"Načíst":"Load",
    "btnExport": "Export",
    "btnImport": "Import",
  };
  for (const [id, text] of Object.entries(map)) {
    const b = $("#" + id); if (b) b.textContent = text;
  }
  const tabMap = {
    sheet: currentLang==="cs"?"Tabulka":"Sheet",
    gantt: "Gantt",
    calendar: currentLang==="cs"?"Kalendář":"Calendar",
    timeline: currentLang==="cs"?"Časová osa":"Timeline",
    kanban: "Kanban",
    network: currentLang==="cs"?"Síťový diagram":"Network"
  };
  $$(".view-tab").forEach(b => {
    if (tabMap[b.dataset.view]) b.textContent = tabMap[b.dataset.view];
  });
}

/* ===============================================================
   HANDLERS + KEYBOARD SHORTCUTS
   =============================================================== */
function bindHandlers() {
  $("#btnFile").addEventListener("click", openFileMenu);
  $("#btnProjectOptions").addEventListener("click", openProjectOptsDialog);
  $("#btnTheme").addEventListener("click", toggleTheme);
  $("#btnLang").addEventListener("click", toggleLanguage);
  $("#btnHelp").addEventListener("click", openHelpDialog);

  $("#btnNewTask").addEventListener("click", () => {
    const after = focusedTaskId;
    addTask({}, after);
    setTimeout(() => openTaskDialog(focusedTaskId), 50);
  });
  $("#btnDeleteTask").addEventListener("click", async () => {
    if (!selection.size) return;
    const ok = await confirmDialog(T("delete"), T("confirm_delete"));
    if (ok) deleteTasks(Array.from(selection));
  });
  $("#btnIndent").addEventListener("click", () => { if (selection.size) indentTasks(Array.from(selection)); });
  $("#btnOutdent").addEventListener("click", () => { if (selection.size) outdentTasks(Array.from(selection)); });
  $("#btnMoveUp").addEventListener("click", () => { if (focusedTaskId) moveTaskUp(focusedTaskId); });
  $("#btnMoveDown").addEventListener("click", () => { if (focusedTaskId) moveTaskDown(focusedTaskId); });
  $("#btnLinkTasks").addEventListener("click", () => linkSelectedTasks());
  $("#btnUnlinkTasks").addEventListener("click", () => unlinkSelectedTasks());
  $("#btnMilestone").addEventListener("click", () => { if (focusedTaskId) toggleMilestone(focusedTaskId); });
  $("#btnRecurring").addEventListener("click", openRecurringDialog);

  $("#btnUndo").addEventListener("click", undo);
  $("#btnRedo").addEventListener("click", redo);

  $("#btnFilter").addEventListener("click", openFilterDialog);
  $("#btnSort").addEventListener("click", openSortDialog);
  $("#btnGroup").addEventListener("click", openGroupDialog);
  $("#btnSearch").addEventListener("click", openSearchDialog);
  $("#btnShowCritical").addEventListener("click", () => {
    project.settings.showCritical = !project.settings.showCritical;
    $("#btnShowCritical").setAttribute("aria-pressed", project.settings.showCritical ? "true" : "false");
    renderView(); saveState();
  });
  $("#btnTaskPath").addEventListener("click", () => {
    if (taskPathHighlightId) {
      taskPathHighlightId = null;
      $("#btnTaskPath").setAttribute("aria-pressed", "false");
    } else if (focusedTaskId) {
      taskPathHighlightId = focusedTaskId;
      $("#btnTaskPath").setAttribute("aria-pressed", "true");
    }
    renderView();
  });

  $("#btnCalendars").addEventListener("click", openCalendarsDialog);
  $("#btnBaselines").addEventListener("click", openBaselinesDialog);
  $("#btnStatusDate").addEventListener("click", openStatusDateDialog);
  $("#btnValidate").addEventListener("click", openValidateDialog);

  $("#btnReports").addEventListener("click", openReportsDialog);
  $("#btnRisks").addEventListener("click", openRisksDialog);
  $("#btnMonteCarlo").addEventListener("click", openMonteCarloDialog);
  $("#btnCustomFields").addEventListener("click", openCustomFieldsDialog);

  $("#btnSave").addEventListener("click", saveProjectToFile);
  $("#btnLoad").addEventListener("click", loadProjectFromFile);
  $("#btnExport").addEventListener("click", openExportDialog);
  $("#btnImport").addEventListener("click", openImportDialog);
  $("#btnGitHub").addEventListener("click", openGitHubDialog);

  $$(".view-tab").forEach(btn => {
    btn.addEventListener("click", () => setCurrentView(btn.dataset.view));
  });

  $("#btnZoomIn").addEventListener("click", () => {
    project.settings.zoom = clamp((project.settings.zoom || 3) - 1, 0, 6);
    renderView(); saveState();
  });
  $("#btnZoomOut").addEventListener("click", () => {
    project.settings.zoom = clamp((project.settings.zoom || 3) + 1, 0, 6);
    renderView(); saveState();
  });
  $("#btnZoomFit").addEventListener("click", () => {
    project.settings.zoom = 3; renderView(); saveState();
  });

  $("#btnCloseInspector").addEventListener("click", () => {
    focusedTaskId = null;
    updateInspector();
  });

  // Global keyboard
  document.addEventListener("keydown", (ev) => {
    const inEditable = ev.target && (ev.target.tagName === "INPUT" || ev.target.tagName === "TEXTAREA" ||
      ev.target.tagName === "SELECT" || ev.target.isContentEditable);

    if (ev.key === "F1") { ev.preventDefault(); openHelpDialog(); return; }

    if (ev.ctrlKey || ev.metaKey) {
      if (ev.shiftKey && (ev.key === "F2")) { ev.preventDefault(); unlinkSelectedTasks(); return; }
      if (!ev.shiftKey) {
        switch (ev.key.toLowerCase()) {
          case "z": if (!inEditable) { ev.preventDefault(); undo(); } return;
          case "y": if (!inEditable) { ev.preventDefault(); redo(); } return;
          case "s": ev.preventDefault(); saveProjectToFile(); return;
          case "o": ev.preventDefault(); loadProjectFromFile(); return;
          case "f": if (!inEditable) { ev.preventDefault(); openSearchDialog(); } return;
        }
        if (ev.key === "F2") { ev.preventDefault(); linkSelectedTasks(); return; }
      }
      if (ev.shiftKey && ev.key.toLowerCase() === "z") { if (!inEditable) { ev.preventDefault(); redo(); } return; }
    }

    // Alt shortcuts — don't fire when typing
    if (ev.altKey && !inEditable) {
      if (ev.key >= "1" && ev.key <= "6") {
        const views = ["sheet","gantt","calendar","timeline","kanban","network"];
        ev.preventDefault();
        setCurrentView(views[parseInt(ev.key, 10) - 1]);
        return;
      }
    }
  });

  // Warn before unload if unsaved
  window.addEventListener("beforeunload", () => {
    saveState();
  });
}

/* ===============================================================
   APP INITIALIZATION
   =============================================================== */
function initApp() {
  // Load existing project or create new
  const saved = loadState();
  if (saved) {
    try {
      loadProjectData(saved);
    } catch(e) {
      console.error("Failed to load saved project", e);
      project = newProject();
      snapshot("initial");
    }
  } else {
    project = newProject();
    snapshot("initial");
  }

  // Restore UI preferences
  const theme = (project.settings && project.settings.theme) || "light";
  document.documentElement.setAttribute("data-theme", theme);
  $("#btnTheme").textContent = theme === "dark" ? "☀" : "☾";

  currentLang = (project.settings && project.settings.lang) || "cs";
  document.documentElement.setAttribute("lang", currentLang);
  $("#btnLang").textContent = currentLang === "cs" ? "EN" : "CS";
  rebuildStaticLabels();

  $("#btnShowCritical").setAttribute("aria-pressed",
    project.settings && project.settings.showCritical !== false ? "true" : "false");

  // Bind handlers
  bindHandlers();

  // Initial render
  schedule();
  recomputeWBS();
  setCurrentView((project.settings && project.settings.currentView) || "sheet");
  renderAll();

  // Welcome message for empty project
  if (!project.tasks.length) {
    announce(currentLang === "cs"
      ? "Projektor připraven. Prázdný projekt. Stiskněte Alt+N pro nový úkol nebo F1 pro nápovědu."
      : "Projektor ready. Empty project. Press Alt+N for new task or F1 for help.");
  } else {
    announce(currentLang === "cs"
      ? "Projekt načten: " + project.name + ", " + project.tasks.length + " úkolů"
      : "Project loaded: " + project.name + ", " + project.tasks.length + " tasks");
  }
}

// Boot
if (document.readyState === "loading") {
  document.addEventListener("DOMContentLoaded", initApp);
} else {
  initApp();
}

</script>
</body>
</html>
