<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Projektor — plánovač projektů</title>
<style>
/* ============================================================
   THEME TOKENS
   ============================================================ */
:root {
  --paper: #f5f1e8;
  --paper-2: #ece6d8;
  --paper-3: #e0d9c8;
  --ink: #132238;
  --ink-2: #334155;
  --ink-3: #64748b;
  --line: #c9c0aa;
  --line-2: #b8ae95;
  --accent: #8a3a2a;
  --accent-2: #b85a3a;
  --primary: #1e3a5f;
  --primary-2: #2d5080;
  --critical: #b91c1c;
  --critical-bg: #fee2e2;
  --baseline: #9a8f7a;
  --done: #4a6b48;
  --done-bg: #dce5d8;
  --warning: #a16207;
  --warning-bg: #fef3c7;
  --info: #1e5d85;
  --info-bg: #d6ebf5;
  --selection: #ffe9a0;
  --focus: #f59e0b;
  --shadow: 0 2px 8px rgba(19,34,56,0.08);
  --shadow-lg: 0 8px 24px rgba(19,34,56,0.15);
  --radius: 4px;
  --radius-lg: 8px;
  --serif: "IBM Plex Serif", "Source Serif Pro", Georgia, "Times New Roman", serif;
  --sans: "IBM Plex Sans", system-ui, -apple-system, "Segoe UI", sans-serif;
  --mono: "IBM Plex Mono", ui-monospace, "Cascadia Code", Consolas, monospace;
}

[data-theme="dark"] {
  --paper: #141820;
  --paper-2: #1e2430;
  --paper-3: #2a3140;
  --ink: #e8e6df;
  --ink-2: #c8c4b8;
  --ink-3: #8e8a7e;
  --line: #3a4150;
  --line-2: #505868;
  --accent: #d97757;
  --accent-2: #e68e70;
  --primary: #7aa7d8;
  --primary-2: #94bde5;
  --critical: #f87171;
  --critical-bg: #3a1a1a;
  --baseline: #706858;
  --done: #88ae85;
  --done-bg: #1e2a1d;
  --warning: #d4a54b;
  --warning-bg: #332a13;
  --info: #6aa8c8;
  --info-bg: #13262e;
  --selection: #594d20;
  --shadow: 0 2px 8px rgba(0,0,0,0.3);
  --shadow-lg: 0 8px 24px rgba(0,0,0,0.5);
}

/* ============================================================
   RESET + BASE
   ============================================================ */
* { box-sizing: border-box; }

html, body {
  margin: 0;
  padding: 0;
  background: var(--paper);
  color: var(--ink);
  font-family: var(--sans);
  font-size: 14px;
  line-height: 1.5;
  height: 100%;
  overflow: hidden;
}

button, input, select, textarea {
  font-family: inherit;
  font-size: inherit;
  color: inherit;
}

h1, h2, h3, h4, h5, h6 {
  font-family: var(--serif);
  font-weight: 600;
  margin: 0 0 0.5em 0;
  color: var(--ink);
}

h1 { font-size: 1.5rem; }
h2 { font-size: 1.25rem; }
h3 { font-size: 1.1rem; }

/* ============================================================
   ACCESSIBILITY
   ============================================================ */
.sr-only {
  position: absolute;
  width: 1px; height: 1px;
  padding: 0; margin: -1px;
  overflow: hidden;
  clip: rect(0,0,0,0);
  white-space: nowrap;
  border: 0;
}

.skip-link {
  position: absolute;
  top: -40px;
  left: 0;
  background: var(--ink);
  color: var(--paper);
  padding: 8px 16px;
  z-index: 9999;
  text-decoration: none;
}
.skip-link:focus { top: 0; }

*:focus-visible {
  outline: 3px solid var(--focus);
  outline-offset: 2px;
}

[aria-pressed="true"], [aria-selected="true"], [aria-current="true"] {
  background: var(--paper-3) !important;
  color: var(--ink) !important;
}

/* ============================================================
   LAYOUT
   ============================================================ */
#app {
  display: grid;
  grid-template-rows: auto auto 1fr auto;
  height: 100vh;
  overflow: hidden;
}

header.app-header {
  background: var(--ink);
  color: var(--paper);
  padding: 6px 12px;
  display: flex;
  align-items: center;
  gap: 12px;
  border-bottom: 1px solid var(--line);
}

header.app-header h1 {
  font-size: 1rem;
  margin: 0;
  color: var(--paper);
  font-family: var(--serif);
  font-weight: 600;
  letter-spacing: 0.02em;
}

header.app-header .project-name {
  font-size: 0.85rem;
  color: var(--paper-2);
  font-family: var(--sans);
  opacity: 0.85;
}

header.app-header .spacer { flex: 1; }

header.app-header button {
  background: transparent;
  color: var(--paper);
  border: 1px solid var(--line-2);
  padding: 4px 10px;
  cursor: pointer;
  border-radius: var(--radius);
  font-size: 0.85rem;
  transition: background 0.1s;
}
header.app-header button:hover { background: rgba(255,255,255,0.1); }

nav.toolbar {
  background: var(--paper-2);
  border-bottom: 1px solid var(--line);
  padding: 4px 8px;
  display: flex;
  gap: 4px;
  align-items: center;
  flex-wrap: wrap;
  overflow-x: auto;
}

.toolbar-group {
  display: flex;
  gap: 2px;
  padding: 0 6px;
  border-right: 1px solid var(--line);
  align-items: center;
}
.toolbar-group:last-child { border-right: none; }
.toolbar-group .label {
  font-size: 0.75rem;
  color: var(--ink-3);
  margin-right: 4px;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  font-weight: 500;
}

.toolbar button, .view-tab {
  background: var(--paper);
  color: var(--ink);
  border: 1px solid var(--line);
  padding: 4px 10px;
  cursor: pointer;
  border-radius: var(--radius);
  font-size: 0.82rem;
  transition: all 0.1s;
  white-space: nowrap;
}
.toolbar button:hover, .view-tab:hover {
  background: var(--paper-3);
  border-color: var(--line-2);
}
.toolbar button[aria-pressed="true"], .view-tab[aria-current="true"] {
  background: var(--ink) !important;
  color: var(--paper) !important;
  border-color: var(--ink);
}

main.workspace {
  position: relative;
  overflow: auto;
  background: var(--paper);
}

.view-container {
  width: 100%;
  height: 100%;
  overflow: auto;
  position: relative;
}

footer.statusbar {
  background: var(--paper-2);
  border-top: 1px solid var(--line);
  padding: 4px 12px;
  display: flex;
  gap: 16px;
  font-size: 0.78rem;
  color: var(--ink-2);
  align-items: center;
  min-height: 26px;
}
footer.statusbar .sep { opacity: 0.5; }
footer.statusbar .spacer { flex: 1; }

/* ============================================================
   TASK SHEET (primary for screen reader)
   ============================================================ */
.task-sheet {
  width: 100%;
  border-collapse: separate;
  border-spacing: 0;
  background: var(--paper);
  font-size: 0.85rem;
  font-variant-numeric: tabular-nums;
}

.task-sheet thead th {
  position: sticky;
  top: 0;
  background: var(--paper-2);
  border-bottom: 2px solid var(--ink);
  border-right: 1px solid var(--line);
  padding: 6px 8px;
  text-align: left;
  font-weight: 600;
  font-size: 0.78rem;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  color: var(--ink-2);
  z-index: 2;
  user-select: none;
  cursor: pointer;
}
.task-sheet thead th:hover { background: var(--paper-3); }
.task-sheet thead th[aria-sort="ascending"]::after {
  content: " \25B2";
  font-size: 0.7em;
}
.task-sheet thead th[aria-sort="descending"]::after {
  content: " \25BC";
  font-size: 0.7em;
}

.task-sheet tbody td {
  border-bottom: 1px solid var(--line);
  border-right: 1px solid var(--line);
  padding: 4px 8px;
  vertical-align: middle;
  line-height: 1.4;
}

.task-sheet tbody tr:hover td { background: var(--paper-2); }
.task-sheet tbody tr[aria-selected="true"] td {
  background: var(--selection) !important;
  color: var(--ink) !important;
}
.task-sheet tbody tr.summary td {
  font-weight: 600;
  background: var(--paper-2);
}
.task-sheet tbody tr.milestone td { font-style: italic; }
.task-sheet tbody tr.critical td { color: var(--critical); }
.task-sheet tbody tr.critical td.col-name { font-weight: 600; }
.task-sheet tbody tr.completed td.col-name {
  text-decoration: line-through;
  color: var(--ink-3);
}
.task-sheet tbody tr.manual td.col-id::before {
  content: "M";
  color: var(--accent);
  font-weight: 600;
  margin-right: 4px;
}

.task-sheet .col-id { width: 50px; text-align: right; color: var(--ink-3); }
.task-sheet .col-wbs { width: 80px; font-family: var(--mono); font-size: 0.78rem; }
.task-sheet .col-name { min-width: 250px; }
.task-sheet .col-duration { width: 90px; text-align: right; }
.task-sheet .col-date { width: 110px; }
.task-sheet .col-percent { width: 70px; text-align: right; }
.task-sheet .col-pred { width: 120px; }
.task-sheet .col-slack { width: 80px; text-align: right; }

.outline-indent {
  display: inline-block;
  width: 16px;
}
.outline-toggle {
  background: none;
  border: none;
  cursor: pointer;
  padding: 0;
  width: 16px;
  height: 16px;
  color: var(--ink-2);
  font-size: 0.75rem;
  line-height: 1;
  margin-right: 2px;
}
.outline-toggle:focus-visible {
  outline: 2px solid var(--focus);
}

.cell-editable {
  cursor: cell;
}
.cell-editable input, .cell-editable select, .cell-editable textarea {
  width: 100%;
  border: 2px solid var(--primary);
  background: var(--paper);
  padding: 2px 4px;
  border-radius: 2px;
}

.progress-bar {
  display: inline-block;
  width: 40px;
  height: 6px;
  background: var(--line);
  border-radius: 3px;
  margin-right: 4px;
  vertical-align: middle;
  overflow: hidden;
}
.progress-bar-fill {
  height: 100%;
  background: var(--done);
}

.task-icon {
  display: inline-block;
  width: 14px;
  margin-right: 4px;
  color: var(--ink-3);
  font-weight: normal;
  text-align: center;
}

/* ============================================================
   GANTT CHART
   ============================================================ */
.gantt-wrapper {
  display: grid;
  grid-template-columns: auto 1fr;
  height: 100%;
  overflow: hidden;
}

.gantt-sheet {
  overflow: auto;
  border-right: 2px solid var(--line-2);
  background: var(--paper);
  min-width: 300px;
  resize: horizontal;
  max-width: 60%;
}

.gantt-chart {
  overflow: auto;
  background: var(--paper);
  position: relative;
}

.gantt-timeline {
  position: sticky;
  top: 0;
  z-index: 3;
  background: var(--paper-2);
  border-bottom: 2px solid var(--ink);
  display: flex;
  flex-direction: column;
}

.gantt-timeline-row {
  display: flex;
  border-bottom: 1px solid var(--line);
  height: 22px;
  align-items: center;
}
.gantt-timeline-row:last-child { border-bottom: none; }

.gantt-timeline-cell {
  text-align: center;
  font-size: 0.72rem;
  border-right: 1px solid var(--line);
  padding: 0 2px;
  overflow: hidden;
  white-space: nowrap;
  color: var(--ink-2);
  flex-shrink: 0;
  line-height: 22px;
}
.gantt-timeline-cell.weekend { background: var(--paper-3); }
.gantt-timeline-cell.holiday { background: var(--critical-bg); }
.gantt-timeline-cell.today {
  background: var(--warning-bg);
  font-weight: 600;
  color: var(--ink);
}

.gantt-body {
  position: relative;
}

.gantt-row {
  position: relative;
  border-bottom: 1px solid var(--line);
  height: 26px;
  display: flex;
}
.gantt-row[aria-selected="true"] { background: var(--selection); }
.gantt-row.summary { background: var(--paper-2); }

.gantt-bg-cell {
  flex-shrink: 0;
  height: 100%;
  border-right: 1px solid rgba(150,140,120,0.15);
}
.gantt-bg-cell.weekend { background: rgba(150,140,120,0.1); }
.gantt-bg-cell.holiday { background: rgba(185,28,28,0.07); }
.gantt-bg-cell.today {
  background: rgba(245,158,11,0.15);
  border-left: 1px dashed var(--warning);
}

.gantt-bar {
  position: absolute;
  top: 5px;
  height: 14px;
  background: var(--primary);
  border: 1px solid var(--primary-2);
  border-radius: 2px;
  color: var(--paper);
  font-size: 0.72rem;
  padding: 0 4px;
  line-height: 14px;
  white-space: nowrap;
  overflow: hidden;
  cursor: pointer;
  box-shadow: var(--shadow);
}
.gantt-bar.critical { background: var(--critical); border-color: var(--critical); }
.gantt-bar.summary {
  top: 7px;
  height: 10px;
  background: var(--ink);
  border-radius: 0;
}
.gantt-bar.summary::before, .gantt-bar.summary::after {
  content: "";
  position: absolute;
  top: 100%;
  width: 0;
  height: 0;
  border-top: 5px solid var(--ink);
}
.gantt-bar.summary::before { left: 0; border-right: 5px solid transparent; }
.gantt-bar.summary::after { right: 0; border-left: 5px solid transparent; }

.gantt-bar.milestone {
  width: 14px !important;
  height: 14px;
  background: transparent;
  border: none;
  transform: rotate(45deg);
  background: var(--ink);
  padding: 0;
}

.gantt-bar-progress {
  position: absolute;
  top: 4px;
  left: 1px;
  height: 6px;
  background: rgba(0,0,0,0.4);
  border-radius: 1px;
}

.gantt-baseline-bar {
  position: absolute;
  top: 20px;
  height: 3px;
  background: var(--baseline);
  opacity: 0.7;
}

.gantt-deadline {
  position: absolute;
  top: 2px;
  width: 2px;
  height: 22px;
  background: var(--accent);
}
.gantt-deadline::before {
  content: "\25BC";
  position: absolute;
  top: -8px;
  left: -4px;
  color: var(--accent);
  font-size: 10px;
}

.gantt-link {
  position: absolute;
  pointer-events: none;
}
.gantt-link path {
  stroke: var(--ink-3);
  stroke-width: 1;
  fill: none;
}
.gantt-link.critical path { stroke: var(--critical); }

.gantt-progress-line {
  position: absolute;
  pointer-events: none;
}
.gantt-progress-line path {
  stroke: var(--warning);
  stroke-width: 1;
  stroke-dasharray: 2 2;
  fill: none;
}

/* ============================================================
   KANBAN
   ============================================================ */
.kanban-board {
  display: flex;
  gap: 12px;
  padding: 12px;
  min-height: 100%;
  overflow-x: auto;
}

.kanban-column {
  background: var(--paper-2);
  border: 1px solid var(--line);
  border-radius: var(--radius-lg);
  min-width: 280px;
  max-width: 320px;
  flex: 1;
  display: flex;
  flex-direction: column;
}

.kanban-column-header {
  padding: 10px 12px;
  border-bottom: 1px solid var(--line);
  font-weight: 600;
  font-size: 0.85rem;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.kanban-column-body {
  padding: 8px;
  flex: 1;
  overflow-y: auto;
  min-height: 200px;
}

.kanban-card {
  background: var(--paper);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  padding: 8px 10px;
  margin-bottom: 6px;
  cursor: grab;
  box-shadow: var(--shadow);
  transition: transform 0.1s;
}
.kanban-card:hover { transform: translateY(-1px); box-shadow: var(--shadow-lg); }
.kanban-card[aria-selected="true"] { outline: 2px solid var(--focus); }
.kanban-card.critical { border-left: 3px solid var(--critical); }
.kanban-card-title { font-weight: 500; margin-bottom: 4px; }
.kanban-card-meta {
  font-size: 0.75rem;
  color: var(--ink-3);
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}

/* ============================================================
   CALENDAR VIEW
   ============================================================ */
.calendar-view {
  padding: 12px;
}
.calendar-month {
  margin-bottom: 24px;
}
.calendar-month-header {
  font-family: var(--serif);
  font-size: 1.2rem;
  font-weight: 600;
  margin-bottom: 8px;
  padding-bottom: 4px;
  border-bottom: 1px solid var(--line);
}
.calendar-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 1px;
  background: var(--line);
  border: 1px solid var(--line);
}
.calendar-day-header {
  background: var(--paper-2);
  padding: 4px 6px;
  font-weight: 600;
  font-size: 0.78rem;
  text-align: center;
  text-transform: uppercase;
}
.calendar-day {
  background: var(--paper);
  min-height: 90px;
  padding: 4px;
  font-size: 0.78rem;
  display: flex;
  flex-direction: column;
}
.calendar-day.weekend { background: var(--paper-2); }
.calendar-day.holiday { background: var(--critical-bg); }
.calendar-day.today { background: var(--warning-bg); }
.calendar-day.outside { opacity: 0.4; }
.calendar-day-num {
  font-weight: 600;
  margin-bottom: 2px;
}
.calendar-task-chip {
  font-size: 0.72rem;
  background: var(--primary);
  color: var(--paper);
  padding: 1px 4px;
  border-radius: 2px;
  margin-bottom: 2px;
  cursor: pointer;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.calendar-task-chip.critical { background: var(--critical); }
.calendar-task-chip.milestone { background: var(--ink); }

/* ============================================================
   TIMELINE VIEW
   ============================================================ */
.timeline-view {
  padding: 24px;
  overflow: auto;
  height: 100%;
}
.timeline-track {
  position: relative;
  height: 180px;
  margin: 24px 0;
  border-top: 2px solid var(--ink);
  border-bottom: 2px solid var(--ink);
}
.timeline-marker {
  position: absolute;
  top: -10px;
  bottom: -10px;
  width: 2px;
  background: var(--primary);
}
.timeline-label {
  position: absolute;
  top: 10px;
  background: var(--paper);
  border: 1px solid var(--primary);
  padding: 2px 6px;
  border-radius: var(--radius);
  font-size: 0.78rem;
  white-space: nowrap;
}
.timeline-bar {
  position: absolute;
  height: 18px;
  background: var(--primary);
  color: var(--paper);
  padding: 0 6px;
  font-size: 0.75rem;
  line-height: 18px;
  border-radius: 2px;
  overflow: hidden;
  white-space: nowrap;
}
.timeline-bar.critical { background: var(--critical); }
.timeline-bar.milestone {
  width: 14px !important;
  background: var(--ink);
  transform: rotate(45deg);
}

/* ============================================================
   NETWORK DIAGRAM
   ============================================================ */
.network-view {
  overflow: auto;
  padding: 20px;
  height: 100%;
  background:
    linear-gradient(var(--line) 1px, transparent 1px),
    linear-gradient(90deg, var(--line) 1px, transparent 1px);
  background-size: 20px 20px;
  background-position: -1px -1px;
  opacity: 0.999;
}
.network-canvas {
  position: relative;
  min-width: 2000px;
  min-height: 1000px;
}
.network-node {
  position: absolute;
  width: 160px;
  background: var(--paper);
  border: 2px solid var(--primary);
  border-radius: var(--radius);
  padding: 6px 8px;
  font-size: 0.78rem;
  box-shadow: var(--shadow);
  cursor: pointer;
}
.network-node.critical { border-color: var(--critical); background: var(--critical-bg); }
.network-node.summary { border-color: var(--ink); background: var(--paper-3); font-weight: 600; }
.network-node.milestone { border-color: var(--ink); background: var(--ink); color: var(--paper); transform: rotate(45deg); width: 100px; height: 100px; display: flex; align-items: center; justify-content: center; }
.network-node.milestone > * { transform: rotate(-45deg); text-align: center; }
.network-node[aria-selected="true"] { outline: 3px solid var(--focus); }
.network-node-name { font-weight: 600; margin-bottom: 2px; }
.network-node-meta { font-size: 0.7rem; color: var(--ink-3); }
.network-svg {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none;
}
.network-svg path { stroke: var(--ink-3); stroke-width: 1.5; fill: none; }
.network-svg path.critical { stroke: var(--critical); stroke-width: 2; }

/* ============================================================
   DIALOG
   ============================================================ */
dialog {
  border: 1px solid var(--line);
  border-radius: var(--radius-lg);
  background: var(--paper);
  color: var(--ink);
  padding: 0;
  max-width: 90vw;
  max-height: 90vh;
  box-shadow: var(--shadow-lg);
}
dialog::backdrop {
  background: rgba(19,34,56,0.5);
}
[data-theme="dark"] dialog::backdrop {
  background: rgba(0,0,0,0.7);
}

.dialog-header {
  background: var(--ink);
  color: var(--paper);
  padding: 10px 16px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-top-left-radius: var(--radius-lg);
  border-top-right-radius: var(--radius-lg);
}
.dialog-header h2 {
  color: var(--paper);
  margin: 0;
  font-size: 1.05rem;
}
.dialog-header button {
  background: transparent;
  color: var(--paper);
  border: 1px solid var(--line-2);
  padding: 2px 10px;
  cursor: pointer;
  border-radius: var(--radius);
}

.dialog-body {
  padding: 16px;
  overflow-y: auto;
  max-height: 70vh;
  min-width: 400px;
}

.dialog-footer {
  padding: 10px 16px;
  border-top: 1px solid var(--line);
  display: flex;
  gap: 8px;
  justify-content: flex-end;
  background: var(--paper-2);
  border-bottom-left-radius: var(--radius-lg);
  border-bottom-right-radius: var(--radius-lg);
}

.dialog-tabs {
  display: flex;
  border-bottom: 1px solid var(--line);
  background: var(--paper-2);
  padding: 0 8px;
}
.dialog-tab {
  background: transparent;
  border: 1px solid transparent;
  border-bottom: none;
  padding: 6px 14px;
  cursor: pointer;
  border-radius: var(--radius) var(--radius) 0 0;
  margin-right: 2px;
  margin-bottom: -1px;
  font-size: 0.85rem;
}
.dialog-tab[aria-selected="true"] {
  background: var(--paper);
  border-color: var(--line);
}
.dialog-tab-panel { padding-top: 12px; }
.dialog-tab-panel[hidden] { display: none; }

/* ============================================================
   FORM CONTROLS
   ============================================================ */
.form-row {
  display: grid;
  grid-template-columns: 140px 1fr;
  gap: 12px;
  align-items: center;
  margin-bottom: 8px;
}
.form-row label { font-weight: 500; }
.form-row.full {
  grid-template-columns: 1fr;
}
.form-row.full label { margin-bottom: 4px; }

.form-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 8px 16px;
  margin-bottom: 8px;
}

input[type="text"], input[type="number"], input[type="date"],
input[type="datetime-local"], select, textarea {
  background: var(--paper);
  color: var(--ink);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  padding: 4px 6px;
  font-size: 0.88rem;
  width: 100%;
}
input:focus, select:focus, textarea:focus {
  border-color: var(--primary);
  outline: 2px solid var(--focus);
  outline-offset: 0;
}

textarea { min-height: 80px; font-family: var(--sans); resize: vertical; }

fieldset {
  border: 1px solid var(--line);
  border-radius: var(--radius);
  padding: 8px 12px;
  margin: 8px 0;
}
fieldset legend {
  padding: 0 6px;
  font-weight: 500;
  font-size: 0.85rem;
}

.btn {
  background: var(--paper);
  color: var(--ink);
  border: 1px solid var(--line-2);
  padding: 5px 14px;
  cursor: pointer;
  border-radius: var(--radius);
  font-size: 0.88rem;
}
.btn:hover { background: var(--paper-2); }
.btn.primary {
  background: var(--primary);
  color: var(--paper);
  border-color: var(--primary);
}
.btn.primary:hover { background: var(--primary-2); }
.btn.danger {
  background: var(--critical);
  color: var(--paper);
  border-color: var(--critical);
}
.btn:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}

.data-table {
  width: 100%;
  border-collapse: collapse;
}
.data-table th {
  text-align: left;
  padding: 6px 8px;
  background: var(--paper-2);
  border-bottom: 2px solid var(--line);
  font-size: 0.78rem;
  text-transform: uppercase;
}
.data-table td {
  padding: 4px 8px;
  border-bottom: 1px solid var(--line);
}
.data-table tr:hover { background: var(--paper-2); }

/* ============================================================
   TASK INSPECTOR PANEL
   ============================================================ */
.inspector-panel {
  position: fixed;
  top: 0; right: 0;
  bottom: 0;
  width: 380px;
  background: var(--paper-2);
  border-left: 2px solid var(--ink);
  box-shadow: var(--shadow-lg);
  z-index: 100;
  overflow-y: auto;
  padding: 0;
  transform: translateX(100%);
  transition: transform 0.2s;
  display: flex;
  flex-direction: column;
}
.inspector-panel.open { transform: translateX(0); }

.inspector-header {
  background: var(--ink);
  color: var(--paper);
  padding: 10px 14px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.inspector-header h2 { margin: 0; color: var(--paper); font-size: 1rem; }
.inspector-body {
  padding: 12px 14px;
  flex: 1;
  overflow-y: auto;
}

.inspector-section {
  margin-bottom: 16px;
  padding-bottom: 12px;
  border-bottom: 1px solid var(--line);
}
.inspector-section:last-child { border-bottom: none; }
.inspector-section h3 {
  font-size: 0.78rem;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  margin-bottom: 8px;
  color: var(--ink-2);
}
.inspector-factor {
  padding: 6px 8px;
  background: var(--paper);
  border-left: 3px solid var(--primary);
  margin-bottom: 4px;
  font-size: 0.85rem;
}
.inspector-factor.warn { border-left-color: var(--warning); }
.inspector-factor.err { border-left-color: var(--critical); }

/* ============================================================
   UTILITIES
   ============================================================ */
.chip {
  display: inline-block;
  background: var(--paper-3);
  color: var(--ink);
  padding: 1px 8px;
  border-radius: 10px;
  font-size: 0.72rem;
  margin-right: 4px;
}
.chip.critical { background: var(--critical-bg); color: var(--critical); }
.chip.done { background: var(--done-bg); color: var(--done); }
.chip.warn { background: var(--warning-bg); color: var(--warning); }
.chip.info { background: var(--info-bg); color: var(--info); }

.toast {
  position: fixed;
  bottom: 40px;
  right: 20px;
  background: var(--ink);
  color: var(--paper);
  padding: 10px 16px;
  border-radius: var(--radius);
  box-shadow: var(--shadow-lg);
  z-index: 200;
  max-width: 400px;
  font-size: 0.88rem;
}
.toast.err { background: var(--critical); }
.toast.warn { background: var(--warning); color: var(--ink); }
.toast.ok { background: var(--done); }

.hidden { display: none !important; }

.muted { color: var(--ink-3); }

.kbd {
  display: inline-block;
  font-family: var(--mono);
  font-size: 0.78em;
  background: var(--paper);
  border: 1px solid var(--line-2);
  border-bottom-width: 2px;
  border-radius: 3px;
  padding: 0 5px;
  color: var(--ink-2);
}

details.collapsible {
  border: 1px solid var(--line);
  border-radius: var(--radius);
  margin-bottom: 8px;
}
details.collapsible summary {
  background: var(--paper-2);
  padding: 6px 10px;
  cursor: pointer;
  font-weight: 500;
  user-select: none;
}
details.collapsible[open] summary { border-bottom: 1px solid var(--line); }
details.collapsible > *:not(summary) { padding: 8px 10px; }

/* ============================================================
   PRINT
   ============================================================ */
@media print {
  header.app-header, nav.toolbar, footer.statusbar, .inspector-panel { display: none !important; }
  #app { height: auto; display: block; overflow: visible; }
  main.workspace { overflow: visible; }
  body { background: white; color: black; }
  .task-sheet thead th { background: #eee; }
}

/* ============================================================
   SCROLLBAR (subtle)
   ============================================================ */
::-webkit-scrollbar { width: 10px; height: 10px; }
::-webkit-scrollbar-track { background: var(--paper-2); }
::-webkit-scrollbar-thumb { background: var(--line-2); border-radius: 5px; }
::-webkit-scrollbar-thumb:hover { background: var(--ink-3); }
</style>
</head>

let currentLang = "cs";
function T(key) {
  const parts = key.split(".");
  let obj = I18N[currentLang];
  for (const p of parts) {
    if (obj && typeof obj === "object") obj = obj[p];
    else return key;
  }
  return obj != null ? obj : key;

const $ = (sel, root) => (root || document).querySelector(sel);
const $$ = (sel, root) => Array.from((root || document).querySelectorAll(sel));

function el(tag, attrs, ...children) {
  const node = document.createElement(tag);
  if (attrs) {
    for (const [k, v] of Object.entries(attrs)) {
      if (v == null || v === false) continue;
      if (k === "class") node.className = v;
      else if (k === "style" && typeof v === "object") Object.assign(node.style, v);
      else if (k === "dataset") Object.assign(node.dataset, v);
      else if (k.startsWith("on") && typeof v === "function") {
        node.addEventListener(k.slice(2).toLowerCase(), v);
      } else if (k === "html") node.innerHTML = v;
      else if (k in node && typeof node[k] !== "function") {
        try { node[k] = v; } catch(e) { node.setAttribute(k, v); }
      } else node.setAttribute(k, v);
    }
  }
  for (const child of children.flat()) {
    if (child == null || child === false) continue;
    if (typeof child === "string" || typeof child === "number") {
      node.appendChild(document.createTextNode(String(child)));
    } else {
      node.appendChild(child);
    }
  }
  return node;
}

function uid() {
  return "id_" + Math.random().toString(36).slice(2, 10) + Date.now().toString(36).slice(-4);
}

function clamp(n, min, max) { return Math.max(min, Math.min(max, n)); }

function pad2(n) { return String(n).padStart(2, "0"); }

function formatDate(d) {
  if (!d) return "";
  const dt = (d instanceof Date) ? d : new Date(d);
  if (isNaN(dt.getTime())) return "";
  return `${dt.getFullYear()}-${pad2(dt.getMonth()+1)}-${pad2(dt.getDate())}`;
}

function formatDateLocale(d) {
  if (!d) return "";
  const dt = (d instanceof Date) ? d : new Date(d);
  if (isNaN(dt.getTime())) return "";
  if (currentLang === "cs") {
    return `${dt.getDate()}. ${dt.getMonth()+1}. ${dt.getFullYear()}`;
  }
  return dt.toLocaleDateString("en-US");
}

function parseDate(s) {
  if (!s) return null;
  if (s instanceof Date) return new Date(s.getTime());
  const d = new Date(s);
  return isNaN(d.getTime()) ? null : d;
}

function addDays(d, days) {
  const r = new Date(d);
  r.setDate(r.getDate() + days);
  return r;
}

function diffDays(a, b) {
  const msPerDay = 86400000;
  return Math.round((b.getTime() - a.getTime()) / msPerDay);
}

function startOfDay(d) {
  const r = new Date(d);
  r.setHours(0,0,0,0);
  return r;
}

function endOfDay(d) {
  const r = new Date(d);
  r.setHours(23,59,59,999);
  return r;
}

function sameDay(a, b) {
  return a.getFullYear() === b.getFullYear()
      && a.getMonth()    === b.getMonth()
      && a.getDate()     === b.getDate();
}

function debounce(fn, ms) {
  let t;
  return function(...args) {
    clearTimeout(t);
    t = setTimeout(() => fn.apply(this, args), ms);
  };
}

function escapeHtml(s) {
  if (s == null) return "";
  return String(s)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#039;");
}

function announce(msg, assertive) {
  const region = assertive ? $("#liveRegionAssertive") : $("#liveRegion");
  region.textContent = "";
  setTimeout(() => { region.textContent = msg; }, 50);
}

function toast(msg, kind) {
  const existing = $(".toast");
  if (existing) existing.remove();
  const t = el("div", { class: "toast" + (kind ? " " + kind : ""), role: "status" }, msg);
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 3500);
  announce(msg, kind === "err");
}

/* ===============================================================
   AUDIO FEEDBACK (Web Audio API)
   =============================================================== */
let audioCtx = null;
function getAudioCtx() {
  if (!audioCtx) {
    try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
    catch(e) { return null; }
  }
  return audioCtx;
}

function tone(freq, durMs, type, vol) {
  if (!project || !project.soundEnabled) return;
  const ctx = getAudioCtx();
  if (!ctx) return;
  const osc = ctx.createOscillator();
  const g = ctx.createGain();
  osc.type = type || "sine";
  osc.frequency.value = freq;
  g.gain.value = vol != null ? vol : 0.1;
  osc.connect(g);
  g.connect(ctx.destination);
  osc.start();
  g.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + (durMs/1000));
  osc.stop(ctx.currentTime + (durMs/1000));
}

function sfx(kind) {
  switch (kind) {
    case "ok":     tone(880, 140, "sine", 0.08); break;
    case "save":   tone(660, 80, "sine"); setTimeout(()=>tone(880, 100, "sine"), 80); break;
    case "load":   tone(880, 80, "sine"); setTimeout(()=>tone(660, 100, "sine"), 80); break;
    case "error":  tone(220, 200, "square", 0.08); break;
    case "warn":   tone(440, 140, "triangle"); break;
    case "delete": tone(330, 90, "triangle", 0.07); break;
    case "create": tone(550, 60, "sine"); setTimeout(()=>tone(770, 80, "sine"), 40); break;
  }
}

/* Global state */
let project = null;
let selection = new Set(); // selected task IDs
let clipboard = null;
let focusedTaskId = null;
let taskPathHighlightId = null; // when "task path" mode is on

/* ===============================================================
   CALENDAR ENGINE
   =============================================================== */

function getCalendar(calendarId) {
  if (!calendarId) calendarId = project.projectCalendarId;
  return project.calendars.find(c => c.id === calendarId) || project.calendars[0];
}

function getTaskCalendar(task) {
  return getCalendar(task.calendarId || project.projectCalendarId);
}

function isWorkingDay(date, cal) {
  cal = cal || getCalendar();
  const dow = date.getDay();
  if (!cal.workdays.includes(dow)) return false;
  const dStr = formatDate(date);
  if (cal.holidays && cal.holidays.includes(dStr)) return false;
  return true;
}

function nextWorkingDay(date, cal, inclusive) {
  const d = startOfDay(date);
  if (inclusive && isWorkingDay(d, cal)) return d;
  d.setDate(d.getDate() + (inclusive ? 0 : 1));
  while (!isWorkingDay(d, cal)) {
    d.setDate(d.getDate() + 1);
  }
  return d;
}

function prevWorkingDay(date, cal, inclusive) {
  const d = startOfDay(date);
  if (inclusive && isWorkingDay(d, cal)) return d;
  d.setDate(d.getDate() - (inclusive ? 0 : 1));
  while (!isWorkingDay(d, cal)) {
    d.setDate(d.getDate() - 1);
  }
  return d;
}

/** Add N working days to date. Returns date that is N working days later.
 *  If addDays=0, returns date itself (snapped to working day forward if not working). */
function addWorkingDays(date, workDays, cal) {
  cal = cal || getCalendar();
  let d = startOfDay(date);
  if (workDays === 0) return d;
  if (workDays > 0) {
    let remaining = workDays;
    while (remaining > 0) {
      d.setDate(d.getDate() + 1);
      if (isWorkingDay(d, cal)) remaining--;
    }
  } else {
    let remaining = -workDays;
    while (remaining > 0) {
      d.setDate(d.getDate() - 1);
      if (isWorkingDay(d, cal)) remaining--;
    }
  }
  return d;
}

/** Working days from `from` (inclusive) to `to` (inclusive). */
function countWorkingDays(from, to, cal) {
  cal = cal || getCalendar();
  let n = 0;
  let d = startOfDay(from);
  const e = startOfDay(to);
  if (d > e) {
    // swap
    const tmp = d; d = e; return -countWorkingDays(e, tmp, cal);
  }
  while (d <= e) {
    if (isWorkingDay(d, cal)) n++;
    d.setDate(d.getDate() + 1);
  }
  return n;
}

/** Given start date and duration (in working days), compute finish date.
 *  Finish date is inclusive last working day. If duration=0 (milestone), finish = start.
 *  If elapsed (unit="ed"), use calendar days. */
function computeFinish(startDate, duration, unit, cal) {
  cal = cal || getCalendar();
  const start = startOfDay(startDate);
  const durDays = durationToDays(duration, unit, cal);
  if (unit === "ed") {
    // elapsed — finish = start + (durDays-1) calendar days
    if (durDays <= 0) return start;
    return addDays(start, Math.ceil(durDays) - 1);
  }
  if (durDays <= 0) return start;
  // find (durDays-1) additional working days after start (which must be working)
  let s = isWorkingDay(start, cal) ? start : nextWorkingDay(start, cal, false);
  let remaining = Math.ceil(durDays) - 1;
  let d = new Date(s);
  while (remaining > 0) {
    d.setDate(d.getDate() + 1);
    if (isWorkingDay(d, cal)) remaining--;
  }
  return d;
}

function durationToDays(duration, unit, cal) {
  cal = cal || getCalendar();
  const hpd = cal.workHoursPerDay || 8;
  switch (unit || "d") {
    case "d":  return duration;
    case "h":  return duration / hpd;
    case "w":  return duration * cal.workdays.length;
    case "mo": return duration * 20; // approx
    case "ed": return duration;
    default:   return duration;
  }
}

function formatDuration(duration, unit) {
  const u = unit || "d";
  let label = "";
  switch (u) {
    case "h":  label = currentLang === "cs" ? "h" : "h"; break;
    case "w":  label = currentLang === "cs" ? "t" : "w"; break;
    case "mo": label = currentLang === "cs" ? "m" : "m"; break;
    case "ed": label = currentLang === "cs" ? "ed" : "ed"; break;
    default:   label = currentLang === "cs" ? "d" : "d"; break;
  }
  return `${Math.round(duration * 100) / 100} ${label}`;
}

function parseDurationString(s) {
  if (s == null || s === "") return { duration: 1, unit: "d" };
  const str = String(s).trim().toLowerCase();
  const m = str.match(/^([0-9]+(?:[.,][0-9]+)?)\s*(h|hod|hours?|d|den|dny|dn[ií]|days?|w|t|tyd|týdn[yuůí]|weeks?|mo|mes|měs|months?|ed|e)?$/);
  if (!m) return { duration: parseFloat(str) || 1, unit: "d" };
  const num = parseFloat(m[1].replace(",", "."));
  const u = (m[2] || "d").toLowerCase();
  let unit = "d";
  if (/^h|hod|hour/.test(u)) unit = "h";
  else if (/^w|t|tyd|týd|week/.test(u)) unit = "w";
  else if (/^mo|mes|měs|month/.test(u)) unit = "mo";
  else if (/^ed|e/.test(u)) unit = "ed";
  else unit = "d";
  return { duration: num, unit };
}

/* ===============================================================
   TASK TREE HELPERS
   =============================================================== */

function getTaskById(id) {
  return project.tasks.find(t => t.id === id);
}

function getChildren(parentId) {
  return project.tasks.filter(t => t.parentId === parentId);
}

function getAllDescendants(id) {
  const result = [];
  const stack = [id];
  while (stack.length) {
    const pid = stack.pop();
    for (const t of project.tasks) {
      if (t.parentId === pid) {
        result.push(t);
        stack.push(t.id);
      }
    }
  }
  return result;
}

function getAncestors(id) {
  const result = [];
  let t = getTaskById(id);
  while (t && t.parentId) {
    const p = getTaskById(t.parentId);
    if (!p) break;
    result.push(p);
    t = p;
  }
  return result;
}

function isSummary(task) {
  if (!task) return false;
  return project.tasks.some(t => t.parentId === task.id);
}

function getTaskIndex(id) {
  return project.tasks.findIndex(t => t.id === id);
}

/** Compute WBS codes based on order within parents. */
function recomputeWBS() {
  const counters = {};
  counters["__root__"] = 0;
  // Traverse tasks in order; maintain WBS numbering per parent.
  const wbsByTask = {};
  const parentStack = {};

  // iterate; for each task compute index within its siblings up to this point
  // Simpler: compute by walking tree in display order.
  // Use getDisplayOrder + indexing per parent.
  const seenCounts = {};
  for (const t of project.tasks) {
    const pKey = t.parentId || "__root__";
    seenCounts[pKey] = (seenCounts[pKey] || 0) + 1;
    const parentWbs = t.parentId ? wbsByTask[t.parentId] : "";
    const code = seenCounts[pKey];
    wbsByTask[t.id] = parentWbs ? `${parentWbs}.${code}` : String(code);
    t.wbs = wbsByTask[t.id];
  }
}

function getDisplayOrder() {
  // project.tasks is already in display order (we maintain invariant)
  return project.tasks.slice();
}

/* Return true if task `maybeAncestor` is an ancestor of `descendantId`. */
function isAncestorOf(ancestorId, descendantId) {
  let t = getTaskById(descendantId);
  while (t && t.parentId) {
    if (t.parentId === ancestorId) return true;
    t = getTaskById(t.parentId);
  }
  return false;
}

/* ===============================================================
   LINKS (dependencies)
   =============================================================== */
function getPredecessors(taskId) {
  return project.links.filter(l => l.succId === taskId);
}
function getSuccessors(taskId) {
  return project.links.filter(l => l.predId === taskId);
}

function addLink(predId, succId, type, lag) {
  type = type || "FS";
  lag = lag || 0;
  if (predId === succId) return false;
  if (isAncestorOf(predId, succId) || isAncestorOf(succId, predId)) return false;
  // prevent cycles
  if (wouldCreateCycle(predId, succId)) return false;
  // remove existing link of same pair
  const existingIdx = project.links.findIndex(l => l.predId === predId && l.succId === succId);
  if (existingIdx >= 0) {
    project.links[existingIdx].type = type;
    project.links[existingIdx].lag = lag;
    return true;
  }
  project.links.push({ predId, succId, type, lag });
  return true;
}

function removeLink(predId, succId) {
  const idx = project.links.findIndex(l => l.predId === predId && l.succId === succId);
  if (idx >= 0) project.links.splice(idx, 1);
}

function wouldCreateCycle(predId, succId) {
  // Follow successors of succId; if we reach predId, cycle.
  const stack = [succId];
  const visited = new Set();
  while (stack.length) {
    const id = stack.pop();
    if (id === predId) return true;
    if (visited.has(id)) continue;
    visited.add(id);
    for (const l of project.links) {
      if (l.predId === id) stack.push(l.succId);
    }
  }
  return false;
}

function predecessorsAsString(taskId) {
  const preds = getPredecessors(taskId);
  if (!preds.length) return "";
  return preds.map(p => {
    const pred = getTaskById(p.predId);
    if (!pred) return "?";
    const idx = getTaskIndex(p.predId) + 1;
    let s = String(idx);
    if (p.type && p.type !== "FS") s += p.type;
    if (p.lag) {
      s += (p.lag > 0 ? "+" : "") + p.lag + "d";
    }
    return s;
  }).join(",");
}

function parsePredecessorsString(str, currentTaskId) {
  if (!str || !str.trim()) return [];
  const parts = str.split(/[,;]/).map(s => s.trim()).filter(Boolean);
  const result = [];
  for (const part of parts) {
    const m = part.match(/^(\d+)(FS|SS|FF|SF)?([+\-]\d+(?:[.,]\d+)?)?(d|h)?$/i);
    if (!m) continue;
    const idx = parseInt(m[1], 10) - 1;
    if (idx < 0 || idx >= project.tasks.length) continue;
    const predTask = project.tasks[idx];
    if (!predTask || predTask.id === currentTaskId) continue;
    const type = (m[2] || "FS").toUpperCase();
    const lagStr = (m[3] || "0").replace(",", ".");
    const lag = parseFloat(lagStr) || 0;
    result.push({ predId: predTask.id, type, lag });
  }
  return result;
}

/* ===============================================================
   SCHEDULING ENGINE
   Forward pass: compute Early Start/Finish from dependencies+constraints.
   Backward pass: compute Late Start/Finish from project end date.
   Critical path: slack == 0.
   =============================================================== */

// Topological sort of tasks based on links
function topoSort() {
  const order = [];
  const visited = new Set();
  const temp = new Set();
  const byId = {};
  for (const t of project.tasks) byId[t.id] = t;

  function visit(id) {
    if (visited.has(id)) return;
    if (temp.has(id)) return; // cycle — ignore
    temp.add(id);
    // visit predecessors first
    for (const l of project.links) {
      if (l.succId === id) visit(l.predId);
    }
    temp.delete(id);
    visited.add(id);
    order.push(id);
  }

  for (const t of project.tasks) visit(t.id);
  return order;
}

/** Core scheduler — recomputes start/finish, slack, critical flag. */
function schedule() {
  if (!project.tasks.length) {
    project.currentEndDate = project.startDate;
    return;
  }

  // Reset computed fields for auto-scheduled tasks (leaves)
  const projStart = startOfDay(parseDate(project.startDate) || new Date());

  // First: clear computed dates for auto tasks
  for (const t of project.tasks) {
    t._earlyStart = null;
    t._earlyFinish = null;
    t._lateStart = null;
    t._lateFinish = null;
    t._totalSlack = 0;
    t._freeSlack = 0;
    t._critical = false;
  }

  // Process in topological order, but only leaf (non-summary) tasks drive scheduling
  const topo = topoSort();
  const byId = {};
  for (const t of project.tasks) byId[t.id] = t;

  // Forward pass — compute early start/finish for LEAF tasks
  for (const id of topo) {
    const t = byId[id];
    if (!t) continue;
    if (isSummary(t)) continue;
    computeEarlyForTask(t, projStart);
  }

  // Rollup summary tasks
  rollupSummaries();

  // Backward pass — compute late start/finish
  // Project finish = max(_earlyFinish) of leaves
  let projFinish = projStart;
  for (const t of project.tasks) {
    if (!isSummary(t) && t._earlyFinish && t._earlyFinish > projFinish) {
      projFinish = new Date(t._earlyFinish);
    }
  }
  project.currentEndDate = formatDate(projFinish);

  // For each task in reverse topo, compute late dates
  for (let i = topo.length - 1; i >= 0; i--) {
    const t = byId[topo[i]];
    if (!t || isSummary(t)) continue;
    computeLateForTask(t, projFinish);
  }

  // Slack + critical
  for (const t of project.tasks) {
    if (isSummary(t)) continue;
    if (!t._earlyStart || !t._lateStart) continue;
    const cal = getTaskCalendar(t);
    t._totalSlack = countWorkingDays(t._earlyStart, t._lateStart, cal) - 1;
    if (t._totalSlack < 0) t._totalSlack = 0;
    t._critical = t._totalSlack === 0;
    t.start = formatDate(t._earlyStart);
    t.finish = formatDate(t._earlyFinish);
  }

  // Compute free slack for leaves
  for (const t of project.tasks) {
    if (isSummary(t)) continue;
    const succs = getSuccessors(t.id);
    if (!succs.length) {
      t._freeSlack = t._totalSlack;
      continue;
    }
    let minStart = null;
    for (const l of succs) {
      const s = byId[l.succId];
      if (!s || !s._earlyStart) continue;
      if (minStart == null || s._earlyStart < minStart) minStart = s._earlyStart;
    }
    if (minStart && t._earlyFinish) {
      const cal = getTaskCalendar(t);
      const fs = countWorkingDays(t._earlyFinish, minStart, cal) - 1;
      t._freeSlack = Math.max(0, fs);
    }
  }

  // Rollup summary critical flag: summary is critical if any leaf child is critical
  for (const t of project.tasks) {
    if (!isSummary(t)) continue;
    const descs = getAllDescendants(t.id);
    t._critical = descs.some(d => !isSummary(d) && d._critical);
  }
}

function computeEarlyForTask(t, projStart) {
  const cal = getTaskCalendar(t);
  const preds = getPredecessors(t.id);

  if (t.manual) {
    // Manual task — use whatever start/finish user provided, OR compute finish from start+duration
    const s = parseDate(t.start) || projStart;
    t._earlyStart = startOfDay(s);
    if (t.isMilestone || t.duration === 0) {
      t._earlyFinish = new Date(t._earlyStart);
    } else {
      const f = t.finish ? parseDate(t.finish) : computeFinish(t._earlyStart, t.duration, t.durationUnit, cal);
      t._earlyFinish = startOfDay(f);
    }
    return;
  }

  let earliest = projStart;

  // Respect actual start if set
  if (t.actualStart) {
    const as = parseDate(t.actualStart);
    if (as) earliest = startOfDay(as);
  }

  for (const l of preds) {
    const pred = getTaskById(l.predId);
    if (!pred || !pred._earlyFinish) continue;
    let derived;
    const predCal = getTaskCalendar(pred);
    switch (l.type) {
      case "FS":
        derived = addWorkingDays(pred._earlyFinish, 1 + (l.lag || 0), cal);
        break;
      case "SS":
        derived = addWorkingDays(pred._earlyStart, l.lag || 0, cal);
        break;
      case "FF":
        // Finish-to-finish: succ finish = pred finish + lag → compute succ start backwards
        {
          const sf = addWorkingDays(pred._earlyFinish, l.lag || 0, cal);
          const durDays = durationToDays(t.duration, t.durationUnit, cal);
          derived = addWorkingDays(sf, -(Math.ceil(durDays) - 1), cal);
        }
        break;
      case "SF":
        // Start-to-finish: succ finish = pred start + lag; compute succ start backwards
        {
          const sf = addWorkingDays(pred._earlyStart, l.lag || 0, cal);
          const durDays = durationToDays(t.duration, t.durationUnit, cal);
          derived = addWorkingDays(sf, -(Math.ceil(durDays) - 1), cal);
        }
        break;
      default:
        derived = addWorkingDays(pred._earlyFinish, 1 + (l.lag || 0), cal);
    }
    if (derived > earliest) earliest = derived;
  }

  // Snap to working day
  if (!isWorkingDay(earliest, cal)) earliest = nextWorkingDay(earliest, cal, false);

  // Apply constraints
  earliest = applyConstraint(t, earliest, cal);

  t._earlyStart = earliest;
  if (t.isMilestone || t.duration === 0) {
    t._earlyFinish = new Date(earliest);
  } else {
    t._earlyFinish = computeFinish(earliest, t.duration, t.durationUnit, cal);
  }
}

function applyConstraint(t, earliest, cal) {
  if (!t.constraint || t.constraint === "asap") return earliest;
  const cd = t.constraintDate ? startOfDay(parseDate(t.constraintDate)) : null;
  switch (t.constraint) {
    case "sneт": // Start no earlier than
      if (cd && cd > earliest) return nextWorkingDay(cd, cal, true);
      return earliest;
    case "snlt": // Start no later than
      // Doesn't restrict "earliest" forward; only validates later
      return earliest;
    case "fnet": // Finish no earlier than
      // Push start so finish >= cd
      if (cd) {
        const durDays = durationToDays(t.duration, t.durationUnit, cal);
        const minStart = addWorkingDays(cd, -(Math.ceil(durDays)-1), cal);
        if (minStart > earliest) return nextWorkingDay(minStart, cal, true);
      }
      return earliest;
    case "fnlt":
      return earliest; // validated later
    case "mso":
      if (cd) return nextWorkingDay(cd, cal, true);
      return earliest;
    case "mfo":
      if (cd) {
        const durDays = durationToDays(t.duration, t.durationUnit, cal);
        const startForFinish = addWorkingDays(cd, -(Math.ceil(durDays)-1), cal);
        return nextWorkingDay(startForFinish, cal, true);
      }
      return earliest;
    case "alap":
      // ALAP handled in backward pass; for forward use earliest
      return earliest;
    default:
      return earliest;
  }
}

function computeLateForTask(t, projFinish) {
  const cal = getTaskCalendar(t);
  const succs = getSuccessors(t.id);

  if (t.manual) {
    t._lateStart = t._earlyStart;
    t._lateFinish = t._earlyFinish;
    return;
  }

  let latestFinish = projFinish;

  if (succs.length) {
    for (const l of succs) {
      const succ = getTaskById(l.succId);
      if (!succ || !succ._lateStart) continue;
      let derived;
      switch (l.type) {
        case "FS":
          derived = addWorkingDays(succ._lateStart, -1 - (l.lag || 0), cal);
          break;
        case "SS":
          {
            const ls = addWorkingDays(succ._lateStart, -(l.lag || 0), cal);
            const durDays = durationToDays(t.duration, t.durationUnit, cal);
            derived = addWorkingDays(ls, Math.ceil(durDays)-1, cal);
          }
          break;
        case "FF":
          derived = addWorkingDays(succ._lateFinish, -(l.lag || 0), cal);
          break;
        case "SF":
          {
            const ls = addWorkingDays(succ._lateFinish, -(l.lag || 0), cal);
            const durDays = durationToDays(t.duration, t.durationUnit, cal);
            derived = addWorkingDays(ls, Math.ceil(durDays)-1, cal);
          }
          break;
        default:
          derived = addWorkingDays(succ._lateStart, -1 - (l.lag || 0), cal);
      }
      if (derived < latestFinish) latestFinish = derived;
    }
  }

  // Apply late-side constraints
  if (t.constraint === "mfo" && t.constraintDate) {
    latestFinish = startOfDay(parseDate(t.constraintDate));
  } else if (t.constraint === "fnlt" && t.constraintDate) {
    const cd = startOfDay(parseDate(t.constraintDate));
    if (cd < latestFinish) latestFinish = cd;
  } else if (t.constraint === "mso" && t.constraintDate) {
    const cd = startOfDay(parseDate(t.constraintDate));
    const durDays = durationToDays(t.duration, t.durationUnit, cal);
    latestFinish = computeFinish(cd, t.duration, t.durationUnit, cal);
  } else if (t.constraint === "snlt" && t.constraintDate) {
    const cd = startOfDay(parseDate(t.constraintDate));
    const maxFinish = computeFinish(cd, t.duration, t.durationUnit, cal);
    if (maxFinish < latestFinish) latestFinish = maxFinish;
  }

  t._lateFinish = latestFinish;
  if (t.isMilestone || t.duration === 0) {
    t._lateStart = new Date(latestFinish);
  } else {
    const durDays = durationToDays(t.duration, t.durationUnit, cal);
    t._lateStart = addWorkingDays(latestFinish, -(Math.ceil(durDays)-1), cal);
  }
}

function rollupSummaries() {
  // Iterate summary tasks in reverse display order (so deepest first)
  const summaries = project.tasks.filter(t => isSummary(t));
  summaries.reverse(); // deepest children processed later in tree, but we want deepest first for rollup
  // Actually: we want to process from leaf-summaries upward. Sort by outlineLevel desc.
  summaries.sort((a,b) => (b.outlineLevel || 0) - (a.outlineLevel || 0));

  for (const s of summaries) {
    const children = getChildren(s.id);
    let minStart = null, maxFinish = null;
    let totalDur = 0, sumProgress = 0, sumDurForProg = 0;
    for (const c of children) {
      if (c._earlyStart) {
        if (!minStart || c._earlyStart < minStart) minStart = new Date(c._earlyStart);
      }
      if (c._earlyFinish) {
        if (!maxFinish || c._earlyFinish > maxFinish) maxFinish = new Date(c._earlyFinish);
      }
      const cDur = durationToDays(c.duration, c.durationUnit, getTaskCalendar(c));
      sumDurForProg += cDur;
      sumProgress += (c.percentComplete || 0) * cDur;
    }
    s._earlyStart = minStart;
    s._earlyFinish = maxFinish;
    if (minStart && maxFinish) {
      const cal = getTaskCalendar(s);
      s.duration = Math.max(0, countWorkingDays(minStart, maxFinish, cal));
      s.durationUnit = "d";
      s.start = formatDate(minStart);
      s.finish = formatDate(maxFinish);
    }
    s.percentComplete = sumDurForProg > 0 ? Math.round(sumProgress / sumDurForProg) : 0;
  }
}

/* ===============================================================
   HISTORY (undo / redo)
   =============================================================== */
const history = {
  stack: [],   // {snapshot, label, ts}
  pointer: -1,
  max: 50,
};

function snapshot(label) {
  try {
    const snap = JSON.stringify({
      tasks: project.tasks,
      links: project.links,
      calendars: project.calendars,
      baselines: project.baselines,
      customFields: project.customFields,
      risks: project.risks,
      startDate: project.startDate,
      statusDate: project.statusDate,
      name: project.name,
      projectCalendarId: project.projectCalendarId,
    });
    // trim forward history
    history.stack = history.stack.slice(0, history.pointer + 1);
    history.stack.push({ snap, label, ts: Date.now() });
    if (history.stack.length > history.max) history.stack.shift();
    else history.pointer++;
    if (history.pointer >= history.max) history.pointer = history.max - 1;
  } catch(e) {
    console.error("snapshot failed", e);
  }
}

function applySnapshot(snap) {
  const data = JSON.parse(snap);
  project.tasks = data.tasks;
  project.links = data.links;
  project.calendars = data.calendars;
  project.baselines = data.baselines;
  project.customFields = data.customFields;
  project.risks = data.risks;
  project.startDate = data.startDate;
  project.statusDate = data.statusDate;
  project.name = data.name;
  project.projectCalendarId = data.projectCalendarId;
}

function undo() {
  if (history.pointer <= 0) { toast(currentLang === "cs" ? "Není co vrátit" : "Nothing to undo", "warn"); return; }
  history.pointer--;
  applySnapshot(history.stack[history.pointer].snap);
  schedule();
  recomputeWBS();
  renderAll();
  saveState();
  announce(currentLang === "cs" ? "Akce vrácena" : "Undone");
  sfx("ok");
}

function redo() {
  if (history.pointer >= history.stack.length - 1) { toast(currentLang === "cs" ? "Není co opakovat" : "Nothing to redo", "warn"); return; }
  history.pointer++;
  applySnapshot(history.stack[history.pointer].snap);
  schedule();
  recomputeWBS();
  renderAll();
  saveState();
  announce(currentLang === "cs" ? "Akce zopakována" : "Redone");
  sfx("ok");
}

/* ===============================================================
   ACTIONS (mutations that auto-snapshot and re-render)
   =============================================================== */

function action(label, fn) {
  snapshot(label);
  try {
    fn();
    schedule();
    recomputeWBS();
    renderAll();
    saveState();
  } catch(e) {
    console.error(e);
    toast(T("toast_error") + ": " + e.message, "err");
    // rollback
    if (history.stack.length && history.pointer >= 0) {
      applySnapshot(history.stack[history.pointer].snap);
    }
    sfx("error");
  }
}

function addTask(props, afterId) {
  action(currentLang === "cs" ? "Přidat úkol" : "Add task", () => {
    const t = newTask(props);
    t.id = "t_" + (project.nextId++);
    if (afterId) {
      const idx = getTaskIndex(afterId);
      const afterTask = getTaskById(afterId);
      t.outlineLevel = afterTask ? afterTask.outlineLevel : 0;
      t.parentId = afterTask ? afterTask.parentId : null;
      project.tasks.splice(idx + 1, 0, t);
    } else {
      project.tasks.push(t);
    }
    focusedTaskId = t.id;
    selection.clear();
    selection.add(t.id);
    sfx("create");
  });
  announce((currentLang === "cs" ? "Úkol přidán: " : "Task added: ") + (props?.name || ""));
  return focusedTaskId;
}

function deleteTasks(ids) {
  if (!ids || !ids.length) return;
  action(currentLang === "cs" ? "Smazat úkoly" : "Delete tasks", () => {
    const toDelete = new Set(ids);
    for (const id of ids) {
      for (const d of getAllDescendants(id)) toDelete.add(d.id);
    }
    project.tasks = project.tasks.filter(t => !toDelete.has(t.id));
    project.links = project.links.filter(l => !toDelete.has(l.predId) && !toDelete.has(l.succId));
    // remove from baselines
    for (const b of project.baselines) {
      for (const id of toDelete) delete b.tasks[id];
    }
    selection.clear();
    sfx("delete");
  });
}

function indentTasks(ids) {
  action(currentLang === "cs" ? "Odsadit" : "Indent", () => {
    for (const id of ids) {
      const idx = getTaskIndex(id);
      if (idx <= 0) continue;
      const t = project.tasks[idx];
      // new parent = previous visible task at same or higher level
      let newParentIdx = -1;
      for (let i = idx - 1; i >= 0; i--) {
        const p = project.tasks[i];
        if (p.outlineLevel === t.outlineLevel) { newParentIdx = i; break; }
        if (p.outlineLevel < t.outlineLevel) break;
      }
      if (newParentIdx < 0) continue;
      const newParent = project.tasks[newParentIdx];
      const oldLevel = t.outlineLevel;
      const newLevel = newParent.outlineLevel + 1;
      const delta = newLevel - oldLevel;
      // Move t and its descendants
      const moveIds = [t.id, ...getAllDescendants(t.id).map(d => d.id)];
      for (const mid of moveIds) {
        const mt = getTaskById(mid);
        mt.outlineLevel = (mt.outlineLevel || 0) + delta;
      }
      t.parentId = newParent.id;
    }
  });
}

function outdentTasks(ids) {
  action(currentLang === "cs" ? "Povytáhnout" : "Outdent", () => {
    for (const id of ids) {
      const t = getTaskById(id);
      if (!t || t.outlineLevel === 0) continue;
      const parent = getTaskById(t.parentId);
      const moveIds = [t.id, ...getAllDescendants(t.id).map(d => d.id)];
      for (const mid of moveIds) {
        const mt = getTaskById(mid);
        mt.outlineLevel = Math.max(0, (mt.outlineLevel || 0) - 1);
      }
      t.parentId = parent ? parent.parentId : null;
    }
  });
}

function moveTaskUp(id) {
  const idx = getTaskIndex(id);
  if (idx <= 0) return;
  action(currentLang === "cs" ? "Přesunout nahoru" : "Move up", () => {
    const t = project.tasks[idx];
    const block = [t, ...getAllDescendants(t.id)];
    // find previous sibling block
    let prevIdx = idx - 1;
    // find preceding task at same outline level and same parent
    while (prevIdx >= 0) {
      const p = project.tasks[prevIdx];
      if (p.outlineLevel === t.outlineLevel && p.parentId === t.parentId) break;
      if (p.outlineLevel < t.outlineLevel) { prevIdx = -1; break; }
      prevIdx--;
    }
    if (prevIdx < 0) return;
    const prev = project.tasks[prevIdx];
    const prevBlock = [prev, ...getAllDescendants(prev.id)];
    // remove both blocks and re-insert reversed
    const blockIds = new Set(block.map(x => x.id));
    const prevBlockIds = new Set(prevBlock.map(x => x.id));
    const remaining = project.tasks.filter(x => !blockIds.has(x.id) && !prevBlockIds.has(x.id));
    const prevBlockStart = remaining.findIndex(x => x.id === project.tasks[prevIdx-1]?.id);
    // simpler: rebuild using indices
    const flatNew = [];
    // Before prev
    for (let i = 0; i < prevIdx; i++) flatNew.push(project.tasks[i]);
    // Insert moving block
    flatNew.push(...block);
    // Then prev block
    flatNew.push(...prevBlock);
    // Then rest
    for (let i = idx + block.length; i < project.tasks.length; i++) flatNew.push(project.tasks[i]);
    project.tasks = flatNew;
  });
}

function moveTaskDown(id) {
  const idx = getTaskIndex(id);
  if (idx < 0 || idx >= project.tasks.length - 1) return;
  action(currentLang === "cs" ? "Přesunout dolů" : "Move down", () => {
    const t = project.tasks[idx];
    const block = [t, ...getAllDescendants(t.id)];
    const blockEnd = idx + block.length;
    if (blockEnd >= project.tasks.length) return;
    const next = project.tasks[blockEnd];
    if (next.outlineLevel < t.outlineLevel) return;
    if (next.outlineLevel > t.outlineLevel || next.parentId !== t.parentId) {
      // find real next sibling
      let n = blockEnd;
      while (n < project.tasks.length) {
        const nt = project.tasks[n];
        if (nt.outlineLevel === t.outlineLevel && nt.parentId === t.parentId) break;
        if (nt.outlineLevel < t.outlineLevel) { n = -1; break; }
        n++;
      }
      if (n < 0 || n >= project.tasks.length) return;
    }
    const nextBlock = [next, ...getAllDescendants(next.id)];
    const flatNew = [];
    for (let i = 0; i < idx; i++) flatNew.push(project.tasks[i]);
    flatNew.push(...nextBlock);
    flatNew.push(...block);
    for (let i = blockEnd + nextBlock.length; i < project.tasks.length; i++) flatNew.push(project.tasks[i]);
    project.tasks = flatNew;
  });
}

function updateTask(id, patch, label) {
  action(label || (currentLang === "cs" ? "Upravit úkol" : "Edit task"), () => {
    const t = getTaskById(id);
    if (!t) return;
    Object.assign(t, patch);
  });
}

function linkSelectedTasks(ids) {
  const list = ids || Array.from(selection);
  if (list.length < 2) { toast(currentLang === "cs" ? "Vyberte alespoň 2 úkoly" : "Select at least 2 tasks", "warn"); return; }
  action(currentLang === "cs" ? "Propojit úkoly" : "Link tasks", () => {
    // Order by current task index
    const ordered = list.map(id => ({ id, idx: getTaskIndex(id) })).sort((a,b) => a.idx - b.idx).map(x => x.id);
    for (let i = 0; i < ordered.length - 1; i++) {
      addLink(ordered[i], ordered[i+1], "FS", 0);
    }
  });
}

function unlinkSelectedTasks(ids) {
  const list = ids || Array.from(selection);
  action(currentLang === "cs" ? "Rozpojit úkoly" : "Unlink tasks", () => {
    const setIds = new Set(list);
    project.links = project.links.filter(l => !(setIds.has(l.predId) && setIds.has(l.succId)));
  });
}

function toggleMilestone(id) {
  action(currentLang === "cs" ? "Přepnout milník" : "Toggle milestone", () => {
    const t = getTaskById(id);
    if (!t) return;
    t.isMilestone = !t.isMilestone;
    if (t.isMilestone) t.duration = 0;
    else if (t.duration === 0) t.duration = 1;
  });
}

/* ===============================================================
   FILTERS / SORTS / GROUPS
   =============================================================== */
/*
  filterDef = { rules: [ {field, op, value} ], combine: "and|or" }
  sortDef   = [ {field, dir: "asc|desc"} ]
  groupDef  = { field, dir }
*/

function applyFilterTask(t) {
  if (!project.settings.filterDef || !project.settings.filterDef.rules || !project.settings.filterDef.rules.length) return true;
  const combine = project.settings.filterDef.combine || "and";
  const results = project.settings.filterDef.rules.map(r => evalFilterRule(t, r));
  return combine === "and" ? results.every(x => x) : results.some(x => x);
}

function evalFilterRule(t, rule) {
  let v = getTaskFieldValue(t, rule.field);
  if (typeof v === "string") v = v.toLowerCase();
  let target = rule.value;
  if (typeof target === "string") target = target.toLowerCase();
  switch (rule.op) {
    case "eq":  return v == target;
    case "neq": return v != target;
    case "gt":  return v > target;
    case "gte": return v >= target;
    case "lt":  return v < target;
    case "lte": return v <= target;
    case "contains": return v != null && String(v).includes(String(target));
    case "startsWith": return v != null && String(v).startsWith(String(target));
    case "nonempty": return v != null && v !== "";
    case "empty": return v == null || v === "";
    case "true":  return !!v;
    case "false": return !v;
    default: return true;
  }
}

function getTaskFieldValue(t, field) {
  if (!field) return null;
  if (field === "name") return t.name;
  if (field === "duration") return t.duration;
  if (field === "start") return t.start;
  if (field === "finish") return t.finish;
  if (field === "percentComplete") return t.percentComplete;
  if (field === "priority") return t.priority;
  if (field === "wbs") return t.wbs;
  if (field === "critical") return t._critical;
  if (field === "slack") return t._totalSlack;
  if (field === "milestone") return t.isMilestone;
  if (field === "manual") return t.manual;
  if (field === "deadline") return t.deadline;
  if (field === "constraint") return t.constraint;
  if (field === "notes") return t.notes;
  if (field === "outlineLevel") return t.outlineLevel;
  if (field.startsWith("cf_")) {
    const cfId = field.slice(3);
    return t.customValues ? t.customValues[cfId] : null;
  }
  return null;
}

function applySortTasks(tasks) {
  const def = project.settings.sortDef;
  if (!def || !def.length) return tasks;
  const sorted = tasks.slice();
  sorted.sort((a, b) => {
    for (const rule of def) {
      const va = getTaskFieldValue(a, rule.field);
      const vb = getTaskFieldValue(b, rule.field);
      let cmp;
      if (va == null && vb == null) cmp = 0;
      else if (va == null) cmp = -1;
      else if (vb == null) cmp = 1;
      else if (typeof va === "number") cmp = va - vb;
      else cmp = String(va).localeCompare(String(vb));
      if (cmp !== 0) return rule.dir === "desc" ? -cmp : cmp;
    }
    return 0;
  });
  return sorted;
}

/** Visible tasks: respect outline collapsing + filter. Keeps display order. */
function getVisibleTasks() {
  const exp = project.settings.expandedTasks || {};
  // Build set of collapsed parents
  const collapsedAncestors = new Set();
  const visible = [];
  for (const t of project.tasks) {
    // check: is any ancestor collapsed?
    let hidden = false;
    for (const anc of getAncestors(t.id)) {
      if (exp[anc.id] === false) { hidden = true; break; }
    }
    if (hidden) continue;
    if (!applyFilterTask(t)) continue;
    visible.push(t);
  }
  return visible;
}
