   VIEW DISPATCH
   =============================================================== */
function setCurrentView(v) {
  project.settings.currentView = v;
  $$(".view-tab").forEach(btn => {
    btn.setAttribute("aria-current", btn.dataset.view === v ? "true" : "false");
  });
  renderView();
  saveState();
  const labels = { sheet:"view_sheet", gantt:"view_gantt", calendar:"view_calendar", timeline:"view_timeline", kanban:"view_kanban", network:"view_network" };
  announce(T(labels[v] || "view_sheet"));
}

function renderView() {
  const c = $("#viewContainer");
  c.innerHTML = "";
  const view = project.settings.currentView || "sheet";
  try {
    if (view === "sheet")         renderTaskSheet(c);
    else if (view === "gantt")    renderGantt(c);
    else if (view === "calendar") renderCalendarView(c);
    else if (view === "timeline") renderTimelineView(c);
    else if (view === "kanban")   renderKanban(c);
    else if (view === "network")  renderNetwork(c);
  } catch(e) {
    console.error(e);
    c.appendChild(el("div", { style:"padding:20px; color: var(--critical);" },
      el("h2", null, "Chyba při vykreslování pohledu"),
      el("pre", null, e.stack)
    ));
  }
}

function renderAll() {
  renderView();
  updateStatusBar();
  updateInspector();
  $("#projectNameDisplay").textContent = "— " + (project.name || T("untitled_project"));
  document.title = "Projektor — " + (project.name || T("untitled_project"));
}

function updateStatusBar() {
  const nTasks = project.tasks.length;
  const nCrit = project.tasks.filter(t => t._critical && !isSummary(t)).length;
  const avgProg = nTasks ? Math.round(project.tasks.reduce((a,t)=>a+(t.percentComplete||0),0) / nTasks) : 0;
  $("#statusTaskCount").textContent = (currentLang === "cs" ? "Úkolů: " : "Tasks: ") + nTasks;
  $("#statusProgress").textContent = (currentLang === "cs" ? "Progres: " : "Progress: ") + avgProg + " %";
  $("#statusCritical").textContent = (currentLang === "cs" ? "Kritických: " : "Critical: ") + nCrit;
  const start = project.startDate;
  const end = project.currentEndDate || "—";
  $("#statusProjectDates").textContent = start + " → " + end;
  if (selection.size) {
    $("#statusSelection").textContent = (currentLang === "cs" ? "Vybráno: " : "Selected: ") + selection.size;
  } else {
    $("#statusSelection").textContent = "";
  }
}

/* ===============================================================
   TASK SHEET VIEW
   =============================================================== */
function renderTaskSheet(container) {
  const wrap = el("div", { style:"padding: 0;" });

  if (!project.tasks.length) {
    wrap.appendChild(renderEmptyState());
    container.appendChild(wrap);
    return;
  }

  const visible = getVisibleTasks();
  const sorted = applySortTasks(visible);
  const groupDef = project.settings.groupDef;

  const table = el("table", {
    class: "task-sheet",
    role: "grid",
    "aria-rowcount": String(sorted.length + 1),
    "aria-label": T("view_sheet"),
  });

  const colDefs = [
    { key: "id",        label: T("id"),           cls: "col-id",       sortable: true },
    { key: "wbs",       label: T("wbs"),          cls: "col-wbs",      sortable: true },
    { key: "name",      label: T("name"),         cls: "col-name",     sortable: true, editable: true },
    { key: "duration",  label: T("duration"),     cls: "col-duration", sortable: true, editable: true },
    { key: "start",     label: T("start"),        cls: "col-date",     sortable: true, editable: true },
    { key: "finish",    label: T("finish"),       cls: "col-date",     sortable: true, editable: true },
    { key: "percent",   label: T("percent"),      cls: "col-percent",  sortable: true, editable: true },
    { key: "pred",      label: T("predecessors"), cls: "col-pred",     sortable: false, editable: true },
    { key: "slack",     label: T("slack"),        cls: "col-slack",    sortable: true },
    { key: "deadline",  label: T("deadline"),     cls: "col-date",     sortable: true, editable: true },
    { key: "constraint",label: T("constraint"),   cls: "col-date",     sortable: true },
  ];

  // Add custom fields
  for (const cf of (project.customFields || [])) {
    colDefs.push({ key: "cf_"+cf.id, label: cf.label, cls: "col-custom", sortable: true, editable: cf.kind !== "formula", customField: cf });
  }

  const thead = el("thead");
  const trh = el("tr", { role: "row" });
  for (const cd of colDefs) {
    const sortDef = project.settings.sortDef || [];
    const sortRule = sortDef.find(r => r.field === cd.key || (cd.key === "pred" && false));
    const th = el("th", {
      class: cd.cls,
      scope: "col",
      role: "columnheader",
      "aria-sort": sortRule ? (sortRule.dir === "desc" ? "descending" : "ascending") : "none",
      dataset: { field: cd.key },
    }, cd.label);
    if (cd.sortable) {
      th.addEventListener("click", () => {
        applySortFromHeader(cd.key);
      });
      th.addEventListener("keydown", (ev) => {
        if (ev.key === "Enter" || ev.key === " ") { ev.preventDefault(); applySortFromHeader(cd.key); }
      });
      th.tabIndex = 0;
    }
    trh.appendChild(th);
  }
  thead.appendChild(trh);
  table.appendChild(thead);

  const tbody = el("tbody");

  // Grouping
  if (groupDef && groupDef.field) {
    const groups = {};
    for (const t of sorted) {
      const v = getTaskFieldValue(t, groupDef.field);
      const k = v == null ? "—" : String(v);
      (groups[k] = groups[k] || []).push(t);
    }
    const keys = Object.keys(groups);
    keys.sort();
    if (groupDef.dir === "desc") keys.reverse();
    for (const k of keys) {
      const gh = el("tr", { class: "group-header" },
        el("td", { colspan: String(colDefs.length), style: "background: var(--paper-3); font-weight:700;" },
          `▼ ${groupDef.field}: ${k} (${groups[k].length})`)
      );
      tbody.appendChild(gh);
      for (const t of groups[k]) {
        tbody.appendChild(renderTaskRow(t, colDefs, sorted.indexOf(t) + 2));
      }
    }
  } else {
    let ri = 2;
    for (const t of sorted) {
      tbody.appendChild(renderTaskRow(t, colDefs, ri++));
    }
  }

  table.appendChild(tbody);
  wrap.appendChild(table);

  // Natural language input at bottom
  const nlInput = el("div", { style:"padding: 8px 12px; border-top: 1px solid var(--line); background: var(--paper-2); display:flex; gap:8px; align-items:center;" },
    el("label", { for:"nlInput", style:"font-size:0.85rem; font-weight:500;" }, currentLang === "cs" ? "Rychlé přidání:" : "Quick add:"),
    el("input", { id:"nlInput", type:"text", placeholder: T("nl_placeholder"), style:"flex:1;" }),
    el("button", { type:"button", class:"btn primary", onClick: () => {
      const val = $("#nlInput").value.trim();
      if (val) { parseNaturalLanguage(val); $("#nlInput").value = ""; }
    }}, T("nl_parse"))
  );
  wrap.appendChild(nlInput);

  container.appendChild(wrap);
}

function applySortFromHeader(field) {
  const cur = project.settings.sortDef || [];
  const existing = cur.find(r => r.field === field);
  if (existing && existing.dir === "asc") {
    project.settings.sortDef = [{ field, dir: "desc" }];
  } else if (existing && existing.dir === "desc") {
    project.settings.sortDef = null;
  } else {
    project.settings.sortDef = [{ field, dir: "asc" }];
  }
  renderView();
  saveState();
}

function renderTaskRow(t, colDefs, rowIndex) {
  const isSum = isSummary(t);
  const classes = [];
  if (isSum) classes.push("summary");
  if (t.isMilestone) classes.push("milestone");
  if (t._critical && project.settings.showCritical !== false) classes.push("critical");
  if (t.percentComplete >= 100) classes.push("completed");
  if (t.manual) classes.push("manual");
  if (taskPathHighlightId) {
    if (t.id === taskPathHighlightId) classes.push("task-path-self");
    else if (isOnTaskPath(t.id, taskPathHighlightId)) classes.push("task-path-related");
  }

  const tr = el("tr", {
    role: "row",
    class: classes.join(" "),
    "aria-rowindex": String(rowIndex),
    "aria-selected": selection.has(t.id) ? "true" : "false",
    tabIndex: -1,
    dataset: { taskId: t.id },
  });
  tr.addEventListener("click", (ev) => handleRowClick(ev, t));
  tr.addEventListener("dblclick", () => openTaskDialog(t.id));
  tr.addEventListener("keydown", (ev) => handleRowKey(ev, t));
  tr.addEventListener("contextmenu", (ev) => { ev.preventDefault(); openTaskDialog(t.id); });

  for (const cd of colDefs) {
    const td = renderTaskCell(t, cd);
    tr.appendChild(td);
  }
  return tr;
}

function handleRowClick(ev, t) {
  if (ev.shiftKey && focusedTaskId) {
    // range select
    const idxA = getTaskIndex(focusedTaskId);
    const idxB = getTaskIndex(t.id);
    const from = Math.min(idxA, idxB), to = Math.max(idxA, idxB);
    selection.clear();
    for (let i = from; i <= to; i++) selection.add(project.tasks[i].id);
  } else if (ev.ctrlKey || ev.metaKey) {
    if (selection.has(t.id)) selection.delete(t.id);
    else selection.add(t.id);
  } else {
    selection.clear();
    selection.add(t.id);
  }
  focusedTaskId = t.id;
  updateSelection();
}

function handleRowKey(ev, t) {
  const idx = getTaskIndex(t.id);
  const visible = getVisibleTasks();
  const vIdx = visible.findIndex(v => v.id === t.id);

  if (ev.key === "ArrowDown") {
    ev.preventDefault();
    const next = visible[vIdx + 1];
    if (next) { focusTask(next.id, ev.shiftKey); }
  } else if (ev.key === "ArrowUp") {
    ev.preventDefault();
    const prev = visible[vIdx - 1];
    if (prev) { focusTask(prev.id, ev.shiftKey); }
  } else if (ev.key === "ArrowLeft" && !ev.altKey) {
    ev.preventDefault();
    if (isSummary(t) && project.settings.expandedTasks[t.id] !== false) {
      project.settings.expandedTasks[t.id] = false;
      renderView();
    }
  } else if (ev.key === "ArrowRight" && !ev.altKey) {
    ev.preventDefault();
    if (isSummary(t) && project.settings.expandedTasks[t.id] === false) {
      project.settings.expandedTasks[t.id] = true;
      renderView();
    }
  } else if (ev.key === "Enter" && !ev.ctrlKey) {
    ev.preventDefault();
    openTaskDialog(t.id);
  } else if (ev.key === "Enter" && ev.ctrlKey) {
    ev.preventDefault();
    addTask({}, t.id);
  } else if (ev.key === "Delete") {
    ev.preventDefault();
    if (selection.size > 0) deleteTasks(Array.from(selection));
  } else if (ev.key === "Tab" && !ev.shiftKey) {
    ev.preventDefault();
    indentTasks(Array.from(selection));
  } else if (ev.key === "Tab" && ev.shiftKey) {
    ev.preventDefault();
    outdentTasks(Array.from(selection));
  } else if ((ev.key === "ArrowUp" && ev.altKey) || (ev.key === "u" && ev.ctrlKey)) {
    ev.preventDefault();
    moveTaskUp(t.id);
  } else if ((ev.key === "ArrowDown" && ev.altKey) || (ev.key === "d" && ev.ctrlKey)) {
    ev.preventDefault();
    moveTaskDown(t.id);
  }
}

function focusTask(id, extend) {
  if (extend && focusedTaskId) {
    selection.add(id);
  } else if (!extend) {
    selection.clear();
    selection.add(id);
  }
  focusedTaskId = id;
  updateSelection();
  // move keyboard focus
  const row = document.querySelector(`tr[data-task-id="${id}"]`);
  if (row) { row.focus(); row.scrollIntoView({ block: "nearest" }); }
  updateInspector();
}

function updateSelection() {
  $$("tr[data-task-id]").forEach(r => {
    const id = r.dataset.taskId;
    r.setAttribute("aria-selected", selection.has(id) ? "true" : "false");
  });
  $$(".gantt-row[data-task-id]").forEach(r => {
    r.setAttribute("aria-selected", selection.has(r.dataset.taskId) ? "true" : "false");
  });
  $$(".kanban-card[data-task-id]").forEach(r => {
    r.setAttribute("aria-selected", selection.has(r.dataset.taskId) ? "true" : "false");
  });
  updateInspector();
  updateStatusBar();
}

function renderTaskCell(t, cd) {
  const td = el("td", { class: cd.cls, role: "gridcell" });
  let content;
  switch (cd.key) {
    case "id":
      content = String(getTaskIndex(t.id) + 1);
      break;
    case "wbs":
      content = t.wbs || "";
      break;
    case "name": {
      const frag = document.createDocumentFragment();
      // indent
      for (let i = 0; i < (t.outlineLevel || 0); i++) {
        frag.appendChild(el("span", { class:"outline-indent" }));
      }
      if (isSummary(t)) {
        const exp = project.settings.expandedTasks[t.id] !== false;
        const toggle = el("button", {
          class: "outline-toggle",
          type: "button",
          "aria-expanded": exp ? "true" : "false",
          "aria-label": (exp ? (currentLang==="cs"?"Sbalit: ":"Collapse: ") : (currentLang==="cs"?"Rozbalit: ":"Expand: ")) + t.name,
          onClick: (ev) => { ev.stopPropagation(); project.settings.expandedTasks[t.id] = !exp; renderView(); saveState(); }
        }, exp ? "▼" : "▶");
        frag.appendChild(toggle);
      } else {
        frag.appendChild(el("span", { class:"task-icon", "aria-hidden":"true" },
          t.isMilestone ? "◆" : (t.isRecurring ? "↻" : "·")));
      }
      const nameSpan = el("span", null, t.name);
      frag.appendChild(nameSpan);
      // deadline indicator
      if (t.deadline && t._earlyFinish) {
        const dl = parseDate(t.deadline);
        if (dl && t._earlyFinish > dl) {
          frag.appendChild(el("span", { class:"chip critical", title: currentLang==="cs"?"Překročen deadline":"Past deadline" },
            "!"));
        }
      }
      td.appendChild(frag);
      td.classList.add("cell-editable");
      td.addEventListener("dblclick", (ev) => { ev.stopPropagation(); inlineEditCell(td, t, "name"); });
      return td;
    }
    case "duration":
      content = isSummary(t) ? "" : formatDuration(t.duration, t.durationUnit);
      break;
    case "start":
      content = formatDateLocale(t.start);
      break;
    case "finish":
      content = formatDateLocale(t.finish);
      break;
    case "percent": {
      const p = t.percentComplete || 0;
      const bar = el("span", { class:"progress-bar", "aria-hidden":"true" },
        el("span", { class:"progress-bar-fill", style: `width:${p}%` }));
      td.appendChild(bar);
      td.appendChild(document.createTextNode(p + " %"));
      td.classList.add("cell-editable");
      td.addEventListener("dblclick", (ev) => { ev.stopPropagation(); inlineEditCell(td, t, "percentComplete"); });
      return td;
    }
    case "pred":
      content = predecessorsAsString(t.id);
      td.classList.add("cell-editable");
      td.textContent = content;
      td.addEventListener("dblclick", (ev) => { ev.stopPropagation(); inlineEditCell(td, t, "pred"); });
      return td;
    case "slack":
      content = isSummary(t) ? "" : (t._totalSlack || 0) + " d";
      break;
    case "deadline":
      content = formatDateLocale(t.deadline);
      break;
    case "constraint":
      content = (t.constraint && t.constraint !== "asap") ? (t.constraint.toUpperCase() + (t.constraintDate ? " " + formatDateLocale(t.constraintDate) : "")) : "";
      break;
    default:
      if (cd.key.startsWith("cf_")) {
        const cfId = cd.key.slice(3);
        const cf = project.customFields.find(x => x.id === cfId);
        let v = t.customValues ? t.customValues[cfId] : null;
        if (cf && cf.formula) v = evalFormula(cf.formula, t);
        if (cf && cf.kind === "flag") content = v ? "✓" : "";
        else if (cf && cf.kind === "date") content = formatDateLocale(v);
        else content = v == null ? "" : String(v);
        if (cf && cd.editable) {
          td.classList.add("cell-editable");
          td.addEventListener("dblclick", (ev) => { ev.stopPropagation(); inlineEditCustom(td, t, cf); });
        }
      }
  }
  if (typeof content === "string") td.textContent = content;
  if (cd.editable && !td.classList.contains("cell-editable")) {
    td.classList.add("cell-editable");
    td.addEventListener("dblclick", (ev) => { ev.stopPropagation(); inlineEditCell(td, t, cd.key); });
  }
  return td;
}

function inlineEditCell(td, t, field) {
  const oldText = td.textContent;
  td.textContent = "";
  let input;
  if (field === "name") {
    input = el("input", { type:"text", value: t.name });
  } else if (field === "duration") {
    input = el("input", { type:"text", value: formatDuration(t.duration, t.durationUnit) });
  } else if (field === "start" || field === "finish" || field === "deadline") {
    input = el("input", { type:"date", value: formatDate(t[field]) });
  } else if (field === "percentComplete") {
    input = el("input", { type:"number", min:"0", max:"100", step:"1", value: String(t.percentComplete || 0) });
  } else if (field === "pred") {
    input = el("input", { type:"text", value: predecessorsAsString(t.id) });
  } else {
    input = el("input", { type:"text", value: String(t[field] || "") });
  }
  td.appendChild(input);
  input.focus();
  input.select && input.select();

  function commit() {
    const v = input.value;
    applyCellEdit(t, field, v);
    renderView();
  }
  function cancel() {
    td.textContent = oldText;
  }
  input.addEventListener("blur", commit);
  input.addEventListener("keydown", (ev) => {
    if (ev.key === "Enter") { ev.preventDefault(); input.blur(); }
    else if (ev.key === "Escape") { input.removeEventListener("blur", commit); cancel(); }
    else if (ev.key === "Tab") { ev.preventDefault(); commit(); /* move next */ }
  });
}

function inlineEditCustom(td, t, cf) {
  const cur = t.customValues ? t.customValues[cf.id] : null;
  td.textContent = "";
  let input;
  if (cf.kind === "number") input = el("input", { type:"number", value: cur==null?"":String(cur) });
  else if (cf.kind === "date") input = el("input", { type:"date", value: formatDate(cur) });
  else if (cf.kind === "flag") {
    input = el("input", { type:"checkbox", checked: !!cur });
  } else if (cf.kind === "choice" && cf.lookup) {
    input = el("select");
    input.appendChild(el("option", { value:"" }, "—"));
    for (const opt of cf.lookup) input.appendChild(el("option", { value: opt }, opt));
    input.value = cur || "";
  } else {
    input = el("input", { type:"text", value: cur == null ? "" : String(cur) });
  }
  td.appendChild(input);
  input.focus();
  function commit() {
    if (!t.customValues) t.customValues = {};
    let v;
    if (cf.kind === "number") v = input.value === "" ? null : parseFloat(input.value);
    else if (cf.kind === "flag") v = input.checked;
    else v = input.value;
    updateTask(t.id, { customValues: Object.assign({}, t.customValues, { [cf.id]: v }) });
  }
  input.addEventListener("blur", commit);
  input.addEventListener("keydown", (ev) => {
    if (ev.key === "Enter") { ev.preventDefault(); commit(); }
    else if (ev.key === "Escape") { renderView(); }
  });
}

function applyCellEdit(t, field, rawValue) {
  if (field === "name") {
    updateTask(t.id, { name: rawValue });
  } else if (field === "duration") {
    const pd = parseDurationString(rawValue);
    updateTask(t.id, { duration: pd.duration, durationUnit: pd.unit, manual: t.manual });
  } else if (field === "start") {
    const d = parseDate(rawValue);
    if (!d) return;
    updateTask(t.id, { start: formatDate(d), manual: true, constraint: "sneт", constraintDate: formatDate(d) });
  } else if (field === "finish") {
    const d = parseDate(rawValue);
    if (!d) return;
    updateTask(t.id, { finish: formatDate(d), manual: true });
  } else if (field === "deadline") {
    const d = parseDate(rawValue);
    updateTask(t.id, { deadline: d ? formatDate(d) : null });
  } else if (field === "percentComplete") {
    const p = clamp(parseInt(rawValue,10) || 0, 0, 100);
    const patch = { percentComplete: p };
    if (p >= 100) { patch.actualFinish = patch.actualFinish || t.finish || formatDate(new Date()); }
    if (p > 0 && !t.actualStart) { patch.actualStart = t.start || formatDate(new Date()); }
    updateTask(t.id, patch);
  } else if (field === "pred") {
    const parsed = parsePredecessorsString(rawValue, t.id);
    action(currentLang==="cs"?"Upravit vazby":"Edit links", () => {
      // remove existing predecessors
      project.links = project.links.filter(l => l.succId !== t.id);
      for (const p of parsed) addLink(p.predId, t.id, p.type, p.lag);
    });
  }
}

/* Natural language parser — simple */
function parseNaturalLanguage(text) {
  action(currentLang==="cs"?"Přirozený jazyk":"Natural language", () => {
    const lines = text.split(/\n|;/).map(l => l.replace(/\r/g, ""));
    let prevLeafId = null;
    const idsByLevel = {};

    for (const rawLine of lines) {
      if (!rawLine.trim()) continue;
      // Count leading spaces (2 per level) or tabs
      const m = rawLine.match(/^(\s*)(.*)$/);
      const indent = m[1];
      const tabs = (indent.match(/\t/g) || []).length;
      const spaces = indent.replace(/\t/g, "").length;
      const level = tabs + Math.floor(spaces / 2);
      const rest = m[2].trim();
      if (!rest) continue;

      // Parse: name [duration][connectors]
      let name = rest;
      let duration = 1;
      let unit = "d";
      let linkToPrev = null;
      let linkType = "FS";

      // Match duration pattern and optional "then/poté/ss/fs/..."
      const durMatch = rest.match(/(.+?)\s+(\d+(?:[.,]\d+)?)\s*(d|h|w|t|mo|ed)?\s*(poté|then|after|následuje|ss|fs|ff|sf)?(\s+\+\d+d)?\s*$/i);
      if (durMatch) {
        name = durMatch[1].trim();
        duration = parseFloat(durMatch[2].replace(",", "."));
        unit = (durMatch[3] || "d").toLowerCase();
        if (unit === "t") unit = "w";
        const linkWord = (durMatch[4] || "").toLowerCase();
        if (linkWord) {
          if (["ss","fs","ff","sf"].includes(linkWord)) linkType = linkWord.toUpperCase();
          linkToPrev = true;
        }
      }
      // Milestone?
      let isMilestone = duration === 0 || /milník|milestone|^M:/i.test(name);
      if (/^M:\s*/i.test(name)) name = name.replace(/^M:\s*/i, "");

      const t = newTask({
        name, duration, durationUnit: unit,
        outlineLevel: level,
        isMilestone
      });
      t.id = "t_" + (project.nextId++);
      // Determine parent
      if (level > 0) {
        // find most recent task with outlineLevel = level - 1
        const parentId = idsByLevel[level - 1];
        if (parentId) t.parentId = parentId;
      }
      project.tasks.push(t);
      idsByLevel[level] = t.id;
      // clear deeper levels
      for (const k of Object.keys(idsByLevel)) if (+k > level) delete idsByLevel[k];

      if (linkToPrev && prevLeafId) {
        addLink(prevLeafId, t.id, linkType, 0);
      }
      prevLeafId = t.id;
    }
  });
  toast((currentLang==="cs"?"Úkoly přidány":"Tasks added"), "ok");
  sfx("create");
}

/* Task path: is 'otherId' on the path to/from pathId? */
function isOnTaskPath(otherId, pathId) {
  if (otherId === pathId) return true;
  // ancestors / descendants of pathId via links
  const predChain = new Set();
  const stack = [pathId];
  while (stack.length) {
    const cur = stack.pop();
    for (const l of project.links) {
      if (l.succId === cur && !predChain.has(l.predId)) { predChain.add(l.predId); stack.push(l.predId); }
    }
  }
  const succChain = new Set();
  const stack2 = [pathId];
  while (stack2.length) {
    const cur = stack2.pop();
    for (const l of project.links) {
      if (l.predId === cur && !succChain.has(l.succId)) { succChain.add(l.succId); stack2.push(l.succId); }
    }
  }
  return predChain.has(otherId) || succChain.has(otherId);
}

/* ===============================================================
   FORMULA EVALUATOR (very simple subset of MS Project)
   Supports: arithmetic, IIf(cond, a, b), field references [Name], [Duration]
   =============================================================== */
function evalFormula(formulaStr, t) {
  try {
    // Replace [Field] with values
    const code = formulaStr.replace(/\[([A-Za-z][A-Za-z0-9_]*)\]/g, (_, f) => {
      const v = getTaskFieldValue(t, f) ?? getTaskFieldValue(t, f[0].toLowerCase() + f.slice(1));
      if (v == null) return "null";
      if (typeof v === "number") return String(v);
      if (typeof v === "boolean") return String(v);
      return JSON.stringify(v);
    });
    // Allow IIf
    const safeCode = code
      .replace(/IIf\s*\(/gi, "(__IIf__)(")
      .replace(/\bAnd\b/gi, "&&")
      .replace(/\bOr\b/gi, "||")
      .replace(/\bNot\b/gi, "!")
      .replace(/<>/g, "!=");
    const __IIf__ = (c, a, b) => c ? a : b;
    // eslint-disable-next-line no-new-func
    const fn = new Function("__IIf__", "return (" + safeCode + ");");
    return fn(__IIf__);
  } catch(e) {
    return "#ERR";
  }
}

/* ===============================================================
   GANTT CHART VIEW
   =============================================================== */
function renderGantt(container) {
  if (!project.tasks.length) {
    container.appendChild(renderEmptyState());
    return;
  }

  const visible = getVisibleTasks();

  let minDate = parseDate(project.startDate);
  let maxDate = minDate;
  for (const t of project.tasks) {
    if (t._earlyStart && t._earlyStart < minDate) minDate = new Date(t._earlyStart);
    if (t._earlyFinish && t._earlyFinish > maxDate) maxDate = new Date(t._earlyFinish);
    if (t.deadline) {
      const dd = parseDate(t.deadline);
      if (dd && dd > maxDate) maxDate = dd;
    }
  }
  minDate = addDays(minDate, -3);
  maxDate = addDays(maxDate, 7);

  const zoom = project.settings.zoom != null ? project.settings.zoom : 3;
  const dayWidths = [50, 30, 20, 12, 6, 3, 1.5];
  const dayWidth = dayWidths[clamp(zoom, 0, 6)];

  const totalDays = Math.max(7, diffDays(minDate, maxDate) + 1);
  const chartWidth = totalDays * dayWidth;

  const wrap = el("div", { class:"gantt-wrapper", role:"region", "aria-label": T("view_gantt") });

  /* Left: task sheet */
  const sheet = el("div", { class:"gantt-sheet", role:"region", "aria-label": currentLang === "cs" ? "Seznam úkolů" : "Task list" });
  const sheetTable = el("table", { class:"task-sheet", role:"grid", "aria-rowcount": String(visible.length + 1) });
  const sheetCols = [
    { key: "id",       label: T("id"),       cls:"col-id" },
    { key: "name",     label: T("name"),     cls:"col-name" },
    { key: "duration", label: T("duration"), cls:"col-duration" },
    { key: "start",    label: T("start"),    cls:"col-date" },
    { key: "finish",   label: T("finish"),   cls:"col-date" },
  ];
  const sheetThead = el("thead");
  const sheetTrh = el("tr");
  for (const c of sheetCols) sheetTrh.appendChild(el("th", { class: c.cls, scope:"col" }, c.label));
  sheetThead.appendChild(sheetTrh);
  sheetTable.appendChild(sheetThead);
  const sheetTbody = el("tbody");
  let ri = 2;
  for (const t of visible) {
    sheetTbody.appendChild(renderTaskRow(t, sheetCols, ri++));
  }
  sheetTable.appendChild(sheetTbody);
  sheet.appendChild(sheetTable);
  wrap.appendChild(sheet);

  /* Right: chart */
  const chart = el("div", { class:"gantt-chart", role:"figure", "aria-label": T("view_gantt") });
  chart.style.position = "relative";

  const timelineDiv = el("div", { class:"gantt-timeline" });
  const topRow = el("div", { class:"gantt-timeline-row" });
  const bottomRow = el("div", { class:"gantt-timeline-row" });
  const today = startOfDay(new Date());

  // simple timeline: top row = month name, bottom row = day of month (or week marker)
  let curMonth = null;
  let monthStartPx = 0;
  let monthTitle = "";
  let accumPx = 0;
  for (let i = 0; i < totalDays; i++) {
    const d = addDays(minDate, i);
    const monthKey = d.getFullYear() + "-" + d.getMonth();
    if (monthKey !== curMonth) {
      if (curMonth !== null) {
        topRow.appendChild(el("div", { class:"gantt-timeline-cell", style:{ width: (accumPx - monthStartPx) + "px", flexBasis: (accumPx - monthStartPx) + "px" } }, monthTitle));
      }
      curMonth = monthKey;
      monthStartPx = accumPx;
      monthTitle = d.toLocaleDateString(currentLang === "cs" ? "cs-CZ" : "en-US", { month: zoom >= 4 ? "short" : "long", year:"numeric" });
    }
    accumPx += dayWidth;
    const showDay = dayWidth >= 10 || (dayWidth >= 4 && d.getDate() % 7 === 1);
    const bCell = el("div", {
      class:"gantt-timeline-cell",
      style:{ width: dayWidth+"px", flexBasis: dayWidth+"px" }
    }, showDay ? String(d.getDate()) : "");
    if (d.getDay() === 0 || d.getDay() === 6) bCell.classList.add("weekend");
    if (sameDay(d, today)) bCell.classList.add("today");
    bottomRow.appendChild(bCell);
  }
  topRow.appendChild(el("div", { class:"gantt-timeline-cell", style:{ width: (accumPx - monthStartPx) + "px", flexBasis: (accumPx - monthStartPx) + "px" } }, monthTitle));

  timelineDiv.appendChild(topRow);
  timelineDiv.appendChild(bottomRow);
  timelineDiv.style.width = chartWidth + "px";
  chart.appendChild(timelineDiv);

  const body = el("div", { class:"gantt-body", style:{ width: chartWidth + "px" } });
  const cal = getCalendar();
  const rowHeight = 26;

  visible.forEach((t, idx) => {
    const row = el("div", {
      class: "gantt-row" + (isSummary(t) ? " summary" : ""),
      role: "row",
      "aria-selected": selection.has(t.id) ? "true" : "false",
      dataset: { taskId: t.id },
      style: { width: chartWidth + "px" }
    });

    if (dayWidth >= 4) {
      for (let i = 0; i < totalDays; i++) {
        const d = addDays(minDate, i);
        const bg = el("div", { class:"gantt-bg-cell", style: { width: dayWidth + "px" } });
        if (d.getDay() === 0 || d.getDay() === 6) bg.classList.add("weekend");
        if (!isWorkingDay(d, cal)) bg.classList.add("holiday");
        if (sameDay(d, today)) bg.classList.add("today");
        row.appendChild(bg);
      }
    }

    if (t._earlyStart && t._earlyFinish) {
      const startPx = diffDays(minDate, t._earlyStart) * dayWidth;
      const durDays = diffDays(t._earlyStart, t._earlyFinish) + 1;
      const widthPx = Math.max(8, durDays * dayWidth);

      let barCls = "gantt-bar";
      if (isSummary(t)) barCls += " summary";
      if (t.isMilestone) barCls += " milestone";
      if (t._critical && !isSummary(t) && project.settings.showCritical !== false) barCls += " critical";

      const bar = el("div", {
        class: barCls,
        style: { left: startPx + "px", width: (t.isMilestone ? 14 : widthPx) + "px" },
        tabIndex: 0,
        role: "button",
        "aria-label": `${t.name}, ${formatDateLocale(t.start)} — ${formatDateLocale(t.finish)}, ${formatDuration(t.duration, t.durationUnit)}${t._critical ? ", " + T("critical") : ""}`,
        onClick: (ev) => { ev.stopPropagation(); selection.clear(); selection.add(t.id); focusedTaskId = t.id; updateSelection(); },
        onDblclick: () => openTaskDialog(t.id),
      }, (dayWidth >= 8 && !t.isMilestone) ? t.name : "");

      if (!t.isMilestone && !isSummary(t) && t.percentComplete > 0) {
        const pf = el("div", { class:"gantt-bar-progress", style:{ width: Math.max(0, widthPx * t.percentComplete / 100 - 2) + "px" } });
        bar.appendChild(pf);
      }

      row.appendChild(bar);

      const baseRef = project.settings.baselineRef;
      if (baseRef != null) {
        const baseline = project.baselines.find(b => b.index === baseRef);
        if (baseline && baseline.tasks[t.id]) {
          const bt = baseline.tasks[t.id];
          const bStart = parseDate(bt.start);
          const bFinish = parseDate(bt.finish);
          if (bStart && bFinish) {
            const bsPx = diffDays(minDate, bStart) * dayWidth;
            const bwPx = Math.max(4, (diffDays(bStart, bFinish) + 1) * dayWidth);
            const bl = el("div", { class:"gantt-baseline-bar", style:{ left: bsPx+"px", width: bwPx+"px" }, "aria-hidden":"true" });
            row.appendChild(bl);
          }
        }
      }

      if (t.deadline) {
        const dd = parseDate(t.deadline);
        if (dd) {
          const dlPx = diffDays(minDate, dd) * dayWidth;
          row.appendChild(el("div", { class:"gantt-deadline", style:{ left: dlPx+"px" }, title: (currentLang==="cs"?"Deadline: ":"Deadline: ") + formatDateLocale(dd) }));
        }
      }
    }

    row.addEventListener("click", (ev) => handleRowClick(ev, t));
    body.appendChild(row);
  });

  if (today >= minDate && today <= maxDate) {
    const todayPx = diffDays(minDate, today) * dayWidth;
    body.appendChild(el("div", {
      style:{ position:"absolute", top:"0", bottom:"0", left: todayPx+"px", width:"1px", background:"var(--warning)", opacity:"0.6", pointerEvents:"none" },
      "aria-hidden":"true"
    }));
  }

  if (project.statusDate) {
    const sd = parseDate(project.statusDate);
    if (sd && sd >= minDate && sd <= maxDate) {
      const sdPx = diffDays(minDate, sd) * dayWidth;
      body.appendChild(el("div", {
        style:{ position:"absolute", top:"0", bottom:"0", left: sdPx+"px", width:"1px", background:"var(--info)", opacity:"0.6", borderLeft:"1px dashed var(--info)", pointerEvents:"none" },
        "aria-hidden":"true"
      }));
    }
  }

  const svg = renderGanttLinks(visible, minDate, dayWidth, rowHeight);
  if (svg) body.appendChild(svg);

  if (project.settings.showProgressLines && project.statusDate) {
    const sd = parseDate(project.statusDate);
    if (sd) {
      const pl = renderProgressLine(visible, minDate, dayWidth, rowHeight, sd);
      if (pl) body.appendChild(pl);
    }
  }

  body.style.height = (visible.length * rowHeight) + "px";
  chart.appendChild(body);
  wrap.appendChild(chart);

  container.appendChild(wrap);

  sheet.addEventListener("scroll", () => {
    chart.scrollTop = sheet.scrollTop;
  });
  chart.addEventListener("scroll", () => {
    if (sheet.scrollTop !== chart.scrollTop) sheet.scrollTop = chart.scrollTop;
  });
}

function renderGanttLinks(visible, minDate, dayWidth, rowHeight) {
  const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
  svg.setAttribute("class", "gantt-link");
  svg.style.position = "absolute";
  svg.style.top = "0";
  svg.style.left = "0";
  svg.style.width = "100%";
  svg.style.height = "100%";
  svg.setAttribute("aria-hidden", "true");
  svg.style.pointerEvents = "none";

  const idxById = {};
  visible.forEach((t, i) => { idxById[t.id] = i; });

  for (const l of project.links) {
    if (idxById[l.predId] == null || idxById[l.succId] == null) continue;
    const pred = getTaskById(l.predId);
    const succ = getTaskById(l.succId);
    if (!pred || !succ || !pred._earlyStart || !succ._earlyStart) continue;

    const pi = idxById[l.predId];
    const si = idxById[l.succId];

    let x1, x2, y1, y2;
    y1 = pi * rowHeight + 12;
    y2 = si * rowHeight + 12;

    switch (l.type) {
      case "FS":
        x1 = (diffDays(minDate, pred._earlyFinish) + 1) * dayWidth;
        x2 = diffDays(minDate, succ._earlyStart) * dayWidth;
        break;
      case "SS":
        x1 = diffDays(minDate, pred._earlyStart) * dayWidth;
        x2 = diffDays(minDate, succ._earlyStart) * dayWidth;
        break;
      case "FF":
        x1 = (diffDays(minDate, pred._earlyFinish) + 1) * dayWidth;
        x2 = (diffDays(minDate, succ._earlyFinish) + 1) * dayWidth;
        break;
      case "SF":
        x1 = diffDays(minDate, pred._earlyStart) * dayWidth;
        x2 = (diffDays(minDate, succ._earlyFinish) + 1) * dayWidth;
        break;
      default:
        x1 = (diffDays(minDate, pred._earlyFinish) + 1) * dayWidth;
        x2 = diffDays(minDate, succ._earlyStart) * dayWidth;
    }

    const d = `M ${x1} ${y1} L ${x1 + 4} ${y1} L ${x1 + 4} ${y2} L ${x2} ${y2}`;
    const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
    path.setAttribute("d", d);
    if (pred._critical && succ._critical) path.setAttribute("class", "critical");
    svg.appendChild(path);

    const arrow = document.createElementNS("http://www.w3.org/2000/svg", "path");
    arrow.setAttribute("d", `M ${x2-3} ${y2-3} L ${x2} ${y2} L ${x2-3} ${y2+3}`);
    arrow.setAttribute("fill", "none");
    arrow.setAttribute("stroke", pred._critical && succ._critical ? "var(--critical)" : "var(--ink-3)");
    arrow.setAttribute("stroke-width", "1");
    svg.appendChild(arrow);
  }
  return svg;
}

function renderProgressLine(visible, minDate, dayWidth, rowHeight, statusDate) {
  const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
  svg.setAttribute("class", "gantt-progress-line");
  svg.style.position = "absolute";
  svg.style.top = "0";
  svg.style.left = "0";
  svg.style.width = "100%";
  svg.style.height = "100%";

  const points = [];
  visible.forEach((t, i) => {
    if (isSummary(t) || t.isMilestone) return;
    if (!t._earlyStart || !t._earlyFinish) return;
    const p = (t.percentComplete || 0) / 100;
    const taskDays = diffDays(t._earlyStart, t._earlyFinish) + 1;
    const progressedDate = addDays(t._earlyStart, Math.floor(p * taskDays));
    const px = diffDays(minDate, progressedDate) * dayWidth;
    const py = i * rowHeight + 13;
    points.push({ px, py });
  });
  if (!points.length) return null;

  const statusPx = diffDays(minDate, statusDate) * dayWidth;
  let d = "";
  points.forEach((p, i) => {
    d += (i === 0 ? "M " : "L ") + p.px + " " + p.py + " ";
    d += "L " + statusPx + " " + p.py + " ";
  });
  const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
  path.setAttribute("d", d);
  svg.appendChild(path);
  return svg;
}

/* ===============================================================
   CALENDAR VIEW
   =============================================================== */
function renderCalendarView(container) {
  if (!project.tasks.length) {
    container.appendChild(renderEmptyState());
    return;
  }
  const view = el("div", { class:"calendar-view", role:"region", "aria-label": T("view_calendar") });

  const state = project.settings._calView || (project.settings._calView = { year: new Date().getFullYear(), month: new Date().getMonth() });
  const nav = el("div", { style:"display:flex; gap:8px; align-items:center; margin-bottom:12px;" },
    el("button", { class:"btn", type:"button", onClick: () => { state.month--; if (state.month<0) { state.month=11; state.year--; } renderView(); } }, "◀ "+(currentLang==="cs"?"Předchozí":"Previous")),
    el("button", { class:"btn", type:"button", onClick: () => {
      const now = new Date(); state.year = now.getFullYear(); state.month = now.getMonth(); renderView();
    }}, currentLang==="cs"?"Dnes":"Today"),
    el("button", { class:"btn", type:"button", onClick: () => { state.month++; if (state.month>11) { state.month=0; state.year++; } renderView(); } }, (currentLang==="cs"?"Další":"Next")+" ▶"),
  );
  view.appendChild(nav);

  for (let m = 0; m < 2; m++) {
    const year = state.year, month = state.month + m;
    const actualYear = year + Math.floor(month / 12);
    const actualMonth = ((month % 12) + 12) % 12;
    view.appendChild(renderCalendarMonth(actualYear, actualMonth));
  }

  container.appendChild(view);
}

function renderCalendarMonth(year, month) {
  const monthDiv = el("div", { class:"calendar-month" });
  const firstDay = new Date(year, month, 1);
  const monthName = firstDay.toLocaleDateString(currentLang === "cs" ? "cs-CZ" : "en-US", { month:"long", year:"numeric" });
  monthDiv.appendChild(el("h3", { class:"calendar-month-header" }, monthName));

  const grid = el("div", { class:"calendar-grid", role:"grid", "aria-label": monthName });
  const dayNames = currentLang === "cs"
    ? ["Po","Út","St","Čt","Pá","So","Ne"]
    : ["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];
  for (const d of dayNames) {
    grid.appendChild(el("div", { class:"calendar-day-header", role:"columnheader" }, d));
  }

  let dow = (firstDay.getDay() + 6) % 7;
  const daysInPrev = new Date(year, month, 0).getDate();
  for (let i = dow - 1; i >= 0; i--) {
    const d = new Date(year, month - 1, daysInPrev - i);
    grid.appendChild(renderCalendarDay(d, true));
  }

  const daysInMonth = new Date(year, month + 1, 0).getDate();
  for (let i = 1; i <= daysInMonth; i++) {
    const d = new Date(year, month, i);
    grid.appendChild(renderCalendarDay(d, false));
  }

  const total = dow + daysInMonth;
  const trailing = (7 - (total % 7)) % 7;
  for (let i = 1; i <= trailing; i++) {
    const d = new Date(year, month + 1, i);
    grid.appendChild(renderCalendarDay(d, true));
  }

  monthDiv.appendChild(grid);
  return monthDiv;
}

function renderCalendarDay(date, outside) {
  const cell = el("div", { class:"calendar-day" + (outside ? " outside" : ""), role:"gridcell" });
  const cal = getCalendar();
  if (!isWorkingDay(date, cal)) {
    if (date.getDay() === 0 || date.getDay() === 6) cell.classList.add("weekend");
    else cell.classList.add("holiday");
  }
  if (sameDay(date, startOfDay(new Date()))) cell.classList.add("today");

  cell.appendChild(el("div", { class:"calendar-day-num" }, String(date.getDate())));

  for (const t of project.tasks) {
    if (isSummary(t)) continue;
    if (!t._earlyStart || !t._earlyFinish) continue;
    const s = startOfDay(t._earlyStart), f = startOfDay(t._earlyFinish);
    if (date >= s && date <= f) {
      const chip = el("button", {
        type:"button",
        class:"calendar-task-chip" + (t._critical ? " critical" : "") + (t.isMilestone ? " milestone" : ""),
        onClick: () => { focusTask(t.id, false); openTaskDialog(t.id); },
        title: `${t.name} (${formatDateLocale(t.start)} — ${formatDateLocale(t.finish)})`,
        "aria-label": t.name + ", " + formatDateLocale(t.start) + " — " + formatDateLocale(t.finish)
      }, t.name);
      cell.appendChild(chip);
    }
  }
  return cell;
}

/* ===============================================================
   TIMELINE VIEW
   =============================================================== */
function renderTimelineView(container) {
  if (!project.tasks.length) { container.appendChild(renderEmptyState()); return; }

  const view = el("div", { class:"timeline-view", role:"region", "aria-label": T("view_timeline") });

  let minDate = parseDate(project.startDate);
  let maxDate = minDate;
  for (const t of project.tasks) {
    if (t._earlyStart && t._earlyStart < minDate) minDate = new Date(t._earlyStart);
    if (t._earlyFinish && t._earlyFinish > maxDate) maxDate = new Date(t._earlyFinish);
  }
  minDate = addDays(minDate, -3);
  maxDate = addDays(maxDate, 3);

  const info = el("div", { style:"margin-bottom:16px;" },
    el("h2", null, project.name),
    el("p", { class:"muted" },
      formatDateLocale(minDate) + " — " + formatDateLocale(maxDate) +
      " (" + diffDays(minDate, maxDate) + " " + T("days") + ")")
  );
  view.appendChild(info);

  const track = el("div", { class:"timeline-track" });
  const trackWidth = Math.max(1400, diffDays(minDate, maxDate) * 8);
  const totalDays = diffDays(minDate, maxDate) + 1;
  const dayPx = trackWidth / totalDays;

  let d = new Date(minDate);
  d.setDate(1);
  while (d <= maxDate) {
    const px = diffDays(minDate, d) * dayPx;
    if (px > 0 && px < trackWidth) {
      track.appendChild(el("div", { class:"timeline-marker", style:{ left: px+"px" } }));
      track.appendChild(el("div", { class:"timeline-label", style:{ left: px+"px" } },
        d.toLocaleDateString(currentLang === "cs" ? "cs-CZ" : "en-US", { month:"short", year:"numeric" })));
    }
    d.setMonth(d.getMonth() + 1);
  }

  const today = startOfDay(new Date());
  if (today >= minDate && today <= maxDate) {
    const tPx = diffDays(minDate, today) * dayPx;
    track.appendChild(el("div", { class:"timeline-marker", style:{ left: tPx+"px", background:"var(--warning)", width:"2px" } }));
    track.appendChild(el("div", { class:"timeline-label", style:{ left: tPx+"px", top: "140px", background:"var(--warning-bg)", borderColor:"var(--warning)" } },
      currentLang === "cs" ? "Dnes" : "Today"));
  }

  const topTasks = project.tasks.filter(t => t.outlineLevel === 0 || t.isMilestone);
  let yOffset = 0;
  for (const t of topTasks) {
    if (!t._earlyStart) continue;
    const px = diffDays(minDate, t._earlyStart) * dayPx;
    if (t.isMilestone) {
      track.appendChild(el("div", { class:"timeline-bar milestone", style:{ left:(px-7)+"px", top:"80px", width:"14px", height:"14px" },
        title: t.name + " " + formatDateLocale(t.start) }));
      track.appendChild(el("div", { class:"timeline-label", style:{ left:(px+10)+"px", top:"100px", fontSize:"0.75rem" } }, t.name));
    } else if (t._earlyFinish) {
      const w = Math.max(20, (diffDays(t._earlyStart, t._earlyFinish) + 1) * dayPx);
      const bar = el("button", {
        type:"button",
        class:"timeline-bar" + (t._critical ? " critical" : ""),
        style:{ left: px+"px", width: w+"px", top: (40 + yOffset*22) + "px" },
        onClick: () => openTaskDialog(t.id),
        "aria-label": `${t.name}, ${formatDateLocale(t.start)} — ${formatDateLocale(t.finish)}`
      }, t.name);
      track.appendChild(bar);
      yOffset = (yOffset + 1) % 3;
    }
  }

  track.style.width = trackWidth + "px";
  const scroll = el("div", { style:"overflow-x:auto;" }, track);
  view.appendChild(scroll);

  view.appendChild(el("div", { style:"margin-top:24px; display:flex; gap:24px; flex-wrap:wrap;" },
    el("div", null, el("span", { class:"chip critical" }, "■"), " ", currentLang === "cs" ? "Kritická cesta" : "Critical path"),
    el("div", null, el("span", { class:"chip" }, "◆"), " ", currentLang === "cs" ? "Milník" : "Milestone"),
    el("div", null, el("span", { class:"chip info" }, "│"), " ", currentLang === "cs" ? "Dnes" : "Today"),
  ));

  container.appendChild(view);
}

/* ===============================================================
   KANBAN VIEW
   =============================================================== */
function renderKanban(container) {
  if (!project.tasks.length) { container.appendChild(renderEmptyState()); return; }

  const columns = [
    { key: "not_started", label: T("not_started"), filter: t => !t.percentComplete },
    { key: "in_progress", label: T("in_progress"), filter: t => t.percentComplete > 0 && t.percentComplete < 100 },
    { key: "completed",   label: T("completed"),   filter: t => t.percentComplete >= 100 },
  ];

  const board = el("div", { class:"kanban-board", role:"region", "aria-label": T("view_kanban") });
  for (const col of columns) {
    const tasks = project.tasks.filter(t => !isSummary(t) && col.filter(t));
    const column = el("div", { class:"kanban-column", role:"list", "aria-label": col.label });
    column.appendChild(el("div", { class:"kanban-column-header" },
      el("span", null, col.label),
      el("span", { class:"chip" }, String(tasks.length))
    ));
    const body = el("div", { class:"kanban-column-body" });
    for (const t of tasks) {
      const card = el("div", {
        class:"kanban-card" + (t._critical ? " critical" : ""),
        role:"listitem",
        tabIndex: 0,
        dataset: { taskId: t.id },
        "aria-selected": selection.has(t.id) ? "true" : "false",
        "aria-label": `${t.name}, ${t.percentComplete||0}%, ${formatDateLocale(t.finish)}`,
        onClick: (ev) => handleRowClick(ev, t),
        onDblclick: () => openTaskDialog(t.id),
        onKeydown: (ev) => {
          if (ev.key === "Enter") { ev.preventDefault(); openTaskDialog(t.id); }
        },
      });
      card.appendChild(el("div", { class:"kanban-card-title" }, t.name));
      const meta = el("div", { class:"kanban-card-meta" });
      if (t.wbs) meta.appendChild(el("span", { class:"chip" }, t.wbs));
      if (t.finish) meta.appendChild(el("span", null, formatDateLocale(t.finish)));
      if (t._critical) meta.appendChild(el("span", { class:"chip critical" }, T("critical")));
      if (t.isMilestone) meta.appendChild(el("span", { class:"chip" }, "◆ "+T("milestone")));
      if (t.percentComplete > 0) meta.appendChild(el("span", null, (t.percentComplete||0)+"%"));
      card.appendChild(meta);
      body.appendChild(card);
    }
    column.appendChild(body);
    board.appendChild(column);
  }
  container.appendChild(board);
}

/* ===============================================================
   NETWORK DIAGRAM
   =============================================================== */
function renderNetwork(container) {
  if (!project.tasks.length) { container.appendChild(renderEmptyState()); return; }

  const view = el("div", { class:"network-view", role:"region", "aria-label": T("view_network") });
  const canvas = el("div", { class:"network-canvas" });

  const topo = topoSort();
  const byId = {};
  for (const t of project.tasks) byId[t.id] = t;

  const levels = {};
  for (const id of topo) {
    const preds = getPredecessors(id);
    let level = 0;
    for (const l of preds) {
      const pLevel = levels[l.predId];
      if (pLevel != null) level = Math.max(level, pLevel + 1);
    }
    levels[id] = level;
  }

  const byLevel = {};
  for (const id of topo) {
    const t = byId[id];
    if (!t || isSummary(t)) continue;
    const lv = levels[id] || 0;
    (byLevel[lv] = byLevel[lv] || []).push(t);
  }

  const colWidth = 200;
  const rowHeight = 120;
  const positions = {};

  Object.keys(byLevel).sort((a,b) => (+a)-(+b)).forEach(lv => {
    const tasks = byLevel[lv];
    const levelNum = +lv;
    tasks.forEach((t, i) => {
      positions[t.id] = {
        x: 40 + levelNum * colWidth,
        y: 40 + i * rowHeight
      };
    });
  });

  const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
  svg.setAttribute("class", "network-svg");
  canvas.appendChild(svg);

  for (const t of project.tasks) {
    if (isSummary(t)) continue;
    const pos = positions[t.id];
    if (!pos) continue;
    const node = el("div", {
      class: "network-node" +
        (t._critical && project.settings.showCritical !== false ? " critical" : "") +
        (t.isMilestone ? " milestone" : ""),
      style: { left: pos.x + "px", top: pos.y + "px" },
      tabIndex: 0,
      role: "button",
      "aria-label": `${t.name}, ${T("duration")} ${formatDuration(t.duration, t.durationUnit)}, ${formatDateLocale(t.start)} — ${formatDateLocale(t.finish)}`,
      "aria-selected": selection.has(t.id) ? "true" : "false",
      dataset: { taskId: t.id },
      onClick: (ev) => handleRowClick(ev, t),
      onDblclick: () => openTaskDialog(t.id),
    });
    node.appendChild(el("div", null,
      el("div", { class:"network-node-name" }, (getTaskIndex(t.id)+1) + ". " + t.name),
      el("div", { class:"network-node-meta" },
        T("start") + ": " + formatDateLocale(t.start), el("br"),
        T("finish") + ": " + formatDateLocale(t.finish), el("br"),
        T("duration") + ": " + formatDuration(t.duration, t.durationUnit), el("br"),
        T("slack") + ": " + (t._totalSlack || 0) + " d",
      )
    ));
    canvas.appendChild(node);
  }

  for (const l of project.links) {
    const p1 = positions[l.predId];
    const p2 = positions[l.succId];
    if (!p1 || !p2) continue;
    const x1 = p1.x + 160;
    const y1 = p1.y + 30;
    const x2 = p2.x;
    const y2 = p2.y + 30;
    const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
    const midX = (x1 + x2) / 2;
    path.setAttribute("d", `M ${x1} ${y1} C ${midX} ${y1}, ${midX} ${y2}, ${x2} ${y2}`);
    const pred = getTaskById(l.predId), succ = getTaskById(l.succId);
    if (pred && succ && pred._critical && succ._critical) path.setAttribute("class", "critical");
    svg.appendChild(path);

    const arrow = document.createElementNS("http://www.w3.org/2000/svg", "path");
    arrow.setAttribute("d", `M ${x2-8} ${y2-4} L ${x2} ${y2} L ${x2-8} ${y2+4}`);
    arrow.setAttribute("fill", "none");
    arrow.setAttribute("stroke", (pred && succ && pred._critical && succ._critical) ? "var(--critical)" : "var(--ink-3)");
    arrow.setAttribute("stroke-width", "1.5");
    svg.appendChild(arrow);
  }

  const posVals = Object.values(positions);
  const maxX = posVals.length ? Math.max(...posVals.map(p => p.x + 160)) + 40 : 800;
  const maxY = posVals.length ? Math.max(...posVals.map(p => p.y + 60)) + 40 : 600;
  canvas.style.minWidth = maxX + "px";
  canvas.style.minHeight = maxY + "px";
  svg.setAttribute("viewBox", `0 0 ${maxX} ${maxY}`);
  svg.style.width = maxX + "px";
  svg.style.height = maxY + "px";

  view.appendChild(canvas);
  container.appendChild(view);
}

/* ===============================================================
   INSPECTOR PANEL
   =============================================================== */
function updateInspector() {
  const panel = $("#inspectorPanel");
  const body = $("#inspectorBody");
  if (!focusedTaskId) {
    panel.classList.remove("open");
    panel.setAttribute("aria-hidden", "true");
    return;
  }
  const t = getTaskById(focusedTaskId);
  if (!t) { panel.classList.remove("open"); panel.setAttribute("aria-hidden","true"); return; }

  body.innerHTML = "";

  body.appendChild(el("div", { class:"inspector-section" },
    el("h3", null, currentLang === "cs" ? "Úkol" : "Task"),
    el("div", { style:"font-weight:600; font-size:1rem;" }, (getTaskIndex(t.id)+1) + ". " + t.name),
    el("div", { class:"muted", style:"font-size:0.82rem;" }, "WBS: " + t.wbs),
    el("div", { style:"margin-top:8px; display:flex; gap:6px; flex-wrap:wrap;" },
      el("button", { class:"btn", type:"button", onClick: () => openTaskDialog(t.id) }, T("edit")),
      t.manual ? el("span", { class:"chip warn" }, T("manual")) : null,
      t._critical ? el("span", { class:"chip critical" }, T("critical")) : null,
      t.isMilestone ? el("span", { class:"chip" }, "◆ "+T("milestone")) : null,
      isSummary(t) ? el("span", { class:"chip" }, T("summary")) : null,
    )
  ));

  body.appendChild(el("div", { class:"inspector-section" },
    el("h3", null, currentLang === "cs" ? "Rozvrh" : "Schedule"),
    infoRow(T("start"), formatDateLocale(t.start)),
    infoRow(T("finish"), formatDateLocale(t.finish)),
    infoRow(T("duration"), formatDuration(t.duration, t.durationUnit)),
    infoRow(T("percent"), (t.percentComplete||0) + " %"),
    infoRow(T("slack"), (t._totalSlack||0) + " " + T("days")),
    t.deadline ? infoRow(T("deadline"), formatDateLocale(t.deadline)) : null,
    t.constraint && t.constraint !== "asap" ? infoRow(T("constraint"), t.constraint + (t.constraintDate ? " " + formatDateLocale(t.constraintDate) : "")) : null,
  ));

  const factors = analyzeTaskSchedule(t);
  if (factors.length) {
    const why = el("div", { class:"inspector-section" },
      el("h3", null, currentLang === "cs" ? "Proč tento rozvrh?" : "Why this schedule?"));
    for (const f of factors) {
      why.appendChild(el("div", { class: "inspector-factor" + (f.kind === "warn" ? " warn" : f.kind === "err" ? " err" : "") }, f.text));
    }
    body.appendChild(why);
  }

  const preds = getPredecessors(t.id);
  if (preds.length) {
    const ps = el("div", { class:"inspector-section" }, el("h3", null, T("predecessors")));
    for (const l of preds) {
      const p = getTaskById(l.predId);
      if (!p) continue;
      ps.appendChild(el("div", { class:"inspector-factor" },
        (getTaskIndex(p.id)+1) + ". " + p.name + " (" + l.type + (l.lag ? (l.lag > 0 ? "+" : "") + l.lag + "d" : "") + ")"
      ));
    }
    body.appendChild(ps);
  }

  const succs = getSuccessors(t.id);
  if (succs.length) {
    const ss = el("div", { class:"inspector-section" }, el("h3", null, T("successors")));
    for (const l of succs) {
      const s = getTaskById(l.succId);
      if (!s) continue;
      ss.appendChild(el("div", { class:"inspector-factor" },
        (getTaskIndex(s.id)+1) + ". " + s.name + " (" + l.type + ")"
      ));
    }
    body.appendChild(ss);
  }

  if (t.notes) {
    body.appendChild(el("div", { class:"inspector-section" },
      el("h3", null, T("notes")),
      el("div", { style:"white-space:pre-wrap; font-size:0.85rem;" }, t.notes)
    ));
  }

  panel.classList.add("open");
  panel.setAttribute("aria-hidden", "false");
}

function infoRow(label, value) {
  if (value == null || value === "") return null;
  return el("div", { style:"display:flex; justify-content:space-between; padding:2px 0; font-size:0.85rem;" },
    el("span", { class:"muted" }, label),
    el("span", null, value)
  );
}

function analyzeTaskSchedule(t) {
  const out = [];
  if (t.manual) {
    out.push({ kind:"warn", text: currentLang === "cs" ? "Úkol je plánován ručně." : "Task is manually scheduled." });
  }
  const preds = getPredecessors(t.id);
  if (preds.length) {
    out.push({ kind:"info", text: (currentLang === "cs" ? "Start je určen vazbou na úkol(y) " : "Driven by link to task(s) ") + preds.map(l => (getTaskIndex(l.predId)+1) + " (" + l.type + ")").join(", ") });
  } else if (!t.manual && (!t.constraint || t.constraint === "asap")) {
    out.push({ kind:"info", text: currentLang === "cs" ? "Úkol začíná co nejdřív od začátku projektu." : "Task starts as soon as possible." });
  }
  if (t.constraint && t.constraint !== "asap") {
    out.push({ kind:"info", text: (currentLang === "cs" ? "Omezení: " : "Constraint: ") + t.constraint + (t.constraintDate ? " " + formatDateLocale(t.constraintDate) : "") });
  }
  if (t.deadline && t._earlyFinish) {
    const dl = parseDate(t.deadline);
    if (dl && t._earlyFinish > dl) {
      out.push({ kind:"err", text: (currentLang === "cs" ? "Překročen deadline! Cíl: " : "Past deadline! Target: ") + formatDateLocale(dl) });
    }
  }
  if (t._critical) {
    out.push({ kind:"warn", text: currentLang === "cs" ? "Úkol je na kritické cestě." : "Task is on critical path." });
  }
  if (t.calendarId) {
    const cal = getCalendar(t.calendarId);
    out.push({ kind:"info", text: (currentLang === "cs" ? "Kalendář: " : "Calendar: ") + cal.name });
  }
  return out;
}

/* ===============================================================
   DIALOG HELPERS
   =============================================================== */
function buildDialog(dlgId, titleId, title, bodyBuilder, footerBuilder) {
  const dlg = $("#" + dlgId);
  dlg.innerHTML = "";
  const header = el("div", { class:"dialog-header" },
    el("h2", { id: titleId }, title),
    el("button", { type:"button", "aria-label": T("close"), onClick: () => dlg.close() }, "×")
  );
  dlg.appendChild(header);
  const body = el("div", { class:"dialog-body" });
  bodyBuilder(body);
  dlg.appendChild(body);
  if (footerBuilder) {
    const footer = el("div", { class:"dialog-footer" });
    footerBuilder(footer);
    dlg.appendChild(footer);
  }
  return dlg;
}

function openDialog(dlg) {
  if (typeof dlg.showModal === "function") dlg.showModal();
  else dlg.setAttribute("open", "");
  setTimeout(() => {
    const f = dlg.querySelector(".dialog-body input, .dialog-body select, .dialog-body textarea, .dialog-body button");
    if (f) f.focus();
  }, 50);
}

function promptDialog(title, label, defaultValue) {
  return new Promise(resolve => {
    let resolved = false;
    const doResolve = (v) => { if (!resolved) { resolved = true; resolve(v); } };
    const dlg = buildDialog("dlgPrompt", "dlgPromptTitle", title, (body) => {
      body.appendChild(el("div", { class:"form-row full" },
        el("label", { for:"promptInput" }, label),
        el("input", { id:"promptInput", type:"text", value: defaultValue || "" })
      ));
    }, (footer) => {
      footer.appendChild(el("button", { class:"btn", type:"button", onClick: () => { dlg.close(); doResolve(null); } }, T("cancel")));
      footer.appendChild(el("button", { class:"btn primary", type:"button", onClick: () => { const v=$("#promptInput").value; dlg.close(); doResolve(v); } }, T("ok")));
    });
    dlg.addEventListener("close", () => doResolve(null), { once:true });
    openDialog(dlg);
    const input = $("#promptInput");
    input.addEventListener("keydown", (ev) => { if (ev.key==="Enter") { const v=input.value; dlg.close(); doResolve(v); } });
  });
}

function confirmDialog(title, message) {
  return new Promise(resolve => {
    let resolved = false;
    const doResolve = (v) => { if (!resolved) { resolved = true; resolve(v); } };
    const dlg = buildDialog("dlgConfirm", "dlgConfirmTitle", title, (body) => {
      body.appendChild(el("div", null, message));
    }, (footer) => {
      footer.appendChild(el("button", { class:"btn", type:"button", onClick: () => { dlg.close(); doResolve(false); } }, T("cancel")));
      footer.appendChild(el("button", { class:"btn danger", type:"button", onClick: () => { dlg.close(); doResolve(true); } }, T("ok")));
    });
    dlg.addEventListener("close", () => doResolve(false), { once:true });
    openDialog(dlg);
  });
}

      if (!project.customFields.length) {

function saveTaskDialog(editing, draft) {
  const name = $("#tskName").value.trim();
  if (!name) { toast(currentLang === "cs" ? "Název nesmí být prázdný" : "Name required", "warn"); return; }
  const durStr = $("#tskDuration").value;
  const pd = parseDurationString(durStr);
  const patch = {
    name,
    duration: pd.duration,
    durationUnit: pd.unit,
    percentComplete: clamp(parseInt($("#tskPercent").value, 10) || 0, 0, 100),
    deadline: $("#tskDeadline").value || null,
    isMilestone: $("#tskMilestone").checked,
    manual: $("#tskManual").checked,
    constraint: $("#tskConstraint").value,
    constraintDate: $("#tskConstraintDate").value || null,
    priority: parseInt($("#tskPriority").value, 10) || 500,
    calendarId: $("#tskCalendar").value || null,
    notes: $("#tskNotes").value,
  };
  const o = $("#tskOpt").value, lk = $("#tskLikely").value, ps = $("#tskPess").value;
  patch.optDuration = o === "" ? null : parseFloat(o);
  patch.likelyDuration = lk === "" ? null : parseFloat(lk);
  patch.pessDuration = ps === "" ? null : parseFloat(ps);

  if ($("#tskStart").value) patch.start = $("#tskStart").value;
  if ($("#tskFinish").value) patch.finish = $("#tskFinish").value;

  if (patch.isMilestone) patch.duration = 0;

  const cvals = {};
  for (const cf of project.customFields) {
    const inp = $("#cf_" + cf.id);
    if (!inp) continue;
    if (cf.kind === "flag") cvals[cf.id] = inp.checked;
    else if (cf.kind === "number") cvals[cf.id] = inp.value === "" ? null : parseFloat(inp.value);
    else if (cf.kind === "formula") continue;
    else cvals[cf.id] = inp.value;
  }
  patch.customValues = cvals;

  if (editing) {
    updateTask(draft.id, patch);
  } else {
    addTask(patch);
  }
  $("#dlgTask").close();
  sfx("save");
}

function saveBaseline(index) {
  action(currentLang==="cs"?"Uložit baseline":"Save baseline", () => {
    const tasks = {};
    for (const t of project.tasks) {
      tasks[t.id] = {
        start: t.start, finish: t.finish,
        duration: t.duration, durationUnit: t.durationUnit
      };
    }
    const existing = project.baselines.findIndex(b => b.index === index);
    const b = {
      index,
      name: "Baseline " + (index === 0 ? "0" : index),
      savedAt: formatDate(new Date()),
      tasks
    };
    if (existing >= 0) project.baselines[existing] = b;
    else project.baselines.push(b);
  });
  toast(currentLang==="cs"?"Baseline uložena":"Baseline saved", "ok");
  sfx("save");
}

          row.append(fieldSel, opSel, valInput,

              onClick: () => { filterDef.rules.splice(i,1); refreshRules(); }}, "×"));
          rulesList.appendChild(row);
        });
      }
      refreshRules();

      body.appendChild(el("div", { style:"margin-top:8px; display:flex; gap:8px; align-items:center; flex-wrap:wrap;" },
        el("button", { class:"btn", type:"button", onClick: () => {
          filterDef.rules.push({ field:"name", op:"contains", value:"" });

        }}, currentLang==="cs"?"+ Přidat pravidlo":"+ Add rule"),
        el("label", null,
          el("input", { type:"radio", name:"combine", value:"and",

function openSearchDialog() {
  const dlg = buildDialog("dlgSearch", "dlgSearchTitle",
    currentLang==="cs"?"Hledání":"Search",
    (body) => {
      body.appendChild(el("div", { class:"form-row full" },
        el("label", { for:"searchQuery" }, currentLang==="cs"?"Hledaný text":"Search text"),
        el("input", { id:"searchQuery", type:"text", autofocus:true,
          onInput: () => runSearch($("#searchQuery").value) })));
      body.appendChild(el("div", { id:"searchResults", role:"region", "aria-live":"polite",
        style:"max-height:400px; overflow-y:auto; margin-top:8px;" }));

      function runSearch(q) {
        const results = $("#searchResults");
        results.innerHTML = "";
        if (!q || q.length < 2) return;
        const lower = q.toLowerCase();
        let found = 0;
        for (const t of project.tasks) {
          const hay = (t.name + " " + (t.notes || "") + " " + (t.wbs || "")).toLowerCase();
          if (hay.includes(lower)) {
            found++;
            const item = el("button", { type:"button",

/* ===============================================================
   MONTE CARLO
   =============================================================== */
function sampleTriangular(a, b, c) {
  const u = Math.random();
  const f = (b - a) / (c - a);
  if (u < f) return a + Math.sqrt(u * (c - a) * (b - a));
  else return c - Math.sqrt((1 - u) * (c - a) * (c - b));
}

function openMonteCarloDialog() {
  const dlg = buildDialog("dlgMonteCarlo", "dlgMonteCarloTitle",
    "Monte Carlo",
    (body) => {
      body.appendChild(el("p", null,
        currentLang==="cs"
          ? "Simulace pomocí tří-bodového odhadu (optimistický / nejpravděpodobnější / pesimistický). Úkoly bez odhadu použijí standardní trvání."
          : "Simulation using three-point estimates. Tasks without estimates use standard duration."));

      const allLeaves = project.tasks.filter(t => !isSummary(t) && !t.isMilestone);
      const hasEst = allLeaves.filter(t => t.optDuration != null && t.likelyDuration != null && t.pessDuration != null);
      body.appendChild(el("p", { class:"muted" },
        (currentLang==="cs" ? "Úkolů s odhadem: " : "Tasks with estimates: ") + hasEst.length + " / " + allLeaves.length));

      body.appendChild(el("div", { class:"form-row" },
        el("label", { for:"mcIters" }, currentLang==="cs"?"Iterací":"Iterations"),
        el("input", { id:"mcIters", type:"number", min:"100", max:"10000", step:"100", value:"1000" })));

      body.appendChild(el("button", { class:"btn primary", type:"button", onClick: runSimulation },
        currentLang==="cs"?"Spustit simulaci":"Run simulation"));

      const results = el("div", { id:"mcResults", style:"margin-top:16px;", "aria-live":"polite" });
      body.appendChild(results);

      function runSimulation() {
        const iters = clamp(parseInt($("#mcIters").value, 10) || 1000, 100, 10000);
        results.innerHTML = "<p>" + (currentLang==="cs"?"Simulace běží…":"Running…") + "</p>";

        setTimeout(() => {
          const criticalLeaves = project.tasks.filter(t => !isSummary(t) && !t.isMilestone && t._critical);
          const toSimulate = criticalLeaves.length ? criticalLeaves : allLeaves;
          const durations = [];
          for (let i = 0; i < iters; i++) {
            let total = 0;
            for (const t of toSimulate) {
              let d;
              if (t.optDuration != null && t.likelyDuration != null && t.pessDuration != null
                  && t.optDuration <= t.likelyDuration && t.likelyDuration <= t.pessDuration) {
                d = sampleTriangular(t.optDuration, t.likelyDuration, t.pessDuration);
              } else {
                d = durationToDays(t.duration, t.durationUnit, getTaskCalendar(t));
              }
              total += d;
            }
            durations.push(total);
          }
          durations.sort((a,b) => a-b);
          const pctl = (p) => durations[Math.floor(iters * p)];
          const mean = durations.reduce((a,b)=>a+b, 0) / iters;
          const projStart = parseDate(project.startDate);
          const cal = getCalendar();

          results.innerHTML = "";
          results.appendChild(el("h3", null, currentLang==="cs"?"Výsledky":"Results"));
          results.appendChild(el("p", { class:"muted" },
            currentLang==="cs"
              ? `Simulováno ${iters} iterací na ${toSimulate.length} úkolech${criticalLeaves.length ? " kritické cesty" : ""}.`
              : `Simulated ${iters} iterations on ${toSimulate.length} ${criticalLeaves.length ? "critical-path " : ""}tasks.`));

          const table = el("table", { class:"data-table" });
          table.appendChild(el("thead", null, el("tr", null,
            el("th", null, currentLang==="cs"?"Percentil":"Percentile"),
            el("th", null, currentLang==="cs"?"Trvání (prac. dní)":"Duration (work days)"),
            el("th", null, currentLang==="cs"?"Odhad. dokončení":"Est. finish")
          )));
          const tbody = el("tbody");
          for (const [lab, val] of [
            ["P10", pctl(0.10)], ["P50 (median)", pctl(0.5)],
            ["P80 ★", pctl(0.8)], ["P90", pctl(0.9)], ["P95", pctl(0.95)],
            [currentLang==="cs"?"Průměr":"Mean", mean]
          ]) {
            tbody.appendChild(el("tr", null,
              el("td", null, lab),
              el("td", null, Math.round(val) + " d"),
              el("td", null, formatDateLocale(addWorkingDays(projStart, Math.round(val), cal)))));
          }
          table.appendChild(tbody);
          results.appendChild(table);

          // Histogram
          const bins = 20;
          const min = durations[0], max = durations[durations.length-1];
          const binWidth = Math.max(0.001, (max - min) / bins);
          const counts = new Array(bins).fill(0);
          for (const d of durations) {
            const b = Math.min(bins-1, Math.floor((d - min) / binWidth));
            counts[b]++;
          }
          const maxCount = Math.max(...counts);
          const histo = el("div", { style:"margin-top:12px; display:flex; align-items:flex-end; height:80px; gap:1px; border-bottom:2px solid var(--ink);",
            "aria-label": currentLang==="cs"?"Rozložení pravděpodobnosti":"Probability distribution" });
          counts.forEach(c => {
            histo.appendChild(el("div", {
              style:{ flex:"1", height: (c/maxCount*100)+"%", background:"var(--primary)" }
            }));
          });
          results.appendChild(el("h4", null, currentLang==="cs"?"Rozložení":"Distribution"));
          results.appendChild(histo);
          results.appendChild(el("div", { class:"muted", style:"display:flex; justify-content:space-between; font-size:0.75rem;" },
            el("span", null, Math.round(min)+" d"),
            el("span", null, Math.round(max)+" d")));

          announce(currentLang==="cs"?"Simulace dokončena":"Simulation complete");
          sfx("ok");
        }, 50);
      }
    },
    (footer) => {
      footer.appendChild(el("button", { class:"btn", type:"button", onClick: () => dlg.close() }, T("close")));
    });
  openDialog(dlg);
}

/* ===============================================================
   VALIDATION
   =============================================================== */
function runValidation() {
  const issues = [];
  // Cycles
  const visited = new Set(), stk = new Set();
  function hasCycle(id) {
    if (stk.has(id)) return true;
    if (visited.has(id)) return false;
    stk.add(id);
    for (const l of project.links) {
      if (l.predId === id) {
        if (hasCycle(l.succId)) return true;
      }
    }
    stk.delete(id);
    visited.add(id);
    return false;
  }
  for (const t of project.tasks) {
    if (hasCycle(t.id)) {
      issues.push({ severity:"err", text: currentLang==="cs"?"Cyklus v závislostech!":"Dependency cycle!" });
      break;
    }
  }

  for (const t of project.tasks) {
    if (!t.name || !t.name.trim()) {
      issues.push({ severity:"warn", text: currentLang==="cs"?"Úkol bez názvu":"Task without name", taskId: t.id });
    }
    if (!isSummary(t) && !t.isMilestone && (t.duration == null || t.duration < 0)) {
      issues.push({ severity:"warn", text: (currentLang==="cs"?"Neplatné trvání: ":"Invalid duration: ") + t.name, taskId: t.id });
    }
    if (t.deadline && t._earlyFinish) {
      const dl = parseDate(t.deadline);
      if (dl && t._earlyFinish > dl) {
        issues.push({ severity:"err",
          text: (currentLang==="cs"?"Překročen deadline: ":"Past deadline: ") + t.name + " (" + formatDateLocale(dl) + ")",
          taskId: t.id });
      }
    }
    if (t.constraint === "snlt" && t.constraintDate && t._earlyStart) {
      const cd = parseDate(t.constraintDate);
      if (cd && t._earlyStart > cd) {
        issues.push({ severity:"err",
          text: (currentLang==="cs"?"Porušeno omezení SNLT: ":"SNLT constraint violated: ") + t.name,
          taskId: t.id });
      }
    }
    if (t.constraint === "fnlt" && t.constraintDate && t._earlyFinish) {
      const cd = parseDate(t.constraintDate);
      if (cd && t._earlyFinish > cd) {
        issues.push({ severity:"err",
          text: (currentLang==="cs"?"Porušeno omezení FNLT: ":"FNLT constraint violated: ") + t.name,
          taskId: t.id });
      }
    }
    if (isSummary(t) && (t.manual || (t.constraint && t.constraint !== "asap"))) {
      issues.push({ severity:"warn",
        text: (currentLang==="cs"?"Souhrnný úkol s vlastním nastavením: ":"Summary task has scheduling: ") + t.name,
        taskId: t.id });
    }
  }
  // Orphan links
  for (const l of project.links) {
    if (!getTaskById(l.predId) || !getTaskById(l.succId)) {
      issues.push({ severity:"warn", text: currentLang==="cs"?"Vazba na neexistující úkol":"Link to missing task" });
    }
  }
  return issues;
}

function openValidateDialog() {
  const dlg = buildDialog("dlgValidate", "dlgValidateTitle",

      const issues = runValidation();

        [currentLang==="cs"?"Kritických":"Critical", nCritical, nCritical ? "critical" : ""],
        [currentLang==="cs"?"Dokončených":"Completed", nCompleted, "done"],
        [currentLang==="cs"?"Probíhá":"In progress", nInProgress, ""],
        [currentLang==="cs"?"Zpožděných":"Overdue", overdue, overdue ? "critical" : ""],
        [currentLang==="cs"?"Porušení deadline":"Deadline breaches", deadlineBreaches, deadlineBreaches ? "critical" : ""],

        body.appendChild(el("h3", { style:"margin-top:16px;" }, currentLang==="cs"?"Zpožděné úkoly":"Overdue tasks"));

        const rt = el("table", { class:"data-table" });

        )));

            el("td", null, r.name),

            el("td", null, r.status || "—")
          ));
        }
        rt.appendChild(rtb);
        body.appendChild(rt);
      }
    },
    (footer) => {

        currentLang==="cs"?"Tisk":"Print"));

    });
  openDialog(dlg);
}

/* ===============================================================
   STORAGE (localStorage)
   =============================================================== */
const STORAGE_KEY = "projektor_project";

function saveState() {
  if (!project || project.settings.autosave === false) return;
  try {
    const clone = JSON.parse(JSON.stringify(project, (k, v) => {
      if (k.startsWith("_")) return undefined;
      return v;
    }));
    localStorage.setItem(STORAGE_KEY, JSON.stringify(clone));
    const st = $("#statusSaved");
    if (st) st.textContent = (currentLang==="cs" ? "Uloženo " : "Saved ") + new Date().toLocaleTimeString();
  } catch(e) {
    console.error("saveState failed", e);
  }
}

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return null;
    return JSON.parse(raw);
  } catch(e) {
    console.error("loadState failed", e);
    return null;
  }
}

/* ===============================================================
   FILE SAVE / LOAD
   =============================================================== */
function downloadFile(content, filename, mime) {
  const blob = new Blob([content], { type: mime || "application/octet-stream" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = filename;
  document.body.appendChild(a);
  a.click();
  setTimeout(() => { document.body.removeChild(a); URL.revokeObjectURL(url); }, 100);
}

function saveProjectToFile() {
  const clone = JSON.parse(JSON.stringify(project, (k, v) => k.startsWith("_") ? undefined : v));
  const json = JSON.stringify(clone, null, 2);
  const fname = (project.name || "projekt").replace(/[^a-z0-9]/gi, "_") + ".projektor.json";
  downloadFile(json, fname, "application/json");
  toast(T("toast_saved"), "ok");
  sfx("save");
}

function loadProjectFromFile() {
  const input = document.createElement("input");
  input.type = "file";
  input.accept = ".json,application/json";
  input.addEventListener("change", (ev) => {
    const file = ev.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const data = JSON.parse(e.target.result);
        loadProjectData(data);
        toast(T("toast_loaded"), "ok");
        sfx("load");
      } catch(err) {
        toast(T("toast_error") + ": " + err.message, "err");
        sfx("error");
      }
    };
    reader.readAsText(file);
  });
  input.click();
}

function loadProjectData(data) {
  if (!data || typeof data !== "object") throw new Error("Invalid data");
  const base = newProject();
  project = Object.assign(base, data);
  if (!project.settings) project.settings = base.settings;
  else {
    // merge missing settings
    for (const k of Object.keys(base.settings)) {
      if (project.settings[k] === undefined) project.settings[k] = base.settings[k];
    }
  }
  if (!project.calendars || !project.calendars.length) project.calendars = base.calendars;
  if (!project.tasks) project.tasks = [];
  if (!project.links) project.links = [];
  if (!project.baselines) project.baselines = [];
  if (!project.customFields) project.customFields = [];
  if (!project.risks) project.risks = [];
  if (!project.nextId) project.nextId = project.tasks.length + 1;
  history.stack = []; history.pointer = -1;
  snapshot("initial");
  schedule();
  recomputeWBS();
  renderAll();
  saveState();
}

function exportAs(format) {
  const fname = (project.name || "projekt").replace(/[^a-z0-9]/gi, "_");
  switch (format) {
    case "json": saveProjectToFile(); return;
    case "csv":  downloadFile(exportCSV(","), fname + ".csv", "text/csv"); break;
    case "tsv":  downloadFile(exportCSV("\t"), fname + ".tsv", "text/tab-separated-values"); break;
    case "md":   downloadFile(exportMarkdown(), fname + ".md", "text/markdown"); break;
    case "html": downloadFile(exportHTML(), fname + ".html", "text/html"); break;
    case "ical": downloadFile(exportICal(), fname + ".ics", "text/calendar"); break;
    case "mspdi": downloadFile(exportMSPDI(), fname + ".xml", "application/xml"); break;
  }
  toast((currentLang==="cs"?"Exportováno: ":"Exported: ") + format.toUpperCase(), "ok");
  sfx("save");
}

function exportCSV(sep) {
  const headers = ["ID","WBS","Name","Duration","Unit","Start","Finish","Percent","Deadline","Priority","Critical","Milestone","Predecessors","Notes"];
  const quote = (val) => {
    const s = String(val == null ? "" : val);
    if (s.includes(sep) || s.includes("\"") || s.includes("\n")) {
      return "\"" + s.replace(/"/g, "\"\"") + "\"";
    }
    return s;
  };
  const rows = [headers.map(quote).join(sep)];
  for (const t of project.tasks) {
    const row = [
      getTaskIndex(t.id) + 1, t.wbs || "", t.name || "",
      t.duration, t.durationUnit, t.start || "", t.finish || "",
      t.percentComplete || 0, t.deadline || "", t.priority || "",
      t._critical ? "1" : "0", t.isMilestone ? "1" : "0",
      predecessorsAsString(t.id), (t.notes || "").replace(/\n/g, " ")
    ];
    rows.push(row.map(quote).join(sep));
  }
  return rows.join("\n");
}

    const indent = "&nbsp;".repeat(t.outlineLevel * 4);
    const nameCell = indent + (isSummary(t) ? "**" : "") + (t.isMilestone ? "◆ " : "") + t.name + (isSummary(t) ? "**" : "");
    lines.push("| " + (getTaskIndex(t.id)+1) + " | " + (t.wbs||"") + " | " + nameCell + " | " +
