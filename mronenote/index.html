<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Mronenote</title>
<style>
:root{
  --bg:#ffffff; --fg:#1b1b1b; --muted:#5a5a5a; --line:#c9c9c9;
  --panel:#f4f4f4; --panel2:#eaeaea; --accent:#5b2d90; --accent-fg:#ffffff;
  --sel:#e3d7f2; --warn:#8a3b00; --ok:#0f5c2e; --err:#8a1220;
  --focus:#0b57d0;
  --fs:16px;
}
html[data-theme="dark"]{
  --bg:#1a1a1a; --fg:#f0f0f0; --muted:#b8b8b8; --line:#555;
  --panel:#242424; --panel2:#2f2f2f; --accent:#c0a3e8; --accent-fg:#1a1a1a;
  --sel:#3a2d4d; --warn:#ffbb77; --ok:#7fe0a8; --err:#ff9aa6; --focus:#8ab4f8;
}
html[data-theme="contrast"]{
  --bg:#000; --fg:#fff; --muted:#fff; --line:#fff;
  --panel:#000; --panel2:#000; --accent:#ffff00; --accent-fg:#000;
  --sel:#00407a; --warn:#ffff00; --ok:#00ff00; --err:#ff6060; --focus:#ffff00;
}
*{box-sizing:border-box}
html{font-size:var(--fs)}
body{margin:0;background:var(--bg);color:var(--fg);
 font-family:"Segoe UI",system-ui,-apple-system,"Noto Sans",Arial,sans-serif;line-height:1.5}
a{color:var(--accent)}
html[data-theme="contrast"] a{color:var(--accent)}
:focus-visible{outline:3px solid var(--focus);outline-offset:2px}
.skiplink{position:absolute;left:-9999px;top:0;background:var(--accent);color:var(--accent-fg);padding:.5rem 1rem;z-index:50}
.skiplink:focus{left:0}
header.apphdr{border-bottom:2px solid var(--line);padding:.4rem .6rem;background:var(--panel)}
.appname{font-size:.85rem;color:var(--muted);margin:0 0 .15rem}
h1{font-size:1.35rem;margin:0 0 .3rem}
button,select,input[type=text],input[type=search],input[type=number],textarea{
 font:inherit;color:var(--fg);background:var(--bg);border:1px solid var(--line);
 border-radius:4px;padding:.25rem .5rem}
button{cursor:pointer;background:var(--panel2)}
button:hover{background:var(--sel)}
button[aria-pressed="true"]{background:var(--accent);color:var(--accent-fg);border-color:var(--accent)}
.toolbar{display:flex;flex-wrap:wrap;gap:.3rem;align-items:center;padding:.35rem .6rem;
 border-bottom:1px solid var(--line);background:var(--panel)}
.toolbar h2,.toolbar h3{font-size:.8rem;margin:0 .2rem 0 0;color:var(--muted);font-weight:600}
.tgroup{display:flex;gap:.25rem;align-items:center;border-right:1px solid var(--line);padding-right:.4rem;margin-right:.2rem}
.tgroup:last-child{border-right:none}
.layout{display:flex;align-items:stretch;min-height:60vh}
nav.side{width:19rem;min-width:12rem;max-width:40rem;border-right:2px solid var(--line);
 background:var(--panel);padding:.5rem;overflow:auto;resize:horizontal}
main.work{flex:1;padding:.6rem 1rem;overflow:auto;min-width:0}
aside.rightpane{width:22rem;border-left:2px solid var(--line);background:var(--panel);padding:.5rem;overflow:auto}
aside.rightpane[hidden]{display:none}
h2.sec{font-size:1rem;margin:.6rem 0 .3rem;border-bottom:1px solid var(--line)}
nav.side ul{list-style:none;margin:0;padding:0 0 0 .8rem}
nav.side>ul{padding-left:0}
nav.side li{margin:.05rem 0}
.navrow{display:flex;gap:.2rem;align-items:center}
.navrow>button.tog{width:1.6rem;flex:none;padding:.1rem}
.navrow>a.navlink{flex:1;display:block;padding:.15rem .3rem;border-radius:4px;
 text-decoration:none;color:var(--fg);border:1px solid transparent;overflow-wrap:anywhere}
.navrow>a.navlink:hover{background:var(--sel)}
.navrow>a.navlink[aria-current="true"]{background:var(--accent);color:var(--accent-fg);font-weight:700}
.sub{color:var(--muted);font-size:.8rem}
/* ---- menubar ---- */
.menubar{border-bottom:2px solid var(--line);background:var(--panel)}
ul.mbar{list-style:none;margin:0;padding:0;display:flex;flex-wrap:wrap}
li.mtop{position:relative}
.mbtn{background:transparent;border:1px solid transparent;border-radius:0;padding:.4rem .8rem;font-weight:600}
.mbtn:hover{background:var(--sel)}
.mbtn[aria-expanded="true"]{background:var(--accent);color:var(--accent-fg);border-color:var(--accent)}
html[data-theme="contrast"] .mbtn[aria-expanded="true"] u{color:var(--accent-fg)}
ul.mpanel{list-style:none;margin:0;padding:.25rem;position:absolute;z-index:30;top:100%;left:0;
 min-width:18rem;background:var(--bg);border:2px solid var(--line);
 box-shadow:0 4px 10px rgba(0,0,0,.25)}
ul.mpanel[hidden]{display:none}
ul.mpanel li{margin:0}
ul.mpanel button{display:flex;justify-content:space-between;gap:1.5rem;align-items:center;
 width:100%;text-align:left;background:transparent;border:1px solid transparent;
 border-radius:3px;padding:.35rem .6rem;font-weight:400}
ul.mpanel button:hover{background:var(--sel)}
ul.mpanel button[aria-pressed="true"]{background:var(--accent);color:var(--accent-fg)}
.acc{color:var(--muted);font-size:.8rem;white-space:nowrap}
ul.mpanel button[aria-pressed="true"] .acc{color:var(--accent-fg)}
li.msep{border-top:1px solid var(--line);margin-top:.25rem;padding-top:.25rem}
li.mfield{display:flex;flex-direction:column;gap:.15rem;padding:.35rem .6rem}
li.mfield label{font-size:.85rem;color:var(--muted)}
.quickbar{display:flex;flex-wrap:wrap;gap:.3rem;padding:.35rem .6rem;
 border-bottom:1px solid var(--line);background:var(--panel2)}
.quickbar button{padding:.2rem .55rem;font-size:.9rem}
@media (max-width:800px){
 ul.mpanel{position:static;min-width:0;box-shadow:none;border-left:none;border-right:none}
 li.mtop{position:static}
}
@media print{.menubar,.quickbar{display:none!important}}

/* ---- režim čtení ---- */
body[data-mode="view"] .txt:hover{border-color:transparent}
body[data-mode="view"] .viewtxt{padding:.2rem .35rem;cursor:text}
body[data-mode="view"] .quickbar button:disabled,
body[data-mode="view"] ul.mpanel button:disabled{opacity:.5;cursor:not-allowed}
button:disabled,select:disabled{opacity:.5;cursor:not-allowed}
.modebadge{font-size:.8rem;color:var(--muted);margin-left:.4rem}
body[data-mode="view"] #outlinewrap{border-left:4px solid var(--accent);padding-left:.6rem}
#btnMode[aria-pressed="true"]{background:var(--accent);color:var(--accent-fg);border-color:var(--accent)}
/* ---- barvy oddílů a řazení ---- */
li.nodesection[data-hascol="1"]>.navrow,
li.nodegroup[data-hascol="1"]>.navrow{border-left:6px solid var(--seccol);padding-left:.3rem}
li.nodegroup>.navrow>a.navlink strong{text-transform:none}
li.nodegroup>.navrow{background:var(--panel2)}
.secdot{display:inline-block;width:.7rem;height:.7rem;border-radius:50%;margin-right:.35rem;
 border:1px solid var(--line);background:var(--seccol,transparent);vertical-align:baseline}
html[data-theme="contrast"] .secdot{background:transparent}
html[data-theme="contrast"] li.nodesection[data-hascol="1"]>.navrow,
html[data-theme="contrast"] li.nodegroup[data-hascol="1"]>.navrow{border-left-color:var(--accent)}
button.ord{flex:none;width:1.8rem;padding:.1rem;font-size:.85rem}
nav.side textarea{width:100%}
dialog textarea{width:100%;font-family:ui-monospace,Consolas,monospace;font-size:.85rem}
/* ---- vnitřní odkazy ---- */
.reflink{text-decoration:underline dotted;text-underline-offset:2px}
.reflink::before{content:"⮡ ";speak:none}
.reflink.missing{color:var(--err);text-decoration:underline wavy}
.txt.flash{outline:3px solid var(--accent);outline-offset:2px;background:var(--sel)}
/* ---- outline ---- */
#outline{margin:0;padding:0;list-style:none}
#outline ul{list-style:none;margin:0;padding:0 0 0 1.6rem;border-left:1px dotted var(--line)}
.item{margin:.1rem 0}
.itemrow{display:flex;gap:.3rem;align-items:flex-start}
.itemrow .tog{flex:none;width:1.7rem;padding:.1rem;line-height:1.2}
.itemrow .tog[data-leaf="1"]{visibility:hidden}
.itembody{flex:1;min-width:0}
.txt{display:block;width:100%;padding:.2rem .35rem;border:1px solid transparent;border-radius:4px;
 background:transparent;white-space:pre-wrap;overflow-wrap:anywhere;min-height:1.6em}
.txt:hover{border-color:var(--line)}
.txt:focus{border-color:var(--focus);background:var(--bg)}
.item[data-done="1"]>.itemrow .txt{text-decoration:line-through;color:var(--muted)}
.item[data-collapsed="1"]>ul{display:none}
.flags{display:inline-flex;gap:.25rem;flex-wrap:wrap;vertical-align:middle;margin-right:.3rem}
.flag{font-size:.75rem;padding:.05rem .35rem;border:1px solid var(--line);border-radius:999px;
 background:var(--panel2);white-space:nowrap}
.flag[data-k="ukol"]{border-color:var(--accent)}
.flag[data-k="dulezite"]{border-color:var(--err);color:var(--err)}
.flag[data-k="otazka"]{border-color:var(--warn);color:var(--warn)}
.flag[data-k="hotovo"]{border-color:var(--ok);color:var(--ok)}
.meta{font-size:.75rem;color:var(--muted)}
/* styles of paragraph */
.item[data-style="h1"]>.itemrow .txt{font-size:1.4rem;font-weight:700}
.item[data-style="h2"]>.itemrow .txt{font-size:1.2rem;font-weight:700}
.item[data-style="h3"]>.itemrow .txt{font-size:1.05rem;font-weight:700}
.item[data-style="quote"]>.itemrow .txt{border-left:4px solid var(--line);padding-left:.6rem;font-style:italic}
.item[data-style="code"]>.itemrow .txt{font-family:ui-monospace,Consolas,"DejaVu Sans Mono",monospace;
 background:var(--panel2);white-space:pre-wrap}
.item[data-list="ul"]>.itemrow .itembody::before{content:"• ";color:var(--muted)}
.item[data-list="ol"]>.itemrow .itembody::before{content:attr(data-num) ". ";color:var(--muted)}
.item[data-list="todo"]>.itemrow .chk{margin-right:.3rem}
.hl{background:#fff59d;color:#000}
html[data-theme="contrast"] .hl{background:#ffff00;color:#000}
.wikilink{text-decoration:underline}
.wikilink.missing{color:var(--err);text-decoration:underline dashed}
mark.find{background:var(--sel);color:var(--fg);outline:2px solid var(--accent)}
/* tables & misc */
table{border-collapse:collapse;width:100%;margin:.4rem 0}
th,td{border:1px solid var(--line);padding:.25rem .4rem;text-align:left;vertical-align:top}
th{background:var(--panel2)}
caption{text-align:left;font-weight:700;padding:.2rem 0}
dialog{border:2px solid var(--line);border-radius:6px;background:var(--bg);color:var(--fg);
 max-width:min(52rem,94vw);width:100%;padding:0}
dialog::backdrop{background:rgba(0,0,0,.5)}
.dlghead{display:flex;justify-content:space-between;align-items:center;gap:1rem;
 padding:.5rem .8rem;border-bottom:1px solid var(--line);background:var(--panel)}
.dlghead h2{margin:0;font-size:1.1rem}
.dlgbody{padding:.8rem;max-height:70vh;overflow:auto}
.dlgfoot{padding:.5rem .8rem;border-top:1px solid var(--line);display:flex;gap:.4rem;flex-wrap:wrap;background:var(--panel)}
.field{margin:.5rem 0;display:flex;flex-direction:column;gap:.2rem}
.field label{font-weight:600}
.field input,.field select,.field textarea{width:100%}
.row{display:flex;gap:.5rem;flex-wrap:wrap;align-items:flex-end}
.row>.field{flex:1;min-width:12rem}
.hint{font-size:.85rem;color:var(--muted)}
.vh{position:absolute!important;width:1px;height:1px;margin:-1px;padding:0;overflow:hidden;
 clip:rect(0 0 0 0);clip-path:inset(50%);white-space:nowrap;border:0}
/* vstupy pro soubor spouštíme z nabídky, nikdy se nemají zobrazit */
input[type="file"].vh{display:none!important}
#status{padding:.3rem .6rem;border-top:1px solid var(--line);background:var(--panel);font-size:.85rem;min-height:1.6rem}
#debug{margin:.5rem;border:1px dashed var(--line);padding:.4rem;font-family:ui-monospace,monospace;font-size:.8rem;max-height:14rem;overflow:auto}
#debug[hidden]{display:none}
.pill{display:inline-block;padding:.05rem .4rem;border:1px solid var(--line);border-radius:999px;font-size:.75rem}
.reslist{list-style:none;margin:0;padding:0}
.reslist li{border-bottom:1px solid var(--line);padding:.3rem 0}
ul.plain{list-style:none;margin:0;padding:0}
.warnbox{border:2px solid var(--warn);padding:.5rem;border-radius:4px}
@media print{
 nav.side,aside.rightpane,.toolbar,#status,#debug,header.apphdr .toolbar{display:none!important}
 .item[data-collapsed="1"]>ul{display:block}
}
@media (max-width:800px){
 .layout{display:block}
 nav.side,aside.rightpane{width:auto;max-width:none;border:none;border-bottom:2px solid var(--line);resize:none}
}
</style>
</head>
<body>
<a class="skiplink" href="#outlinewrap">Přeskočit na obsah stránky</a>
<header class="apphdr">
 <p class="appname">Mronenote</p>
 <h1 id="pagetitle" tabindex="-1">Bez poznámkového bloku</h1>
 <p class="sub" id="breadcrumb"></p>
</header>
<nav class="menubar" aria-label="Hlavní nabídka">
 <ul class="mbar" role="menubar">
  <li role="none" class="mtop">
   <button type="button" role="menuitem" class="mbtn" aria-haspopup="true" aria-expanded="false" aria-controls="m-soubor" id="mb-soubor"><u>S</u>oubor</button>
   <ul class="mpanel" id="m-soubor" role="menu" aria-labelledby="mb-soubor" hidden>
    <li role="none"><button type="button" role="menuitem" id="btnNewNb">Nový poznámkový blok…</button></li>
    <li role="none"><button type="button" role="menuitem" id="btnOpen">Otevřít soubor…</button></li>
    <li role="none"><button type="button" role="menuitem" id="btnSave">Uložit jako .json <span class="acc">Ctrl+S</span></button></li>
    <li role="none" class="msep"><button type="button" role="menuitem" id="btnClipCopy">Zkopírovat celý blok do schránky <span class="acc">Ctrl+Shift+S</span></button></li>
    <li role="none"><button type="button" role="menuitem" id="btnClipPaste">Načíst celý blok ze schránky… <span class="acc">Ctrl+Shift+O</span></button></li>
    <li role="none" class="msep"><button type="button" role="menuitem" id="btnExportHtml">Exportovat do HTML…</button></li>
    <li role="none"><button type="button" role="menuitem" id="btnExportMd">Exportovat do Markdownu…</button></li>
    <li role="none"><button type="button" role="menuitem" id="btnExportDocxPage">Exportovat stránku do DOCX…</button></li>
    <li role="none"><button type="button" role="menuitem" id="btnExportDocxAll">Exportovat celý blok do DOCX…</button></li>
    <li role="none"><button type="button" role="menuitem" id="btnImportMd">Importovat Markdown…</button></li>
    <li role="none" class="msep"><button type="button" role="menuitem" id="btnPrint">Tisk stránky</button></li>
    <li role="none"><button type="button" role="menuitem" id="btnSettings">Nastavení…</button></li>
   </ul>
  </li>

  <li role="none" class="mtop">
   <button type="button" role="menuitem" class="mbtn" aria-haspopup="true" aria-expanded="false" aria-controls="m-upravy" id="mb-upravy"><u>Ú</u>pravy</button>
   <ul class="mpanel" id="m-upravy" role="menu" aria-labelledby="mb-upravy" hidden>
    <li role="none"><button type="button" role="menuitem" id="btnUndo">Zpět <span class="acc">Ctrl+Z</span></button></li>
    <li role="none"><button type="button" role="menuitem" id="btnRedo">Znovu <span class="acc">Ctrl+Y</span></button></li>
    <li role="none" class="msep"><button type="button" role="menuitem" id="miAddItem">Přidat řádek na konec</button></li>
    <li role="none"><button type="button" role="menuitem" id="btnDelItem">Smazat řádek</button></li>
    <li role="none" class="msep"><button type="button" role="menuitem" id="btnIndent">Zanořit <span class="acc">Tab</span></button></li>
    <li role="none"><button type="button" role="menuitem" id="btnOutdent">Vynořit <span class="acc">Shift+Tab</span></button></li>
    <li role="none"><button type="button" role="menuitem" id="btnUp">Přesunout nahoru <span class="acc">Alt+↑</span></button></li>
    <li role="none"><button type="button" role="menuitem" id="btnDown">Přesunout dolů <span class="acc">Alt+↓</span></button></li>
    <li role="none" class="msep"><button type="button" role="menuitem" id="btnCopyRefItem">Kopírovat odkaz na odstavec <span class="acc">Ctrl+Shift+C</span></button></li>
    <li role="none"><button type="button" role="menuitem" id="btnCopyRefPage">Kopírovat odkaz na stránku</button></li>
    <li role="none"><button type="button" role="menuitem" id="btnCopyRefSection">Kopírovat odkaz na oddíl</button></li>
    <li role="none"><button type="button" role="menuitem" id="btnCopyRefNb">Kopírovat odkaz na poznámkový blok</button></li>
    <li role="none"><button type="button" role="menuitem" id="btnPasteRef">Vložit zkopírovaný odkaz <span class="acc">Ctrl+Shift+V</span></button></li>
    <li role="none" class="msep"><button type="button" role="menuitem" id="btnSearch">Hledat… <span class="acc">Ctrl+F</span></button></li>
   </ul>
  </li>

  <li role="none" class="mtop">
   <button type="button" role="menuitem" class="mbtn" aria-haspopup="true" aria-expanded="false" aria-controls="m-format" id="mb-format"><u>F</u>ormát</button>
   <ul class="mpanel" id="m-format" role="menu" aria-labelledby="mb-format" hidden>
    <li role="none"><button type="button" role="menuitem" id="btnBold">Tučně <span class="acc">Ctrl+B</span></button></li>
    <li role="none"><button type="button" role="menuitem" id="btnItalic">Kurzíva <span class="acc">Ctrl+I</span></button></li>
    <li role="none"><button type="button" role="menuitem" id="btnUnder">Podtržení <span class="acc">Ctrl+U</span></button></li>
    <li role="none"><button type="button" role="menuitem" id="btnStrike">Přeškrtnutí</button></li>
    <li role="none"><button type="button" role="menuitem" id="btnCode">Kód</button></li>
    <li role="none"><button type="button" role="menuitem" id="btnHl">Zvýraznění <span class="acc">Ctrl+Shift+H</span></button></li>
    <li role="none" class="msep"><button type="button" role="menuitem" id="btnClearFmt">Zrušit formátování</button></li>
    <li role="none" class="msep mfield">
     <label for="selStyle">Styl odstavce</label>
     <select id="selStyle">
      <option value="p">Odstavec</option><option value="h1">Nadpis 1</option>
      <option value="h2">Nadpis 2</option><option value="h3">Nadpis 3</option>
      <option value="quote">Citace</option><option value="code">Kód</option>
     </select>
    </li>
    <li role="none" class="mfield">
     <label for="selList">Typ seznamu</label>
     <select id="selList">
      <option value="">Bez odrážky</option><option value="ul">Odrážka</option>
      <option value="ol">Číslování</option><option value="todo">Zaškrtávátko</option>
     </select>
    </li>
   </ul>
  </li>

  <li role="none" class="mtop">
   <button type="button" role="menuitem" class="mbtn" aria-haspopup="true" aria-expanded="false" aria-controls="m-vlozit" id="mb-vlozit"><u>V</u>ložit</button>
   <ul class="mpanel" id="m-vlozit" role="menu" aria-labelledby="mb-vlozit" hidden>
    <li role="none"><button type="button" role="menuitem" id="btnLink">Odkaz… <span class="acc">Ctrl+K</span></button></li>
    <li role="none"><button type="button" role="menuitem" id="btnWiki">Wiki odkaz… <span class="acc">Ctrl+Shift+K</span></button></li>
    <li role="none"><button type="button" role="menuitem" id="btnRefIns">Vnitřní odkaz na odstavec či stránku…</button></li>
    <li role="none" class="msep"><button type="button" role="menuitem" id="btnTable">Tabulku…</button></li>
    <li role="none"><button type="button" role="menuitem" id="btnImage">Obrázek…</button></li>
    <li role="none"><button type="button" role="menuitem" id="btnFile">Přílohu…</button></li>
    <li role="none" class="msep"><button type="button" role="menuitem" id="btnCmIns">Revize: vložený text {++…++}</button></li>
    <li role="none"><button type="button" role="menuitem" id="btnCmDel">Revize: smazaný text {--…--}</button></li>
    <li role="none"><button type="button" role="menuitem" id="btnCmSub">Revize: záměna {~~…~&gt;…~~}</button></li>
    <li role="none"><button type="button" role="menuitem" id="btnCmCom">Revize: poznámka {&gt;&gt;…&lt;&lt;}</button></li>
    <li role="none"><button type="button" role="menuitem" id="btnCmMark">Revize: zvýraznění {==…==}</button></li>
    <li role="none" class="msep"><button type="button" role="menuitem" id="btnDate">Datum a čas</button></li>
    <li role="none"><button type="button" role="menuitem" id="btnRule">Oddělovač</button></li>
   </ul>
  </li>

  <li role="none" class="mtop">
   <button type="button" role="menuitem" class="mbtn" aria-haspopup="true" aria-expanded="false" aria-controls="m-priznaky" id="mb-priznaky"><u>P</u>říznaky</button>
   <ul class="mpanel" id="m-priznaky" role="menu" aria-labelledby="mb-priznaky" hidden>
    <li role="none"><button type="button" role="menuitem" id="btnFlagUkol">Úkol <span class="acc">Ctrl+Shift+1</span></button></li>
    <li role="none"><button type="button" role="menuitem" id="btnFlagDul">Důležité <span class="acc">Ctrl+Shift+2</span></button></li>
    <li role="none"><button type="button" role="menuitem" id="btnFlagOt">Otázka <span class="acc">Ctrl+Shift+3</span></button></li>
    <li role="none" class="msep"><button type="button" role="menuitem" id="btnFlagMore">Všechny příznaky…</button></li>

<script>
"use strict";
/* ===================== Mronenote ===================== */
/* Datový model:
   nb = {name, sections:[{id,name,pages:[page]}], settings:{}, flags:[...]}
   page = {id,title,items:[item],created,modified,history:[]}
   item = {id,html,style,list,collapsed,done,flags:[],children:[],att:null}
*/
var DBG = [];
function dbg(msg){
  DBG.push(new Date().toLocaleTimeString('cs-CZ')+" — "+msg);
  if(DBG.length>200) DBG.shift();
  var l=document.getElementById('dbglist');
  if(l){ l.innerHTML=""; DBG.slice().reverse().forEach(function(m){
    var li=document.createElement('li'); li.textContent=m; l.appendChild(li);});}
}
function $(id){return document.getElementById(id);}
function esc(s){return String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;")
  .replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
function uid(){return 'i'+Date.now().toString(36)+Math.random().toString(36).slice(2,8);}
function say(m){ var s=$('status'); s.textContent=m; }

var FLAGS = [
 {k:'ukol',       n:'Úkol',                 s:'☐'},
 {k:'hotovo',     n:'Hotový úkol',          s:'☑'},
 {k:'dulezite',   n:'Důležité',             s:'★'},
 {k:'otazka',     n:'Otázka',               s:'?'},
 {k:'pamatovat',  n:'Zapamatovat na později',s:'!'},
 {k:'definice',   n:'Definice',             s:'§'},
 {k:'zvyrazneno', n:'Zvýrazněné',           s:'▮'},
 {k:'kontakt',    n:'Kontakt',              s:'☏'},
 {k:'adresa',     n:'Adresa',               s:'⌂'},
 {k:'telefon',    n:'Telefonní číslo',      s:'✆'},
 {k:'email',      n:'E-mail',               s:'✉'},
 {k:'schuzka',    n:'Schůzka',              s:'☕'},
 {k:'nazev',      n:'Název projektu',       s:'▣'},
 {k:'heslo',      n:'Heslo / přístup',      s:'⚿'},
 {k:'kniha',      n:'Kniha ke čtení',       s:'📖'},
 {k:'film',       n:'Film ke zhlédnutí',    s:'🎬'},
 {k:'hudba',      n:'Hudba k poslechu',     s:'♪'},
 {k:'citace',     n:'Citace',               s:'”'},
 {k:'nakup',      n:'Nákup',                s:'🛒'},
 {k:'napad',      n:'Nápad',                s:'💡'},
 {k:'kritika',    n:'K diskusi',            s:'⚖'},
 {k:'riziko',     n:'Riziko',               s:'⚠'},
 {k:'rozhodnuti', n:'Rozhodnutí',           s:'✔'},
 {k:'odkaz',      n:'Zdroj / odkaz',        s:'🔗'}
];
function flagDef(k){ for(var i=0;i<FLAGS.length;i++) if(FLAGS[i].k===k) return FLAGS[i];
  return {k:k,n:k,s:'•'}; }

var nb = null;        // notebook
var curSecId = null, curPageId = null, curItemId = null;
var undoStack = [], redoStack = [];
var mode = 'edit';   // 'edit' | 'view'
var dirty = false;

function newItem(html){
  return {id:uid(),html:html||"",style:"p",list:"",collapsed:false,done:false,
          flags:[],children:[],att:null};
}
function newPage(title){
  return {id:uid(),title:title||"Nová stránka",items:[newItem("")],
          created:new Date().toISOString(),modified:new Date().toISOString(),history:[]};
}
var SECTION_COLORS = [
 {k:'modra',    n:'modrá',    c:'#1f6fb2'},
 {k:'zelena',   n:'zelená',   c:'#2e7d32'},
 {k:'cervena',  n:'červená',  c:'#b3261e'},
 {k:'fialova',  n:'fialová',  c:'#6a3fa0'},
 {k:'oranzova', n:'oranžová', c:'#a15c00'},
 {k:'tyrkysova',n:'tyrkysová',c:'#00695c'},
 {k:'ruzova',   n:'růžová',   c:'#a3306e'},
 {k:'hneda',    n:'hnědá',    c:'#6d4c41'},
 {k:'seda',     n:'šedá',     c:'#4f5b62'}
];
function colorDef(k){ for(var i=0;i<SECTION_COLORS.length;i++) if(SECTION_COLORS[i].k===k) return SECTION_COLORS[i];
  return null; }
function autoColor(n){ return SECTION_COLORS[n % SECTION_COLORS.length].k; }

function newSection(name,color){
  return {id:uid(),type:'section',name:name||"Nový oddíl",color:color||null,
          pages:[],collapsed:false}; }
function newGroup(name,color){
  return {id:uid(),type:'group',name:name||"Nová skupina oddílů",color:color||null,
          children:[],collapsed:false}; }
function isGroup(n){ return n && n.type==='group'; }
/* jednotné čtení potomků kontejneru */
function kids(n){ return isGroup(n) ? (n.children||(n.children=[])) : null; }
function newNotebook(name){
  return {name:name||"Nový poznámkový blok",sections:[],
          settings:{theme:'light',fontsize:16,autosave:true,debug:false}};
}
/* -------- lokátory -------- */
/* nb.sections je nyní strom: oddíly a skupiny oddílů */
function walkNodes(fn,list,parent,depth){
  list = list || (nb?nb.sections:[]); depth=depth||1;
  for(var i=0;i<list.length;i++){
    var n=list[i];
    if(fn(n,list,i,parent||null,depth)===false) return false;
    if(isGroup(n)){ if(walkNodes(fn,kids(n),n,depth+1)===false) return false; }
  }
  return true;
}
function getNode(id){ var res=null;
  walkNodes(function(n){ if(n.id===id){res=n;return false;} });
  return res;}
function getSection(id){ var n=getNode(id); return (n && !isGroup(n))?n:null; }
function nodeLoc(id){ var res=null;
  walkNodes(function(n,list,i,parent){ if(n.id===id){res={arr:list,idx:i,parent:parent};return false;} });
  return res;}
function allSections(){ var out=[];
  walkNodes(function(n){ if(!isGroup(n)) out.push(n); });
  return out;}
function nodePath(id){ /* pole názvů předků včetně uzlu */
  var path=[];
  (function rec(list,trail){
    for(var i=0;i<list.length;i++){ var n=list[i]; var t=trail.concat([n]);
      if(n.id===id){ path=t; return true; }
      if(isGroup(n) && rec(kids(n),t)) return true; }
    return false;
  })(nb?nb.sections:[],[]);
  return path;}
/* efektivní barva – zdědí se ze skupiny, pokud oddíl vlastní nemá */
function effColor(id){
  var p=nodePath(id);
  for(var i=p.length-1;i>=0;i--) if(p[i].color) return p[i].color;
  return null;}
function getPage(id){ if(!nb) return null; var res=null;
  allSections().forEach(function(s){ if(res) return;
    for(var j=0;j<s.pages.length;j++){ var p=findPageDeep(s.pages[j],id); if(p){res=p;return;} } });
  return res;}
function findPageDeep(p,id){ if(p.id===id) return p;
  if(p.sub) for(var i=0;i<p.sub.length;i++){var r=findPageDeep(p.sub[i],id); if(r) return r;}
  return null;}
function pageSection(id){ if(!nb) return null; var res=null;
  allSections().forEach(function(s){ if(res) return;
    for(var j=0;j<s.pages.length;j++) if(findPageDeep(s.pages[j],id)){res=s;return;} });
  return res;}
function pageParent(id){ if(!nb) return null;
  var res=null;
  function walkP(p,par){ if(p.id===id){res=par;} if(p.sub) p.sub.forEach(function(c){walkP(c,p);}); }
  allSections().forEach(function(s){ s.pages.forEach(function(p){ walkP(p,null);}); });
  return res;}
function allPages(){ var out=[]; if(!nb) return out;
  function rec(p,s){ out.push({page:p,section:s}); if(p.sub) p.sub.forEach(function(c){rec(c,s);}); }
  allSections().forEach(function(s){ s.pages.forEach(function(p){ rec(p,s); }); });
  return out;}
function pageByTitle(t){ var low=String(t).trim().toLowerCase(); var a=allPages();
  for(var i=0;i<a.length;i++) if(a[i].page.title.trim().toLowerCase()===low) return a[i].page;
  return null;}
function curPage(){ return curPageId?getPage(curPageId):null; }
function findItem(id,list){
  var p=curPage(); list=list||(p?p.items:[]);
  for(var i=0;i<list.length;i++){ if(list[i].id===id) return list[i];
    var r=findItem(id,list[i].children); if(r) return r; }
  return null;}
function itemParentArr(id,list,parent){
  var p=curPage(); list=list||(p?p.items:[]);
  for(var i=0;i<list.length;i++){ if(list[i].id===id) return {arr:list,idx:i,parent:parent||null};
    var r=itemParentArr(id,list[i].children,list[i]); if(r) return r; }
  return null;}
function flatItems(list,depth,out){
  var p=curPage(); list=list||(p?p.items:[]); out=out||[]; depth=depth||1;
  list.forEach(function(it){ out.push({it:it,depth:depth});
    if(it.children.length) flatItems(it.children,depth+1,out); });
  return out;}

/* -------- undo -------- */
function snapshot(label){
  if(!nb) return;
  undoStack.push({label:label||"",data:JSON.stringify(nb),page:curPageId,sec:curSecId});
  if(undoStack.length>60) undoStack.shift();
  redoStack.length=0; dirty=true;
}
function doUndo(){ if(!undoStack.length){say("Není co vrátit.");return;}
  redoStack.push({data:JSON.stringify(nb),page:curPageId,sec:curSecId});
  var s=undoStack.pop(); nb=JSON.parse(s.data); curPageId=s.page; curSecId=s.sec;
  renderAll(); say("Vráceno zpět."+(s.label?" ("+s.label+")":"")); }
function doRedo(){ if(!redoStack.length){say("Není co opakovat.");return;}
  undoStack.push({data:JSON.stringify(nb),page:curPageId,sec:curSecId});
  var s=redoStack.pop(); nb=JSON.parse(s.data); curPageId=s.page; curSecId=s.sec;
  renderAll(); say("Akce zopakována."); }

/* -------- sanitace HTML v řádku -------- */
var ALLOWED = {B:1,I:1,U:1,S:1,EM:1,STRONG:1,CODE:1,SPAN:1,A:1,BR:1,SUP:1,SUB:1,MARK:1,IMG:1};
function sanitize(html){
  var d=document.createElement('div'); d.innerHTML=html;
  (function walk(n){
    var kids=Array.prototype.slice.call(n.childNodes);
    kids.forEach(function(c){
      if(c.nodeType===1){
        if(!ALLOWED[c.tagName]){ 
          var f=document.createDocumentFragment();
          while(c.firstChild) f.appendChild(c.firstChild);
          c.parentNode.replaceChild(f,c); walk(n); return;
        }
        var attrs=Array.prototype.slice.call(c.attributes);
        attrs.forEach(function(a){
          var nm=a.name.toLowerCase();
          var ok=false;
          if(c.tagName==='A' && (nm==='href'||nm==='data-wiki'||nm==='data-ref'||nm==='class'||nm==='title')) ok=true;
          if(c.tagName==='IMG' && (nm==='src'||nm==='alt'||nm==='title'||nm==='width')) ok=true;
          if(c.tagName==='SPAN' && nm==='class' && /^(hl)$/.test(a.value)) ok=true;
          if(nm==='class' && c.tagName==='A') ok=true;
          if(nm.indexOf('on')===0) ok=false;
          if(nm==='href' && /^\s*javascript:/i.test(a.value)) ok=false;
          if(nm==='src' && !/^(data:image\/|https?:|#)/i.test(a.value)) ok=false;
          if(!ok) c.removeAttribute(a.name);
        });
        walk(c);
      } else if(c.nodeType!==3){ c.parentNode.removeChild(c); }
    });
  })(d);
  return d.innerHTML;
}
function plain(html){ var d=document.createElement('div'); d.innerHTML=html; return d.textContent||""; }
/* ===================== RENDER ===================== */
function renderAll(){ renderNav(); renderPage(); renderRight(); applySettings(); }

function applySettings(){
  if(!nb) return;
  document.documentElement.setAttribute('data-theme', nb.settings.theme||'light');
  document.documentElement.style.setProperty('--fs',(nb.settings.fontsize||16)+'px');
  $('debug').hidden = !nb.settings.debug;
}

function renderNav(){
  var box=$('navtree'); box.innerHTML="";
  if(!nb || !nb.sections.length){ $('navempty').hidden=false; return; }
  $('navempty').hidden=true;
  var filter=($('quickfilter').value||"").trim().toLowerCase();
  box.appendChild(nodeList(nb.sections,filter,1));
}
function nodeList(list,filter,depth){
  var ul=document.createElement('ul');
  list.forEach(function(n,i){ ul.appendChild(nodeLi(n,list,i,filter,depth)); });
  return ul;
}
function nodeLi(n,list,idx,filter,depth){
  var li=document.createElement('li');
  li.className = isGroup(n)?'nodegroup':'nodesection';
  var col=colorDef(effColor(n.id));
  if(col) li.style.setProperty('--seccol',col.c);
  li.setAttribute('data-hascol',col?'1':'0');

  var row=document.createElement('div'); row.className='navrow';

  var tog=document.createElement('button'); tog.type='button'; tog.className='tog';
  tog.setAttribute('aria-expanded', n.collapsed?'false':'true');
  tog.textContent = n.collapsed?'▸':'▾';
  tog.setAttribute('aria-label',(n.collapsed?'Rozbalit':'Sbalit')+' '+
    (isGroup(n)?'skupinu oddílů ':'oddíl ')+n.name);
  tog.onclick=function(){ n.collapsed=!n.collapsed; renderNav(); scheduleAutosave(); };
  row.appendChild(tog);

  var a=document.createElement('a'); a.className='navlink'; a.href='#';
  var kind = isGroup(n)?'Skupina oddílů':'Oddíl';
  var cnt  = isGroup(n)? (countSectionsIn(n)+' oddílů') : (countPages(n)+' stránek');
  /* barvu hlásíme i textem, ne jen graficky */
  var colTxt = col ? (', barva '+col.n) : ', bez barvy';
  a.innerHTML='<span class="secdot" aria-hidden="true"></span><strong>'+esc(n.name)+'</strong>'+
    ' <span class="sub">'+esc(kind.toLowerCase()+', '+cnt+colTxt)+'</span>';
  a.setAttribute('aria-label',kind+' '+n.name+', '+cnt+colTxt);
  a.onclick=function(e){ e.preventDefault();
    if(isGroup(n)){ curSecId=null; dlgGroup(n); }
    else { curSecId=n.id; dlgSection(n); } };
  row.appendChild(a);

  /* přesun v pořadí */
  var up=document.createElement('button'); up.type='button'; up.className='ord';
  up.textContent='↑'; up.setAttribute('aria-label','Posunout '+(isGroup(n)?'skupinu ':'oddíl ')+n.name+' nahoru');
  up.disabled = idx===0;
  up.onclick=function(){ moveNode(n,-1); };
  var dn=document.createElement('button'); dn.type='button'; dn.className='ord';
  dn.textContent='↓'; dn.setAttribute('aria-label','Posunout '+(isGroup(n)?'skupinu ':'oddíl ')+n.name+' dolů');
  dn.disabled = idx===list.length-1;
  dn.onclick=function(){ moveNode(n,1); };
  row.appendChild(up); row.appendChild(dn);
  li.appendChild(row);

  if(!n.collapsed){
    if(isGroup(n)){
      var k=kids(n);
      if(k.length) li.appendChild(nodeList(k,filter,depth+1));
      else { var e=document.createElement('ul'); var el=document.createElement('li');
        el.innerHTML='<span class="sub">(prázdná skupina oddílů)</span>'; e.appendChild(el); li.appendChild(e); }
    } else {
      var pu=document.createElement('ul');
      n.pages.forEach(function(p,pi){ pu.appendChild(pageLi(p,n,filter,n.pages,pi)); });
      if(!n.pages.length){ var e2=document.createElement('li');
        e2.innerHTML='<span class="sub">(bez stránek)</span>'; pu.appendChild(e2); }
      li.appendChild(pu);
    }
  }
  return li;
}
function countSectionsIn(g){ var n=0;
  walkNodes(function(x){ if(!isGroup(x)) n++; }, kids(g), g, 1); return n; }
function moveNode(n,dir){
  var loc=nodeLoc(n.id); if(!loc) return;
  var ni=loc.idx+dir;
  if(ni<0||ni>=loc.arr.length){ say('Položka je již na kraji.'); return; }
  snapshot('pořadí oddílů');

function pageLi(p,sec,filter,arr,idx){

function movePage(p,arr,dir){

function renderItems(list,parentUl,depth){

    var row=document.createElement('div'); row.className='itemrow';
    var tog=document.createElement('button'); tog.type='button'; tog.className='tog';

        touch(); renderPage(); focusItem(it.id);

      txt.addEventListener('input',function(){ it.html=sanitize(txt.innerHTML); touch(); });
      txt.addEventListener('blur',function(){ it.html=sanitize(txt.innerHTML); });

    } else {
      txt.className='txt viewtxt';
      /* v režimu čtení je řádek běžný text – odkazy uvnitř zůstávají fokusovatelné */

function touch(){ var p=curPage(); if(p) p.modified=new Date().toISOString(); dirty=true; scheduleAutosave(); }
function focusItem(id){

  if(el){ el.focus(); placeCaretEnd(el); curItemId=id; }
}
function placeCaretEnd(el){

  var s=window.getSelection(); s.removeAllRanges(); s.addRange(r);
}
/* ===================== EDITACE OSNOVY ===================== */
function itemKey(e,it,txt,depth){
  var k=e.key;
  if(k==='Enter' && !e.shiftKey){
    e.preventDefault(); snapshot('nový řádek');
    it.html=sanitize(txt.innerHTML);
    var loc=itemParentArr(it.id);
    var ni=newItem(""); ni.style=(it.style==='h1'||it.style==='h2'||it.style==='h3')?'p':it.style;
    ni.list=it.list;
    if(it.children.length && !it.collapsed){ it.children.unshift(ni); }
    else { loc.arr.splice(loc.idx+1,0,ni); }
    touch(); renderPage(); focusItem(ni.id); return;
  }
  if(k==='Tab'){ e.preventDefault(); if(e.shiftKey) outdent(it); else indent(it); return; }
  if(k==='Backspace' && plain(txt.innerHTML)===''){
    var loc2=itemParentArr(it.id);
    if(loc2 && !(loc2.arr.length===1 && !loc2.parent)){
      e.preventDefault(); snapshot('smazání řádku');
      var prev = loc2.idx>0 ? lastVisible(loc2.arr[loc2.idx-1]) : (loc2.parent||null);
      it.children.forEach(function(c){ loc2.arr.splice(loc2.idx,0,c); });
      loc2 = itemParentArr(it.id); loc2.arr.splice(loc2.idx,1);
      touch(); renderPage();
      if(prev) focusItem(prev.id); else say("Řádek smazán.");
      return;
    }
  }
  if(e.altKey && k==='ArrowUp'){ e.preventDefault(); moveItem(it,-1); return; }
  if(e.altKey && k==='ArrowDown'){ e.preventDefault(); moveItem(it,1); return; }
  if(k==='ArrowUp' && !e.altKey && !e.shiftKey){ if(navSibling(it,-1)) e.preventDefault(); return; }
  if(k==='ArrowDown' && !e.altKey && !e.shiftKey){ if(navSibling(it,1)) e.preventDefault(); return; }
  if(e.ctrlKey && k==='.'){ e.preventDefault(); toggleCollapse(it); return; }
  if(e.ctrlKey && !e.shiftKey){
    if(k==='b'||k==='B'){e.preventDefault(); fmt('bold');return;}
    if(k==='i'||k==='I'){e.preventDefault(); fmt('italic');return;}
    if(k==='u'||k==='U'){e.preventDefault(); fmt('underline');return;}
    if(k==='k'||k==='K'){e.preventDefault(); dlgLink();return;}
  }
  if(e.ctrlKey && e.shiftKey){
    /* Ctrl+1..3 kolidovalo s přepínáním panelů prohlížeče, proto Ctrl+Shift */
    if(k==='1'||k==='!'){e.preventDefault(); toggleFlag('ukol');return;}
    if(k==='2'||k==='@'){e.preventDefault(); toggleFlag('dulezite');return;}
    if(k==='3'||k==='#'){e.preventDefault(); toggleFlag('otazka');return;}
    if(k==='K'){e.preventDefault(); dlgWiki();return;}
    if(k==='H'){e.preventDefault(); fmtHl();return;}
    if(k==='D'){e.preventDefault(); toggleDone();return;}
  }
}
function lastVisible(it){ if(it.children.length && !it.collapsed) return lastVisible(it.children[it.children.length-1]); return it; }
function navSibling(it,dir){
  var vis=[];
  (function rec(list){ list.forEach(function(x){ vis.push(x);
      if(x.children.length && !x.collapsed) rec(x.children); }); })(curPage().items);
  var i=vis.indexOf(it); if(i<0) return false;
  var t=vis[i+dir]; if(!t) return false;

function indent(it){

function outdent(it){
  var loc=itemParentArr(it.id); if(!loc||!loc.parent){say("Nelze vynořit – řádek je na nejvyšší úrovni.");return;}
  snapshot('vynoření');
  var par=loc.parent; var ploc=itemParentArr(par.id);
  var after=par.children.splice(loc.idx+1);

}
function moveItem(it,dir){

function toggleCollapse(it){

function setAllCollapsed(v){

function collapseToLevel(n){

function toggleFlag(k){

function clearFlags(){ var it=requireItem(); if(!it) return;

function toggleDone(){ var it=requireItem(); if(!it) return;

function wrapSel(tag,cls){

  var sel=window.getSelection();

/* ---- vkládání CriticMarkup ---- */
function critWrap(open,close,popis){

function insertHtmlAtCaret(html){
  var it=requireItem(); if(!it) return;
  var el=document.querySelector('.txt[data-id="'+it.id+'"]');
  el.focus();
  var sel=window.getSelection();
  if(sel.rangeCount){
    var r=sel.getRangeAt(0); r.deleteContents();
    var d=document.createElement('div'); d.innerHTML=html;
    var frag=document.createDocumentFragment(), n, last;
    while((n=d.firstChild)) { last=frag.appendChild(n); }
    r.insertNode(frag);
    if(last){ r.setStartAfter(last); r.collapse(true); sel.removeAllRanges(); sel.addRange(r);}
  } else { el.innerHTML+=html; }
  it.html=sanitize(el.innerHTML); touch();
}

/* ---- wiki odkazy ---- */
function wikiHtml(target,label){
  var p=pageByTitle(target);
  return '<a class="wikilink'+(p?'':' missing')+'" href="#" data-wiki="'+esc(target)+'" title="'+
    (p?'Wiki odkaz na stránku ':'Wiki odkaz na neexistující stránku ')+esc(target)+'">'+
    esc(label||target)+'</a>';
}
function handleLinkClick(e){
  var n=e.target, a=null;
  while(n && n.nodeType===1 && n.className!=='txt'){ if(n.tagName==='A'){a=n;break;} n=n.parentNode; }
  if(!a) return;
  var ref=a.getAttribute('data-ref');
  if(ref){ e.preventDefault(); gotoRef(ref); return; }
  var w=a.getAttribute('data-wiki');
  if(w){
    e.preventDefault();
    var p=pageByTitle(w);
    if(p){ openPage(p.id); }
    else {
      if(confirm('Stránka „'+w+'“ neexistuje. Vytvořit ji nyní?')){
        snapshot('nová stránka z wiki');
        var s=(curSecId?getSection(curSecId):null)||allSections()[0]||null;
        if(!s){ s=newSection('Oddíl 1',autoColor(0)); nb.sections.push(s); }
        var np=newPage(w); s.pages.push(np); openPage(np.id,s.id);
      }
    }
    return;
  }
  if(a.getAttribute('href') && a.getAttribute('href')!=='#'){
    if(e.ctrlKey||e.metaKey){ return; }
    e.preventDefault();
    if(confirm('Otevřít externí odkaz '+a.getAttribute('href')+' v novém okně?'))
      window.open(a.getAttribute('href'),'_blank','noopener');
  }
}
/* automatické převedení [[…]] při psaní */
function autoWiki(){
  var it=curItem(); if(!it) return;
  var el=document.querySelector('.txt[data-id="'+it.id+'"]'); if(!el) return;
  var h=el.innerHTML;
  if(/\[\[([^\[\]|]+)(\|([^\[\]]+))?\]\]/.test(h)){
    var nh=h.replace(/\[\[([^\[\]|]+)(\|([^\[\]]+))?\]\]/g,function(m,t,x,lab){
      return wikiHtml(t.trim(), lab?lab.trim():t.trim()); });
    el.innerHTML=nh; it.html=sanitize(nh); placeCaretEnd(el); touch();
    say("Wiki odkaz vytvořen.");
  }
}
/* ===================== DIALOGY ===================== */
var dlgOnOk=null;
function openDlg(title,bodyHtml,buttons,onReady){
  $('dlgtitle').textContent=title;
  $('dlgbody').innerHTML=bodyHtml;
  var f=$('dlgfoot'); f.innerHTML="";
  (buttons||[{t:'Zavřít',v:'close'}]).forEach(function(b){
    var bt=document.createElement('button'); bt.type='button'; bt.textContent=b.t;
    bt.onclick=function(){ if(b.fn){ if(b.fn()===false) return; } closeDlg(); };
    f.appendChild(bt);
  });
  var d=$('dlg');
  if(!d.open){
    try{ d.showModal(); }
    catch(err){ d.setAttribute('open',''); d.open=true; dbg('Náhradní zobrazení dialogu: '+err.message); }

function buildFlagSummary(){
  var wrap=document.createElement('div');
  var h=document.createElement('h3'); h.textContent='Souhrn příznaků v celém bloku'; wrap.appendChild(h);
  var counts={}, byFlag={};
  allPages().forEach(function(o){
    (function r(list){ list.forEach(function(it){
      it.flags.forEach(function(k){
        counts[k]=(counts[k]||0)+1;
        (byFlag[k]=byFlag[k]||[]).push({it:it,page:o.page,sec:o.section});
      }); r(it.children); }); })(o.page.items);
  });
  var keys=Object.keys(counts);
  if(!keys.length){ var p=document.createElement('p'); p.className='hint';
    p.textContent='V bloku zatím nejsou žádné příznaky.'; wrap.appendChild(p); return wrap; }
  keys.sort();
  var f=document.createElement('div'); f.className='field';
  f.innerHTML='<label for="flagFilter">Zobrazit příznak</label><select id="flagFilter">'+
   '<option value="">Všechny</option>'+keys.map(function(k){
     return '<option value="'+k+'">'+esc(flagDef(k).n)+' ('+counts[k]+')</option>';}).join("")+
   '</select>';
  wrap.appendChild(f);
  var list=document.createElement('div'); list.id='flagResults'; wrap.appendChild(list);
  function draw(sel){
    list.innerHTML="";
    keys.forEach(function(k){
      if(sel && sel!==k) return;
      var hd=document.createElement('h4');
      hd.textContent=flagDef(k).s+' '+flagDef(k).n+' — '+counts[k]+'×';
      list.appendChild(hd);
      var ul=document.createElement('ul'); ul.className='reslist';
      byFlag[k].forEach(function(e){
        var li=document.createElement('li');
        var a=document.createElement('a'); a.href='#';
        a.textContent=(plain(e.it.html)||'(prázdný řádek)').slice(0,90);
        a.onclick=function(ev){ev.preventDefault(); openPage(e.page.id,e.sec.id);
          setTimeout(function(){focusItem(e.it.id);},60);};
        var s=document.createElement('span'); s.className='sub';
        s.textContent=' — '+e.sec.name+' › '+e.page.title+(e.it.done?' [hotovo]':'');
        li.appendChild(a); li.appendChild(s); ul.appendChild(li);
      });
      list.appendChild(ul);
    });
  }
  draw("");
  setTimeout(function(){ var sel=$('flagFilter'); if(sel) sel.onchange=function(){draw(sel.value);}; },0);
  return wrap;
}
function buildLinkPane(){
  var wrap=document.createElement('div');
  var p=curPage();
  var h=document.createElement('h3'); h.textContent='Wiki odkazy'; wrap.appendChild(h);
  if(!p){ wrap.innerHTML+='<p class="hint">Není otevřena stránka.</p>'; return wrap; }
  var out=[], inb=[], missing=[];
  (function r(list){list.forEach(function(it){
    var d=document.createElement('div'); d.innerHTML=it.html;
    Array.prototype.forEach.call(d.querySelectorAll('a[data-wiki]'),function(a){
      var t=a.getAttribute('data-wiki'); out.push(t);
      if(!pageByTitle(t)) missing.push(t); });
    r(it.children);});})(p.items);
  allPages().forEach(function(o){
    if(o.page.id===p.id) return;
    (function r(list){list.forEach(function(it){
      var d=document.createElement('div'); d.innerHTML=it.html;
      Array.prototype.forEach.call(d.querySelectorAll('a[data-wiki]'),function(a){
        if(String(a.getAttribute('data-wiki')).trim().toLowerCase()===p.title.trim().toLowerCase())
          inb.push(o); });
      r(it.children);});})(o.page.items);
  });
  function sec(title,arr,render){
    var hh=document.createElement('h4'); hh.textContent=title+' ('+arr.length+')'; wrap.appendChild(hh);
    if(!arr.length){ var e=document.createElement('p'); e.className='hint'; e.textContent='Žádné.'; wrap.appendChild(e); return;}
    var ul=document.createElement('ul'); ul.className='reslist';
    arr.forEach(function(x){ ul.appendChild(render(x)); }); wrap.appendChild(ul);
  }
  sec('Odkazy z této stránky',uniq(out),function(t){
    var li=document.createElement('li'); var a=document.createElement('a'); a.href='#'; a.textContent=t;
    var pg=pageByTitle(t);
    a.onclick=function(e){e.preventDefault(); if(pg) openPage(pg.id); else say("Cílová stránka neexistuje.");};
    li.appendChild(a); if(!pg){ var s=document.createElement('span'); s.className='sub';
      s.textContent=' — neexistuje'; li.appendChild(s);} return li;});
  sec('Odkazy na tuto stránku',inb,function(o){
    var li=document.createElement('li'); var a=document.createElement('a'); a.href='#';
    a.textContent=o.page.title; a.onclick=function(e){e.preventDefault(); openPage(o.page.id,o.section.id);};
    li.appendChild(a); return li;});
  /* vnitřní odkazy na ID */
  var refOut=[], refIn=[];

    var dd=document.createElement('div'); dd.innerHTML=it.html||'';
    Array.prototype.forEach.call(dd.querySelectorAll('a[data-ref]'),function(a){
      var rr=parseRef(a.getAttribute('data-ref'));
      if(rr) refOut.push(rr); });
    r(it.children);});})(p.items);
  /* které cizí odstavce odkazují sem – na tuto stránku nebo její odstavce */
  var mine={}; mine[p.id]=1;
  (function r(list){list.forEach(function(it){ mine[it.id]=1; r(it.children); });})(p.items);
  allPages().forEach(function(o){
    if(o.page.id===p.id) return;
    (function r(list){list.forEach(function(it){
      var dd=document.createElement('div'); dd.innerHTML=it.html||'';
      Array.prototype.forEach.call(dd.querySelectorAll('a[data-ref]'),function(a){
        var rr=parseRef(a.getAttribute('data-ref'));
        if(rr && mine[rr.id]) refIn.push({o:o,it:it}); });
      r(it.children);});})(o.page.items);
  });
  sec('Vnitřní odkazy z této stránky',refOut,function(rr){
    var li=document.createElement('li');
    var lab=refLabel(rr.kind,rr.id);
    var a=document.createElement('a'); a.href='#';
    a.textContent=(lab||'(cíl neexistuje)').slice(0,70);
    a.onclick=function(e){e.preventDefault(); gotoRef(refUrl(rr.kind,rr.id));};
    var sp=document.createElement('span'); sp.className='sub';
    sp.textContent=' — '+refKindName(rr.kind)+(lab?'':' , cíl chybí');
    li.appendChild(a); li.appendChild(sp); return li;});
  sec('Vnitřní odkazy na tuto stránku',refIn,function(x){
    var li=document.createElement('li');
    var a=document.createElement('a'); a.href='#';
    a.textContent=(plain(x.it.html).slice(0,60)||'(prázdný řádek)');
    a.onclick=function(e){e.preventDefault(); openPage(x.o.page.id,x.o.section.id);
      setTimeout(function(){ expandTo(x.it.id); focusItem(x.it.id); flashItem(x.it.id); },60);};
    var sp=document.createElement('span'); sp.className='sub';
    sp.textContent=' — '+x.o.page.title;
    li.appendChild(a); li.appendChild(sp); return li;});
  sec('Chybějící cíle',uniq(missing),function(t){
    var li=document.createElement('li'); var b=document.createElement('button'); b.type='button';
    b.textContent='Vytvořit stránku „'+t+'“';

      var np=newPage(t); s.pages.push(np); openPage(np.id,s.id); };
    li.appendChild(b); return li;});
  return wrap;
}

   '<div id="sres" role="region" aria-live="polite" aria-label="Výsledky hledání"></div>',
   [{t:'Zavřít'}],
   function(){ $('sgo').onclick=runSearch;
     $('sq').addEventListener('keydown',function(e){ if(e.key==='Enter'){e.preventDefault(); runSearch();} }); });
}
function runSearch(){
  var q=$('sq').value.trim(), scope=$('sscope').value, fk=$('sflag').value;
  var cs=$('scase').checked, titles=$('stitles').checked;
  var box=$('sres'); box.innerHTML="";
  if(!q && !fk){ box.innerHTML='<p class="hint">Zadejte výraz nebo vyberte příznak.</p>'; return; }
  var pages=allPages();
  if(scope==='sec') pages=pages.filter(function(o){return o.section.id===curSecId;});
  if(scope==='page') pages=pages.filter(function(o){return o.page.id===curPageId;});
  var hits=[];
  pages.forEach(function(o){
    if(titles && q && cmp(o.page.title,q,cs)) hits.push({o:o,it:null,txt:'Název stránky: '+o.page.title});
    (function r(list){list.forEach(function(it){
      var t=plain(it.html);
      var okQ = !q || cmp(t,q,cs);
      var okF = !fk || it.flags.indexOf(fk)>=0;
      if(okQ&&okF) hits.push({o:o,it:it,txt:t||'(prázdný řádek)'});
      r(it.children);});})(o.page.items);
  });
  if(!hits.length){ box.innerHTML='<p>Nenalezeno nic odpovídajícího.</p>'; return; }
  var h=document.createElement('p'); h.textContent='Nalezeno '+hits.length+' výsledků.'; box.appendChild(h);
  var ul=document.createElement('ul'); ul.className='reslist';
  hits.forEach(function(x){
    var li=document.createElement('li');
    var a=document.createElement('a'); a.href='#';
    a.innerHTML=hi(x.txt.slice(0,140),q,cs);
    a.onclick=function(e){e.preventDefault(); closeDlg(); openPage(x.o.page.id,x.o.section.id);
      if(x.it) setTimeout(function(){ expandTo(x.it.id); focusItem(x.it.id);},60); };
    var s=document.createElement('span'); s.className='sub';
    s.textContent=' — '+x.o.section.name+' › '+x.o.page.title+
      (x.it&&x.it.flags.length?' ['+x.it.flags.map(function(k){return flagDef(k).n;}).join(', ')+']':'');
    li.appendChild(a); li.appendChild(s); ul.appendChild(li);
  });
  box.appendChild(ul);
}
function cmp(t,q,cs){ return cs ? t.indexOf(q)>=0 : t.toLowerCase().indexOf(q.toLowerCase())>=0; }
function hi(t,q,cs){ if(!q) return esc(t);
  var i = cs? t.indexOf(q) : t.toLowerCase().indexOf(q.toLowerCase());
  if(i<0) return esc(t);
  return esc(t.slice(0,i))+'<mark class="find">'+esc(t.substr(i,q.length))+'</mark>'+esc(t.slice(i+q.length));}
function expandTo(id){
  var p=curPage(); if(!p) return;
  (function r(list){ var f=false; list.forEach(function(it){
      if(it.id===id){f=true;return;}
      if(r(it.children)){ it.collapsed=false; f=true; } }); return f; })(p.items);
  renderPage();
}

/* ===================== HISTORIE ===================== */
function pushHistory(){
  var p=curPage(); if(!p) return;
  p.history=p.history||[];
  p.history.push({at:new Date().toISOString(),items:JSON.parse(JSON.stringify(p.items))});
  if(p.history.length>20) p.history.shift();
}
function dlgHistory(){
  var p=curPage(); if(!p){say("Není otevřena stránka.");return;}
  var h=p.history||[];
  var body='<p>Vytvořeno: '+new Date(p.created).toLocaleString('cs-CZ')+
   ', naposledy změněno: '+new Date(p.modified).toLocaleString('cs-CZ')+'</p>';
  if(!h.length) body+='<p class="hint">Zatím nejsou uloženy žádné starší verze. Verze se ukládá tlačítkem níže.</p>';

}
/* ===================== EXPORT / IMPORT ===================== */
function download(name,mime,data){
  try{
    var b=new Blob([data],{type:mime}); var u=URL.createObjectURL(b);
    var a=document.createElement('a'); a.href=u; a.download=name;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    setTimeout(function(){URL.revokeObjectURL(u);},2000);
  }catch(e){
    dbg('Stažení selhalo: '+e.message);
    say('Soubor se nepodařilo stáhnout. Zkuste jiný prohlížeč.');
  }
}
function saveJson(){
  if(!nb){say("Není co uložit.");return;}
  download(slug(nb.name)+'.mron.json','application/json',JSON.stringify(nb,null,1));
  dirty=false; say("Poznámkový blok uložen do souboru.");
}
function slug(s){ return String(s).normalize('NFD').replace(/[\u0300-\u036f]/g,'')
  .replace(/[^a-zA-Z0-9]+/g,'-').replace(/^-|-$/g,'').toLowerCase()||'mronenote'; }

function exportHtml(){
  if(!nb){say("Není co exportovat.");return;}
  var out='<!DOCTYPE html><html lang="cs"><head><meta charset="utf-8"><title>'+esc(nb.name)+
   '</title><style>body{font-family:sans-serif;max-width:50rem;margin:1rem auto;padding:0 1rem}'+
   'ul{margin:.2rem 0}.flag{font-size:.75rem;border:1px solid #999;border-radius:9px;padding:0 .3rem;margin-right:.2rem}'+
   '.done{text-decoration:line-through;color:#666}</style></head><body>';
  out+='<h1>'+esc(nb.name)+'</h1>';
  (function walk(list,lvl){ list.forEach(function(n){
    var hl=Math.min(lvl+1,6);
    out+='<h'+hl+'>'+esc(n.name)+(isGroup(n)?' <small>(skupina oddílů)</small>':'')+'</h'+hl+'>';
    if(isGroup(n)) walk(kids(n),lvl+1);
    else (function rp(pages,l){ pages.forEach(function(p){
      var ph=Math.min(l+1,6);
      out+='<h'+ph+'>'+esc(p.title)+'</h'+ph+'>'+itemsHtml(p.items);
      if(p.sub) rp(p.sub,l+1); }); })(n.pages,lvl+1);
  }); })(nb.sections,2);
  out+='</body></html>';
  download(slug(nb.name)+'.html','text/html;charset=utf-8',out);
  say("Export do HTML dokončen.");
}
function itemsHtml(list){
  if(!list.length) return '';
  var o='<ul>';
  list.forEach(function(it){
    o+='<li'+(it.done?' class="done"':'')+'>';
    it.flags.forEach(function(k){ o+='<span class="flag">'+esc(flagDef(k).s+' '+flagDef(k).n)+'</span> '; });
    o+=it.html||'';
    o+=itemsHtml(it.children)+'</li>';
  });
  return o+'</ul>';
}
function exportMd(){
  if(!nb){say("Není co exportovat.");return;}
  var out='# '+nb.name+'\n\n';
  (function walk(list,lvl){ list.forEach(function(n){
    out+=new Array(Math.min(lvl,6)+1).join('#')+' '+n.name+
         (isGroup(n)?' (skupina oddílů)':'')+'\n\n';
    if(isGroup(n)) walk(kids(n),lvl+1);
    else (function rp(pages,l){ pages.forEach(function(p){
      out+=new Array(Math.min(l,6)+1).join('#')+' '+p.title+'\n\n'+itemsMd(p.items,0)+'\n';
      if(p.sub) rp(p.sub,l+1); }); })(n.pages,lvl+1);
  }); })(nb.sections,2);
  download(slug(nb.name)+'.md','text/markdown;charset=utf-8',out);
  say("Export do Markdownu dokončen.");
}
function itemsMd(list,ind){
  var o='';
  list.forEach(function(it){
    var pre=new Array(ind+1).join('  ')+'- ';
    if(it.list==='todo') pre+= it.done?'[x] ':'[ ] ';
    var fl=it.flags.map(function(k){return '@'+k;}).join(' ');
    var t=plain(it.html);
    var d=document.createElement('div'); d.innerHTML=it.html||'';
    Array.prototype.forEach.call(d.querySelectorAll('a[data-wiki]'),function(a){
      a.outerHTML='[['+a.getAttribute('data-wiki')+']]'; });
    Array.prototype.forEach.call(d.querySelectorAll('a[data-ref]'),function(a){
      a.outerHTML='['+a.textContent+']('+a.getAttribute('data-ref')+')'; });
    t=d.textContent;
    o+=pre+(fl?fl+' ':'')+t+'\n'+itemsMd(it.children,ind+1);
  });
  return o;
}
function importMd(text,name){
  snapshot('import markdownu');
  if(!nb) nb=newNotebook(name||'Import');
  var s=newSection(name||'Import'); nb.sections.push(s);
  var page=newPage(name||'Importovaná stránka'); page.items=[]; s.pages.push(page);
  var stack=[{lvl:-1,arr:page.items}];
  text.split(/\r?\n/).forEach(function(line){
    if(!line.trim()) return;
    var mh=line.match(/^(#{1,6})\s+(.*)$/);
    if(mh){ var it=newItem(esc(mh[2])); it.style = mh[1].length<=1?'h1':(mh[1].length===2?'h2':'h3');
      page.items.push(it); stack=[{lvl:-1,arr:page.items}]; return; }
    var m=line.match(/^(\s*)[-*+]\s+(.*)$/);
    var ind, txt;
    if(m){ ind=Math.floor(m[1].length/2); txt=m[2]; }
    else { ind=0; txt=line.trim(); }
    var it2=newItem('');
    var td=txt.match(/^\[([ xX])\]\s*(.*)$/);
    if(td){ it2.list='todo'; it2.done=/[xX]/.test(td[1]); txt=td[2];
      it2.flags.push(it2.done?'hotovo':'ukol'); }
    txt=txt.replace(/@([a-zá-ž]+)/gi,function(mm,k){ 
      var kk=k.toLowerCase(); if(flagDef(kk).n!==kk){ it2.flags.push(kk); return ''; } return mm; });
    var h=esc(txt.trim()).replace(/\[\[([^\[\]|]+)(\|([^\[\]]+))?\]\]/g,function(mm,t,x,lab){
      return wikiHtml(t.trim(),lab?lab.trim():t.trim()); });
    it2.html=h;
    while(stack.length>1 && stack[stack.length-1].lvl>=ind) stack.pop();
    stack[stack.length-1].arr.push(it2);
    stack.push({lvl:ind,arr:it2.children});
  });
  if(!page.items.length) page.items.push(newItem(''));
  openPage(page.id,s.id); say("Markdown importován.");
}

function nbToText(){ return JSON.stringify(nb,null,1); }

  if(!cand || !cand.sections){ say('Data neobsahují poznámkový blok.'); return false; }
  snapshot('načtení ze schránky');
  nb=cand; normalize(); undoStack=[]; redoStack=[];
  var first=allPages()[0];
  curPageId=first?first.page.id:null; curSecId=first?first.section.id:null;
  renderAll(); persist();
  say('Poznámkový blok načten'+(src?' '+src:'')+'.');
  return true;
}
function copyToClipboard(){

function clipFallbackCopy(txt){

function pasteFromClipboard(){

/* ===================== VNITŘNÍ ODKAZY NA ID =====================
   Na rozdíl od wiki odkazu, který míří na název stránky, tyto odkazy
   míří na vnitřní identifikátor uzlu. Nerozbijí se tedy přejmenováním.
   Tvar: mronenote:<druh>/<id>  (druh: item | page | section | group | notebook) */
/* platnost odkazů se vyhodnocuje při každém vykreslení,
   aby se smazaný cíl poznal i zpětně */
function refreshLinkState(root){
  Array.prototype.forEach.call(root.querySelectorAll('a[data-ref]'),function(a){
    var r=parseRef(a.getAttribute('data-ref'));
    var lab=r?refLabel(r.kind,r.id):null;
    if(lab){ a.classList.remove('missing');
      a.title='Odkaz na '+refKindName(r.kind)+': '+lab; }
    else { a.classList.add('missing');
      a.title='Odkaz na '+(r?refKindName(r.kind):'cíl')+' – cíl neexistuje'; }
  });
  Array.prototype.forEach.call(root.querySelectorAll('a[data-wiki]'),function(a){
    if(pageByTitle(a.getAttribute('data-wiki'))) a.classList.remove('missing');
    else a.classList.add('missing');
  });
}
function refUrl(kind,id){ return 'mronenote:'+kind+'/'+id; }
function parseRef(u){
  var m=String(u||'').match(/^mronenote:(item|page|section|group|notebook)\/(.+)$/);
  return m?{kind:m[1],id:m[2]}:null;
}
/* najde položku osnovy napříč všemi stránkami */
function findItemAnywhere(id){
  var res=null;
  allPages().forEach(function(o){
    if(res) return;
    (function r(list){ list.forEach(function(it){
      if(res) return;
      if(it.id===id){ res={item:it,page:o.page,section:o.section}; return; }
      r(it.children); }); })(o.page.items);
  });
  return res;
}
/* popisný text cíle – používá se jako výchozí text odkazu */
function refLabel(kind,id){
  if(kind==='notebook') return nb?nb.name:'poznámkový blok';
  if(kind==='item'){ var f=findItemAnywhere(id);
    return f ? (plain(f.item.html).trim()||'(prázdný řádek)') : null; }
  if(kind==='page'){ var p=getPage(id); return p?p.title:null; }
  var n=getNode(id); return n?n.name:null;
}
function refKindName(kind){
  return kind==='item'?'odstavec':(kind==='page'?'stránku':
    (kind==='group'?'skupinu oddílů':(kind==='section'?'oddíl':'poznámkový blok')));
}
function refHtml(kind,id,label){
  var real=refLabel(kind,id);
  var txt=label||real||'(neznámý cíl)';
  if(txt.length>80) txt=txt.slice(0,80)+'…';
  return '<a class="reflink'+(real?'':' missing')+'" href="'+xesc(refUrl(kind,id))+
    '" data-ref="'+xesc(refUrl(kind,id))+'" title="Odkaz na '+refKindName(kind)+
    (real?': '+xesc(real):' – cíl neexistuje')+'">'+esc(txt)+'</a>';
}
/* přechod na cíl odkazu */
function gotoRef(u){
  var r=parseRef(u);
  if(!r){ say('Neplatný vnitřní odkaz.'); return false; }
  if(r.kind==='notebook'){ say('Odkaz míří na tento poznámkový blok.'); return true; }
  if(r.kind==='item'){
    var f=findItemAnywhere(r.id);
    if(!f){ say('Cílový odstavec už neexistuje.'); return false; }
    openPage(f.page.id,f.section.id);
    expandTo(f.item.id);
    setTimeout(function(){ focusItem(f.item.id); flashItem(f.item.id); },60);
    say('Přechod na odstavec: '+(plain(f.item.html).slice(0,60)||'prázdný řádek'));
    return true;
  }
  if(r.kind==='page'){
    var p=getPage(r.id);
    if(!p){ say('Cílová stránka už neexistuje.'); return false; }
    var sec=pageSection(r.id);
    openPage(p.id,sec?sec.id:null); return true;
  }
  var n=getNode(r.id);
  if(!n){ say('Cílový '+refKindName(r.kind)+' už neexistuje.'); return false; }
  /* u oddílu otevřeme jeho první stránku, u skupiny ji jen rozbalíme a ohlásíme */
  if(!isGroup(n) && n.pages.length){ openPage(n.pages[0].id,n.id); }
  else {
    n.collapsed=false; curNodeId=n.id; renderNav();
    say('Přechod na '+refKindName(r.kind)+': '+n.name);
  }
  return true;
}
function flashItem(id){
  var el=document.querySelector('.txt[data-id="'+id+'"]');
  if(!el) return;
  el.classList.add('flash');
  setTimeout(function(){ el.classList.remove('flash'); },1600);
}

/* ---- schránka na odkaz ---- */
var refClip=null;   /* {kind,id,label} – vnitřní záloha pro případ, že systémová schránka není */
function copyRef(kind,id){
  var label=refLabel(kind,id);
  if(!label){ say('Cíl odkazu se nepodařilo určit.'); return; }
  refClip={kind:kind,id:id,label:label};
  var url=refUrl(kind,id);
  /* do systémové schránky dáme čitelný tvar „text <url>“, aby odkaz šel použít i jinde */
  var txt=label+' <'+url+'>';
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(txt).then(function(){
      say('Odkaz na '+refKindName(kind)+' zkopírován: '+label.slice(0,50)+
          '. Vložte jej klávesou Ctrl+Shift+V.');
    },function(){ sayRefCopied(kind,label); });
  } else sayRefCopied(kind,label);
}
function sayRefCopied(kind,label){
  say('Odkaz na '+refKindName(kind)+' připraven k vložení: '+label.slice(0,50)+
      '. Vložte jej klávesou Ctrl+Shift+V.');
}
/* vložení odkazu do právě upravovaného řádku */
function pasteRef(){
  var it=requireItem(); if(!it) return;
  if(!refClip){ say('Nejprve zkopírujte odkaz, například z nabídky Úpravy.'); return; }
  var cur=refLabel(refClip.kind,refClip.id);
  if(!cur){ say('Cíl odkazu už neexistuje.'); return; }
  if(refClip.kind==='item' && refClip.id===it.id){
    say('Odkaz by mířil sám na sebe, vložení zrušeno.'); return; }
  insertHtmlAtCaret(refHtml(refClip.kind,refClip.id,null)+'&nbsp;');
  renderPage(); focusItem(it.id);
  say('Vložen odkaz na '+refKindName(refClip.kind)+': '+cur.slice(0,50));
}
/* dialog pro ruční výběr cíle – bez myši a bez nutnosti kopírovat */
function dlgRefInsert(){

    (function r(list,d){ list.forEach(function(x){

        opts+='<option value="item/'+x.id+'">'+

  });
  openDlg('Vložit vnitřní odkaz',

   '<div class="field"><label for="reflbl">Zobrazený text (nepovinné)</label>'+
   '<input type="text" id="reflbl"></div>'+

   'nerozbije přejmenováním stránky ani oddílu.</p>',

/* ===================== EXPORT DO DOCX =====================
   Vlastní zapisovač OOXML. Balík .docx je ZIP; ukládáme bez komprese
   (metoda 0 – stored), takže není potřeba žádná knihovna ani server.   */
function crc32(bytes){
  var c, tbl=crc32.t;
  if(!tbl){ tbl=crc32.t=[];
    for(var n=0;n<256;n++){ c=n;
      for(var k=0;k<8;k++) c=(c&1)?(0xEDB88320^(c>>>1)):(c>>>1);
      tbl[n]=c>>>0; } }
  var crc=0xFFFFFFFF;
  for(var i=0;i<bytes.length;i++) crc=(crc>>>8)^tbl[(crc^bytes[i])&0xFF];
  return (crc^0xFFFFFFFF)>>>0;
}
function utf8(str){
  if(window.TextEncoder) return new TextEncoder().encode(str);
  var s=unescape(encodeURIComponent(str)), a=new Uint8Array(s.length);
  for(var i=0;i<s.length;i++) a[i]=s.charCodeAt(i);
  return a;
}
function zipStore(files){
  /* files: [{name, data:Uint8Array}] -> Uint8Array (ZIP, metoda 0) */
  var chunks=[], central=[], offset=0;
  function u16(n){ return [n&0xFF,(n>>8)&0xFF]; }
  function u32(n){ return [n&0xFF,(n>>8)&0xFF,(n>>16)&0xFF,(n>>>24)&0xFF]; }
  files.forEach(function(f){
    var nameB=utf8(f.name), crc=crc32(f.data), len=f.data.length;
    var local=[].concat([0x50,0x4B,0x03,0x04],u16(20),u16(0x0800),u16(0),u16(0),u16(0),
      u32(crc),u32(len),u32(len),u16(nameB.length),u16(0));
    chunks.push(new Uint8Array(local)); chunks.push(nameB); chunks.push(f.data);
    central.push([].concat([0x50,0x4B,0x01,0x02],u16(20),u16(20),u16(0x0800),u16(0),
      u16(0),u16(0),u32(crc),u32(len),u32(len),u16(nameB.length),
      u16(0),u16(0),u16(0),u16(0),u32(0),u32(offset)));
    central.push(nameB);
    offset += local.length + nameB.length + len;
  });
  var cd=[], cdLen=0;
  central.forEach(function(p){ var a=(p instanceof Uint8Array)?p:new Uint8Array(p);
    cd.push(a); cdLen+=a.length; });
  var end=new Uint8Array([].concat([0x50,0x4B,0x05,0x06],u16(0),u16(0),
    u16(files.length),u16(files.length),u32(cdLen),u32(offset),u16(0)));
  var total=offset+cdLen+end.length, out=new Uint8Array(total), pos=0;
  chunks.forEach(function(c){ out.set(c,pos); pos+=c.length; });
  cd.forEach(function(c){ out.set(c,pos); pos+=c.length; });
  out.set(end,pos);
  return out;
}
function xesc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;')
  .replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

/* ---- CriticMarkup ----
   {++vloženo++} {--smazáno--} {~~původní~>nové~~} {>>poznámka<<} {==zvýrazněno==}
   Mapování do OOXML: vložení -> w:ins, smazání -> w:del s w:delText,
   záměna -> w:del + w:ins, poznámka -> skutečný komentář Wordu,
   zvýraznění -> w:highlight. Vše jsou nativní revize, takže je lze
   ve Wordu přijmout či odmítnout. */
var CRITIC_RE = /\{\+\+([\s\S]*?)\+\+\}|\{--([\s\S]*?)--\}|\{~~([\s\S]*?)~>([\s\S]*?)~~\}|\{>>([\s\S]*?)<<\}|\{==([\s\S]*?)==\}/g;
function parseCritic(text){
  /* -> pole {kind,text[,text2]} ; kind: plain|ins|del|sub|comment|mark */
  var out=[], last=0, m;
  CRITIC_RE.lastIndex=0;
  while((m=CRITIC_RE.exec(text))!==null){
    if(m.index>last) out.push({kind:'plain',text:text.slice(last,m.index)});
    if(m[1]!==undefined)      out.push({kind:'ins',text:m[1]});
    else if(m[2]!==undefined) out.push({kind:'del',text:m[2]});
    else if(m[3]!==undefined) out.push({kind:'sub',text:m[3],text2:m[4]});
    else if(m[5]!==undefined) out.push({kind:'comment',text:m[5]});
    else if(m[6]!==undefined) out.push({kind:'mark',text:m[6]});
    last=m.index+m[0].length;
  }
  if(last<text.length) out.push({kind:'plain',text:text.slice(last)});
  return out;
}
function hasCritic(text){ CRITIC_RE.lastIndex=0; return CRITIC_RE.test(text); }

/* ---- převod řádku osnovy na běhy OOXML ---- */
var DOCX_AUTHOR='Mronenote';
var docxRev, docxComments;
function runXml(txt,props){
  if(txt==='') return '';
  return '<w:r>'+(props||'')+'<w:t xml:space="preserve">'+xesc(txt)+'</w:t></w:r>';
}
function delRunXml(txt,props){
  return '<w:r>'+(props||'')+'<w:delText xml:space="preserve">'+xesc(txt)+'</w:delText></w:r>';
}
function revAttrs(){
  return ' w:id="'+(docxRev++)+'" w:author="'+xesc(DOCX_AUTHOR)+
         '" w:date="'+new Date().toISOString().replace(/\.\d+Z$/,'Z')+'"';
}
/* HTML řádku -> prostý text se zachováním zvýraznění a odkazů jako textu */
function itemPlainForDocx(it){
  var d=document.createElement('div'); d.innerHTML=it.html||'';
  Array.prototype.forEach.call(d.querySelectorAll('a[data-wiki]'),function(a){
    a.textContent=a.textContent+' ['+a.getAttribute('data-wiki')+']'; });
  Array.prototype.forEach.call(d.querySelectorAll('a[data-ref]'),function(a){
    var r=parseRef(a.getAttribute('data-ref'));
    var tgt=r?refLabel(r.kind,r.id):null;
    a.textContent='→ '+a.textContent+(tgt&&tgt!==a.textContent?' ('+refKindName(r.kind)+': '+tgt+')':'');
  });
  return d.textContent||'';
}
function runsForText(text,baseProps){
  var parts=parseCritic(text), xml='';
  parts.forEach(function(p){
    if(p.kind==='plain'){ xml+=runXml(p.text,baseProps); return; }
    if(p.kind==='ins'){
      xml+='<w:ins'+revAttrs()+'>'+runXml(p.text,baseProps)+'</w:ins>'; return; }
    if(p.kind==='del'){
      xml+='<w:del'+revAttrs()+'>'+delRunXml(p.text,baseProps)+'</w:del>'; return; }
    if(p.kind==='sub'){
      xml+='<w:del'+revAttrs()+'>'+delRunXml(p.text,baseProps)+'</w:del>';
      xml+='<w:ins'+revAttrs()+'>'+runXml(p.text2,baseProps)+'</w:ins>'; return; }
    if(p.kind==='mark'){
      var hp=(baseProps||'').replace('</w:rPr>','')||'<w:rPr>';
      if(!/^<w:rPr>/.test(hp)) hp='<w:rPr>';
      xml+=runXml(p.text,hp+'<w:highlight w:val="yellow"/></w:rPr>'); return; }
    if(p.kind==='comment'){
      /* skutečný komentář Wordu ukotvený na předchozí text */
      var cid=docxComments.length;
      docxComments.push({id:cid,text:p.text});
      xml+='<w:commentRangeStart w:id="'+cid+'"/>'+
           runXml('','')+
           '<w:commentRangeEnd w:id="'+cid+'"/>'+
           '<w:r><w:rPr><w:rStyle w:val="CommentReference"/></w:rPr>'+
           '<w:commentReference w:id="'+cid+'"/></w:r>';
      return; }
  });
  return xml;
}

/* ---- příznaky do DOCX ----
   Příznak není jen barva: exportuje se jako čitelný textový štítek na začátku
   odstavce (symbol + název), takže zůstává srozumitelný i v tisku a v odečítači.
   Úkoly navíc dostanou zaškrtávací pole ☐/☒ a hotové úkoly přeškrtnutí. */
function flagPrefixXml(it){
  if(!it.flags.length) return '';
  var xml='';
  it.flags.forEach(function(k){
    var f=flagDef(k);
    xml+=runXml('['+f.s+' '+f.n+'] ',
      '<w:rPr><w:b/><w:color w:val="5B2D90"/><w:sz w:val="18"/></w:rPr>');
  });
  return xml;
}
function paraProps(it,depth){
  var p='<w:pPr>';
  var style = it.style==='h1'?'Heading2':(it.style==='h2'?'Heading3':(it.style==='h3'?'Heading4':null));
  if(style) p+='<w:pStyle w:val="'+style+'"/>';
  if(it.style==='quote') p+='<w:pStyle w:val="Quote"/>';
  if(it.style==='code') p+='<w:pStyle w:val="HTMLPreformatted"/>';
  var indent=(depth-1)*360;
  if(it.list==='ul'||it.list==='ol')
    p+='<w:numPr><w:ilvl w:val="'+Math.min(depth-1,8)+'"/><w:numId w:val="'+(it.list==='ol'?2:1)+'"/></w:numPr>';
  else if(indent) p+='<w:ind w:left="'+indent+'"/>';
  p+='</w:pPr>';
  return p;
}
function itemToParas(it,depth,out){
  var txt=itemPlainForDocx(it);
  var base = it.done ? '<w:rPr><w:strike/><w:color w:val="666666"/></w:rPr>' : '';
  var body='';
  if(it.list==='todo') body+=runXml((it.done?'☒':'☐')+' ','');
  body+=flagPrefixXml(it);
  body+=runsForText(txt,base);
  if(body==='') body=runXml('','');
  out.push('<w:p>'+paraProps(it,depth)+body+'</w:p>');
  if(it.att){
    out.push('<w:p><w:pPr><w:ind w:left="'+(depth*360)+'"/></w:pPr>'+
      runXml((it.att.kind==='img'?'[Obrázek: ':'[Příloha: ')+it.att.name+
        (it.att.kind==='img'&&it.att.alt?' – '+it.att.alt:'')+']',
        '<w:rPr><w:i/><w:color w:val="666666"/></w:rPr>')+'</w:p>');
  }
  if(it.style==='rule')
    out.push('<w:p><w:pPr><w:pBdr><w:bottom w:val="single" w:sz="6" w:color="999999"/></w:pBdr></w:pPr></w:p>');
  it.children.forEach(function(c){ itemToParas(c,depth+1,out); });
}

    '<w:style w:type="character" w:styleId="CommentReference">'+

  function lvls(bullet){

         '<w:lvlJc w:val="left"/><w:pPr><w:ind w:left="'+(360*(i+1)+360)+'" w:hanging="360"/></w:pPr>'+
         (bullet?'<w:rPr><w:rFonts w:ascii="Symbol" w:hAnsi="Symbol"/></w:rPr>':'')+

  var commentsXml='<?xml version="1.0" encoding="UTF-8" standalone="yes"?>'+
    '<w:comments '+W+'>'+

    '<Relationship Id="rId2" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/numbering" Target="numbering.xml"/>'+
    '<Relationship Id="rId3" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/comments" Target="comments.xml"/>'+
    '</Relationships>';

  var core='<?xml version="1.0" encoding="UTF-8" standalone="yes"?>'+

function exportDocx(whole){
  if(!nb){ say('Není co exportovat.'); return; }
  docxRev=1; docxComments=[];
  var paras=[], title;
  if(whole){
    title=nb.name;
    paras.push('<w:p><w:pPr><w:pStyle w:val="Heading1"/></w:pPr>'+runXml(nb.name,'')+'</w:p>');
    walkNodes(function(n,list,i,parent,depth){
      paras.push('<w:p><w:pPr><w:pStyle w:val="Heading'+Math.min(depth+1,4)+'"/></w:pPr>'+
        runXml((isGroup(n)?'Skupina oddílů: ':'')+n.name,'')+'</w:p>');
      if(!isGroup(n)) n.pages.forEach(function(p){ pageParas(p,paras,3); });
    });
  } else {
    var p=curPage(); if(!p){ say('Není otevřena stránka.'); return; }
    title=p.title; pageParas(p,paras,1);
  }
  var bytes=buildDocx(title,paras);
  download(slug(title)+'.docx',
    'application/vnd.openxmlformats-officedocument.wordprocessingml.document',bytes);
  say('Export do DOCX dokončen'+(docxComments.length?
    ', komentářů: '+docxComments.length:'')+
    (docxRev>1?', revizí: '+(docxRev-1):'')+'.');
}
function pageParas(p,paras,lvl){
  paras.push('<w:p><w:pPr><w:pStyle w:val="Heading'+Math.min(lvl+1,4)+'"/></w:pPr>'+
    runXml(p.title,'')+'</w:p>');
  p.items.forEach(function(it){ itemToParas(it,1,paras); });
  if(p.sub) p.sub.forEach(function(c){ pageParas(c,paras,lvl+1); });
}

/* ===================== ÚLOŽIŠTĚ ===================== */
var KEY='mronenote.v1';
var asTimer=null;
function scheduleAutosave(){
  if(!nb||!nb.settings.autosave) return;
  clearTimeout(asTimer); asTimer=setTimeout(persist,800);
}
function persist(){
  try{ localStorage.setItem(KEY,JSON.stringify({nb:nb,page:curPageId,sec:curSecId}));
    dbg("Uloženo do úložiště prohlížeče."); }
  catch(e){ dbg("Chyba ukládání: "+e.message); say("Data se nepodařilo uložit do prohlížeče."); }
}
function restore(){
  try{
    var raw=localStorage.getItem(KEY); if(!raw) return false;
    var o=JSON.parse(raw); if(!o||!o.nb) return false;
    nb=o.nb; curPageId=o.page; curSecId=o.sec;
    if(!nb.settings) nb.settings={theme:'light',fontsize:16,autosave:true,debug:false};
    normalize(); dbg("Obnoveno z úložiště."); return true;
  }catch(e){ dbg("Chyba obnovy: "+e.message); return false; }
}
function normalize(){
  if(!nb) return;
  nb.sections=nb.sections||[];
  /* migrace starších souborů: uzel bez type je oddíl */
  (function mig(list){ list.forEach(function(n,i){
    if(!n.type) n.type = n.children ? 'group' : 'section';
    if(n.color===undefined) n.color=null;
    if(isGroup(n)){ n.children=n.children||[]; mig(n.children); }
    else {
      n.pages=n.pages||[];
      (function rp(a){ a.forEach(function(p){
        p.items=p.items||[newItem('')]; p.history=p.history||[];
        (function ri(l){ l.forEach(function(it){ it.flags=it.flags||[]; it.children=it.children||[];
          it.style=it.style||'p'; it.list=it.list||''; ri(it.children); }); })(p.items);
        if(p.sub) rp(p.sub); }); })(n.pages);
    }
  }); })(nb.sections);
}
function dlgSettings(){
  openDlg('Nastavení',
   '<div class="field"><label for="setName">Název poznámkového bloku</label>'+
   '<input type="text" id="setName" value="'+esc(nb?nb.name:'')+'"></div>'+
   '<div class="row"><div class="field"><label for="setTheme">Motiv</label><select id="setTheme">'+
   '<option value="light">Světlý</option><option value="dark">Tmavý</option>'+

function moveTargets(exclId){
  var opts='<option value="__root">(nejvyšší úroveň poznámkového bloku)</option>';
  walkNodes(function(n,list,i,parent,depth){
    if(!isGroup(n)) return;
    if(n.id===exclId) return;
    /* nelze přesunout do vlastního potomka */
    var p=nodePath(n.id);
    for(var j=0;j<p.length;j++) if(p[j].id===exclId) return;
    opts+='<option value="'+n.id+'">'+esc(new Array(depth).join('— ')+n.name)+'</option>';
  });
  return opts;
}

function removeNode(id){

function applyMove(node,target){
  var loc=nodeLoc(node.id); if(!loc) return;
  var cur = loc.parent ? loc.parent.id : '__root';
  if(target===cur) return;
  loc.arr.splice(loc.idx,1);
  if(target==='__root') nb.sections.push(node);
  else { var g=getNode(target); if(isGroup(g)){ kids(g).push(node); g.collapsed=false; }
         else nb.sections.push(node); }
  say('Přesunuto.');
}
