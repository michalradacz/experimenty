/* ===================== NABÍDKA ===================== */
var MENUS=[];
function initMenu(){
  MENUS = Array.prototype.slice.call(document.querySelectorAll('li.mtop')).map(function(li){
    return { top:li,
             btn:li.querySelector('.mbtn'),
             panel:li.querySelector('.mpanel') };
  });
  MENUS.forEach(function(m,idx){
    m.btn.addEventListener('click',function(e){
      e.preventDefault();
      var open = m.btn.getAttribute('aria-expanded')==='true';
      closeMenus();
      if(!open) openMenu(idx,false);
    });
    m.btn.addEventListener('keydown',function(e){
      if(e.key==='Escape'){ e.preventDefault(); closeMenus();
        var f=document.querySelector('.txt[contenteditable="true"]')||$('outlinewrap');
        if(f) f.focus(); say('Nabídka opuštěna.'); return; }
      if(e.key==='ArrowDown'||e.key==='Enter'||e.key===' '){
        e.preventDefault(); closeMenus(); openMenu(idx,true); return; }
      if(e.key==='ArrowUp'){ e.preventDefault(); closeMenus(); openMenu(idx,true,true); return; }
      if(e.key==='ArrowRight'){ e.preventDefault(); moveTop(idx,1); return; }
      if(e.key==='ArrowLeft'){ e.preventDefault(); moveTop(idx,-1); return; }
      if(e.key==='Home'){ e.preventDefault(); MENUS[0].btn.focus(); return; }
      if(e.key==='End'){ e.preventDefault(); MENUS[MENUS.length-1].btn.focus(); return; }
    });
    m.panel.addEventListener('keydown',function(e){ panelKey(e,idx,m); });
    /* kliknutí na položku nabídku zavře */
    Array.prototype.forEach.call(m.panel.querySelectorAll('button'),function(b){
      b.addEventListener('click',function(){ closeMenus(); });
    });
  });
  document.addEventListener('click',function(e){
    if(!e.target.closest || !e.target.closest('.menubar')) closeMenus();
  });
}
function focusMenubar(){
  if(!MENUS.length) return;
  closeMenus();
  MENUS[0].btn.focus();
  say('Nabídka. Pohybujte se šipkami vlevo a vpravo, dolů ji rozbalíte, Escape opustíte.');
}
function menuItems(m){
  return Array.prototype.slice.call(m.panel.querySelectorAll('button,select'))
    .filter(function(el){ return !el.disabled; });
}
function openMenu(idx,focusFirst,focusLast){
  var m=MENUS[idx];
  m.btn.setAttribute('aria-expanded','true');
  m.panel.hidden=false;
  var it=menuItems(m);
  if(focusLast && it.length) it[it.length-1].focus();
  else if(focusFirst && it.length) it[0].focus();
  say('Nabídka '+m.btn.textContent.trim()+' otevřena, '+it.length+' položek.');
}
function closeMenus(refocus){
  MENUS.forEach(function(m){ m.btn.setAttribute('aria-expanded','false'); m.panel.hidden=true; });
  if(refocus) refocus.focus();
}
function moveTop(idx,dir){
  var n=(idx+dir+MENUS.length)%MENUS.length;
  var wasOpen = MENUS[idx].btn.getAttribute('aria-expanded')==='true';
  closeMenus();
  MENUS[n].btn.focus();
  if(wasOpen) openMenu(n,true);
}
function panelKey(e,idx,m){
  var it=menuItems(m), i=it.indexOf(document.activeElement);
  if(e.key==='Escape'){ e.preventDefault(); closeMenus(); m.btn.focus(); say('Nabídka zavřena.'); return; }
  if(e.key==='ArrowDown'){ e.preventDefault(); it[(i+1)%it.length].focus(); return; }
  if(e.key==='ArrowUp'){ e.preventDefault(); it[(i-1+it.length)%it.length].focus(); return; }
  if(e.key==='Home'){ e.preventDefault(); it[0].focus(); return; }
  if(e.key==='End'){ e.preventDefault(); it[it.length-1].focus(); return; }
  if(e.key==='Tab'){ closeMenus(); return; }
  if(e.key==='ArrowRight' && document.activeElement.tagName!=='SELECT'){
    e.preventDefault(); moveTop(idx,1); return; }
  if(e.key==='ArrowLeft' && document.activeElement.tagName!=='SELECT'){
    e.preventDefault(); moveTop(idx,-1); return; }
}
/* Alt + přístupová klávesa */
var ACCESS={'s':0,'u':1,'f':2,'v':3,'p':4,'b':5,'z':6,'n':7};
document.addEventListener('keydown',function(e){
  if(!e.altKey||e.ctrlKey||e.shiftKey) return;
  var k=String(e.key||'').toLowerCase()
    .replace('ú','u').replace('ř','r').replace('ž','z').replace('š','s');
  if(ACCESS.hasOwnProperty(k) && MENUS.length){
    e.preventDefault(); closeMenus(); openMenu(ACCESS[k],true);
  }
});

on('btnTable',dlgTable);
on('btnImage',function(){ if(!requireItem()) return; $('fileImg').click(); });
$('fileImg').onchange=function(){ var f=this.files[0]; if(!f) return;
  var it=curItem(); var r=new FileReader();
  r.onload=function(){ ask('Popis obrázku','Alternativní text (povinný pro přístupnost)','',function(alt){
      snapshot('obrázek'); it.att={kind:'img',data:r.result,alt:alt||f.name,name:f.name,size:f.size};
      touch(); renderPage(); focusItem(it.id); say("Obrázek vložen."); }); };
  r.readAsDataURL(f); this.value=""; };
on('btnFile',function(){ if(!requireItem()) return; $('fileAtt').click(); });
$('fileAtt').onchange=function(){ var f=this.files[0]; if(!f) return;
  var it=curItem(); var r=new FileReader();
  r.onload=function(){ snapshot('příloha');
    it.att={kind:'file',data:r.result,name:f.name,size:f.size};
    touch(); renderPage(); focusItem(it.id); say("Příloha vložena."); };
  r.readAsDataURL(f); this.value=""; };
on('btnDate',function(){ var d=new Date();
  insertHtmlAtCaret(esc(d.toLocaleString('cs-CZ'))+' '); renderPage();
  if(curItemId) focusItem(curItemId); say("Datum vloženo."); });
on('btnRule',function(){ var i=requireItem(); if(!i) return;
  snapshot('oddělovač'); var loc=itemParentArr(i.id); var r=newItem(''); r.style='rule';
  loc.arr.splice(loc.idx+1,0,r); touch(); renderPage(); say("Oddělovač vložen."); });
on('btnFlagUkol',function(){toggleFlag('ukol');});
on('btnFlagDul',function(){toggleFlag('dulezite');});
on('btnFlagOt',function(){toggleFlag('otazka');});
on('btnFlagMore',dlgFlags);
on('btnFlagClear',clearFlags);
on('btnDone',toggleDone);
on('btnAddItem',function(){
  var p=curPage(); if(!p){say("Nejprve otevřete stránku.");return;}
  snapshot('nový řádek'); var it=newItem(''); p.items.push(it);
  touch(); renderPage(); focusItem(it.id); });
$('quickfilter').oninput=function(){ renderNav(); };

document.addEventListener('keydown',function(e){
  if(e.ctrlKey && !e.shiftKey && (e.key==='s'||e.key==='S')){ e.preventDefault(); saveJson(); }
  if(e.ctrlKey && !e.shiftKey && (e.key==='f'||e.key==='F')){ e.preventDefault(); dlgSearch(); }
  if(e.ctrlKey && !e.shiftKey && (e.key==='z'||e.key==='Z')){
    if(!/^(INPUT|TEXTAREA)$/.test(e.target.tagName) && !e.target.isContentEditable){ e.preventDefault(); doUndo(); } }
  if(e.ctrlKey && (e.key==='y'||e.key==='Y')){ e.preventDefault(); doRedo(); }
  if(e.key==='F1'){ e.preventDefault(); dlgHelp(); }
  if(e.key==='F2'){ e.preventDefault(); toggleMode(); }
  if(e.key==='F10'){ e.preventDefault(); focusMenubar(); }
  /* Ctrl+N nová stránka, Ctrl+Shift+N nový oddíl */
  if(e.ctrlKey && (e.key==='n'||e.key==='N')){
    e.preventDefault();
    if(e.shiftKey) addSection(); else addPage();
  }
  /* Ctrl+Shift+O načtení bloku ze schránky, Ctrl+Shift+S vložení do schránky */
  if(e.ctrlKey && e.shiftKey && (e.key==='c'||e.key==='C')){
    e.preventDefault(); var ci=curItem();
    if(ci) copyRef('item',ci.id); else say('Nejprve umístěte kurzor do řádku.'); }
  if(e.ctrlKey && e.shiftKey && (e.key==='v'||e.key==='V')){ e.preventDefault(); pasteRef(); }
  if(e.ctrlKey && e.shiftKey && (e.key==='o'||e.key==='O')){ e.preventDefault(); pasteFromClipboard(); }
  if(e.ctrlKey && e.shiftKey && (e.key==='s'||e.key==='S')){ e.preventDefault(); copyToClipboard(); }
  if(e.ctrlKey && e.shiftKey && !(e.target && e.target.classList &&
      e.target.classList.contains('txt'))){
    /* stejné zkratky i mimo řádek; uvnitř řádku je řeší itemKey */
    var gk=String(e.key||'');
    if(gk==='1'||gk==='!'){ e.preventDefault(); toggleFlag('ukol'); }
    if(gk==='2'||gk==='@'){ e.preventDefault(); toggleFlag('dulezite'); }
    if(gk==='3'||gk==='#'){ e.preventDefault(); toggleFlag('otazka'); }
  }
});
document.addEventListener('focusout',function(e){
  if(e.target && e.target.classList && e.target.classList.contains('txt')) autoWiki();
});
window.addEventListener('beforeunload',function(e){
  if(nb) persist();
  if(dirty){ e.preventDefault(); e.returnValue=''; }
});

/* ===================== START ===================== */
(function init(){
  if(!restore()){
    nb=newNotebook('');
    nb.name='Nepojmenovaný blok';
  }
  initMenu(); initQuick();
  setMode(nb&&nb.settings&&nb.settings.mode==='view'?'view':'edit');
  renderAll();
  dbg("Aplikace spuštěna.");
  say("Mronenote je připraven. Nápovědu otevřete klávesou F1.");
})();
</script>
</body>
</html>
