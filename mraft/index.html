<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Poznámkář</title>
<style>
/* =========================================================================
   RESET & BASIC
   ========================================================================= */
*, *::before, *::after { box-sizing: border-box; }
html { height: 100%; }
body {
  margin: 0;
  height: 100%;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
  font-size: 16px;
  line-height: 1.55;
  color: var(--fg);
  background: var(--bg);
  -webkit-font-smoothing: antialiased;
}

:root {
  --bg: #ffffff;
  --bg-alt: #f5f6f8;
  --bg-panel: #fafbfc;
  --fg: #111318;
  --fg-muted: #5a6170;
  --fg-dim: #8a91a0;
  --border: #e1e4ea;
  --border-strong: #c8cdd6;
  --accent: #1a56db;
  --accent-bg: #eaf1fe;
  --danger: #b42318;
  --danger-bg: #fdecea;
  --success: #047849;
  --warning: #8a5500;
  --focus: #1a56db;
  --selection: #cde0fd;
  --radius: 4px;
  --font-mono: ui-monospace, "SF Mono", Menlo, Consolas, "Liberation Mono", monospace;
}

@media (prefers-color-scheme: dark) {
  :root {
    --bg: #16181d;
    --bg-alt: #1e2026;
    --bg-panel: #1a1c22;
    --fg: #e7e9ec;
    --fg-muted: #a3a9b5;
    --fg-dim: #7e8494;
    --border: #2b2e36;
    --border-strong: #3e424c;
    --accent: #6ea6ff;
    --accent-bg: #1c2a45;
    --danger: #ff7a70;
    --danger-bg: #3a1f1d;
    --success: #5cc88f;
    --warning: #d2a55a;
    --focus: #6ea6ff;
    --selection: #2a3b5c;
  }
}

body.theme-light {
  --bg: #ffffff; --bg-alt: #f5f6f8; --bg-panel: #fafbfc;
  --fg: #111318; --fg-muted: #5a6170; --fg-dim: #8a91a0;
  --border: #e1e4ea; --border-strong: #c8cdd6;
  --accent: #1a56db; --accent-bg: #eaf1fe;
  --danger: #b42318; --danger-bg: #fdecea;
  --success: #047849; --warning: #8a5500;
  --focus: #1a56db; --selection: #cde0fd;
}
body.theme-dark {
  --bg: #16181d; --bg-alt: #1e2026; --bg-panel: #1a1c22;
  --fg: #e7e9ec; --fg-muted: #a3a9b5; --fg-dim: #7e8494;
  --border: #2b2e36; --border-strong: #3e424c;
  --accent: #6ea6ff; --accent-bg: #1c2a45;
  --danger: #ff7a70; --danger-bg: #3a1f1d;
  --success: #5cc88f; --warning: #d2a55a;
  --focus: #6ea6ff; --selection: #2a3b5c;
}

::selection { background: var(--selection); }

/* =========================================================================
   FOCUS
   ========================================================================= */
:focus { outline: none; }
:focus-visible {
  outline: 2px solid var(--focus);
  outline-offset: 2px;
  border-radius: 2px;
}

button:focus-visible, a:focus-visible, [role="button"]:focus-visible,
input:focus-visible, textarea:focus-visible, select:focus-visible {
  outline: 2px solid var(--focus);
  outline-offset: 2px;
}

/* =========================================================================
   SKIP LINKS
   ========================================================================= */
.skip-link {
  position: absolute;
  top: -100px;
  left: 4px;
  background: var(--accent);
  color: #fff;
  padding: 8px 12px;
  border-radius: var(--radius);
  z-index: 10000;
  text-decoration: none;
  font-weight: 500;
}
.skip-link:focus {
  top: 4px;
}

/* =========================================================================
   LAYOUT
   ========================================================================= */
.app {
  display: grid;
  grid-template-columns: 280px 1fr;
  grid-template-rows: auto 1fr auto;
  grid-template-areas:
    "header header"
    "sidebar main"
    "status status";
  height: 100vh;
}

header.app-header {
  grid-area: header;
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 12px;
  border-bottom: 1px solid var(--border);
  background: var(--bg-panel);
  min-height: 42px;
}

.app-sidebar {
  grid-area: sidebar;
  overflow-y: auto;
  border-right: 1px solid var(--border);
  background: var(--bg-panel);
  padding: 8px 0;
}

.app-main {
  grid-area: main;
  overflow-y: auto;
  padding: 0;
  background: var(--bg);
}

.status-bar {
  grid-area: status;
  padding: 4px 12px;
  font-size: 13px;
  color: var(--fg-muted);
  border-top: 1px solid var(--border);
  background: var(--bg-panel);
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 12px;
  min-height: 28px;
}

.status-message { flex: 1; }
.status-saved { color: var(--success); }
.status-dirty { color: var(--warning); }
.status-error { color: var(--danger); }

/* =========================================================================
   HEADER / TABS / BREADCRUMBS
   ========================================================================= */
.app-header button.header-btn,
.app-header a.header-btn {
  background: transparent;
  color: var(--fg);
  border: 1px solid transparent;
  padding: 4px 10px;
  border-radius: var(--radius);
  cursor: pointer;
  font: inherit;
  text-decoration: none;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  white-space: nowrap;
}
.app-header button.header-btn:hover,
.app-header a.header-btn:hover {
  background: var(--bg-alt);
  border-color: var(--border);
}

.breadcrumbs {
  flex: 1;
  min-width: 0;
  font-size: 14px;
  color: var(--fg-muted);
  overflow: hidden;
  white-space: nowrap;
  text-overflow: ellipsis;
}
.breadcrumbs ol {
  list-style: none;
  margin: 0;
  padding: 0;
  display: inline;
}
.breadcrumbs li {
  display: inline;
}
.breadcrumbs li + li::before {
  content: " › ";
  color: var(--fg-dim);
}
.breadcrumbs a {
  color: var(--fg-muted);
  text-decoration: none;
}
.breadcrumbs a:hover { text-decoration: underline; }
.breadcrumbs .current { color: var(--fg); font-weight: 500; }

.tabs {
  display: flex;
  overflow-x: auto;
  gap: 2px;
  border-top: 1px solid var(--border);
  background: var(--bg-panel);
  padding: 0 8px;
  max-height: 36px;
}
.tabs[hidden] { display: none; }
.tab {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 6px 10px;
  background: transparent;
  border: 1px solid transparent;
  border-bottom: none;
  border-radius: var(--radius) var(--radius) 0 0;
  cursor: pointer;
  font: inherit;
  font-size: 13px;
  color: var(--fg-muted);
  white-space: nowrap;
  max-width: 200px;
  overflow: hidden;
  text-overflow: ellipsis;
}
.tab[aria-current="true"] {
  background: var(--bg);
  color: var(--fg);
  border-color: var(--border);
  border-bottom-color: var(--bg);
  margin-bottom: -1px;
}
.tab-close {
  background: none;
  border: none;
  color: var(--fg-dim);
  cursor: pointer;
  padding: 0 2px;
  font: inherit;
  border-radius: 2px;
}
.tab-close:hover { color: var(--fg); background: var(--bg-alt); }

/* =========================================================================
   SIDEBAR TREE
   ========================================================================= */
.sidebar-section {
  padding: 6px 0;
}
.sidebar-heading {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--fg-dim);
  padding: 4px 12px;
  margin: 0;
}

.sidebar-nav {
  list-style: none;
  margin: 0;
  padding: 0;
}
.sidebar-nav li {
  margin: 0;
}
.sidebar-link {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 4px 12px;
  color: var(--fg);
  text-decoration: none;
  background: transparent;
  border: none;
  border-left: 3px solid transparent;
  cursor: pointer;
  font: inherit;
  width: 100%;
  text-align: left;
}
.sidebar-link:hover {
  background: var(--bg-alt);
}
.sidebar-link[aria-current="page"] {
  background: var(--accent-bg);
  border-left-color: var(--accent);
  color: var(--fg);
  font-weight: 500;
}
.sidebar-link .count {
  margin-left: auto;
  font-size: 12px;
  color: var(--fg-dim);
}

.tree {
  list-style: none;
  margin: 0;
  padding: 0;
}
.tree ul {
  list-style: none;
  margin: 0;
  padding: 0;
}
.tree-item {
  position: relative;
}
.tree-row {
  display: flex;
  align-items: center;
  gap: 4px;
  padding: 3px 8px 3px 8px;
  cursor: pointer;
  background: transparent;
  border: none;
  border-left: 3px solid transparent;
  font: inherit;
  color: var(--fg);
  width: 100%;
  text-align: left;
  min-height: 26px;
}
.tree-row:hover { background: var(--bg-alt); }
.tree-row[aria-current="page"] {
  background: var(--accent-bg);
  border-left-color: var(--accent);
}
.tree-row[aria-selected="true"]:not([aria-current="page"]) {
  background: var(--bg-alt);
}
.tree-toggle {
  width: 18px;
  height: 18px;
  border: none;
  background: transparent;
  cursor: pointer;
  font-family: var(--font-mono);
  color: var(--fg-muted);
  padding: 0;
  border-radius: 2px;
  flex-shrink: 0;
}
.tree-toggle:hover { background: var(--border); }
.tree-toggle[aria-hidden="true"] { visibility: hidden; }
.tree-icon {
  font-size: 12px;
  color: var(--fg-muted);
  flex-shrink: 0;
}
.tree-label {
  flex: 1;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  font-size: 14px;
}
.tree-actions {
  display: none;
  gap: 2px;
}
.tree-row:hover .tree-actions,
.tree-row:focus-within .tree-actions {
  display: flex;
}
.tree-action {
  background: transparent;
  border: none;
  color: var(--fg-muted);
  cursor: pointer;
  padding: 2px 4px;
  font-size: 12px;
  border-radius: 2px;
}
.tree-action:hover { background: var(--border); color: var(--fg); }

.tree ul.tree-children {
  padding-left: 16px;
}
.tree ul.tree-children[hidden] { display: none; }

/* =========================================================================
   MAIN CONTENT VIEWS
   ========================================================================= */
.view {
  max-width: 860px;
  margin: 0 auto;
  padding: 32px 48px 80px 48px;
}
@media (max-width: 700px) {
  .view { padding: 16px 16px 80px 16px; }
}

.view h1.view-title {
  font-size: 32px;
  font-weight: 700;
  line-height: 1.2;
  margin: 0 0 8px 0;
  letter-spacing: -0.01em;
}
.view .view-subtitle {
  color: var(--fg-muted);
  margin: 0 0 24px 0;
  font-size: 15px;
}

.view section + section {
  margin-top: 28px;
}

/* =========================================================================
   DOCUMENT EDITOR / BLOCKS
   ========================================================================= */
.doc-title {
  width: 100%;
  border: none;
  background: transparent;
  font-family: inherit;
  font-size: 32px;
  font-weight: 700;
  line-height: 1.2;
  color: var(--fg);
  padding: 0;
  margin: 0 0 20px 0;
  letter-spacing: -0.01em;
  outline: none;
}
.doc-title::placeholder { color: var(--fg-dim); font-weight: 400; }

.blocks {
  list-style: none;
  margin: 0;
  padding: 0;
}
.block {
  position: relative;
  margin: 2px 0;
  padding: 2px 0 2px 0;
  border-radius: var(--radius);
  display: flex;
  align-items: flex-start;
  gap: 4px;
}

.block-handle {
  opacity: 0;
  flex-shrink: 0;
  width: 20px;
  display: flex;
  justify-content: center;
  margin-top: 6px;
}
.block:hover .block-handle,
.block:focus-within .block-handle {
  opacity: 1;
}
.block-handle button {
  background: transparent;
  border: none;
  color: var(--fg-dim);
  cursor: pointer;
  padding: 2px;
  border-radius: 2px;
  font-size: 12px;
  line-height: 1;
}
.block-handle button:hover { background: var(--bg-alt); color: var(--fg); }

.block-content {
  flex: 1;
  min-width: 0;
}

.block[data-type="paragraph"] .block-content {
  font-size: 16px;
  line-height: 1.6;
  padding: 4px 6px;
  min-height: 1.6em;
  border-radius: var(--radius);
}

.block[data-type^="heading"] .block-content {
  font-weight: 700;
  line-height: 1.25;
  padding: 6px 6px 2px 6px;
  border-radius: var(--radius);
  letter-spacing: -0.01em;
}
.block[data-type="heading1"] .block-content { font-size: 28px; margin-top: 12px; }
.block[data-type="heading2"] .block-content { font-size: 24px; margin-top: 10px; }
.block[data-type="heading3"] .block-content { font-size: 20px; margin-top: 8px; }
.block[data-type="heading4"] .block-content { font-size: 18px; }
.block[data-type="heading5"] .block-content { font-size: 16px; }
.block[data-type="heading6"] .block-content { font-size: 15px; color: var(--fg-muted); }

.block[data-type="quote"] .block-content {
  border-left: 3px solid var(--border-strong);
  padding: 4px 12px;
  font-style: italic;
  color: var(--fg-muted);
  border-radius: 0;
}

.block[data-type="callout"] .block-content {
  background: var(--accent-bg);
  border: 1px solid var(--border);
  border-left: 4px solid var(--accent);
  padding: 10px 14px;
  border-radius: var(--radius);
}
.block[data-callout-kind="warning"] .block-content {
  background: color-mix(in srgb, var(--warning) 14%, transparent);
  border-left-color: var(--warning);
}
.block[data-callout-kind="danger"] .block-content {
  background: var(--danger-bg);
  border-left-color: var(--danger);
}
.block[data-callout-kind="success"] .block-content {
  background: color-mix(in srgb, var(--success) 14%, transparent);
  border-left-color: var(--success);
}

.block[data-type="divider"] {
  padding: 12px 0;
}
.block[data-type="divider"] hr {
  border: none;
  border-top: 1px solid var(--border-strong);
  margin: 0;
}

.block[data-type="bullet"] .block-content,
.block[data-type="numbered"] .block-content {
  padding: 2px 6px;
}
.block-list-marker {
  margin-top: 6px;
  width: 24px;
  text-align: right;
  flex-shrink: 0;
  color: var(--fg-muted);
  font-size: 14px;
  user-select: none;
}

.block[data-type="task"] {
  align-items: flex-start;
}
.block-task-check {
  margin-top: 8px;
  flex-shrink: 0;
}
.block[data-type="task"][data-checked="true"] .block-content {
  text-decoration: line-through;
  color: var(--fg-muted);
}
.block-task-meta {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  font-size: 12px;
  color: var(--fg-muted);
  margin-top: 2px;
  padding: 0 6px;
}
.block-task-meta button {
  background: var(--bg-alt);
  border: 1px solid var(--border);
  color: inherit;
  font: inherit;
  padding: 1px 6px;
  border-radius: 10px;
  cursor: pointer;
}
.block-task-meta .overdue { color: var(--danger); border-color: var(--danger); }

.block[data-type="code"] .block-content {
  background: var(--bg-alt);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 10px 12px;
  font-family: var(--font-mono);
  font-size: 14px;
  line-height: 1.5;
  white-space: pre-wrap;
  overflow-x: auto;
}
.block[data-type="code"] .code-lang {
  display: block;
  font-size: 11px;
  color: var(--fg-dim);
  font-family: var(--font-mono);
  margin-bottom: 4px;
  text-transform: uppercase;
  letter-spacing: 0.05em;
}

.block[data-type="toggle"] {
  display: block;
}
.block[data-type="toggle"] > details {
  border-radius: var(--radius);
}
.block[data-type="toggle"] > details > summary {
  cursor: pointer;
  padding: 4px 6px;
  list-style: none;
  display: flex;
  align-items: center;
  gap: 6px;
  font-weight: 500;
}
.block[data-type="toggle"] > details > summary::-webkit-details-marker { display: none; }
.block[data-type="toggle"] > details > summary::before {
  content: "▶";
  font-size: 10px;
  color: var(--fg-muted);
  transition: transform 0.15s;
}
.block[data-type="toggle"] > details[open] > summary::before {
  transform: rotate(90deg);
}
.block-children {
  padding-left: 24px;
  border-left: 1px solid var(--border);
  margin-left: 6px;
}

.block[data-type="page"] .block-content {
  font-weight: 500;
  color: var(--accent);
  padding: 4px 6px;
  cursor: pointer;
}
.block[data-type="page"] .block-content::before {
  content: "📄 ";
  color: var(--fg-dim);
}

.block[data-type="table"] .block-content {
  overflow-x: auto;
  padding: 4px 0;
}
.block[data-type="table"] table {
  border-collapse: collapse;
  width: 100%;
  font-size: 14px;
}
.block[data-type="table"] th,
.block[data-type="table"] td {
  border: 1px solid var(--border);
  padding: 6px 10px;
  text-align: left;
  vertical-align: top;
}
.block[data-type="table"] th {
  background: var(--bg-alt);
  font-weight: 600;
}
.block[data-type="table"] td[contenteditable], 
.block[data-type="table"] th[contenteditable] {
  min-width: 60px;
}

.block[data-type="image"] .block-content {
  padding: 4px 6px;
}
.block[data-type="image"] img {
  max-width: 100%;
  height: auto;
  border-radius: var(--radius);
  border: 1px solid var(--border);
}
.block[data-type="image"] figcaption {
  color: var(--fg-muted);
  font-size: 13px;
  margin-top: 4px;
  font-style: italic;
}

/* editable areas */
[contenteditable="true"] {
  outline: none;
  border-radius: var(--radius);
}
[contenteditable="true"]:focus-visible {
  background: var(--bg-alt);
  box-shadow: inset 0 0 0 1px var(--border);
}

[contenteditable="true"][data-empty="true"]::before {
  content: attr(data-placeholder);
  color: var(--fg-dim);
  pointer-events: none;
}

.block-content a { color: var(--accent); text-decoration: underline; }
.block-content a.mention {
  background: var(--accent-bg);
  padding: 0 4px;
  border-radius: 3px;
  text-decoration: none;
  font-weight: 500;
}
.block-content a.mention.broken {
  background: var(--danger-bg);
  color: var(--danger);
}
.block-content code {
  background: var(--bg-alt);
  border: 1px solid var(--border);
  padding: 1px 5px;
  border-radius: 3px;
  font-family: var(--font-mono);
  font-size: 0.92em;
}
.block-content mark {
  background: color-mix(in srgb, var(--warning) 30%, transparent);
  color: inherit;
  padding: 0 2px;
  border-radius: 2px;
}

/* =========================================================================
   BACKLINKS PANEL
   ========================================================================= */
.backlinks {
  margin-top: 48px;
  border-top: 1px solid var(--border);
  padding-top: 16px;
}
.backlinks h2 {
  font-size: 13px;
  font-weight: 700;
  color: var(--fg-muted);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  margin: 0 0 12px 0;
}
.backlink-item {
  padding: 8px 10px;
  background: var(--bg-alt);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  margin-bottom: 8px;
}
.backlink-source {
  font-size: 12px;
  color: var(--fg-muted);
  margin-bottom: 4px;
}
.backlink-source a { color: var(--accent); text-decoration: none; }
.backlink-source a:hover { text-decoration: underline; }
.backlink-context {
  font-size: 14px;
  line-height: 1.5;
}

/* =========================================================================
   TASKS & DAILY NOTES & CALENDAR
   ========================================================================= */
.task-list {
  list-style: none;
  margin: 0;
  padding: 0;
}
.task-item {
  display: grid;
  grid-template-columns: auto 1fr auto;
  gap: 10px;
  padding: 8px 10px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  margin-bottom: 6px;
  background: var(--bg-panel);
  align-items: start;
}
.task-item input[type="checkbox"] {
  margin-top: 3px;
}
.task-item.done .task-title { text-decoration: line-through; color: var(--fg-muted); }
.task-title { font-weight: 500; }
.task-ctx { font-size: 12px; color: var(--fg-muted); margin-top: 2px; }
.task-ctx a { color: var(--accent); text-decoration: none; }
.task-ctx a:hover { text-decoration: underline; }
.task-meta {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  align-items: center;
  font-size: 12px;
}
.task-badge {
  padding: 1px 8px;
  border-radius: 10px;
  background: var(--bg-alt);
  border: 1px solid var(--border);
  color: var(--fg-muted);
}
.task-badge.overdue { color: var(--danger); border-color: var(--danger); }
.task-badge.today { color: var(--accent); border-color: var(--accent); }

.task-group { margin-bottom: 24px; }
.task-group-title {
  font-size: 14px;
  font-weight: 600;
  color: var(--fg-muted);
  text-transform: uppercase;
  letter-spacing: 0.04em;
  margin: 0 0 8px 0;
}

/* Calendar */
.cal-nav {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 16px;
}
.cal-nav h2 {
  margin: 0;
  font-size: 20px;
  flex: 1;
}
.cal-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 1px;
  background: var(--border);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
}
.cal-head {
  background: var(--bg-alt);
  padding: 6px 4px;
  font-size: 12px;
  font-weight: 600;
  color: var(--fg-muted);
  text-transform: uppercase;
  letter-spacing: 0.04em;
  text-align: center;
}
.cal-cell {
  background: var(--bg);
  padding: 4px 6px;
  min-height: 80px;
  display: flex;
  flex-direction: column;
  gap: 2px;
  font-size: 12px;
  text-align: left;
  cursor: pointer;
  border: none;
  color: inherit;
  font-family: inherit;
}
.cal-cell:hover { background: var(--bg-alt); }
.cal-cell[aria-selected="true"] {
  background: var(--accent-bg);
  box-shadow: inset 0 0 0 2px var(--accent);
}
.cal-cell.other-month { color: var(--fg-dim); }
.cal-cell.today .cal-day { color: var(--accent); font-weight: 700; }
.cal-day { font-weight: 500; }
.cal-indicators {
  display: flex;
  gap: 2px;
  margin-top: 2px;
}
.cal-indicator {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--fg-muted);
}
.cal-indicator.has-note { background: var(--accent); }
.cal-indicator.has-task { background: var(--warning); }

.cal-list {
  margin-top: 16px;
}
.cal-list-day {
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 10px 14px;
  margin-bottom: 8px;
  background: var(--bg-panel);
}
.cal-list-day h3 {
  margin: 0 0 6px 0;
  font-size: 15px;
}

/* =========================================================================
   FORMS & BUTTONS
   ========================================================================= */
button, .btn {
  font: inherit;
  background: var(--bg);
  border: 1px solid var(--border-strong);
  color: var(--fg);
  padding: 5px 12px;
  border-radius: var(--radius);
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  text-decoration: none;
}
button:hover, .btn:hover {
  background: var(--bg-alt);
}
button.primary, .btn.primary {
  background: var(--accent);
  color: #fff;
  border-color: var(--accent);
}
button.primary:hover { filter: brightness(1.08); }
button.danger {
  background: var(--danger);
  color: #fff;
  border-color: var(--danger);
}
button.subtle {
  background: transparent;
  border-color: transparent;
  color: var(--fg-muted);
}
button.subtle:hover { background: var(--bg-alt); color: var(--fg); }
button[disabled] { opacity: 0.5; cursor: not-allowed; }

input[type="text"], input[type="search"], input[type="date"],
input[type="datetime-local"], input[type="url"], input[type="number"],
input[type="email"], textarea, select {
  font: inherit;
  background: var(--bg);
  color: var(--fg);
  border: 1px solid var(--border-strong);
  padding: 5px 10px;
  border-radius: var(--radius);
  width: 100%;
  max-width: 100%;
  box-sizing: border-box;
}
textarea { resize: vertical; min-height: 60px; }

label { display: block; margin-bottom: 4px; font-size: 14px; font-weight: 500; }
.form-row { margin-bottom: 12px; }
.form-row-inline { display: flex; gap: 8px; align-items: center; }
.hint { font-size: 12px; color: var(--fg-muted); margin-top: 2px; }

fieldset {
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 8px 12px 12px 12px;
  margin: 0 0 12px 0;
}
legend {
  padding: 0 4px;
  font-weight: 600;
  font-size: 13px;
}

/* =========================================================================
   DIALOGS
   ========================================================================= */
dialog {
  border: 1px solid var(--border-strong);
  border-radius: 8px;
  padding: 0;
  background: var(--bg);
  color: var(--fg);
  max-width: 90vw;
  max-height: 85vh;
  box-shadow: 0 20px 60px rgba(0,0,0,0.25);
}
dialog::backdrop {
  background: rgba(0,0,0,0.35);
}
.dialog-inner {
  padding: 16px 20px;
  min-width: 360px;
  max-width: 640px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.dialog-inner h2 {
  margin: 0;
  font-size: 18px;
}
.dialog-actions {
  display: flex;
  gap: 8px;
  justify-content: flex-end;
  margin-top: 8px;
}

/* Palette-style dialogs (slash, command, link picker, search) */
.palette {
  min-width: 460px;
  max-width: 620px;
  width: 90vw;
  padding: 0;
}
.palette-input-wrap {
  padding: 10px 12px;
  border-bottom: 1px solid var(--border);
}
.palette-input {
  width: 100%;
  border: none;
  background: transparent;
  font-size: 16px;
  padding: 4px 6px;
}
.palette-input:focus-visible { outline: none; }

.palette-list {
  list-style: none;
  margin: 0;
  padding: 4px 0;
  max-height: 60vh;
  overflow-y: auto;
}
.palette-item {
  padding: 6px 14px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 14px;
}
.palette-item[aria-selected="true"] {
  background: var(--accent-bg);
}
.palette-item-label { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.palette-item-hint { font-size: 12px; color: var(--fg-muted); font-family: var(--font-mono); }
.palette-empty { padding: 16px; color: var(--fg-muted); text-align: center; }

.palette-group {
  padding: 4px 14px;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  color: var(--fg-dim);
  font-weight: 700;
}

/* =========================================================================
   COLLECTIONS
   ========================================================================= */
.collection {
  border: 1px solid var(--border);
  border-radius: var(--radius);
  margin: 12px 0;
  background: var(--bg);
}
.collection-header {
  padding: 8px 10px;
  background: var(--bg-alt);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 8px;
}
.collection-name { flex: 1; font-weight: 600; }
.collection-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 14px;
}
.collection-table th,
.collection-table td {
  border: 1px solid var(--border);
  padding: 4px 8px;
  text-align: left;
  vertical-align: top;
  min-width: 80px;
}
.collection-table th {
  background: var(--bg-alt);
  font-weight: 600;
  font-size: 12px;
  position: relative;
}
.collection-table tbody tr:hover { background: var(--bg-alt); }
.collection-controls {
  padding: 6px 10px;
  display: flex;
  gap: 6px;
  background: var(--bg-alt);
  border-top: 1px solid var(--border);
}

/* =========================================================================
   SEARCH
   ========================================================================= */
.search-result {
  padding: 10px 12px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  margin-bottom: 8px;
  background: var(--bg-panel);
  cursor: pointer;
  text-align: left;
  width: 100%;
  font: inherit;
  color: inherit;
}
.search-result:hover,
.search-result:focus-visible {
  background: var(--bg-alt);
  border-color: var(--border-strong);
}
.search-result-title {
  font-weight: 600;
  margin-bottom: 4px;
  font-size: 15px;
}
.search-result-path { font-size: 12px; color: var(--fg-muted); margin-bottom: 6px; }
.search-result-snippet { font-size: 14px; color: var(--fg-muted); line-height: 1.5; }

/* =========================================================================
   HELP / SETTINGS
   ========================================================================= */
.help-dialog, .settings-dialog { min-width: 520px; max-width: 720px; }

kbd {
  display: inline-block;
  padding: 1px 6px;
  font-family: var(--font-mono);
  font-size: 12px;
  background: var(--bg-alt);
  border: 1px solid var(--border-strong);
  border-bottom-width: 2px;
  border-radius: 3px;
  color: var(--fg);
  margin: 0 1px;
}

.shortcut-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 14px;
}
.shortcut-table th,
.shortcut-table td {
  padding: 4px 8px;
  text-align: left;
  border-bottom: 1px solid var(--border);
}
.shortcut-table th {
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  color: var(--fg-muted);
}
.shortcut-section h3 {
  margin: 16px 0 6px 0;
  font-size: 14px;
}

/* =========================================================================
   VISUALLY HIDDEN (for screen-reader-only text)
   ========================================================================= */
.sr-only {
  position: absolute;
  width: 1px;
  height: 1px;
  padding: 0;
  margin: -1px;
  overflow: hidden;
  clip: rect(0, 0, 0, 0);
  white-space: nowrap;
  border: 0;
}

/* =========================================================================
   DEBUG PANEL
   ========================================================================= */
#debug-panel {
  position: fixed;
  bottom: 36px;
  right: 8px;
  width: 420px;
  max-height: 40vh;
  overflow-y: auto;
  background: var(--bg-panel);
  border: 1px solid var(--border-strong);
  border-radius: var(--radius);
  padding: 8px;
  font-family: var(--font-mono);
  font-size: 12px;
  z-index: 9000;
  box-shadow: 0 8px 24px rgba(0,0,0,0.15);
}
#debug-panel[hidden] { display: none; }
#debug-panel h3 {
  margin: 0 0 6px 0;
  font-size: 13px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.debug-entry {
  padding: 2px 0;
  border-bottom: 1px solid var(--border);
  word-break: break-word;
}
.debug-entry.error { color: var(--danger); }
.debug-entry.warn { color: var(--warning); }

/* =========================================================================
   REDUCED MOTION
   ========================================================================= */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    transition-duration: 0.01ms !important;
    scroll-behavior: auto !important;
  }
}
</style>

  </h3>
  <div id="debug-entries"></div>
</div>

<script>
'use strict';

// ===========================================================================
// UTILITIES
// ===========================================================================
const uuid = () => {
  if (crypto && crypto.randomUUID) return crypto.randomUUID();
  return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {
    const r = Math.random() * 16 | 0;
    return (c === 'x' ? r : (r & 0x3 | 0x8)).toString(16);
  });
};

const debounce = (fn, wait) => {
  let t = null;
  return (...args) => {
    if (t) clearTimeout(t);
    t = setTimeout(() => { t = null; fn(...args); }, wait);
  };
};

const escapeHtml = s => String(s ?? '')
  .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
  .replace(/"/g, '&quot;').replace(/'/g, '&#39;');

const stripHtml = s => {
  const tmp = document.createElement('div');
  tmp.innerHTML = String(s ?? '');
  return tmp.textContent || '';
};

const deepClone = obj => JSON.parse(JSON.stringify(obj));

const formatDateISO = (d) => {
  if (!(d instanceof Date)) d = new Date(d);
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${day}`;
};

const MONTHS_CS = ['leden', 'únor', 'březen', 'duben', 'květen', 'červen',
  'červenec', 'srpen', 'září', 'říjen', 'listopad', 'prosinec'];
const MONTHS_CS_GEN = ['ledna', 'února', 'března', 'dubna', 'května', 'června',
  'července', 'srpna', 'září', 'října', 'listopadu', 'prosince'];
const DAYS_CS_SHORT = ['ne', 'po', 'út', 'st', 'čt', 'pá', 'so'];
const DAYS_CS_FULL = ['neděle', 'pondělí', 'úterý', 'středa', 'čtvrtek', 'pátek', 'sobota'];

const formatDateCS = (d) => {
  if (!(d instanceof Date)) d = new Date(d);
  return `${d.getDate()}. ${MONTHS_CS_GEN[d.getMonth()]} ${d.getFullYear()}`;
};

const formatDateTimeCS = (d) => {
  if (!(d instanceof Date)) d = new Date(d);
  const hh = String(d.getHours()).padStart(2, '0');
  const mm = String(d.getMinutes()).padStart(2, '0');
  return `${formatDateCS(d)} ${hh}:${mm}`;
};

const formatRelativeCS = (ts) => {
  const diff = Date.now() - ts;
  const sec = Math.floor(diff / 1000);
  if (sec < 60) return 'před chvílí';
  const min = Math.floor(sec / 60);
  if (min < 60) return `před ${min} min`;
  const hr = Math.floor(min / 60);
  if (hr < 24) return `před ${hr} h`;
  const day = Math.floor(hr / 24);
  if (day < 30) return `před ${day} d`;
  return formatDateCS(new Date(ts));
};

const parseISODate = (s) => {
  if (!s) return null;
  const [y, m, d] = s.split('-').map(Number);
  if (!y || !m || !d) return null;
  return new Date(y, m - 1, d);
};

const isToday = (d) => {
  const t = new Date();
  return d.getFullYear() === t.getFullYear()
    && d.getMonth() === t.getMonth()
    && d.getDate() === t.getDate();
};

const startOfDay = (d) => {
  const x = new Date(d);
  x.setHours(0, 0, 0, 0);
  return x;
};

// ===========================================================================
// DEBUG PANEL (on-page, not console)
// ===========================================================================
const Debug = {
  entries: [],
  enabled: false,
  panel: null,
  entriesEl: null,
  init() {
    this.panel = document.getElementById('debug-panel');
    this.entriesEl = document.getElementById('debug-entries');
    document.getElementById('debug-close').addEventListener('click', () => this.hide());
    document.getElementById('debug-clear').addEventListener('click', () => this.clear());
  },
  log(msg, level = 'info') {
    const entry = { msg: String(msg), level, time: new Date() };
    this.entries.push(entry);
    if (this.entries.length > 200) this.entries.shift();
    if (this.enabled && this.entriesEl) {
      const div = document.createElement('div');
      div.className = 'debug-entry ' + level;
      const time = `${String(entry.time.getHours()).padStart(2, '0')}:${String(entry.time.getMinutes()).padStart(2, '0')}:${String(entry.time.getSeconds()).padStart(2, '0')}`;
      div.textContent = `[${time}] ${entry.msg}`;
      this.entriesEl.appendChild(div);
      this.entriesEl.scrollTop = this.entriesEl.scrollHeight;
    }
  },
  warn(msg) { this.log(msg, 'warn'); },
  error(msg) { this.log(msg, 'error'); },
  show() {
    this.enabled = true;
    this.panel.hidden = false;
    this.entriesEl.innerHTML = '';
    this.entries.forEach(e => {
      const div = document.createElement('div');
      div.className = 'debug-entry ' + e.level;
      const time = `${String(e.time.getHours()).padStart(2, '0')}:${String(e.time.getMinutes()).padStart(2, '0')}:${String(e.time.getSeconds()).padStart(2, '0')}`;
      div.textContent = `[${time}] ${e.msg}`;
      this.entriesEl.appendChild(div);
    });
  },
  hide() {
    this.enabled = false;
    this.panel.hidden = true;
  },
  toggle() {
    if (this.enabled) this.hide(); else this.show();
  },
  clear() {
    this.entries = [];
    if (this.entriesEl) this.entriesEl.innerHTML = '';
  }
};

window.addEventListener('error', (e) => {
  Debug.error(`Chyba: ${e.message} (${e.filename}:${e.lineno})`);
});

// ===========================================================================
// SCREEN READER ANNOUNCEMENTS
// ===========================================================================
const Announce = {
  polite(msg) {
    const el = document.getElementById('announce-polite');
    if (!el) return;
    el.textContent = '';
    setTimeout(() => { el.textContent = msg; }, 50);
  },
  assertive(msg) {
    const el = document.getElementById('announce-assertive');
    if (!el) return;
    el.textContent = '';
    setTimeout(() => { el.textContent = msg; }, 50);
  },
  status(msg, isError = false) {
    const el = document.getElementById('status-message');
    if (!el) return;
    el.textContent = msg;
    el.classList.toggle('status-error', !!isError);
    if (!isError) {
      setTimeout(() => { if (el.textContent === msg) el.textContent = ''; }, 4000);
    }
  }
};

// ===========================================================================
// AUDIO FEEDBACK (Web Audio API)
// ===========================================================================
const AudioFB = {
  ctx: null,
  enabled: true,
  ensure() {
    if (!this.enabled) return false;
    try {
      if (!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)();
      if (this.ctx.state === 'suspended') this.ctx.resume();
      return true;
    } catch (e) {
      Debug.warn('Audio nedostupné: ' + e.message);
      return false;
    }
  },
  tone(freq, duration = 0.08, type = 'sine', gain = 0.12) {
    if (!this.ensure()) return;
    const osc = this.ctx.createOscillator();
    const g = this.ctx.createGain();
    osc.type = type;
    osc.frequency.value = freq;
    g.gain.value = 0;
    osc.connect(g);
    g.connect(this.ctx.destination);
    const now = this.ctx.currentTime;
    g.gain.setValueAtTime(0, now);
    g.gain.linearRampToValueAtTime(gain, now + 0.005);
    g.gain.linearRampToValueAtTime(0, now + duration);
    osc.start(now);
    osc.stop(now + duration + 0.02);
  },
  sequence(notes) {
    if (!this.ensure()) return;
    let delay = 0;
    notes.forEach(n => {
      setTimeout(() => this.tone(n.f, n.d || 0.08, n.t || 'sine', n.g || 0.12), delay);
      delay += (n.gap ?? 60);
    });
  },
  success() { this.sequence([{ f: 523 }, { f: 659 }, { f: 784 }]); },
  error() { this.sequence([{ f: 330, d: 0.12 }, { f: 220, d: 0.18 }]); },
  save() { this.tone(880, 0.06, 'sine', 0.08); },
  notify() { this.sequence([{ f: 659, d: 0.08 }, { f: 784, d: 0.1 }]); },
  click() { this.tone(1000, 0.02, 'square', 0.03); },
  setEnabled(b) { this.enabled = b; }
};

// ===========================================================================
// STORAGE (IndexedDB)
// ===========================================================================
const Storage = {
  db: null,
  name: 'CraftCzDB',
  version: 1,
  open() {
    return new Promise((resolve, reject) => {
      const req = indexedDB.open(this.name, this.version);
      req.onupgradeneeded = (e) => {
        const db = e.target.result;
        if (!db.objectStoreNames.contains('meta')) {
          db.createObjectStore('meta', { keyPath: 'key' });
        }
        if (!db.objectStoreNames.contains('documents')) {
          const s = db.createObjectStore('documents', { keyPath: 'id' });
          s.createIndex('updatedAt', 'updatedAt');
        }
      };
      req.onsuccess = (e) => { this.db = e.target.result; resolve(); };
      req.onerror = (e) => { Debug.error('IndexedDB chyba: ' + e.target.error); reject(e.target.error); };
    });
  },
  _tx(store, mode = 'readonly') {
    return this.db.transaction(store, mode).objectStore(store);
  },
  async saveMeta(key, value) {
    return new Promise((res, rej) => {
      const req = this._tx('meta', 'readwrite').put({ key, value });
      req.onsuccess = () => res();
      req.onerror = (e) => rej(e.target.error);
    });
  },
  async loadMeta(key) {
    return new Promise((res, rej) => {
      const req = this._tx('meta').get(key);
      req.onsuccess = () => res(req.result ? req.result.value : null);
      req.onerror = (e) => rej(e.target.error);
    });
  },
  async saveDocument(doc) {
    return new Promise((res, rej) => {
      doc.updatedAt = Date.now();
      const req = this._tx('documents', 'readwrite').put(doc);
      req.onsuccess = () => res();
      req.onerror = (e) => rej(e.target.error);
    });
  },
  async loadDocument(id) {
    return new Promise((res, rej) => {
      const req = this._tx('documents').get(id);
      req.onsuccess = () => res(req.result || null);
      req.onerror = (e) => rej(e.target.error);
    });
  },
  async deleteDocument(id) {
    return new Promise((res, rej) => {
      const req = this._tx('documents', 'readwrite').delete(id);
      req.onsuccess = () => res();
      req.onerror = (e) => rej(e.target.error);
    });
  },
  async allDocuments() {
    return new Promise((res, rej) => {
      const out = [];
      const req = this._tx('documents').openCursor();
      req.onsuccess = (e) => {
        const cur = e.target.result;
        if (cur) { out.push(cur.value); cur.continue(); } else res(out);
      };
      req.onerror = (e) => rej(e.target.error);
    });
  }
};

  inboxTasks: [],     // [{id, title, done, startDate, dueDate, tags, createdAt, completedAt|null}]
  settings: {
    theme: 'system',
    soundEnabled: true,
    fontSize: 'medium',
    dailyNoteFolder: null,
    sidebarExpanded: {} // folderId -> bool
  },
  // session-level
  currentView: 'home', // 'home' | 'doc' | 'daily' | 'calendar' | 'tasks' | 'search' | 'folder' | 'settings'
  currentDocId: null,
  currentFolderId: null,
  currentDailyDate: null, // ISO string
  currentTab: null,
  history: [],          // back stack: [{view, ...params}]
  historyForward: [],
  tabs: [],             // [{id, type, title, ...params}]
  activeDoc: null,      // full loaded document {id, title, blocks, createdAt, updatedAt}
  dirty: false,

  emit(evt, data) { (this.listeners[evt] || []).forEach(cb => { try { cb(data); } catch (e) { Debug.error('Listener: ' + e.message); } }); }
};

async function saveWorkspace() {
  await Storage.saveMeta('folders', State.folders);
  await Storage.saveMeta('docsIndex', State.docsIndex);
  await Storage.saveMeta('inboxTasks', State.inboxTasks);
  await Storage.saveMeta('settings', State.settings);
  Debug.log('Prostor uložen');
}

async function loadWorkspace() {
  State.folders = await Storage.loadMeta('folders') || [];
  State.docsIndex = await Storage.loadMeta('docsIndex') || [];
  State.inboxTasks = await Storage.loadMeta('inboxTasks') || [];
  const s = await Storage.loadMeta('settings');
  if (s) Object.assign(State.settings, s);
  Debug.log(`Prostor načten: ${State.folders.length} složek, ${State.docsIndex.length} dokumentů`);
}

const debouncedSaveWorkspace = debounce(() => saveWorkspace(), 600);
const debouncedSaveDoc = debounce(async () => {
  if (State.activeDoc) {
    await Storage.saveDocument(State.activeDoc);
    // Update index
    const idx = State.docsIndex.find(d => d.id === State.activeDoc.id);
    if (idx) {
      idx.title = State.activeDoc.title || 'Bez názvu';
      idx.updatedAt = State.activeDoc.updatedAt;
      saveWorkspace();

    State.dirty = false;
    setStatusSaved();
    BacklinksIndex.invalidate();
    State.emit('docSaved', State.activeDoc.id);
  }

  setStatusDirty();
  debouncedSaveDoc();
}

  el.textContent = 'Uloženo';
  el.classList.remove('status-dirty');
  el.classList.add('status-saved');
}
function setStatusDirty() {
  const el = document.getElementById('status-save');
  el.textContent = 'Ukládám…';
  el.classList.remove('status-saved');
  el.classList.add('status-dirty');
}

// BLOCK MODEL
// ===========================================================================
const BLOCK_TYPES = {
  paragraph:  { label: 'Odstavec',         tag: 'p',           hKey: 'P',  md: '',        canHaveChildren: true,  editable: true },
  heading1:   { label: 'Nadpis 1',          tag: 'h1',          hKey: '1',  md: '# ',      canHaveChildren: true,  editable: true },
  heading2:   { label: 'Nadpis 2',          tag: 'h2',          hKey: '2',  md: '## ',     canHaveChildren: true,  editable: true },
  heading3:   { label: 'Nadpis 3',          tag: 'h3',          hKey: '3',  md: '### ',    canHaveChildren: true,  editable: true },
  heading4:   { label: 'Nadpis 4',          tag: 'h4',          hKey: '4',  md: '#### ',   canHaveChildren: true,  editable: true },
  heading5:   { label: 'Nadpis 5',          tag: 'h5',          hKey: '5',  md: '##### ',  canHaveChildren: true,  editable: true },
  heading6:   { label: 'Nadpis 6',          tag: 'h6',          hKey: '6',  md: '###### ', canHaveChildren: true,  editable: true },
  bullet:     { label: 'Odrážka',           tag: 'li',          hKey: 'U',  md: '- ',      canHaveChildren: true,  editable: true },
  numbered:   { label: 'Číslovaný seznam',  tag: 'li',          hKey: 'O',  md: '1. ',     canHaveChildren: true,  editable: true },
  task:       { label: 'Úkol',              tag: 'div',         hKey: 'T',  md: '[] ',     canHaveChildren: true,  editable: true },
  toggle:     { label: 'Rozbalovací blok',  tag: 'div',         hKey: null, md: '+ ',      canHaveChildren: true,  editable: true },
  quote:      { label: 'Citace',            tag: 'blockquote',  hKey: 'Q',  md: '> ',      canHaveChildren: false, editable: true },
  code:       { label: 'Kód',               tag: 'pre',         hKey: 'K',  md: '```',     canHaveChildren: false, editable: true },
  callout:    { label: 'Upozornění',        tag: 'div',         hKey: null, md: '',        canHaveChildren: false, editable: true },
  divider:    { label: 'Oddělovač',         tag: 'hr',          hKey: null, md: '---',     canHaveChildren: false, editable: false },
  table:      { label: 'Tabulka',           tag: 'div',         hKey: null, md: '',        canHaveChildren: false, editable: false },
  image:      { label: 'Obrázek',           tag: 'figure',      hKey: null, md: '',        canHaveChildren: false, editable: false }
};

const Block = {
  create(type = 'paragraph', content = '', props = {}) {
    return {
      id: uuid(),
      type,
      content,
      children: [],
      props: { ...props },
      createdAt: Date.now(),
      updatedAt: Date.now()
    };
  },
  // Find block by id within a tree, returns {block, parent, index, path}
  find(blocks, id, parent = null, path = []) {
    for (let i = 0; i < blocks.length; i++) {
      const b = blocks[i];
      if (b.id === id) return { block: b, parent, parentArr: blocks, index: i, path: [...path, i] };
      if (b.children && b.children.length) {
        const r = this.find(b.children, id, b, [...path, i]);
        if (r) return r;
      }
    }
    return null;
  },
  // Visit every block depth-first
  walk(blocks, fn, parent = null, depth = 0) {
    for (const b of blocks) {
      fn(b, parent, depth);
      if (b.children && b.children.length) this.walk(b.children, fn, b, depth + 1);
    }
  },
  // Flatten tree for keyboard navigation (respects collapsed toggles)
  flatten(blocks, expandedToggles = new Set()) {
    const out = [];
    const go = (arr, parent) => {
      for (const b of arr) {
        out.push({ block: b, parent });
        const isCollapsed = (b.type === 'toggle' && !expandedToggles.has(b.id));
        if (b.children && b.children.length && !isCollapsed) {
          go(b.children, b);
        }
      }
    };
    go(blocks, null);
    return out;
  },
  // Remove a block by id; returns removed block
  remove(blocks, id) {
    const r = this.find(blocks, id);
    if (!r) return null;
    r.parentArr.splice(r.index, 1);
    return r.block;
  },
  // Insert a block after another; if afterId is null, prepend
  insertAfter(blocks, afterId, newBlock) {
    if (!afterId) { blocks.unshift(newBlock); return; }
    const r = this.find(blocks, afterId);
    if (r) r.parentArr.splice(r.index + 1, 0, newBlock);
    else blocks.push(newBlock);
  },
  insertBefore(blocks, beforeId, newBlock) {
    const r = this.find(blocks, beforeId);
    if (r) r.parentArr.splice(r.index, 0, newBlock);
    else blocks.push(newBlock);
  },
  // Move block to a new position
  move(blocks, id, direction) {
    const r = this.find(blocks, id);
    if (!r) return false;
    const arr = r.parentArr;
    const idx = r.index;
    if (direction === 'up' && idx > 0) {
      [arr[idx - 1], arr[idx]] = [arr[idx], arr[idx - 1]];
      return true;
    }
    if (direction === 'down' && idx < arr.length - 1) {
      [arr[idx + 1], arr[idx]] = [arr[idx], arr[idx + 1]];
      return true;
    }
    return false;
  },
  // Indent: make a block a child of the previous sibling
  indent(blocks, id) {
    const r = this.find(blocks, id);
    if (!r || r.index === 0) return false;
    const prev = r.parentArr[r.index - 1];
    if (!BLOCK_TYPES[prev.type].canHaveChildren) return false;
    prev.children = prev.children || [];
    const [b] = r.parentArr.splice(r.index, 1);
    prev.children.push(b);
    return true;
  },
  // Outdent: make a block a sibling of its parent
  outdent(blocks, id) {
    const r = this.find(blocks, id);
    if (!r || !r.parent) return false;
    // find parent's position in grandparent
    const gr = this.find(blocks, r.parent.id);
    if (!gr) return false;
    const [b] = r.parentArr.splice(r.index, 1);
    gr.parentArr.splice(gr.index + 1, 0, b);
    return true;
  }
};

// DOCUMENT OPERATIONS
// ===========================================================================
async function createDocument({ title = '', folderId = null, openAfter = true } = {}) {
  const doc = {
    id: uuid(),
    title,
    blocks: [Block.create('paragraph', '')],
    createdAt: Date.now(),
    updatedAt: Date.now()
  };
  await Storage.saveDocument(doc);
  State.docsIndex.unshift({
    id: doc.id,
    title: title || 'Bez názvu',
    folderId,
    starred: false,
    tags: [],
    createdAt: doc.createdAt,
    updatedAt: doc.updatedAt
  });
  await saveWorkspace();
  AudioFB.success();
  Announce.polite('Nový dokument vytvořen');
  renderSidebar();
  if (openAfter) openDocument(doc.id);
  return doc;
}

async function deleteDocument(id) {
  await Storage.deleteDocument(id);
  State.docsIndex = State.docsIndex.filter(d => d.id !== id);
  await saveWorkspace();
  if (State.activeDoc && State.activeDoc.id === id) {
    State.activeDoc = null;
    State.currentDocId = null;
    closeTab(id);
  }
  State.tabs = State.tabs.filter(t => !(t.type === 'doc' && t.id === id));
  Announce.polite('Dokument smazán');
  BacklinksIndex.invalidate();
  renderSidebar();
  if (State.currentView === 'doc' && State.currentDocId === id) {
    navigate({ view: 'home' });
  }
}

async function renameDocument(id, newTitle) {
  const idx = State.docsIndex.find(d => d.id === id);
  if (idx) {
    idx.title = newTitle || 'Bez názvu';
    idx.updatedAt = Date.now();
  }
  if (State.activeDoc && State.activeDoc.id === id) {
    State.activeDoc.title = newTitle;
    await Storage.saveDocument(State.activeDoc);
  } else {
    const doc = await Storage.loadDocument(id);
    if (doc) {
      doc.title = newTitle;
      await Storage.saveDocument(doc);
    }
  }
  await saveWorkspace();
  renderSidebar();
}

async function starDocument(id) {
  const idx = State.docsIndex.find(d => d.id === id);
  if (!idx) return;
  idx.starred = !idx.starred;
  await saveWorkspace();
  renderSidebar();
  Announce.polite(idx.starred ? 'Přidáno do oblíbených' : 'Odebráno z oblíbených');
}

async function moveDocument(id, folderId) {
  const idx = State.docsIndex.find(d => d.id === id);
  if (!idx) return;
  idx.folderId = folderId;
  idx.updatedAt = Date.now();
  await saveWorkspace();
  renderSidebar();
  Announce.polite('Dokument přesunut');
}

async function createFolder(name, parentId = null) {
  const folder = { id: uuid(), name, parentId, icon: null };
  State.folders.push(folder);
  State.settings.sidebarExpanded[folder.id] = true;
  await saveWorkspace();
  renderSidebar();
  AudioFB.success();
  return folder;
}

async function renameFolder(id, name) {
  const f = State.folders.find(x => x.id === id);
  if (f) {
    f.name = name;
    await saveWorkspace();
    renderSidebar();
  }
}

async function deleteFolder(id, { moveContentsTo = null } = {}) {
  // recursively get all descendant folder ids
  const allIds = new Set([id]);
  let changed = true;
  while (changed) {
    changed = false;
    State.folders.forEach(f => {
      if (f.parentId && allIds.has(f.parentId) && !allIds.has(f.id)) {
        allIds.add(f.id);
        changed = true;
      }
    });
  }
  // move documents
  State.docsIndex.forEach(d => {
    if (d.folderId && allIds.has(d.folderId)) d.folderId = moveContentsTo;
  });
  // remove folders
  State.folders = State.folders.filter(f => !allIds.has(f.id));
  await saveWorkspace();
  renderSidebar();
  Announce.polite('Složka smazána');
}

async function openDocument(id) {
  const doc = await Storage.loadDocument(id);
  if (!doc) {
    Announce.assertive('Dokument nenalezen');
    AudioFB.error();
    return;
  }
  State.activeDoc = doc;
  State.currentDocId = id;
  // add tab or bring to front
  let tab = State.tabs.find(t => t.type === 'doc' && t.id === id);
  if (!tab) {
    tab = { id, type: 'doc', title: doc.title || 'Bez názvu' };
    State.tabs.push(tab);
  }
  State.activeTab = tab;
  navigate({ view: 'doc', docId: id, pushHistory: true });
}

function closeTab(tabId) {
  const idx = State.tabs.findIndex(t => t.id === tabId);
  if (idx < 0) return;
  State.tabs.splice(idx, 1);
  if (State.activeTab && State.activeTab.id === tabId) {
    State.activeTab = State.tabs[Math.min(idx, State.tabs.length - 1)] || null;
    if (State.activeTab) {
      if (State.activeTab.type === 'doc') openDocument(State.activeTab.id);
    } else {
      navigate({ view: 'home' });
    }
  }
  renderHeader();
}
