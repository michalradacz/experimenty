async function renderDailyView(container, isoDate) {
  const date = parseISODate(isoDate) || new Date();
  const iso = formatDateISO(date);

  const nav = document.createElement('div');
  nav.style.display = 'flex';
  nav.style.alignItems = 'center';
  nav.style.gap = '8px';
  nav.style.marginBottom = '16px';

  const prev = document.createElement('button');
  prev.textContent = '← Předchozí den';
  prev.setAttribute('aria-label', 'Předchozí den');
  prev.addEventListener('click', () => {
    const d = new Date(date);
    d.setDate(d.getDate() - 1);
    navigate({ view: 'daily', dailyDate: formatDateISO(d) });
  });

  const today = document.createElement('button');
  today.textContent = 'Dnes';
  today.addEventListener('click', () => navigate({ view: 'daily', dailyDate: formatDateISO(new Date()) }));

  const next = document.createElement('button');
  next.textContent = 'Další den →';
  next.setAttribute('aria-label', 'Další den');
  next.addEventListener('click', () => {
    const d = new Date(date);
    d.setDate(d.getDate() + 1);
    navigate({ view: 'daily', dailyDate: formatDateISO(d) });
  });

  const picker = document.createElement('input');
  picker.type = 'date';
  picker.value = iso;
  picker.setAttribute('aria-label', 'Vybrat datum');
  picker.style.width = 'auto';
  picker.addEventListener('change', () => {
    if (picker.value) navigate({ view: 'daily', dailyDate: picker.value });
  });

  nav.appendChild(prev);
  nav.appendChild(today);
  nav.appendChild(next);
  nav.appendChild(picker);
  container.appendChild(nav);

  const title = formatDailyTitle(date);
  let docIndex = State.docsIndex.find(d => d.title === title && d.tags && d.tags.includes('daily'));
  if (!docIndex) {
    const doc = {
      id: uuid(),
      title,
      blocks: [Block.create('paragraph', '')],
      createdAt: Date.now(),
      updatedAt: Date.now()
    };
    await Storage.saveDocument(doc);
    State.docsIndex.push({
      id: doc.id,
      title,
      folderId: State.settings.dailyNoteFolder || null,
      starred: false,
      tags: ['daily'],
      createdAt: doc.createdAt,
      updatedAt: doc.updatedAt
    });
    await saveWorkspace();
    State.activeDoc = doc;
    State.currentDocId = doc.id;
    Editor.render(doc, container);
    Announce.polite('Vytvořena denní poznámka ' + formatDateCS(date));
  } else {
    const doc = await Storage.loadDocument(docIndex.id);
    State.activeDoc = doc;
    State.currentDocId = doc.id;
    Editor.render(doc, container);
    Announce.polite('Otevřena denní poznámka ' + formatDateCS(date));
  }
}

function formatDailyTitle(date) {
  const dayName = DAYS_CS_FULL[date.getDay()];
  return `${dayName} ${date.getDate()}. ${MONTHS_CS_GEN[date.getMonth()]} ${date.getFullYear()}`;
}

    });
    const monthTitle = document.createElement('h2');
    monthTitle.textContent = MONTHS_CS[this.currentDate.getMonth()] + ' ' + this.currentDate.getFullYear();
    const next = document.createElement('button');
    next.textContent = '→';
    next.setAttribute('aria-label', 'Další měsíc');
    next.addEventListener('click', () => {
      this.currentDate = new Date(this.currentDate.getFullYear(), this.currentDate.getMonth() + 1, 1);
      this.render(container);
    });
    const todayBtn = document.createElement('button');
    todayBtn.textContent = 'Dnes';
    todayBtn.addEventListener('click', () => {
      this.currentDate = new Date();
      this.render(container);
    });
    nav.appendChild(prev);
    nav.appendChild(monthTitle);
    nav.appendChild(todayBtn);
    nav.appendChild(next);
    container.appendChild(nav);

    if (this.mode === 'grid') this.renderGrid(container);
    else this.renderList(container);
  },

  renderList(container) {
    const year = this.currentDate.getFullYear();
    const month = this.currentDate.getMonth();
    const daysInMonth = new Date(year, month + 1, 0).getDate();
    const wrap = document.createElement('div');
    wrap.className = 'cal-list';
    wrap.setAttribute('role', 'list');
    wrap.setAttribute('aria-label', 'Dny měsíce ' + MONTHS_CS_GEN[month] + ' ' + year);

    for (let day = 1; day <= daysInMonth; day++) {
      const d = new Date(year, month, day);
      const iso = formatDateISO(d);
      const dailyTitle = formatDailyTitle(d);
      const note = State.docsIndex.find(x => x.title === dailyTitle && x.tags && x.tags.includes('daily'));

      const dayEl = document.createElement('div');
      dayEl.className = 'cal-list-day';
      dayEl.setAttribute('role', 'listitem');
      if (isToday(d)) dayEl.style.borderColor = 'var(--accent)';

      const h3 = document.createElement('h3');
      h3.textContent = `${day}. ${MONTHS_CS_GEN[month]} ${year} (${DAYS_CS_FULL[d.getDay()]})`;
      if (isToday(d)) h3.textContent += ' — dnes';
      dayEl.appendChild(h3);

      const actions = document.createElement('div');
      actions.style.display = 'flex';
      actions.style.gap = '6px';
      actions.style.marginTop = '4px';
      const open = document.createElement('button');
      open.className = 'subtle';
      open.textContent = note ? 'Otevřít poznámku' : 'Vytvořit poznámku';
      open.addEventListener('click', () => navigate({ view: 'daily', dailyDate: iso }));
      actions.appendChild(open);
      if (note) {
        const hint = document.createElement('span');
        hint.style.color = 'var(--fg-muted)';
        hint.style.fontSize = '12px';
        hint.style.alignSelf = 'center';
        hint.textContent = 'Aktualizováno ' + formatRelativeCS(note.updatedAt || 0);
        actions.appendChild(hint);
      }
      dayEl.appendChild(actions);
      wrap.appendChild(dayEl);
    }
    container.appendChild(wrap);
  },

  renderGrid(container) {
    const year = this.currentDate.getFullYear();
    const month = this.currentDate.getMonth();
    const firstDay = new Date(year, month, 1);
    const lastDay = new Date(year, month + 1, 0);
    let startOffset = firstDay.getDay() - 1;
    if (startOffset < 0) startOffset = 6;

    const grid = document.createElement('div');
    grid.className = 'cal-grid';
    grid.setAttribute('role', 'grid');
    grid.setAttribute('aria-label', 'Měsíc ' + MONTHS_CS[month] + ' ' + year);

    const weekDays = ['Po', 'Út', 'St', 'Čt', 'Pá', 'So', 'Ne'];
    weekDays.forEach(w => {
      const h = document.createElement('div');
      h.className = 'cal-head';
      h.textContent = w;
      h.setAttribute('role', 'columnheader');
      grid.appendChild(h);
    });

    const totalCells = Math.ceil((startOffset + lastDay.getDate()) / 7) * 7;
    for (let i = 0; i < totalCells; i++) {
      const dayNum = i - startOffset + 1;
      const d = new Date(year, month, dayNum);
      const inMonth = dayNum >= 1 && dayNum <= lastDay.getDate();
      const iso = formatDateISO(d);

      const cell = document.createElement('button');
      cell.type = 'button';
      cell.className = 'cal-cell';
      if (!inMonth) cell.classList.add('other-month');
      if (isToday(d)) cell.classList.add('today');
      cell.setAttribute('role', 'gridcell');
      const fullLabel = DAYS_CS_FULL[d.getDay()] + ' ' + d.getDate() + '. ' + MONTHS_CS_GEN[d.getMonth()] + ' ' + d.getFullYear();
      cell.setAttribute('aria-label', fullLabel);

      const dayEl = document.createElement('div');
      dayEl.className = 'cal-day';
      dayEl.textContent = d.getDate();
      cell.appendChild(dayEl);

      const dailyTitle = formatDailyTitle(d);
      const hasNote = State.docsIndex.some(x => x.title === dailyTitle && x.tags && x.tags.includes('daily'));

      if (hasNote) {
        const ind = document.createElement('div');
        ind.className = 'cal-indicators';
        const dot = document.createElement('span');
        dot.className = 'cal-indicator has-note';
        dot.setAttribute('aria-hidden', 'true');
        ind.appendChild(dot);
        cell.appendChild(ind);
        cell.setAttribute('aria-label', fullLabel + ', má poznámku');
      }

      cell.addEventListener('click', () => navigate({ view: 'daily', dailyDate: iso }));
      grid.appendChild(cell);
    }
    container.appendChild(grid);
  }
};

    const inp = document.createElement('input');

        done: false,

      });

      AudioFB.success();
      setTimeout(() => {

        if (newInp) newInp.focus();
      }, 0);
    };
    addBtn.addEventListener('click', doAdd);
    inp.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') { e.preventDefault(); doAdd(); }
    });

    const filtered = this.applyFilter(this.allTasks, this.filter);
    const grouped = this.groupTasks(filtered);

    const order = ['overdue', 'today', 'tomorrow', 'thisWeek', 'later', 'noDate', 'completed'];
    const titles = {
      overdue: 'Po termínu',
      today: 'Dnes',
      tomorrow: 'Zítra',
      thisWeek: 'Tento týden',
      later: 'Později',
      noDate: 'Bez data',
      completed: 'Hotové'
    };
    let totalShown = 0;
    order.forEach(key => {
      const arr = grouped[key];
      if (!arr || arr.length === 0) return;
      const sec = document.createElement('section');
      sec.className = 'task-group';
      sec.setAttribute('aria-label', titles[key]);
      const h = document.createElement('h3');
      h.className = 'task-group-title';
      h.textContent = `${titles[key]} (${arr.length})`;
      sec.appendChild(h);
      const ul = document.createElement('ul');
      ul.className = 'task-list';
      ul.setAttribute('role', 'list');
      arr.forEach(t => {
        ul.appendChild(this.renderTaskItem(t));
        totalShown++;
      });
      sec.appendChild(ul);
      container.appendChild(sec);
    });

    if (totalShown === 0) {
      const p = document.createElement('p');
      p.style.color = 'var(--fg-muted)';
      p.textContent = 'Žádné úkoly odpovídající filtru.';
      container.appendChild(p);
    }
  },

  async collectTasks() {
    const tasks = [];
    State.inboxTasks.forEach(t => { tasks.push({ ...t, source: 'inbox' }); });
    const docs = await Storage.allDocuments();
    docs.forEach(doc => {
      Block.walk(doc.blocks, (b) => {
        if (b.type === 'task') {
          tasks.push({
            id: b.id,
            title: stripHtml(b.content || ''),
            done: !!b.props.checked,
            startDate: b.props.startDate || null,
            dueDate: b.props.dueDate || null,
            createdAt: b.createdAt,
            completedAt: b.props.completedAt || null,
            source: 'doc',
            docId: doc.id,
            docTitle: doc.title,
            blockId: b.id
          });
        }
      });
    });
    return tasks;
  },

  applyFilter(tasks, filter) {
    const today = startOfDay(new Date());
    switch (filter) {
      case 'today':
        return tasks.filter(t => !t.done && t.dueDate && formatDateISO(today) === t.dueDate);
      case 'overdue':
        return tasks.filter(t => !t.done && t.dueDate && parseISODate(t.dueDate) < today);
      case 'upcoming':
        return tasks.filter(t => !t.done && t.dueDate && parseISODate(t.dueDate) > today);
      case 'completed':
        return tasks.filter(t => t.done);
      case 'all':
      default:
        return tasks;
    }
  },

  groupTasks(tasks) {
    const today = startOfDay(new Date());
    const tomorrow = new Date(today); tomorrow.setDate(today.getDate() + 1);
    const endOfWeek = new Date(today); endOfWeek.setDate(today.getDate() + 7);

    const g = { overdue: [], today: [], tomorrow: [], thisWeek: [], later: [], noDate: [], completed: [] };
    tasks.forEach(t => {
      if (t.done) { g.completed.push(t); return; }
      if (!t.dueDate) { g.noDate.push(t); return; }
      const d = parseISODate(t.dueDate);
      if (d < today) g.overdue.push(t);
      else if (formatDateISO(d) === formatDateISO(today)) g.today.push(t);
      else if (formatDateISO(d) === formatDateISO(tomorrow)) g.tomorrow.push(t);
      else if (d <= endOfWeek) g.thisWeek.push(t);
      else g.later.push(t);
    });
    Object.values(g).forEach(arr => {
      arr.sort((a, b) => {
        if (a.dueDate && b.dueDate) return a.dueDate.localeCompare(b.dueDate);
        return 0;
      });
    });
    return g;
  },

  renderTaskItem(task) {
    const li = document.createElement('li');
    li.className = 'task-item';
    if (task.done) li.classList.add('done');

    const cb = document.createElement('input');
    cb.type = 'checkbox';
    cb.checked = task.done;
    cb.setAttribute('aria-label', 'Označit jako hotové: ' + task.title);
    cb.addEventListener('change', async () => {
      task.done = cb.checked;
      task.completedAt = cb.checked ? Date.now() : null;
      if (task.source === 'inbox') {
        const inbox = State.inboxTasks.find(t => t.id === task.id);
        if (inbox) { inbox.done = cb.checked; inbox.completedAt = task.completedAt; }
        await saveWorkspace();
      } else {
        const doc = await Storage.loadDocument(task.docId);
        if (doc) {
          const r = Block.find(doc.blocks, task.blockId);
          if (r) {
            r.block.props.checked = cb.checked;
            r.block.props.completedAt = task.completedAt;
            r.block.updatedAt = Date.now();
            await Storage.saveDocument(doc);
            if (State.activeDoc && State.activeDoc.id === doc.id) State.activeDoc = doc;
          }
        }
      }
      if (cb.checked) AudioFB.success();
      Announce.polite(cb.checked ? 'Úkol označen jako hotový' : 'Úkol odškrtnut');
      this.render(document.getElementById('view-container'));
      renderSidebar();
    });

    const middle = document.createElement('div');
    const title = document.createElement('div');
    title.className = 'task-title';
    title.textContent = task.title || '(bez textu)';
    middle.appendChild(title);

    const ctx = document.createElement('div');
    ctx.className = 'task-ctx';
    if (task.source === 'doc') {
      const a = document.createElement('a');
      a.href = '#';
      a.textContent = task.docTitle || 'Bez názvu';
      a.addEventListener('click', (e) => {
        e.preventDefault();
        openDocument(task.docId);
        setTimeout(() => Editor.focusBlock(task.blockId), 300);
      });
      ctx.textContent = 'v dokumentu: ';
      ctx.appendChild(a);
    } else {
      ctx.textContent = 'ze schránky';
    }
    middle.appendChild(ctx);

    const meta = document.createElement('div');
    meta.className = 'task-meta';
    const today = startOfDay(new Date());

    if (task.dueDate) {
      const due = parseISODate(task.dueDate);
      const badge = document.createElement('span');
      badge.className = 'task-badge';
      if (!task.done && due < today) badge.classList.add('overdue');
      else if (formatDateISO(due) === formatDateISO(today)) badge.classList.add('today');
      badge.textContent = formatDateCS(due);
      meta.appendChild(badge);
    }

    const editBtn = document.createElement('button');
    editBtn.className = 'subtle';
    editBtn.textContent = 'Datum';
    editBtn.setAttribute('aria-label', 'Upravit datum úkolu');
    editBtn.addEventListener('click', async () => {
      const fakeBlock = {
        props: {
          startDate: task.startDate,
          dueDate: task.dueDate,
          checked: task.done
        }
      };
      const result = await Dialogs.taskDates(fakeBlock);
      if (result) {
        if (task.source === 'inbox') {
          const inbox = State.inboxTasks.find(t => t.id === task.id);
          if (inbox) {
            inbox.startDate = result.startDate;
            inbox.dueDate = result.dueDate;
          }
          await saveWorkspace();
        } else {
          const doc = await Storage.loadDocument(task.docId);
          if (doc) {
            const r = Block.find(doc.blocks, task.blockId);
            if (r) {
              r.block.props.startDate = result.startDate;
              r.block.props.dueDate = result.dueDate;
              r.block.updatedAt = Date.now();
              await Storage.saveDocument(doc);
              if (State.activeDoc && State.activeDoc.id === doc.id) State.activeDoc = doc;
            }
          }
        }
        this.render(document.getElementById('view-container'));
      }
    });
    meta.appendChild(editBtn);

    if (task.source === 'inbox') {
      const delBtn = document.createElement('button');
      delBtn.className = 'subtle';
      delBtn.textContent = 'Smazat';
      delBtn.setAttribute('aria-label', 'Smazat úkol ze schránky');
      delBtn.addEventListener('click', async () => {
        State.inboxTasks = State.inboxTasks.filter(t => t.id !== task.id);
        await saveWorkspace();
        this.render(document.getElementById('view-container'));
        renderSidebar();
        Announce.polite('Úkol smazán');
      });
      meta.appendChild(delBtn);
    }

    li.appendChild(cb);
    li.appendChild(middle);
    li.appendChild(meta);
    return li;
  }
};

function renderSearchView(container, initialQuery = '') {
  container.innerHTML = '';
  const h1 = document.createElement('h1');
  h1.className = 'view-title';
  h1.textContent = 'Vyhledávání';
  container.appendChild(h1);

  const input = document.createElement('input');
  input.type = 'search';
  input.placeholder = 'Hledat v dokumentech…';
  input.setAttribute('aria-label', 'Vyhledávací dotaz');
  input.value = initialQuery;
  input.style.marginBottom = '12px';
  container.appendChild(input);

  const statusEl = document.createElement('div');
  statusEl.setAttribute('aria-live', 'polite');
  statusEl.setAttribute('role', 'status');
  statusEl.style.marginBottom = '8px';
  statusEl.style.color = 'var(--fg-muted)';
  statusEl.style.fontSize = '13px';
  container.appendChild(statusEl);

  const results = document.createElement('div');
  results.setAttribute('role', 'list');
  results.setAttribute('aria-label', 'Výsledky vyhledávání');
  container.appendChild(results);

  const doSearch = debounce(async (q) => {
    results.innerHTML = '';
    if (!q || q.trim().length < 2) {
      statusEl.textContent = q ? 'Zadejte alespoň 2 znaky.' : '';
      return;
    }
    const matches = await Search.search(q);
    statusEl.textContent = `Nalezeno ${matches.length} výsledků pro „${q}"`;
    matches.slice(0, 50).forEach(m => {
      const btn = document.createElement('button');
      btn.className = 'search-result';
      btn.setAttribute('role', 'listitem');
      const title = document.createElement('div');
      title.className = 'search-result-title';
      title.textContent = m.docTitle || 'Bez názvu';
      btn.appendChild(title);
      if (m.folderName) {
        const path = document.createElement('div');
        path.className = 'search-result-path';
        path.textContent = '📁 ' + m.folderName;
        btn.appendChild(path);
      }
      if (m.snippet) {
        const sn = document.createElement('div');
        sn.className = 'search-result-snippet';
        sn.innerHTML = m.snippet;
        btn.appendChild(sn);
      }
      btn.addEventListener('click', () => {
        openDocument(m.docId);
        if (m.blockId) setTimeout(() => Editor.focusBlock(m.blockId), 300);
      });
      results.appendChild(btn);
    });
  }, 250);

  input.addEventListener('input', () => doSearch(input.value));

  input.focus();
  if (initialQuery) doSearch(initialQuery);
}

// ===========================================================================
// SEARCH
// ===========================================================================
const Search = {
  async search(query) {
    if (!query || query.trim().length < 2) return [];
    const q = query.toLowerCase().trim();
    const terms = q.split(/\s+/);
    const results = [];
    const docs = await Storage.allDocuments();

    for (const doc of docs) {
      const idx = State.docsIndex.find(d => d.id === doc.id);
      const folder = idx && idx.folderId ? State.folders.find(f => f.id === idx.folderId) : null;
      const titleLower = (doc.title || '').toLowerCase();

      if (terms.every(t => titleLower.includes(t))) {
        results.push({
          docId: doc.id,
          docTitle: doc.title || 'Bez názvu',
          folderName: folder ? folder.name : null,
          blockId: null,
          snippet: this.highlightSnippet(doc.title || '', terms),
          score: 100
        });
      }

      Block.walk(doc.blocks, (b) => {
        if (!b.content) return;
        const text = stripHtml(b.content).toLowerCase();
        if (terms.every(t => text.includes(t))) {
          results.push({
            docId: doc.id,
            docTitle: doc.title || 'Bez názvu',
            folderName: folder ? folder.name : null,
            blockId: b.id,
            snippet: this.highlightSnippet(stripHtml(b.content), terms),
            score: 50
          });
        }
      });
    }

    results.sort((a, b) => b.score - a.score);
    return results;
  },

  highlightSnippet(text, terms) {
    let snippet = text.slice(0, 200);
    let escaped = escapeHtml(snippet);
    terms.forEach(t => {
      if (!t) return;
      const re = new RegExp('(' + t.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'gi');
      escaped = escaped.replace(re, '<mark>$1</mark>');
    });
    if (text.length > 200) escaped += '…';
    return escaped;
  }
};

function blockToMarkdown(block, depth = 0) {
  const indent = '  '.repeat(depth);
  const text = (html) => {
    const div = document.createElement('div');
    div.innerHTML = html || '';
    const walk = (node) => {
      let out = '';
      node.childNodes.forEach(n => {
        if (n.nodeType === 3) {
          out += n.textContent;
        } else if (n.nodeType === 1) {
          const tag = n.tagName.toLowerCase();
          const inner = walk(n);
          if (tag === 'strong' || tag === 'b') out += '**' + inner + '**';
          else if (tag === 'em' || tag === 'i') out += '*' + inner + '*';
          else if (tag === 'u') out += '<u>' + inner + '</u>';
          else if (tag === 's' || tag === 'strike') out += '~~' + inner + '~~';
          else if (tag === 'code') out += '`' + inner + '`';
          else if (tag === 'a') {
            if (n.classList.contains('mention')) {
              out += '[[' + inner + ']]';
            } else {
              const href = n.getAttribute('href') || '';
              out += '[' + inner + '](' + href + ')';
            }
          } else if (tag === 'br') out += '\n';
          else out += inner;
        }
      });
      return out;
    };
    return walk(div);
  };

  let out = '';
  const content = text(block.content || '');
  switch (block.type) {
    case 'paragraph': out += indent + content + '\n'; break;
    case 'heading1': out += indent + '# ' + content + '\n'; break;
    case 'heading2': out += indent + '## ' + content + '\n'; break;
    case 'heading3': out += indent + '### ' + content + '\n'; break;
    case 'heading4': out += indent + '#### ' + content + '\n'; break;
    case 'heading5': out += indent + '##### ' + content + '\n'; break;
    case 'heading6': out += indent + '###### ' + content + '\n'; break;
    case 'bullet': out += indent + '- ' + content + '\n'; break;
    case 'numbered': out += indent + '1. ' + content + '\n'; break;
    case 'task':
      out += indent + (block.props.checked ? '- [x] ' : '- [ ] ') + content;
      if (block.props.dueDate) out += ' (termín ' + block.props.dueDate + ')';
      out += '\n';
      break;
    case 'quote': out += indent + '> ' + content + '\n'; break;
    case 'callout': {
      const kind = (block.props.kind || 'info').toUpperCase();
      out += indent + `> **[${kind}]** ` + content + '\n';
      break;
    }
    case 'code': {
      const lang = block.props.language || '';
      out += indent + '```' + lang + '\n';
      (stripHtml(block.content || '')).split('\n').forEach(l => { out += indent + l + '\n'; });
      out += indent + '```\n';
      break;
    }
    case 'divider': out += indent + '---\n'; break;
    case 'toggle': out += indent + '- ' + content + ' [rozbalovací]\n'; break;
    case 'image': {
      out += indent + '![' + (block.props.alt || '') + '](' + (block.props.src || '') + ')\n';
      if (block.content) out += indent + '*' + text(block.content) + '*\n';
      break;
    }
    case 'table': {
      if (block.props.rows && block.props.rows.length) {
        const rows = block.props.rows;
        out += indent + '| ' + rows[0].join(' | ') + ' |\n';
        out += indent + '|' + rows[0].map(() => ' --- ').join('|') + '|\n';
        for (let i = 1; i < rows.length; i++) {
          out += indent + '| ' + rows[i].join(' | ') + ' |\n';
        }
      }
      break;
    }
    default: out += indent + content + '\n';
  }

  if (block.children && block.children.length) {
    block.children.forEach(c => { out += blockToMarkdown(c, depth + 1); });
  }
  return out;
}

function docToMarkdown(doc) {
  let out = '# ' + (doc.title || 'Bez názvu') + '\n\n';
  doc.blocks.forEach(b => { out += blockToMarkdown(b, 0); });
  return out;
}

function blockToHTML(block, depth = 0) {
  let out = '';
  const content = block.content || '';
  switch (block.type) {
    case 'paragraph': out += '<p>' + content + '</p>\n'; break;
    case 'heading1': case 'heading2': case 'heading3':
    case 'heading4': case 'heading5': case 'heading6': {
      const n = block.type.slice(-1);
      out += `<h${n}>${content}</h${n}>\n`;
      break;
    }
    case 'bullet': out += '<ul><li>' + content + '</li></ul>\n'; break;
    case 'numbered': out += '<ol><li>' + content + '</li></ol>\n'; break;
    case 'task':
      out += '<div><input type="checkbox" ' + (block.props.checked ? 'checked ' : '') + 'disabled> ' + content + '</div>\n';
      break;
    case 'quote': out += '<blockquote>' + content + '</blockquote>\n'; break;
    case 'callout': out += '<div class="callout ' + (block.props.kind || 'info') + '">' + content + '</div>\n'; break;
    case 'code':
      out += '<pre><code>' + escapeHtml(stripHtml(block.content || '')) + '</code></pre>\n';
      break;
    case 'divider': out += '<hr>\n'; break;
    case 'image': {
      out += '<figure><img src="' + escapeHtml(block.props.src || '') + '" alt="' + escapeHtml(block.props.alt || '') + '">';
      if (block.content) out += '<figcaption>' + stripHtml(block.content) + '</figcaption>';
      out += '</figure>\n';
      break;
    }
    case 'table': {
      if (block.props.rows && block.props.rows.length) {
        out += '<table>\n';
        block.props.rows.forEach((r, i) => {
          out += '<tr>';
          r.forEach(c => {
            const tag = (i === 0 && block.props.hasHeader) ? 'th' : 'td';
            out += '<' + tag + '>' + escapeHtml(c) + '</' + tag + '>';
          });
          out += '</tr>\n';
        });
        out += '</table>\n';
      }
      break;
    }
    default: out += '<div>' + content + '</div>\n';
  }
  if (block.children && block.children.length) {
    out += '<div style="margin-left:20px">';
    block.children.forEach(c => { out += blockToHTML(c, depth + 1); });
    out += '</div>';
  }
  return out;
}

function docToHTML(doc) {
  let out = `<!DOCTYPE html>
<html lang="cs"><head><meta charset="UTF-8"><title>${escapeHtml(doc.title || 'Bez názvu')}</title>
<style>body{font-family:system-ui;max-width:720px;margin:40px auto;padding:0 20px;line-height:1.5}
blockquote{border-left:3px solid #ccc;padding-left:12px;color:#555;font-style:italic}
pre{background:#f5f5f5;padding:10px;border-radius:4px;overflow-x:auto}
code{background:#f5f5f5;padding:1px 4px;border-radius:3px}
.callout{border-left:4px solid #1a56db;background:#eaf1fe;padding:10px;margin:8px 0}
.callout.warning{border-color:#8a5500;background:#fef3c7}
.callout.danger{border-color:#b42318;background:#fdecea}
.callout.success{border-color:#047849;background:#d1fae5}
table{border-collapse:collapse}th,td{border:1px solid #ccc;padding:4px 8px}th{background:#f5f5f5}
img{max-width:100%}</style></head><body>`;
  out += '<h1>' + escapeHtml(doc.title || 'Bez názvu') + '</h1>\n';
  doc.blocks.forEach(b => { out += blockToHTML(b, 0); });
  out += '</body></html>';
  return out;
}

function download(filename, content, mime = 'text/plain') {
  const blob = new Blob([content], { type: mime + ';charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  setTimeout(() => { URL.revokeObjectURL(url); a.remove(); }, 500);
  AudioFB.save();
  Announce.polite('Soubor stažen: ' + filename);
}

function safeFilename(s) {
  return (s || 'dokument').replace(/[\\/:*?"<>|]/g, '_').replace(/\s+/g, '_').slice(0, 80);
}

function exportDocMarkdown(doc) {
  download(safeFilename(doc.title) + '.md', docToMarkdown(doc), 'text/markdown');
}
function exportDocHTML(doc) {
  download(safeFilename(doc.title) + '.html', docToHTML(doc), 'text/html');
}
function exportDocJSON(doc) {
  download(safeFilename(doc.title) + '.json', JSON.stringify(doc, null, 2), 'application/json');
}

async function exportWorkspace() {
  const docs = await Storage.allDocuments();
  const payload = {
    version: 1,
    exportedAt: new Date().toISOString(),
    folders: State.folders,
    docsIndex: State.docsIndex,
    inboxTasks: State.inboxTasks,
    settings: State.settings,
    documents: docs
  };
  download('poznamkar-export-' + formatDateISO(new Date()) + '.json',
    JSON.stringify(payload, null, 2), 'application/json');
}

async function importWorkspace() {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = '.json,application/json';
  input.addEventListener('change', async () => {
    const f = input.files[0];
    if (!f) return;
    try {
      const text = await f.text();
      const data = JSON.parse(text);
      const ok = await Dialogs.confirm(
        `Importovat prostor? Bude přidáno ${data.documents?.length || 0} dokumentů, ${data.folders?.length || 0} složek. Existující data zůstanou zachována.`,
        { title: 'Import prostoru', confirmLabel: 'Importovat' }
      );
      if (!ok) return;
      const folderIdMap = {};
      (data.folders || []).forEach(f => {
        const newId = State.folders.some(x => x.id === f.id) ? uuid() : f.id;
        folderIdMap[f.id] = newId;
        State.folders.push({ ...f, id: newId });
      });
      (data.folders || []).forEach(f => {
        const newF = State.folders.find(x => x.id === folderIdMap[f.id]);
        if (newF && f.parentId && folderIdMap[f.parentId]) newF.parentId = folderIdMap[f.parentId];
      });
      for (const doc of (data.documents || [])) {
        const newId = State.docsIndex.some(x => x.id === doc.id) ? uuid() : doc.id;
        const newDoc = { ...doc, id: newId };
        await Storage.saveDocument(newDoc);
        const idxEntry = (data.docsIndex || []).find(d => d.id === doc.id);
        State.docsIndex.push({
          id: newId,
          title: doc.title,
          folderId: idxEntry && idxEntry.folderId ? (folderIdMap[idxEntry.folderId] || null) : null,
          starred: !!(idxEntry && idxEntry.starred),
          tags: (idxEntry && idxEntry.tags) || [],
          createdAt: doc.createdAt,
          updatedAt: doc.updatedAt
        });
      }
      (data.inboxTasks || []).forEach(t => {
        State.inboxTasks.push({ ...t, id: State.inboxTasks.some(x => x.id === t.id) ? uuid() : t.id });
      });
      await saveWorkspace();
      BacklinksIndex.invalidate();
      renderSidebar();
      Announce.assertive('Import dokončen');
      AudioFB.success();
    } catch (e) {
      Debug.error('Import: ' + e.message);
      Announce.assertive('Chyba při importu: ' + e.message);
      AudioFB.error();
    }
  });
  input.click();
}

function applyTheme() {
  document.body.classList.remove('theme-light', 'theme-dark');
  if (State.settings.theme === 'light') document.body.classList.add('theme-light');
  else if (State.settings.theme === 'dark') document.body.classList.add('theme-dark');
}

function cycleTheme() {
  const order = ['system', 'light', 'dark'];
  const idx = order.indexOf(State.settings.theme);
  State.settings.theme = order[(idx + 1) % order.length];
  applyTheme();
  saveWorkspace();
  const label = { system: 'systémový', light: 'světlý', dark: 'tmavý' }[State.settings.theme];
  Announce.polite('Motiv: ' + label);
}

function applyFontSize() {
  const map = { small: '14px', medium: '16px', large: '18px', xlarge: '20px' };
  document.body.style.fontSize = map[State.settings.fontSize] || '16px';
}

// ===========================================================================
// GLOBAL KEYBOARD SHORTCUTS
// ===========================================================================
function setupGlobalShortcuts() {
  document.addEventListener('keydown', (e) => {
    // Don't trigger when a palette or dialog is open (let them handle it)
    if (Dialogs.activeDialog) {
      if (e.key === 'F1') { e.preventDefault(); openHelp(); }
      return;
    }

    const mod = e.ctrlKey || e.metaKey;

    if (mod && !e.shiftKey && !e.altKey && (e.key === 'k' || e.key === 'K')) {
      e.preventDefault();
      CommandPalette.open();
      return;
    }
    if (mod && !e.shiftKey && !e.altKey && (e.key === 'n' || e.key === 'N')) {
      e.preventDefault();
      Dialogs.prompt('Název dokumentu', { title: 'Nový dokument' }).then(t => {
        if (t !== null) createDocument({ title: t.trim() || 'Bez názvu' });
      });
      return;
    }
    if (mod && !e.shiftKey && !e.altKey && (e.key === 'o' || e.key === 'O')) {
      e.preventDefault();
      CommandPalette.openDocPicker();
      return;
    }
    if (mod && !e.shiftKey && !e.altKey && (e.key === 'f' || e.key === 'F')) {
      e.preventDefault();
      navigate({ view: 'search' });
      return;
    }
    if (mod && !e.shiftKey && !e.altKey && (e.key === 's' || e.key === 'S')) {
      e.preventDefault();
      if (State.activeDoc) {
        Storage.saveDocument(State.activeDoc).then(() => {
          saveWorkspace();
          State.dirty = false;
          if (typeof setStatusSaved === 'function') setStatusSaved();
          Announce.polite('Uloženo');
          AudioFB.save();
        });
      }
      return;
    }
    if (e.altKey && !e.ctrlKey && !e.metaKey && !e.shiftKey && e.key === 'ArrowLeft') {
      e.preventDefault();
      goBack();
      return;
    }
    if (e.altKey && !e.ctrlKey && !e.metaKey && !e.shiftKey && e.key === 'ArrowRight') {
      e.preventDefault();
      goForward();
      return;
    }
    if (e.key === 'F1') {
      e.preventDefault();
      openHelp();
      return;
    }
    if (mod && e.shiftKey && (e.key === 'd' || e.key === 'D')) {
      e.preventDefault();
      Debug.toggle();
      return;
    }
  });
}

function wireHeaderButtons() {
  const bb = document.getElementById('btn-back');
  if (bb) bb.addEventListener('click', goBack);
  const bf = document.getElementById('btn-forward');
  if (bf) bf.addEventListener('click', goForward);
  const bs = document.getElementById('btn-search');
  if (bs) bs.addEventListener('click', () => navigate({ view: 'search' }));
  const bp = document.getElementById('btn-palette');
  if (bp) bp.addEventListener('click', () => CommandPalette.open());
  const bh = document.getElementById('btn-help');
  if (bh) bh.addEventListener('click', openHelp);
  const bset = document.getElementById('btn-settings');
  if (bset) bset.addEventListener('click', () => navigate({ view: 'settings' }));
  const bm = document.getElementById('btn-menu');
  if (bm) bm.addEventListener('click', () => {
    const firstLink = document.querySelector('#sidebar .sidebar-link');
    if (firstLink) firstLink.focus();
  });
}

// ===========================================================================
// MENTION CLICK HANDLER
// ===========================================================================
document.addEventListener('click', (e) => {
  const a = e.target.closest('a.mention[data-link-id]');
  if (a) {
    // Don't navigate while editing the block containing the mention
    const block = a.closest('[data-block-id]');
    if (block && document.activeElement && block.contains(document.activeElement)) return;
    e.preventDefault();
    const targetId = a.dataset.linkId;
    const exists = State.docsIndex.find(d => d.id === targetId);
    if (exists) {
      openDocument(targetId);
    } else {
      a.classList.add('broken');
      Announce.assertive('Cílový dokument byl smazán');
      AudioFB.error();
    }
  }
});

// ===========================================================================
// INIT
// ===========================================================================
async function init() {
  try {
    if (typeof Debug !== 'undefined' && Debug.init) Debug.init();
    await Storage.open();
    await loadWorkspace();
    applyTheme();
    applyFontSize();
    AudioFB.setEnabled(!!State.settings.soundEnabled);
    wireHeaderButtons();
    setupGlobalShortcuts();

    // Build backlinks in background (non-blocking)
    BacklinksIndex.build().catch(e => Debug.error('Backlinks: ' + e.message));

    renderSidebar();

    const handled = handleURLHash();
    if (!handled) navigate({ view: 'home', pushHistory: false });

    Debug.log('Poznámkář připraven — ' + State.docsIndex.length + ' dokumentů, ' + State.folders.length + ' složek');
    Announce.polite('Poznámkář připraven. Stiskněte F1 pro nápovědu.');
  } catch (e) {
    Debug.error('Init: ' + e.message + '\n' + (e.stack || ''));
    Announce.assertive('Chyba při inicializaci: ' + e.message);
    const container = document.getElementById('view-container');
    if (container) {
      container.innerHTML = '';
      const h1 = document.createElement('h1');
      h1.textContent = 'Chyba při načítání';
      const p = document.createElement('p');
      p.textContent = e.message;
      const p2 = document.createElement('p');
      const txt1 = document.createTextNode('Otevřete ladicí panel pomocí ');
      const kb = document.createElement('kbd');
      kb.textContent = 'Ctrl+Shift+D';
      const txt2 = document.createTextNode('.');
      p2.appendChild(txt1);
      p2.appendChild(kb);
      p2.appendChild(txt2);
      container.appendChild(h1);
      container.appendChild(p);
      container.appendChild(p2);
    }
  }
}

// Handle browser back/forward (hashchange)
window.addEventListener('hashchange', () => {
  handleURLHash();
});

// Warn on unload if dirty
window.addEventListener('beforeunload', (e) => {
  if (State.dirty) {
    e.preventDefault();
    e.returnValue = 'Máte neuložené změny. Opravdu chcete opustit stránku?';
    return e.returnValue;
  }
});

// Start
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', init);
} else {
  init();
}
