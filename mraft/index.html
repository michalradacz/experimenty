const Editor = {
  doc: null,
  expandedToggles: new Set(),
  focusBlockAfterRender: null,
  focusAtEnd: true,

  render(doc, container) {
    this.doc = doc;
    container.innerHTML = '';

    // Document title
    const titleInput = document.createElement('input');
    titleInput.type = 'text';
    titleInput.className = 'doc-title';
    titleInput.value = doc.title || '';
    titleInput.placeholder = 'Bez názvu';
    titleInput.setAttribute('aria-label', 'Název dokumentu');
    titleInput.addEventListener('input', () => {
      doc.title = titleInput.value;
      markDirty();
      // Update tab/sidebar
      const tab = State.tabs.find(t => t.type === 'doc' && t.id === doc.id);
      if (tab) tab.title = titleInput.value || 'Bez názvu';
      renderHeader();
      const idxEntry = State.docsIndex.find(d => d.id === doc.id);
      if (idxEntry) idxEntry.title = titleInput.value || 'Bez názvu';
    });
    titleInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' || e.key === 'ArrowDown') {
        e.preventDefault();
        const first = doc.blocks[0];
        if (first) this.focusBlock(first.id);
        else {
          const b = Block.create('paragraph', '');
          doc.blocks.push(b);
          this.rerender();
          this.focusBlock(b.id);
        }
      }
    });
    container.appendChild(titleInput);

    // Blocks list
    const blocksWrap = document.createElement('div');
    blocksWrap.className = 'blocks';
    blocksWrap.setAttribute('role', 'region');
    blocksWrap.setAttribute('aria-label', 'Obsah dokumentu');
    container.appendChild(blocksWrap);

    this.renderBlocks(doc.blocks, blocksWrap);

    // Backlinks panel
    const backlinksEl = document.createElement('aside');
    backlinksEl.className = 'backlinks';
    backlinksEl.id = 'doc-backlinks';
    container.appendChild(backlinksEl);
    this.renderBacklinks(doc.id, backlinksEl);

    // Handle focus after re-render
    if (this.focusBlockAfterRender) {
      const targetId = this.focusBlockAfterRender;
      this.focusBlockAfterRender = null;
      requestAnimationFrame(() => this.focusBlock(targetId, this.focusAtEnd));
    }
  },

  rerender() {
    const container = document.getElementById('view-container');
    if (State.currentView === 'doc') this.render(this.doc, container);
  },

  renderBlocks(blocks, container) {
    container.innerHTML = '';
    blocks.forEach((block, idx) => {
      const el = this.renderBlock(block, blocks, idx);
      container.appendChild(el);
    });
    if (blocks.length === 0) {
      // Placeholder to allow starting to type
      const empty = document.createElement('p');
      empty.style.color = 'var(--fg-muted)';
      empty.style.padding = '8px 6px';
      empty.textContent = 'Prázdný dokument. Stiskněte Enter pro přidání prvního bloku.';
      empty.tabIndex = 0;
      empty.setAttribute('role', 'button');
      empty.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
          const b = Block.create('paragraph', '');
          this.doc.blocks.push(b);
          markDirty();
          this.rerender();
          this.focusBlock(b.id);
        }
      });
      container.appendChild(empty);
    }
  },

  renderBlock(block, siblings, index) {
    const el = document.createElement('div');
    el.className = 'block';
    el.dataset.type = block.type;
    el.dataset.blockId = block.id;
    el.setAttribute('role', 'group');
    el.setAttribute('aria-label', `${BLOCK_TYPES[block.type]?.label || block.type}`);

    // Handle (drag / actions) - kept minimal for keyboard-first
    const handle = document.createElement('div');
    handle.className = 'block-handle';
    const handleBtn = document.createElement('button');
    handleBtn.type = 'button';
    handleBtn.innerHTML = '⋮⋮';
    handleBtn.setAttribute('aria-label', 'Akce bloku');
    handleBtn.title = 'Akce bloku (Alt+Enter)';
    handleBtn.addEventListener('click', (e) => {
      e.preventDefault();
      this.openBlockMenu(block);
    });
    handle.appendChild(handleBtn);
    el.appendChild(handle);

    // Content
    const content = this.renderBlockContent(block, siblings, index);
    el.appendChild(content);

    // Children
    if (block.children && block.children.length) {
      const childWrap = document.createElement('div');
      childWrap.className = 'block-children';
      if (block.type === 'toggle' && !this.expandedToggles.has(block.id)) {
        childWrap.hidden = true;
      }
      this.renderBlocks(block.children, childWrap);
      el.appendChild(childWrap);
    }

    return el;
  },

  renderBlockContent(block, siblings, index) {
    const type = block.type;
    const def = BLOCK_TYPES[type];
    if (!def) return document.createElement('div');

    // Divider
    if (type === 'divider') {
      const wrap = document.createElement('div');
      wrap.className = 'block-content';
      const hr = document.createElement('hr');
      hr.setAttribute('aria-label', 'Oddělovač');
      wrap.appendChild(hr);
      wrap.tabIndex = 0;
      this.attachNonEditableKeyHandlers(wrap, block);
      return wrap;
    }

    // List marker (visual only, screen reader already gets semantic)
    const needsListMarker = (type === 'bullet' || type === 'numbered');

    // Task
    if (type === 'task') {
      const wrap = document.createElement('div');
      wrap.style.display = 'flex';
      wrap.style.flexDirection = 'column';
      wrap.style.flex = '1';

      const row = document.createElement('div');
      row.style.display = 'flex';
      row.style.alignItems = 'flex-start';
      row.style.gap = '6px';

      const cb = document.createElement('input');
      cb.type = 'checkbox';
      cb.className = 'block-task-check';
      cb.checked = !!block.props.checked;
      cb.setAttribute('aria-label', 'Hotovo');
      cb.addEventListener('change', () => {
        block.props.checked = cb.checked;
        block.props.completedAt = cb.checked ? Date.now() : null;
        block.updatedAt = Date.now();
        const blockEl = cb.closest('.block');
        if (blockEl) blockEl.dataset.checked = String(cb.checked);
        markDirty();
        Announce.polite(cb.checked ? 'Úkol označen jako hotový' : 'Úkol odškrtnut');
        if (cb.checked) AudioFB.success();
      });

      const contentEl = document.createElement('div');
      contentEl.className = 'block-content';
      contentEl.contentEditable = 'true';
      contentEl.setAttribute('role', 'textbox');
      contentEl.setAttribute('aria-multiline', 'false');
      contentEl.setAttribute('aria-label', 'Text úkolu');
      contentEl.dataset.placeholder = 'Úkol…';
      contentEl.innerHTML = block.content || '';
      if (!block.content) contentEl.dataset.empty = 'true';
      this.attachEditableHandlers(contentEl, block);

      row.appendChild(cb);
      row.appendChild(contentEl);
      wrap.appendChild(row);

      // Task meta (dates)
      const meta = document.createElement('div');
      meta.className = 'block-task-meta';
      this.renderTaskMeta(meta, block);
      wrap.appendChild(meta);

      const blockEl = el => null;
      // Set data-checked on parent
      setTimeout(() => {
        const parent = contentEl.closest('.block');
        if (parent) parent.dataset.checked = String(!!block.props.checked);
      }, 0);

      return wrap;
    }

    // Code
    if (type === 'code') {
      const pre = document.createElement('pre');
      pre.className = 'block-content';
      const langLabel = document.createElement('span');
      langLabel.className = 'code-lang';
      langLabel.textContent = block.props.language || 'text';
      pre.appendChild(langLabel);
      const code = document.createElement('code');
      code.contentEditable = 'true';
      code.setAttribute('role', 'textbox');
      code.setAttribute('aria-multiline', 'true');
      code.setAttribute('aria-label', `Kódový blok, jazyk: ${block.props.language || 'text'}`);
      code.textContent = block.content || '';
      this.attachCodeHandlers(code, block);
      pre.appendChild(code);
      return pre;
    }

    // Callout
    if (type === 'callout') {
      const wrap = document.createElement('div');
      wrap.className = 'block-content';
      const kind = block.props.kind || 'info';
      wrap.closest && setTimeout(() => {
        const parent = wrap.closest('.block');
        if (parent) parent.dataset.calloutKind = kind;
      }, 0);
      const contentEl = document.createElement('div');
      contentEl.contentEditable = 'true';
      contentEl.setAttribute('role', 'textbox');
      contentEl.setAttribute('aria-multiline', 'true');
      contentEl.setAttribute('aria-label', `Upozornění (${kind})`);
      contentEl.dataset.placeholder = 'Text upozornění…';
      contentEl.innerHTML = block.content || '';
      if (!block.content) contentEl.dataset.empty = 'true';
      this.attachEditableHandlers(contentEl, block);
      wrap.appendChild(contentEl);
      return wrap;
    }

    // Toggle
    if (type === 'toggle') {
      const wrap = document.createElement('div');
      wrap.style.flex = '1';
      const details = document.createElement('details');
      details.open = this.expandedToggles.has(block.id);
      const summary = document.createElement('summary');
      const summaryContent = document.createElement('span');
      summaryContent.contentEditable = 'true';
      summaryContent.setAttribute('role', 'textbox');
      summaryContent.setAttribute('aria-label', 'Text rozbalovacího bloku');
      summaryContent.dataset.placeholder = 'Rozbalovací blok…';
      summaryContent.innerHTML = block.content || '';
      if (!block.content) summaryContent.dataset.empty = 'true';
      summary.appendChild(summaryContent);
      details.appendChild(summary);
      details.addEventListener('toggle', () => {
        if (details.open) this.expandedToggles.add(block.id);
        else this.expandedToggles.delete(block.id);
      });
      this.attachEditableHandlers(summaryContent, block);
      wrap.appendChild(details);
      return wrap;
    }

    // Table
    if (type === 'table') {
      const wrap = document.createElement('div');
      wrap.className = 'block-content';
      const table = this.renderTable(block);
      wrap.appendChild(table);
      return wrap;
    }

    // Image
    if (type === 'image') {
      const fig = document.createElement('figure');
      fig.className = 'block-content';
      if (block.props.src) {
        const img = document.createElement('img');
        img.src = block.props.src;
        img.alt = block.props.alt || '';
        if (block.props.decorative) img.setAttribute('role', 'presentation');
        fig.appendChild(img);
      } else {
        const p = document.createElement('p');
        p.style.color = 'var(--fg-muted)';
        p.textContent = 'Obrázek bez zdroje. Klikněte pro úpravu.';
        fig.appendChild(p);
      }
      if (block.content) {
        const cap = document.createElement('figcaption');
        cap.textContent = stripHtml(block.content);
        fig.appendChild(cap);
      }
      fig.tabIndex = 0;
      fig.setAttribute('role', 'img');
      fig.setAttribute('aria-label', `Obrázek: ${block.props.alt || 'bez popisu'}`);
      fig.addEventListener('click', () => this.editImage(block));
      this.attachNonEditableKeyHandlers(fig, block);
      return fig;
    }

    // Text-based (paragraph, headings, quote, list items)
    const contentEl = document.createElement(def.tag);
    contentEl.className = 'block-content';
    contentEl.contentEditable = 'true';
    contentEl.setAttribute('role', 'textbox');
    contentEl.setAttribute('aria-multiline', 'false');
    contentEl.dataset.placeholder = this.placeholderFor(block, siblings, index);
    contentEl.innerHTML = block.content || '';
    if (!block.content) contentEl.dataset.empty = 'true';

    if (needsListMarker) {
      const marker = document.createElement('span');
      marker.className = 'block-list-marker';
      marker.setAttribute('aria-hidden', 'true');
      if (type === 'bullet') marker.textContent = '•';
      else {
        // compute position in numbered list among consecutive siblings
        let num = 1;
        for (let i = index - 1; i >= 0; i--) {
          if (siblings[i].type === 'numbered') num++;
          else break;
        }
        marker.textContent = num + '.';
      }
      const wrap = document.createElement('div');
      wrap.style.display = 'flex';
      wrap.style.flex = '1';
      wrap.appendChild(marker);
      wrap.appendChild(contentEl);
      this.attachEditableHandlers(contentEl, block);
      return wrap;
    }

    this.attachEditableHandlers(contentEl, block);
    return contentEl;
  },

  placeholderFor(block, siblings, index) {
    const isFirst = index === 0 && !block.content;
    switch (block.type) {
      case 'heading1': return 'Nadpis 1';
      case 'heading2': return 'Nadpis 2';
      case 'heading3': return 'Nadpis 3';
      case 'heading4': return 'Nadpis 4';
      case 'heading5': return 'Nadpis 5';
      case 'heading6': return 'Nadpis 6';
      case 'bullet': return 'Položka seznamu';
      case 'numbered': return 'Položka číslovaného seznamu';
      case 'quote': return 'Citace';
      default: return isFirst ? 'Začněte psát nebo stiskněte / pro příkazy' : ' ';
    }
  },

  renderTaskMeta(container, block) {
    container.innerHTML = '';
    const p = block.props;
    const due = p.dueDate ? parseISODate(p.dueDate) : null;
    const start = p.startDate ? parseISODate(p.startDate) : null;
    const today = startOfDay(new Date());

    if (start) {
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.textContent = 'Od ' + formatDateCS(start);
      btn.setAttribute('aria-label', 'Datum zahájení: ' + formatDateCS(start));
      btn.addEventListener('click', () => this.editTaskDates(block));
      container.appendChild(btn);
    }
    if (due) {
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.textContent = 'Termín ' + formatDateCS(due);
      const overdue = !p.checked && startOfDay(due) < today;
      if (overdue) btn.classList.add('overdue');
      btn.setAttribute('aria-label', (overdue ? 'Po termínu, ' : 'Termín: ') + formatDateCS(due));
      btn.addEventListener('click', () => this.editTaskDates(block));
      container.appendChild(btn);
    }
    if (!start && !due) {
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.textContent = 'Přidat datum';
      btn.setAttribute('aria-label', 'Přidat datum k úkolu');
      btn.addEventListener('click', () => this.editTaskDates(block));
      container.appendChild(btn);
    }
  },

  editTaskDates(block) {
    Dialogs.taskDates(block).then(result => {
      if (result) {
        block.props.startDate = result.startDate || null;
        block.props.dueDate = result.dueDate || null;
        block.updatedAt = Date.now();
        markDirty();
        this.rerender();
        Announce.polite('Data úkolu aktualizována');
      }
    });
  },

  editImage(block) {
    Dialogs.image(block).then(result => {
      if (result) {
        block.props.src = result.src;
        block.props.alt = result.alt;
        block.props.decorative = result.decorative;
        block.content = result.caption || '';
        block.updatedAt = Date.now();
        markDirty();
        this.rerender();
        Announce.polite('Obrázek aktualizován');
      }
    });
  },

  renderTable(block) {
    if (!block.props.rows || !block.props.rows.length) {
      block.props.rows = [['', ''], ['', '']];
      block.props.hasHeader = true;
    }
    const table = document.createElement('table');
    table.setAttribute('role', 'grid');
    table.setAttribute('aria-label', 'Tabulka s ' + block.props.rows.length + ' řádky');

    const caption = document.createElement('caption');
    caption.style.captionSide = 'top';
    caption.style.textAlign = 'left';
    caption.style.fontSize = '13px';
    caption.style.color = 'var(--fg-muted)';
    caption.contentEditable = 'true';
    caption.setAttribute('role', 'textbox');
    caption.setAttribute('aria-label', 'Popisek tabulky');
    caption.dataset.placeholder = 'Popisek tabulky (nepovinné)';
    caption.textContent = block.content || '';
    if (!block.content) caption.dataset.empty = 'true';
    caption.addEventListener('input', () => {
      block.content = caption.textContent;
      caption.dataset.empty = caption.textContent ? 'false' : 'true';
      markDirty();
    });
    table.appendChild(caption);

    block.props.rows.forEach((row, ri) => {
      const tr = document.createElement('tr');
      const isHeader = ri === 0 && block.props.hasHeader;
      row.forEach((cellText, ci) => {
        const cell = document.createElement(isHeader ? 'th' : 'td');
        if (isHeader) cell.setAttribute('scope', 'col');
        cell.contentEditable = 'true';
        cell.setAttribute('role', 'gridcell');
        cell.textContent = cellText;
        cell.addEventListener('input', () => {
          block.props.rows[ri][ci] = cell.textContent;
          markDirty();
        });
        cell.addEventListener('keydown', (e) => {
          if (e.key === 'Tab') {
            e.preventDefault();
            this.tableMoveCell(table, ri, ci, e.shiftKey ? -1 : 1, block);
          } else if (e.key === 'ArrowDown' && e.ctrlKey === false && this.isAtEnd(cell)) {
            // don't handle - let block nav happen
          }
        });
        tr.appendChild(cell);
      });
      table.appendChild(tr);
    });

    // Controls
    const controls = document.createElement('div');
    controls.style.marginTop = '6px';
    controls.style.display = 'flex';
    controls.style.gap = '6px';
    const addRow = document.createElement('button');
    addRow.type = 'button';
    addRow.className = 'subtle';
    addRow.textContent = '+ Řádek';
    addRow.addEventListener('click', () => {
      const cols = block.props.rows[0].length;
      block.props.rows.push(new Array(cols).fill(''));
      markDirty();
      this.rerender();
    });
    const addCol = document.createElement('button');
    addCol.type = 'button';
    addCol.className = 'subtle';
    addCol.textContent = '+ Sloupec';
    addCol.addEventListener('click', () => {
      block.props.rows.forEach(r => r.push(''));
      markDirty();
      this.rerender();
    });
    controls.appendChild(addRow);
    controls.appendChild(addCol);

    const wrap = document.createElement('div');
    wrap.appendChild(table);
    wrap.appendChild(controls);
    return wrap;
  },

  tableMoveCell(table, row, col, dir, block) {
    const rowCount = block.props.rows.length;
    const colCount = block.props.rows[0].length;
    let r = row, c = col + dir;
    if (c < 0) { r--; c = colCount - 1; }
    else if (c >= colCount) { r++; c = 0; }
    if (r < 0) return;
    if (r >= rowCount) {
      // add new row
      block.props.rows.push(new Array(colCount).fill(''));
      markDirty();
      this.rerender();
      setTimeout(() => {
        const newTable = document.querySelector(`[data-block-id="${block.id}"] table`);
        if (newTable) {
          const tr = newTable.querySelectorAll('tr')[r];
          if (tr) {
            const cell = tr.cells[c];
            if (cell) cell.focus();
          }
        }
      }, 20);
      return;
    }
    const tr = table.querySelectorAll('tr')[r];
    if (tr) {
      const cell = tr.cells[c];
      if (cell) cell.focus();
    }
  },

  // ---------- focus / navigation ----------
  focusBlock(id, atEnd = true) {
    const el = document.querySelector(`[data-block-id="${id}"]`);
    if (!el) return;
    const editable = el.querySelector('[contenteditable="true"]');
    if (editable) {
      editable.focus();
      this.placeCaret(editable, atEnd);
    } else if (el.tabIndex >= 0) {
      el.focus();
    } else {
      const t = el.querySelector('[tabindex="0"], button, input, summary');
      if (t) t.focus();
    }
  },

  placeCaret(el, atEnd) {
    const range = document.createRange();
    const sel = window.getSelection();
    range.selectNodeContents(el);
    range.collapse(!atEnd);
    sel.removeAllRanges();
    sel.addRange(range);
  },

  isAtStart(el) {
    const sel = window.getSelection();
    if (!sel.rangeCount) return true;
    const range = sel.getRangeAt(0);
    if (!range.collapsed) return false;
    // Check if caret is at very start
    const check = document.createRange();
    check.selectNodeContents(el);
    check.setEnd(range.startContainer, range.startOffset);
    return check.toString().length === 0;
  },

  isAtEnd(el) {
    const sel = window.getSelection();
    if (!sel.rangeCount) return true;
    const range = sel.getRangeAt(0);
    if (!range.collapsed) return false;
    const check = document.createRange();
    check.selectNodeContents(el);
    check.setStart(range.endContainer, range.endOffset);
    return check.toString().length === 0;
  },

  // ---------- keyboard handlers for editable blocks ----------
  attachEditableHandlers(contentEl, block) {
    contentEl.addEventListener('input', (e) => {
      block.content = contentEl.innerHTML;
      block.updatedAt = Date.now();
      contentEl.dataset.empty = contentEl.textContent ? 'false' : 'true';
      this.checkMarkdownShortcuts(contentEl, block);
      markDirty();
    });

    contentEl.addEventListener('keydown', (e) => this.handleBlockKeydown(e, block, contentEl));

    contentEl.addEventListener('focus', () => {
      // Announce block type to assist screen readers
      const def = BLOCK_TYPES[block.type];
      // Status bar status only, screen reader reads role implicitly
    });

    contentEl.addEventListener('paste', (e) => {
      e.preventDefault();
      const text = (e.clipboardData || window.clipboardData).getData('text/plain');
      document.execCommand('insertText', false, text);
    });
  },

  attachCodeHandlers(contentEl, block) {
    contentEl.addEventListener('input', () => {
      block.content = contentEl.textContent;
      markDirty();
    });
    contentEl.addEventListener('keydown', (e) => {
      if (e.key === 'Tab') {
        e.preventDefault();
        document.execCommand('insertText', false, '  ');
        return;
      }
      if (e.key === 'Escape') {
        e.preventDefault();
        const blockEl = contentEl.closest('.block');
        if (blockEl) blockEl.focus();
        return;
      }
      // Ctrl+Shift+Enter = exit to new paragraph after
      if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) {
        e.preventDefault();
        this.insertNewBlockAfter(block, 'paragraph');
        return;
      }
      // Arrow up/down at edges
      if (e.key === 'ArrowUp') {
        if (contentEl.textContent.indexOf('\n') === -1 || this.isAtStart(contentEl)) {
          e.preventDefault();
          this.navigateBlock(block, 'prev');
        }
      } else if (e.key === 'ArrowDown') {
        if (contentEl.textContent.indexOf('\n') === -1 || this.isAtEnd(contentEl)) {
          e.preventDefault();
          this.navigateBlock(block, 'next');
        }
      }
    });
    contentEl.addEventListener('paste', (e) => {
      e.preventDefault();
      const text = (e.clipboardData || window.clipboardData).getData('text/plain');
      document.execCommand('insertText', false, text);
    });
  },

  attachNonEditableKeyHandlers(el, block) {
    el.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        this.insertNewBlockAfter(block, 'paragraph');
      } else if (e.key === 'Backspace') {
        e.preventDefault();
        this.deleteBlock(block);
      } else if (e.key === 'ArrowUp') {
        e.preventDefault();
        this.navigateBlock(block, 'prev');
      } else if (e.key === 'ArrowDown') {
        e.preventDefault();
        this.navigateBlock(block, 'next');
      } else if (e.altKey && (e.key === 'ArrowUp' || e.key === 'ArrowDown')) {
        e.preventDefault();
        this.moveBlock(block, e.key === 'ArrowUp' ? 'up' : 'down');
      }
    });
  },

  handleBlockKeydown(e, block, contentEl) {
    const key = e.key;

    // Slash menu
    if (key === '/' && this.isAtStart(contentEl) && !contentEl.textContent.trim()) {
      e.preventDefault();
      SlashMenu.open(block, contentEl);
      return;
    }

    // Alt+Shift+ArrowUp/Down = move block
    if (e.altKey && e.shiftKey && (key === 'ArrowUp' || key === 'ArrowDown')) {
      e.preventDefault();
      this.moveBlock(block, key === 'ArrowUp' ? 'up' : 'down');
      return;
    }

    // Tab: indent, Shift+Tab: outdent
    if (key === 'Tab') {
      e.preventDefault();
      if (e.shiftKey) {
        if (Block.outdent(this.doc.blocks, block.id)) {
          markDirty();
          this.focusBlockAfterRender = block.id;
          this.rerender();
          Announce.polite('Blok zmenšen o úroveň');
        }
      } else {
        if (Block.indent(this.doc.blocks, block.id)) {
          markDirty();
          this.focusBlockAfterRender = block.id;
          this.rerender();
          Announce.polite('Blok vnořen');
        }
      }
      return;
    }

    // Enter: new block
    if (key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      // If block is empty and is a heading/bullet/numbered/task, convert to paragraph
      if (!contentEl.textContent.trim() &&
          (block.type.startsWith('heading') || block.type === 'bullet' ||
           block.type === 'numbered' || block.type === 'task' || block.type === 'quote')) {
        this.changeBlockType(block, 'paragraph');
        return;
      }
      // Split at caret
      const atEnd = this.isAtEnd(contentEl);
      const atStart = this.isAtStart(contentEl);
      if (atEnd) {
        // Determine next type: continue lists/tasks, else paragraph
        let nextType = 'paragraph';
        if (block.type === 'bullet' || block.type === 'numbered' || block.type === 'task') {
          nextType = block.type;
        }
        this.insertNewBlockAfter(block, nextType);
      } else if (atStart) {
        const newBlock = Block.create('paragraph', '');
        Block.insertBefore(this.doc.blocks, block.id, newBlock);
        markDirty();
        this.focusBlockAfterRender = block.id;
        this.rerender();
      } else {
        // Split content at caret
        const sel = window.getSelection();
        const range = sel.getRangeAt(0);
        const pre = range.cloneRange();
        pre.selectNodeContents(contentEl);
        pre.setEnd(range.endContainer, range.endOffset);
        const before = this.rangeToHtml(pre);
        const postRange = document.createRange();
        postRange.selectNodeContents(contentEl);
        postRange.setStart(range.endContainer, range.endOffset);
        const after = this.rangeToHtml(postRange);
        block.content = before;
        const newBlock = Block.create(block.type === 'bullet' || block.type === 'numbered' || block.type === 'task' ? block.type : 'paragraph', after);
        Block.insertAfter(this.doc.blocks, block.id, newBlock);
        markDirty();
        this.focusBlockAfterRender = newBlock.id;
        this.focusAtEnd = false;
        this.rerender();
      }
      return;
    }

    // Backspace at start: merge with previous OR convert heading/list to paragraph
    if (key === 'Backspace' && this.isAtStart(contentEl)) {
      // If in a heading/bullet/numbered/task/quote, convert to paragraph first
      if (block.type !== 'paragraph') {
        e.preventDefault();
        this.changeBlockType(block, 'paragraph');
        return;
      }
      // Merge with previous block
      e.preventDefault();
      this.mergeWithPrevious(block);
      return;
    }

    // Arrow keys between blocks
    if (key === 'ArrowUp' && this.caretInFirstLine(contentEl)) {
      e.preventDefault();
      this.navigateBlock(block, 'prev');
      return;
    }
    if (key === 'ArrowDown' && this.caretInLastLine(contentEl)) {
      e.preventDefault();
      this.navigateBlock(block, 'next');
      return;
    }

    // Ctrl+Shift+K: delete block
    if ((e.ctrlKey || e.metaKey) && e.shiftKey && (key === 'K' || key === 'k')) {
      e.preventDefault();
      this.deleteBlock(block);
      return;
    }

    // Ctrl+D: duplicate block
    if ((e.ctrlKey || e.metaKey) && !e.shiftKey && (key === 'd' || key === 'D')) {
      e.preventDefault();
      this.duplicateBlock(block);
      return;
    }

    // @ and [[ for linking
    if (key === '@') {
      e.preventDefault();
      LinkPicker.open(block, contentEl, '@');
      return;
    }
    if (key === '[' && contentEl.textContent.slice(-1) === '[') {
      e.preventDefault();
      // Remove the previous [
      const sel = window.getSelection();
      if (sel.rangeCount) {
        const range = sel.getRangeAt(0);
        range.setStart(range.endContainer, Math.max(0, range.endOffset - 1));
        range.deleteContents();
      }
      LinkPicker.open(block, contentEl, '[[');
      return;
    }

    // Type-change shortcuts with Ctrl+Alt+N (1..6 headings, etc.)
    if ((e.ctrlKey || e.metaKey) && e.altKey) {
      const typeMap = { '1': 'heading1', '2': 'heading2', '3': 'heading3', '4': 'heading4', '5': 'heading5', '6': 'heading6', '0': 'paragraph', 'u': 'bullet', 'U': 'bullet', 'o': 'numbered', 'O': 'numbered', 't': 'task', 'T': 'task', 'q': 'quote', 'Q': 'quote', 'k': 'code', 'K': 'code' };
      if (typeMap[key]) {
        e.preventDefault();
        this.changeBlockType(block, typeMap[key]);
        return;
      }
    }

    // Alt+Enter: open block menu
    if (e.altKey && key === 'Enter') {
      e.preventDefault();
      this.openBlockMenu(block);
      return;
    }

    // Formatting: Ctrl+B/I/U/K
    if ((e.ctrlKey || e.metaKey) && !e.shiftKey && !e.altKey) {
      if (key === 'b' || key === 'B') { e.preventDefault(); document.execCommand('bold'); markDirty(); return; }
      if (key === 'i' || key === 'I') { e.preventDefault(); document.execCommand('italic'); markDirty(); return; }
      if (key === 'u' || key === 'U') { e.preventDefault(); document.execCommand('underline'); markDirty(); return; }
    }
  },

  caretInFirstLine(el) {
    // Approximation: if element has no newlines in text or caret is at start
    if (this.isAtStart(el)) return true;
    // For single-line elements this is true
    return el.tagName.toLowerCase() !== 'pre';
  },

  caretInLastLine(el) {
    if (this.isAtEnd(el)) return true;
    return el.tagName.toLowerCase() !== 'pre';
  },

  rangeToHtml(range) {
    const div = document.createElement('div');
    div.appendChild(range.cloneContents());
    return div.innerHTML;
  },

  // ---------- block operations ----------
  insertNewBlockAfter(block, type = 'paragraph') {
    const newBlock = Block.create(type, '');
    Block.insertAfter(this.doc.blocks, block.id, newBlock);
    markDirty();
    this.focusBlockAfterRender = newBlock.id;
    this.focusAtEnd = false;
    this.rerender();
    return newBlock;
  },

  changeBlockType(block, newType) {
    block.type = newType;
    block.updatedAt = Date.now();
    if (newType === 'code') block.props.language = block.props.language || 'text';
    markDirty();
    this.focusBlockAfterRender = block.id;
    this.rerender();
    Announce.polite('Typ bloku: ' + BLOCK_TYPES[newType].label);
  },

  deleteBlock(block) {
    const flat = Block.flatten(this.doc.blocks, this.expandedToggles);
    const idx = flat.findIndex(f => f.block.id === block.id);
    Block.remove(this.doc.blocks, block.id);
    if (this.doc.blocks.length === 0) {
      this.doc.blocks.push(Block.create('paragraph', ''));
    }
    markDirty();
    // Focus previous or next
    const targetIdx = Math.max(0, idx - 1);
    this.focusBlockAfterRender = (flat[targetIdx] && flat[targetIdx].block.id !== block.id)
      ? flat[targetIdx].block.id
      : (this.doc.blocks[0] && this.doc.blocks[0].id);
    this.rerender();
    Announce.polite('Blok smazán');
    AudioFB.click();
  },

  duplicateBlock(block) {
    const copy = deepClone(block);
    copy.id = uuid();
    copy.createdAt = Date.now();
    copy.updatedAt = Date.now();
    // regenerate children ids
    const regenIds = (blocks) => {
      blocks.forEach(b => {
        b.id = uuid();
        if (b.children) regenIds(b.children);
      });
    };
    if (copy.children) regenIds(copy.children);
    Block.insertAfter(this.doc.blocks, block.id, copy);
    markDirty();
    this.focusBlockAfterRender = copy.id;
    this.rerender();
    Announce.polite('Blok duplikován');
  },

  moveBlock(block, direction) {
    if (Block.move(this.doc.blocks, block.id, direction)) {
      markDirty();
      this.focusBlockAfterRender = block.id;
      this.rerender();
      Announce.polite('Blok přesunut ' + (direction === 'up' ? 'nahoru' : 'dolů'));
    }
  },

  navigateBlock(block, direction) {
    const flat = Block.flatten(this.doc.blocks, this.expandedToggles);
    const idx = flat.findIndex(f => f.block.id === block.id);
    if (idx < 0) return;
    const target = flat[direction === 'prev' ? idx - 1 : idx + 1];
    if (target) {
      this.focusBlock(target.block.id);
    } else if (direction === 'prev') {
      // go to title
      const titleInput = document.querySelector('.doc-title');
      if (titleInput) titleInput.focus();
    }
  },

  mergeWithPrevious(block) {
    const flat = Block.flatten(this.doc.blocks, this.expandedToggles);
    const idx = flat.findIndex(f => f.block.id === block.id);
    if (idx <= 0) return;
    const prev = flat[idx - 1].block;
    // Only merge compatible types (text-based)
    if (BLOCK_TYPES[prev.type] && BLOCK_TYPES[prev.type].editable && prev.type !== 'code' && prev.type !== 'task') {
      const prevContent = prev.content || '';
      const thisContent = block.content || '';
      prev.content = prevContent + thisContent;
      // caret goes at the junction point
      Block.remove(this.doc.blocks, block.id);
      if (this.doc.blocks.length === 0) {
        this.doc.blocks.push(Block.create('paragraph', ''));
      }
      markDirty();
      this.focusBlockAfterRender = prev.id;
      // set caret at end of prev content, but at junction ideally
      this.rerender();
      // Position caret at junction
      setTimeout(() => {
        const el = document.querySelector(`[data-block-id="${prev.id}"] [contenteditable]`);
        if (el) {
          el.focus();
          const range = document.createRange();
          const sel = window.getSelection();
          // walk text nodes to junction
          let remaining = stripHtml(prevContent).length;
          const walker = document.createTreeWalker(el, NodeFilter.SHOW_TEXT);
          let n;
          while ((n = walker.nextNode())) {
            if (remaining <= n.length) {
              range.setStart(n, remaining);
              range.setEnd(n, remaining);
              sel.removeAllRanges();
              sel.addRange(range);
              return;
            }
            remaining -= n.length;
          }
        }
      }, 20);
    } else {
      // Just move focus up
      this.focusBlock(prev.id);
    }
  },

  // ---------- Markdown shortcuts ----------
  checkMarkdownShortcuts(contentEl, block) {
    const text = contentEl.textContent;
    const patterns = [
      { re: /^# $/,          type: 'heading1' },
      { re: /^## $/,         type: 'heading2' },
      { re: /^### $/,        type: 'heading3' },
      { re: /^#### $/,       type: 'heading4' },
      { re: /^##### $/,      type: 'heading5' },
      { re: /^###### $/,     type: 'heading6' },
      { re: /^- $/,          type: 'bullet' },
      { re: /^\* $/,         type: 'bullet' },
      { re: /^1\. $/,        type: 'numbered' },
      { re: /^\[\] $/,       type: 'task' },
      { re: /^\[ \] $/,      type: 'task' },
      { re: /^\[x\] $/,      type: 'task', checked: true },
      { re: /^> $/,          type: 'quote' },
      { re: /^\| $/,         type: 'quote' },
      { re: /^```$/,         type: 'code' },
      { re: /^\+ $/,         type: 'toggle' },
      { re: /^---$/,         type: 'divider' }
    ];
    for (const p of patterns) {
      if (p.re.test(text)) {
        // Don't allow infinite recursion in paragraph -> paragraph
        if (block.type === p.type && !p.checked) return;
        contentEl.textContent = '';
        block.content = '';
        block.type = p.type;
        if (p.checked !== undefined) block.props.checked = p.checked;
        if (p.type === 'code') block.props.language = 'text';
        markDirty();
        this.focusBlockAfterRender = block.id;
        this.rerender();
        Announce.polite('Typ bloku změněn na ' + BLOCK_TYPES[p.type].label);
        return;
      }
    }
  },

  openBlockMenu(block) {
    Dialogs.blockMenu(block).then(action => {
      if (!action) return;
      switch (action) {
        case 'duplicate': this.duplicateBlock(block); break;
        case 'delete': this.deleteBlock(block); break;
        case 'moveUp': this.moveBlock(block, 'up'); break;
        case 'moveDown': this.moveBlock(block, 'down'); break;
        case 'indent': if (Block.indent(this.doc.blocks, block.id)) { markDirty(); this.focusBlockAfterRender = block.id; this.rerender(); } break;
        case 'outdent': if (Block.outdent(this.doc.blocks, block.id)) { markDirty(); this.focusBlockAfterRender = block.id; this.rerender(); } break;
        case 'copyLink':
          const url = `${location.origin}${location.pathname}#doc=${this.doc.id}&block=${block.id}`;
          navigator.clipboard.writeText(url).then(() => {
            Announce.polite('Odkaz zkopírován do schránky');
            AudioFB.success();
          });
          break;
        default:
          if (action.startsWith('type:')) {
            const newType = action.slice(5);
            this.changeBlockType(block, newType);
          } else if (action.startsWith('callout:')) {
            block.props.kind = action.slice(8);
            markDirty();
            this.rerender();
          } else if (action.startsWith('lang:')) {
            block.props.language = action.slice(5);
            markDirty();
            this.rerender();
          }
      }
    });
  },

  // ---------- Backlinks rendering ----------
  async renderBacklinks(docId, container) {
    container.innerHTML = '';
    const backlinks = await BacklinksIndex.getFor(docId);
    if (!backlinks || backlinks.length === 0) {
      container.style.display = 'none';
      return;
    }
    container.style.display = 'block';
    const h2 = document.createElement('h2');
    h2.textContent = `Odkazuje na tuto stránku (${backlinks.length})`;
    container.appendChild(h2);
    backlinks.forEach(bl => {
      const item = document.createElement('div');
      item.className = 'backlink-item';
      const src = document.createElement('div');
      src.className = 'backlink-source';
      const link = document.createElement('a');
      link.href = '#';
      link.textContent = bl.docTitle || 'Bez názvu';
      link.addEventListener('click', (e) => {
        e.preventDefault();
        openDocument(bl.docId);
      });
      src.appendChild(link);
      const ctx = document.createElement('div');
      ctx.className = 'backlink-context';
      ctx.textContent = bl.context || '';
      item.appendChild(src);
      item.appendChild(ctx);
      container.appendChild(item);
    });
  }
};

// ===========================================================================
// BACKLINKS INDEX
// ===========================================================================
const BacklinksIndex = {
  cache: null,
  building: false,

  invalidate() {
    this.cache = null;
  },

  async build() {
    if (this.building) return;
    this.building = true;
    try {
      const byTarget = new Map();
      const docs = await Storage.allDocuments();
      for (const doc of docs) {
        Block.walk(doc.blocks, (block) => {
          // parse content for mentions
          if (!block.content || typeof block.content !== 'string') return;
          const tmp = document.createElement('div');
          tmp.innerHTML = block.content;
          const mentions = tmp.querySelectorAll('a.mention[data-link-id]');
          mentions.forEach(m => {
            const targetId = m.dataset.linkId;
            if (!targetId) return;
            const arr = byTarget.get(targetId) || [];
            arr.push({
              docId: doc.id,
              docTitle: doc.title || 'Bez názvu',
              blockId: block.id,
              context: (tmp.textContent || '').trim().slice(0, 160)
            });
            byTarget.set(targetId, arr);
          });
        });
      }
      this.cache = byTarget;
    } finally {
      this.building = false;
    }
  },

  async getFor(targetId) {
    if (!this.cache) await this.build();
    return this.cache.get(targetId) || [];
  },

  async getAllReferences() {
    if (!this.cache) await this.build();
    return this.cache;
  }
};

// ===========================================================================
// DIALOGS (generic modal helpers + specific dialogs)
// ===========================================================================
const Dialogs = {
  activeDialog: null,

  _createDialog(contentFn, options = {}) {
    const dialog = document.createElement('dialog');
    dialog.setAttribute('aria-modal', 'true');
    if (options.label) dialog.setAttribute('aria-label', options.label);
    if (options.className) dialog.className = options.className;
    const inner = document.createElement('div');
    inner.className = 'dialog-inner';
    dialog.appendChild(inner);
    document.getElementById('dialog-host').appendChild(dialog);
    dialog.addEventListener('close', () => {
      dialog.remove();
      if (this.activeDialog === dialog) this.activeDialog = null;
    });
    contentFn(inner, dialog);
    this.activeDialog = dialog;
    dialog.showModal();
    // Focus first focusable
    requestAnimationFrame(() => {
      const f = dialog.querySelector('[autofocus]') || dialog.querySelector('input, textarea, select, button');
      if (f) f.focus();
    });
    return dialog;
  },

  confirm(message, { title = 'Potvrdit', confirmLabel = 'Potvrdit', cancelLabel = 'Zrušit', danger = false } = {}) {
    return new Promise((resolve) => {
      this._createDialog((inner, dialog) => {
        const h = document.createElement('h2');
        h.textContent = title;
        inner.appendChild(h);
        const p = document.createElement('p');
        p.textContent = message;
        p.style.margin = '0';
        inner.appendChild(p);
        const actions = document.createElement('div');
        actions.className = 'dialog-actions';
        const cancel = document.createElement('button');
        cancel.type = 'button';
        cancel.textContent = cancelLabel;
        cancel.addEventListener('click', () => { resolve(false); dialog.close(); });
        const ok = document.createElement('button');
        ok.type = 'button';
        ok.textContent = confirmLabel;
        ok.className = danger ? 'danger' : 'primary';
        ok.setAttribute('autofocus', '');
        ok.addEventListener('click', () => { resolve(true); dialog.close(); });
        actions.appendChild(cancel);
        actions.appendChild(ok);
        inner.appendChild(actions);
        dialog.addEventListener('cancel', (e) => { e.preventDefault(); resolve(false); dialog.close(); });
      }, { label: title });
    });
  },

  prompt(message, { title = 'Zadejte hodnotu', initial = '', placeholder = '', confirmLabel = 'OK', cancelLabel = 'Zrušit' } = {}) {
    return new Promise((resolve) => {
      this._createDialog((inner, dialog) => {
        const h = document.createElement('h2');
        h.textContent = title;
        inner.appendChild(h);
        if (message) {
          const p = document.createElement('p');
          p.textContent = message;
          p.style.margin = '0';
          inner.appendChild(p);
        }
        const lbl = document.createElement('label');
        lbl.textContent = title;
        lbl.className = 'sr-only';
        const input = document.createElement('input');
        input.type = 'text';
        input.value = initial;
        input.placeholder = placeholder;
        input.setAttribute('autofocus', '');
        lbl.htmlFor = 'prompt-input-' + uuid().slice(0, 8);
        input.id = lbl.htmlFor;
        inner.appendChild(lbl);
        inner.appendChild(input);
        input.addEventListener('keydown', (e) => {
          if (e.key === 'Enter') { e.preventDefault(); resolve(input.value); dialog.close(); }
        });
        const actions = document.createElement('div');
        actions.className = 'dialog-actions';
        const cancel = document.createElement('button');
        cancel.type = 'button';
        cancel.textContent = cancelLabel;
        cancel.addEventListener('click', () => { resolve(null); dialog.close(); });
        const ok = document.createElement('button');
        ok.type = 'button';
        ok.textContent = confirmLabel;
        ok.className = 'primary';
        ok.addEventListener('click', () => { resolve(input.value); dialog.close(); });
        actions.appendChild(cancel);
        actions.appendChild(ok);
        inner.appendChild(actions);
        dialog.addEventListener('cancel', (e) => { e.preventDefault(); resolve(null); dialog.close(); });
        requestAnimationFrame(() => { input.focus(); input.select(); });
      }, { label: title });
    });
  },

  blockMenu(block) {
    return new Promise((resolve) => {
      this._createDialog((inner, dialog) => {
        const h = document.createElement('h2');
        h.textContent = 'Akce bloku: ' + BLOCK_TYPES[block.type].label;
        inner.appendChild(h);

        const addGroup = (title) => {
          const g = document.createElement('fieldset');
          const l = document.createElement('legend');
          l.textContent = title;
          g.appendChild(l);
          inner.appendChild(g);
          return g;
        };
        const addBtn = (group, label, action) => {
          const btn = document.createElement('button');
          btn.type = 'button';
          btn.textContent = label;
          btn.style.margin = '2px';
          btn.addEventListener('click', () => { resolve(action); dialog.close(); });
          group.appendChild(btn);
          return btn;
        };

        const pos = addGroup('Pozice');
        addBtn(pos, 'Posunout nahoru', 'moveUp');
        addBtn(pos, 'Posunout dolů', 'moveDown');
        addBtn(pos, 'Vnořit', 'indent');
        addBtn(pos, 'Zmenšit úroveň', 'outdent');

        const typeG = addGroup('Změnit typ');
        ['paragraph', 'heading1', 'heading2', 'heading3', 'heading4', 'heading5', 'heading6', 'bullet', 'numbered', 'task', 'toggle', 'quote', 'callout', 'code', 'divider', 'table'].forEach(t => {
          addBtn(typeG, BLOCK_TYPES[t].label, 'type:' + t);
        });

        if (block.type === 'callout') {
          const g = addGroup('Druh upozornění');
          ['info', 'warning', 'danger', 'success'].forEach(k => {
            const map = { info: 'Informace', warning: 'Varování', danger: 'Nebezpečí', success: 'Úspěch' };
            addBtn(g, map[k], 'callout:' + k);
          });
        }

        if (block.type === 'code') {
          const g = addGroup('Jazyk');
          ['text', 'javascript', 'html', 'css', 'json', 'python', 'bash', 'markdown', 'sql', 'xml', 'yaml'].forEach(l => {
            addBtn(g, l, 'lang:' + l);
          });
        }

        const other = addGroup('Další');
        addBtn(other, 'Duplikovat', 'duplicate');
        addBtn(other, 'Zkopírovat odkaz na blok', 'copyLink');
        const del = addBtn(other, 'Smazat blok', 'delete');
        del.className = 'danger';

        const actions = document.createElement('div');
        actions.className = 'dialog-actions';
        const cancel = document.createElement('button');
        cancel.type = 'button';
        cancel.textContent = 'Zavřít';
        cancel.setAttribute('autofocus', '');
        cancel.addEventListener('click', () => { resolve(null); dialog.close(); });
        actions.appendChild(cancel);
        inner.appendChild(actions);

        dialog.addEventListener('cancel', (e) => { e.preventDefault(); resolve(null); dialog.close(); });
      }, { label: 'Akce bloku' });
    });
  },

  taskDates(block) {
    return new Promise((resolve) => {
      this._createDialog((inner, dialog) => {
        const h = document.createElement('h2');
        h.textContent = 'Data úkolu';
        inner.appendChild(h);

        const row1 = document.createElement('div');
        row1.className = 'form-row';
        const l1 = document.createElement('label');
        l1.textContent = 'Datum zahájení';
        l1.htmlFor = 'td-start';
        const i1 = document.createElement('input');
        i1.type = 'date';
        i1.id = 'td-start';
        i1.value = block.props.startDate || '';
        i1.setAttribute('autofocus', '');
        row1.appendChild(l1);
        row1.appendChild(i1);
        inner.appendChild(row1);

        const row2 = document.createElement('div');
        row2.className = 'form-row';
        const l2 = document.createElement('label');
        l2.textContent = 'Termín';
        l2.htmlFor = 'td-due';
        const i2 = document.createElement('input');
        i2.type = 'date';
        i2.id = 'td-due';
        i2.value = block.props.dueDate || '';
        row2.appendChild(l2);
        row2.appendChild(i2);
        inner.appendChild(row2);

        const row3 = document.createElement('div');
        row3.className = 'form-row';
        const buttons = document.createElement('div');
        buttons.style.display = 'flex';
        buttons.style.gap = '4px';
        buttons.style.flexWrap = 'wrap';
        const quickBtn = (label, days, which) => {
          const b = document.createElement('button');
          b.type = 'button';
          b.className = 'subtle';
          b.textContent = label;
          b.addEventListener('click', () => {
            const d = new Date();
            d.setDate(d.getDate() + days);
            const iso = formatDateISO(d);
            if (which === 'due') i2.value = iso;
            else i1.value = iso;
          });
          return b;
        };
        buttons.appendChild(quickBtn('Termín dnes', 0, 'due'));
        buttons.appendChild(quickBtn('Termín zítra', 1, 'due'));
        buttons.appendChild(quickBtn('Termín za týden', 7, 'due'));
        const clear = document.createElement('button');
        clear.type = 'button';
        clear.className = 'subtle';
        clear.textContent = 'Vymazat data';
        clear.addEventListener('click', () => { i1.value = ''; i2.value = ''; });
        buttons.appendChild(clear);
        row3.appendChild(buttons);
        inner.appendChild(row3);

        const actions = document.createElement('div');
        actions.className = 'dialog-actions';
        const cancel = document.createElement('button');
        cancel.type = 'button';
        cancel.textContent = 'Zrušit';
        cancel.addEventListener('click', () => { resolve(null); dialog.close(); });
        const ok = document.createElement('button');
        ok.type = 'button';
        ok.className = 'primary';
        ok.textContent = 'Uložit';
        ok.addEventListener('click', () => {
          resolve({ startDate: i1.value || null, dueDate: i2.value || null });
          dialog.close();
        });
        actions.appendChild(cancel);
        actions.appendChild(ok);
        inner.appendChild(actions);
        dialog.addEventListener('cancel', (e) => { e.preventDefault(); resolve(null); dialog.close(); });
      }, { label: 'Data úkolu' });
    });
  },

  image(block) {
    return new Promise((resolve) => {
      this._createDialog((inner, dialog) => {
        const h = document.createElement('h2');
        h.textContent = 'Nastavení obrázku';
        inner.appendChild(h);

        const mkRow = (labelText, input, hint) => {
          const row = document.createElement('div');
          row.className = 'form-row';
          const l = document.createElement('label');
          l.textContent = labelText;
          l.htmlFor = input.id;
          row.appendChild(l);
          row.appendChild(input);
          if (hint) {
            const h = document.createElement('div');
            h.className = 'hint';
            h.textContent = hint;
            row.appendChild(h);
          }
          inner.appendChild(row);
        };

        const src = document.createElement('input');
        src.type = 'url';
        src.id = 'img-src';
        src.value = block.props.src || '';
        src.placeholder = 'https://… nebo data:image/...';
        src.setAttribute('autofocus', '');
        mkRow('Zdroj obrázku (URL nebo data URI)', src);

        // File input for local image
        const fileRow = document.createElement('div');
        fileRow.className = 'form-row';
        const fl = document.createElement('label');
        fl.textContent = 'Nebo nahrát ze souboru';
        fl.htmlFor = 'img-file';
        const file = document.createElement('input');
        file.type = 'file';
        file.id = 'img-file';
        file.accept = 'image/*';
        file.addEventListener('change', () => {
          const f = file.files[0];
          if (!f) return;
          const r = new FileReader();
          r.onload = () => { src.value = r.result; };
          r.readAsDataURL(f);
        });
        fileRow.appendChild(fl);
        fileRow.appendChild(file);
        inner.appendChild(fileRow);

        const alt = document.createElement('input');
        alt.type = 'text';
        alt.id = 'img-alt';
        alt.value = block.props.alt || '';
        mkRow('Alternativní text (pro odečítač)', alt, 'Popište, co je na obrázku. Povinné, pokud obrázek není dekorativní.');

        const decoWrap = document.createElement('div');
        decoWrap.className = 'form-row form-row-inline';
        const deco = document.createElement('input');
        deco.type = 'checkbox';
        deco.id = 'img-deco';
        deco.checked = !!block.props.decorative;
        const dl = document.createElement('label');
        dl.htmlFor = 'img-deco';
        dl.textContent = 'Dekorativní obrázek (odečítač přeskočí)';
        decoWrap.appendChild(deco);
        decoWrap.appendChild(dl);
        inner.appendChild(decoWrap);

        const cap = document.createElement('input');
        cap.type = 'text';
        cap.id = 'img-cap';
        cap.value = stripHtml(block.content || '');
        mkRow('Popisek (caption)', cap);

        const actions = document.createElement('div');
        actions.className = 'dialog-actions';
        const cancel = document.createElement('button');
        cancel.type = 'button';
        cancel.textContent = 'Zrušit';
        cancel.addEventListener('click', () => { resolve(null); dialog.close(); });
        const ok = document.createElement('button');
        ok.type = 'button';
        ok.className = 'primary';
        ok.textContent = 'Uložit';
        ok.addEventListener('click', () => {
          if (!src.value.trim()) { Announce.assertive('Zdroj obrázku je povinný'); src.focus(); return; }
          if (!alt.value.trim() && !deco.checked) {
            Announce.assertive('Zadejte alt text nebo označte jako dekorativní');
            alt.focus();
            return;
          }
          resolve({ src: src.value, alt: alt.value, decorative: deco.checked, caption: cap.value });
          dialog.close();
        });
        actions.appendChild(cancel);
        actions.appendChild(ok);
        inner.appendChild(actions);
        dialog.addEventListener('cancel', (e) => { e.preventDefault(); resolve(null); dialog.close(); });
      }, { label: 'Obrázek' });
    });
  }
};

// ===========================================================================
// PALETTE (shared base for slash menu, command palette, link picker)
// ===========================================================================
class Palette {
  constructor({ label, placeholder, onFilter, onSelect }) {
    this.label = label;
    this.placeholder = placeholder;
    this.onFilter = onFilter;
    this.onSelect = onSelect;
    this.items = [];
    this.selectedIndex = 0;
    this.dialog = null;
  }

  open() {
    this.dialog = document.createElement('dialog');
    this.dialog.className = 'palette';
    this.dialog.setAttribute('aria-label', this.label);
    this.dialog.setAttribute('aria-modal', 'true');

    const wrap = document.createElement('div');
    const inputWrap = document.createElement('div');
    inputWrap.className = 'palette-input-wrap';
    const input = document.createElement('input');
    input.type = 'text';
    input.className = 'palette-input';
    input.placeholder = this.placeholder;
    input.setAttribute('aria-label', this.label);
    input.setAttribute('role', 'combobox');
    input.setAttribute('aria-autocomplete', 'list');
    input.setAttribute('aria-expanded', 'true');
    input.id = 'palette-input-' + uuid().slice(0, 6);
    inputWrap.appendChild(input);
    wrap.appendChild(inputWrap);

    const list = document.createElement('ul');
    list.className = 'palette-list';
    list.setAttribute('role', 'listbox');
    list.setAttribute('aria-label', this.label + ' – výsledky');
    list.id = 'palette-list-' + uuid().slice(0, 6);
    wrap.appendChild(list);

    input.setAttribute('aria-controls', list.id);

    this.dialog.appendChild(wrap);
    document.getElementById('dialog-host').appendChild(this.dialog);

    this.input = input;
    this.list = list;

    input.addEventListener('input', () => this.filter());
    input.addEventListener('keydown', (e) => this.onKeydown(e));
    this.dialog.addEventListener('close', () => { this.dialog.remove(); });
    this.dialog.addEventListener('cancel', () => { /* close default */ });

    this.dialog.showModal();
    this.filter();
    input.focus();
  }

  close() {
    if (this.dialog) this.dialog.close();
  }

  filter() {
    const q = this.input.value;
    this.items = this.onFilter(q) || [];
    this.selectedIndex = 0;
    this.render();
  }

  render() {
    this.list.innerHTML = '';
    if (this.items.length === 0) {
      const empty = document.createElement('li');
      empty.className = 'palette-empty';
      empty.textContent = 'Žádné výsledky';
      this.list.appendChild(empty);
      this.input.setAttribute('aria-activedescendant', '');
      return;
    }
    this.items.forEach((item, idx) => {
      if (item.group) {
        const g = document.createElement('li');
        g.className = 'palette-group';
        g.textContent = item.group;
        g.setAttribute('role', 'presentation');
        this.list.appendChild(g);
        return;
      }
      const li = document.createElement('li');
      li.className = 'palette-item';
      li.setAttribute('role', 'option');
      li.id = 'palette-opt-' + idx;
      const label = document.createElement('span');
      label.className = 'palette-item-label';
      label.textContent = item.label;
      li.appendChild(label);
      if (item.hint) {
        const h = document.createElement('span');
        h.className = 'palette-item-hint';
        h.textContent = item.hint;
        li.appendChild(h);
      }
      li.addEventListener('click', () => {
        this.selectedIndex = idx;
        this.confirm();
      });
      li.addEventListener('mousemove', () => {
        if (this.selectedIndex !== idx) {
          this.selectedIndex = idx;
          this.updateSelection();
        }
      });
      this.list.appendChild(li);
    });
    this.updateSelection();
  }

  updateSelection() {
    this.list.querySelectorAll('.palette-item').forEach((el, i) => {
      const isSel = i === this.getAdjustedIndex();
      el.setAttribute('aria-selected', String(isSel));
      if (isSel) {
        this.input.setAttribute('aria-activedescendant', el.id);
        el.scrollIntoView({ block: 'nearest' });
      }
    });
  }

  getAdjustedIndex() {
    // when list has group headers, count only actual items
    const actualItems = [];
    this.items.forEach((it, i) => { if (!it.group) actualItems.push(i); });
    return actualItems[this.selectedIndex] !== undefined ? actualItems[this.selectedIndex] : 0;
  }

  getCurrentItem() {
    const actualItems = this.items.filter(i => !i.group);
    return actualItems[this.selectedIndex] || null;
  }

  onKeydown(e) {
    if (e.key === 'Escape') {
      e.preventDefault();
      this.close();
      return;
    }
    if (e.key === 'ArrowDown') {
      e.preventDefault();
      const count = this.items.filter(i => !i.group).length;
      this.selectedIndex = Math.min(count - 1, this.selectedIndex + 1);
      this.render();
      return;
    }
    if (e.key === 'ArrowUp') {
      e.preventDefault();
      this.selectedIndex = Math.max(0, this.selectedIndex - 1);
      this.render();
      return;
    }
    if (e.key === 'Enter') {
      e.preventDefault();
      this.confirm();
      return;
    }
  }

  confirm() {
    const item = this.getCurrentItem();
    if (item) {
      this.onSelect(item);
      this.close();
    }
  }
}

    ];

        const lower = q.toLowerCase();
        const filtered = items.filter(i => !i.group && (
          i.label.toLowerCase().includes(lower) ||
          (i.hint && i.hint.toLowerCase().includes(lower))
        ));

      },
      onSelect: (item) => {
        if (item.action === 'type') {
          Editor.changeBlockType(block, item.type);
          if (item.type === 'image') {

          }
        } else if (item.action === 'link') {
          setTimeout(() => {
            Editor.focusBlock(block.id);
            LinkPicker.open(block, contentEl, '@');
          }, 50);
        } else if (item.action === 'insert') {
          setTimeout(() => {
            Editor.focusBlock(block.id);
            document.execCommand('insertText', false, item.text);
          }, 50);
        }
      }
    });
    palette.open();
  }
};

// LINK PICKER
// ===========================================================================
const LinkPicker = {
  open(block, contentEl, trigger = '@') {
    const options = this.buildOptions();

    const palette = new Palette({
      label: 'Vložit odkaz na dokument nebo blok',
      placeholder: 'Hledat dokument…',
      onFilter: (q) => {
        const lower = (q || '').toLowerCase();
        const filtered = options.filter(o => o.label.toLowerCase().includes(lower));
        if (q && !options.some(o => o.label.toLowerCase() === lower)) {
          filtered.unshift({
            label: `Vytvořit novou stránku: "${q}"`,
            hint: 'nový',
            _create: true,
            _title: q
          });
        }
        return filtered;
      },
      onSelect: async (item) => {
        let targetId, displayText;
        if (item._create) {
          const doc = await createDocument({ title: item._title, openAfter: false });
          targetId = doc.id;
          displayText = item._title;
        } else {
          targetId = item._id;
          displayText = item.label;
        }
        // Insert mention
        setTimeout(() => {
          Editor.focusBlock(block.id);
          const a = `<a href="#doc=${targetId}" class="mention" data-link-id="${targetId}">${escapeHtml(displayText)}</a>&nbsp;`;
          document.execCommand('insertHTML', false, a);
          block.content = contentEl.innerHTML;
          markDirty();
          Announce.polite('Odkaz vložen: ' + displayText);
        }, 50);
      }
    });
    palette.open();
  },

  buildOptions() {
    const opts = [];
    // Documents
    State.docsIndex.forEach(d => {
      opts.push({
        label: d.title || 'Bez názvu',
        hint: 'dokument',
        _id: d.id
      });
    });
    // Sort: starred first, then by updated desc
    opts.sort((a, b) => {
      const aDoc = State.docsIndex.find(x => x.id === a._id);
      const bDoc = State.docsIndex.find(x => x.id === b._id);
      if (aDoc && bDoc) {
        if (aDoc.starred !== bDoc.starred) return aDoc.starred ? -1 : 1;
        return (bDoc.updatedAt || 0) - (aDoc.updatedAt || 0);
      }
      return 0;
    });
    return opts;
  }
};

function computeOpenTasksCount() {
  return State.inboxTasks.filter(t => !t.done).length;
}

function buildFolderTree(parentUl, parentFolderId) {
  const folders = State.folders
    .filter(f => (f.parentId || null) === parentFolderId)
    .sort((a, b) => (a.name || '').localeCompare(b.name || ''));
  const docs = State.docsIndex
    .filter(d => (d.folderId || null) === parentFolderId && !d.starred)
    .sort((a, b) => (b.updatedAt || 0) - (a.updatedAt || 0));

  folders.forEach(f => {
    const li = document.createElement('li');
    li.className = 'tree-item';
    li.setAttribute('role', 'treeitem');
    const expanded = State.settings.sidebarExpanded[f.id] !== false;
    li.setAttribute('aria-expanded', String(expanded));

    const row = document.createElement('div');
    row.className = 'tree-row';
    row.tabIndex = -1;

    const toggle = document.createElement('button');
    toggle.type = 'button';
    toggle.className = 'tree-toggle';
    toggle.textContent = expanded ? '▾' : '▸';
    toggle.setAttribute('aria-label', expanded ? 'Sbalit složku ' + f.name : 'Rozbalit složku ' + f.name);
    toggle.addEventListener('click', (e) => {
      e.stopPropagation();
      State.settings.sidebarExpanded[f.id] = !expanded;
      saveWorkspace();
      renderSidebar();
    });
    row.appendChild(toggle);

    const icon = document.createElement('span');
    icon.className = 'tree-icon';
    icon.setAttribute('aria-hidden', 'true');
    icon.textContent = '📁';
    row.appendChild(icon);

    const label = document.createElement('span');
    label.className = 'tree-label';
    label.textContent = f.name;
    row.appendChild(label);

    const actions = document.createElement('span');
    actions.className = 'tree-actions';
    const rename = document.createElement('button');
    rename.type = 'button';
    rename.className = 'tree-action';
    rename.textContent = '✎';
    rename.setAttribute('aria-label', 'Přejmenovat složku ' + f.name);
    rename.addEventListener('click', async (e) => {
      e.stopPropagation();
      const newName = await Dialogs.prompt('Nový název', { title: 'Přejmenovat složku', initial: f.name });
      if (newName && newName.trim()) await renameFolder(f.id, newName.trim());
    });
    const del = document.createElement('button');
    del.type = 'button';
    del.className = 'tree-action';
    del.textContent = '×';
    del.setAttribute('aria-label', 'Smazat složku ' + f.name);
    del.addEventListener('click', async (e) => {
      e.stopPropagation();
      const ok = await Dialogs.confirm(`Opravdu smazat složku "${f.name}"? Dokumenty budou přesunuty do kořene.`, { title: 'Smazat složku', confirmLabel: 'Smazat', danger: true });
      if (ok) await deleteFolder(f.id);
    });
    actions.appendChild(rename);
    actions.appendChild(del);
    row.appendChild(actions);

    row.addEventListener('click', () => {
      navigate({ view: 'folder', folderId: f.id });
    });
    row.addEventListener('keydown', (e) => handleTreeKeydown(e, row, f, 'folder'));

    if (State.currentView === 'folder' && State.currentFolderId === f.id) {
      row.setAttribute('aria-current', 'page');
    }

    li.appendChild(row);

    if (expanded) {
      const childUl = document.createElement('ul');
      childUl.className = 'tree-children';
      childUl.setAttribute('role', 'group');
      buildFolderTree(childUl, f.id);
      if (childUl.children.length > 0) li.appendChild(childUl);
    }

    parentUl.appendChild(li);
  });

  docs.forEach(d => {
    const li = document.createElement('li');
    li.setAttribute('role', 'treeitem');
    li.appendChild(buildDocRow(d));
    parentUl.appendChild(li);
  });
}

function buildDocRow(d) {
  const row = document.createElement('div');
  row.className = 'tree-row';
  row.tabIndex = -1;

  const spacer = document.createElement('span');
  spacer.className = 'tree-toggle';
  spacer.setAttribute('aria-hidden', 'true');
  row.appendChild(spacer);

  const icon = document.createElement('span');
  icon.className = 'tree-icon';
  icon.setAttribute('aria-hidden', 'true');
  icon.textContent = d.starred ? '★' : '📄';
  row.appendChild(icon);

  const label = document.createElement('span');
  label.className = 'tree-label';
  label.textContent = d.title || 'Bez názvu';
  row.appendChild(label);

  const actions = document.createElement('span');
  actions.className = 'tree-actions';
  const star = document.createElement('button');
  star.type = 'button';
  star.className = 'tree-action';
  star.textContent = d.starred ? '★' : '☆';
  star.setAttribute('aria-label', d.starred ? 'Odebrat z oblíbených' : 'Přidat do oblíbených');
  star.addEventListener('click', (e) => { e.stopPropagation(); starDocument(d.id); });
  const rename = document.createElement('button');
  rename.type = 'button';
  rename.className = 'tree-action';
  rename.textContent = '✎';
  rename.setAttribute('aria-label', 'Přejmenovat dokument ' + (d.title || 'Bez názvu'));
  rename.addEventListener('click', async (e) => {
    e.stopPropagation();
    const newTitle = await Dialogs.prompt('Nový název', { title: 'Přejmenovat dokument', initial: d.title });
    if (newTitle !== null) await renameDocument(d.id, newTitle);
  });
  const del = document.createElement('button');
  del.type = 'button';
  del.className = 'tree-action';
  del.textContent = '×';
  del.setAttribute('aria-label', 'Smazat dokument ' + (d.title || 'Bez názvu'));
  del.addEventListener('click', async (e) => {
    e.stopPropagation();
    const ok = await Dialogs.confirm(`Opravdu smazat dokument "${d.title || 'Bez názvu'}"? Tato akce je nevratná.`, { title: 'Smazat dokument', confirmLabel: 'Smazat', danger: true });
    if (ok) await deleteDocument(d.id);
  });
  actions.appendChild(star);
  actions.appendChild(rename);
  actions.appendChild(del);
  row.appendChild(actions);

  if (State.currentView === 'doc' && State.currentDocId === d.id) {
    row.setAttribute('aria-current', 'page');
  }

  row.addEventListener('click', () => openDocument(d.id));
  row.addEventListener('keydown', (e) => handleTreeKeydown(e, row, d, 'doc'));

  return row;
}

function handleTreeKeydown(e, row, item, kind) {
  const all = Array.from(document.querySelectorAll('.tree .tree-row'));
  const idx = all.indexOf(row);
  if (e.key === 'ArrowDown') {
    e.preventDefault();
    const next = all[idx + 1];
    if (next) next.focus();
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    const prev = all[idx - 1];
    if (prev) prev.focus();
  } else if (e.key === 'Home') {
    e.preventDefault();
    if (all[0]) all[0].focus();
  } else if (e.key === 'End') {
    e.preventDefault();
    if (all[all.length - 1]) all[all.length - 1].focus();
  } else if (e.key === 'Enter' || e.key === ' ') {
    e.preventDefault();
    if (kind === 'doc') openDocument(item.id);
    else navigate({ view: 'folder', folderId: item.id });
  } else if (e.key === 'Delete') {
    e.preventDefault();
    if (kind === 'doc') {
      Dialogs.confirm(`Opravdu smazat dokument "${item.title || 'Bez názvu'}"?`, { title: 'Smazat dokument', confirmLabel: 'Smazat', danger: true })
        .then(ok => { if (ok) deleteDocument(item.id); });
    } else {
      Dialogs.confirm(`Opravdu smazat složku "${item.name}"?`, { title: 'Smazat složku', confirmLabel: 'Smazat', danger: true })
        .then(ok => { if (ok) deleteFolder(item.id); });
    }
  } else if (e.key === 'F2') {
    e.preventDefault();
    const title = kind === 'doc' ? 'Přejmenovat dokument' : 'Přejmenovat složku';
    const current = kind === 'doc' ? item.title : item.name;
    Dialogs.prompt('Nový název', { title, initial: current }).then(val => {
      if (val !== null) {
        if (kind === 'doc') renameDocument(item.id, val);
        else renameFolder(item.id, val);
      }
    });
  }
}

// ===========================================================================
// HEADER RENDERING (breadcrumbs)
// ===========================================================================
function renderHeader() {
  const bc = document.getElementById('breadcrumbs');
  bc.innerHTML = '';
  const ol = document.createElement('ol');
  const items = [];
  switch (State.currentView) {
    case 'home': items.push({ label: 'Domů', current: true }); break;
    case 'doc':
      if (State.activeDoc) {
        const d = State.docsIndex.find(x => x.id === State.activeDoc.id);
        if (d && d.folderId) {
          const f = State.folders.find(x => x.id === d.folderId);
          if (f) items.push({ label: f.name, href: 'folder:' + f.id });
        }
        items.push({ label: State.activeDoc.title || 'Bez názvu', current: true });
      }
      break;
    case 'folder': {
      const f = State.folders.find(x => x.id === State.currentFolderId);
      items.push({ label: f ? f.name : 'Složka', current: true });
      break;
    }
    case 'daily':
      items.push({ label: 'Denní poznámky', current: false, href: 'calendar' });
      if (State.currentDailyDate) items.push({ label: formatDateCS(parseISODate(State.currentDailyDate)), current: true });
      break;
    case 'calendar': items.push({ label: 'Kalendář', current: true }); break;
    case 'tasks': items.push({ label: 'Úkoly', current: true }); break;
    case 'search': items.push({ label: 'Vyhledávání', current: true }); break;
    case 'settings': items.push({ label: 'Nastavení', current: true }); break;
  }
  items.forEach(it => {
    const li = document.createElement('li');
    if (it.current) {
      li.className = 'current';
      li.textContent = it.label;
    } else if (it.href) {
      const a = document.createElement('a');
      a.href = '#';
      a.textContent = it.label;
      a.addEventListener('click', (e) => {
        e.preventDefault();
        if (it.href.startsWith('folder:')) navigate({ view: 'folder', folderId: it.href.slice(7) });
        else navigate({ view: it.href });
      });
      li.appendChild(a);
    } else {
      li.textContent = it.label;
    }
    ol.appendChild(li);
  });
  bc.appendChild(ol);
}

// ===========================================================================
// NAVIGATION / ROUTER
// ===========================================================================
function navigate({ view, docId, folderId, dailyDate, query, pushHistory = true } = {}) {
  if (pushHistory && State.currentView) {
    State.history.push({
      view: State.currentView,
      docId: State.currentDocId,
      folderId: State.currentFolderId,
      dailyDate: State.currentDailyDate
    });
    if (State.history.length > 50) State.history.shift();
    State.historyForward = [];
  }

  State.currentView = view;
  State.currentDocId = docId || (view === 'doc' ? State.currentDocId : null);
  State.currentFolderId = folderId || null;
  State.currentDailyDate = dailyDate || (view === 'daily' ? (dailyDate || formatDateISO(new Date())) : null);

  const container = document.getElementById('view-container');
  container.innerHTML = '';

  switch (view) {
    case 'home': renderHome(container); break;
    case 'doc':
      if (State.activeDoc && State.activeDoc.id === State.currentDocId) {
        Editor.render(State.activeDoc, container);
      } else if (State.currentDocId) {
        openDocument(State.currentDocId);
        return;
      }
      break;
    case 'daily': renderDailyView(container, State.currentDailyDate); break;
    case 'calendar': renderCalendarView(container); break;
    case 'tasks': renderTasksView(container); break;
    case 'search': renderSearchView(container, query || ''); break;
    case 'folder': renderFolderView(container, State.currentFolderId); break;
    case 'settings': renderSettingsView(container); break;
    default: renderHome(container);
  }

  renderHeader();
  renderSidebar();

  const main = document.getElementById('main-content');
  main.focus();

  updateURL();
}

function goBack() {
  if (State.history.length === 0) { AudioFB.error(); Announce.polite('Není kam se vrátit'); return; }
  const prev = State.history.pop();
  State.historyForward.push({
    view: State.currentView,
    docId: State.currentDocId,
    folderId: State.currentFolderId,
    dailyDate: State.currentDailyDate
  });
  navigate({ ...prev, pushHistory: false });
}

function goForward() {
  if (State.historyForward.length === 0) { AudioFB.error(); Announce.polite('Není kam pokračovat'); return; }
  const next = State.historyForward.pop();
  State.history.push({
    view: State.currentView,
    docId: State.currentDocId,
    folderId: State.currentFolderId,
    dailyDate: State.currentDailyDate
  });
  navigate({ ...next, pushHistory: false });
}

function updateURL() {
  let hash = '';
  if (State.currentView === 'doc' && State.currentDocId) hash = `#doc=${State.currentDocId}`;
  else if (State.currentView === 'daily' && State.currentDailyDate) hash = `#daily=${State.currentDailyDate}`;
  else if (State.currentView === 'folder' && State.currentFolderId) hash = `#folder=${State.currentFolderId}`;
  else if (State.currentView !== 'home') hash = `#${State.currentView}`;
  if (hash !== location.hash) {
    try { history.replaceState(null, '', hash || location.pathname); } catch (e) { /* ignore */ }
  }
}

function handleURLHash() {
  const hash = location.hash.slice(1);
  if (!hash) return false;
  const parts = hash.split('&');
  const params = {};
  parts.forEach(p => {
    const [k, v] = p.split('=');
    params[k] = decodeURIComponent(v || '');
  });
  if (params.doc) {
    openDocument(params.doc);
    if (params.block) {
      setTimeout(() => {
        const el = document.querySelector(`[data-block-id="${params.block}"]`);
        if (el) { el.scrollIntoView({ block: 'center' }); Editor.focusBlock(params.block); }
      }, 200);
    }
    return true;
  }
  if (params.daily) { navigate({ view: 'daily', dailyDate: params.daily, pushHistory: false }); return true; }
  if (params.folder) { navigate({ view: 'folder', folderId: params.folder, pushHistory: false }); return true; }
  if (['calendar', 'tasks', 'search', 'settings'].includes(hash)) {
    navigate({ view: hash, pushHistory: false });
    return true;
  }
  return false;
}
